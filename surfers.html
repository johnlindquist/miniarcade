<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SIDE SURFERS</title>
<style>
  html,body{margin:0;height:100%;background:#07080c}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{height:100vh;aspect-ratio:4/9;image-rendering:pixelated;background:#000}
</style>
<canvas id="cv" width="320" height="720"></canvas>
<script src="engine.js?v=435b484c"></script>
<script src="autoplay.js?v=1acff4bb"></script>
<script>
'use strict';
const{ctx,W,H,random,R,RI,hash,clamp,rect,spawn,burst,dust,stepParts,drawParts,ring,stepRings,drawRings,
  shake,preDraw,postDraw,start,keys,tap,manual,initSession,sessionStep,drawSession,playing,addScore,gameOver,
  createShow,fxBurst}=E;
const{controllerMux,skillProfile}=AI;

// ---- simulation space: 3 lanes, runner row PY, distances in sim px ----
const LX=[33,80,127],PY=282,MOVX=1.7;
const md=(a,n)=>((a%n)+n)%n;
const TCOL=[['#ffd166','#ffe6ad','#c99a2e'],['#e63946','#f4707b','#a3202c'],
  ['#2ec4b6','#7ce0d3','#1d8b81'],['#6cc4ff','#b4e0ff','#3f83bf']];
const TR={train:1,mov:1,crawl:1}; // things with a body and a roof
const obsV=o=>o.kind==='mov'?spd+MOVX:o.kind==='crawl'?spd*0.62:spd;

// ---- chase-cam projection: the camera sits behind and above the runner ----
const HOR=148,FEET=302,FOC=125,ZMAX=380,GLOWZ=840;
const zof=y=>PY-y;                                  // sim y -> distance ahead
const pf=z=>FOC/(FOC+Math.max(-84,z));              // perspective factor (looms past 1, slides off frame)
const py3=f=>HOR+(FEET-HOR)*f;                      // ground row on screen
const px3=(sx,f)=>80+(sx-80)*1.12*f;                // sim x -> screen x
const zfade=z=>clamp((ZMAX-z)/60,0,1);              // things surface out of the tunnel dark
const RSX=()=>px3(P.x,1);                           // runner screen x

// ---------- state ----------
let obs=[],coins=[],pows=[],texts=[];
let dist=0,spd=2.6,coinCt=0,corridor=1,genY=-60,state='intro',stT=0,deaths=0,frame=0;
let combo=0,lastCoinF=-99;

// CHASE layer: the transit INSPECTOR hounds the runner. His pursuit heat is a
// pure function of sim events — every stumble surges him closer, clean running
// shakes him off — no RNG draws, so determinism holds. While he is hot the
// runner plays it safe (holds the guaranteed corridor instead of chasing
// loot). __NO_CHASE ablates both the pursuer and the safe-play response.
const INS={x:80,heat:70,peak:0};
let hadLapse=false;
const chaseOn=()=>typeof __NO_CHASE==='undefined';
const chaseHot=()=>chaseOn()&&INS.heat>=40;

// EXPRESS act: a telegraphed rush-hour wave floods the tunnel with live
// trains for 15s; the runner commits to a lane from the warning instead of
// chasing loot. Scheduled on run distance, no RNG draws; frame is monotonic
// (startRun keeps it) so it doubles as the show clock.
let rushPhase='calm',rushT=0,nextRushD=7000,lastKm=0;
const SHOW=createShow({tiers:{
  1:{frames:12},                                    // whooshes, combo pops
  2:{frames:45,minGap:90},                          // powerups, 1000m marks
  3:{frames:90,minGap:600,slowEvery:3,slowFrames:24} // EXPRESS CLEARED
}});
const P={x:LX[1],tl:1,elev:0,jumpT:0,rollT:0,hopT:0,magT:0,jetT:0,lapse:0,runT:0,legT:0};
let botFrame=0;
// Keep the original speed-scaled lapse roll on E.random. The +1 duration is
// internal: it accounts for the decision made on the stumble's first frame,
// while P.lapse remains the same 18..38-frame visual clock as before.
const lapseRng={
  chance:()=>!globalThis.__NO_LAPSE&&random()<0.00022*(spd-2.4),
  int:(a,b)=>a===0&&b===0?0:RI(a,b)+1,
  range:R
};
const runnerSkill=skillProfile({skill:1,precision:1,reactionFrames:0,
  lapseChance:1,lapseFrames:[18,38],rng:lapseRng});

// ---------- track generation: a guaranteed-open corridor weaves the lanes ----------
function coinLine(l,y0,n,roof){
  for(let i=0;i<n;i++)coins.push({lane:l,x:LX[l],y:y0-i*14,roof:!!roof,mv:0});
}
function dynIn(l){return obs.some(o=>(o.kind==='mov'||o.kind==='crawl')&&o.lane===l);}
function genSegment(){
  const d=Math.min(1,dist/40000); // difficulty dial: denser, meaner, more live trains
  const L=RI(130,210),gap=RI(Math.round(55-18*d),Math.round(100-30*d)),top=genY-L;
  const c=corridor;
  const r=random();
  const dynCount=obs.reduce((n,o)=>n+(o.kind==='mov'||o.kind==='crawl'?1:0),0);
  if(r<0.10){ // clean gantry line: everyone ducks
    obs.push({kind:'gan',lane:0,y:top+L/2,len:6});
    coinLine(c,top+L/2-26,4);
  }else if(r<0.20){ // barrier hops
    const bl=RI(0,2);
    obs.push({kind:'bar',lane:bl,y:top+L/2,len:6});
    const b2=md(bl+RI(1,2),3);
    if(random()<0.4+0.3*d&&b2!==bl)obs.push({kind:'bar',lane:b2,y:top+L/2,len:6});
    coinLine(bl,top+L/2-22,3); // arc bait over the hop
    coinLine(bl,top+L/2+50,3);
  }else if(r<0.20+(rushPhase==='live'?0.42:0.24*Math.min(1,0.35+d))&&
    dynCount<(d>0.5?2:1)+(rushPhase==='live'?1:0)&&spd>2.8){
    // a LIVE train: oncoming with headlights, or a slow crawler you overtake
    const cand=[0,1,2].filter(l=>l!==c&&!dynIn(l));
    let placed=false;
    if(cand.length){
      const m=cand[RI(0,cand.length-1)];
      let clean=true; // its lane must be visually free for the whole approach
      for(const o of obs)if(o.lane===m&&TR[o.kind]&&o.y>top-700)clean=false;
      if(clean){
        if(random()<0.55)obs.push({kind:'mov',lane:m,y:top-RI(260,420),len:RI(90,120),col:RI(0,3)});
        else obs.push({kind:'crawl',lane:m,y:top-RI(80,200),len:RI(110,150),col:RI(0,3)});
        placed=true;
      }
    }
    coinLine(c,top+RI(30,L-40),RI(3,5));
    if(!placed&&random()<0.4)obs.push({kind:'bar',lane:c,y:top+L/2,len:6});
  }else{ // parked-train weave, corridor may shift one lane
    let c2=clamp(c+RI(-1,1),0,2);
    if(dynIn(c2))c2=c;
    const overlap=56;
    for(let l=0;l<3;l++){
      if(l===c2||dynIn(l))continue;
      if(l===c&&c!==c2){ // old corridor: blocked only past the entry zone
        const tl2=L-overlap-10;
        if(tl2>60)obs.push({kind:'train',lane:l,y:top,len:tl2,col:RI(0,3)});
      }else if(random()<0.9){
        const len=L-RI(10,40);
        obs.push({kind:'train',lane:l,y:top+RI(0,18),len,col:RI(0,3)});
        if(len>90&&random()<0.5)coinLine(l,top+len-24,4,true); // roof loot
      }else coinLine(l,top+RI(20,50),4);
    }
    if(random()<0.3+0.25*d)obs.push({kind:'bar',lane:c2,y:top+RI(46,L-70),len:6});
    coinLine(c2,top+RI(30,70),RI(4,7));
    corridor=c2;
  }
  if(random()<0.055)pows.push({lane:corridor,y:top+RI(30,L-30),kind:random()<0.5?'mag':'jet'});
  genY=top-gap;
}

// ---------- run lifecycle ----------
function startRun(){
  obs=[];coins=[];pows=[];texts=[];
  dist=0;spd=2.6;coinCt=0;corridor=1;genY=-60;
  combo=0;lastCoinF=-99;
  P.x=LX[1];P.tl=1;P.elev=0;P.jumpT=0;P.rollT=0;P.hopT=0;P.magT=0;P.jetT=0;P.lapse=0;P.runT=0;
  botFrame=0;runnerSkill.reset();
  INS.x=LX[1];INS.heat=chaseOn()?70:0;INS.peak=INS.heat;hadLapse=false; // he chased you off the tag wall
  rushPhase='calm';rushT=0;nextRushD=7000;lastKm=0;SHOW.reset(frame);
  state='intro';stT=0;
}
function stepRush(){
  if(typeof __NO_ACTS!=='undefined')return;
  if(rushPhase==='calm'&&dist>=nextRushD){
    rushPhase='warn';rushT=0;
    SHOW.note({kind:'act-warning',id:'express',at:frame,tag:P.runT});
    texts.push({x:80,y:186,s:'EXPRESS INBOUND',c:'#ffe66d',t:70});shake(2);
  }else if(rushPhase==='warn'&&++rushT>=240){
    rushPhase='live';rushT=0;
    SHOW.note({kind:'act-land',id:'express',at:frame,tag:P.runT});
    texts.push({x:80,y:186,s:'EXPRESS SERVICE',c:'#ff5f6d',t:70});shake(3);
  }else if(rushPhase==='live'&&++rushT>=900){
    rushPhase='calm';nextRushD=dist+9000;
    SHOW.offer({id:'wave',tier:3,at:frame});fxBurst(RSX(),FEET-20,22,'#ffe66d',2.4);
    texts.push({x:80,y:186,s:'EXPRESS CLEARED',c:'#2ec4b6',t:70});
  }
}
// the inspector's pursuit: event-driven, RNG-free, honest about consequences
function stepChase(){
  if(!chaseOn()){INS.heat=0;return;}
  const lap=P.lapse>0;
  if(lap&&!hadLapse){ // a stumble is blood in the water
    INS.heat=Math.min(100,INS.heat+45);
    texts.push({x:Math.round(RSX()),y:FEET+24,s:'HEY!!',c:'#ff5f6d',t:36});
  }
  hadLapse=lap;
  INS.heat=Math.max(0,INS.heat-0.12);
  INS.peak=Math.max(INS.peak,INS.heat);
  INS.x+=(P.x-INS.x)*0.1;
}
function catchPlayer(){
  if(state!=='run')return;
  state='busted';stT=0;deaths++;
  if(chaseOn()){INS.heat=100;INS.x=P.x;} // the inspector makes the grab
  shake(6);burst(RSX(),FEET-12,22,'#e63946',2.4);
  if(playing())gameOver('BUSTED');
}

// ---------- runner control ----------
function jumpNow(){if(P.jumpT<=0&&P.rollT<=0){P.jumpT=32;dust(RSX(),FEET+2,3,'#cfd6e4');}}
function rollNow(){if(P.rollT<=0&&P.jumpT<=0&&P.elev===0){P.rollT=26;dust(RSX(),FEET+2,2,'#cfd6e4');}}
function tHit(l,skip){ // frames until a train body reaches the runner in lane l
  let m=1e9;
  for(const o of obs){
    if(o===skip||o.lane!==l||!TR[o.kind])continue;
    if(o.y-4<PY&&PY<o.y+o.len+4)return 0; // body is beside us RIGHT NOW
    const v=obsV(o);
    const g=PY-6-(o.y+o.len);
    if(g>-6){const t=g/v;if(t<m)m=t;}
  }
  return m;
}
function barSoon(l){ // a barrier will cross the runner's row while we'd be sliding in
  for(const o of obs)
    if(o.kind==='bar'&&o.lane===l&&o.y>PY-spd*16&&o.y<PY+10)return true;
  return false;
}
function coinScore(l){
  let s=0;
  for(const cn of coins)if(cn.lane===l&&!cn.roof&&cn.y<PY-8&&cn.y>PY-130)s++;
  for(const p of pows)if(p.lane===l&&p.y<PY-8&&p.y>PY-150)s+=10;
  return s;
}
function humanThink(){
  if(tap('left'))P.tl=clamp(P.tl-1,0,2);
  if(tap('right'))P.tl=clamp(P.tl+1,0,2);
  if(tap('up')||tap('a')){P.rollT=0;jumpNow();}
  if(tap('down')||tap('c')||tap('b')){if(P.elev===1)P.elev=0;else rollNow();}
}
function runnerPolicy(){
  const lane=P.tl;
  if(P.elev===1&&P.jumpT<=0){ // roof ride: plan the exit before the train ends
    const sup=support();
    for(const o of obs)if(o.kind==='gan'){ // hop the clothesline (it moves at world speed)
      const g=PY-4-o.y;
      if(g>0&&g<spd*12){jumpNow();return;}
    }
    if(sup&&sup.kind==='mov'){ // the oncoming train is a getaway car to NOWHERE: bail asap
      let bl=-1,bt=69;
      for(const d of[-1,1]){
        const l2=lane+d;
        if(l2<0||l2>2||barSoon(l2))continue;
        let t2=tHit(l2);
        for(const o of obs)
          if(TR[o.kind]&&o.kind!=='mov'&&o.lane===l2&&o.y<PY-40&&o.y+o.len>PY+10){t2=200;break;}
        if(t2>bt){bt=t2;bl=l2;}
      }
      if(bl>=0){P.tl=bl;jumpNow();}
      return;
    }
    if(sup&&sup.y>PY-50){ // tail is coming up under our feet
      const ahead=tHit(lane,sup);
      if(ahead<55){ // landing zone is blocked: hop to a better lane (or roof)
        let bl=-1,bt=ahead;
        for(const d of[-1,1]){
          const l2=lane+d;
          if(l2<0||l2>2||barSoon(l2))continue;
          let t2=tHit(l2);
          for(const o of obs) // a long parallel roof is a fine landing too
            if(TR[o.kind]&&o.kind!=='mov'&&o.lane===l2&&o.y<PY-40&&o.y+o.len>PY+10){t2=200;break;}
          if(t2>Math.max(70,bt)){bt=t2;bl=l2;}
        }
        if(bl>=0){P.tl=bl;jumpNow();}
      }
    }
    return;
  }
  if(P.elev===0){
    for(const o of obs){ // timed hops and slides
      if(o.kind==='bar'&&o.lane===lane){
        const g=PY-4-o.y;
        if(g>-10&&g<spd*11){
          if(P.rollT>0&&g<spd*8)P.rollT=0; // pop out of a roll straight into the hop
          jumpNow();
        }
      }else if(o.kind==='gan'){
        const g=PY-4-o.y;
        if(g>-10&&g<spd*10)rollNow(); // late roll still ducks a line at the chin
      }
    }
    const t0=tHit(lane);
    if(t0<48){
      let bl=-1,bt=Math.max(60,t0);
      for(const d of[-1,1]){
        const l2=lane+d;
        if(l2<0||l2>2||barSoon(l2))continue;
        const t2=tHit(l2);
        if(t2>bt){bt=t2;bl=l2;}
      }
      if(bl>=0){
        P.tl=bl;
        if(t0*spd<30){texts.push({x:RSX(),y:FEET-30,s:'CLOSE!',c:'#ffe66d',t:40});shake(1);}
      }else if(t0*spd<36)jumpNow(); // boxed in: ride the roof
    }else if(t0>90){ // safe
      if(rushPhase==='calm'&&!chaseHot()){ // chase loot
        let best=lane,bs=coinScore(lane);
        for(const d of[-1,1]){
          const l2=lane+d;
          if(l2<0||l2>2||barSoon(l2))continue;
          if(tHit(l2)<90)continue;
          const s=coinScore(l2);
          if(s>bs+1){bs=s;best=l2;}
        }
        P.tl=best;
      }else{ // EXPRESS called, or the inspector is breathing down his neck:
             // work toward the guaranteed corridor and hold it
        const d=Math.sign(corridor-lane);
        if(d){
          const l2=lane+d;
          if(l2>=0&&l2<=2&&!barSoon(l2)&&tHit(l2)>90)P.tl=l2;
        }
      }
    }
  }
}
function botThink(){
  const now=botFrame++;
  runnerSkill.decide(now,null,
    ()=>{runnerPolicy();return true;},
    ()=>{if(P.lapse<=0)runnerPolicy();return false;});
  P.lapse=Math.max(0,Math.ceil(runnerSkill.status(now).lapseRemaining)-1);
}
const runnerControl=controllerMux({human:humanThink,ai:botThink,
  manual:()=>playing()||manual()});
function think(){runnerControl(null);}

// ---------- physics + collisions ----------
function laneAt(){return clamp(Math.round((P.x-LX[0])/47),0,2);}
function support(){ // the train under the runner's feet, if any
  const l=laneAt();
  for(const o of obs)
    if(TR[o.kind]&&o.lane===l&&PY>o.y+2&&PY<o.y+o.len-2)return o;
  return null;
}
function landingHot(){ // would ending the jetpack right now drop us into trouble?
  const l=laneAt();
  for(const o of obs){
    if(o.kind==='gan'&&Math.abs(o.y-PY)<44)return true;
    if(o.lane!==l)continue;
    if(o.kind==='bar'&&Math.abs(o.y-PY)<44)return true;
    if(TR[o.kind]){ // don't land astride an edge
      if(Math.abs(o.y-PY)<16||Math.abs(o.y+o.len-PY)<16)return true;
    }
  }
  return tHit(l)<18;
}
function physics(){
  P.x+=(LX[P.tl]-P.x)*0.25;
  P.legT+=0.16+spd*0.062; // stride cadence follows ground speed
  const wasAir=P.jumpT>0; // the landing frame still counts as airborne
  if(P.jumpT>0){
    P.jumpT--;
    if(P.jumpT===0){ // land: roof if a train is under us
      const s=support();
      if(s){if(P.elev!==1)dust(RSX(),FEET-24,4,'#fff');P.elev=1;}
      else{if(P.elev===1)P.hopT=8;P.elev=0;}
    }
  }
  if(P.rollT>0)P.rollT--;
  if(P.hopT>0)P.hopT--;
  if(P.magT>0)P.magT--;
  if(P.jetT>0){P.jetT--;P.elev=2;
    if(frame%6===0)shake(1); // afterburner rumble
    spawn({x:RSX()+R(-3,3),y:FEET-26+R(0,6),vx:R(-0.3,0.3),vy:R(1,2.4),t:12,c:random()<0.5?'#ffd166':'#ff8a2a'});
    if(P.jetT%5===0)coins.push({lane:laneAt(),x:P.x+R(-8,8),y:PY-70,roof:false,mv:0}); // coin shower
    if(P.jetT===0){
      if(landingHot()){P.jetT=18;} // hover a beat longer than a lethal drop zone
      else{P.elev=support()?1:0;P.hopT=10;}
    }
  }
  if(P.elev===1&&P.jumpT<=0&&!support()){ // ran off the end
    if(landingHot())jumpNow(); // tail-hop clear of a lethal drop zone
    else{P.hopT=8;dust(RSX(),FEET+2,3,'#cfd6e4');}
    P.elev=0;
  }
  if(P.elev===2||P.jumpT>0||wasAir||P.hopT>0)return; // airborne (incl. the drop-hop): untouchable
  const l=laneAt();
  for(const o of obs){
    if(o.kind==='gan'){
      if(Math.abs(PY-o.y)<6&&P.rollT<=0){catchPlayer();return;} // clothesline
      continue;
    }
    if(o.lane!==l)continue;
    if(o.kind==='bar'){
      if(P.elev===0&&Math.abs(PY-o.y)<6){catchPlayer();return;}
    }else if(P.elev===0&&PY>o.y+2&&PY<o.y+o.len-2){catchPlayer();return;} // ran into a train
  }
}
function pickups(){
  for(const cn of coins){
    if(P.magT>0&&Math.abs(cn.y-PY)<64&&Math.abs(cn.x-P.x)<70){
      cn.mv=1;cn.x+=(P.x-cn.x)*0.28;cn.y+=(PY-cn.y)*0.28;
      if(frame%3===0){
        const f=pf(zof(cn.y));
        spawn({x:px3(cn.x,f),y:py3(f)-5*f,vx:R(-0.2,0.2),vy:R(-0.2,0.2),t:8,c:'#ff5fa8',drag:1});
      }
    }
    const near=Math.abs(cn.x-P.x)<(P.jetT>0?16:8)&&Math.abs(cn.y-PY)<(P.jetT>0?16:9);
    const elevOk=P.jetT>0||cn.mv>0||(cn.roof?P.elev===1:P.elev!==1);
    if(near&&elevOk){
      cn.take=true;coinCt++;
      if(frame-lastCoinF<50)combo++;else combo=1;
      lastCoinF=frame;
      if(combo===8||combo===16||combo===28){
        texts.push({x:RSX(),y:FEET-42,s:'COMBO x'+(combo===8?2:combo===16?3:4),c:'#ffd166',t:50});
        shake(1);SHOW.offer({id:'combo',tier:1,at:frame,tag:combo});
        if(playing())addScore(combo);
      }
      if(playing())addScore(5);
      spawn({x:RSX()+R(-4,4),y:FEET-18,vy:-0.9,t:14,c:'#ffd166'});
    }
  }
  coins=coins.filter(cn=>!cn.take&&cn.y<PY+30);
  for(const p of pows){
    if(Math.abs(LX[p.lane]-P.x)<10&&Math.abs(p.y-PY)<10&&P.elev!==1){
      p.take=true;
      ring(RSX(),FEET-14,p.kind==='mag'?'#ff5fa8':'#ffd166',1.8,24);
      SHOW.offer({id:'power',tier:2,at:frame,tag:p.kind});fxBurst(RSX(),FEET-18,10,p.kind==='mag'?'#ff5fa8':'#ffd166',1.8);
      texts.push({x:RSX(),y:FEET-40,s:p.kind==='mag'?'MAGNET!':'JETPACK!',c:'#fff',t:50});
      if(p.kind==='mag')P.magT=540;else{P.jetT=330;P.jumpT=0;P.rollT=0;}
    }
  }
  pows=pows.filter(p=>!p.take&&p.y<PY+30);
}

// ---------- main step ----------
function step(){
  frame++;
  sessionStep({reset:startRun});
  if(!chaseOn()){INS.heat=0;INS.peak=0;} // ablation is total: no pursuit pressure anywhere
  const pres=SHOW.step(frame); // EXPRESS CLEARED: 24f at 1/3 speed
  if(state==='intro'){
    stT++;
    if(stT<30&&stT%3===0) // spraying the wall
      spawn({x:20+R(-5,7),y:FEET-46+R(-12,16),vx:R(-0.4,0.2),vy:R(-0.2,0.2),t:RI(10,24),c:'#2de2e6',drag:1});
    if(stT===34)texts.push({x:46,y:FEET-60,s:'HEY!!',c:'#ff5f6d',t:40});
    if(stT>50)state='run';
  }else if(state==='run'){
    // slow-mo skip frames stay inside this branch: falling through to the
    // busted else would tick stT and eventually startRun() mid-run
    if(frame%pres.physicsEvery===0){
    P.runT++;
    stepRush();
    // sprint within the first minute, keep creeping up after
    spd=2.6+Math.min(2.2,dist/9000*2.2)+Math.min(0.7,Math.max(0,dist-9000)/60000*0.7);
    if(P.jetT>0)spd*=1.38; // jetpack afterburner
    dist+=spd;
    const km=Math.floor(dist/10000);
    if(km>lastKm){lastKm=km;SHOW.offer({id:'km',tier:2,at:frame,tag:km});
      texts.push({x:RSX(),y:FEET-52,s:(km*1000)+'m!',c:'#9fd8ff',t:56});fxBurst(RSX(),FEET-24,10,'#9fd8ff',1.8);}
    if(playing()&&frame%6===0)addScore(1);
    genY+=spd;
    for(const o of obs)o.y+=TR[o.kind]?obsV(o):spd;
    for(const cn of coins)cn.y+=spd;
    for(const p of pows)p.y+=spd;
    obs=obs.filter(o=>o.y<PY+120);
    while(genY>-320)genSegment();
    think();
    physics();
    if(state==='run'){
      for(const o of obs){ // whoosh: a body blasting past your shoulder
        if(!TR[o.kind]||o.nm)continue;
        const bot=o.y+o.len;
        if(bot>PY-7&&bot<PY+7&&o.lane!==laneAt()&&Math.abs(LX[o.lane]-P.x)<52){
          o.nm=1;
          if(o.kind!=='train'||spd>3.6){
            burst(RSX()+(LX[o.lane]>P.x?9:-9),FEET-16,6,'#fff',1.6);
            fxBurst(RSX()+(LX[o.lane]>P.x?7:-7),FEET-22,8,'#cfe6ff',2.4); // wind shear off the hull
            shake(o.kind==='mov'?3:1);SHOW.offer({id:'whoosh',tier:1,at:frame});
            if(playing())addScore(3);
            if(random()<0.5)texts.push({x:RSX(),y:FEET-34,s:'WHOOSH!',c:'#9fd8ff',t:30});
          }
        }
        if(o.kind==='mov'&&!o.horn&&zof(o.y+o.len)<170){ // headlights hit you first
          o.horn=1;shake(2);
          texts.push({x:px3(LX[o.lane],0.55),y:py3(0.55)-20,s:'HONK!',c:'#fff7ae',t:34});
        }
      }
      pickups();
      stepChase();
    }
    }
  }else{ // busted
    stT++;
    if(stT>60&&!playing())startRun();
  }
  stepParts();stepRings();
  for(const t of texts){t.t--;t.y-=0.3;}
  texts=texts.filter(t=>t.t>0);
}

function slab(o){ // a train drawn as a looming 3D block
  const zNr=zof(o.y+o.len),zF=zof(o.y);
  if(o.kind==='mov'&&zNr>ZMAX-60&&zNr<GLOWZ){
    // twin headlights pierce the tunnel dark long before the body surfaces
    const t=1-(zNr-(ZMAX-60))/(GLOWZ-(ZMAX-60));
    const f=pf(ZMAX-30),gx=px3(LX[o.lane],f),gy=py3(f)-8*f;
    const wig=frame%18<9;
    for(let i=0;i<2;i++){
      const lx=gx+(i?3:-4),on=wig===(i===0);
      ctx.globalAlpha=(0.25+0.65*t)*(on?1:0.35);
      rect(lx,gy,2,2,'#ffffff');
      ctx.globalAlpha=(0.1+0.3*t)*(on?1:0.3);
      ctx.fillStyle='#fff7ae';
      ctx.beginPath();ctx.arc(lx+1,gy+1,3+4*t,0,7);ctx.fill();

  if(zF<-30||zNr>ZMAX+60)return; // alive until the BACK clears the camera

  ctx.closePath();ctx.fill();
  for(let t=0.22;t<1;t+=0.26){ // roof ribs
    const z=zN+(Math.min(zF,ZMAX+40)-zN)*t,f=pf(z);
    rect(px3(LX[o.lane],f)-18*f,py3(f)-26.4*f,36*f,Math.max(1,1.1*f),dk);
  }
  for(const t of[0.3,0.68]){ // AC units: real objects on top sell the surface
    if(o.len<95&&t>0.5)continue;
    const z=zN+(Math.min(zF,ZMAX+40)-zN)*t,f=pf(z);
    const ax=px3(LX[o.lane],f),ay=py3(f)-27*f;
    rect(ax-7*f,ay-3*f,14*f,4*f,'#aab3bd');
    rect(ax-7*f,ay-3*f,14*f,Math.max(1,1.2*f),'#cdd5dd');
    rect(ax+2*f,ay-2*f,3*f,Math.max(1,1.4*f),'#7d858e'); // vent grille
  }
  // bright leading edge along the front-top
  rect(xN-wN,yN-hN,wN*2,Math.max(1,2.2*fN),lt);
  // near side skirt (subtle depth edge)

function drawObs(){
  const items=[];
  for(const o of obs)items.push({z:TR[o.kind]?zof(o.y+o.len):zof(o.y),o});
  for(const cn of coins)items.push({z:zof(cn.y),c:cn});
  for(const p of pows)items.push({z:zof(p.y),p});
  items.sort((a,b)=>b.z-a.z); // far first
  for(const it of items){
    if(it.o&&TR[it.o.kind]){slab(it.o);continue;} // slabs cull by their own back end
    if(it.z>ZMAX+60||it.z<-26)continue;
    const a=zfade(it.z);
    if(a<=0)continue;
    if(it.o){
      const o=it.o;
      const f=pf(it.z),y=py3(f);
      ctx.globalAlpha=a;
      if(o.kind==='bar'){ // striped hurdle
        const x=px3(LX[o.lane],f),w=17*f,h=Math.max(2,6*f);
        rect(x-w,y-h-2*f,Math.max(1,2*f),h+2*f,'#5a626b');
        rect(x+w-2*f,y-h-2*f,Math.max(1,2*f),h+2*f,'#5a626b');
        for(let i=0;i<4;i++)
          rect(x-w+i*(w/2),y-h-2*f,w/4,h,i%2?'#f2f3f7':'#e63946');
      }else{ // gantry: full-width beam you slide under
        const xl=px3(9,f),xr=px3(151,f),bh=Math.max(2,6*f),lift=24*f;
        rect(xl,y-lift-bh,xr-xl,bh,'#20242e');
        for(let x=xl+2;x<xr-4;x+=Math.max(4,10*f))
          rect(x,y-lift-bh+1,Math.max(2,5*f),Math.max(1,bh-2),'#ffd166');
        rect(xl,y-lift-bh,Math.max(1,2*f),lift+bh,'#4a505e');
        rect(xr-Math.max(1,2*f),y-lift-bh,Math.max(1,2*f),lift+bh,'#4a505e');
      }
      ctx.globalAlpha=1;
    }else if(it.c){
      const cn=it.c,f=pf(it.z);
      const x=px3(cn.x,f),y=py3(f)-(cn.roof?30*f:6*f)+Math.sin(frame*0.15+cn.y*0.1)*f;
      // a chunky disc that squashes smoothly as it spins — no strobing
      const hh=Math.max(2,5.5*f);
      const ww=Math.max(2,5*f*(0.45+0.55*Math.abs(Math.sin(frame*0.09+cn.y*0.05))));
      ctx.globalAlpha=a;
      rect(x-ww/2,y-hh,ww,hh*2,'#c99a2e'); // rim
      rect(x-ww/2+1,y-hh+1,Math.max(1,ww-2),Math.max(1,hh*2-2),'#ffd166');
      if(ww>3)rect(x-1,y-hh+2,Math.max(1,ww*0.25),Math.max(1,hh*0.7),'#fff3c4');
      if(hash(Math.round(cn.x*3+cn.lane*7),frame>>3)>0.8){ // streak sparkle
        ctx.fillStyle='#fff';
        ctx.fillRect(Math.round(x),Math.round(y-hh-2),1,1);
        ctx.fillRect(Math.round(x-2),Math.round(y),1,1);
      }
      ctx.globalAlpha=1;
    }else{
      const p=it.p,f=pf(it.z),x=px3(LX[p.lane],f),y=py3(f)-6*f+Math.sin(frame*0.12+p.y)*2*f;
      ctx.globalAlpha=a;
      if(p.kind==='mag'){
        rect(x-4*f,y-5*f,8*f,7*f,'#ff5fa8');
        rect(x-4*f,y,3*f,3*f,'#f2f3f7');rect(x+f,y,3*f,3*f,'#f2f3f7');
      }else{
        rect(x-4*f,y-6*f,8*f,10*f,'#8b91a5');
        rect(x-3*f,y-8*f,6*f,3*f,'#e63946');
        rect(x-3*f,y+3*f,6*f,3*f,'#ff8a2a');
        if(frame%10<5)rect(x-f,y+6*f,2*f,2*f,'#ffd166'); // pilot flame
      }
      ctx.globalAlpha=a*(0.25+0.15*Math.sin(frame*0.2+p.y)); // beckoning halo
      ctx.fillStyle=p.kind==='mag'?'#ff5fa8':'#ffd166';
      ctx.beginPath();ctx.arc(x,y-2*f,7*f,0,7);ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}
// shared runner pose: drawing and the visual probe must agree on the pixels
function runnerPose(){
  let h=0;
  if(P.jumpT>0)h=Math.sin(Math.PI*(1-P.jumpT/32))*26;
  else if(P.hopT>0)h=Math.sin(Math.PI*(P.hopT/8))*8;
  if(P.jetT>0)h=24+Math.sin(frame*0.2)*3;
  const base=P.elev===1&&P.jumpT<=0?FEET-26:FEET;
  return{x:Math.round(RSX()),base,y:Math.round(base-h)};
}
function drawRunner(){
  const pose=runnerPose(),x=pose.x,y=pose.y,base=pose.base;
  // ground shadow
  ctx.globalAlpha=0.3;
  const shw=Math.max(4,9-(base-y)*0.14);
  rect(x-shw/2,base+1,shw,2,'#05060a');
  ctx.globalAlpha=1;
  if(P.magT>0){ctx.globalAlpha=0.3;ctx.strokeStyle='#ff5fa8';
    ctx.beginPath();ctx.arc(x,y-8,11+Math.sin(frame*0.25)*2,0,7);ctx.stroke();ctx.globalAlpha=1;}
  if(P.jetT>0){ // afterimages trailing the boost
    for(const g of[[7,0.22],[13,0.1]]){
      ctx.globalAlpha=g[1];
      rect(x-3,y-10+g[0],7,7,'#3aa7f0');
    }
    ctx.globalAlpha=1;
  }
  if(P.rollT>0){ // tuck-and-roll, tumbling
    const ph=Math.floor(P.rollT/4)%2;
    rect(x-4,y-7,8,7,'#3aa7f0');
    rect(x-3,y-6,6,5,'#2b7fc2');
    rect(x-3+(ph?3:0),y-6,3,2,'#e8b088'); // head tucked, tumbling over
    rect(x-4,y-(ph?2:5),8,1,'#9fd8ff');   // motion band
    ctx.globalAlpha=0.4;
    rect(x-7,y-2,2,1,'#fff');rect(x+5,y-6,2,1,'#fff');
    ctx.globalAlpha=1;
    return;
  }
  const air=P.jumpT>0||P.jetT>0;
  const stp=Math.sin(P.legT)>0?1:0;                     // 2-frame gait
  const bob=air?0:(Math.abs(Math.sin(P.legT))>0.7?-1:0); // stride bob
  const trip=P.lapse>0;
  const wob=trip?Math.round(Math.sin(frame*0.9)*1.5):0; // stumble wobble
  const ly=y+bob;
  if(air&&P.jetT<=0){ // jump: knees tucked, arms flung wide
    rect(x-2,ly-4,2,3,'#31518f');rect(x+1,ly-4,2,3,'#31518f');
    rect(x-2,ly-2,2,1,'#f2f3f7');rect(x+1,ly-2,2,1,'#f2f3f7');

  }else{
    // legs scissoring, sneakers flashing

    rect(x+1-(stp?1:0),ly-4,2,4,'#31518f');

    rect(x+1-(stp?1:0),ly-1,2,1,'#f2f3f7');
    if(trip){ // flailing arms — he's losing it
      rect(x-5+wob,ly-11,2,3,'#3aa7f0');rect(x+4+wob,ly-12,2,3,'#3aa7f0');
      rect(x-5+wob,ly-12,1,1,'#e8b088');rect(x+5+wob,ly-13,1,1,'#e8b088');
    }else{ // arms pumping counter-phase
      rect(x-4,ly-8+(stp?1:0),2,3,'#3aa7f0');
      rect(x+3,ly-8+(stp?0:1),2,3,'#3aa7f0');
      rect(x-4,ly-5+(stp?1:0),2,1,'#e8b088');
      rect(x+3,ly-5+(stp?0:1),2,1,'#e8b088');
    }
  }
  if(!(P.rollT>0)){
    // jacket + backpack (seen from behind)
    rect(x-2+wob,ly-9,5,5,'#3aa7f0');

    rect(x-1+wob,ly-8,3,1,'#a3202c');
    if(P.jetT>0){ // jet flame licking off the pack
      const fl=2+(frame%6<3?2:0);

// his world position is (P.x, -dist). The bust beat (impact card + inspector
// grab) and the respawn tag are the two authored pauses; both are reported as
// emotes and together stay under the 2-second budget (60f bust + 50f intro).
globalThis.__motionProbe=()=>({actors:[
  {id:'runner',x:P.x,y:-dist,emote:state!=='run'},
  {id:'inspector',x:INS.x,y:-dist+(100-INS.heat)*2,emote:state!=='run'}
],finite:finiteAll()});
globalThis.__soakProbe=()=>({
  sig:Math.round(P.x*31+dist*7)+coinCt*1009+deaths*97+P.tl*17,
  events:coinCt+deaths+Math.round(INS.peak),
  progress:Math.round(dist),
  finite:finiteAll()});
let vidSeq=0;
function __veh(kind,lane,y,len,col){
  const o={kind,lane,y,len,col,vid:++vidSeq,z0:PY-y};obs.push(o);return o;
}
function vehBox(o){ // projected screen box for a fixture vehicle
  const zNr=zof(o.y+o.len);
  if(zNr>ZMAX-40){ // only the piercing headlights are on screen yet
    const f=pf(ZMAX-30),gx=px3(LX[o.lane],f),gy=py3(f)-8*f;
    return{x:gx-11,y:gy-9,width:22,height:24};
  }
  const zN=Math.max(zNr,-82),zF=Math.min(zof(o.y),ZMAX+40);
  const fN=pf(zN),fF=pf(zF);
  const xN=px3(LX[o.lane],fN),xF=px3(LX[o.lane],fF);
  const x0=Math.min(xN-20*fN,xF-20*fF)-5,x1=Math.max(xN+20*fN,xF+20*fF)+5;
  const y0=Math.min(py3(fF)-33*fF,py3(fN)-27*fN-8)-3,y1=py3(fN)+4; // exhaust chuffs above the near roofline
  return{x:x0,y:y0,width:x1-x0,height:y1-y0};
}
globalThis.__sfVisualProbe=()=>{
  const pose=runnerPose(),insp=inspScreen();
  const trip=P.lapse>0;
  const actors=[
    {id:'runner',kind:'standard',type:'runner',
     box:{x:pose.x-(trip?12:9),y:pose.y-(trip?27:18),width:trip?25:19,height:pose.base-pose.y+(trip?32:23)}},
    {id:'inspector',kind:'standard',type:'inspector',
     box:{x:insp.x-9,y:insp.y-18,width:19,height:24}},
    {id:'dog',kind:'standard',type:'dog',
     box:{x:dogXAt(insp.x)-7,y:insp.y-9,width:15,height:14}}
  ];
  for(const o of obs)if(TR[o.kind]&&o.vid){
    const zN=zof(o.y+o.len);
    if(zN>=ZMAX+55&&!(o.kind==='mov'&&zN<GLOWZ))continue; // still swallowed by the dark
    actors.push({id:'veh-'+o.vid,kind:'vehicle',type:o.kind,box:vehBox(o)});
  }
  return{finite:finiteAll(),
    layout:{playfield:{x:0,y:14,width:W,height:H-14},
      approach:(()=>{
        const o=obs.find(o=>o.kind==='mov'&&o.vid);
        if(!o)return null;
        return{travel:o.z0,visible:Math.min(o.z0,GLOWZ)};
      })()},
    actors};
};
function __fixRun(d){ // deterministic mid-run tableau scaffold
  startRun();
  state='run';stT=0;dist=d;lastKm=Math.floor(d/10000);
  genY=-340;obs=[];coins=[];pows=[];texts=[];
  rushPhase='calm';nextRushD=1e9;
  P.x=LX[1];P.tl=1;INS.heat=30;INS.x=LX[1];
  spd=2.6+Math.min(2.2,d/9000*2.2)+Math.min(0.7,Math.max(0,d-9000)/60000*0.7);
}
globalThis.__sfVisualBeats=['opening','run','zone1','zone2','later','danger','stumble','jet',
  'apex','apex-before','express-warn','express-calm','busted','actor-scale','actor-motion','approach'];
globalThis.__sfSetVisualBeat=(name)=>{
  if(name==='opening'){startRun();return true;}
  if(name==='run'){__fixRun(6200);
    __veh('train',0,-170,150,2);__veh('train',2,-60,120,0);
    obs.push({kind:'bar',lane:1,y:-118,len:6});
    coinLine(1,160,6);pows.push({lane:1,y:-30,kind:'mag'});
    return true;}
  if(name==='zone1'){__fixRun(16200);
    __veh('crawl',0,-210,130,1);__veh('train',2,-120,150,3);
    coinLine(1,150,5);coinLine(2,20,4,true);
    return true;}
  if(name==='zone2'){__fixRun(26200);
    obs.push({kind:'gan',lane:0,y:-140,len:6});
    __veh('train',1,-260,140,0);__veh('train',0,-40,110,1);
    coinLine(2,150,6);
    return true;}
  if(name==='later'){__fixRun(36200);
    __veh('train',0,-90,170,3);__veh('train',1,-210,120,2);
    coinLine(2,140,5);obs.push({kind:'bar',lane:2,y:-150,len:6});
    return true;}
  if(name==='danger'){__fixRun(9000);
    __veh('mov',0,-180,110,1);__veh('train',2,-80,140,2);
    coinLine(1,130,4);INS.heat=85;
    return true;}
  if(name==='stumble'){__fixRun(7400);
    P.lapse=26;INS.heat=64;
    __veh('train',0,-120,140,0);coinLine(2,140,5);
    return true;}
  if(name==='jet'){__fixRun(12600);
    P.jetT=240;coinLine(1,120,6);__veh('train',2,-160,150,1);
    return true;}
  if(name==='apex'){__fixRun(15400);
    rushPhase='live';rushT=886;
    __veh('mov',0,-240,110,1);__veh('crawl',2,-120,140,3);
    return true;}
  if(name==='apex-before'){globalThis.__sfSetVisualBeat('apex');rushT=830;return true;}
  if(name==='express-warn'){__fixRun(9600);rushPhase='warn';rushT=10;return true;}
  if(name==='express-calm'){__fixRun(9600);return true;}
  if(name==='busted'){__fixRun(8200);
    __veh('train',1,150,126,1); // the hull he just clipped, looming at his face
    state='busted';stT=0;deaths=1;INS.heat=100;INS.x=P.x;
    return true;}
  if(name==='actor-scale'){__fixRun(5000);
    __veh('train',0,2,100,0); // near end parked at the z=180 reference depth
    INS.heat=92;
    return true;}
  if(name==='actor-motion'){__fixRun(5000);INS.heat=88;return true;}
  if(name==='approach'){__fixRun(9000);__veh('mov',0,-700,110,1);return true;}
  return false;
};

// ---------- main ----------
initSession('surfers',[['ARROWS','LANE · JUMP'],['DOWN','ROLL · DROP']]);
startRun();
start(()=>{step();},()=>{draw();});
