const DIRS=[[1,0],[-1,0],[0,1],[0,-1]],PERSONAS=[{name:'BRAVE',hunt:4,riskW:.9,greed:.5},{name:'SNEAKY',hunt:0,riskW:2.2,greed:.45},{name:'GREEDY',hunt:1,riskW:.55,greed:.95}];

function markEvent(){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEvent);lastEvent=showFrame}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgress);lastProgress=showFrame;if(score&&playing())addScore(score)}
function artNote(kind,x,y,value){artEvents.push({kind,x,y,value:value||0,at:showFrame});if(artEvents.length>12)artEvents.shift()}
function inside(x,y){return x>=0&&y>=0&&x<COLS&&y<ROWS}function id(x,y){return y*COLS+x}function xy(n){return{x:n%COLS,y:(n/COLS)|0}}

function carve(){grid=Array.from({length:ROWS},()=>Array(COLS).fill(1));const stack=[[1,1]];grid[1][1]=0;while(stack.length){const [x,y]=stack.at(-1),opts=[];for(const[dx,dy]of DIRS){const nx=x+dx*2,ny=y+dy*2;if(nx>0&&ny>0&&nx<COLS-1&&ny<ROWS-1&&grid[ny][nx])opts.push([nx,ny,dx,dy])}if(!opts.length){stack.pop();continue}const[nx,ny,dx,dy]=opts[RI(0,opts.length-1)];grid[y+dy][x+dx]=0;grid[ny][nx]=0;stack.push([nx,ny])}for(let i=0;i<9;i++){const x=1+RI(0,COLS-3),y=1+RI(0,ROWS-3);if((x+y)%2)grid[y][x]=0}}
function openCells(){const a=[];for(let y=1;y<ROWS-1;y++)for(let x=1;x<COLS-1;x++)if(grid[y][x]===0)a.push({x,y});return a}
function farthest(s){const q=[s],seen=new Map([[id(s.x,s.y),0]]);let best=s;for(let h=0;h<q.length;h++){const p=q[h],d=seen.get(id(p.x,p.y));if(d>seen.get(id(best.x,best.y)))best=p;for(const[dx,dy]of DIRS){const x=p.x+dx,y=p.y+dy,k=id(x,y);if(!inside(x,y)||grid[y][x]!==0||seen.has(k))continue;seen.set(k,d+1);q.push({x,y})}}return best}
function pick(pool,used){let p,guard=0;do p=pool[RI(0,pool.length-1)];while(used.some(v=>v.x===p.x&&v.y===p.y)&&++guard<80);used.push(p);return{...p}}
function digPockets(used){ // seal shards behind pico-only cracks: a maze wall block whose
  // single carved approach becomes the crack door, the block itself the pocket.
  const spots=[];
  for(let py=2;py<ROWS-1;py+=2)for(let px=2;px<COLS-1;px+=2){
    if(grid[py][px]!==1)continue;
    const openN=DIRS.filter(([dx,dy])=>inside(px+dx,py+dy)&&grid[py+dy][px+dx]===0);
    if(openN.length!==1)continue;
    const[dx,dy]=openN[0],wx=px+dx,wy=py+dy;
    if(wx<1||wy<1||wx>=COLS-1||wy>=ROWS-1)continue;
    spots.push({wx,wy,px,py});

  const out=[];
  for(let i=0;i<2&&spots.length;i++){
    const s=spots.splice(RI(0,spots.length-1),1)[0];
    if(grid[s.wy][s.wx]!==0||grid[s.py][s.px]!==1)continue;
    grid[s.wy][s.wx]=2;grid[s.py][s.px]=0;out.push({x:s.px,y:s.py});used.push({x:s.px,y:s.py});

}
function digShortcutCrack(){ // one wall between two corridors becomes a pico shortcut
  const spots=[];

  if(spots.length){const p=spots[RI(0,spots.length-1)];grid[p.y][p.x]=2}
}
function solvable(){ // BFS over (cell,size) with pad toggles: every shard + shrine reachable from start big
  const seen=new Set(),q=[[1,1,BIG]];seen.add(id(1,1)*2+BIG);
  while(q.length){const[x,y,s]=q.shift();
    if(padAt(x,y)){const k=id(x,y)*2+(1-s);if(!seen.has(k)){seen.add(k);q.push([x,y,1-s])}}
    for(const[dx,dy]of DIRS){const nx=x+dx,ny=y+dy;if(!passable(nx,ny,s)&&!(inside(nx,ny)&&grid[ny][nx]===3&&s===BIG))continue;const k=id(nx,ny)*2+s;if(seen.has(k))continue;seen.add(k);q.push([nx,ny,s])}}

}
function buildGlade(){
  carve();pads=[];shards=[];gnawers=[];
  const start={x:1,y:1},used=[start];
  shrine={...farthest(start),open:false};used.push(shrine);
  const pocketCells=digPockets(used);digShortcutCrack();
  const pool=openCells();
  for(const p of pocketCells)shards.push({x:p.x,y:p.y,taken:false,pocket:true});
  while(shards.length<5)shards.push({...pick(pool,used),taken:false});
  for(let i=0;i<5;i++){const p=pick(pool,used);pads.push({x:p.x,y:p.y,cool:0})}
  if(!padAt(1,1)&&pads.length)Object.assign(pads[0],{x:1,y:1}); // a ring always waits at the trailhead
  for(let i=0;i<4;i++){const c=pool[RI(0,pool.length-1)];if(grid[c.y][c.x]===0&&!(c.x===1&&c.y===1)&&!used.some(v=>v.x===c.x&&v.y===c.y)&&DIRS.filter(([dx,dy])=>grid[c.y+dy]&&grid[c.y+dy][c.x+dx]===0).length>=2)grid[c.y][c.x]=3}

function threat(x,y){let n=0;for(const g of gnawers){if(g.dead)continue;const q=Math.abs(x-g.x)+Math.abs(y-g.y);if(q<5)n+=(5-q)*(g.mode==='HUNT'?2.3:1)}return n}
function spathTo(goal){ // Dijkstra over (cell,size): moves, big bramble chops, pad toggles
  const smart=typeof globalThis.__NO_SIZE_PLAN==='undefined';
  const sk=id(hero.x,hero.y)*2+hero.size,ek=v=>goal.size===undefined?[id(goal.x,goal.y)*2,id(goal.x,goal.y)*2+1].includes(v):v===id(goal.x,goal.y)*2+goal.size;
  const openSet=[sk],came=new Map([[sk,-1]]),cost=new Map([[sk,0]]);let end=-1;
  while(openSet.length){
    openSet.sort((a,b)=>cost.get(a)-cost.get(b));const k=openSet.shift();
    if(ek(k)){end=k;break}
    const s=k&1,p=xy(k>>1);
    const pad=padAt(p.x,p.y);

    for(const[dx,dy]of DIRS){const x=p.x+dx,y=p.y+dy;if(!inside(x,y))continue;const g=grid[y][x];
      let c=0;if(g===0||(g===2&&s===PICO))c=1;else if(g===3&&s===BIG)c=8;else continue;
      if(smart&&s===PICO){c+=threat(x,y)*persona.riskW*.8;if(act.phase!=='calm')c+=6}

  const out=[];for(let k=end;k!==sk;k=came.get(k)){const s=k&1,p=xy(k>>1);out.push({x:p.x,y:p.y,size:s})}

let stormDive=null;
function goals(){
  const smart=typeof globalThis.__NO_SIZE_PLAN==='undefined';
  const loose=shards.filter(s=>!s.taken);
  if(smart&&act.phase!=='calm'){ // storm rules: grow before the rain, or commit to one brave dive
    if(stormDive){const s=loose.find(v=>v.x===stormDive.x&&v.y===stormDive.y);
      if(s)return[{x:s.x,y:s.y,kind:'SHARD'}];stormDive=null}
    if(hero.size===PICO){const grow=pads.map(p=>({x:p.x,y:p.y,size:BIG,kind:'GROW'}));if(grow.length)return grow}
    const open=loose.filter(s=>!s.pocket);
    if(open.length)return open.map(s=>({x:s.x,y:s.y,size:BIG,kind:'SHARD'}));
    if(loose.length)return loose.map(s=>({x:s.x,y:s.y,kind:'SHARD',dive:true}));

  }
  if(smart&&hero.size===BIG&&persona.hunt>0){
    const prey=gnawers.filter(g=>!g.dead&&Math.abs(g.x-hero.x)+Math.abs(g.y-hero.y)<=persona.hunt);
    if(prey.length&&loose.length)return prey.map(g=>({x:g.x,y:g.y,kind:'HUNT'})).concat(loose.map(s=>({x:s.x,y:s.y,kind:'SHARD'})));
  }
  if(loose.length)return loose.map(s=>({x:s.x,y:s.y,kind:'SHARD'}));

let lastGoal=null;
function plan(){
  const smart=typeof globalThis.__NO_SIZE_PLAN==='undefined';
  let choices=goals().map(g=>({g,p:spathTo(g)})).filter(v=>v.p.length);
  if(!choices.length&&smart&&act.phase!=='calm'){ // nothing big-reachable: commit to a rain dive
    const loose=shards.filter(s=>!s.taken);
    choices=loose.map(s=>({g:{x:s.x,y:s.y,kind:'SHARD'},p:spathTo({x:s.x,y:s.y})})).filter(v=>v.p.length);
    if(choices.length)stormDive={x:choices[0].g.x,y:choices[0].g.y};
  }
  const keyOf=g=>g.kind+':'+g.x+','+g.y;

  lastGoal=choices[0]?keyOf(choices[0].g):null;
  hero.target=choices[0]?choices[0].g.kind==='GROW'?'GROW':choices[0].g.kind==='HUNT'?'HUNT':choices[0].g.kind==='SHRINE'?'SHRINE':'SHARD':'SHARD';

function rawIntent(){
  if(!route.length||showFrame%150===0)plan();
  const n=route[0];
  if(!n)return{dx:0,dy:0,act:false,target:hero.target};
  if(n.x===hero.x&&n.y===hero.y&&n.size!==hero.size)return{dx:0,dy:0,act:true,target:n.size===PICO?'SHRINK':'GROW'};
  return{dx:Math.sign(n.x-hero.x),dy:Math.sign(n.y-hero.y),act:false,target:hero.target};
}
function botIntent(){
  if(visualFixture.startsWith('portrait'))return{dx:0,dy:0,act:false,target:hero.target}; // frozen portrait scenes
  if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined')return{dx:0,dy:0,act:false,target:'ADMIRE'};
  if(typeof globalThis.__NO_SIZE_PLAN!=='undefined'&&showFrame%180<24)return{dx:0,dy:0,act:false,target:'HESITATE'};
  if(typeof globalThis.__NO_LAPSE!=='undefined'){lastLapsed=false;return rawIntent()}
  const out=profile.decide(showFrame,null,()=>rawIntent(),()=>({dx:0,dy:0,act:false,target:'DAYDREAM'}));
  const lapsed=profile.isLapsed(showFrame);if(lapsed&&!lastLapsed)stats.lapses++;lastLapsed=lapsed;

}
function humanIntent(){return{dx:(keys.right?1:0)-(keys.left?1:0),dy:(keys.down?1:0)-(keys.up?1:0),act:!!keys.a,target:'MANUAL'}}
const controller=controllerMux({human:humanIntent,bot:botIntent,manual:()=>manual()});
function toggleSize(){
  const p=padAt(hero.x,hero.y);if(!p||p.cool>0)return false;
  hero.size=1-hero.size;hero.morph=30;p.cool=90;markEvent();
  const q=pos(hero.x,hero.y);
  if(hero.size===PICO){stats.shrinks++;artNote('shrink',hero.x,hero.y,0);SHOW.offer({id:'shrink',tier:1,at:showFrame,tag:'PICO!',expiresAt:showFrame+30})}
  else{stats.grows++;artNote('grow',hero.x,hero.y,0);SHOW.offer({id:'grow',tier:1,at:showFrame,tag:'BIG AGAIN',expiresAt:showFrame+30})}

function squish(g){
  stats.squishes++;markEvent();flash=10;artNote('squish',hero.x,hero.y,0);
  hero.stun=45;hero.inv=120;route=[];g.cool=60;g.mode='ROAM';
  const opts=DIRS.map(([dx,dy])=>({x:hero.x+dx,y:hero.y+dy})).filter(p=>passable(p.x,p.y,hero.size)).sort((a,b)=>(Math.abs(b.x-g.x)+Math.abs(b.y-g.y))-(Math.abs(a.x-g.x)+Math.abs(a.y-g.y)));
  if(opts.length){hero.px=hero.x;hero.py=hero.y;hero.nx=opts[0].x;hero.ny=opts[0].y;hero.t=6;hero.bounce=true} // a visible bounce away, never a teleport

function slash(g){
  stats.slashes++;markEvent();hero.slashAt=showFrame;hero.slashDir=Math.sign(g.x-hero.x)||1;
  g.dead=600;artNote('slash',g.x,g.y,0);

function trySlash(){
  if(hero.size!==BIG||hero.slashCool>0)return;
  for(const g of gnawers){if(g.dead)continue;if(Math.abs(g.x-hero.x)+Math.abs(g.y-hero.y)<=1){slash(g);hero.slashCool=30;break}}
}
function collect(){
  for(const s of shards)if(!s.taken&&s.x===hero.x&&s.y===hero.y){
    s.taken=true;stats.shards++;markProgress(40);route=[];artNote('shard',s.x,s.y,shards.filter(v=>v.taken).length);
    SHOW.offer({id:'shard',tier:2,at:showFrame,tag:'SUN SHARD '+shards.filter(v=>v.taken).length+'/5',expiresAt:showFrame+60});
    if(typeof globalThis.__NO_PAYOFF_FX==='undefined'){const q=pos(s.x,s.y);fxDust(q.x,q.y,8,GOLD)}
    if(shards.every(v=>v.taken)){shrine.open=true;markEvent();artNote('bloom',shrine.x,shrine.y,0);SHOW.offer({id:'bloom',tier:2,at:showFrame,tag:'SHRINE BLOOMS',expiresAt:showFrame+60})}

function sheltered(x,y){return DIRS.some(([dx,dy])=>inside(x+dx,y+dy)&&grid[y+dy][x+dx]===1)&&hash(x+glade*11,y+7)>.45}
function stepAct(){
  if(typeof globalThis.__NO_ACTS!=='undefined')return;
  if(act.phase==='calm'&&runFrame===act.warnAt){act.phase='warn';const n={kind:'act-warning',id:'storm',at:showFrame,landsAt:showFrame+240};actNotes.push(n);SHOW.note(n);route=[]}
  else if(act.phase==='warn'&&runFrame>=act.landAt){act.phase='live';const n={kind:'act-land',id:'storm',at:showFrame};actNotes.push(n);SHOW.note(n);artNote('storm',hero.x,hero.y,act.count+1);markEvent()}
  else if(act.phase==='live'&&runFrame>=act.endAt){act.count++;act.phase='calm';stormDive=null;act.warnAt+=3600;act.landAt=act.warnAt+240;act.endAt=act.landAt+480}

function stepStorm(){
  if(act.phase!=='live'||hero.size!==PICO||hero.stun>0||hero.inv>0)return;
  if(sheltered(hero.x,hero.y))return;
  if((runFrame-act.landAt)%90===50){stats.soaks++;hero.stun=30;flash=6;markEvent();artNote('soak',hero.x,hero.y,0);SHOW.offer({id:'soak',tier:1,at:showFrame,tag:'SOAKED',expiresAt:showFrame+30})}

function stepGnawers(){

function visualAnchor(){
  const options=openCells().filter(p=>p.x>1&&p.x<COLS-2&&p.y>3&&p.y<ROWS-3&&DIRS.some(([dx,dy])=>passable(p.x+dx,p.y+dy,BIG)));
  options.sort((a,b)=>(Math.abs(a.x-5)+Math.abs(a.y-9))-(Math.abs(b.x-5)+Math.abs(b.y-9))||a.y-b.y||a.x-b.x);
  return options[0]||{x:1,y:1};
}
function visualLine(anchor){
  const cellsList=openCells(),candidates=[];
  for(const p of cellsList)for(const q of cellsList){
    const distance=Math.abs(p.x-q.x)+Math.abs(p.y-q.y);if(distance<2||distance>5||!(p.x===q.x||p.y===q.y))continue;
    let clear=true;
    if(p.x===q.x){for(let y=Math.min(p.y,q.y)+1;y<Math.max(p.y,q.y);y++)if(grid[y][p.x]!==0){clear=false;break}}
    else for(let x=Math.min(p.x,q.x)+1;x<Math.max(p.x,q.x);x++)if(grid[p.y][x]!==0){clear=false;break}
    if(clear)candidates.push({p,q,score:Math.abs(p.x-anchor.x)+Math.abs(p.y-anchor.y)+Math.abs(distance-3)});
  }
  candidates.sort((a,b)=>a.score-b.score);
  return candidates[0]||{p:anchor,q:cellsList.find(c=>c.x!==anchor.x||c.y!==anchor.y)||anchor};
}
function setHeroVisual(p,size,moving){
  Object.assign(hero,{x:p.x,y:p.y,px:p.x,py:p.y,nx:p.x,ny:p.y,t:0,size,stun:0,inv:0,chop:0,slashCool:0,slashAt:-999,slashDir:1,channel:0,target:'SHARD'});
  route=spathTo({x:shrine.x,y:shrine.y});
  if(!route.length){const n=DIRS.map(([dx,dy])=>({x:p.x+dx,y:p.y+dy})).find(n=>passable(n.x,n.y,size));if(n)route=[{...n,size}]}
  if(moving&&route.length&&route[0].size===size){hero.nx=route[0].x;hero.ny=route[0].y;hero.t=stepDur()}
}
function setGnawerVisual(p,mode,dir){
  if(!gnawers.length)gnawers.push({x:p.x,y:p.y,homeX:p.x,homeY:p.y,dir:dir||0,mode,cool:999,dead:0});
  Object.assign(gnawers[0],{x:p.x,y:p.y,homeX:p.x,homeY:p.y,dir:dir===undefined?0:dir,mode,cool:999,dead:0});
  for(let i=1;i<gnawers.length;i++){gnawers[i].mode='ROAM';gnawers[i].cool=999}
}
function resetVisualFixture(name){
  visualFixture=name;artEvents=[];lastNearArt=-9999;flash=0;glade=1;persona=PERSONAS[0];runFrame=420;lastLapsed=false;
  act={phase:'calm',warnAt:999999,landAt:1000239,endAt:1000719,count:0};SHOW.reset(showFrame);pres={holdWorld:false,physicsEvery:1,admire:false,cue:null};
  for(const s of shards)s.taken=false;shrine.open=false;for(const p of pads)p.cool=0;
  const anchor=visualAnchor(),line=visualLine(anchor);
  setHeroVisual(line.p,BIG,true);setGnawerVisual(line.q,'ROAM',line.q.x>line.p.x?0:line.q.x<line.p.x?1:line.q.y>line.p.y?2:3);
  return{anchor,line};
}
function setVisualBeat(name){
  const allowed=['opening','travel','small','chase','shrink-before','shrink','grow','slash-before','slash','squish','shard-before','shard','later','deep','storm-calm','storm-warn','storm','bloom-before','bloom','channel','restore-before','restore',
    'portrait','portrait-away','portrait-pico','portrait-pico-away','portrait-gnawer','portrait-gnawer-away'];
  if(!allowed.includes(name))return false;
  const{anchor,line}=resetVisualFixture(name);
  if(name==='opening'){setHeroVisual(line.p,BIG,true)}
  else if(name==='travel'){setHeroVisual(line.p,BIG,true)}
  else if(name==='small'){setHeroVisual(line.p,PICO,true)}
  else if(name==='chase'){setHeroVisual(line.p,PICO,true);setGnawerVisual(line.q,'HUNT',gnawers[0].dir)}
  else if(name==='shrink-before'||name==='shrink'){
    const p=pads[0];Object.assign(p,{x:anchor.x,y:anchor.y,cool:0});setHeroVisual(anchor,name==='shrink'?PICO:BIG,false);
    if(name==='shrink'){p.cool=90;artNote('shrink',anchor.x,anchor.y,0);SHOW.offer({id:'shrink',tier:1,at:showFrame,tag:'PICO!',expiresAt:showFrame+30})}
  }else if(name==='grow'){
    const p=pads[0];Object.assign(p,{x:anchor.x,y:anchor.y,cool:90});setHeroVisual(anchor,BIG,false);
    artNote('grow',anchor.x,anchor.y,0);SHOW.offer({id:'grow',tier:1,at:showFrame,tag:'BIG AGAIN',expiresAt:showFrame+30});
  }else if(name==='slash-before'||name==='slash'){
    setHeroVisual(line.p,BIG,false);setGnawerVisual(line.q,'FLEE',gnawers[0].dir);
    if(name==='slash'){const g=gnawers[0];Object.assign(g,{x:line.p.x+Math.sign(line.q.x-line.p.x),y:line.p.y+Math.sign(line.q.y-line.p.y)});if(!passable(g.x,g.y,BIG)){g.x=line.p.x;g.y=line.p.y}hero.slashAt=showFrame;hero.slashDir=Math.sign(g.x-hero.x)||1;g.dead=600;artNote('slash',g.x,g.y,0);SHOW.offer({id:'slash',tier:1,at:showFrame,tag:'GNAWER SLAIN',expiresAt:showFrame+30})}
  }else if(name==='squish'){
    setHeroVisual(line.p,PICO,false);setGnawerVisual(line.p,'HUNT',0);hero.stun=45;hero.inv=120;flash=10;
    artNote('squish',line.p.x,line.p.y,0);SHOW.offer({id:'squish',tier:1,at:showFrame,tag:'SQUISHED',expiresAt:showFrame+30});
  }else if(name==='shard-before'||name==='shard'){
    setHeroVisual(anchor,BIG,false);const s=shards[0];s.x=anchor.x;s.y=anchor.y;s.taken=name==='shard';
    if(name==='shard'){artNote('shard',anchor.x,anchor.y,1);SHOW.offer({id:'shard',tier:2,at:showFrame,tag:'SUN SHARD 1/5',expiresAt:showFrame+60})}
  }else if(name==='later'){glade=2;persona=PERSONAS[1];setHeroVisual(line.p,BIG,true);setGnawerVisual(line.q,'ROAM',gnawers[0].dir)}
  else if(name==='deep'){glade=4;persona=PERSONAS[2];setHeroVisual(line.p,PICO,true);setGnawerVisual(line.q,'HUNT',gnawers[0].dir)}
  else if(name==='storm-calm'||name==='storm-warn'){
    setHeroVisual(line.p,BIG,true);act={phase:name==='storm-warn'?'warn':'calm',warnAt:runFrame-(name==='storm-warn'?1:-99999),landAt:runFrame+150,endAt:runFrame+630,count:0};
  }else if(name==='storm'){
    setHeroVisual(line.p,PICO,true);act={phase:'live',warnAt:runFrame-241,landAt:runFrame-1,endAt:runFrame+999,count:1};
    artNote('storm',hero.x,hero.y,1);
  }else if(name==='bloom-before'||name==='bloom'){
    setHeroVisual(line.p,BIG,false);
    if(name==='bloom'){for(const s of shards)s.taken=true;shrine.open=true;artNote('bloom',shrine.x,shrine.y,0);SHOW.offer({id:'bloom',tier:2,at:showFrame,tag:'SHRINE BLOOMS',expiresAt:showFrame+60})}
  }else if(name.startsWith('portrait')){ // static scenes for drawn-extent measurement:
    // same glade, no route, actors frozen; the subject either sits at the anchor or is moved away
    const away=name.endsWith('-away'),gsub=name.includes('gnawer');
    const far=openCells().sort((a,b)=>(Math.abs(b.x-anchor.x)+Math.abs(b.y-anchor.y))-(Math.abs(a.x-anchor.x)+Math.abs(a.y-anchor.y))||a.y-b.y||a.x-b.x);
    const park=far[0]||{x:1,y:1},spare=far.find(c=>Math.abs(c.x-park.x)+Math.abs(c.y-park.y)>=4)||park;
    if(gsub){setHeroVisual(park,BIG,false);setGnawerVisual(away?spare:anchor,'ROAM',0)}
    else{setHeroVisual(away?park:anchor,name.includes('pico')?PICO:BIG,false);setGnawerVisual(spare,'ROAM',0)}
    route=[];
  }else if(name==='channel'){
    for(const s of shards)s.taken=true;shrine.open=true;setHeroVisual(shrine,BIG,false);hero.channel=60;artNote('channel',shrine.x,shrine.y,0);
  }else if(name==='restore-before'||name==='restore'){
    glade=3;persona=PERSONAS[2];setHeroVisual(line.p,BIG,false);for(const s of shards)s.taken=true;shrine.open=true;
    if(name==='restore'){artNote('restore',line.p.x,line.p.y,2);SHOW.offer({id:'restore',tier:3,at:showFrame,tag:'GLADE RESTORED',expiresAt:showFrame+90})}
  }
  return true;
}
function heroBox(){const q=heroDrawPos();return hero.size===PICO?{x:q.x-6,y:q.y-8,width:12,height:14}:{x:q.x-7,y:q.y-13,width:14,height:22}}
function visualProbe(){
