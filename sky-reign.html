<!doctype html>
<html lang="en">

<title>SKY REIGN</title>
<style>
  html,body{margin:0;height:100%;background:#07080d}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;
    image-rendering:pixelated;background:#0a0c12}
  canvas:focus-visible{outline:2px solid #59d8f5;outline-offset:-3px}
</style>
<canvas id="cv" width="320" height="720" tabindex="0"
  aria-label="Sky Reign. A dragon rider soars on rails over five biomes: sweep locks onto sky packs, unleash homing volleys, weave through telegraphed fire, ride out sandstorm fronts, and break the carrier wyrm at the gate."></canvas>
<script src="engine.js"></script>
<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,random,RI,hash,clamp,rect,spawn,stepParts,drawParts,ring,stepRings,drawRings,
  shake,preDraw,postDraw,start,keys,manual,initSession,sessionStep,drawSession,playing,
  addScore,gameOver,createShow,fxBurst,fxDust}=E;
const{controllerMux,skillProfile,createRng}=AI;

// SKY REIGN — a Panzer Dragoon spinoff for the 4:9 strip. The dragon flies
// on rails over five biomes; the rider steers laterally and in altitude,
// banks HONESTLY into lateral travel (bank = atan2(vx, speed) with inertia,
// never a cosmetic intent lean). Tap fire lances straight ahead; hold to
// sweep lock ticks onto up to four targets; release to unleash the homing
// volley. Incoming fire is telegraphed by a windup glow ON the shooter and
// must be physically woven. Nothing pre-draws intent: no route lines, no
// target predictions, no safe-lane markers — lock reticles live ON the
// locked enemies, tells live on the actors themselves. One shared
// integrator flies the dragon, every wing, swarm craft, bolt, missile, the
// wyrm, the human, the bot, and the copied-state planner rollouts.
const TAU=Math.PI*2,SECTOR=300,BIOME_SPAN=4200,FLIGHT_FRAMES=43200,DRAGON_Y=300;
const ALT_MIN=4,ALT_MAX=66,CORR_L=14,CORR_R=146,MAX_LOCKS=4;
const INK='#070a12',CREAM='#fff3da',GOLD='#ffb02e',AMBER='#ff8a3d',CORAL='#ff5d4f',
  MINT='#67e8a2',CYAN='#59d8f5',STEEL='#9aa7b8',BLOOD='#c92c3c',VIOLET='#8a7aff';
const BIOMES=[
  {name:'DUNE SEA',ground:'#6a4e2e',far:'#8a683c',ridge:'#c9a25e',ridgeD:'#453322',
    rock:'#7a6244',accent:'#ffd166',haze:'#ffca7a',kind:'dune'},
  {name:'CLOUD REEF',ground:'#2c4a6a',far:'#3c5e84',ridge:'#dfeaf2',ridgeD:'#9ab4c8',
    rock:'#5c6a58',accent:'#59d8f5',haze:'#bfe4ff',kind:'reef'},
  {name:'SUNKEN RUINS',ground:'#11404c',far:'#1a5460',ridge:'#3f8a94',ridgeD:'#0c2e36',
    rock:'#7a8a7e',accent:'#8affea',haze:'#9af0e0',kind:'ruins'},
  {name:'ASH FIELDS',ground:'#17161d',far:'#242330',ridge:'#3c3c46',ridgeD:'#0e0d13',
    rock:'#2c2c34',accent:'#ff8a3d',haze:'#c96a4a',kind:'ash'},
  {name:'THE GATE',ground:'#0d1024',far:'#1a2044',ridge:'#3c468a',ridgeD:'#090b1a',
    rock:'#2c3464',accent:'#ffd166',haze:'#8a7aff',kind:'gate'}
];
// The recurring sky pack: four wing slots with stable ids and readable kinds.
// hp is lance hits to down; cruise is forward world speed; turn/drag feed the
// shared integrator; windup is the telegraph before a bolt leaves.
const WING_KINDS={
  vyr:{label:'VYR',color:'#e0483c',trim:'#ffd0b9',hp:1,cruise:.72,turn:.10,turnA:.07,windup:26,boltCd:120,altBand:[18,52]},
  manta:{label:'MANTA',color:'#67e8a2',trim:'#eafff2',hp:2,cruise:.86,turn:.085,turnA:.06,windup:30,boltCd:160,altBand:[24,60]},
  wasp:{label:'WASP',color:'#ffd166',trim:'#fff3c4',hp:1,cruise:1.34,turn:.13,turnA:.10,windup:18,boltCd:105,altBand:[12,44]},
  spire:{label:'SPIRE',color:'#6f8dff',trim:'#dbe6ff',hp:2,cruise:.62,turn:.06,turnA:.045,windup:34,boltCd:180,altBand:[30,62]}
};
const PERSONAS=[
  {name:'LANCE',lockValue:9,dodgeRange:34,engage:1.15,risk:.8,color:GOLD},
  {name:'VEIL',lockValue:5,dodgeRange:46,engage:.8,risk:.4,color:CYAN},
  {name:'GALE',lockValue:7,dodgeRange:40,engage:1,risk:.62,color:MINT}
];

let showFrame=0,runFrame=0,state='flight',resultT=0,outcome='',worldSeed=1,skillSeed=1;
let dragon=null,wings=[],swarm=[],bolts=[],missiles=[],lances=[],wyrm=null,dust=null;
let texts=[],plan=null,planAt=-1e9,skill=null,visualIntent=null;
let persona=PERSONAS[0],personaIndex=0,wingSerial=0,swarmSerial=0,boltSerial=0;
let generatedTo=-1,lastBiome=0,lastSector=0,volleyStreak=0,lastVolleyFrame=-1e9;
let volleySerial=0,volleyCounts={};
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
let eventSerial=0,progressSerial=0,lastEventFrame=0,lastProgressFrame=0,lastLapsed=false;
// ---- good/bad feedback presentation (all sim-inert) --------------------------
// Kill bursts, dodge streaks and wound flashes are engine particles on the
// sim-inert fx stream; the edge pulse tags each beat gold (good) or coral
// (bad); feedback is the append-only ledger evals/feedback.js crops against a
// same-seed __NO_PAYOFF_FX twin. marks[] holds STATIC aftermath decals (world
// anchored, world-clock expiry) so signature colors land exactly on the event
// spot. Nothing here is read by physics or either RNG stream.
let goodPulse=0,badPulse=0,feedback=[],feedbackSerial=0,marks=[];
function screenYAt(wy,alt){return(DRAGON_Y-dragon.alt)-(wy-dragon.worldY)-(alt-dragon.alt);}
function cue(kind,id,x,wy,alt,pulse){
  feedback.push({serial:feedbackSerial++,frame:runFrame,show:showFrame,kind,id,
    sx:Math.round(clamp(x,0,W)),sy:Math.round(clamp(screenYAt(wy,alt),34,H-6))});
  if(feedback.length>420)feedback.splice(0,feedback.length-420);
  if(kind==='good')goodPulse=Math.max(goodPulse,pulse===undefined?.45:pulse);
  else badPulse=Math.max(badPulse,pulse===undefined?.55:pulse);
}
const stats={markers:0,biomes:1,kills:0,volleyKills:0,volleys:0,volleyWipes:0,locks:0,lanceHits:0,
  lances:0,boltsFaced:0,nearMisses:0,hitsTaken:0,shieldBreaks:0,wounds:0,collisions:0,wrecks:0,
  lapses:0,acts:0,actClears:0,storms:0,stormClears:0,wyrms:0,phaseBreaks:0,wyrmKills:0,dodges:0,contacts:0,
  sweeps:0,sweepHits:0,
  events:0,progress:0,maxEventLull:0,maxProgressLull:0,maxStep:0,appliedIntents:0,admireIntents:0};
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},2:{frames:44,minGap:100},
  3:{frames:84,minGap:900,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});
const act={phase:'calm',type:'sandstorm',warnAt:3000,landAt:3240,endAt:4000,index:0,
  hitsAtLand:0,wind:0,notes:[]};

const mod=(n,d)=>((n%d)+d)%d;
const round=(v,n)=>{const p=Math.pow(10,n||4);return Math.round(v*p)/p;};
const mix=(a,b,t)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16),
  m=s=>Math.round((pa>>s&255)+((pb>>s&255)-(pa>>s&255))*t);
  return'#'+((1<<24)+(m(16)<<16)+(m(8)<<8)+m(0)).toString(16).slice(1);};
const poly=(points,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.closePath();ctx.fill();};
const line=(points,c,w)=>{ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.stroke();ctx.lineWidth=1;};
const dragonScreenY=()=>DRAGON_Y-dragon.alt;
const sy=wy=>DRAGON_Y-(wy-dragon.worldY); // ground-plane transform (alt 0)
const currentBiome=()=>mod(Math.floor(dragon.worldY/BIOME_SPAN),BIOMES.length);
const say=(s,c,wy,t,x,alt)=>texts.push({s,c:c||CREAM,wy:wy===undefined?dragon.worldY+40:wy,
  alt:alt===undefined?(dragon?dragon.alt:30):alt,x:x===undefined?dragon.x:x,t:t||70});
function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);
  lastEventFrame=showFrame;if(score&&playing())addScore(score);}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);
  lastProgressFrame=showFrame;if(score&&playing())addScore(score);}
function offer(id,tier,x,wy,tag){return SHOW.offer({id,tier,at:showFrame,x,y:wy,tag,expiresAt:showFrame+30});}
function allFinite(){return[dragon.x,dragon.alt,dragon.worldY,dragon.vx,dragon.valt,dragon.speed,dragon.shield,dragon.hull,runFrame]
  .every(Number.isFinite)&&wings.every(finiteBody)&&swarm.every(finiteBody)&&bolts.every(finiteBody)&&
  missiles.every(finiteBody)&&lances.every(finiteBody)&&(!wyrm||finiteBody(wyrm));}
function finiteBody(v){return[v.x,v.alt,v.worldY,v.vx,v.valt,v.speed].every(Number.isFinite);}
const fxAt=(x,y,n,c,sp,grav)=>fxBurst(x,y,n,c,sp,grav);
const dustAt=(x,y,n,c)=>fxDust(x,y,n,c);

// ---- actors ------------------------------------------------------------------
function makeDragon(){return{x:80,alt:26,worldY:60,vx:0,valt:0,speed:2.05,cruise:2.05,
  turn:.105,turnA:.085,drag:.82,dragA:.8,accel:.03,yaw:0,bank:0,va:0,isDragon:true,windFactor:1,
  shield:45,shieldMax:45,hull:100,shieldT:0,lanceCd:0,locks:[],sweepT:0,lockAge:0,
  hitFlashT:0,invulnT:0,wreckT:0,settleT:0,gloryT:0,contactT:0,lockGlow:0,dodgeT:0,
  intent:null,lastX:80,lastY:60};}
function makeWing(kind,x,wy,alt,slot){const spec=WING_KINDS[kind];return{id:slot,kind,x,worldY:wy,alt,
  vx:0,valt:0,speed:spec.cruise,cruise:spec.cruise,turn:spec.turn,turnA:spec.turnA,drag:.82,dragA:.8,accel:.03,
  yaw:0,bank:0,va:0,windFactor:.8,hp:spec.hp,hpMax:spec.hp,state:'pace',stateT:0,windupT:0,boltCd:60+slot*30,
  respawnT:0,downT:0,spin:1,hitFlashT:0,sineSeed:slot*2.1,fireFlash:0};}
function makeSwarm(kind,x,wy,alt){const spec=WING_KINDS[kind];return{id:swarmSerial++,kind,x,worldY:wy,alt,
  vx:0,valt:0,speed:spec.cruise,cruise:spec.cruise,turn:spec.turn,turnA:spec.turnA,drag:.82,dragA:.8,accel:.03,
  yaw:0,bank:0,va:0,windFactor:.8,hp:spec.hp,state:'pace',windupT:0,boltCd:90+mod(swarmSerial*53,120),
  sineSeed:swarmSerial*1.7,hitFlashT:0,fireFlash:0,swarm:true};}
function makeBolt(x,wy,alt,vx,valt,speed,kind,owner){return{id:boltSerial++,kind:kind||'bolt',owner:owner||'foe',
  x,worldY:wy,alt,vx,valt,speed,cruise:speed,turn:owner==='wyrm'?.035:0,turnA:owner==='wyrm'?.028:0,drag:1,dragA:1,accel:1,yaw:0,bank:0,va:0,
  windFactor:.5,minD:999,aged:0};}
function makeTurret(x,wy){return{id:swarmSerial++,kind:'turret',x,worldY:wy,alt:0,vx:0,valt:0,speed:0,cruise:0,
  turn:0,turnA:0,drag:1,dragA:1,accel:0,yaw:0,bank:0,va:0,windFactor:0,hp:2,state:'pace',windupT:0,
  boltCd:100+mod(swarmSerial*37,110),hitFlashT:0,fireFlash:0,swarm:true,turret:true,sineSeed:swarmSerial};}
function makeWyrm(){return{id:'wyrm',kind:'wyrm',x:80,worldY:dragon.worldY+640,alt:40,vx:0,valt:0,
  speed:.55,cruise:.55,turn:.05,turnA:.04,drag:.86,dragA:.84,accel:.02,yaw:0,bank:0,va:0,windFactor:.3,
  stage:0,stages:[{name:'ENGINES',hp:10,hpMax:10},{name:'CANNONS',hp:16,hpMax:16},{name:'CORE',hp:22,hpMax:22}],
  state:'approach',stateT:0,weaveSeed:hash(worldSeed,77)*TAU,boltCd:120,sweepCd:200,sweepT:0,sweep2T:0,sweep2Side:1,
  staggerT:0,hitFlashT:0,fireFlash:0,dead:false};}
function wyrmWeakpoints(){
  if(!wyrm||wyrm.dead)return[];
  const y=screenYAt(wyrm.worldY,wyrm.alt),s=wyrm.stage;
  if(s===0)return[{x:wyrm.x-24,y:y+8,stage:0},{x:wyrm.x+24,y:y+8,stage:0}];
  if(s===1)return[{x:wyrm.x-30,y:y-4,stage:1},{x:wyrm.x+30,y:y-4,stage:1}];
  return[{x:wyrm.x,y:y+2,stage:2}];
}

// ---- sector content: deterministic spawns and terrain -------------------------
function sectorInfo(k){
  const biome=mod(Math.floor(k*SECTOR/BIOME_SPAN),BIOMES.length),h=hash(k*31+worldSeed*7,biome*19+5);
  const foes=[];
  const n=2+(hash(k,worldSeed)>.5?1:0)+(hash(k*3,worldSeed*5)>.85?1:0);
  const kinds=['vyr','vyr','manta','wasp','spire'];
  for(let j=0;j<n;j++){
    const kind=kinds[mod(k+j*2+Math.floor(h*9),5)];
    if(kind==='spire'&&hash(k*7+j,worldSeed)>.4){ // spire nest: a ground turret instead
      foes.push({turret:true,x:30+hash(k*11+j,worldSeed*13)*100,wy:k*SECTOR+60+j*120});
    }else{
      foes.push({kind,x:26+hash(k*13+j,worldSeed*17)*108,wy:k*SECTOR+50+j*110+hash(k+j,worldSeed)*40,
        alt:WING_KINDS[kind].altBand[0]+hash(k*17+j,worldSeed*23)*(WING_KINDS[kind].altBand[1]-WING_KINDS[kind].altBand[0])});
    }
  }
  return{k,biome,foes};
}
function ensureSwarm(){
  const target=Math.floor((dragon.worldY+760)/SECTOR);
  while(generatedTo<target){generatedTo++;
    if(generatedTo<1)continue;
    const q=sectorInfo(generatedTo);
    for(const f of q.foes){
      if(f.turret)swarm.push(makeTurret(f.x,f.wy));
      else swarm.push(makeSwarm(f.kind,f.x,f.wy,f.alt));
    }
  }
  swarm=swarm.filter(f=>f.worldY>dragon.worldY-160&&f.hp>0);
}
function spawnWings(){
  wings=[];const kinds=Object.keys(WING_KINDS);
  for(let i=0;i<4;i++){
    const kind=kinds[mod(i+Math.floor(hash(worldSeed,1)*4),4)];
    const spec=WING_KINDS[kind];
    wings.push(makeWing(kind,30+hash(i*7,worldSeed)*100,dragon.worldY+380+i*130,
      spec.altBand[0]+hash(i*3,worldSeed)*(spec.altBand[1]-spec.altBand[0]),i));
  }
}

// ---- one shared physics path for dragon, wings, swarm, shots, wyrm, human,
//      bot, and planner rollouts ------------------------------------------------
function envNow(){return{wind:act.wind||0,speedMul:1};}
function advanceCraft(body,intent,env){
  intent=intent||{steer:0,climb:0};
  env=env||envNow();
  const mushy=body.wreckT>0?.35:1,steer=clamp(intent.steer||0,-1,1)*mushy;
  body.vx+=steer*(body.turn||.1)+(env.wind||0)*(body.windFactor===undefined?1:body.windFactor);
  body.vx*=body.drag===undefined?.82:body.drag;body.x+=body.vx;
  body.valt+=clamp(intent.climb||0,-1,1)*(body.turnA||.08)*mushy;
  body.valt*=body.dragA===undefined?.8:body.dragA;body.alt+=body.valt;
  if(body.x<CORR_L){body.x=CORR_L;body.vx=Math.abs(body.vx)*.3;}
  if(body.x>CORR_R){body.x=CORR_R;body.vx=-Math.abs(body.vx)*.3;}
  if(body.alt<ALT_MIN){body.alt=ALT_MIN;body.valt=Math.abs(body.valt)*.3;}
  if(body.alt>ALT_MAX){body.alt=ALT_MAX;body.valt=-Math.abs(body.valt)*.3;}
  const cruise=(intent.speed===undefined?body.cruise:intent.speed)*(env.speedMul||1);
  const acc=body.accel===undefined?.03:body.accel;
  if(body.speed<cruise)body.speed=Math.min(cruise,body.speed+acc);
  else body.speed=Math.max(cruise,body.speed-acc*.8);
  body.worldY+=body.speed;
  // Honest banking (pocket-league doctrine): the craft banks INTO the actual
  // lateral travel — atan2(vx, forward speed) with yaw inertia — never a
  // cosmetic intent lean. bank/yaw/va are pose state only: physics never
  // reads them and they never enter the replay signature... except vx/speed,
  // which are physical.
  const va=Math.atan2(body.vx,Math.max(.5,Math.abs(body.speed)));
  body.yaw=(body.yaw||0)+(clamp(va,-.5,.5)-(body.yaw||0))*.24;
  body.bank=body.yaw;body.va=va;
  return body;
}

// ---- combat -------------------------------------------------------------------
function lockables(){
  const out=[];
  for(const w of wings){if(w.respawnT<=0&&w.state!=='down')out.push(w);}
  for(const s of swarm){if(s.hp>0)out.push(s);} // turrets included: the volley owns ground guns too
  return out;
}
function lockTargetScore(t){
  const d=t.worldY-dragon.worldY;
  if(d<30||d>280)return-1;
  const dx=Math.abs(t.x-dragon.x),da=Math.abs(t.alt-dragon.alt);
  if(dx>64||da>40)return-1;
  // Locks are diegetic — the reticle lives ON a target the viewer can see.
  const scr=screenYAt(t.worldY,t.alt);
  if(scr<36||scr>H-8)return-1;
  // Formation-first: mid-range targets stay lockable long enough to rack a
  // full volley; point-blank targets pass under the rack before it fills.
  return 400-Math.abs(d-150)*2-dx*1.6-da*1.2;
}
function acquireLock(){
  if(dragon.locks.length>=MAX_LOCKS)return false;
  let best=null,bestScore=0;
  // During a wyrm act the staged weak point takes repeated lock charges —
  // concentrating the whole volley on the called break.
  if(wyrm&&!wyrm.dead&&act.phase==='live'&&act.type==='wyrm'){
    const d=wyrm.worldY-dragon.worldY;
    if(d>40&&d<300){dragon.locks.push({kind:'wyrm',t:runFrame});stats.locks++;markEvent(2);
      offer('lock',1,wyrm.x,wyrm.worldY,'wyrm');cue('good','lock',wyrm.x,wyrm.worldY,wyrm.alt,.2);
      marks.push({kind:'lock',x:wyrm.x,wy:wyrm.worldY,alt:wyrm.alt,f:runFrame});return true;}
  }
  for(const t of lockables()){
    if(dragon.locks.some(l=>l.ref===t))continue;
    const s=lockTargetScore(t);
    if(s>bestScore){bestScore=s;best=t;}
  }
  if(!best)return false;
  dragon.locks.push({kind:'foe',ref:best,t:runFrame});stats.locks++;markEvent(2);
  offer('lock',1,best.x,best.worldY,best.id);
  cue('good','lock',best.x,best.worldY,best.alt,.2);
  marks.push({kind:'lock',x:best.x,wy:best.worldY,alt:best.alt,f:runFrame});
  return true;
}
function pruneLocks(){
  dragon.locks=dragon.locks.filter(l=>{
    if(l.kind==='wyrm')return wyrm&&!wyrm.dead&&act.phase==='live';
    const t=l.ref;
    return t&&t.hp>0&&(t.respawnT===undefined||t.respawnT<=0)&&t.state!=='down'&&(t.worldY-dragon.worldY)>-16&&(t.worldY-dragon.worldY)<320;
  });
}
function fireLance(){
  dragon.lanceCd=9;stats.lances++;markEvent(1);
  lances.push({id:boltSerial++,x:dragon.x,worldY:dragon.worldY+6,alt:dragon.alt,vx:dragon.vx*.3,valt:0,
    speed:dragon.cruise+3.4,cruise:dragon.cruise+3.4,turn:0,turnA:0,drag:1,dragA:1,accel:1,
    yaw:0,bank:0,va:0,windFactor:.2,aged:0});
}
function releaseVolley(){
  const locks=dragon.locks.splice(0,dragon.locks.length);
  if(!locks.length)return;
  stats.volleys++;markEvent(6);
  volleyStreak=showFrame-lastVolleyFrame<900?volleyStreak+1:1;lastVolleyFrame=showFrame;
  const vid=++volleySerial;volleyCounts[vid]=0;
  let i=0;
  for(const l of locks){
    missiles.push({id:boltSerial++,x:dragon.x+(i%2?4:-4),worldY:dragon.worldY+4,alt:dragon.alt,
      vx:(i%2?.6:-.6),valt:.2,speed:dragon.cruise+1.7,cruise:dragon.cruise+1.7,turn:.16,turnA:.12,
      drag:.9,dragA:.9,accel:.06,yaw:0,bank:0,va:0,windFactor:.3,target:l,aged:0,volley:vid});
    i++;
  }
  cue('good','volley',dragon.x,dragon.worldY,dragon.alt,.3);
  marks.push({kind:'volley',x:dragon.x,wy:dragon.worldY,alt:dragon.alt,f:runFrame});
  if(marks.length>48)marks.shift();
  fxAt(dragon.x,dragonScreenY(),14,CYAN,2.2);fxAt(dragon.x,dragonScreenY(),6,'#ffffff',1.6);
}
function killFoe(t,byVolley,volleyId){
  t.hp=0;stats.kills++;markEvent(byVolley?14:8);markProgress(byVolley?5:2);
  if(byVolley){stats.volleyKills++;
    if(volleyId!==undefined){volleyCounts[volleyId]=(volleyCounts[volleyId]||0)+1;
      // The apex of the volley fantasy: one release wiping three-plus foes.
      if(volleyCounts[volleyId]===3){stats.volleyWipes++;markEvent(30);markProgress(12);
        offer('volley-wipe',3,t.x,t.worldY,volleyId);shake(5);
        say('FULL VOLLEY WIPE',GOLD,t.worldY,80,t.x,t.alt);}}}
  const kindLabel=t.turret?'TURRET':WING_KINDS[t.kind].label;
  cue('good',byVolley?'volley-kill':'lance-kill',t.x,t.worldY,t.alt,byVolley?.7:.4);

// ---- route planner: copied-state rollouts on the shared integrator -------------
function boltThreatAt(b,f){
  let min=999;
  for(const bolt of bolts){
    const rel=(bolt.worldY+bolt.speed*f)-b.worldY;
    if(rel<-14||rel>90)continue;
    const bx=bolt.x+bolt.vx*f,ba=bolt.alt+bolt.valt*f;
    min=Math.min(min,Math.hypot(bx-b.x,(ba-b.alt)*1.3,rel*.7));
  }
  return min;
}
function foeThreatAt(b,f){
  let min=999;
  const near=foe=>{
    const rel=(foe.worldY+foe.speed*f)-b.worldY;
    if(rel<-20||rel>70)return;
    min=Math.min(min,Math.hypot(foe.x-b.x,(foe.alt-b.alt)*1.2,rel*.8)-6);
  };
  for(const w of wings)if(w.respawnT<=0&&w.state!=='down')near(w);
  for(const s of swarm)if(s.hp>0)near(s);
  return min;
}
function simulateSpot(targetX,targetAlt){
  const b=Object.assign({},dragon,{wreckT:0,locks:[]});
  let minBolt=999,minFoe=999,risk=0;
  for(let f=0;f<90;f++){
    advanceCraft(b,{steer:clamp((targetX-b.x)*.09,-1,1),climb:clamp((targetAlt-b.alt)*.11,-1,1),
      fire:0,targetX,targetAlt,tactic:'PLAN'},envNow());
    const bt=boltThreatAt(b,f);minBolt=Math.min(minBolt,bt);if(bt<11)risk+=11-bt;
    const ft=foeThreatAt(b,f);minFoe=Math.min(minFoe,ft);if(ft<7)risk+=7-ft;
  }
  let score=Math.min(42,minBolt)*1.55+Math.min(26,minFoe)*.9-risk*(3-persona.risk);
  // Engagement value: lockable targets in the sweep envelope of this spot.
  let engage=0;
  for(const t of lockables()){
    const d=t.worldY-b.worldY;
    if(d>50&&d<230&&Math.abs(t.x-targetX)<52&&Math.abs(t.alt-targetAlt)<34)engage++;
  }
  score+=Math.min(4,engage)*persona.lockValue;
  if(wyrm&&!wyrm.dead&&act.phase==='live'){const d=wyrm.worldY-b.worldY;
    if(d>60&&d<240)score+=8-Math.abs(wyrm.x-targetX)*.1;}
  if(act.phase!=='calm'&&act.type==='sandstorm'){
    score+=(60-Math.abs(targetX-80))*.45+(26-Math.abs(targetAlt-32))*.3;
  }
  return{targetX,targetAlt,score,min:Math.min(minBolt,minFoe),projectedY:b.worldY};
}
function buildRoutePlan(){
  if(typeof globalThis.__NO_ROUTE_PLAN!=='undefined')return reactivePlan();
  const candidates=[];
  for(const x of[22,46,70,94,118,142])for(const a of[12,26,40,58])candidates.push(simulateSpot(x,a));
  candidates.sort((a,b)=>b.score-a.score||a.targetX-b.targetX||a.targetAlt-b.targetAlt);
  return candidates[0];
}
function reactivePlan(){
  // Honest baseline: every corridor spot is available, but it only reacts to
  // threats already on top of the dragon — no copied-state forecast, no
  // multi-second bolt prediction, no storm warning, no engagement valuation.
  const candidates=[];
  for(const x of[22,46,70,94,118,142])for(const a of[12,26,40,58]){
    let score=0;
    for(const bolt of bolts){
      const rel=bolt.worldY-dragon.worldY;
      if(rel>-10&&rel<60){const d=Math.hypot(bolt.x-x,(bolt.alt-a)*1.3,rel*.7);score+=Math.min(40,d)*1.4;}
    }
    for(const t of lockables()){
      const d=t.worldY-dragon.worldY;
      if(d>24&&d<150&&Math.abs(t.x-x)<40)score+=4;
    }
    candidates.push({targetX:x,targetAlt:a,score,min:score,projectedY:dragon.worldY+180,reactive:true});
  }
  candidates.sort((a,b)=>b.score-a.score||a.targetX-b.targetX||a.targetAlt-b.targetAlt);
  return candidates[0];
}
function routeTactic(target){
  if(act.phase==='warn')return act.type==='sandstorm'?'FRONT INCOMING':'WYRM ON THE HORIZON';
  if(act.phase==='live'&&act.type==='sandstorm')return'RIDE THE STORM';
  if(act.phase==='live'&&act.type==='wyrm')return'BREAK THE '+wyrm.stages[Math.min(wyrm.stage,2)].name;
  if(dragon.hull<40&&dragon.shield<=0)return'RUN THE GAP';
  return'REIGN OVER '+BIOMES[currentBiome()].name;
}
function rawBotIntent(){
  if(visualIntent)return Object.assign({},visualIntent);
  if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined'){stats.admireIntents++;
    return{steer:clamp((80-dragon.x)*.04,-1,1),climb:clamp((34-dragon.alt)*.06,-1,1),fire:0,
      targetX:80,targetAlt:34,tactic:'RIDE THE WIND'};}
  const dodgeRange=persona.dodgeRange;
  // Weave first: a live bolt on an intercept course beats every plan. The
  // dragon breaks for open sky, never through the shooter — and a committed
  // weave owns the next beat (dodgeT): converging fire inside it connects.
  if(!dragon.dodgeT||dragon.dodgeT<=0)for(const bolt of bolts){
    const rel=bolt.worldY-dragon.worldY;
    if(rel<2||rel>dodgeRange+40)continue;
    const f=rel/(Math.abs(bolt.speed)+dragon.speed+.001)*1;
    const bx=bolt.x+bolt.vx*Math.max(0,f),ba=bolt.alt+bolt.valt*Math.max(0,f);
    if(Math.abs(bx-dragon.x)<13&&Math.abs(ba-dragon.alt)<12){
      const side=dragon.x<bx?-1:1,vside=dragon.alt<ba?-1:1;
      const awayX=clamp(dragon.x+side*26,CORR_L,CORR_R),awayA=clamp(dragon.alt+vside*14,ALT_MIN,ALT_MAX);
      stats.dodges++;markEvent(4);dragon.dodgeT=26;
      return{steer:clamp((awayX-dragon.x)*.3,-1,1),climb:clamp((awayA-dragon.alt)*.3,-1,1),fire:2,
        targetX:awayX,targetAlt:awayA,tactic:'WEAVE'};
    }
  }
  // Collision shove: never trade paint with a foe at point blank.
  for(const t of lockables()){
    const d=t.worldY-dragon.worldY;
    if(d>-6&&d<26&&Math.abs(t.x-dragon.x)<16&&Math.abs(t.alt-dragon.alt)<12){
      const side=dragon.x<t.x?-1:1;
      const awayX=clamp(dragon.x+side*24,CORR_L,CORR_R);
      return{steer:clamp((awayX-dragon.x)*.28,-1,1),climb:clamp((dragon.alt>t.alt?8:-8)*.2,-1,1),fire:2,
        targetX:awayX,targetAlt:clamp(dragon.alt+(dragon.alt>t.alt?8:-8),ALT_MIN,ALT_MAX),tactic:'BREAK AWAY'};
    }
  }
  // Fire control: hold to sweep locks onto the formation, unleash on a full
  // rack or a thinning field; tap lances into lined-up singles and pairs —
  // weak direct fire for when the volley isn't worth the rack (PD tap-fire).
  let fire=0;
  pruneLocks();
  const rackFull=dragon.locks.length>=MAX_LOCKS;
  const envelope=lockables().filter(t=>lockTargetScore(t)>0);
  const wyrmTarget=wyrm&&!wyrm.dead&&act.phase==='live';
  const anyTarget=envelope.length>0||wyrmTarget;
  const wantSweep=wyrmTarget||envelope.length>=3||dragon.locks.length>0;
  if(rackFull||(dragon.locks.length>0&&(!anyTarget&&dragon.lockAge>60||dragon.lockAge>170)))fire=0; // unleash
  else if(wantSweep&&anyTarget&&dragon.locks.length<MAX_LOCKS)fire=2;
  if(fire!==2&&dragon.locks.length===0&&dragon.lanceCd<=0){
    for(const t of lockables()){
      const d=t.worldY-dragon.worldY;
      if(d>26&&d<170&&Math.abs(t.x-dragon.x)<7&&Math.abs(t.alt-dragon.alt)<9){fire=1;break;}
    }
  }
  if(!plan||runFrame-planAt>=36){plan=buildRoutePlan();planAt=runFrame;}
  const steer=clamp((plan.targetX-dragon.x)*.085,-1,1),climb=clamp((plan.targetAlt-dragon.alt)*.1,-1,1);
  return{steer,climb,fire,targetX:plan.targetX,targetAlt:plan.targetAlt,tactic:routeTactic(plan)};
}

  steer:(base.steer||0)*.16,climb:(base.climb||0)*.16,fire:0,tactic:'BUFFETED'});}

// ---- wing FSM: pace -> engage -> windup -> fire; down tumble + respawn -------
function stepWing(w){
  const spec=WING_KINDS[w.kind];
  if(w.hitFlashT>0)w.hitFlashT--;
  if(w.fireFlash>0)w.fireFlash--;
  if(w.respawnT>0){w.respawnT--;
    if(w.respawnT<=0){
      w.x=26+hash(w.id,runFrame)*108;w.worldY=dragon.worldY+520+hash(w.id*3,worldSeed)*140;
      w.alt=spec.altBand[0]+hash(w.id*7,runFrame)*(spec.altBand[1]-spec.altBand[0]);
      w.vx=0;w.valt=0;w.speed=spec.cruise;w.hp=spec.hp;w.state='pace';w.stateT=0;w.windupT=0;
    }
    return;}
  if(w.state==='down'){
    // The kill tumble is physical: the wing spins out and falls behind,
    // damping to rest under the dizzy sparks (the authored emote that covers
    // the pause) before the respawn.
    w.downT--;w.spin*=.92;w.x+=w.spin*1.2;w.alt=Math.max(ALT_MIN,w.alt-.5);
    w.speed=Math.max(0,w.speed-.05);w.worldY+=w.speed;
    w.bank=((w.bank||0)+.3*Math.sign(w.spin||1))%TAU;
    if(w.downT<=0){w.respawnT=300+mod(w.id*37+worldSeed,220);}
    return;}
  const rel0=w.worldY-dragon.worldY;
  if(w.state==='pace'){
    // Cruise the corridor through the SHARED integrator (it owns speed, bank,
    // and pose for every craft); rubber-band keeps the fiction honest — the
    // pack re-forms ahead of the dragon instead of teleporting.
    const want=rel0<-80?spec.cruise+.55:rel0>420?Math.max(.35,spec.cruise-.2):spec.cruise;
    const wantX=80+Math.sin(showFrame*.008+w.sineSeed)*46+Math.sin(showFrame*.031+w.id)*12;
    const wantAlt=spec.altBand[0]+(spec.altBand[1]-spec.altBand[0])*(.5+.5*Math.sin(showFrame*.011+w.sineSeed*2));
    advanceCraft(w,{steer:clamp((wantX-w.x)*.02,-1,1)*.7,climb:clamp((wantAlt-w.alt)*.03,-1,1)*.7,
      speed:want,targetX:wantX,targetAlt:wantAlt,tactic:'PACE'},envNow());
    const engageRange=w.kind==='wasp'?200:170;
    if(dragon.wreckT<=0&&rel0>-40&&rel0<engageRange&&hash(w.id,Math.floor(runFrame/340))<.72){
      w.state='engage';w.stateT=0;}
    return;}
  if(w.state==='engage'){
    // Hold a firing station ahead and off the dragon's shoulder — matching
    // speed while the windup charges. Stations are owned per wing (staggered
    // side, offset, and depth) so the pack never stacks onto one slot.
    const side=w.id%2?1:-1,tx=clamp(dragon.x+side*(20+(w.id%3)*9),CORR_L,CORR_R),td=104+(w.id%3)*26;
    const ta=clamp(dragon.alt+10,spec.altBand[0],spec.altBand[1]);
    const rel=w.worldY-dragon.worldY;
    const wantSpeed=clamp(dragon.speed+(td-rel)*.02,.4,2.6);
    advanceCraft(w,{steer:clamp((tx-w.x)*.05,-1,1),climb:clamp((ta-w.alt)*.05,-1,1),
      speed:wantSpeed,targetX:tx,targetAlt:ta,tactic:'STATION'},envNow());
    w.stateT++;w.boltCd--;
    const lined=Math.abs(rel-td)<36&&Math.abs(w.x-dragon.x)>8;
    if(w.boltCd<=0&&lined&&rel>-60&&dragon.wreckT<=0){w.state='windup';w.windupT=spec.windup;}
    else if(w.stateT>520||rel<-60||rel>330){w.state='pace';w.stateT=0;w.boltCd=Math.max(w.boltCd,40);}
    return;}
  if(w.state==='windup'){
    // The tell: the wing holds station while its bolt chamber glows. The bot
    // gets its weave window here; the viewer gets the prediction.
    w.windupT--;
    const side=w.id%2?1:-1,tx=clamp(dragon.x+side*(20+(w.id%3)*9),CORR_L,CORR_R);
    advanceCraft(w,{steer:clamp((tx-w.x)*.03,-1,1)*.5,climb:clamp((dragon.alt+10-w.alt)*.03,-1,1)*.5,
      speed:clamp(dragon.speed+(118-(w.worldY-dragon.worldY))*.02,.4,2.6),targetX:tx,targetAlt:w.alt,tactic:'CHARGE'},envNow());
    if(w.windupT<=0){
      w.state='engage';w.stateT=0;w.boltCd=spec.boltCd+mod(w.id*13+Math.floor(runFrame),90);w.fireFlash=8;
      stats.boltsFaced++;
      const dx=dragon.x-w.x,da=dragon.alt-w.alt,dd=Math.hypot(dx,da)||1;
      const lead=.35;
      bolts.push(makeBolt(w.x,w.worldY-4,w.alt,
        clamp((dx+dragon.vx*lead*8)/dd*.55,-.8,.8),clamp((da+dragon.valt*lead*8)/dd*.5,-.6,.6),-1.9,'bolt','wing-'+w.id));
    }
    return;}
}
function stepSwarm(s){
  if(s.hitFlashT>0)s.hitFlashT--;
  if(s.fireFlash>0)s.fireFlash--;
  if(s.turret){
    // Planted ground gun: a static set piece (motion contract exempts it) that
    // still telegraphs with a muzzle glow and lobs bolts up at the dragon.
    const rel=s.worldY-dragon.worldY;
    if(s.boltCd>0)s.boltCd--;
    if(rel>-30&&rel<230&&Math.abs(s.x-dragon.x)<70&&dragon.wreckT<=0){
      if(s.windupT>0){s.windupT--;
        if(s.windupT<=0){s.boltCd=200+mod(s.id*7,120);s.fireFlash=8;stats.boltsFaced++;
          const dx=dragon.x-s.x,dd=Math.max(1,Math.hypot(dx,dragon.alt));
          bolts.push(makeBolt(s.x,s.worldY,2,clamp(dx/dd*.6,-.7,.7),clamp(dragon.alt/dd*.55,.2,.8),-1.35,'lob','turret-'+s.id));}
      }else if(s.boltCd<=0)s.windupT=30;

  if(s.hp<=0)return;
  const spec=WING_KINDS[s.kind];
  if(s.windupT>0){
    s.windupT--;
    advanceCraft(s,{steer:0,climb:0,targetX:s.x,targetAlt:s.alt,tactic:'CHARGE'},envNow());

// ---- contact resolution: nobody flies through anybody -------------------------
// Contacts resolve AFTER all movement so every actor moved honestly first;
// the shove is small and physical, never a teleport.
function separateCraft(a,b,rx,ry){
  const dx=b.x-a.x,dy=(b.worldY-a.worldY)*.6+(b.alt-a.alt)*.6;
  if(Math.abs(dx)>=rx||Math.abs(dy)>=ry)return false;
  const dir=dx===0?(a.worldY<b.worldY?-1:1):Math.sign(dx);
  const push=(rx-Math.abs(dx))*.5+0.05;
  a.x=clamp(a.x-dir*push,CORR_L,CORR_R);b.x=clamp(b.x+dir*push,CORR_L,CORR_R);
  const mixv=(a.vx+b.vx)*.5;a.vx=a.vx*.4+mixv*.6;b.vx=b.vx*.4+mixv*.6;
  if(a.isDragon)a.contactT=10;else if(b.isDragon)b.contactT=10;
  if(push>=1.1)stats.contacts++;
  return true;
}
function resolveContacts(){
  if(dragon.wreckT<=0){
    for(const t of lockables()){
      if(t.hp<=0)continue;
      const touched=separateCraft(dragon,t,8,10);
      if(t.touchCd>0)t.touchCd--;
      // Trading paint with a foe rattles the shield; the shove itself is
      // continuous and silent, the hit is on a per-foe cooldown.
      if(touched&&(t.touchCd===undefined||t.touchCd<=0)){
        t.touchCd=90;stats.collisions++;markEvent(6);
        hitDragon(9,'foe',t.x,t.worldY,t.alt);
        t.hp--;t.hitFlashT=8;if(t.hp<=0)killFoe(t,false);
      }
    }
    if(wyrm&&!wyrm.dead){
      const dx=Math.abs(wyrm.x-dragon.x),d=wyrm.worldY-dragon.worldY,da=Math.abs(wyrm.alt-dragon.alt);
      if(dx<34&&Math.abs(d)<16&&da<14)separateCraft(dragon,wyrm,34,16);
    }
  }
  for(let i=0;i<wings.length;i++)for(let j=i+1;j<wings.length;j++){
    const a=wings[i],b=wings[j];
    if(a.respawnT>0||b.respawnT>0||a.state==='down'||b.state==='down')continue;
    separateCraft(a,b,9,11);
  }
  // Pack vs swarm, and swarm vs swarm: every flier separates continuously —
  // nobody stacks onto another craft's lane.
  const fliers=[...wings.filter(w=>w.respawnT<=0&&w.state!=='down'),...swarm.filter(s=>s.hp>0&&!s.turret)];
  for(let i=0;i<fliers.length;i++)for(let j=i+1;j<fliers.length;j++)separateCraft(fliers[i],fliers[j],8,10);
}
function stepDragon(){

function step(){

// The sky corridor is a QUIET stage (owner doctrine): broad terrain bands, a
// few big landmarks, long haze striations at the far edge — never a speckle

// own screen height and its ground shadow, never through a fake scale hack.
function drawBiomeBase(p){

  // edge glows — depth with three fills, no noise.
  rect(0,38,W,86,mix(p.far,p.ground,.35));
  rect(0,124,W,110,mix(p.ground,p.far,.12));
  rect(0,234,W,H-234,mix(p.ground,INK,.22));
  // Long strata seams scrolling with the world: full-width tone steps give
  // real edge structure; they are lines, never speckle.
  for(let wy=Math.floor((dragon.worldY-80)/44)*44;wy<dragon.worldY+300;wy+=44){
    const y=sy(wy);if(y<38||y>H)continue;
    const ph=Math.floor(wy/44);
    rect(0,y,W,2,mix(p.far,CREAM,.5));
    rect(0,y+2,W,2,mix(p.ground,INK,.55));
    if(hash(ph*3,worldSeed)>.5)rect(mod(ph*37,120),y-2,26,2,mix(p.far,p.accent,.4));
  }
  // Sector-scale two-tone fields: big alternating patches give the plane real
  // value structure without a single speckle of noise.

    const y=sy(wy),ph=Math.floor(wy/150);if(y<36||y>H+8)continue;

    rect(split,y,W-split,14,mix(p.ground,INK,.38));ctx.globalAlpha=1;
  }
  // Milled micro-banding (the blockmine/asphalt answer): fine one-pixel tone
  // lines every four rows, alternating warm and cool. They are horizontal
  // lines, so they carry edge and material richness with zero speckle.
  for(let wy=Math.floor((dragon.worldY-80)/4)*4;wy<dragon.worldY+300;wy+=4){
    const y=sy(wy);if(y<38||y>H)continue;
