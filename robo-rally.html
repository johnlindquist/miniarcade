<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ROBO RALLY</title>
<style>
  html,body{margin:0;height:100%;background:#080a10}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;
    image-rendering:pixelated;background:#0a0c13}
  canvas:focus-visible{outline:2px solid #ffcb57;outline-offset:-3px}
</style>
<canvas id="cv" width="320" height="720" tabindex="0"
  aria-label="Robo Rally. Four tiny programmable robots reveal their moves, then race through conveyors, crushers, oil, and lasers together."></canvas>
<script src="engine.js"></script>
<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,RI,hash,clamp,rect,shake,preDraw,postDraw,start,keys,manual,
  initSession,sessionStep,drawSession,playing,addScore,gameOver,createShow,
  fxBurst,fxDust,stepParts,drawParts}=E;
const{controllerMux,skillProfile,createRng}=AI;

// ROBO RALLY — Mario Kart x programmable robots. The program deck is not a
// decorative HUD: it is the exact queue the shared physics path will execute.
// The forecast planner copies grid state and never touches the engine RNG.
const COLS=7,ROWS=12,CELL=20,TRACK_X=10,TRACK_Y=108,REVEAL_FRAMES=180,
  REGISTER_FRAMES=48,PROGRAM_SIZE=5,STAGE_GOAL=8;
const DIRS=[[0,-1],[1,0],[0,1],[-1,0]],DIR_GLYPH=['^','>','v','<'];
const CREAM='#fff1cf',INK='#090b12',GOLD='#ffcb57',RED='#ff5c62',CYAN='#55e7ff',
  MINT='#72e6a8',VIOLET='#b889ff',ORANGE='#ff954f',STEEL='#718096';
const COMMANDS={
  F:{name:'MARCH',glyph:'^',move:1},D:{name:'CHARGE',glyph:'^^',move:2},
  L:{name:'PIVOT L',glyph:'<',turn:-1},R:{name:'PIVOT R',glyph:'>',turn:1},
  Z:{name:'ZAP',glyph:'*',fire:true},B:{name:'BRAKE',glyph:'=',brake:true}
};
const ROBOT_TYPES=[
  {name:'BRASS',short:'BR',color:'#ffc857',dark:'#8a4f25',trim:'#fff1bd',kind:'boiler',risk:.52,showboat:.28},
  {name:'NOVA',short:'NV',color:'#58e8ff',dark:'#176c8c',trim:'#d9fbff',kind:'comet',risk:.70,showboat:.62},
  {name:'PATCH',short:'PT',color:'#7fe69b',dark:'#28704a',trim:'#e0ffe7',kind:'scrap',risk:.38,showboat:.18},
  {name:'VEX',short:'VX',color:'#c38cff',dark:'#663f91',trim:'#f4e6ff',kind:'spider',risk:.82,showboat:.82}
];
const STAGES=[
  {name:'EMBER FOUNDRY',code:'F-01',sky:'#160f18',floor:'#302633',panel:'#49313b',line:'#74505a',
    accent:'#ff8b4c',glow:'#ffca63',side:'#4b2027',kind:'foundry'},
  {name:'ACID REFINERY',code:'R-07',sky:'#071b20',floor:'#173238',panel:'#214b4c',line:'#3a7470',
    accent:'#70e6ad',glow:'#d9ff78',side:'#103f42',kind:'refinery'},
  {name:'ORBIT SKYDOCK',code:'S-99',sky:'#090e24',floor:'#222842',panel:'#30385d',line:'#59658c',
    accent:'#81a8ff',glow:'#f0c9ff',side:'#151c3d',kind:'skydock'}
];
const PROGRAM_LIBRARY=[
  ['D','F','F','Z','F'],['F','L','F','R','D'],['F','R','F','L','D'],
  ['L','D','R','F','Z'],['R','D','L','F','Z'],['F','F','L','D','R'],
  ['F','F','R','D','L'],['D','L','F','R','F'],['D','R','F','L','F'],
  ['F','Z','D','F','F'],['L','F','D','R','F'],['R','F','D','L','F'],
  ['F','L','Z','R','D'],['F','R','Z','L','D'],['Z','D','F','F','F'],
  ['F','D','L','F','R'],['F','D','R','F','L'],['L','F','R','D','Z'],
  ['L','L','D','F','Z'],['R','R','D','F','Z'],['L','L','F','D','F'],['R','R','F','D','F']
];

let showFrame=0,runFrame=0,worldSeed=1,stage=0,stageSerial=0,stageFlags=0;
let phase='reveal',phaseT=REVEAL_FRAMES,registerIndex=0,registerFrame=0,round=0;
let robots=[],profiles=[],skillSeeds=[],lasers=[],texts=[],impact=null,transitionT=0,outcome='';
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false},visualFixture='',visualTick=0;
let eventSerial=0,progressSerial=0,lastEventFrame=0,lastProgressFrame=0;
let lastDisasterKey='';
const stats={rounds:0,programsRevealed:0,registers:0,moves:0,distance:0,flags:0,stageChanges:0,
  collisions:0,pileups:0,shots:0,hits:0,wipeouts:0,conveyors:0,crushes:0,oils:0,pits:0,
  lastInstructionDisasters:0,lapses:0,acts:0,surprises:0,events:0,progress:0,
  maxEventLull:0,maxProgressLull:0,appliedIntents:0,heldFrames:0,slowedFrames:0,admireFrames:0,
  invisibleRescues:0};
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},2:{frames:42,minGap:90},
  3:{frames:82,minGap:600,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});
const act={phase:'calm',type:'crusher-rush',warnAt:1800,landAt:2040,endAt:2760,index:0,notes:[]};

const mod=(n,d)=>((n%d)+d)%d;
const cellX=c=>TRACK_X+c*CELL+CELL/2,cellY=r=>TRACK_Y+r*CELL+CELL/2;
const featureId=(kind,c,r)=>kind+'-'+c+'-'+r;
const allFinite=()=>[showFrame,runFrame,worldSeed,stage,phaseT,registerIndex,registerFrame,
  ...robots.flatMap(r=>[r.c,r.r,r.dir,r.hp,r.outT,r.respawnT])].every(Number.isFinite);
function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);
  lastEventFrame=showFrame;if(score&&playing())addScore(score);}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);
  lastProgressFrame=showFrame;if(score&&playing())addScore(score);}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+30});}
function say(s,c,x,y,t){texts.push({s,c:c||CREAM,x:x===undefined?80:x,y:y===undefined?100:y,t:t||70});}

function makeRobot(id){const type=ROBOT_TYPES[id],lane=[1,2,4,5][id];return{id,name:type.name,type:type.kind,
  color:type.color,dark:type.dark,trim:type.trim,c:lane,r:11,dir:0,hp:3,flags:0,program:['F','F','F','Z','F'],
  intent:null,fromC:lane,fromR:11,toC:lane,toR:11,outT:0,respawnT:0,hitT:0,recoilT:0,
  moveSerial:0,lastReason:'',lastLapsed:false,startLane:lane};}
function resetRobot(r,visible){r.c=r.startLane;r.r=11;r.dir=0;r.hp=3;r.fromC=r.toC=r.c;r.fromR=r.toR=r.r;
  r.outT=0;r.respawnT=visible?30:0;r.hitT=0;r.recoilT=0;r.intent=null;r.lastReason='';}

function blocked(c,r,s){if(c<0||c>=COLS||r<0||r>=ROWS)return true;
  if(r===0&&(c<2||c>4))return true;
  if(s===0)return(c===3&&r===6)||(c===1&&r===3);
  if(s===1)return(c===3&&r===3)||(c===1&&r===7)||(c===5&&r===7);
  return(c===3&&r===8)||(c===3&&r===4);
}
function featureAt(c,r,s){
  if(s===0){
    if((r===8&&(c===1||c===2))||(r===4&&(c===4||c===5)))return{kind:'conveyor',dx:r===8?1:-1,dy:0};
    if((r===5&&(c===2||c===4))||(c===3&&r===2))return{kind:'crusher'};
    if(c===6&&r===7)return{kind:'oil'};
  }else if(s===1){
    if((c===2&&r===8)||(c===4&&r===5)||(c===5&&r===2))return{kind:'oil'};
    if((c===0&&r===4)||(c===6&&r===6))return{kind:'turret'};
    if(r===9&&(c===2||c===3||c===4))return{kind:'conveyor',dx:c===4?-1:1,dy:0};
  }else{
    if((r===6&&(c===1||c===5))||(r===3&&(c===2||c===4)))return{kind:'pit'};
    if((c===0&&r===8)||(c===6&&r===5))return{kind:'fan',dx:c===0?1:-1,dy:0};
    if(c===3&&r===2)return{kind:'turret'};
  }
  return null;
}
function crusherActive(c,r,frame){const base=(Math.floor(frame/72)+c+r+stageSerial)&3;
  if(act.phase==='live'&&act.type==='crusher-rush')return base!==1;return base===0;}
function actDanger(c,r){if(act.phase!=='warn'&&act.phase!=='live')return 0;
  if(act.type==='crusher-rush')return(c>=2&&c<=4&&r>=2&&r<=8)?42:0;
  return((r===4||r===8)&&((c+act.index)&1)===0)?36:0;
}
function traceProgram(robot,program){let c=robot.c,r=robot.r,dir=robot.dir;const trace=[];
  for(let i=0;i<PROGRAM_SIZE;i++){
    const cmd=COMMANDS[program[i]]||COMMANDS.B;if(cmd.turn)dir=mod(dir+cmd.turn,4);
    if(cmd.move){for(let n=0;n<cmd.move;n++){const d=DIRS[dir],nc=c+d[0],nr=r+d[1];if(blocked(nc,nr,stage))break;c=nc;r=nr;}}
    trace.push({c,r,dir});
  }return trace;
}
function baselineProgram(robot){const index=mod((worldSeed>>>3)+round*5+robot.id*3,9);return PROGRAM_LIBRARY[index].slice();}
function forecastPrograms(){const baseline=robots.map(baselineProgram),out=[];
  for(const robot of robots){
    let best=null,bestScore=-1e9;
    for(let pi=0;pi<PROGRAM_LIBRARY.length;pi++){
      const program=PROGRAM_LIBRARY[pi],trace=traceProgram(robot,program);let score=0,pc=robot.c,pr=robot.r;
      for(let slot=0;slot<trace.length;slot++){
        const q=trace[slot],f=featureAt(q.c,q.r,stage),frame=runFrame+REVEAL_FRAMES+slot*REGISTER_FRAMES;
        score+=(pr-q.r)*15-Math.abs(q.c-3)*.16;pc=q.c;pr=q.r;
        if(q.r===0)score+=95;
        if(f){if(f.kind==='pit')score-=80;if(f.kind==='crusher'&&crusherActive(q.c,q.r,frame))score-=55;
          if(f.kind==='oil')score-=8;if(f.kind==='conveyor')score+=f.dy<0?9:1;if(f.kind==='turret')score-=10;}
        score-=actDanger(q.c,q.r);
        for(let j=0;j<robots.length;j++)if(j!==robot.id){const other=traceProgram(robots[j],baseline[j])[slot];
          if(other.c===q.c&&other.r===q.r)score-=38;
          if(slot&&other.c===trace[slot-1].c&&other.r===trace[slot-1].r&&
            traceProgram(robots[j],baseline[j])[slot-1].c===q.c&&traceProgram(robots[j],baseline[j])[slot-1].r===q.r)score-=24;
        }
        if(program[slot]==='Z'){
          const target=robots.some(o=>o.id!==robot.id&&o.c===q.c&&o.r<q.r&&q.r-o.r<=5);score+=target?14:ROBOT_TYPES[robot.id].showboat*2;
        }
      }
      score+=hash(pi+robot.id*41,worldSeed+round*13)*.015;
      if(score>bestScore){bestScore=score;best=program;}
    }
    out.push(best.slice());
  }return out;
}
function computePrograms(smart){return smart?forecastPrograms():robots.map(baselineProgram);}
function corruptProgram(program,id){const out=program.slice(),slot=4,choices=['L','R','D','Z'];
  out[slot]=choices[mod(round+id+worldSeed,choices.length)];return out;}
function dealPrograms(){const planned=computePrograms(typeof globalThis.__NO_FORECAST==='undefined');
  for(const r of robots){let p=planned[r.id].slice();
    if(typeof globalThis.__NO_LAPSE==='undefined'){
      const was=profiles[r.id].isLapsed(runFrame),chosen=profiles[r.id].decide(runFrame,{program:p},
        q=>q.program.slice(),q=>corruptProgram(q.program,r.id)),now=profiles[r.id].isLapsed(runFrame);
      p=(chosen||p).slice();if(now&&!was&&!r.lastLapsed){stats.lapses++;r.lastLapsed=true;markEvent();say(r.name+' MISREADS SLOT 5',r.color,80,93,90);}
      if(!now)r.lastLapsed=false;
    }else r.lastLapsed=false;
    r.program=p;
  }
  stats.programsRevealed+=robots.length;
}

function startActWarning(){act.phase='warn';act.landAt=showFrame+240;act.endAt=act.landAt+720;
  const n={kind:'act-warning',id:act.type,at:showFrame,tag:showFrame,landsAt:act.landAt};act.notes.push(n);SHOW.note(n);
  say(act.type==='crusher-rush'?'CRUSHER RUSH · REPROGRAM':'POLARITY FLIP · REPROGRAM',RED,80,100,160);
}
function maybeWarnAct(){if(typeof globalThis.__NO_ACTS!=='undefined')return;
  if(act.phase==='calm'&&showFrame>=act.warnAt)startActWarning();}
function stepActs(){
  if(typeof globalThis.__NO_ACTS!=='undefined'){act.phase='calm';return;}
  if(act.phase==='warn'&&showFrame>=act.landAt){act.phase='live';stats.acts++;markEvent();
    const n={kind:'act-land',id:act.type,at:showFrame,tag:showFrame};act.notes.push(n);SHOW.note(n);offer('act-land',2,80,180,act.type);
    say(act.type==='crusher-rush'?'PRESS LINE OVERCLOCKED':'CONVEYORS REVERSED',act.type==='crusher-rush'?RED:CYAN,80,100,120);shake(4);
  }else if(act.phase==='live'&&showFrame>=act.endAt){act.index++;act.phase='calm';
    act.type=act.index%2?'polarity-flip':'crusher-rush';act.warnAt=showFrame+3000;}
}
function beginReveal(){phase='reveal';phaseT=REVEAL_FRAMES;registerIndex=0;registerFrame=0;round++;stats.rounds++;
  maybeWarnAct();dealPrograms();markEvent();}

function instructionIntent(robot,cmd){const spec=COMMANDS[cmd]||COMMANDS.B;return{cmd,
  move:spec.move||0,turn:spec.turn||0,fire:!!spec.fire,brake:!!spec.brake,slot:registerIndex,
  tactic:pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined'?'ADMIRE THE WRECK':spec.name,
  targetC:robot.c,targetR:robot.r};}
function botIntent(context){const r=context.robot;if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined')return instructionIntent(r,'B');
  return instructionIntent(r,r.program[registerIndex]||'B');}
function humanIntent(context){const r=context.robot;let cmd='B';if(keys.ArrowUp)cmd='F';else if(keys.ArrowDown)cmd='D';
  else if(keys.ArrowLeft)cmd='L';else if(keys.ArrowRight)cmd='R';else if(keys.Space||keys.KeyX)cmd='Z';
  const out=instructionIntent(r,cmd);out.tactic='MANUAL REGISTER';return out;}
const controller=controllerMux({human:humanIntent,ai:botIntent,
  manual:context=>context.robot.id===0&&(playing()||manual())});

function desiredFor(robot,intent){let c=robot.c,r=robot.r,dir=robot.dir;
  if(intent.turn)dir=mod(dir+intent.turn,4);
  if(intent.move){for(let n=0;n<intent.move;n++){const d=DIRS[dir],nc=c+d[0],nr=r+d[1];if(blocked(nc,nr,stage))break;c=nc;r=nr;}}
  return{c,r,dir};
}
function noteLastDisaster(reason,x,y){const key=round+':'+registerIndex;if(registerIndex!==PROGRAM_SIZE-1||lastDisasterKey===key)return;
  lastDisasterKey=key;stats.lastInstructionDisasters++;offer('last-card',2,x,y,'SLOT 5');say('LAST CARD DISASTER · '+reason,RED,80,101,110);}
function wipeout(r,reason,source){if(r.outT>0)return;r.outT=54;r.hp=3;r.lastReason=reason;stats.wipeouts++;
  noteLastDisaster(reason,cellX(r.c),cellY(r.r));
  offer('wipeout',1,cellX(r.c),cellY(r.r),reason);fxBurst(cellX(r.c),cellY(r.r),18,r.color,2.2,.035);shake(5);
  markEvent();if(source)source.recoilT=16;}
function addDamage(batch,robot,amount,reason,source){const hit=batch.get(robot)||{amount:0,reasons:[],source:null};hit.amount+=amount;hit.reasons.push(reason);if(source)hit.source=source;batch.set(robot,hit);}
function applyDamageBatch(batch){for(const[robot,hit]of[...batch].sort((a,b)=>a[0].id-b[0].id)){
  robot.hp-=hit.amount;robot.hitT=Math.max(robot.hitT,22);robot.lastReason=hit.reasons.join('+');for(const _ of hit.reasons)markEvent();
  if(robot.hp<=0)wipeout(robot,robot.lastReason,hit.source);
}}
function startSnapshot(active){return active.map(robot=>({robot,id:robot.id,c:robot.c,r:robot.r,dir:robot.dir,hp:robot.hp}));}
function findLaserTarget(snapshot,shooter,dir){let best=null,bestD=99;const origin=snapshot.find(s=>s.robot===shooter),d=DIRS[dir];
  for(const q of snapshot){if(q.robot===shooter)continue;const vx=q.c-origin.c,vy=q.r-origin.r,cross=vx*d[1]-vy*d[0],ahead=vx*d[0]+vy*d[1];
    if(cross===0&&ahead>0&&(ahead<bestD||ahead===bestD&&(!best||q.id<best.id))){best=q;bestD=ahead;}}
  return bestD<=5?best:null;}
function applyIntent(robot,intent,desired,shot){stats.appliedIntents++;robot.intent=intent;robot.fromC=robot.c;robot.fromR=robot.r;
  robot.toC=desired.c;robot.toR=desired.r;robot.dir=desired.dir;
  if(intent.fire){stats.shots++;robot.recoilT=18;lasers.push({x1:shot.x1,y1:shot.y1,x2:shot.x2,y2:shot.y2,t:16,c:robot.color});}
}
function beginRegister(){stats.registers++;const active=robots.filter(r=>r.outT<=0).sort((a,b)=>a.id-b.id),snapshot=startSnapshot(active),desired=new Map(),intents=new Map(),shots=new Map(),damage=new Map();
  for(const r of active){const intent=controller({robot:r,slot:registerIndex}),goal=desiredFor(r,intent);intents.set(r,intent);desired.set(r,goal);}
  // Every beam reads the same immutable register-open snapshot. A robot hit in
  // this register still completes its locked card; damage commits only after
  // all four intents, which is simultaneous rather than array-priority play.
  for(const r of active){const intent=intents.get(r),goal=desired.get(r);if(!intent.fire)continue;const origin=snapshot.find(s=>s.robot===r),target=findLaserTarget(snapshot,r,goal.dir),d=DIRS[goal.dir];
    shots.set(r,{target,x1:cellX(origin.c),y1:cellY(origin.r),x2:target?cellX(target.c):cellX(origin.c+d[0]*5),y2:target?cellY(target.r):cellY(origin.r+d[1]*5)});
    if(target){stats.hits++;addDamage(damage,target.robot,1,'LASER',r);noteLastDisaster('LASER',cellX(target.c),cellY(target.r));offer('laser',1,cellX(target.c),cellY(target.r),r.name);}}
  const crash=new Set();for(let i=0;i<active.length;i++)for(let j=i+1;j<active.length;j++){
    const a=active[i],b=active[j],qa=desired.get(a),qb=desired.get(b);
    if((qa.c===qb.c&&qa.r===qb.r)||(qa.c===b.c&&qa.r===b.r&&qb.c===a.c&&qb.r===a.r)){crash.add(a);crash.add(b);}}
  // Magnetic bumpers make an occasional final-card collision propagate into
  // a truthful three-body crunch. The third racer is physically spun and held;
  // this is not a presentation-only "pileup" counter.
  if(crash.size===2&&(registerIndex===PROGRAM_SIZE-1||round%3===0)){
    const center=[...crash].reduce((q,r)=>({c:q.c+r.c/2,r:q.r+r.r/2}),{c:0,r:0});
    const third=active.filter(r=>!crash.has(r)).sort((a,b)=>(Math.abs(a.c-center.c)+Math.abs(a.r-center.r))-(Math.abs(b.c-center.c)+Math.abs(b.r-center.r))||a.id-b.id)[0];
    if(third&&Math.abs(third.c-center.c)+Math.abs(third.r-center.r)<=5){crash.add(third);const q=desired.get(third);q.c=third.c;q.r=third.r;stats.surprises++;}
  }
  if(crash.size){stats.collisions+=crash.size;stats.pileups+=crash.size>=3?1:0;impact={x:0,y:0,t:28,n:crash.size};
    for(const r of crash){impact.x+=cellX(r.c);impact.y+=cellY(r.r);}impact.x/=crash.size;impact.y/=crash.size;
    for(const r of crash){const q=desired.get(r);q.c=r.c;q.r=r.r;r.hitT=26;addDamage(damage,r,1,'PILEUP');}
    noteLastDisaster(crash.size>=3?'PILEUP':'COLLISION',impact.x,impact.y);
    offer(crash.size>=3?'pileup':'bump',crash.size>=3?2:1,impact.x,impact.y,crash.size);shake(crash.size>=3?6:3);
  }
  for(const r of active){const q=desired.get(r),intent=intents.get(r),from=snapshot.find(s=>s.robot===r);applyIntent(r,intent,q,shots.get(r));
    if((q.c!==from.c||q.r!==from.r)&&!crash.has(r)){stats.moves++;const gain=Math.max(0,from.r-q.r);stats.distance+=gain;markEvent();if(gain){markProgress();r.moveSerial++;}}}
  for(const r of active){const q=desired.get(r);r.c=q.c;r.r=q.r;}
  applyDamageBatch(damage);
}
function applyBoardEffects(){const active=robots.filter(r=>r.outT<=0).sort((a,b)=>a.id-b.id),snapshot=startSnapshot(active),pushes=new Map(),damage=new Map(),features=new Map();
  for(const r of active){const f=featureAt(r.c,r.r,stage);features.set(r,f);if(!f)continue;
    if(f.kind==='conveyor'||f.kind==='fan'){let dx=f.dx,dy=f.dy||0;if(f.kind==='conveyor'&&act.phase==='live'&&act.type==='polarity-flip'){dx=-dx;dy=-dy;}
      const nc=r.c+dx,nr=r.r+dy;if(!blocked(nc,nr,stage))pushes.set(r,{c:nc,r:nr,reason:f.kind==='conveyor'?'CONVEYOR':'CROSSWIND'});}
    else if(f.kind==='crusher'&&crusherActive(r.c,r.r,runFrame)){stats.crushes++;addDamage(damage,r,3,'CRUSHER');}

  drawHud(p);drawSession();}

// ---- probes, fixtures, and eval surfaces -----------------------------------
function probe(){return{showFrame,runFrame,worldSeed,stage,stageName:STAGES[stage].name,stageSerial,stageFlags,round,phase,phaseT,registerIndex,registerFrame,
  robots:robots.map(r=>({id:r.id,name:r.name,c:r.c,r:r.r,dir:r.dir,hp:r.hp,flags:r.flags,program:r.program.slice(),
    tactic:r.intent&&r.intent.tactic,outT:r.outT,respawnT:r.respawnT,lastReason:r.lastReason})),stats:Object.assign({},stats),
  maxEventLull:Math.max(stats.maxEventLull,showFrame-lastEventFrame),maxProgressLull:Math.max(stats.maxProgressLull,showFrame-lastProgressFrame),
  act:{phase:act.phase,type:act.type,warnAt:act.warnAt,landAt:act.landAt,endAt:act.endAt,index:act.index,notes:act.notes.slice()},
  show:SHOW.probe(),finite:allFinite(),playing:playing(),outcome};}
function signature(){const round5=v=>typeof v==='number'?Math.round(v*1e5)/1e5:v;return JSON.stringify({showFrame,runFrame,worldSeed,skillSeeds,lastDisasterKey,stage,stageSerial,stageFlags,round,phase,phaseT,registerIndex,registerFrame,transitionT,
  robots:robots.map(r=>[r.c,r.r,r.dir,r.hp,r.flags,r.program.join(''),r.outT,r.respawnT,r.hitT,r.recoilT,r.moveSerial,r.lastReason,r.intent&&r.intent.cmd]),
  lasers:lasers.map(l=>[l.x1,l.y1,l.x2,l.y2,l.t,l.c]),act:[act.phase,act.type,act.warnAt,act.landAt,act.endAt,act.index],
  stats:Object.values(stats).map(round5)});}
function physical(){return robots.map(r=>[r.c,r.r,r.dir,r.hp,r.outT,r.intent&&r.intent.cmd,r.intent&&r.intent.tactic].join(',')).join('|');}
function visualPrime(whichStage){visualFixture='fixture';visualTick=0;stage=whichStage;stageSerial=whichStage;phase='reveal';phaseT=120;registerIndex=0;registerFrame=0;transitionT=0;impact=null;lasers=[];texts=[];
  robots.forEach((r,i)=>{resetRobot(r,false);r.c=[1,2,4,5][i];r.r=[10,9,10,8][i];r.dir=0;r.fromC=r.toC=r.c;r.fromR=r.toR=r.r;r.program=PROGRAM_LIBRARY[(i*3+whichStage)%PROGRAM_LIBRARY.length].slice();r.moveSerial=i;});
  Object.assign(act,{phase:'calm',type:'crusher-rush',warnAt:999999,landAt:1000239,endAt:1000959,index:0});pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};}
function setVisualBeat(name){
  if(name==='opening'||name==='program-reveal'){visualPrime(0);visualFixture=name;phase='reveal';}
  else if(name==='execution'){visualPrime(0);visualFixture=name;phase='execute';registerIndex=1;registerFrame=1;robots.forEach((r,i)=>{r.fromC=r.c;r.fromR=r.r;r.toC=r.c;r.toR=Math.max(1,r.r-1-(i===1));r.r=r.toR;});}
  else if(name==='pileup'){visualPrime(0);visualFixture=name;phase='execute';registerIndex=2;robots.forEach((r,i)=>{r.c=2+(i&1);r.r=5+(i>>1);r.fromC=r.toC=r.c;r.fromR=r.toR=r.r;r.hitT=30;});impact={x:70,y:218,t:18,n:4};fxBurst(70,218,22,GOLD,2.4,.03);}
  else if(name==='warning'){visualPrime(1);visualFixture=name;Object.assign(act,{phase:'warn',type:'crusher-rush',landAt:showFrame+180});robots.forEach((r,i)=>{r.c=[1,3,4,5][i];r.r=[9,8,6,4][i];r.fromC=r.toC=r.c;r.fromR=r.toR=r.r;});}
  else if(name==='later'){visualPrime(2);visualFixture=name;phase='execute';registerIndex=3;robots.forEach((r,i)=>{r.c=[0,2,4,6][i];r.r=[9,7,5,8][i];r.dir=[1,0,3,0][i];r.fromC=r.toC=r.c;r.fromR=r.toR=r.r;});}
  else if(name==='last-card'){visualPrime(1);visualFixture=name;phase='execute';registerIndex=4;robots.forEach((r,i)=>{r.c=[1,2,4,5][i];r.r=[8,7,5,3][i];r.hitT=i===1?28:0;r.fromC=r.toC=r.c;r.fromR=r.toR=r.r;});impact={x:60,y:248,t:20,n:2};}
  else if(name==='apex'){visualPrime(2);visualFixture=name;stage=2;transitionT=70;pres={cue:{id:'fixture-apex',tier:3},t:1,holdWorld:false,physicsEvery:3,admire:true};robots.forEach((r,i)=>{r.c=2+i%3;r.r=2+i;r.dir=0;r.fromC=r.toC=r.c;r.fromR=r.toR=r.r;});impact={x:80,y:180,t:12,n:4};fxBurst(28,205,20,CYAN,3,.02);fxBurst(80,190,28,GOLD,3.2,.02);fxBurst(132,205,20,VIOLET,3,.02);}
  else if(name==='scale-contract'){visualPrime(0);visualFixture=name;robots.forEach((r,i)=>{r.c=[1,2,4,5][i];r.r=[8,6,8,6][i];r.dir=i;r.fromC=r.toC=r.c;r.fromR=r.toR=r.r;});}
  else return false;return true;
}
function visualProbe(){const actors=robots.map(r=>{const p=robotDrawPos(r);return{id:'robot-'+r.id,kind:'robot',type:r.type,box:{x:p.x-12,y:p.y-14,width:24,height:28}};});
  for(const q of stageEntities())actors.push(q);const spawnY=cellY(11),contactY=cellY(3),goalY=cellY(0),approach=(spawnY-contactY)/(spawnY-goalY);
  return{fixture:visualFixture,frame:showFrame,tick:visualTick,stage,stageName:STAGES[stage].name,phase,registerIndex,finite:allFinite(),actors,
    layout:{playfield:{x:0,y:108,width:160,height:240},visibleSpawnY:spawnY,contactY,goalY,approachVisibilityFraction:approach},
    programDeck:{x:6,y:7,width:148,height:90},impactBox:impact?{x:impact.x-18,y:impact.y-18,width:36,height:36}:null};}
function resetRun(full){worldSeed=RI(1,0x7fffffff);skillSeeds=ROBOT_TYPES.map(()=>RI(1,0x7fffffff));runFrame=0;stage=0;stageSerial=0;stageFlags=0;round=0;
  robots=ROBOT_TYPES.map((_,i)=>makeRobot(i));profiles=ROBOT_TYPES.map((p,i)=>skillProfile({rng:createRng(skillSeeds[i]),skill:.82,precision:.84,risk:p.risk,recovery:.88,reactionFrames:[1,3],lapseChance:.105,lapseFrames:[1,2]}));
  lasers=[];texts=[];impact=null;transitionT=0;outcome='';visualFixture='';visualTick=0;eventSerial=0;progressSerial=0;lastEventFrame=showFrame;lastProgressFrame=showFrame;lastDisasterKey='';
  for(const k in stats)stats[k]=0;Object.assign(act,{phase:'calm',type:'crusher-rush',warnAt:showFrame+1800,landAt:showFrame+2040,endAt:showFrame+2760,index:0,notes:[]});
  if(full)SHOW.reset(showFrame);beginReveal();}

globalThis.__roboRallyProbe=probe;
globalThis.__roboRallySignature=signature;
globalThis.__roboRallyPhysical=physical;
globalThis.__roboRallyVisualProbe=visualProbe;
globalThis.__roboRallySetVisualBeat=setVisualBeat;
globalThis.__roboRallyVisualBeats=['opening','program-reveal','execution','pileup','warning','later','last-card','apex','scale-contract'];
globalThis.__roboRallyPlannerFixture=()=>{const before=signature(),a=computePrograms(true),mid=signature(),b=computePrograms(true),after=signature();return{pure:before===mid&&mid===after,repeat:JSON.stringify(a)===JSON.stringify(b),programs:a,finite:allFinite()};};
globalThis.__roboRallyOrderFixture=reverse=>{resetRun(true);stage=0;phase='execute';registerIndex=0;registerFrame=0;
  const setup=[[0,9,0,'Z'],[0,7,0,'F'],[4,9,0,'B'],[6,9,0,'B']];robots.forEach((r,i)=>{const q=setup[i];r.c=r.fromC=r.toC=q[0];r.r=r.fromR=r.toR=q[1];r.dir=q[2];r.program=['B','B','B','B','B'];r.program[0]=q[3];r.hp=i===1?1:3;r.outT=0;r.intent=null;});
  if(reverse)robots.reverse();beginRegister();const actors=robots.map(r=>({id:r.id,c:r.c,r:r.r,dir:r.dir,hp:r.hp,outT:r.outT,reason:r.lastReason,cmd:r.intent&&r.intent.cmd})).sort((a,b)=>a.id-b.id),beams=lasers.map(l=>[l.x1,l.y1,l.x2,l.y2,l.c]).sort((a,b)=>a[4].localeCompare(b[4]));
  return{actors,beams,stats:{shots:stats.shots,hits:stats.hits,moves:stats.moves,appliedIntents:stats.appliedIntents,wipeouts:stats.wipeouts},victimCompleted:actors[1].r===6&&actors[1].outT>0,finite:allFinite()};};
globalThis.__roboRallyBoardOrderFixture=reverse=>{resetRun(true);stage=1;phase='execute';registerIndex=2;registerFrame=24;
  const setup=[[2,9],[4,9],[2,8],[6,10]];robots.forEach((r,i)=>{r.c=r.fromC=r.toC=setup[i][0];r.r=r.fromR=r.toR=setup[i][1];r.outT=0;r.hp=3;});if(reverse)robots.reverse();applyBoardEffects();
  const actors=robots.map(r=>({id:r.id,c:r.c,r:r.r,dir:r.dir,hp:r.hp,outT:r.outT,reason:r.lastReason})).sort((a,b)=>a.id-b.id);
  return{actors,stats:{conveyors:stats.conveyors,oils:stats.oils,hits:stats.hits,wipeouts:stats.wipeouts},conflictHeld:actors[0].c===2&&actors[1].c===4,finite:allFinite()};};
globalThis.__roboRallyNextRandom=()=>E.random();
globalThis.__roboRallyReset=()=>{resetRun(true);return probe();};
globalThis.__roboRallyIntentSchemas=()=>{const h=humanIntent({robot:robots[0]}),b=botIntent({robot:robots[0]});return{human:h,bot:b,humanKeys:Object.keys(h).sort(),botKeys:Object.keys(b).sort()};};
globalThis.__roboRallyAdmireFixture=()=>{const old=pres;pres={cue:{id:'fixture'},t:1,holdWorld:false,physicsEvery:1,admire:true};delete globalThis.__NO_ADMIRE;const admired=botIntent({robot:robots[0]});globalThis.__NO_ADMIRE=1;const gated=botIntent({robot:robots[0]});delete globalThis.__NO_ADMIRE;pres=old;return{admired,gated};};
globalThis.__roboRallyActFixture=type=>{resetRun(true);Object.assign(act,{phase:'calm',type:type||'crusher-rush',warnAt:showFrame+1,landAt:showFrame+241,endAt:showFrame+961,index:type==='polarity-flip'?1:0,notes:[]});phase='settle';phaseT=2;return probe();};
globalThis.__soakProbe=()=>({sig:robots.map(r=>r.c+','+r.r+','+r.dir+','+r.outT).join('|'),events:eventSerial,progress:progressSerial,finite:allFinite()});

initSession('robo-rally',[["ARROWS","PROGRAM BRASS"],["SPACE / X","FIRE REGISTER"],["ESC","AUTOPILOT"]]);
resetRun(true);start(()=>step(),()=>render());
