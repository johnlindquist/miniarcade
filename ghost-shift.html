<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GHOST SHIFT</title><style>html,body{margin:0;height:100%;background:#070b14}body{display:flex;align-items:center;justify-content:center;overflow:hidden}canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;image-rendering:pixelated;background:#08101d}canvas:focus-visible{outline:2px solid #7cf7d4;outline-offset:-3px}</style>
<canvas id="cv" width="320" height="720" tabindex="0" aria-label="Ghost Shift. An autonomous courier raids a neon security maze while drones patrol and chase."></canvas>
<script src="engine.js"></script><script src="autoplay.js"></script><script>
'use strict';
const{ctx,W,H,RI,clamp,preDraw,postDraw,start,keys,manual,initSession,sessionStep,drawSession,playing,addScore,createShow,fxBurst,fxDust}=E;
const{controllerMux}=AI;
const COLS=11,ROWS=19,TILE=14,LEFT=3,TOP=53,INK='#070b14',FLOOR='#0d1b29',WALL='#183449',CYAN='#5ce1e6',MINT='#7cf7d4',GOLD='#ffd166',CORAL='#ff5d73',VIOLET='#bd8cff',CREAM='#eafcff';
const DIRS=[[1,0],[-1,0],[0,1],[0,-1]],PERSONAS=[{name:'CAREFUL',greed:0.25,risk:1.8},{name:'GREEDY',greed:0.9,risk:.75},{name:'SHOWBOAT',greed:.65,risk:.4}];
let grid=[],courier={},drones=[],loot=[],keysIn=[],doors=[],vault={},exit={},route=[],persona=PERSONAS[0],showFrame=0,runFrame=0,shift=1,flash=0;
let act={phase:'calm',warnAt:1500,landAt:1740,endAt:2220,count:0},actNotes=[],eventSerial=0,progressSerial=0,lastEvent=0,lastProgress=0;
const stats={shifts:0,loot:0,keys:0,doors:0,caught:0,escapes:0,replans:0,lapses:0,events:0,progress:0,maxEventLull:0,maxProgressLull:0,heldFrames:0,slowedFrames:0,admireFrames:0};
const SHOW=createShow({queueLimit:3,recoveryGap:60,tiers:{1:{frames:10},2:{frames:32,minGap:60},3:{frames:70,minGap:420,hold:6,slowEvery:3,slowFrames:24,admire:36}}});
let pres={holdWorld:false,physicsEvery:1,admire:false,cue:null};
function markEvent(){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEvent);lastEvent=showFrame}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgress);lastProgress=showFrame;if(score&&playing())addScore(score)}
function inside(x,y){return x>=0&&y>=0&&x<COLS&&y<ROWS}function id(x,y){return y*COLS+x}function xy(n){return{x:n%COLS,y:(n/COLS)|0}}
function isDoor(x,y){return doors.find(d=>d.x===x&&d.y===y&&!d.open)}
function open(x,y,ignoreDoor){if(!inside(x,y))return false;const door=isDoor(x,y),opened=doors.find(d=>d.x===x&&d.y===y&&d.open);return grid[y][x]===0||!!opened||!!(ignoreDoor&&door)}
function carve(){grid=Array.from({length:ROWS},()=>Array(COLS).fill(1));const stack=[[1,1]];grid[1][1]=0;while(stack.length){const [x,y]=stack.at(-1),opts=[];for(const[dx,dy]of DIRS){const nx=x+dx*2,ny=y+dy*2;if(nx>0&&ny>0&&nx<COLS-1&&ny<ROWS-1&&grid[ny][nx])opts.push([nx,ny,dx,dy])}if(!opts.length){stack.pop();continue}const[nx,ny,dx,dy]=opts[RI(0,opts.length-1)];grid[y+dy][x+dx]=0;grid[ny][nx]=0;stack.push([nx,ny])}for(let i=0;i<9;i++){const x=1+RI(0,COLS-3),y=1+RI(0,ROWS-3);if((x+y)%2)grid[y][x]=0}}
function cells(){const a=[];for(let y=1;y<ROWS-1;y++)for(let x=1;x<COLS-1;x++)if(open(x,y,true))a.push({x,y});return a}
function farthest(s){const q=[s],seen=new Map([[id(s.x,s.y),0]]);let best=s;for(let h=0;h<q.length;h++){const p=q[h],d=seen.get(id(p.x,p.y));if(d>seen.get(id(best.x,best.y)))best=p;for(const[dx,dy]of DIRS){const x=p.x+dx,y=p.y+dy,k=id(x,y);if(!open(x,y,true)||seen.has(k))continue;seen.set(k,d+1);q.push({x,y})}}return best}
function pick(pool,used){let p;do p=pool[RI(0,pool.length-1)];while(used.some(v=>v.x===p.x&&v.y===p.y));used.push(p);return{...p}}
function resetShift(first){shift++;doors=[];carve();const start={x:1,y:1},used=[start],pool=cells();exit=farthest(start);used.push(exit);vault=farthest(exit);used.push(vault);keysIn=[{...pick(pool,used),taken:false},{...pick(pool,used),taken:false}];const shortcuts=[];for(let y=1;y<ROWS-1;y++)for(let x=1;x<COLS-1;x++)if(grid[y][x]&&((grid[y][x-1]===0&&grid[y][x+1]===0)||(grid[y-1][x]===0&&grid[y+1][x]===0)))shortcuts.push({x,y});doors=[];for(let i=0;i<Math.min(2,shortcuts.length);i++){const p=shortcuts.splice(RI(0,shortcuts.length-1),1)[0];doors.push({...p,open:false})}loot=[];for(let i=0;i<6;i++)loot.push({...pick(pool,used),taken:false});drones=[];for(let i=0;i<Math.min(6,2+(shift>>1));i++){const p=pick(pool,used);drones.push({...p,homeX:p.x,homeY:p.y,dir:RI(0,3),mode:'PATROL',cool:20+i*7})}Object.assign(courier,{x:1,y:1,px:1,py:1,nx:1,ny:1,t:0,keys:0,bag:0,inv:0,target:'KEY'});persona=PERSONAS[(shift-2)%PERSONAS.length];route=[];if(!first){stats.shifts++;markProgress(300);SHOW.offer({id:'shift',tier:3,at:showFrame,tag:'CLEAN GETAWAY',expiresAt:showFrame+90});if(typeof globalThis.__NO_PAYOFF_FX==='undefined')fxBurst(W/2,TOP+220,GOLD,30)}}
function threat(x,y){let n=0;for(const d of drones){const q=Math.abs(x-d.x)+Math.abs(y-d.y);if(q<5)n+=(5-q)*(d.mode==='CHASE'?2.3:1)}return n}
function path(goal,smart=true){const s=id(courier.x,courier.y),e=id(goal.x,goal.y),openSet=[s],came=new Map([[s,-1]]),cost=new Map([[s,0]]);while(openSet.length){openSet.sort((a,b)=>cost.get(a)-cost.get(b));const k=openSet.shift();if(k===e)break;const p=xy(k);for(const[dx,dy]of DIRS){const x=p.x+dx,y=p.y+dy,n=id(x,y),door=isDoor(x,y);if(!open(x,y,door&&courier.keys>0)||came.has(n))continue;came.set(n,k);cost.set(n,cost.get(k)+1+(smart?threat(x,y)*persona.risk:0));openSet.push(n)}}if(!came.has(e))return[];const out=[];for(let k=e;k!==s;k=came.get(k))out.push(xy(k));return out.reverse()}
function goals(){const looseKeys=keysIn.filter(k=>!k.taken),looseLoot=loot.filter(l=>!l.taken);if(courier.keys===0&&looseKeys.length)return looseKeys;if(courier.bag<2)return looseLoot;if(looseLoot.length&&persona.greed>.55&&courier.bag<5)return looseLoot;return[exit]}
function plan(){const smart=typeof globalThis.__NO_THREAT_PLAN==='undefined';let choices=goals().map(g=>({g,p:path(g,smart)})).filter(v=>v.p.length);choices.sort((a,b)=>smart?a.p.length-b.p.length:b.p.length-a.p.length);if(smart&&choices.length>1&&persona.greed>.7&&showFrame%5===0)choices=choices.slice().sort((a,b)=>b.p.length-a.p.length);route=choices[0]?.p||[];courier.target=courier.bag>=2?'EXIT':courier.keys?'LOOT':'KEY';stats.replans++}
function botIntent(){if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined')return{dx:0,dy:0,target:'ADMIRE'};if(typeof globalThis.__NO_THREAT_PLAN!=='undefined'&&showFrame%180<24){stats.lapses++;return{dx:0,dy:0,target:'HESITATE'}}if(!route.length||showFrame%150===0)plan();const n=route[0]||courier;return{dx:Math.sign(n.x-courier.x),dy:Math.sign(n.y-courier.y),target:courier.target}}
function humanIntent(){return{dx:(keys.ArrowRight?1:0)-(keys.ArrowLeft?1:0),dy:(keys.ArrowDown?1:0)-(keys.ArrowUp?1:0),target:'MANUAL'}}
const controller=controllerMux({human:humanIntent,bot:botIntent,isManual:()=>manual});
function lineSight(d){if(d.x===courier.x){const lo=Math.min(d.y,courier.y),hi=Math.max(d.y,courier.y);for(let y=lo+1;y<hi;y++)if(!open(d.x,y))return false;return hi-lo<7}if(d.y===courier.y){const lo=Math.min(d.x,courier.x),hi=Math.max(d.x,courier.x);for(let x=lo+1;x<hi;x++)if(!open(x,d.y))return false;return hi-lo<7}return false}
function stepDrones(){for(const d of drones){d.mode=(act.phase==='live'||lineSight(d))?'CHASE':'PATROL';if(--d.cool>0)continue;d.cool=Math.max(20,36-courier.bag*2-(d.mode==='CHASE'?8:0));const opts=DIRS.map(([dx,dy],i)=>({x:d.x+dx,y:d.y+dy,i})).filter(p=>open(p.x,p.y));if(!opts.length)continue;if(d.mode==='CHASE')opts.sort((a,b)=>(Math.abs(a.x-courier.x)+Math.abs(a.y-courier.y))-(Math.abs(b.x-courier.x)+Math.abs(b.y-courier.y)));else opts.sort((a,b)=>(a.i===d.dir?-2:0)+(Math.abs(a.x-d.homeX)+Math.abs(a.y-d.homeY))-(Math.abs(b.x-d.homeX)+Math.abs(b.y-d.homeY)));const p=opts[0];d.x=p.x;d.y=p.y;d.dir=p.i;if(d.x===courier.x&&d.y===courier.y&&courier.inv<=0)caught()}}
function caught(){stats.caught++;markEvent();flash=12;courier.inv=90;courier.x=1;courier.y=1;courier.px=1;courier.py=1;courier.t=0;courier.bag=Math.max(0,courier.bag-1);route=[];SHOW.offer({id:'caught',tier:1,at:showFrame,tag:'BAG DROPPED',expiresAt:showFrame+30})}
function collect(){for(const k of keysIn)if(!k.taken&&k.x===courier.x&&k.y===courier.y){k.taken=true;courier.keys++;stats.keys++;markProgress(25);route=[];SHOW.offer({id:'key',tier:2,at:showFrame,tag:'ACCESS KEY',expiresAt:showFrame+60})}const door=isDoor(courier.x,courier.y);if(door&&courier.keys){door.open=true;courier.keys--;stats.doors++;markProgress(40);route=[]}for(const l of loot)if(!l.taken&&l.x===courier.x&&l.y===courier.y){l.taken=true;courier.bag++;stats.loot++;markProgress(40);route=[];SHOW.offer({id:'loot',tier:1,at:showFrame,tag:'LOOT +'+courier.bag,expiresAt:showFrame+30});if(typeof globalThis.__NO_PAYOFF_FX==='undefined')fxDust(LEFT+l.x*TILE+14,TOP+l.y*TILE+14,GOLD,8)}if(courier.x===exit.x&&courier.y===exit.y&&courier.bag>=2){stats.escapes++;resetShift(false)}}
function stepAct(){if(typeof globalThis.__NO_ACTS!=='undefined')return;if(act.phase==='calm'&&runFrame===act.warnAt){act.phase='warn';const n={kind:'act-warning',id:'lockdown',at:showFrame,landsAt:showFrame+240};actNotes.push(n);SHOW.note(n);route=[]}else if(act.phase==='warn'&&runFrame>=act.landAt){act.phase='live';const n={kind:'act-land',id:'lockdown',at:showFrame};actNotes.push(n);SHOW.note(n);markEvent()}else if(act.phase==='live'&&runFrame>=act.endAt){act.count++;act.phase='calm';act.warnAt+=3600;act.landAt=act.warnAt+240;act.endAt=act.landAt+480}}
function stepWorld(){runFrame++;stepAct();if(courier.inv>0)courier.inv--;if(courier.t>0){courier.t--;if(courier.t===0){courier.x=courier.nx;courier.y=courier.ny;route.shift();collect()}}else{const i=controller();if(i.dx||i.dy){const nx=courier.x+i.dx,ny=courier.y+i.dy,door=isDoor(nx,ny);if(open(nx,ny,door&&courier.keys>0)){courier.px=courier.x;courier.py=courier.y;courier.nx=nx;courier.ny=ny;courier.t=7+courier.bag*2;markEvent()}else route=[]}}if(runFrame%24===0)stepDrones()}
function step(){showFrame++;pres=SHOW.step(showFrame);if(pres.holdWorld)stats.heldFrames++;else if(showFrame%pres.physicsEvery===0)stepWorld();if(pres.physicsEvery>1)stats.slowedFrames++;if(pres.admire)stats.admireFrames++;if(flash>0)flash--;sessionStep()}
function pos(x,y){return{x:LEFT+x*TILE+TILE/2,y:TOP+y*TILE+TILE/2}}
function render(){preDraw(INK);ctx.fillStyle=INK;ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle=CREAM;ctx.font='bold 11px monospace';ctx.fillText('GHOST SHIFT',W/2,14);ctx.font='5px monospace';ctx.fillStyle=persona.name==='GREEDY'?GOLD:MINT;ctx.fillText(persona.name+' · '+courier.target+' · BAG '+courier.bag,W/2,25);ctx.fillStyle='#112639';ctx.fillRect(5,31,150,14);ctx.fillStyle=CORAL;ctx.fillRect(7,34,Math.min(146,drones.filter(d=>d.mode==='CHASE').length*24),3);ctx.fillStyle=GOLD;ctx.fillRect(7,39,Math.min(146,courier.bag*24),4);for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){ctx.fillStyle=grid[y][x]?WALL:FLOOR;ctx.fillRect(LEFT+x*TILE,TOP+y*TILE,TILE-1,TILE-1);if(grid[y][x]){ctx.fillStyle='#22516a';ctx.fillRect(LEFT+x*TILE+2,TOP+y*TILE+2,TILE-4,2)}}ctx.strokeStyle='rgba(124,247,212,.42)';ctx.lineWidth=1.5;ctx.beginPath();let p=pos(courier.x,courier.y);ctx.moveTo(p.x,p.y);for(const q of route){p=pos(q.x,q.y);ctx.lineTo(p.x,p.y)}ctx.stroke();for(const d of drones)if(d.mode==='CHASE'){const q=pos(d.x,d.y),c=pos(courier.x,courier.y);ctx.strokeStyle='rgba(255,93,115,.28)';ctx.beginPath();ctx.moveTo(q.x,q.y);ctx.lineTo(c.x,c.y);ctx.stroke()}for(const d of doors){const q=pos(d.x,d.y);ctx.fillStyle=d.open?MINT:VIOLET;ctx.fillRect(q.x-5,q.y-6,10,12)}for(const k of keysIn)if(!k.taken){const q=pos(k.x,k.y);ctx.fillStyle=CYAN;ctx.fillRect(q.x-4,q.y-2,8,3);ctx.fillRect(q.x+2,q.y-4,2,7)}for(const l of loot)if(!l.taken){const q=pos(l.x,l.y);ctx.fillStyle=GOLD;ctx.fillRect(q.x-4,q.y-3,8,6);ctx.fillStyle=CREAM;ctx.fillRect(q.x-2,q.y-4,4,2)}{const q=pos(exit.x,exit.y);ctx.strokeStyle=MINT;ctx.lineWidth=2;ctx.strokeRect(q.x-5,q.y-6,10,12)}for(const d of drones){const q=pos(d.x,d.y);ctx.fillStyle=d.mode==='CHASE'?CORAL:VIOLET;ctx.beginPath();ctx.arc(q.x,q.y,5,Math.PI,0);ctx.fill();ctx.fillRect(q.x-5,q.y,10,4);ctx.fillStyle=CREAM;ctx.fillRect(q.x-3,q.y-1,2,2);ctx.fillRect(q.x+1,q.y-1,2,2)}{const a=courier.t/(7+courier.bag*2),x=courier.x*(1-a)+courier.px*a,y=courier.y*(1-a)+courier.py*a,q=pos(x,y);ctx.fillStyle=courier.inv&&courier.inv%8<4?CREAM:MINT;ctx.fillRect(q.x-4,q.y-4,8,8);ctx.fillStyle=INK;ctx.fillRect(q.x+1,q.y-2,2,2);ctx.fillStyle=GOLD;ctx.fillRect(q.x-5,q.y+2,3+Math.min(3,courier.bag),4)}if(act.phase==='warn'){ctx.fillStyle='rgba(255,93,115,.17)';ctx.fillRect(0,TOP,W,ROWS*TILE);ctx.fillStyle=CORAL;ctx.font='bold 7px monospace';ctx.fillText('LOCKDOWN IN '+Math.ceil((act.landAt-runFrame)/60),W/2,TOP+11)}if(pres.cue){ctx.fillStyle=pres.cue.tier===3?GOLD:CREAM;ctx.font='bold 8px monospace';ctx.fillText(pres.cue.tag||'',W/2,H-8)}drawSession();postDraw()}
function probe(){return{showFrame,runFrame,shift,persona:persona.name,courier:{...courier},drones:drones.map(d=>({...d})),stats:{...stats},events:eventSerial,progress:progressSerial,route:route.map(p=>({...p})),act:{...act},actNotes:actNotes.slice(),show:SHOW.probe(),finite:[showFrame,runFrame,shift,courier.x,courier.y,courier.bag,...drones.flatMap(d=>[d.x,d.y,d.cool])].every(Number.isFinite)}}
function signature(){const p=probe();return JSON.stringify([p.showFrame,p.runFrame,p.shift,p.courier.x,p.courier.y,p.courier.bag,p.stats,p.events,p.progress,p.route,p.act])}
globalThis.__ghostShiftProbe=probe;globalThis.__ghostShiftSignature=signature;globalThis.__soakProbe=()=>({sig:id(courier.x,courier.y)*20+courier.t,events:eventSerial,progress:progressSerial,finite:probe().finite});
globalThis.__ghostShiftIntentFixture=()=>{const b=botIntent();keys.ArrowRight=true;const h=humanIntent();keys.ArrowRight=false;return{bot:b,human:h}};
globalThis.__ghostShiftAdmireFixture=()=>{const old=pres;pres={holdWorld:false,physicsEvery:1,admire:true,cue:{id:'fixture'}};delete globalThis.__NO_ADMIRE;const admired=botIntent();globalThis.__NO_ADMIRE=true;const gated=botIntent();delete globalThis.__NO_ADMIRE;pres=old;return{admired,gated}};
initSession();resetShift(true);start(step,render);
</script></html>
