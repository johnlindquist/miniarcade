function visualAnchor(){
  const options=cells().filter(p=>p.x>1&&p.x<COLS-2&&p.y>3&&p.y<ROWS-3&&DIRS.some(([dx,dy])=>open(p.x+dx,p.y+dy)));
  options.sort((a,b)=>(Math.abs(a.x-5)+Math.abs(a.y-9))-(Math.abs(b.x-5)+Math.abs(b.y-9))||a.y-b.y||a.x-b.x);
  return options[0]||{x:1,y:1};
}
function visualLine(anchor){
  const candidates=[];
  for(const p of cells())for(const q of cells()){
    const distance=Math.abs(p.x-q.x)+Math.abs(p.y-q.y);if(distance<2||distance>5||!(p.x===q.x||p.y===q.y))continue;
    let clear=true;if(p.x===q.x){for(let y=Math.min(p.y,q.y)+1;y<Math.max(p.y,q.y);y++)if(!open(p.x,y)){clear=false;break}}
    else for(let x=Math.min(p.x,q.x)+1;x<Math.max(p.x,q.x);x++)if(!open(x,p.y)){clear=false;break}
    if(clear)candidates.push({p,q,score:Math.abs(p.x-anchor.x)+Math.abs(p.y-anchor.y)+Math.abs(distance-3)});
  }
  candidates.sort((a,b)=>a.score-b.score);return candidates[0]||{p:anchor,q:cells().find(p=>p.x!==anchor.x||p.y!==anchor.y)||anchor};
}

  }else if(name==='near-miss'){
    shift=2;setCourierVisual(line.p,3,true);courier.inv=999;setDroneVisual(line.q,'CHASE',drones[0].dir);const dx=Math.sign(courier.nx-courier.x),dy=Math.sign(courier.ny-courier.y);artNote('near',courier.x+dx,courier.y+dy,1);lastNearArt=showFrame;
  }else if(name==='later'){shift=2;resetShift(true);persona=PERSONAS[1];const a=visualAnchor(),l=visualLine(a);setCourierVisual(l.p,3,true);setDroneVisual(l.q,'PATROL',drones[0].dir)}
  else if(name==='deep'){shift=3;resetShift(true);persona=PERSONAS[2];const a=visualAnchor(),l=visualLine(a);setCourierVisual(l.p,5,true);setDroneVisual(l.q,'CHASE',drones[0].dir)}
  else if(name==='warning-calm'||name==='warning'){
    shift=3;setCourierVisual(line.p,3,true);act={phase:name==='warning'?'warn':'calm',warnAt:runFrame-(name==='warning'?1:-99999),landAt:runFrame+150,endAt:runFrame+630,count:0};
  }else if(name==='lockdown'){
    shift=4;setCourierVisual(line.p,4,true);act={phase:'live',warnAt:runFrame-241,landAt:runFrame-1,endAt:runFrame+999,count:1};for(const d of drones){d.mode='CHASE';d.cool=999}artNote('lockdown',courier.x,courier.y,2);
  }else if(name==='delivery-before'||name==='delivery'){

  return true;
}
