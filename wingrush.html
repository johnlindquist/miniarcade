<script>
'use strict';

  shake,preDraw,postDraw,start,keys,manual,initSession,sessionStep,drawSession,playing,
  addScore,gameOver,createShow,fxBurst,fxDust}=E;
const{controllerMux}=AI;

// WINGRUSH is a momentum story, not a projectile gallery. The same little bird
// dives, grips a valley, opens its wings on the rising face, flies, and hits.
const TAU=Math.PI*2,GRAV=.074,RADIUS=6,SEG=480,KNOTS=8,KSTEP=SEG/KNOTS;
const TOWER_GAP=2000,BIOME_SPAN=SEG*96,FINAL_FRAME=54000;
const INK='#07101a',CREAM='#fff2cf',GOLD='#ffd15c',MINT='#61e5bd',CORAL='#ff705f',CYAN='#6ddcff';
const BIOMES=[
  {name:'SUNMEADOW',sky0:'#5bb9df',sky1:'#d9f4df',far:'#79a9a2',mid:'#4e8870',soil:'#704c38',edge:'#8fd45b',under:'#4b332d',accent:'#fff080',weather:'petals',hills:[0,1,2]},
  {name:'EMBER CANYON',sky0:'#5c497b',sky1:'#f5a15f',far:'#b65d47',mid:'#87433d',soil:'#6b352d',edge:'#e6a04f',under:'#44262b',accent:'#ffd06a',weather:'sand',hills:[3,4,5]},
  {name:'MOSSFALL',sky0:'#233f57',sky1:'#83b992',far:'#315e55',mid:'#244a3f',soil:'#45382e',edge:'#5fbf68',under:'#292d29',accent:'#9ff3aa',weather:'leaves',hills:[1,5,6]},
  {name:'FROSTFOLD',sky0:'#263d75',sky1:'#b8e3ed',far:'#6f91b5',mid:'#506d8d',soil:'#566376',edge:'#edf8f4',under:'#303c55',accent:'#bffbff',weather:'snow',hills:[2,6,7]},
  {name:'AURORA REACH',sky0:'#17173d',sky1:'#5a4f91',far:'#3c3c78',mid:'#29295d',soil:'#312b51',edge:'#86f0d2',under:'#191832',accent:'#ffdb79',weather:'sparks',hills:[4,7,8]}

const HILLS=[
  {name:'GENTLE ROLLERS',a:[0,16,31,5,-31,-20,18,25,0]},
  {name:'GREAT BOWL',a:[0,-8,24,48,36,-36,-42,-12,0]},
  {name:'DOUBLE DIP',a:[0,31,-20,36,-38,28,-31,-8,0]},
  {name:'MESA CHUTE',a:[0,-24,-23,42,49,-12,-35,-30,0]},
  {name:'COMET RAMP',a:[0,18,46,17,-14,-54,-26,-8,0]},
  {name:'CANYON TEETH',a:[0,-30,12,39,-22,34,-38,-5,0]},
  {name:'TERRACES',a:[0,25,27,0,-4,-39,-36,-8,0]},
  {name:'CORNICE',a:[0,-12,39,50,15,-51,-45,-8,0]},
  {name:'SKY LAUNCH',a:[0,32,56,24,-23,-62,-30,-5,0]}
];
const MATERIAL={
  wood:{base:'#8f5b37',hi:'#c58a51',lo:'#503522',hp:2.3},
  stone:{base:'#6e7180',hi:'#a7abba',lo:'#3f4250',hp:4.1},
  brick:{base:'#a6504d',hi:'#d47a68',lo:'#65313a',hp:3.4},
  ice:{base:'#7fc8dc',hi:'#ddfbff',lo:'#467caa',hp:2.8},
  crystal:{base:'#795ca8',hi:'#d7b9ff',lo:'#3d315f',hp:3.8},
  gold:{base:'#ca8e3b',hi:'#ffe291',lo:'#765022',hp:4.8}
};
const CORE_STYLE={gust:{c:'#63e9dc',label:'GUST CORE'},spring:{c:'#a9ef67',label:'SKY SPRING'},
  blast:{c:'#ff8a55',label:'BLAST HEART'},star:{c:'#ffe27a',label:'STAR CAGE'}};
const PERSONAS=[
  {name:'DAREDEVIL',release:6,trim:.2,target:'blast',c:CORAL},
  {name:'SKYDANCER',release:-8,trim:.8,target:'spring',c:MINT},
  {name:'CORE SEEKER',release:-2,trim:0,target:'gust',c:GOLD}
];

let showFrame=0,runFrame=0,state='run',resultT=0,worldSeed=1,camX=0,camY=0;
let segmentCache=new Map(),knotCache=new Map();
let bird=null,towers=[],airRings=[],towerSerial=0,plan=null,planAt=-1e9,persona=PERSONAS[0],personaIndex=0;
let texts=[],chapter=1,lastBiome=0,lastDistanceMark=0,lastEventFrame=0,lastProgressFrame=0,eventSerial=0,progressSerial=0;
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false},lastOutcome='';
const stats={launches:0,landings:0,highFlights:0,perfectLandings:0,roughLandings:0,tumbles:0,
  impacts:0,blocksBroken:0,towersToppled:0,cores:0,boosts:0,rings:0,misses:0,lapses:0,
  acts:0,biomes:1,endings:0,events:0,progress:0,maxEventLull:0,maxProgressLull:0,
  maxSpeed:0,maxAir:0,invisibleResets:0};
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},2:{frames:48,minGap:100},3:{frames:90,minGap:620,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});
const act={phase:'calm',type:'gust',warnAt:4200,landAt:4440,endAt:5160,index:0,dir:1,notes:[]};

const mod=(n,d)=>((n%d)+d)%d;
const mix=(a,b,t)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16),m=i=>Math.round(((pa>>i)&255)*(1-t)+((pb>>i)&255)*t);return'#'+((1<<24)+(m(16)<<16)+(m(8)<<8)+m(0)).toString(16).slice(1);};
const poly=(pts,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.fill();};
const line=(pts,c,w)=>{ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke();ctx.lineWidth=1;};
const biomeIndex=x=>clamp(Math.floor(Math.max(0,x)/BIOME_SPAN),0,BIOMES.length-1);
const segmentInfo=i=>{let out=segmentCache.get(i);if(out)return out;const b=biomeIndex(i*SEG),choices=BIOMES[b].hills,j=Math.floor(hash(i*17+worldSeed*3,b*31+9)*choices.length);out={biome:b,family:choices[j],index:i};segmentCache.set(i,out);return out;};
function boundaryY(i){return 280+(hash(i*23+worldSeed*7,91)-.5)*16;}
function knotY(k){
  const cached=knotCache.get(k);if(cached!==undefined)return cached;
  const si=Math.floor(k/KNOTS),j=mod(k,KNOTS),info=segmentInfo(si),p=HILLS[info.family].a;
  if(j===0){const edge=boundaryY(si);knotCache.set(k,edge);return edge;}
  const u=j/KNOTS,base=boundaryY(si)*(1-u)+boundaryY(si+1)*u;
  const scale=.88+hash(si*41+worldSeed,j*13)*.25,jitter=(hash(si*73+j,worldSeed*5)-.5)*5*Math.sin(Math.PI*u);
  const out=base+p[j]*scale+jitter;knotCache.set(k,out);return out;
}
function terrainY(x){
  const k=Math.floor(x/KSTEP),u=(x-k*KSTEP)/KSTEP,y0=knotY(k),y1=knotY(k+1);
  const m0=clamp((knotY(k+1)-knotY(k-1))*.5,-42,42),m1=clamp((knotY(k+2)-knotY(k))*.5,-42,42);
  const u2=u*u,u3=u2*u;
  return(2*u3-3*u2+1)*y0+(u3-2*u2+u)*m0+(-2*u3+3*u2)*y1+(u3-u2)*m1;
}
const terrainSlope=x=>(terrainY(x+.35)-terrainY(x-.35))/.7;
function tangentAt(x){const s=terrainSlope(x),q=1/Math.hypot(1,s);return{x:q,y:s*q};}
function findCrests(a,b){
  const out=[];let ps=terrainSlope(a);
  for(let x=a+5;x<=b;x+=5){const s=terrainSlope(x);if(ps<0&&s>=0)out.push(x-2.5);ps=s;}
  return out;
}
function findTowerSite(raw){
  let best=raw,bestScore=1e9;
  for(let x=raw-120;x<=raw+120;x+=4){const s=Math.abs(terrainSlope(x)),score=s*38+terrainY(x);if(score<bestScore){bestScore=score;best=x;}}
  return best;
}

function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);lastEventFrame=showFrame;if(score&&playing())addScore(score);}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);lastProgressFrame=showFrame;if(score&&playing())addScore(score);}
function say(s,c,x,y,t){
  x=x===undefined?bird.x:x;y=y===undefined?bird.y-18:y;
  const priority=/TOWER DOWN|KEEP SHATTERED/.test(s)?3:/CORE|SPRING|HEART|CAGE/.test(s)?2:0;
  if(priority){
    const higher=texts.some(q=>q.payoff&&Math.abs(q.x-x)<95&&Math.abs(q.y-y)<85&&q.priority>priority);
    if(higher)return;
    texts=texts.filter(q=>!(q.payoff&&Math.abs(q.x-x)<95&&Math.abs(q.y-y)<85&&q.priority<=priority));
  }
  texts.push({s,c:c||CREAM,x,y,t:t||70,payoff:priority>0,priority});
}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+30});}

function makeBird(x){return{x,y:terrainY(x)-RADIUS,vx:1.35,vy:0,speed:1.35,grounded:true,charge:.15,wing:.15,
  rot:0,pose:'skim',intent:null,lastX:x,lastY:terrainY(x)-RADIUS,airFrames:0,launchY:0,apexY:0,flightX:0,
  hitT:0,tumbleT:0,boostT:0,combo:0,runPhase:0,stuckT:0,planTarget:0};}
function addBlock(t,dx,dy,w,h,mat,shape,supports,hp){
  const id=t.blocks.length,b={id,x:t.x+dx,y:t.base+dy,w,h,mat,shape:shape||'block',supports:supports||['ground'],
    hp:hp||MATERIAL[mat].hp,maxHp:hp||MATERIAL[mat].hp,broken:false,falling:false,settled:false,delay:0,vx:0,vy:0,rot:0};
  t.blocks.push(b);return id;
}
function addCore(t,kind,dx,dy,anchor){
  const b=t.blocks[anchor],c={id:t.cores.length,kind,x:t.x+dx,y:t.base+dy,r:5,anchor,ox:t.x+dx-b.x,oy:t.base+dy-b.y,triggered:false,flash:0};
  t.cores.push(c);return c;
}
function corePos(t,c){const b=t.blocks[c.anchor];return b&&b.falling?{x:b.x+c.ox,y:b.y+c.oy}:{x:c.x,y:c.y};}
function makeTower(index,forceType){
  const raw=900+index*TOWER_GAP,x=findTowerSite(raw),base=terrainY(x),biome=biomeIndex(x),type=forceType===undefined?(index+biome)%5:forceType;
  const t={id:index,x,base,biome,type,blocks:[],cores:[],toppled:false,resolved:false,passed:false,collapseT:0,spirit:0,style:mod(index+worldSeed,3)};
  let a,b,c,d,e,f,g,h;
  if(type===0){ // windmill roost: tall timber mast, broad turning crown
    a=addBlock(t,-11,-7,14,12,'stone','base',['ground']);b=addBlock(t,8,-7,14,12,'stone','base',['ground']);
    c=addBlock(t,-7,-20,9,14,'wood','brace',[a]);d=addBlock(t,5,-20,9,14,'wood','brace',[b]);
    e=addBlock(t,-1,-34,18,10,'brick','window',[c,d]);f=addBlock(t,-1,-47,9,17,'wood','mast',[e]);
    g=addBlock(t,-1,-58,28,7,'wood','beam',[f]);addBlock(t,-11,-67,18,12,'brick','roofL',[g]);addBlock(t,9,-67,18,12,'brick','roofR',[g]);
    addCore(t,'gust',-1,-47,f);addCore(t,'star',-1,-33,e);
  }else if(type===1){ // arched gate with a blast heart in the keystone
    a=addBlock(t,-18,-7,13,13,'stone','base',['ground']);b=addBlock(t,18,-7,13,13,'stone','base',['ground']);
    c=addBlock(t,-18,-21,12,15,'stone','masonry',[a]);d=addBlock(t,18,-21,12,15,'stone','masonry',[b]);
    e=addBlock(t,-18,-36,12,15,'brick','window',[c]);f=addBlock(t,18,-36,12,15,'brick','window',[d]);
    g=addBlock(t,0,-43,29,9,'stone','arch',[e,f]);h=addBlock(t,0,-55,18,15,'brick','roof',[g]);
    addBlock(t,-15,-55,12,9,'wood','roofL',[e,g]);addBlock(t,15,-55,12,9,'wood','roofR',[f,g]);
    addCore(t,'blast',0,-42,g);addCore(t,'gust',0,-55,h);
  }else if(type===2){ // bell spire tapering into a spring cup
    a=addBlock(t,-9,-7,15,13,'brick','base',['ground']);b=addBlock(t,9,-7,15,13,'brick','base',['ground']);
    c=addBlock(t,-7,-20,12,14,'brick','masonry',[a]);d=addBlock(t,7,-20,12,14,'brick','masonry',[b]);
    e=addBlock(t,0,-34,21,14,'stone','window',[c,d]);f=addBlock(t,0,-47,15,13,'stone','spire',[e]);
    g=addBlock(t,0,-59,22,11,'gold','bell',[f]);h=addBlock(t,0,-70,12,12,'gold','roof',[g]);
    addCore(t,'spring',0,-58,g);addCore(t,'star',0,-34,e);
  }else if(type===3){ // aqueduct ruin: wide deck and offset lookout
    a=addBlock(t,-24,-8,12,15,'stone','base',['ground']);b=addBlock(t,0,-8,12,15,'stone','base',['ground']);c=addBlock(t,24,-8,12,15,'stone','base',['ground']);
    d=addBlock(t,-24,-24,11,17,'stone','masonry',[a]);e=addBlock(t,0,-24,11,17,'stone','masonry',[b]);f=addBlock(t,24,-24,11,17,'stone','masonry',[c]);
    g=addBlock(t,-12,-38,35,9,'brick','arch',[d,e]);h=addBlock(t,18,-38,25,9,'brick','arch',[e,f]);
    addBlock(t,-18,-50,18,14,'wood','roofL',[g]);addBlock(t,19,-51,20,16,'wood','roofR',[h]);
    addCore(t,'gust',-2,-37,g);addCore(t,'blast',20,-50,t.blocks.length-1);
  }else{ // crown keep: asymmetric crystal towers and a visible central cage
    const mat=biome>=3?'crystal':'brick';
    a=addBlock(t,-20,-8,15,15,'stone','base',['ground']);b=addBlock(t,0,-8,17,15,'gold','base',['ground']);c=addBlock(t,20,-8,15,15,'stone','base',['ground']);
    d=addBlock(t,-20,-24,13,17,mat,'window',[a]);e=addBlock(t,0,-25,15,19,mat,'window',[b]);f=addBlock(t,20,-24,13,17,mat,'window',[c]);
    g=addBlock(t,-20,-41,18,17,mat,'spire',[d]);h=addBlock(t,20,-41,18,17,mat,'spire',[f]);
    const bridge=addBlock(t,0,-46,29,9,'gold','arch',[g,h,e]);addBlock(t,-20,-57,14,15,'gold','roofL',[g]);addBlock(t,20,-57,14,15,'gold','roofR',[h]);
    const crown=addBlock(t,0,-61,18,19,'crystal','crown',[bridge]);addCore(t,'star',0,-46,bridge);addCore(t,'spring',0,-61,crown);

  return t;
}
function ensureTowers(){while(900+towerSerial*TOWER_GAP<bird.x+1900){towers.push(makeTower(towerSerial));towerSerial++;}towers=towers.filter(t=>t.x>bird.x-700||!t.resolved);airRings=airRings.filter(r=>r.x>bird.x-500&&!r.taken);}
const activeTower=()=>towers.find(t=>!t.resolved&&t.x>bird.x-18)||null;
function chooseCore(t){
  if(!t)return null;const live=t.cores.filter(c=>!c.triggered);if(!live.length)return null;
  const preferred=live.find(c=>c.kind===persona.target);return preferred||live.slice().sort((a,b)=>corePos(t,a).y-corePos(t,b).y)[0];
}

function sweepGround(ax,ay,bx,by){
  const n=clamp(Math.ceil(Math.hypot(bx-ax,by-ay)/1.8),1,28);let prev=0;
  for(let i=1;i<=n;i++){const hi=i/n,x=ax+(bx-ax)*hi,y=ay+(by-ay)*hi;if(y+RADIUS>=terrainY(x)){
    let lo=prev,h=hi;for(let j=0;j<7;j++){const m=(lo+h)*.5,mx=ax+(bx-ax)*m,my=ay+(by-ay)*m;if(my+RADIUS>=terrainY(mx))h=m;else lo=m;}
    const xh=ax+(bx-ax)*h;return{t:h,x:xh,y:terrainY(xh)-RADIUS};}prev=hi;}return null;
}
function envAt(offset){
  if(typeof globalThis.__NO_ACTS!=='undefined')return{wind:0,lift:0,slick:0};
  const rf=runFrame+(offset||0),live=act.phase==='live'||act.phase==='warn'&&rf>=act.landAt;
  if(!live)return{wind:0,lift:0,slick:0};
  return act.type==='gust'?{wind:.012*act.dir,lift:0,slick:0}:{wind:.004*act.dir,lift:.026,slick:.08};
}
function advanceBody(r,intent,env,collide){
  const out={launched:false,landed:false,hard:0,kiss:false};intent=intent||{dive:false,trim:0,brace:false};env=env||{wind:0,lift:0,slick:0};
  if(r.grounded){
    const tan=tangentAt(r.x),s=terrainSlope(r.x);let speed=Math.max(.48,r.speed||Math.hypot(r.vx,r.vy));
    speed+=GRAV*tan.y+.004;if(intent.dive&&tan.y>0){speed+=.008+.018*tan.y;r.charge=clamp(r.charge+.005+.026*tan.y,0,3.2);}else r.charge=Math.max(0,r.charge-.009);
    speed*=1-(intent.dive?.0006:.0028)-env.slick*(intent.dive?0:.002);if(r.boostT>0)speed+=.006;
    r.vx=speed*tan.x;r.vy=speed*tan.y;r.x+=r.vx;r.y=terrainY(r.x)-RADIUS;r.speed=speed;r.rot=Math.atan2(tan.y,tan.x);r.runPhase+=speed*.45;
    if(!intent.dive&&s<-.075&&speed>.92&&(r.charge>.12||speed>2.15)){
      const launch=speed+.26+r.charge*.72;r.grounded=false;r.vx=launch*tan.x+.06;r.vy=launch*tan.y-.42-r.charge*.46;
      r.charge*=.18;r.airFrames=0;r.launchY=r.y;r.apexY=r.y;r.flightX=r.x;out.launched=true;
    }
  }else{
    const open=intent.dive?0:1;r.wing+=(open-r.wing)*.16;const trim=clamp(intent.trim||0,-1,1);
    r.vx+=env.wind+trim*.0035+(r.boostT>0?.003:0);r.vy+=GRAV-env.lift-r.wing*(.022+Math.min(.013,r.vx*.0025))+(intent.dive?.022:0)-trim*.0015;
    r.vx*=r.wing>.5?.9994:.9988;r.vy*=.999;r.lastX=r.x;r.lastY=r.y;const bx=r.x+r.vx,by=r.y+r.vy,hit=collide===false?null:sweepGround(r.x,r.y,bx,by);
    r.x=hit?hit.x:bx;r.y=hit?hit.y:by;r.rot=Math.atan2(r.vy,r.vx);r.airFrames++;r.apexY=Math.min(r.apexY,r.y);
    if(hit){const tan=tangentAt(r.x),normal=Math.abs(-tan.y*r.vx+tan.x*r.vy),along=Math.max(.45,tan.x*r.vx+tan.y*r.vy),kiss=normal<.85&&along>1.25;
      r.grounded=true;r.speed=clamp(along*(kiss?.985:.76)+(kiss?.12:0),.45,8.4);r.vx=r.speed*tan.x;r.vy=r.speed*tan.y;r.wing=.2;r.charge=kiss?.25:0;out.landed=true;out.hard=normal;out.kiss=kiss;}
  }
  r.lastX=r.lastX===undefined?r.x:r.lastX;r.lastY=r.lastY===undefined?r.y:r.lastY;return out;
}

function simulateArc(target,releaseX,trim){
  const r=Object.assign({},bird),points=[];let min=1e9,impactSpeed=0,air=0,launched=!r.grounded,landed=0,apex=r.y;
  for(let f=0;f<200;f++){
    const intent={dive:r.grounded?r.x<releaseX:false,trim:r.grounded?0:trim,brace:false},ev=advanceBody(r,intent,envAt(f),true);
    if(ev.launched)launched=true;if(!r.grounded){air++;apex=Math.min(apex,r.y);if(f%30===0&&points.length<8)points.push({x:r.x,y:r.y});}if(ev.landed)landed++;
    const d=Math.hypot(r.x-target.x,r.y-target.y);if(d<min){min=d;impactSpeed=Math.hypot(r.vx,r.vy);}if(r.x>target.x+45)break;
  }
  return{releaseX,trim,min,impactSpeed,air,landed,apex,points,score:(launched?0:-300)-min*3+impactSpeed*1.5+air*.012-(landed>1?3:0)};
}
function buildPlan(t){
  const core=chooseCore(t);if(!t||!core)return null;const q=corePos(t,core);
  if(typeof globalThis.__NO_LOOKAHEAD!=='undefined')return{targetId:t.id,coreId:core.id,releaseX:bird.x+150,trim:0,points:[],min:99,score:0,reactive:true};
