<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GRAVE GARDEN</title>
<style>
  html,body{margin:0;height:100%;background:#070b0a}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;
    image-rendering:pixelated;background:#101812}
  canvas:focus-visible{outline:2px solid #b8ed75;outline-offset:-3px}
</style>
<canvas id="cv" width="320" height="720" tabindex="0"
  aria-label="Grave Garden. An autonomous gardener plants, uproots, and carries defenses between four lanes while telegraphed undead waves approach a greenhouse."></canvas>
<script src="engine.js"></script>
<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,random,R,RI,hash,clamp,rect,stepParts,drawParts,ring,stepRings,drawRings,
  shake,preDraw,postDraw,start,keys,tap,manual,initSession,sessionStep,drawSession,playing,
  addScore,gameOver,createShow,fxBurst,fxDust}=E;
const{controllerMux,skillProfile,createRng}=AI;

// GRAVE GARDEN — Plants vs. Zombies crossed with a tiny formation-defense
// diorama. Four broad lanes and three large beds keep the formation readable
// at native size. The incoming roster is latched six seconds before every
// wave; the gardener must physically uproot, carry, and replant any defense.
const LANES=4,SLOTS=3,LANE_Y=[88,140,192,244],SLOT_X=[42,68,94],CYCLE=900,WARN=300,
  MATCH_FRAMES=54000,GATE_X=154,GREENHOUSE_X=24,GREENHOUSE_MAX=200;
const INK='#0a100d',CREAM='#f4eccd',GOLD='#f4c95d',MINT='#8fe06f',LEAF='#3f8b4c',
  LIME='#b8ed75',SOIL='#62452d',SOIL2='#805b39',STONE='#66706b',STONE2='#89928a',
  NIGHT='#121a28',PLUM='#8a5cb5',RED='#d95656',CYAN='#6fd3c8',ICE='#b9e1df';
const PLANT={
  bloom:{cost:25,hp:8,name:'SUNBLOOM',power:.35,color:GOLD},
  pea:{cost:50,hp:9,name:'PEA WARD',power:3.5,color:MINT},
  thorn:{cost:40,hp:20,name:'THORN WALL',power:4.7,color:'#a97848'},
  lantern:{cost:70,hp:8,name:'MOON CAP',power:5.4,color:PLUM}
};
const ENEMY={
  shambler:{hp:5,speed:.115,bite:.017,threat:5,name:'SHAMBLER'},
  hound:{hp:4,speed:.18,bite:.021,threat:6,name:'BONE HOUND'},
  bucket:{hp:11,speed:.082,bite:.024,threat:12,name:'BUCKET'},
  brute:{hp:22,speed:.058,bite:.035,threat:25,name:'UNDERTAKER'}
};
const PERSONAS=[
  {name:'ROWAN',color:MINT,showboat:0,bloomBias:.4,saveBias:1.2},
  {name:'MOSS',color:CYAN,showboat:.2,bloomBias:1.1,saveBias:.9},
  {name:'BRIAR',color:GOLD,showboat:.6,bloomBias:.1,saveBias:1.5}
];

let showFrame=0,runFrame=0,state='play',endingT=0,outcome='',waveNo=1,waveClock=0,stage=0;
let sun=130,greenhouse=GREENHOUSE_MAX,wavePlan=[],spawned=new Set(),enemies=[],shots=[],slots=[],texts=[],barrows=[];
let gardener=null,persona=PERSONAS[0],personaIndex=0,skill=null,planAt=-1e9,cachedPlan=null;
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
let eventSerial=0,progressSerial=0,lastEventFrame=0,lastProgressFrame=0;
let waveBreaches=0,visualFlash=0,visualFlashLane=0,manualLane=0,manualCol=0,lastLapsed=false;
const act={phase:'calm',warnAt:4200,landAt:4440,endAt:5340,targetLane:0,count:0};
const actNotes=[];
const stats={waves:0,wavesHeld:0,kills:0,breaches:0,plants:0,transplants:0,harvests:0,
  shots:0,saves:0,lapses:0,chapters:0,events:0,progress:0,appliedIntents:0,
  admireIntents:0,plannerCalls:0,maxEventLull:0,maxProgressLull:0};

const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},
  2:{frames:46,minGap:120},
  3:{frames:84,minGap:600,hold:6,slowEvery:3,slowFrames:24,admire:42}
}});

const finiteObject=o=>Object.values(o||{}).filter(v=>typeof v==='number').every(Number.isFinite);
const allFinite=()=>finiteObject(gardener)&&enemies.every(finiteObject)&&shots.every(finiteObject)&&
  slots.flat().filter(Boolean).every(finiteObject)&&Number.isFinite(sun)&&Number.isFinite(greenhouse);
const laneName=l=>'LANE '+(l+1);
const slotPlant=(l,c)=>slots[l]&&slots[l][c];
const emptyIntent=(tactic)=>({action:'wait',lane:0,col:0,type:null,fromLane:-1,fromCol:-1,
  tactic:tactic||'WATCH FORMATION'});
function markEvent(score){
  eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);
  lastEventFrame=showFrame;if(score&&playing())addScore(score);
}
function markProgress(score){
  progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);
  lastProgressFrame=showFrame;if(score&&playing())addScore(score);
}
function say(s,c,y,t){texts.push({s,c:c||CREAM,y:y||62,t:t||70});}
function offer(id,tier,x,y,tag){
  return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+30});
}
function noteAct(e){
  actNotes.push({kind:e.kind,id:e.id,at:e.at,tag:e.tag,landsAt:e.landsAt});
  SHOW.note(e);
}
function makePlant(type,lane,col){
  const d=PLANT[type];
  return{type,lane,col,hp:d.hp,maxHp:d.hp,cool:18+(lane*13+col*17)%50,age:0,hitT:0,
    recoil:0,produce:180+(lane*37+col*29)%160,serial:runFrame*20+lane*4+col};
}
function baseFormation(){
  slots=Array.from({length:LANES},()=>Array(SLOTS).fill(null));
  slots[0][0]=makePlant('bloom',0,0);slots[0][1]=makePlant('pea',0,1);
  slots[1][0]=makePlant('pea',1,0);slots[1][2]=makePlant('thorn',1,2);
  slots[2][0]=makePlant('bloom',2,0);slots[2][1]=makePlant('pea',2,1);
  slots[3][0]=makePlant('pea',3,0);slots[3][2]=makePlant('thorn',3,2);
}
function chooseType(wave,index){
  const q=random(),tier=Math.floor((wave-1)/10);
  if(wave%10===0&&index===0)return'brute';
  if(tier>=2&&q<.17)return'brute';
  if(tier>=1&&q<.40)return'bucket';
  if(q<.63)return'hound';
  return'shambler';
}
function buildWave(){
  const count=4+Math.min(10,Math.floor((waveNo-1)/3));
  const out=[];
  // A wave owns its whole RNG draw up front. Bot/planner work can never
  // perturb later rosters, and the right-edge silhouettes are exact.
  const focus=RI(0,LANES-1);
  for(let i=0;i<count;i++){
    let lane=i<Math.ceil(count*.45)?focus:RI(0,LANES-1);
    if(waveNo%7===0&&i<3)lane=(focus+1)%LANES;
    out.push({at:WARN+Math.floor(i*Math.max(24,480/Math.max(1,count-1))),lane,
      type:chooseType(waveNo,i),id:waveNo*100+i});
  }
  return out;
}
function resetActs(){
  Object.assign(act,{phase:'calm',warnAt:4200,landAt:4440,endAt:5340,targetLane:0,count:0});
}
function resetGarden(full){
  runFrame=0;state='play';endingT=0;outcome='';waveNo=1;waveClock=0;stage=0;
  sun=130;greenhouse=GREENHOUSE_MAX;enemies=[];shots=[];texts=[];spawned=new Set();waveBreaches=0;
  visualFlash=0;visualFlashLane=0;manualLane=0;manualCol=0;cachedPlan=null;planAt=-1e9;lastLapsed=false;
  for(const k of Object.keys(stats))stats[k]=0;
  personaIndex=RI(0,PERSONAS.length-1);persona=PERSONAS[personaIndex];
  skill=skillProfile({skill:.78,precision:.82,risk:.68,recovery:.9,reactionFrames:[10,18],
    lapseFrames:[18,34],lapseChance:.0022,rng:createRng(RI(1,0x7fffffff))});
  baseFormation();barrows=Array.from({length:LANES},(_,lane)=>({lane,x:19,active:false,ready:true,spin:0}));
  resetActs();actNotes.length=0;
  gardener={x:31,y:LANE_Y[1],face:1,walk:0,task:null,carrying:null,workT:0,intent:emptyIntent('READ THE GATE'),
    lastX:31,lastY:LANE_Y[1],pose:'stand'};
  wavePlan=buildWave();stats.waves=1;
  if(full)SHOW.reset(showFrame);
}
function threatOf(type){return ENEMY[type].threat;}
function forecastByLane(){
  const a=[0,0,0,0];
  for(const q of wavePlan)a[q.lane]+=threatOf(q.type);
  return a;
}
function liveThreatByLane(){
  const a=[0,0,0,0];
  for(const z of enemies)a[z.lane]+=Math.max(0,z.hp)*(1+z.speed*2);
  return a;
}
function defenseByLane(extra){
  const out=[0,0,0,0];
  for(let l=0;l<LANES;l++)for(let c=0;c<SLOTS;c++){
    let p=slots[l][c];if(extra&&extra.kind==='move'&&l===extra.fromLane&&c===extra.fromCol)p=null;
    if(extra&&l===extra.lane&&c===extra.col)p={type:extra.type,hp:PLANT[extra.type].hp,maxHp:PLANT[extra.type].hp};
    if(!p)continue;
    const health=clamp(p.hp/(p.maxHp||PLANT[p.type].hp),0,1);
    out[l]+=PLANT[p.type].power*(.45+.55*health);
  }
  return out;
}
function projectFormation(extra){
  const incoming=forecastByLane(),live=liveThreatByLane(),def=defenseByLane(extra),lanes=[];
  let breaches=0,margin=0;
  for(let l=0;l<LANES;l++){
    const moon=act.phase!=='calm'&&act.targetLane===l?7:0;
    const load=live[l]+incoming[l]*.72+moon;
    const hold=def[l]*6.4;
    const risk=Math.max(0,(load-hold)/9);
    lanes.push({lane:l,load,hold,risk,margin:hold-load});
    breaches+=risk;margin+=hold-load;
  }
  return{breaches,margin,lanes};
}
function formationForecast(){
  const p=projectFormation(null),worst=p.lanes.slice().sort((a,b)=>b.risk-a.risk||a.lane-b.lane)[0];
  if(worst.risk<.35)return{label:'FORMATION HOLDS',lane:worst.lane,risk:worst.risk};
  if(worst.risk<1.35)return{label:laneName(worst.lane)+' STRAINS',lane:worst.lane,risk:worst.risk};
  return{label:'BREACH LIKELY · '+laneName(worst.lane),lane:worst.lane,risk:worst.risk};
}
function affordable(type){return sun>=PLANT[type].cost;}
function candidateTasks(){
  const base=projectFormation(null),tasks=[];
  const types=['pea','thorn','lantern','bloom'];
  for(let l=0;l<LANES;l++)for(let c=0;c<SLOTS;c++)if(!slots[l][c]){
    for(const type of types)if(affordable(type)){
      const after=projectFormation({kind:'build',lane:l,col:c,type});
      let score=(base.breaches-after.breaches)*155+(after.margin-base.margin)*.15-PLANT[type].cost*.035;
      // A readable formation has jobs: income behind, fire in the middle,
      // roots at the cemetery edge. Lookahead still chooses the weak lane;
      // role bonuses stop equivalent zero-risk openings becoming pea soup.
      if(c===2)score+=type==='thorn'?34:-18;
      if(c===1)score+=(type==='pea'||type==='lantern')?25:-12;
      if(c===0)score+=type==='bloom'?24*persona.bloomBias:type==='pea'?10:-8;
      score+=base.lanes[l].load*.7-base.lanes[l].hold*.08;
      if(type==='bloom')score+=(slots.flat().filter(p=>p&&p.type==='bloom').length<3?12:0)*persona.bloomBias;
      if(act.phase==='warn'&&l===act.targetLane)score+=18;
      tasks.push({action:'build',lane:l,col:c,type,fromLane:-1,fromCol:-1,score,
        tactic:act.phase==='warn'&&l===act.targetLane?'FORTIFY MOON LANE':'PLANT '+PLANT[type].name});
    }
  }
  // Once beds fill, formations stay alive by moving a healthy combat plant
  // out of a surplus lane. The copied-state score prices the lost source lane.
  for(let fl=0;fl<LANES;fl++)for(let fc=0;fc<SLOTS;fc++){
    const p=slots[fl][fc];if(!p||p.type==='bloom'||p.hp<p.maxHp*.45)continue;
    for(let l=0;l<LANES;l++)if(l!==fl)for(let c=0;c<SLOTS;c++)if(!slots[l][c]){
      const move={kind:'move',lane:l,col:c,type:p.type,fromLane:fl,fromCol:fc};
      const after=projectFormation(move);
      const source=base.lanes[fl],dest=base.lanes[l];
      if(act.phase!=='warn'&&dest.risk<.8)continue;
      if(dest.risk<=source.risk+.25&&!(act.phase==='warn'&&l===act.targetLane))continue;
      const score=(base.breaches-after.breaches)*165+(after.margin-base.margin)*.12+
        (act.phase==='warn'&&l===act.targetLane?30:0)-12;
      tasks.push({action:'move',lane:l,col:c,type:p.type,fromLane:fl,fromCol:fc,score,
        tactic:act.phase==='warn'?'REPLANT BEFORE MOON':'SHIFT THE LINE'});
    }
  }
  return tasks;
}
function smartPlan(){
  stats.plannerCalls++;
  const tasks=candidateTasks();
  tasks.sort((a,b)=>b.score-a.score||a.lane-b.lane||a.col-b.col||a.type.localeCompare(b.type));
  if(tasks.length&&tasks[0].score>1)return tasks[0];
  const weak=projectFormation(null).lanes.slice().sort((a,b)=>a.margin-b.margin||a.lane-b.lane)[0];
  return Object.assign(emptyIntent('WATCH '+laneName(weak.lane)),{lane:weak.lane});
}
function reactivePlan(){
  // Ablation: plausible reactive gardening. It protects the closest thing it
  // can see, but ignores the six-second roster and never rebalances a surplus.
  let lane=(waveNo+stats.plants)%LANES,closest=1e9;
  for(const z of enemies)if(z.x<closest){closest=z.x;lane=z.lane;}
  let col=-1;for(let c=0;c<SLOTS;c++)if(!slots[lane][c]){col=c;break;}
  if(col<0)return Object.assign(emptyIntent('WATCH THE FRONT'),{lane});
  const type=closest<64&&affordable('thorn')?'thorn':affordable('pea')?'pea':
    affordable('bloom')?'bloom':null;
  return type?{action:'build',lane,col,type,fromLane:-1,fromCol:-1,
    tactic:closest<64?'PANIC THORNS':'REACTIVE PLANT'}:emptyIntent('SAVE SUN');
}
function rawBotDecision(){
  if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined'&&!enemies.some(z=>z.x<52)){
    stats.admireIntents++;return emptyIntent('ADMIRE THE GARDEN');
  }
  if(gardener.task)return emptyIntent(gardener.task.action==='move'?'CARRY DEFENSE':'FINISH PLANTING');
  if(runFrame-planAt>=30||!cachedPlan){
    cachedPlan=typeof globalThis.__NO_FORMATION_PLAN==='undefined'?smartPlan():reactivePlan();
    planAt=runFrame;
  }
  return Object.assign({},cachedPlan);
}
function botIntent(){
  if(typeof globalThis.__NO_LAPSE!=='undefined')return rawBotDecision();
  const before=skill.isLapsed(runFrame);
  const out=skill.decide(runFrame,null,()=>rawBotDecision(),(ctx,last)=>{
    const hold=last?Object.assign({},last):emptyIntent('MISSED THE CUE');
    hold.action='wait';hold.tactic='MISSED THE CUE';return hold;
  })||emptyIntent('READ THE GATE');
  const after=skill.isLapsed(runFrame);
  if(after&&!before&&!lastLapsed){stats.lapses++;markEvent();say('DISTRACTED BY A CROW',CREAM,LANE_Y[gardener.intent.lane||0]-17,45);}
  lastLapsed=after;
  return out;
}
function humanIntent(){
  if(tap('left'))manualCol=clamp(manualCol-1,0,SLOTS-1);
  if(tap('right'))manualCol=clamp(manualCol+1,0,SLOTS-1);
  if(tap('up'))manualLane=clamp(manualLane-1,0,LANES-1);
  if(tap('down'))manualLane=clamp(manualLane+1,0,LANES-1);
  let type=null;
  if(tap('a'))type='pea';else if(tap('b'))type='thorn';else if(tap('c'))type='bloom';
  return type?{action:'build',lane:manualLane,col:manualCol,type,fromLane:-1,fromCol:-1,tactic:'MANUAL'}:
    Object.assign(emptyIntent('MANUAL'),{lane:manualLane,col:manualCol});
}
const controller=controllerMux({human:humanIntent,ai:botIntent,manual:()=>playing()||manual()});
function validTask(t){
  if(!t||t.lane<0||t.lane>=LANES||t.col<0||t.col>=SLOTS)return false;
  if(t.action==='build')return!!PLANT[t.type]&&!slotPlant(t.lane,t.col)&&affordable(t.type);
  if(t.action==='move')return!!slotPlant(t.fromLane,t.fromCol)&&!slotPlant(t.lane,t.col);
  return false;
}
function applyIntent(intent){
  gardener.intent=Object.assign(emptyIntent('WAIT'),intent||{});
  stats.appliedIntents++;
  if(!gardener.task&&validTask(gardener.intent)){
    gardener.task=Object.assign({},gardener.intent,{phase:gardenerIntentPhase(gardener.intent),workT:0});
    cachedPlan=null;
  }
  return gardener.intent;
}
function gardenerIntentPhase(intent){return intent.action==='move'?'source':'target';}
function taskPoint(t){
  if(t.phase==='source'||t.phase==='uproot')return{x:SLOT_X[t.fromCol],y:LANE_Y[t.fromLane]+8};
  return{x:SLOT_X[t.col],y:LANE_Y[t.lane]+8};
}
function finishTask(t){
  if(t.action==='build'){
    if(!slotPlant(t.lane,t.col)&&affordable(t.type)){
      sun-=PLANT[t.type].cost;slots[t.lane][t.col]=makePlant(t.type,t.lane,t.col);
      stats.plants++;markEvent(10);markProgress(1);offer('plant',1,SLOT_X[t.col],LANE_Y[t.lane],t.type);
      fxBurst(SLOT_X[t.col],LANE_Y[t.lane]+7,10,PLANT[t.type].color,1.2,.03);
    }
  }else if(t.action==='move'&&gardener.carrying&&!slotPlant(t.lane,t.col)){
    const p=gardener.carrying;p.lane=t.lane;p.col=t.col;p.hitT=0;
    slots[t.lane][t.col]=p;gardener.carrying=null;stats.transplants++;markEvent(14);markProgress(1);
    offer('replant',2,SLOT_X[t.col],LANE_Y[t.lane],p.type);
    fxBurst(SLOT_X[t.col],LANE_Y[t.lane]+7,14,PLANT[p.type].color,1.5,.04);
  }
  gardener.task=null;gardener.workT=0;gardener.pose='stand';cachedPlan=null;planAt=-1e9;
}
function stepGardener(intent){
  applyIntent(intent);
  const g=gardener;g.lastX=g.x;g.lastY=g.y;
  if(!g.task){g.pose='stand';return;}
  const t=g.task,p=taskPoint(t),dx=p.x-g.x,dy=p.y-g.y,d=Math.hypot(dx,dy);
  g.face=dx>.15?1:dx<-.15?-1:g.face;
  if((t.phase==='uproot'||t.phase==='dig')&&t.workT>0){
    t.workT--;g.pose=t.phase==='uproot'?'uproot':'plant';
    if(t.workT%7===0)fxDust(g.x,g.y+7,2,SOIL2);
    if(t.workT<=0){
      if(t.phase==='uproot'){
        const p0=slotPlant(t.fromLane,t.fromCol);
        if(!p0){g.task=null;cachedPlan=null;return;}
        slots[t.fromLane][t.fromCol]=null;g.carrying=p0;t.phase='target';g.pose='carry';
      }else finishTask(t);
    }
    return;
  }
  if(d>1.2){
    const sp=g.carrying?.68:.82;g.x+=dx/d*sp;g.y+=dy/d*sp;g.walk+=sp;g.pose=g.carrying?'carry':'walk';
    if(((showFrame+Math.floor(g.walk))%9)===0)fxDust(g.x-g.face*2,g.y+7,1,'#a18459');
  }else{
    g.x=p.x;g.y=p.y;
    if(t.phase==='source'){t.phase='uproot';t.workT=26;g.pose='uproot';}
    else if(t.phase==='target'){t.phase='dig';t.workT=34;g.pose='plant';}
  }
}
function spawnEnemy(q){
  const d=ENEMY[q.type],moon=act.phase==='live'&&q.lane===act.targetLane;
  enemies.push({id:q.id,type:q.type,lane:q.lane,x:GATE_X+6+(q.id%3)*3,hp:d.hp*(moon?1.22:1),
    maxHp:d.hp*(moon?1.22:1),speed:d.speed,bite:d.bite,hitT:0,biteT:0,walk:q.id%17,
    moon:moon?1:0,dead:false});
  markEvent();
}
function killEnemy(z,how){
  if(z.dead)return;z.dead=true;stats.kills++;markEvent(8);markProgress(1);
  offer('weeded',1,z.x,LANE_Y[z.lane],z.type);
  if(z.x<55){
    stats.saves++;visualFlash=24;visualFlashLane=z.lane;offer('last-save',2,z.x,LANE_Y[z.lane],'save');
    say('LAST-SECOND SAVE!',LIME,LANE_Y[z.lane]-18,62);shake(3);
    fxBurst(z.x,LANE_Y[z.lane],18,LIME,2.1,.04);
  }else fxBurst(z.x,LANE_Y[z.lane],9,'#c9d1c4',1.3,.03);
}
function stepPlants(){
  for(let l=0;l<LANES;l++)for(let c=0;c<SLOTS;c++){
    const p=slots[l][c];if(!p)continue;p.age++;if(p.hitT>0)p.hitT--;if(p.recoil>0)p.recoil--;
    if(p.type==='bloom'){
      if(--p.produce<=0){p.produce=330;sun=Math.min(300,sun+18);stats.harvests++;markEvent(2);
        offer('sun',1,SLOT_X[c],LANE_Y[l],l);fxBurst(SLOT_X[c],LANE_Y[l]-5,6,GOLD,1.1,-.02);}
      continue;
    }
    if(--p.cool>0)continue;
    const target=enemies.filter(z=>!z.dead&&z.lane===l&&z.x>SLOT_X[c]-3)
      .sort((a,b)=>a.x-b.x||a.id-b.id)[0];
    if(!target){p.cool=12;continue;}
    if(p.type==='pea'){
      p.cool=62;p.recoil=7;shots.push({x:SLOT_X[c]+8,y:LANE_Y[l]-3,lane:l,vx:1.55,damage:1,type:'pea',life:90});
    }else if(p.type==='lantern'){

function stepShots(){

      .sort((a,b)=>a.x-b.x||a.id-b.id)[0];
    if(hit){
      hit.hp-=s.damage;hit.hitT=6;s.life=0;
      if(s.type==='moon'){
        for(const z of enemies)if(!z.dead&&z.lane===s.lane&&z!==hit&&Math.abs(z.x-hit.x)<15){
          z.hp-=.55;z.hitT=4;if(z.hp<=0)killEnemy(z,'moon');}

      }

function plantInFront(z){

}
function breach(z){

  markEvent();markProgress();say('BREACH · '+laneName(z.lane),RED,LANE_Y[z.lane]-17,70);shake(5);

function stepBarrows(){
  for(const b of barrows){
    if(!b.active){
      const danger=enemies.some(z=>!z.dead&&z.lane===b.lane&&z.x<32);
      if(b.ready&&danger){b.active=true;b.x=19;b.spin=0;markEvent(20);
        offer('barrow-save',2,b.x,LANE_Y[b.lane],b.lane);
        say('BARROW SAVE!',GOLD,LANE_Y[b.lane]-18,58);shake(3);}
      continue;
    }

    for(const z of enemies)if(!z.dead&&z.lane===b.lane&&Math.abs(z.x-b.x)<7)killEnemy(z,'barrow');
    if(b.x>166){b.active=false;b.ready=false;b.x=19;}
  }

function stepEnemies(){
  for(const z of enemies){
    if(z.dead)continue;if(z.hitT>0)z.hitT--;if(z.biteT>0)z.biteT--;
    const p=plantInFront(z),px=p?SLOT_X[p.col]:-99;
    if(p&&z.x-px<9){
      z.biteT=14;p.hp-=z.bite*(z.type==='brute'?1.15:1);p.hitT=5;
      if(p.type==='thorn'){z.hp-=.032;if(z.hp<=0){killEnemy(z,'thorn');continue;}}
      if(p.hp<=0){
        slots[p.lane][p.col]=null;markEvent();say(PLANT[p.type].name+' UPROOTED',RED,LANE_Y[p.lane]-18,55);
        fxBurst(px,LANE_Y[p.lane]+6,12,SOIL2,1.4,.04);cachedPlan=null;planAt=-1e9;

function finishWave(){
  const held=stats.breaches===waveBreaches;
  if(held){stats.wavesHeld++;markProgress(2);offer('wave-held',2,80,58,waveNo);
    say('WAVE '+String(waveNo).padStart(2,'0')+' HELD',MINT,61,62);}
  waveBreaches=stats.breaches;
  if(waveNo%6===0){
    stats.chapters++;offer('garden-apex',3,80,58,waveNo);markProgress(4);
    say('THE GARDEN STILL STANDS',GOLD,118,100);fxBurst(80,168,34,GOLD,2.8,.025);shake(5);
    for(const b of barrows)if(!b.active)b.ready=true;
  }
  waveNo++;stage=Math.min(5,Math.floor((waveNo-1)/10));waveClock=0;spawned=new Set();
  wavePlan=buildWave();stats.waves++;cachedPlan=null;planAt=-1e9;
  // Small visible recovery keeps breaches dramatic without ending the fifteen
  // minute show early. It never erases the breach counter or formation damage.
  if(waveNo%6===1&&greenhouse>0)greenhouse=Math.min(GREENHOUSE_MAX,greenhouse+2);
}
function stepActs(){
  if(typeof globalThis.__NO_ACTS!=='undefined'){act.phase='calm';return;}
  if(act.phase==='calm'&&runFrame===act.warnAt){
    act.phase='warn';act.targetLane=(waveNo+stats.breaches+act.count)%LANES;cachedPlan=null;planAt=-1e9;
    noteAct({kind:'act-warning',id:'blood-moon',at:showFrame,tag:runFrame,landsAt:showFrame+240});
    say('BLOOD MOON · '+laneName(act.targetLane),RED,LANE_Y[act.targetLane]-19,100);
  }else if(act.phase==='warn'&&runFrame>=act.landAt){
    act.phase='live';noteAct({kind:'act-land',id:'blood-moon',at:showFrame,tag:runFrame});
    say('THE DEAD QUICKEN',RED,LANE_Y[act.targetLane]-19,75);shake(3);
  }else if(act.phase==='live'&&runFrame>=act.endAt){
    act.phase='calm';act.count++;act.warnAt+=7200;act.landAt=act.warnAt+240;act.endAt=act.landAt+900;
    offer('moon-survived',2,80,LANE_Y[act.targetLane],act.count);say('MOON PASSES',CYAN,62,60);
  }
}
function finishMatch(){
  if(state==='ending')return;
  state='ending';endingT=420;outcome=greenhouse>0?'DAWN SAVED':'GARDEN LOST';
  offer('dawn',3,80,150,outcome);markEvent(500);markProgress(10);
  say(outcome,greenhouse>0?GOLD:RED,150,260);fxBurst(80,160,48,greenhouse>0?GOLD:RED,3.2,.02);
}
function stepWorld(){
  runFrame++;stepActs();
  if(runFrame>=MATCH_FRAMES){finishMatch();return;}
  waveClock++;
  for(const q of wavePlan)if(q.at<=waveClock&&!spawned.has(q.id)){spawned.add(q.id);spawnEnemy(q);}
  const intent=controller();
  stepGardener(intent);stepPlants();stepShots();stepBarrows();stepEnemies();
  if(runFrame%60===0)sun=Math.min(300,sun+2);
  if(waveClock>=CYCLE)finishWave();
}
function step(){
  showFrame++;sessionStep({reset:()=>resetGarden(true)});pres=SHOW.step(showFrame);
  if(visualFlash>0)visualFlash--;
  if(state==='play'){
    if(!pres.holdWorld&&showFrame%pres.physicsEvery===0)stepWorld();
  }else{
    endingT--;
    if(endingT<=0){if(playing())gameOver(outcome+' · '+stats.wavesHeld+' WAVES HELD');resetGarden(true);}
  }
  stepParts();stepRings();
  for(const t of texts)t.t--;texts=texts.filter(t=>t.t>0);
}

    gardener:[Math.round(gardener.x*1e5),Math.round(gardener.y*1e5),gardener.face,Math.round(gardener.walk*1e5),
      gardener.pose,gardener.task&&[gardener.task.action,gardener.task.phase,gardener.task.lane,gardener.task.col,
        gardener.task.fromLane,gardener.task.fromCol,gardener.task.workT],

    enemies:enemies.map(z=>[z.id,z.type,z.lane,Math.round(z.x*1e5),Math.round(z.hp*1e5),z.hitT,z.biteT,z.moon]),
    shots:shots.map(s=>[s.type,s.lane,Math.round(s.x*1e5),s.life]),

      stats.harvests,stats.shots,stats.saves,stats.lapses,stats.chapters,stats.events,stats.progress]

}
