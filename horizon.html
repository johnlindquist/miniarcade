<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MACHINE HUNT</title>
<style>
  html,body{margin:0;height:100%;background:#07080c}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{height:100vh;aspect-ratio:4/9;image-rendering:pixelated;background:#000}
</style>
<canvas id="cv" width="320" height="720"></canvas>
<script src="engine.js?v=435b484c"></script>
<script src="autoplay.js?v=1acff4bb"></script>
<script>
'use strict';
const{ctx,W,H,random,R,RI,hash,dist,rect,spawn,burst,dust,stepParts,drawParts,ring,stepRings,drawRings,start,keys,tap,manual,axis2,
  initSession,sessionStep,drawSession,playing,addScore,gameOver,createShow,fxBurst}=E;
const{nearest,bestBy,progressWatchdog}=AI;

// ---------- world state ----------
const BIOMES=[
  {g:'#4a6b33',d:'#3f5c2b',gr:'#2f4f1d',gt:'#3c6326'},
  {g:'#35543a',d:'#2c4830',gr:'#22402a',gt:'#2e5236'},
  {g:'#aab8c2',d:'#98a8b4',gr:'#5d7a68',gt:'#6f8f7a'},
  {g:'#c2a15e',d:'#b08f4e',gr:'#7d8a3e',gt:'#93a04a'},
];
const MT={
  watcher:{hp:3,sp:1.05,sight:85,w:8,h:10,atk:1},
  strider:{hp:5,sp:0.9,sight:62,w:12,h:9,atk:1},
  sawtooth:{hp:12,sp:1.25,sight:95,w:16,h:11,atk:2},
  thunderjaw:{hp:30,sp:0.7,sight:115,w:26,h:16,atk:2},
};
const aloy={x:80,y:0,hp:5,state:'trek',tgx:80,tgy:-80,aim:0,tm:null,dodge:0,dvx:0,dvy:0,hideT:0,face:1,down:0,walk:0,
  stam:100,stamMax:100,spdT:0,invT:0};
let grass=[],deco=[],machines=[],arrows=[],shots=[],corpses=[],loot=[],crates=[];
let trees=[],rocks=[],reticles=[];
let genY=80,kills=0,meters=0,power=0,frame=0,camY=0,lastMeters=0;

// HERD MIGRATION act: every ~300m a warning calls a strider stampede across
// the valley; the huntress breaks for cover at the call and rolls clear of
// stragglers. Scheduled on meters, herd latched from sim state; frame is
// monotonic (resetGame keeps it) so it doubles as the show clock.
let migPhase='calm',migT=0,nextMigM=250,lastTier=0;
let bannerS='',bannerC='#fff',bannerT=0;
const showBanner=(s,c,t)=>{bannerS=s;bannerC=c||'#fff';bannerT=t||70;};
let showPres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
const SHOW=createShow({tiers:{
  1:{frames:12},                              // watcher/strider kills
  2:{frames:50,minGap:120},                   // sawtooth kill, crates, tier-ups, herd passed
  3:{frames:100,minGap:600,hold:6,slowEvery:3,slowFrames:24,admire:24} // THUNDERJAW DOWN
}});
const readMove=axis2({stickyFrames:4});
const progressWatch=progressWatchdog({progressed:(next,previous)=>next>previous,escalations:[
  {after:1801,action:'replan'},{after:3602,action:'reset'}
]});
const tier=()=>power>=50?4:power>=30?3:power>=16?2:power>=6?1:0;
const ACOL=['#d9c58a','#cfe8ff','#ff9a4a','#ffb347','#7ef0ff'];

const biomeAt=y=>((Math.floor(-y/1440)%4)+4)%4;
function resetGame(){ // fresh wilds for a new run (player or attract)
  grass=[];deco=[];machines=[];arrows=[];shots=[];corpses=[];loot=[];crates=[];
  trees=[];rocks=[];reticles=[];
  genY=80;kills=0;meters=0;power=0;camY=0;lastMeters=0;progressWatch.reset(0,frame);
  migPhase='calm';migT=0;nextMigM=250;lastTier=0;bannerT=0;SHOW.reset(frame);
  Object.assign(aloy,{x:80,y:0,hp:5,state:'trek',tgx:80,tgy:-80,aim:0,tm:null,
    dodge:0,dvx:0,dvy:0,hideT:0,face:1,down:0,walk:0,fireT:0,
    stam:100,stamMax:100,spdT:0,invT:0});
  pickGrass();
}

function genBand(){
  const yTop=genY-120,nb=Math.round(-yTop/120);
  for(let i=0,n=RI(2,3);i<n;i++)grass.push({x:R(24,136),y:R(yTop+10,genY-10),r:R(13,20),s:random()*9});
  for(let i=0,n=RI(4,7);i<n;i++)deco.push({x:R(8,152),y:R(yTop,genY),t:RI(0,2),s:random()});
  const mk=(type,x,y)=>machines.push({type,x,y,hx:x,hy:y,hp:MT[type].hp,detect:0,wt:0,tx:x,ty:y,face:1,atkCd:0,shotCd:60,hitT:0,burn:0,stun:0,dead:false,px:x,py:y,mode:null,modeT:0,mvx:0,mvy:0,pingT:0,orb:random()<0.5?1:-1,windCd:RI(80,150),mortarCd:220});
  if(nb%8===5)crates.push({x:R(30,130),y:R(yTop+15,genY-15)});
  for(let i=0,n=RI(1,2);i<n;i++)trees.push({x:R(20,140),y:R(yTop+12,genY-12),r:R(10,15),s:random()*9});
  if(random()<0.8)rocks.push({x:R(15,145),y:R(yTop+8,genY-8),r:R(4,6.5)});
  if(nb>2){
    if(nb%13===7)mk('thunderjaw',80,yTop+60);
    else if(nb%5===3)mk('sawtooth',R(35,125),R(yTop+20,genY-20));
    else{const r=random();
      if(r<0.55){for(let i=0,n=RI(1,2);i<n;i++)mk('watcher',R(25,135),R(yTop+15,genY-15));}
      else if(r<0.9){const cx=R(35,125),cy=R(yTop+25,genY-25);for(let i=0,n=RI(2,3);i<n;i++)mk('strider',cx+R(-16,16),cy+R(-12,12));}
    }
  }
  genY-=120;
}
const inGrass=p=>grass.some(g=>Math.hypot(p.x-g.x,p.y-g.y)<g.r);
const underTree=p=>trees.some(t=>Math.hypot(p.x-t.x,p.y-t.y)<t.r*0.85);
const inCover=p=>inGrass(p)||underTree(p);
// rocks and tree trunks block machine sightlines
function losBlocked(ax,ay,bx,by){
  const vx=bx-ax,vy=by-ay,L2=vx*vx+vy*vy||1;
  const test=(px,py,r)=>{
    let u=((px-ax)*vx+(py-ay)*vy)/L2;u=Math.max(0,Math.min(1,u));
    const dx=ax+u*vx-px,dy=ay+u*vy-py;
    return dx*dx+dy*dy<r*r;
  };
  for(const b of rocks)if(test(b.x,b.y,b.r))return true;
  for(const t of trees)if(test(t.x,t.y,3))return true;
  return false;
}

function fireArrow(m){
  const t=Math.min(24,dist(aloy,m)/2.8),tx=m.x+(m.x-m.px)*t*0.5+R(-1.5,1.5),ty=m.y+(m.y-m.py)*t*0.5+R(-1.5,1.5);
  const tr=tier(),n=[1,2,2,3,3][tr];
  const base=Math.atan2(ty-aloy.y,tx-aloy.x);
  for(let i=0;i<n;i++){
    const a=base+(i-(n-1)/2)*0.09;
    arrows.push({x:aloy.x,y:aloy.y-3,vx:Math.cos(a)*2.8,vy:Math.sin(a)*2.8,life:70,
      dmg:tr>=2?2:1,fire:tr>=2,shock:tr>=4,col:ACOL[tr]});
  }
  aloy.face=tx>aloy.x?1:-1;
}
function killMachine(m){
  if(m.dead)return;
  m.dead=true;corpses.push({x:m.x,y:m.y,type:m.type});kills++;
  if(playing())addScore(m.type==='thunderjaw'?150:m.type==='sawtooth'?60:25);
  if(m.type==='thunderjaw'){SHOW.offer({id:'jaw',tier:3,at:frame,x:m.x,y:m.y});
    fxBurst(m.x,m.y,28,'#ffd166',2.8);showBanner('THUNDERJAW DOWN','#ffd166',90);}
  else if(m.type==='sawtooth'){SHOW.offer({id:'saw',tier:2,at:frame,x:m.x,y:m.y});fxBurst(m.x,m.y,14,'#ff9a4a',2);}
  else SHOW.offer({id:'kill',tier:1,at:frame,x:m.x,y:m.y});
  burst(m.x,m.y,18,'#41e8ff',1.6);burst(m.x,m.y,10,'#9aa3ad',1.2);
  const r=random();
  if(r<0.32)loot.push({x:m.x+R(-6,6),y:m.y+R(-4,4),k:'heal'});
  else if(r<0.58)loot.push({x:m.x+R(-6,6),y:m.y+R(-4,4),k:'pow'});
  else if(r<0.68)loot.push({x:m.x+R(-6,6),y:m.y+R(-4,4),k:'spd'});
  else if(r<0.75)loot.push({x:m.x+R(-6,6),y:m.y+R(-4,4),k:'inv'});
  else if(r<0.84)loot.push({x:m.x+R(-6,6),y:m.y+R(-4,4),k:'stam'});
  if(m.type==='thunderjaw'){burst(m.x,m.y,30,'#ffd166',2.4);
    loot.push({x:m.x,y:m.y,k:'inv'},{x:m.x+7,y:m.y+3,k:'stam'},{x:m.x-7,y:m.y+3,k:'heal'});}
}

// ---------- aloy ai ----------
function pickGrass(){
  const best=bestBy(grass.concat(trees),g=>(aloy.y-g.y)+Math.abs(g.x-aloy.x)*0.6+Math.abs(g.x-80)*0.3,
    {maximize:false,filter:g=>g.y<=aloy.y-50});
  if(best){aloy.tgx=best.x+R(-4,4);aloy.tgy=best.y+R(-4,4);}
  else{aloy.tgx=R(40,120);aloy.tgy=aloy.y-110;}
}
function aloyUpdate(){
  if(aloy.down>0){aloy.down--;
    if(aloy.down===0){aloy.hp=5;aloy.y+=90;aloy.state='trek';pickGrass();
      for(const m of machines)m.detect=0;}
    return;}
  const live=machines.filter(m=>!m.dead);
  const alerted=live.filter(m=>m.detect>=100&&dist(m,aloy)<130);
  const closestAlert=nearest(alerted,aloy);
  const anyAlert=alerted.length>0;
  // fight back at anything alerted, whatever state she's in
  aloy.fireT=(aloy.fireT|0)-1;
  if(!manual()&&closestAlert&&aloy.fireT<=0){fireArrow(closestAlert);aloy.fireT=22;}
  // buff clocks
  if(aloy.spdT>0)aloy.spdT--;
  if(aloy.invT>0)aloy.invT--;
  // scoop up loot and pry open supply crates she passes
  for(const it of loot)if(Math.hypot(it.x-aloy.x,it.y-aloy.y)<9){it.got=true;
    if(it.k==='heal'){aloy.hp=Math.min(5,aloy.hp+1.5);burst(it.x,it.y,8,'#7ed957',1.2);}
    else if(it.k==='pow'){power++;burst(it.x,it.y,8,'#ffd166',1.2);}
    else if(it.k==='spd'){aloy.spdT=480;burst(it.x,it.y,10,'#7ef0ff',1.5);ring(it.x,it.y,'#7ef0ff',1.4,22);}
    else if(it.k==='inv'){aloy.invT=360;burst(it.x,it.y,12,'#ffd166',1.8);ring(it.x,it.y,'#ffd166',1.8,26);}
    else{aloy.stamMax=Math.min(200,aloy.stamMax+15);aloy.stam=aloy.stamMax; // bigger lungs
      burst(it.x,it.y,10,'#ffe9a8',1.4);}}
  loot=loot.filter(it=>!it.got);
  for(const cr of crates)if(Math.hypot(cr.x-aloy.x,cr.y-aloy.y)<10){cr.got=true;power+=3;
    aloy.stamMax=Math.min(200,aloy.stamMax+10);aloy.stam=aloy.stamMax; // gear tune-up
    SHOW.offer({id:'crate',tier:2,at:frame});fxBurst(cr.x,cr.y,10,'#ffd166',1.8);
    burst(cr.x,cr.y,14,'#ffd166',1.8);burst(cr.x,cr.y,8,'#7ef0ff',1.4);}
  crates=crates.filter(cr=>!cr.got);
  if(playing()||manual()){ // player at the reins
    // Shared sticky axes bridge the few dropped key frames some keyboards emit
    // when a dodge or sprint modifier lands on top of held movement.
    const move=readMove();let vx2=move.x,vy2=move.y;
    if(vx2||vy2){aloy.lmx=vx2;aloy.lmy=vy2;aloy.lmT=frame;}
    const sprint=keys.c&&(vx2||vy2)&&aloy.stam>1; // hold shift/Z to run (drains stamina)
    if(sprint)aloy.stam=Math.max(0,aloy.stam-0.4);
    else aloy.stam=Math.min(aloy.stamMax,aloy.stam+0.18);
    if(aloy.dodge>0){aloy.dodge--;aloy.x+=aloy.dvx;aloy.y+=aloy.dvy;aloy.dvx*=0.88;aloy.dvy*=0.88;
      if(frame%2===0)dust(aloy.x,aloy.y+3,1);}
    else{
      if(vx2||vy2){const l=Math.hypot(vx2,vy2);
        const sp=(sprint?1.5:0.9)*(aloy.spdT>0?1.4:1);
        aloy.x+=vx2/l*sp;aloy.y+=vy2/l*sp;aloy.walk+=sp;
        aloy.face=vx2>0?1:vx2<0?-1:aloy.face;
        if(sprint&&frame%5===0)dust(aloy.x-vx2*2,aloy.y+3,1);
        if(aloy.spdT>0&&frame%3===0)spawn({x:aloy.x-vx2*3,y:aloy.y+R(-2,2),t:12,c:'#7ef0ff'});}
      if(tap('a')){ // roll exactly the way you're moving — up, down, or diagonal
        aloy.dodge=15;aloy.rollO=0;
        let rx=vx2,ry=vy2;
        if(!rx&&!ry&&frame-(aloy.lmT||-99)<14){rx=aloy.lmx;ry=aloy.lmy;}
        const l=Math.hypot(rx,ry);
        if(l){aloy.dvx=rx/l*2.3;aloy.dvy=ry/l*2.3;}
        else{aloy.dvx=aloy.face*2.3;aloy.dvy=0;} // truly idle: roll the way she faces
      }
    }
    if(!sprint&&keys.b&&aloy.fireT<=0){ // loose an arrow at the nearest machine
      const best=nearest(machines,aloy,{filter:m=>!m.dead&&dist(m,aloy)<130});
      if(best){fireArrow(best);aloy.fireT=20;}
    }
    if(!anyAlert&&aloy.hp<5)aloy.hp=Math.min(5,aloy.hp+0.004);
    aloy.x=Math.max(6,Math.min(154,aloy.x));
    aloy.state=(vx2||vy2)?'trek':'hide'; // holding still in cover keeps her hidden
    aloy.tm=null;
    meters=Math.max(meters,Math.floor(-aloy.y/8));
    return;
  }
  // ADMIRE: after the apex kill the huntress stands over her trophy for a beat
  if(typeof __NO_ADMIRE==='undefined'&&showPres.admire&&!alerted.some(m=>dist(m,aloy)<70))return;
  // stampede awareness: break for cover at the call, roll clear of stragglers
  if(migPhase!=='calm'){
    const stampeder=nearest(machines,aloy,{filter:m=>!m.dead&&m.mig&&dist(m,aloy)<24});
    if(stampeder&&aloy.dodge<=0)aloyDodgeFrom(stampeder);
    if(aloy.state==='trek'&&!anyAlert){
      const c=bestBy(grass.concat(trees),g=>dist(g,aloy),{maximize:false});
      if(c){aloy.tgx=c.x;aloy.tgy=c.y;}
    }
    if(aloy.state==='hide')aloy.hideT=Math.max(aloy.hideT,30); // sit it out
  }
  // dodge overrides everything; mortar reticles override pathing
  const fleeRt=nearest(reticles,aloy,{filter:rt=>dist(rt,aloy)<24});
  const frD=fleeRt?dist(fleeRt,aloy):24;
  if(aloy.dodge>0){aloy.dodge--;aloy.x+=aloy.dvx;aloy.y+=aloy.dvy;aloy.dvx*=0.88;aloy.dvy*=0.88;
    if(frame%2===0)dust(aloy.x,aloy.y+3,1);}
  else if(fleeRt){const q=frD||1;
    aloy.x+=(aloy.x-fleeRt.x)/q*1.15;aloy.y+=(aloy.y-fleeRt.y)/q*1.15;aloy.walk+=1;}
  else if(aloy.state==='trek'||aloy.state==='retreat'){
    if(aloy.state==='trek'&&!anyAlert){ // detour to nearby pickups
      const best=nearest(loot.concat(crates),aloy,{filter:it=>dist(it,aloy)<70});
      if(best){aloy.tgx=best.x;aloy.tgy=best.y;}
    }
    const foe=closestAlert;
    if(foe&&dist(foe,aloy)<52){ // kite: back away while shooting
      const d2=dist(foe,aloy)||1;
      aloy.x+=(aloy.x-foe.x)/d2*0.85;aloy.y+=(aloy.y-foe.y)/d2*0.85;aloy.walk+=0.8;
    }else{
      const dx=aloy.tgx-aloy.x,dy=aloy.tgy-aloy.y,d=Math.hypot(dx,dy)||1;
      const open=!live.some(m=>dist(m,aloy)<105); // no machines around: run free
      const running=open&&d>36&&aloy.stam>30;
      let sp=anyAlert?0.95:(running?1.15:0.55);
      if(aloy.spdT>0)sp*=1.35;
      if(running&&!anyAlert)aloy.stam=Math.max(0,aloy.stam-0.28);
      else aloy.stam=Math.min(aloy.stamMax,aloy.stam+0.18);
      if(sp>1&&frame%6===0)dust(aloy.x,aloy.y+3,1);
      if(aloy.spdT>0&&frame%3===0)spawn({x:aloy.x-dx/d*3,y:aloy.y+R(-2,2),t:12,c:'#7ef0ff'});
      aloy.x+=dx/d*sp;aloy.y+=dy/d*sp;aloy.walk+=sp;aloy.face=dx>0.2?1:dx<-0.2?-1:aloy.face;
      if(d<5){if(aloy.state==='trek'){aloy.state='hide';aloy.hideT=80;}else aloy.state='hide',aloy.hideT=140;}
    }
  }else if(aloy.state==='aim'&&aloy.tm&&!aloy.tm.dead){
    const m=aloy.tm;
    if(m.detect>=100&&dist(m,aloy)<42){ // strafe from charger
      const px=-(m.y-aloy.y),py=(m.x-aloy.x),l=Math.hypot(px,py)||1;
      aloy.x+=px/l*0.5;aloy.y+=py/l*0.5;aloy.walk+=0.5;
      if(dist(m,aloy)<18&&aloy.dodge<=0){aloy.dodge=14;aloy.dvx=px/l*2;aloy.dvy=py/l*2;burst(aloy.x,aloy.y,4,'#cbd5c0',0.8);}
    }
  }
  aloy.x=Math.max(6,Math.min(154,aloy.x));
  // retreat trigger
  if(aloy.hp<=2&&aloy.state!=='retreat'){
    const best=bestBy(grass.concat(trees),g=>{
      let danger=0;for(const m of alerted)danger+=Math.max(0,120-dist(g,m));
      return danger*2+dist(g,aloy);
    },{maximize:false});
    if(best){aloy.state='retreat';aloy.tgx=best.x;aloy.tgy=best.y;aloy.tm=null;}
  }
  // heal while safe
  if(!anyAlert&&aloy.hp<5)aloy.hp=Math.min(5,aloy.hp+0.004);
  // state logic
  if(aloy.state==='hide'){
    if(aloy.hp>2||!anyAlert){
      const cands=live.filter(m=>dist(m,aloy)<95&&m.y<aloy.y+35);
      const target=nearest(cands,aloy);
      if(target){aloy.tm=target;aloy.state='aim';aloy.aim=40;}
      else{aloy.hideT--;if(aloy.hideT<=0){aloy.state='trek';pickGrass();}}
    }
  }else if(aloy.state==='aim'){
    const m=aloy.tm;
    if(!m||m.dead||dist(m,aloy)>115){aloy.tm=null;aloy.state='hide';aloy.hideT=45;}
    else{aloy.aim--;if(aloy.aim<=0){fireArrow(m);aloy.aim=(m.detect>=100)?24:42;}}
  }
  // incoming thunderjaw shots: dodge
  for(const s of shots){
    if(Math.hypot(s.x-aloy.x,s.y-aloy.y)<22&&aloy.dodge<=0&&random()<0.6){
      const px=-s.vy,py=s.vx,l=Math.hypot(px,py)||1,sgn=random()<0.5?1:-1;
      aloy.dodge=13;aloy.dvx=px/l*2.1*sgn;aloy.dvy=py/l*2.1*sgn;}
  }
  meters=Math.max(meters,Math.floor(-aloy.y/8));
}
function hurtAloy(n,sx,sy){
  if(aloy.down>0)return;
  if(aloy.invT>0){burst(aloy.x,aloy.y-3,6,'#ffd166',1.3);return;} // shield shrugs it off
  if(aloy.dodge>7)return; // mid-roll: untouchable
  aloy.hp-=n;burst(aloy.x,aloy.y,8,'#e05252',1.4);
  const d=Math.hypot(aloy.x-sx,aloy.y-sy)||1;
  aloy.dodge=12;aloy.rollO=0;aloy.dvx=(aloy.x-sx)/d*2.4;aloy.dvy=(aloy.y-sy)/d*2.4;
  if(aloy.hp<=0){
    burst(aloy.x,aloy.y,20,'#e05252',2);
    if(playing()){aloy.down=100000;gameOver(meters+'M');} // run ends where she falls
    else aloy.down=90;
  }
}
function aloyDodgeFrom(m){ // sidestep the dash — or roll straight back out of it
  if(aloy.dodge>0||aloy.down>0)return;
  const vx=aloy.x-m.x,vy=aloy.y-m.y,l=Math.hypot(vx,vy)||1;
  aloy.dodge=15;aloy.rollO=0;
  if(random()<0.3){aloy.dvx=vx/l*2.4;aloy.dvy=vy/l*2.4;}
  else{const px=-vy/l,py=vx/l,s=random()<0.5?1:-1;
    aloy.dvx=px*2.3*s;aloy.dvy=py*2.3*s;}
}

// ---------- migration act ----------
function stepMig(){
  if(typeof __NO_ACTS!=='undefined')return;
  if(migPhase==='calm'&&meters>=nextMigM){
    migPhase='warn';migT=0;
    SHOW.note({kind:'act-warning',id:'herd',at:frame,tag:frame});
    showBanner('HERD ON THE MOVE','#ffe66d',85);
  }else if(migPhase==='warn'&&++migT>=240){
    migPhase='live';migT=0;
    SHOW.note({kind:'act-land',id:'herd',at:frame,tag:frame});
    showBanner('STAMPEDE!','#ff9a4a',70);
    const n=6+kills%3; // herd size latched from sim state
    for(let i=0;i<n;i++)machines.push({type:'strider',x:12+i*136/(n-1)+R(-6,6),y:camY-30-R(0,70),
      hx:0,hy:0,hp:MT.strider.hp,detect:0,wt:0,tx:0,ty:0,face:1,atkCd:0,shotCd:60,hitT:0,burn:0,stun:0,
      dead:false,px:0,py:0,mode:'stampede',modeT:400,mvx:R(-0.15,0.15),mvy:2.2,pingT:0,orb:1,
      windCd:999,mortarCd:999,mig:1});
  }else if(migPhase==='live'&&++migT>=520){
    migPhase='calm';nextMigM=meters+300;
    SHOW.offer({id:'herd',tier:2,at:frame});
    showBanner('HERD PASSED','#7ed957',60);
  }
}

// ---------- machine ai ----------
function moveTo(m,tx,ty,sp){const dx=tx-m.x,dy=ty-m.y,dd=Math.hypot(dx,dy)||1;
  m.x+=dx/dd*sp;m.y+=dy/dd*sp;m.face=dx>0.1?1:dx<-0.1?-1:m.face;}
function machineUpdate(m){
  const t=MT[m.type];
  m.px+=(m.x-m.px)*0.5;m.py+=(m.y-m.py)*0.5;
  if(m.hitT>0)m.hitT--;
  if(m.atkCd>0)m.atkCd--;
  if(m.burn>0){m.burn--;m.hp-=0.012;
    if(frame%5===0)spawn({x:m.x+R(-4,4),y:m.y+R(-5,2),vx:R(-0.2,0.2),vy:R(-0.7,-0.2),t:14,c:'#ff9a4a'});
    if(m.hp<=0){killMachine(m);return;}}
  if(m.stun>0){m.stun--;
    if(frame%6===0)spawn({x:m.x+R(-6,6),y:m.y-t.h/2+R(-2,2),t:7,c:'#7ef0ff'});
    return;}
  const d=dist(m,aloy);
  // ---- committed action modes run regardless of detection
  if(m.mode==='windup'){m.modeT--;
    if(m.modeT<=0){
      const spd=m.type==='sawtooth'?3.0:2.6;
      const a=Math.atan2(aloy.y-m.y,aloy.x-m.x)+R(-0.06,0.06);
      m.mvx=Math.cos(a)*spd;m.mvy=Math.sin(a)*spd;
      m.mode=m.type==='sawtooth'?'pounce':'lunge';m.modeT=m.type==='sawtooth'?17:14;
      if(random()<0.85)aloyDodgeFrom(m); // she reads the leap
    }
    return;}
  if(m.mode==='pounce'||m.mode==='lunge'){
    m.x+=m.mvx;m.y+=m.mvy;m.modeT--;
    if(frame%2===0)dust(m.x-m.mvx*2,m.y-m.mvy*2+3,1);
    if(d<9&&m.atkCd<=0){m.atkCd=50;hurtAloy(m.type==='sawtooth'?2:1,m.x-m.mvx*3,m.y-m.mvy*3);}
    if(m.modeT<=0){m.mode='recover';m.modeT=m.type==='sawtooth'?42:55;}
    m.x=Math.max(8,Math.min(152,m.x));return;}
  if(m.mode==='recover'){m.modeT--;if(m.modeT<=0)m.mode=null;return;}
  if(m.mode==='stampede'){
    m.x+=m.mvx;m.y+=m.mvy;m.modeT--;
    if(frame%2===0)dust(m.x-m.mvx*2,m.y+3,1);
    if(d<8&&m.atkCd<=0){m.atkCd=60;hurtAloy(1,m.x-m.mvx*4,m.y-m.mvy*4);}
    if(m.modeT<=0){m.mode='flee';m.modeT=110;}
    m.x=Math.max(8,Math.min(152,m.x));return;}
  if(m.mode==='flee'){
    moveTo(m,m.x+(m.x-aloy.x),m.y+(m.y-aloy.y),1.5);
    if(frame%3===0)dust(m.x,m.y+3,1);
    m.modeT--;
    if(m.modeT<=0){m.mode=null;m.detect=0;m.hx=m.x;m.hy=m.y;}
    m.x=Math.max(8,Math.min(152,m.x));return;}
  // ---- detection with cover and line-of-sight
  const covered=inCover(aloy)&&aloy.state!=='trek';
  const blocked=losBlocked(m.x,m.y,aloy.x,aloy.y);
  if(aloy.down<=0&&d<t.sight&&!blocked)m.detect+=covered?0.25:(d<t.sight*0.5?2.4:1.3);
  else m.detect-=0.8;
  if(m.detect>=100&&(blocked||(inCover(aloy)&&d>46)))m.detect-=1.1;
  m.detect=Math.max(0,Math.min(100,m.detect));
  // ---- engaged: each machine fights its own way
  if(m.detect>=100&&aloy.down<=0){
    if(m.type==='watcher'){
      m.pingT--;
      if(m.pingT<=0){m.pingT=170;ring(m.x,m.y-5,'#ff5a4e',1.3,40); // alarm ping rallies the pack
        for(const o of machines)if(!o.dead&&o!==m&&dist(o,m)<75)o.detect=Math.min(100,o.detect+45);}
      if(d>44)moveTo(m,aloy.x,aloy.y,t.sp);
      else if(m.atkCd<=0){m.mode='windup';m.modeT=14;}
    }else if(m.type==='strider'){ // herd bolts together
      const stamp=random()<0.35;
      for(const o of machines)if(!o.dead&&o.type==='strider'&&dist(o,m)<75){
        if(stamp){const a=Math.atan2(aloy.y-o.y,aloy.x-o.x)+R(-0.25,0.25);
          o.mode='stampede';o.modeT=70;o.mvx=Math.cos(a)*1.9;o.mvy=Math.sin(a)*1.9;}
        else{o.mode='flee';o.modeT=120;}}
    }else if(m.type==='sawtooth'){ // circle, then a telegraphed pounce
      m.windCd--;
      const a=Math.atan2(aloy.y-m.y,aloy.x-m.x),tang=a+Math.PI/2*m.orb;
      const radial=Math.max(-0.8,Math.min(0.8,(d-55)*0.03));
      m.x+=Math.cos(tang)*0.95+Math.cos(a)*radial;
      m.y+=Math.sin(tang)*0.95+Math.sin(a)*radial;
      m.face=aloy.x>m.x?1:-1;
      if(random()<0.006)m.orb*=-1;
      if(m.windCd<=0&&d<80){m.mode='windup';m.modeT=24;m.windCd=RI(100,170);}
    }else{ // thunderjaw: hold artillery range
      if(d<45)moveTo(m,m.x+(m.x-aloy.x),m.y+(m.y-aloy.y),0.5);
      else if(d>90)moveTo(m,aloy.x,aloy.y,t.sp);
      else{const a=Math.atan2(aloy.y-m.y,aloy.x-m.x)+Math.PI/2*m.orb;
        m.x+=Math.cos(a)*0.35;m.y+=Math.sin(a)*0.35;m.face=aloy.x>m.x?1:-1;}
      m.shotCd--;
      if(m.shotCd<=0&&d>26&&d<95){m.shotCd=110;
        for(let i=-1;i<=1;i+=2){const a=Math.atan2(aloy.y-m.y,aloy.x-m.x)+i*0.09+R(-0.05,0.05);
          shots.push({x:m.x,y:m.y-4,vx:Math.cos(a)*1.7,vy:Math.sin(a)*1.7,life:90});}}
      m.mortarCd--;
      if(m.mortarCd<=0&&d<115&&reticles.length<6){m.mortarCd=300;
        for(let i=0;i<3;i++)reticles.push({x:aloy.x+R(-24,24),y:aloy.y+R(-24,24),t:55});}
      if(d<22&&m.atkCd<=0){m.atkCd=90;ring(m.x,m.y,'#ffd166',1.6,18); // tail sweep
        if(dist(m,aloy)<28)hurtAloy(2,m.x,m.y);}
    }
  }else if(m.detect>=45&&aloy.down<=0){moveTo(m,aloy.x,aloy.y,t.sp*0.4);}
  else{m.wt--;
    if(m.wt<=0){m.wt=RI(60,160);m.tx=m.hx+R(-26,26);m.ty=m.hy+R(-20,20);}
    const dd=Math.hypot(m.tx-m.x,m.ty-m.y);
    if(dd>3)moveTo(m,m.tx,m.ty,t.sp*0.28);}
  m.x=Math.max(8,Math.min(152,m.x));
}

// ---------- projectiles / fx ----------
function projUpdate(){
  for(const a of arrows){a.x+=a.vx;a.y+=a.vy;a.life--;
    for(const m of machines){if(m.dead)continue;const t=MT[m.type];
      if(Math.abs(a.x-m.x)<t.w/2+2&&Math.abs(a.y-m.y)<t.h/2+3){
        const crit=random()<0.22,dmg=(a.dmg||1)+(crit?1:0);
        m.hp-=dmg;m.hitT=6;m.detect=Math.min(100,m.detect+60);
        if(a.fire)m.burn=100;
        if(a.shock&&random()<0.35)m.stun=60;
        burst(a.x,a.y,5,'#ffe28a',1.1);
        if(crit)burst(a.x,a.y,9,'#ffd166',1.9);
        if(m.hp<=0)killMachine(m);
        a.life=0;break;}}}
  arrows=arrows.filter(a=>a.life>0);
  for(const s of shots){s.x+=s.vx;s.y+=s.vy;s.life--;
    if(aloy.down<=0&&Math.hypot(s.x-aloy.x,s.y-aloy.y)<5){hurtAloy(1,s.x-s.vx*4,s.y-s.vy*4);s.life=0;}}
  shots=shots.filter(s=>s.life>0);
  for(const rt of reticles){rt.t--; // mortar shells land
    if(rt.t<=0){burst(rt.x,rt.y,14,'#ff8a4a',2);burst(rt.x,rt.y,8,'#ffd166',1.4);
      if(aloy.down<=0&&Math.hypot(rt.x-aloy.x,rt.y-aloy.y)<15)hurtAloy(1,rt.x,rt.y);}}
  reticles=reticles.filter(rt=>rt.t>0);
}

function drawMachine(m){

  }else{
    rect(x-9+(leg?2:0),y+5,4,4,trim);rect(x+6-(leg?2:0),y+5,4,4,trim);
    rect(x-13,y-4,26,10,body);rect(x-f*15,y-2,5,3,body);

function drawAloy(){
  const x=aloy.x,y=aloy.y-camY,hidden=inCover(aloy);
  if(aloy.down>0){ctx.globalAlpha=0.7;rect(x-4,y-1,8,3,'#8a3b2a');rect(x-2,y-2,4,2,'#2e5f6e');ctx.globalAlpha=1;return;}
  if(aloy.invT>0){ // golden ward shimmer
    ctx.globalAlpha=(0.3+0.14*Math.sin(frame*0.3))*(aloy.invT<80?aloy.invT/80:1);
    ctx.fillStyle='#ffd166';ctx.beginPath();ctx.arc(x,y-3,8,0,7);ctx.fill();ctx.globalAlpha=1;
  }
  if(aloy.spdT>0){ // slipstream glow
    ctx.globalAlpha=(0.22+0.1*Math.sin(frame*0.4))*(aloy.spdT<80?aloy.spdT/80:1);
    ctx.fillStyle='#7ef0ff';ctx.beginPath();ctx.arc(x,y-3,6,0,7);ctx.fill();ctx.globalAlpha=1;
  }
  if(aloy.dodge>0){ // tucked roll: the spin follows the direction of travel
    for(let g=1;g<=2;g++){ctx.globalAlpha=0.18/g;
      rect(x-aloy.dvx*g*2-2,y-aloy.dvy*g*2-3,5,5,'#c94f2e');}
    ctx.globalAlpha=1;
    const dl=Math.hypot(aloy.dvx,aloy.dvy)||1;
    const ux=aloy.dvx/dl,uy=aloy.dvy/dl;
    aloy.rollO=(aloy.rollO||0)+dl*0.9; // texture scrolls with speed, like the ball
    const o=((aloy.rollO%8)+8)%8-4;
    rect(x-2,y-4,5,5,'#2e5f6e');
    rect(x-1+ux*o,y-3+uy*o,3,2,'#c94f2e'); // hair band sweeps through the tuck
    return;
  }
  if(hidden)ctx.globalAlpha=0.62;
  const step=Math.floor(aloy.walk/4)%2;
  rect(x-2+(step?1:0),y+2,2,3,'#3e2c20');rect(x+(step?0:1),y+2,2,3,'#3e2c20');
  rect(x-2,y-3,5,5,'#2e5f6e');
  rect(x-1,y-6,3,3,'#e8b08a');
  rect(x-3,y-8,7,3,'#c94f2e');rect(x-2,y-5,2,4,'#c94f2e');rect(x+2,y-5,2,3,'#c94f2e');
  if(aloy.state==='aim'&&aloy.tm&&!aloy.tm.dead){
    const m=aloy.tm,dx=m.x-aloy.x,dy=m.y-aloy.y,d=Math.hypot(dx,dy)||1;
    ctx.strokeStyle='#d9c58a';ctx.beginPath();
    ctx.arc(x+dx/d*3,y-2+dy/d*3,3,Math.atan2(dy,dx)-1.2,Math.atan2(dy,dx)+1.2);ctx.stroke();
    ctx.globalAlpha=(hidden?0.62:1)*0.35;
    ctx.strokeStyle='#ffffff';ctx.beginPath();ctx.moveTo(x,y-2);
    ctx.lineTo(x+dx/d*Math.min(d,26),y-2+dy/d*Math.min(d,26));ctx.stroke();
  }
  ctx.globalAlpha=1;
}
function drawHUD(){
  ctx.globalAlpha=0.55;rect(0,0,W,14,'#0a0f14');ctx.globalAlpha=1;
  rect(3,4,5,5,'#39424d');glowDot(5.5,6.5,'#41e8ff',1.5);

  rect(3,22,sw+2,3,'#1d1a12');

  for(let i=0;i<=tr;i++)rect(4+i*5,27,3,3,ACOL[tr]);
  if(migPhase!=='calm'){ // migration chevrons streaming down the top edge
    ctx.globalAlpha=migPhase==='live'?.7:.3+.2*Math.sin(frame*.18);
    ctx.strokeStyle='#ffe66d';
    for(let i=0;i<3;i++){
      const y=34+(frame*(migPhase==='live'?1.4:.5)+i*20)%56;
      for(const x of[24,80,136]){
        ctx.beginPath();ctx.moveTo(x-3,y-3);ctx.lineTo(x,y);ctx.lineTo(x+3,y-3);ctx.stroke();
      }
    }
    ctx.globalAlpha=1;
  }
  if(bannerT>0){
    const a=Math.min(1,bannerT/15);
    ctx.globalAlpha=.7*a;rect(14,92,W-28,20,'#0a0f14');ctx.globalAlpha=a;
    ctx.strokeStyle=bannerC;ctx.strokeRect(14.5,92.5,W-29,19);
    ctx.fillStyle=bannerC;ctx.font='bold 8px monospace';
    ctx.fillText(bannerS,80-bannerS.length*2.4,105);ctx.globalAlpha=1;
  }
  drawSession();
}

// ---------- main loop ----------
function step(){
  frame++;
  sessionStep({reset:resetGame});
  const pres=showPres=SHOW.step(frame); // thunderjaw: 6f hitstop, 24f at 1/3 speed
  if(bannerT>0)bannerT--;
  while(genY>aloy.y-500)genBand();
  const cutoff=camY+H+160;
  grass=grass.filter(g=>g.y<cutoff);deco=deco.filter(d=>d.y<cutoff);
  machines=machines.filter(m=>m.y<cutoff&&!(m.dead));
  corpses=corpses.filter(c=>c.y<cutoff);
  loot=loot.filter(it=>it.y<cutoff);crates=crates.filter(cr=>cr.y<cutoff);
  trees=trees.filter(t=>t.y<cutoff);rocks=rocks.filter(b=>b.y<cutoff);
  if(!pres.holdWorld&&frame%pres.physicsEvery===0){
    stepMig();
    aloyUpdate();
    for(const m of machines)if(!m.dead)machineUpdate(m);
    projUpdate();
    const tr=tier();
    if(tr>lastTier){lastTier=tr;SHOW.offer({id:'tierup',tier:2,at:frame,tag:tr});
      fxBurst(aloy.x,aloy.y-4,12,ACOL[tr],2);showBanner('BOW TIER UP','#7ef0ff',60);}
  }
  stepParts();stepRings();
  camY+=((aloy.y-235)-camY)*0.08;
  // Shared watchdog preserves the old two-stage recovery: re-plan at 30s,
  // then force a respawn after another 30s without a new distance record.
  const progress=progressWatch.observe(meters,frame);
  if(progress.progressed){if(playing())addScore(meters-lastMeters);lastMeters=meters;}
  else if(progress.event){
    aloy.state='trek';aloy.tm=null;aloy.dodge=0;pickGrass();
    if(progress.event.action==='reset'){aloy.down=60;progressWatch.reset(meters,frame);}
  }
}
function render(){
  drawGround();
  for(const g of grass)drawGrassBase(g);
  for(const c of corpses)drawCorpse(c);
  for(const b of rocks)drawRock(b);
  for(const rt of reticles)drawReticle(rt);
  for(const d of deco)drawDeco(d);
  for(const t of trees)drawTrunk(t);
  for(const g of grass)drawGrassTufts(g);
  for(const cr of crates){const y=cr.y-camY;
    ctx.globalAlpha=0.3+Math.sin(frame*0.1)*0.15;
    ctx.fillStyle='#41e8ff';ctx.beginPath();ctx.arc(cr.x,y-2,7,0,7);ctx.fill();ctx.globalAlpha=1;
    rect(cr.x-4,y-5,8,6,'#7a5a34');rect(cr.x-4,y-3,8,1,'#41e8ff');rect(cr.x-1,y-5,2,6,'#5a4226');}
  for(const it of loot){const y=it.y-camY+Math.sin(frame*0.15+it.x);
    if(it.k==='heal'){rect(it.x-1,y-3,2,6,'#7ed957');rect(it.x-3,y-1,6,2,'#7ed957');}
    else if(it.k==='pow'){rect(it.x-1,y-2,3,3,'#ffd166');rect(it.x,y-3,1,5,'#ffe9a8');}
    else if(it.k==='spd'){rect(it.x-2,y-3,2,2,'#7ef0ff');rect(it.x,y-1,2,2,'#7ef0ff');rect(it.x-2,y+1,2,2,'#7ef0ff');}
    else if(it.k==='inv'){rect(it.x-2,y-2,5,5,'#ffd166');rect(it.x-1,y-1,3,3,'#fff7dd');}
    else{rect(it.x-1,y-2,3,5,'#ffe9a8');rect(it.x,y-4,1,2,'#e8ecf2');}}
  for(const s of shots){glowDot(s.x,s.y-camY,'#ff5a4e',1.5);}
  for(const a of arrows){ctx.strokeStyle=a.col||'#d9c58a';
    ctx.beginPath();ctx.moveTo(a.x,a.y-camY);ctx.lineTo(a.x-a.vx*1.6,a.y-a.vy*1.6-camY);ctx.stroke();}
  for(const m of machines)if(!m.dead)drawMachine(m);
  drawAloy();
  if(inGrass(aloy)&&aloy.down<=0){const g=grass.find(g=>Math.hypot(aloy.x-g.x,aloy.y-g.y)<g.r);if(g)drawGrassTufts(g);}
  for(const t of trees)drawCanopy(t);
  drawParts(camY);
  drawRings(camY);
  drawHUD();
}
initSession('horizon',[['ARROWS','MOVE'],['X','SHOOT \u00b7 AUTO-AIM'],['SPACE','DODGE ROLL'],['SHIFT','SPRINT']]);
resetGame();
start(f=>{step();},()=>{render();});
</script>
