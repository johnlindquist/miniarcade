<title>APOGEE FOUNDRY</title>
<style>
  html,body{margin:0;height:100%;background:#030713}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;
    image-rendering:pixelated;background:#050a18}
  canvas:focus-visible{outline:2px solid #73f3ff;outline-offset:-3px}
</style>
<canvas id="cv" width="320" height="720" tabindex="0"
  aria-label="Apogee Foundry. Pilot an orbital tug, capture salvage, and build a luminous habitat ring."></canvas>
<script src="engine.js"></script>
<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,random,R,RI,hash,clamp,rect,spawn,burst,stepParts,drawParts,ring,stepRings,drawRings,
  shake,preDraw,postDraw,start,keys,tap,manual,initSession,sessionStep,drawSession,playing,addScore,gameOver,
  createShow,fxBurst}=E;
const{controllerMux}=AI;

// A compact, honest orbital toy. Runtime and planner both call integrateBody;
// planning only copies numeric state and never touches either engine RNG stream.
const CX=80,CY=187,MU=1.15,PLANET_R=31,SAFE_R=41,WORLD_R=124;
const TAU=Math.PI*2,THRUST=.00175,TETHER_LEN=9,PLAN_LINE_WIDTH=2.35;
const MISSION_FRAMES=15*60*60,IGNITE_AT=13*60*60+20*60,PROMPT_IGNITION_FRAMES=5*60,SEGMENT_GOAL=12;
const STAGES=[
  {name:'RELAY',radius:44,parts:1,upgrade:'TANKS +25'},
  {name:'HABITAT',radius:51,parts:2,upgrade:'TRACTOR MK II'},
  {name:'CROWN',radius:59,parts:2,upgrade:'SHIELD + AUTHORITY'}
];
const INSTALL_AT=[1500,3600,6000,8400,10800,13800,16800,20400,25200,30600,37800,45000];
const PALE='#dcecff',CYAN='#72f1ff',BLUE='#478cff',GOLD='#ffd166',CORAL='#ff6b6b',
  GREEN='#73e6a2',INK='#071021',VIOLET='#b89cff';

let frame=0,showFrame=0,missionFrame=0,state='flight',stateT=0,finishReason='';
let nextId=1,dockAngle=0,targetId=0,targetSince=0,plan=null,planT=0,burnWas=false,tractorLatched=false;
let act={kind:'none',phase:'calm',warnAt:0,landAt:0,endAt:0,angle:0,index:0};
let tug=null,cargo=null,salvage=[],fragments=[],debris=[],texts=[];
let segments=0,segmentParts=0,buildParts=0,partsSpent=0,reserveParts=0,ringLevel=0,ignited=false,
  finalConstructionFrame=-1,ignitionFrame=-1,lastProgressFrame=0,lastEventFrame=0;
let persona=null,lapseActive=false;
const stats={captures:0,docks:0,collisions:0,skims:0,crashes:0,relaunches:0,fragmentsMade:0,
  fragmentRecoveries:0,burns:0,lapses:0,segments:0,ignitions:0,actsWarned:0,actsLanded:0,
  fuelRecovered:0,maxEventLull:0,maxProgressLull:0,minFuel:100,maxHeat:0,plannerCalls:0,
  plannerSteps:0,firstCapture:-1,lastCapture:-1,fragmentBounces:0,depotLandings:0,depotLaunches:0,
  rangeRetrievals:0,invisibleResets:0,invisibleVelocityResets:0,maxFragmentStep:0,maxFragmentCorrection:0,
  maxSilentFragmentDv:0,admireCommands:0,targetReplans:0,calibrations:0,recoveryCommands:0};
const lifetime={events:0,progress:0,missions:0};

const SHOW=createShow({queueLimit:3,recoveryGap:75,tiers:{
  1:{frames:14,minGap:10},
  2:{frames:54,minGap:90},
  3:{frames:108,minGap:600,hold:6,slowEvery:3,slowFrames:24,admire:60}
}});

const PERSONAS=[
  {name:'PATIENT PHASER',risk:.34,lead:1.18,cutoff:26,tint:CYAN},
  {name:'LOW SKIMMER',risk:.72,lead:.88,cutoff:18,tint:GOLD},
  {name:'RECYCLER',risk:.5,lead:1.02,cutoff:22,tint:GREEN}
];

const angleWrap=a=>{a=(a+Math.PI)%TAU;if(a<0)a+=TAU;return a-Math.PI;};
const radius=b=>Math.hypot(b.x-CX,b.y-CY);
const speed=b=>Math.hypot(b.vx,b.vy);
const relSpeed=(a,b)=>Math.hypot(a.vx-b.vx,a.vy-b.vy);
const finiteBody=b=>b&&['x','y','vx','vy'].every(k=>Number.isFinite(b[k]));
const circularSpeed=r=>Math.sqrt(MU/r);
const buildStage=()=>Math.min(2,Math.floor(segments/4));
const stageSpec=()=>STAGES[buildStage()];
const partsRequired=()=>stageSpec().parts;
const fuelCapAt=level=>100+(level>=1?25:0),fuelCap=()=>fuelCapAt(ringLevel);
const tractorRadiusAt=level=>13+(level>=2?3:0),tractorRadius=()=>tractorRadiusAt(ringLevel);
const turnAuthorityAt=level=>.045+(level>=2?.004:0)+(level>=3?.008:0),turnAuthority=()=>turnAuthorityAt(ringLevel);
const tetherScaleAt=level=>level>=2?1.3:1,tetherScale=()=>tetherScaleAt(ringLevel);
const shieldLimitAt=level=>.38+(level>=3?.09:0),shieldLimit=()=>shieldLimitAt(ringLevel);
const upgradeState=()=>({stage:stageSpec().name,tanks:ringLevel>=1,tractor:ringLevel>=2,
  shield:ringLevel>=3,authority:ringLevel>=3,fuelCap:fuelCap(),tractorRadius:tractorRadius(),
  turnAuthority:turnAuthority(),shieldLimit:shieldLimit()});
const viewerStoryEnabled=()=>typeof __NO_VIEWER_STORY==='undefined'&&typeof __NO_MISSION_STORY==='undefined';
const bodyAt=(r,a,clockwise,id,kind)=>{
  const v=circularSpeed(r)*(clockwise===false?-1:1),tx=-Math.sin(a),ty=Math.cos(a);
  return{id:id||nextId++,kind:kind||'salvage',x:CX+Math.cos(a)*r,y:CY+Math.sin(a)*r,
    vx:tx*v,vy:ty*v,mass:kind==='tug'?1.5:kind==='debris'?.28:.52,dead:false,heat:0};
};
function gravityAt(x,y){
  const dx=x-CX,dy=y-CY,r2=Math.max(64,dx*dx+dy*dy),r=Math.sqrt(r2),a=-MU/(r2*r);
  return{x:dx*a,y:dy*a};
}
function integrateBody(b,ax,ay){
  const g=gravityAt(b.x,b.y);b.vx+=g.x+(ax||0);b.vy+=g.y+(ay||0);b.x+=b.vx;b.y+=b.vy;return b;
}
function propagateBody(source,steps,thrustAngle,burnFrames,power){
  const b={x:source.x,y:source.y,vx:source.vx,vy:source.vy};
  const p=power===undefined?THRUST:power;
  for(let i=0;i<steps;i++){
    const on=thrustAngle!==undefined&&i<(burnFrames||0),ax=on?Math.cos(thrustAngle)*p:0,ay=on?Math.sin(thrustAngle)*p:0;
    integrateBody(b,ax,ay);
  }
  return b;
}
function orbitalEnergy(b){return .5*(b.vx*b.vx+b.vy*b.vy)-MU/Math.max(1,radius(b));}
function orbitElements(b){
  const dx=b.x-CX,dy=b.y-CY,r=Math.hypot(dx,dy),v2=b.vx*b.vx+b.vy*b.vy,
    energy=.5*v2-MU/r,h=dx*b.vy-dy*b.vx,e=Math.sqrt(Math.max(0,1+2*energy*h*h/(MU*MU))),
    a=energy<0?-MU/(2*energy):Infinity;
  return{r,energy,h,e,peri:Number.isFinite(a)?a*(1-e):0,apo:Number.isFinite(a)?a*(1+e):Infinity};
}
function dockStateAt(slot,lead,baseAngle,stage){
  stage=stage===undefined?buildStage():stage;const spec=STAGES[stage],r=spec.radius,
    omega=Math.sqrt(MU/(r*r*r)),a=(baseAngle===undefined?dockAngle:baseAngle)+stage*.12+(slot||0)*TAU/4+(lead||0)*omega;
  return{x:CX+Math.cos(a)*r,y:CY+Math.sin(a)*r,
    vx:-Math.sin(a)*r*omega,vy:Math.cos(a)*r*omega,angle:a,radius:r,omega,stage};
}
const dockState=(slot,lead)=>dockStateAt(slot,lead,dockAngle,buildStage());
function nearestDockAt(from,baseAngle,stage){
  let best=null,bestD=Infinity;
  for(let i=0;i<4;i++){const d=dockStateAt(i,0,baseAngle,stage),q=Math.hypot(d.x-from.x,d.y-from.y);if(q<bestD){bestD=q;best={...d,slot:i};}}
  return best;
}
const nearestDock=from=>nearestDockAt(from,dockAngle,buildStage());

// Render-only mission vocabulary. Every draw helper and the eval probe read this
// same projection so presentation can never invent progress the simulation did
// not earn. Neither switch changes simulation state or consumes RNG.
function missionStory(){
  const available=salvage.filter(s=>!s.dead&&!s.captured),chosen=available.find(s=>s.id===targetId),
    focus=cargo||chosen||available[0]||null,banked=Math.max(0,buildParts-partsSpent),need=segments<SEGMENT_GOAL?partsRequired():0,
    socket=segments<SEGMENT_GOAL?dockState(segments%4,0):null,destination=cargo?nearestDock(cargo):socket,
    socketDistance=cargo&&destination?Math.hypot(cargo.x-destination.x,cargo.y-destination.y):Infinity,
    verb=ignited?'RING ONLINE':cargo?(socketDistance<24?'PLACE PART':'TOW TO DOCK'):'GET SCRAP';
  return{enabled:viewerStoryEnabled(),label:'BUILD RING '+segments+'/'+SEGMENT_GOAL,verb,
    partsText:'USED '+partsSpent+'/20  DEPOT '+banked,
    completionText:ignited?'20 PARTS · 12 SECTIONS · ONLINE':'',
    focusId:focus&&focus.id||0,dominantTargets:focus?1:0,targetRole:cargo?'cargo':focus?'salvage':'none',
    installedSlots:segments,emptySlots:SEGMENT_GOAL-segments,bankedParts:banked,
    socketParts:Math.min(banked,need),queuedParts:Math.max(0,banked-need),socketCount:need,
    socket:socket&&{x:socket.x,y:socket.y,slot:segments%4},destination:destination&&{x:destination.x,y:destination.y},
    socketDistance:Number.isFinite(socketDistance)?socketDistance:null,
    fuelWarning:tug&&tug.fuel<30,heatWarning:tug&&tug.heat>55};
}

function say(s,c,x,y,t){texts.push({s,c:c||PALE,x:x===undefined?80:x,y:y===undefined?58:y,t:t||72});}
function markEvent(n){lifetime.events+=n||1;lastEventFrame=frame;}
function markProgress(n){lifetime.progress+=n||1;lastProgressFrame=frame;}
function offer(id,tier,x,y,tag){SHOW.offer({id,tier,at:showFrame,x,y,tag});}

function spawnSalvage(kind){
  const idx=nextId,r=72+RI(0,3)*9+(idx%2)*3,a=R(-Math.PI,Math.PI),b=bodyAt(r,a,true,nextId++,kind||'salvage');
  b.spin=R(-.045,.045);b.shape=RI(0,2);b.value=kind==='fragment'?1:2;b.age=0;b.targeted=false;
  salvage.push(b);return b;
}
function ensureSalvage(){while(salvage.filter(s=>!s.dead&&!s.captured).length<5)spawnSalvage();}
function pickTarget(){
  let candidates=salvage.filter(s=>!s.dead&&!s.captured&&!s.recoverCd&&!s.targetCd&&(s.kind!=='fragment'||radius(s)>40));
  if(!candidates.length)candidates=salvage.filter(s=>!s.dead&&!s.captured&&!s.targetCd&&s.kind!=='fragment');
  if(!candidates.length)return null;
  const phaseAware=typeof __NO_PHASE_PLAN==='undefined',shipFuture=phaseAware?[90,180,270].map(h=>propagateBody(tug,h)):null;
  let best=candidates[0],scoreBest=Infinity;
  for(const s of candidates){
    const d=Math.hypot(s.x-tug.x,s.y-tug.y),frag=s.kind==='fragment'?-4:0,
      personaBias=persona.name==='RECYCLER'&&s.kind==='fragment'?-8:0;
    let score=d;
    if(phaseAware)score=Math.min(...[90,180,270].map((h,i)=>{const tp=propagateBody(s,h),sp=shipFuture[i];
      return Math.hypot(tp.x-sp.x,tp.y-sp.y)+relSpeed(tp,sp)*42+h*.004;}));
    score+=frag+personaBias;
    if(score<scoreBest){scoreBest=score;best=s;}
  }
  return best;
}

// Discrete copied-state burn/coast search. Candidate state propagation is the
// same semi-implicit integrator used by runtime, and all loops are pure math.
function phasePlan(ship,target,mode){
  stats.plannerCalls++;
  const horizons=mode==='dock'?[72,126,210]:[90,168,264],burns=[18,34],candidates=[];
  for(const h of horizons){
    let tp;
    if(mode==='dock'){
      const r=target.radius,omega=target.omega,a=target.angle+omega*h;
      tp={x:CX+Math.cos(a)*r,y:CY+Math.sin(a)*r,
        vx:-Math.sin(a)*r*omega,vy:Math.cos(a)*r*omega};
    }else tp=propagateBody(target,h);
    const dx=tp.x-ship.x,dy=tp.y-ship.y,
      guide=Math.atan2((tp.vy-ship.vy)+(dy/h)*persona.lead,(tp.vx-ship.vx)+(dx/h)*persona.lead),
      direct=Math.atan2(dy,dx),pro=Math.atan2(ship.x-CX,-(ship.y-CY)),headings=[guide,direct,pro,pro+Math.PI];
    for(const burn of burns)for(const heading of headings){
      const sp=propagateBody(ship,h,heading,burn),dist=Math.hypot(sp.x-tp.x,sp.y-tp.y),rv=relSpeed(sp,tp),
        el=orbitElements(sp),clearance=Math.max(0,SAFE_R-el.peri),outer=Math.max(0,el.apo-WORLD_R),
        spectacle=Math.abs(angleWrap(Math.atan2(tp.y-CY,tp.x-CX)-Math.atan2(ship.y-CY,ship.x-CX)));
      const score=dist+rv*64+clearance*8+outer*5+burn*.012-spectacle*persona.risk*.35;
      candidates.push({heading,burn,horizon:h,score,point:{x:tp.x,y:tp.y},predicted:sp,rv,dist});
      stats.plannerSteps+=h;
    }
  }
  candidates.sort((a,b)=>a.score-b.score||a.horizon-b.horizon||a.burn-b.burn);
  return candidates[0];
}

function actSchedule(){
  if(typeof __NO_ACTS!=='undefined'){act.kind='none';act.phase='calm';return;}
  const events=[
    {kind:'flare',at:7200,warn:240,live:720},{kind:'debris',at:15000,warn:210,live:480},
    {kind:'flare',at:27800,warn:240,live:720},{kind:'debris',at:38000,warn:210,live:480}
  ];
  const e=events.find((q,i)=>missionFrame>=q.at&&missionFrame<q.at+q.warn+q.live&&i>=act.index);
  if(!e){if(act.phase!=='calm'&&missionFrame>=act.endAt){act={kind:'none',phase:'calm',warnAt:0,landAt:0,endAt:0,angle:0,index:act.index+1};}return;}
  if(act.phase==='calm'){
    act={kind:e.kind,phase:'warn',warnAt:e.at,landAt:e.at+e.warn,endAt:e.at+e.warn+e.live,
      angle:Math.atan2(tug.y-CY,tug.x-CX),index:events.indexOf(e),cargoHit:0};
    stats.actsWarned++;SHOW.note({kind:'act-warning',id:e.kind,at:showFrame,tag:missionFrame,landsAt:e.at+e.warn});
    say(e.kind==='flare'?'SOLAR FLARE INBOUND':'DEBRIS CONJUNCTION',e.kind==='flare'?GOLD:CORAL,80,53,100);
  }
  if(act.phase==='warn'&&missionFrame>=act.landAt){
    act.phase='live';stats.actsLanded++;SHOW.note({kind:'act-land',id:act.kind,at:showFrame,tag:missionFrame});
    if(act.kind==='debris')spawnDebrisTrain();
    say(act.kind==='flare'?'FLARE IMPACT':'CROSSING NOW',CORAL,80,53,75);shake(3);
  }
  if(act.phase==='live'&&missionFrame>=act.endAt){
    SHOW.note({kind:'act-end',id:act.kind,at:showFrame,tag:missionFrame});act.phase='calm';act.index++;
  }
}
function spawnDebrisTrain(){
  debris=[];const a=act.angle+Math.PI/2,ux=Math.cos(a),uy=Math.sin(a),px=-uy,py=ux;
  for(let i=-3;i<=3;i++){
    const along=i*11,across=-86-i*4;
    debris.push({id:nextId++,kind:'debris',x:CX+ux*along+px*across,y:CY+uy*along+py*across,
      vx:px*.34,vy:py*.34,mass:.22,life:620,dead:false});
  }
}

function humanIntent(){
  return{turn:(keys.right?1:0)-(keys.left?1:0),thrust:keys.up?1:0,retro:keys.down?1:0,
    tractor:tap('a'),release:false,targetId,tactic:keys.down?'RETRO':keys.up?'BURN':'COAST'};
}
function rangeSafety(ship){
  const r=radius(ship),radial=((ship.x-CX)*ship.vx+(ship.y-CY)*ship.vy)/Math.max(1,r),energy=orbitalEnergy(ship);
  if((r>105&&radial>0)||energy>-.0015)return{heading:Math.atan2(-ship.vy,-ship.vx),tactic:'BRAKE APOGEE'};
  return null;
}
function pursuitRecoveryGuidance(ship,d){
  d=d||nearestDock(ship);const g=serviceGuidance(ship,d);
  return{...g,tactic:g.tactic==='BRAKE APOGEE'?'RECOVER ARC':'CALIBRATE DOCK'};
}
function pursuitRecoveryIntent(){
  const g=pursuitRecoveryGuidance(tug),err=angleWrap(g.heading-tug.angle);stats.recoveryCommands++;
  if(g.dist<10&&g.rv<.28&&calibrateDock())return{turn:0,thrust:0,retro:0,tractor:false,release:false,targetId:0,tactic:'CALIBRATION LOCK'};
  tug.replanT=Math.max(0,(tug.replanT||0)-1);
  return{turn:clamp(err/.5,-1,1),thrust:Math.abs(err)<.48?1:0,retro:0,tractor:false,release:false,targetId:0,tactic:g.tactic};
}
function serviceGuidance(ship,d){
  const dist=Math.hypot(ship.x-d.x,ship.y-d.y),rv=relSpeed(ship,d),h=clamp(Math.round(dist*3),30,120),
    omega=d.omega,a=d.angle+omega*h,r=d.radius,p={x:CX+Math.cos(a)*r,y:CY+Math.sin(a)*r,
      vx:-Math.sin(a)*r*omega,vy:Math.cos(a)*r*omega},
    dvx=(p.vx-ship.vx)+(p.x-ship.x)/h*1.4,dvy=(p.vy-ship.vy)+(p.y-ship.y)/h*1.4,
    normalHeading=Math.atan2(dvy,dvx),safe=rangeSafety(ship),heading=safe?safe.heading:normalHeading;
  return{dist,rv,h,point:p,heading,need:Math.hypot(dvx,dvy),tactic:safe?safe.tactic:'SERVICE DOCK'};
}
function dockGuidance(ship,load,dockNow,actState){
  const dd=Math.hypot(load.x-dockNow.x,load.y-dockNow.y),rv=relSpeed(load,dockNow),
    guideH=clamp(Math.round(dd*3.2),36,150),omega=dockNow.omega,r=dockNow.radius,
    ga=dockNow.angle+omega*guideH,gp={x:CX+Math.cos(ga)*r,y:CY+Math.sin(ga)*r,
      vx:-Math.sin(ga)*r*omega,vy:Math.cos(ga)*r*omega},
    dvx=(gp.vx-ship.vx)+(gp.x-ship.x)/guideH*1.45,dvy=(gp.vy-ship.vy)+(gp.y-ship.y)/guideH*1.45;
  let heading=Math.atan2(dvy,dvx),tactic=dd<22?'CIRCULARIZE':'RETURN';
  if(actState.phase==='warn'){
    if(actState.kind==='flare'){heading=Math.atan2(CY-ship.y,CX-54-ship.x);tactic='SEEK SHADOW';}
    else{const sr=radius(ship),goal=sr<73?88:58,ang=Math.atan2(ship.y-CY,ship.x-CX);heading=Math.atan2(CY+Math.sin(ang)*goal-ship.y,CX+Math.cos(ang)*goal-ship.x);tactic='DODGE ORBIT';}
  }
  {const sr=radius(ship),radial=((ship.x-CX)*ship.vx+(ship.y-CY)*ship.vy)/Math.max(1,sr);
    if((sr<42||radius(load)<35)&&radial<0){heading=Math.atan2(ship.x-CX,-(ship.y-CY));tactic='RAISE';}}
  {const safe=rangeSafety(ship);if(safe){heading=safe.heading;tactic=safe.tactic;}}
  return{heading,need:Math.hypot(dvx,dvy),point:gp,tactic,dd,rv,guideH};
}
function captureGuidance(ship,target,currentPlan,actState,usePhase){
  const d=Math.hypot(target.x-ship.x,target.y-ship.y),rv=relSpeed(ship,target);let heading,need=1,point={x:target.x,y:target.y},tactic=usePhase?'PHASE':'CHASE';
  if(!usePhase)heading=Math.atan2(target.y-ship.y,target.x-ship.x);
  else{
    const h=clamp(Math.round(d*3.4),30,Math.max(36,currentPlan.horizon)),tp=propagateBody(target,h),
      dvx=(tp.vx-ship.vx)+(tp.x-ship.x)/h*1.5,dvy=(tp.vy-ship.vy)+(tp.y-ship.y)/h*1.5;
    heading=Math.atan2(dvy,dvx);need=Math.hypot(dvx,dvy);point=tp;
  }
  if(actState.phase==='warn'){
    if(actState.kind==='flare'){heading=Math.atan2(CY-ship.y,CX-56-ship.x);tactic='SEEK SHADOW';}
    else{const sr=radius(ship),goal=sr<73?91:57,ang=Math.atan2(ship.y-CY,ship.x-CX);heading=Math.atan2(CY+Math.sin(ang)*goal-ship.y,CX+Math.cos(ang)*goal-ship.x);tactic='DODGE ORBIT';}
  }
  {const sr=radius(ship),radial=((ship.x-CX)*ship.vx+(ship.y-CY)*ship.vy)/Math.max(1,sr);
    if(sr<42&&radial<0){heading=Math.atan2(ship.x-CX,-(ship.y-CY));tactic='RAISE';need=1;}}
  if(d<22&&usePhase){const dvx=(target.vx-ship.vx)+(target.x-ship.x)*.012,dvy=(target.vy-ship.vy)+(target.y-ship.y)*.012;
    heading=Math.atan2(dvy,dvx);need=Math.hypot(dvx,dvy);tactic=d<tractorRadius()&&rv<.23?'CAPTURE':'MATCH VELOCITY';}
  {const safe=rangeSafety(ship);if(safe){heading=safe.heading;tactic=safe.tactic;need=1;}}
  return{heading,need,point,tactic,d,rv};
}
function rawBotIntent(){
  if(tug.crashT>0)return{turn:0,thrust:0,retro:0,tractor:false,release:false,targetId:0,tactic:'RELAUNCH'};
  if(tug.replanT>0)return pursuitRecoveryIntent();
  if(!cargo&&tug.fuel<35){
    const d=nearestDock(tug),g=serviceGuidance(tug,d),err=angleWrap(g.heading-tug.angle);
    plan={mode:'service',targetId:d.slot,heading:g.heading,duration:24,horizon:g.h,created:missionFrame,point:g.point};planT=g.h;
    if(g.dist<10&&g.rv<.28)return{turn:0,thrust:0,retro:0,tractor:false,release:true,targetId:d.slot,tactic:'REFUEL'};
    return{turn:clamp(err/.55,-1,1),thrust:Math.abs(err)<.52&&g.need>.004?1:0,retro:0,tractor:false,release:false,targetId:d.slot,tactic:g.tactic,point:g.point};
  }
  if(cargo){
    const d=nearestDock(cargo),age=plan?missionFrame-plan.created:1e9;
    if(!plan||plan.mode!=='dock'||plan.targetId!==d.slot||age>Math.max(48,plan.duration+22)){
      const p=phasePlan(tug,d,'dock');plan={...p,mode:'dock',targetId:d.slot,created:missionFrame,duration:p.burn};planT=p.horizon;

  const left=Math.max(0,MISSION_FRAMES-missionFrame),tm=Math.floor(left/3600)+':'+String(Math.floor(left/60)%60).padStart(2,'0');ctx.fillStyle=GOLD;ctx.fillText(tm,132,19);
  ctx.fillStyle='#7e91ad';ctx.fillText('FUEL',5,346);rect(27,340,48,7,'#1e304b');rect(27,340,48*tug.fuel/fuelCap(),7,tug.fuel<20?CORAL:CYAN);
  ctx.fillStyle='#7e91ad';ctx.fillText('HEAT',82,346);rect(104,340,48,7,'#1e304b');rect(104,340,48*tug.heat/100,7,tug.heat>70?CORAL:GOLD);
  ctx.fillStyle='#8094ad';ctx.fillText('CAP '+stats.captures+'  DOCK '+stats.docks+'  HIT '+stats.collisions,5,356);
}
function drawIgnition(){if(!ignited)return;ctx.globalAlpha=.2+.1*Math.sin(frame*.08);ctx.fillStyle=GOLD;ctx.beginPath();ctx.arc(CX,CY,76,0,TAU);ctx.fill();ctx.globalAlpha=1;ctx.font='bold 12px monospace';ctx.fillStyle=GOLD;const s='RING IGNITION';ctx.fillText(s,80-s.length*3.6,72);}
function draw(){
  drawStars();drawOrbit(50,CYAN,.18);drawOrbit(72,BLUE,.15);drawOrbit(94,VIOLET,.13);preDraw();drawActs();drawPlan();drawHabitat();drawPlanet();
  for(const s of salvage)drawSalvage(s);for(const f of fragments)if(!salvage.includes(f))drawSalvage(f);drawDebris();drawTug();drawParts();drawRings();drawTexts();postDraw();drawIgnition();drawHUD();drawSession(false);
}

globalThis.__apogeeProbe=()=>({frame,showFrame,missionFrame,state,stateT,finishReason,segments,segmentParts,buildParts,partsSpent,reserveParts,ringLevel,ignited,
  finalConstructionFrame,ignitionFrame,missions:lifetime.missions,
  targetId,targetSince,plan:plan&&{mode:plan.mode,targetId:plan.targetId,heading:plan.heading,duration:plan.duration,horizon:plan.horizon,created:plan.created,point:plan.point&&{...plan.point}},
  act:{...act},persona:persona&&persona.name,tug:{...tug,intent:tug.intent&&{...tug.intent}},cargo:cargo&&{...cargo},
  salvage:salvage.map(s=>({...s})),fragments:fragments.map(s=>({...s})),debris:debris.map(s=>({...s})),
  upgrades:upgradeState(),overlayWidth:PLAN_LINE_WIDTH,trajectory:predictTrajectory(42).map(p=>({...p,cargo:p.cargo&&{...p.cargo}})),
  stats:{...stats},show:SHOW.probe(),playing:playing(),finite:[tug,cargo,...salvage,...fragments,...debris].filter(Boolean).every(finiteBody)});
globalThis.__apogeeStoryProbe=()=>missionStory();
globalThis.__apogeeTrajectory=n=>predictTrajectory(n).map(p=>({...p,cargo:p.cargo&&{...p.cargo}}));
globalThis.__soakProbe=()=>({sig:Math.round(tug.x*17+tug.y*23+(cargo?cargo.x*11+cargo.y*13:0)),
  events:lifetime.events,progress:lifetime.progress,finite:finiteBody(tug)&&[cargo,...salvage,...fragments,...debris].filter(Boolean).every(finiteBody)});

initSession('apogee',[['LEFT / RIGHT','ROTATE TUG'],['UP','PROGRADE BURN'],['DOWN','RETRO BURN'],['SPACE','TRACTOR / RELEASE']],{viewer:true});
resetMission();start(()=>step(),()=>draw());
</script>
