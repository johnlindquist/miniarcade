<script>
'use strict';
const{ctx,W,H,random,R,RI,hash,clamp,rect,stepParts,drawParts,ring,stepRings,drawRings,

const{controllerMux,skillProfile,createRng}=AI;

// STAR ROLLER — a Katamari Damacy spinoff for the 4:9 strip. The katamari
// rolls north through five zones (KITCHEN FLOOR, GARDEN, MAIN STREET, HARBOR,
// ORBIT TIDE) and sticks to itself anything STRICTLY smaller than its current
// diameter: bits, toys, pets, furniture, vehicles, structures. Oversized
// things bump it — a wobble, and the newest pickups scatter back off the ball
// (real size loss). The King of All Cosmos descends for authored commentary,
// MAGNET RAIN telegraphs an item shower with a 240-frame physical warning,
// and THE KING WATCHES pays triple glory. Reach 2m before the timer and the
// ball becomes a star. Nothing pre-draws intent (motion contract): no route
// lines, no pickup highlights, no predicted arcs — tells live on the world
// (relative size, the shelf gaps, the sweeper's spin-up, the royal portal).
// One shared integrator rolls the ball, the pets, the sweepers, the human,
// the bot, and the planner's copied-state rollouts — never touching the
// engine RNG outside the sim stream.
const TAU=Math.PI*2,BLOCK=210,ZONE_BLOCKS=14,RUN_FRAMES=18000,BALL_Y=292;
const X_LO=12,X_HI=148,START_D=5,TARGET_D=200,SWEEPER_D=60;
// Growth economics: area-add growth with a size-scaled coefficient — crumbs
// barely feed you, vehicles and structures are feasts. Tuned so efficient
// routing stars around 3-4.5 minutes and sloppy routing fizzles.
const GROWTH_K=.105,GROWTH_K2=.0018,GROWTH_K_MAX=.30;
const growthK=s=>Math.min(GROWTH_K_MAX,GROWTH_K+s*GROWTH_K2);
const INK='#07080d',CREAM='#fff3da',GOLD='#ffd166',AMBER='#ff8a3d',CORAL='#ff5d4f',
  MINT='#67e8a2',CYAN='#59d8f5',ROYAL='#8a7aff',BLOOD='#c92c3c',STEEL='#9aa7b8';
const ZONES=[
  {name:'KITCHEN FLOOR',kind:'kitchen',floor:'#c2a468',floor2:'#b08f54',line:'#8a6a3c',
    side:'#6a4a2c',side2:'#503520',accent:'#ff8a3d',light:'#ffe9a8',haze:'#ffd88a',minCls:0,maxCls:2},
  {name:'GARDEN',kind:'garden',floor:'#4a7a3c',floor2:'#3e6a34',line:'#2c5226',
    side:'#5c4a30',side2:'#46381f',accent:'#ff5d8f',light:'#fff3da',haze:'#c8e8a0',minCls:0,maxCls:3},
  {name:'MAIN STREET',kind:'street',floor:'#3c4150',floor2:'#343a48',line:'#8a90a0',
    side:'#5a5e6a',side2:'#42464f',accent:'#ffd166',light:'#59d8f5',haze:'#ffb98a',minCls:1,maxCls:4},
  {name:'HARBOR',kind:'harbor',floor:'#7a5c3a',floor2:'#6a4e32',line:'#4c3420',
    side:'#0c3c50',side2:'#0a3144',accent:'#59d8f5',light:'#b8f0ff',haze:'#8ad8e8',minCls:1,maxCls:4},
  {name:'ORBIT TIDE',kind:'orbit',floor:'#181b30',floor2:'#131628',line:'#2c3050',
    side:'#0a0c1c',side2:'#07081a',accent:'#8a7aff',light:'#59d8f5',haze:'#4a5adf',minCls:2,maxCls:5}
];
// Size classes in diameter units (1 unit = 1 cm): bits <5, toys <10, pets
// <20, furniture <40, vehicles <80, structures 80+. The ball starts at 5cm
// and must reach 200 (a 2m star) before the timer.
const CLASS_NAMES=['BITS','TOYS','PETS','FURNITURE','VEHICLES','STRUCTURES'];
const CLASS_AT=[10,20,40,80,160]; // milestone crossings (ball d)
const CLASS_COLORS=['#fff3da','#ffd166','#67e8a2','#ff8a5d','#59d8f5','#8a7aff'];
const classOf=s=>s<5?0:s<10?1:s<20?2:s<40?3:s<80?4:5;
// Item kinds per zone. size is a [min,max] diameter range; c is the read
// color; mover 'pet' = critter AI through the shared integrator, mover 'car'
// = lane traffic like ashen-rage's commute.
const ITEM_KINDS={
  crumb:{cls:0,size:[1,3],c:'#e8c88a'},pea:{cls:0,size:[2,4],c:'#7ee08a'},tack:{cls:0,size:[2,3],c:'#b8bcc4'},
  dice:{cls:1,size:[5,7],c:'#fff3da'},block:{cls:1,size:[6,9],c:'#ff8a3d'},marble:{cls:1,size:[5,6],c:'#59d8f5'},
  mouse:{cls:2,size:[10,14],c:'#a89aa8',mover:'pet'},
  stool:{cls:3,size:[22,30],c:'#8a5a3a'},pot:{cls:3,size:[24,32],c:'#7a8a9a'},pan:{cls:3,size:[20,28],c:'#4a4a52'},
  wagon:{cls:4,size:[42,56],c:'#c9403c'},
  cabinet:{cls:5,size:[85,110],c:'#6a4a2c'},
  seed:{cls:0,size:[1,3],c:'#e8d8a0'},pebble:{cls:0,size:[2,4],c:'#8a8a80'},berry:{cls:0,size:[3,4],c:'#ff5d8f'},
  ball8:{cls:1,size:[6,9],c:'#ffd166'},pinwheel:{cls:1,size:[7,9],c:'#ff8ac2'},
  snail:{cls:2,size:[10,13],c:'#c9a86a',mover:'pet'},beetle:{cls:2,size:[11,15],c:'#3c4a6a',mover:'pet'},
  frog:{cls:2,size:[14,19],c:'#5ac94a',mover:'pet'},
  chairG:{cls:3,size:[24,34],c:'#a8763c'},flowerpots:{cls:3,size:[26,36],c:'#c96a4e'},
  barrow:{cls:4,size:[42,58],c:'#7a8a4a'},mower:{cls:4,size:[55,70],c:'#c9403c'},
  shed:{cls:5,size:[95,130],c:'#7a5a38'},
  bolt:{cls:0,size:[1,3],c:'#b8bcc4'},can:{cls:0,size:[2,4],c:'#c9403c'},bottle:{cls:0,size:[3,4],c:'#67e8a2'},
  coneS:{cls:1,size:[6,9],c:'#ff8a3d'},hydrantS:{cls:1,size:[7,9],c:'#c9403c'},
  pigeon:{cls:2,size:[10,14],c:'#8a90a0',mover:'pet'},cat:{cls:2,size:[15,19],c:'#e8a84a',mover:'pet'},
  crateSt:{cls:3,size:[24,38],c:'#a8763c'},chairSt:{cls:3,size:[22,30],c:'#5a6a8a'},
  car:{cls:4,size:[45,65],c:'#c96a5a',mover:'car'},taxi:{cls:4,size:[48,68],c:'#ffd166',mover:'car'},
  van:{cls:4,size:[62,78],c:'#6aa8b8',mover:'car'},
  kiosk:{cls:5,size:[85,120],c:'#4a5a6a'},
  shell:{cls:0,size:[2,4],c:'#ffd8c2'},fish:{cls:0,size:[3,4],c:'#8ac2d8'},starfish:{cls:0,size:[3,4],c:'#ff8a5d'},
  bucket:{cls:1,size:[6,8],c:'#c9403c'},buoyS:{cls:1,size:[7,9],c:'#ff5d4f'},
  crab:{cls:2,size:[10,15],c:'#e86a4a',mover:'pet'},gull:{cls:2,size:[12,18],c:'#e8e8e8',mover:'pet'},
  barrel:{cls:3,size:[22,32],c:'#7a5a38'},crateHb:{cls:3,size:[26,38],c:'#8a6a42'},
  scooter:{cls:4,size:[42,60],c:'#59d8f5',mover:'car'},truckHb:{cls:4,size:[60,76],c:'#8a9a6a',mover:'car'},
  boat:{cls:5,size:[95,140],c:'#8a4a42'},
  starbit:{cls:0,size:[2,4],c:'#fff3a8'},shard:{cls:0,size:[2,3],c:'#59d8f5'},crystal:{cls:0,size:[3,4],c:'#c98aff'},
  moonrock:{cls:1,size:[6,9],c:'#9aa0b8'},satcell:{cls:1,size:[7,9],c:'#4a6ac9'},
  mote:{cls:2,size:[12,18],c:'#8affea',mover:'pet'},
  panel:{cls:3,size:[24,38],c:'#3a5a9a'},dish:{cls:3,size:[22,30],c:'#b8bcc4'},
  pod:{cls:4,size:[45,70],c:'#c9d2e8',mover:'car'},rover:{cls:4,size:[50,74],c:'#e8a84a',mover:'car'},
  satellite:{cls:5,size:[90,130],c:'#b8c4d8'},rocket:{cls:5,size:[120,160],c:'#e8e2d2'},
  asteroid:{cls:5,size:[140,180],c:'#6a5a52'}
};
const ZONE_POOLS={
  kitchen:['crumb','pea','tack','dice','block','marble','mouse','stool','pot','pan','wagon','cabinet'],
  garden:['seed','pebble','berry','ball8','pinwheel','snail','beetle','frog','chairG','flowerpots','barrow','mower','shed'],
  street:['bolt','can','bottle','coneS','hydrantS','pigeon','cat','crateSt','chairSt','kiosk'],
  harbor:['shell','fish','starfish','bucket','buoyS','crab','gull','barrel','crateHb','boat'],
  orbit:['starbit','shard','crystal','moonrock','satcell','mote','panel','dish','satellite','rocket','asteroid']
};
const CAR_KINDS={street:['car','taxi','van'],harbor:[],orbit:['pod','rover']};
// Rolling personas: readable plan grammar per run (paired variety, seeded).
const PERSONAS=[
  {name:'GOURMET',risk:.45,gain:1.25,shelf:.4,color:GOLD},    // farms dense clusters, respects shelves
  {name:'DAREDEVIL',risk:.85,gain:1.0,shelf:1.2,color:CORAL}, // threads gaps, hunts big game near sweepers
  {name:'TIDY',risk:.25,gain:.9,shelf:.2,color:MINT}          // bump-averse, flawless-streak farmer
];

let showFrame=0,runFrame=0,runSerial=0,state='run',endT=0,outcome='',worldSeed=1,skillSeed=1;
let ball=null,items=[],cars=[],sweepers=[],stuck=[],texts=[],plan=null,planAt=-1e9,skill=null,visualIntent=null;
let sweeperSerial=0,scatterSerial=0,itemSerial=0,lastBlock=0,lastZone=0,genBlock=-1,carGenBlock=-1;
let streak=0,lastPickupFrame=-1e9,bestStreak=0,chainAt=-1e9,chainCount=0,lastBumpFrame=-1e9,pickupsSinceBump=0;
let rainCaughtAt=-1e9,rainCaughtRun=0,persona=PERSONAS[0],personaIndex=0;
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
let eventSerial=0,progressSerial=0,lastEventFrame=0,lastProgressFrame=0,lastLapsed=false;
// ---- good/bad feedback presentation (all sim-inert) --------------------------
let goodPulse=0,badPulse=0,feedback=[],feedbackSerial=0,marks=[],shelfDone=new Set();
function cue(kind,id,x,y,pulse){
  const wy=y===undefined?ball.y:y;
  feedback.push({serial:feedbackSerial++,frame:runFrame,show:showFrame,kind,id,
    sx:Math.round(clamp(x===undefined?ball.x:x,0,W)),sy:Math.round(clamp(BALL_Y-(wy-ball.y),34,H-6))});
  if(feedback.length>420)feedback.splice(0,feedback.length-420);
  if(kind==='good')goodPulse=Math.max(goodPulse,pulse===undefined?.45:pulse);
  else badPulse=Math.max(badPulse,pulse===undefined?.55:pulse);
}
const stats={pickups:0,bulk:0,milestones:0,streaks:0,chains:0,threads:0,shelves:0,shelfHits:0,
  bumps:0,scatters:0,sweeperHits:0,sweepersEaten:0,hazardHits:0,petsEaten:0,carsEaten:0,
  rainCaught:0,kingBonus:0,stars:0,fizzles:0,dashes:0,lapses:0,acts:0,actClears:0,dodges:0,
  flawless:0,runs:0,contacts:0,grazes:0,zones:1,events:0,progress:0,maxEventLull:0,maxProgressLull:0,
  maxStep:0,appliedIntents:0,admireIntents:0};
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},2:{frames:44,minGap:100},
  3:{frames:84,minGap:600,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});
const act={phase:'calm',type:'magnet',warnAt:2400,landAt:2940,endAt:3540,index:0,notes:[],lastSweeper:0};
const king={y:-90,line:'',lineT:0,serial:0,sayT:0};
const KING_LINES={
  start:["ROLL, LITTLE STAR. THE SKY IS HUNGRY.","THE KING IS WATCHING. BEGIN."],
  milestone:["OHO! BIGGER ALREADY.","YES. GROW. THE SKY NEEDS YOU.","A FINE APPETITE."],
  bump:["CLUMSY. THE KING SAW THAT.","MIND THE FURNITURE.","THAT WAS EXPENSIVE."],
  sweeperHit:["THE SWEEPER COLLECTS ITS TAX.","WATCH THE FLOOR, LITTLE STAR."],
  sweeperEaten:["YOU ATE THE SWEEPER?! THE KING IS IMPRESSED.","DELICIOUS MACHINE."],
  magnetWarn:["THE KING SHAKES THE SKY. CATCH THE RAIN.","MAGNET RAIN. OUR GENEROSITY FALLS."],
  magnetLand:["EAT UP.","THE SKY PROVIDES."],
  kingWarn:["THE KING DESCENDS. DO NOT EMBARRASS US.","ROYAL INSPECTION. CHINS UP."],
  kingLive:["THE KING WATCHES. TRIPLE GLORY.","DANCE FOR THE KING."],
  star:["A STAR! THE KING KNEW IT.","INTO THE SKY WITH YOU. MAGNIFICENT."],
  fizzle:["...THAT WAS NOT A STAR.","THE KING LOOKS AWAY."],
  streak:["GOOD RHYTHM.","THE KING TAPS HIS FOOT."]
};

const mod=(n,d)=>((n%d)+d)%d;
const round=(v,n)=>{const p=Math.pow(10,n||4);return Math.round(v*p)/p;};
const mix=(a,b,t)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16),
  m=s=>Math.round((pa>>s&255)+((pb>>s&255)-(pa>>s&255))*t);
  return'#'+((1<<24)+(m(16)<<16)+(m(8)<<8)+m(0)).toString(16).slice(1);};
const poly=(points,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.closePath();ctx.fill();};
const line=(points,c,w)=>{ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.stroke();ctx.lineWidth=1;};
const sy=wy=>BALL_Y-(wy-ball.y);
// Payoff particles/rings live in inverted world space so engine drawParts can
// map them back onto the scrolling world (ashen-rage convention): the burst
// stays on the item that fired it while the road flows past.
const fxAt=(x,y,n,c,sp,grav)=>fxBurst(x,-y,n,c,sp,grav);
const dustAt=(x,y,n,c)=>fxDust(x,-y,n,c);
const ringAt=(x,y,c,dr,t)=>ring(x,-y,c,dr,t);
const fxCam=()=>-ball.y-BALL_Y;
// World scale: the camera zooms out as the ball grows. The ball always draws
// at drawR px radius; items draw at size*worldScale px, so "smaller than me"
// is always readable at a glance — the honest Katamari read.
const drawR=d=>clamp(3*Math.sqrt(Math.max(1,d))*1.5,6,20);
const worldScale=()=>drawR(ball.d)*2/ball.d;
// Item draw scale caps the zoom: at small diameters the honest relative order
// (bigger/smaller than the ball) stays, but pets and furniture stop being
// lane-choking macro lenses (small-actors-big-worlds law). The cap is shared
// by the renderer, the collisions, and the planner rollout.
const itemPx=i=>clamp(i.size*Math.min(worldScale(),1.75),2,110);
const topSpeed=d=>1.66+Math.min(.5,16/(d+8));
const zoneForBlock=b=>mod(Math.floor(b/ZONE_BLOCKS),ZONES.length);
const currentBlock=()=>Math.floor(ball.y/BLOCK);
const currentZone=()=>zoneForBlock(currentBlock());
const classColor=c=>CLASS_COLORS[c];
const say=(s,c,wy,t,x)=>{texts.push({s,c:c||CREAM,y:wy===undefined?ball.y+40:wy,x:x===undefined?ball.x:x,t:t||70});
  if(texts.length>14)texts.shift();};
function kingSay(key){
  if(king.sayT>runFrame)return;const pool=KING_LINES[key];if(!pool)return;
  king.line=pool[Math.floor(hash(worldSeed,++king.serial)*pool.length)];king.lineT=210;king.sayT=runFrame+260;
}
function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);
  lastEventFrame=showFrame;if(score&&playing())scoreGain(score);}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);
  lastProgressFrame=showFrame;if(score&&playing())scoreGain(score);}
function scoreGain(n){const x3=act.phase==='live'&&act.type==='king';
  if(x3)stats.kingBonus++;
  if(playing())addScore(Math.max(1,Math.round(n))*(x3?3:1));}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+30});}
function finiteBody(v){return[v.x,v.y,v.vx,v.speed,v.d].every(Number.isFinite);}
function allFinite(){return[ball.x,ball.y,ball.vx,ball.speed,ball.d,runFrame].every(Number.isFinite)&&
  items.every(i=>[i.x,i.y,i.size].every(Number.isFinite))&&sweepers.every(finiteBody)&&cars.every(finiteBody);}

// ---- world generation ---------------------------------------------------------
function maxClsForBlock(b){return 5;} // superseded by adaptive clsFor; kept for fixture compatibility
// Adaptive class mix: the world stocks itself relative to the ball's current
// class — a steady diet at and below size, stretch goals one class up, and a
// few clearly-oversized landmarks as bump hazards. Deterministic: generation
// reads the same deterministic ball state the sim already has.
function clsFor(b,zone,j){
  const ballCls=classOf(ball.d),t=hash(b*7+j*13,worldSeed*3+11);
  let cls=t<.34?ballCls-1:t<.74?ballCls:t<.92?ballCls+1:ballCls+2;
  cls=clamp(cls,0,5);
  return clamp(cls,Math.min(zone.minCls,cls),zone.maxCls);
}
function makeItem(kind,x,y){
  const spec=ITEM_KINDS[kind],id=++itemSerial;
  return{id,kind,cls:spec.cls,size:round(spec.size[0]+hash(id,worldSeed*13)*(spec.size[1]-spec.size[0]),2),
    x,y,vx:0,speed:0,d:spec.size[0],yaw:0,angle:0,va:0,roll:0,wobbleT:0,
    state:'loose',mover:spec.mover||null,hitCd:0,seed:hash(id*3,worldSeed)};
}
// Shelves: full-width counters with one gap — the size-gated shortcut. A ball
// narrow enough threads the gap to the dense cache behind; too wide and it
// bumps the ledge (wobble + scatter). Physical, readable, planner-visible.
function blockFeature(b){
  const zone=ZONES[zoneForBlock(b)];
  const shelf=mod(b*5+worldSeed,6)===2?{y:b*BLOCK+150,
    gapX:38+hash(b,worldSeed*11)*84,gapW:40+hash(b*3,worldSeed)*22,id:'sh-'+b}:null;
  return{b,zone,shelf};
}
// The size-gate rule, shared by the real collision and the planner rollout:
// body radius grows with true diameter, so the same gap is a clean shortcut
// for a small ball, a tight thread for a mid ball, and a ledge for a giant.
const shelfClearance=(s,x,d)=>s.gapW/2-Math.abs(x-s.gapX)-Math.min(d*.22,18);
function spawnBlockItems(b){
  const zone=ZONES[zoneForBlock(b)],pool=ZONE_POOLS[zone.kind];
  const nCl=b<3?4:3+(hash(b*3,worldSeed)>.6?1:0);
  for(let c=0;c<nCl;c++){
    const cls=clsFor(b,zone,c);
    const kinds=pool.filter(k=>ITEM_KINDS[k].cls===cls);if(!kinds.length)continue;
    const kind=kinds[Math.floor(hash(b*17+c,worldSeed*7)*kinds.length)];
    const cx=26+hash(b*31+c*7,worldSeed)*(W-52),cy=b*BLOCK+26+hash(b*13+c*11,worldSeed)*(BLOCK-64);
    // Big things stand apart; little things huddle. Cluster count and spread
    // scale with class so mid-size zones keep honest lanes between landmarks.
    const n=cls>=3?2+Math.floor(hash(b*7+c*3,worldSeed)*2):3+Math.floor(hash(b*7+c*3,worldSeed)*4);
    for(let j=0;j<n;j++){
      const a=hash(b+j*5,c*19+worldSeed)*TAU,rr=(5+hash(b*2+j,c+worldSeed)*17)*(1+cls*.4);
      items.push(makeItem(kind,cx+Math.cos(a)*rr,cy+Math.sin(a)*rr*.7));
    }
  }
  const ns=3+Math.floor(hash(b*41,worldSeed)*3);
  for(let j=0;j<ns;j++){
    const cls=clsFor(b,zone,10+j),kinds=pool.filter(k=>ITEM_KINDS[k].cls===cls);if(!kinds.length)continue;
    const kind=kinds[Math.floor(hash(b*23+j,worldSeed*5)*kinds.length)];
    items.push(makeItem(kind,20+hash(b*29+j,worldSeed)*(W-40),b*BLOCK+20+hash(b*37+j,worldSeed)*(BLOCK-50)));
  }
  // Crumb baseline: every block scatters a few bits, so a freshly-bumped small
  // ball always has an honest recovery line back to size.
  const bits=pool.filter(k=>ITEM_KINDS[k].cls===0);
  for(let j=0;j<2;j++){
    const kind=bits.length?bits[Math.floor(hash(b*53+j,worldSeed*7)*bits.length)]:pool[0];
    items.push(makeItem(kind,24+hash(b*59+j,worldSeed)*(W-48),b*BLOCK+16+hash(b*61+j,worldSeed)*(BLOCK-40)));
  }
  // A shelf guards a dense cache of SMALL things behind it.
  const f=blockFeature(b);
  if(f.shelf){
    const kinds=pool.filter(k=>ITEM_KINDS[k].cls<=1);
    for(let j=0;j<6;j++){
      const kind=kinds.length?kinds[Math.floor(hash(b*43+j,worldSeed*3)*kinds.length)]:pool[0];
      items.push(makeItem(kind,f.shelf.gapX+(hash(b*47+j,worldSeed)-.5)*26,f.shelf.y+26+j*11));
    }
  }
}
function ensureItems(){
  const target=currentBlock()+4;
  while(genBlock<target){genBlock++;spawnBlockItems(genBlock);}
  items=items.filter(i=>i.y>ball.y-420&&i.y<ball.y+1200);

// ---- one shared physics path for ball, pets, sweepers, human, bot, planner ----
function advanceBall(body,intent,env){
  intent=intent||{steer:0,throttle:1,brake:false,tuck:false,dash:false,targetX:80,tactic:'ROLL'};
  env=env||{};
  const mushy=body.wobbleT>0?.55:1;
  const turn=(intent.tuck?.16:.105)*mushy*(env.grip||1);
  body.vx+=clamp(intent.steer||0,-1,1)*turn;
  body.vx*=intent.tuck?.74:.82;
  body.x+=body.vx;
  const top=topSpeed(body.d)*(body.dashT>0?1.55:1)*(body.wobbleT>0?.75:1);
  const target=(intent.throttle===undefined?1:intent.throttle)*top;
  if(intent.brake||intent.tuck)body.speed=Math.max(.5,body.speed-(intent.tuck?.06:.05));
  else if(body.speed<target)body.speed=Math.min(target,body.speed+.024);
  else body.speed=Math.max(target,body.speed-.02);
  body.y+=body.speed;
  if(body.x<X_LO){body.x=X_LO;body.vx=Math.abs(body.vx)*.3;}
  if(body.x>X_HI){body.x=X_HI;body.vx=-Math.abs(body.vx)*.3;}
  // Honest heading (pocket-league doctrine): the ball tilts INTO actual
  // lateral travel — atan2(vx, speed) with yaw inertia — never a cosmetic
  // intent lean. angle/yaw/va/roll are pose only: physics never reads them
  // and they never enter the replay signature.
  const va=Math.atan2(body.vx,Math.max(.5,body.speed));
  body.yaw=(body.yaw||0)+(clamp(va,-.5,.5)-(body.yaw||0))*.24;
  body.angle=body.yaw;body.va=va;
  body.roll=(body.roll||0)+body.speed/Math.max(6,drawR(body.d));
  return body;
}

// ---- pickups, bumps, scatter ----------------------------------------------------

// Milestones fire once per threshold per run: class breakthroughs are the
// run's reliable apexes, not a bump-recross echo chamber.
let milestoneMask=0;
function stepMilestones(){
  for(let t=0;t<CLASS_AT.length;t++){
    if(milestoneMask&(1<<t))continue;
    const at=CLASS_AT[t];
    if(ball.d>=at){
      milestoneMask|=1<<t;
      stats.milestones++;markEvent(20);markProgress(12);
      const apex=at>=80;
      offer(apex?'breakthrough':'milestone',apex?3:2,ball.x,ball.y,CLASS_NAMES[t+1]);
      cue('good','milestone',ball.x,ball.y,apex?.9:.55);
      marks.push({kind:'ring',x:ball.x,y:ball.y,f:runFrame});if(marks.length>40)marks.shift();
      fxAt(ball.x,ball.y,apex?26:14,apex?ROYAL:GOLD,2.2,.006);ringAt(ball.x,ball.y,apex?ROYAL:GOLD,2.2,26);
      say(CLASS_NAMES[t+1]+' CLASS!',apex?ROYAL:GOLD,ball.y+56,90);kingSay('milestone');
      ball.gloryT=Math.max(ball.gloryT,apex?70:40);
    }
  }
}
function scatterOff(n){
  let lost=0,dropped=0;
  const cap=ball.bulk*.25;
  for(let k=0;k<n&&stuck.length;k++){
    const s=stuck[stuck.length-1],sk=s.k===undefined?growthK(s.size):s.k;
    if(dropped>0&&lost+s.size*s.size*sk>cap)break; // never a death-spiral: one bump costs a couple of pieces, not the run
    stuck.pop();dropped++;
    lost+=s.size*s.size*sk;
    items.push({id:++scatterSerial+1e7,kind:s.kind,cls:s.cls,size:s.size,
      x:clamp(ball.x+(hash(scatterSerial,runFrame)-.5)*30,X_LO+2,X_HI-2),y:ball.y-26-k*22,
      vx:0,speed:0,d:s.size,yaw:0,angle:0,va:0,roll:0,wobbleT:0,state:'loose',mover:null,hitCd:0,
      seed:hash(scatterSerial,worldSeed),scattered:true});

  }
  if(lost>0){ball.bulk=Math.max(0,ball.bulk-lost);ball.d=Math.sqrt(START_D*START_D+ball.bulk);

function bump(source,x,y,heavy,cueId){
  if(ball.invulnT>0)return false;
  // Graze vs crash, scaled by the size ratio: clipping something barely
  // oversized is a soft bounce; a clearly bigger thing knocks pieces off;
  // a monster takes several. The size ratio, not the item, writes the sentence.
  const ratio=source&&source.size?source.size/ball.d:2;
  const graze=ratio<1.25,drops=ratio>=3?3:ratio>=2?2:1;
  ball.wobbleT=graze?14:heavy?30:22;ball.invulnT=graze?30:heavy?60:48;ball.hitFlashT=graze?6:12;
  ball.speed*=graze?.92:heavy?.85:.9;
  if(!graze){
    ball.vx+=clamp((ball.x-x)*.06,-.55,.55)+Math.sign(ball.x-x||(hash(runFrame,1)-.5))*.3;
    scatterOff(drops);
    streak=0;lastBumpFrame=runFrame;pickupsSinceBump=0;
    stats.bumps++;markEvent(12);
    // The event lives ON the ball: that is where the wobble, the scatter,
    // the crack decal, and the pulse all land.
    cue('bad',cueId||'bump',ball.x,ball.y,.8);
    marks.push({kind:'crack',x:ball.x,y:ball.y,f:runFrame});if(marks.length>40)marks.shift();
    fxAt(ball.x,ball.y,10,CORAL,1.9);ringAt(ball.x,ball.y,CORAL,1.8,20);shake(heavy?4:3);
    say('TOO BIG!',CORAL,ball.y+44,52);kingSay('bump');
  }else{stats.grazes++;markEvent(3);ball.vx+=clamp((ball.x-x)*.04,-.4,.4);}
  return graze?'graze':'crash';
}

// ---- pets: critters with agency, through the shared integrator ------------------
function stepPet(i){
  const scared=ball.d>i.size*.6,dist=Math.hypot(i.x-ball.x,i.y-ball.y);
  let intent;
  if(act.phase==='warn'&&act.type==='king'){
    // Royal inspection: critters scurry to the baseboards — a physical tell.
    const edge=i.x<80?X_LO+8:X_HI-8;
    intent={steer:clamp((edge-i.x)*.06,-1,1),throttle:.8,brake:false,tuck:false,dash:false,targetX:edge,tactic:'SCURRY'};
  }else if(scared&&dist<70){
    const away=clamp(i.x+(i.x<ball.x?-26:26),X_LO,X_HI);
    intent={steer:clamp((away-i.x)*.12,-1,1),throttle:1,brake:false,tuck:false,dash:false,targetX:away,tactic:'FLEE'};
  }else if(!scared&&dist<90&&i.size>=ball.d*2.6){
    // Only a clearly bigger critter stalks the katamari — a slow, readable
    // menace, not a homing torpedo.
    intent={steer:clamp((ball.x-i.x)*.03,-1,1),throttle:.2,brake:false,tuck:false,dash:false,targetX:ball.x,tactic:'MENACE'};
  }else{
    intent={steer:Math.sin(showFrame*.045+i.id*1.7)*.55,throttle:.3,brake:false,tuck:false,dash:false,targetX:i.x,tactic:'WANDER'};
  }
  i.d=i.size;advanceBall(i,intent);
}

// ---- the ROYAL SWEEPER: patrol -> chase -> windup -> lunge -> recover/stunned ---
function spawnSweeper(){
  if(sweepers.length>=2)return;
  if(runFrame<1500)return;
  if(runFrame-act.lastSweeper<2200)return;
  act.lastSweeper=runFrame;sweepers.push(makeSweeper());
}
function stepSweeper(s){
  if(s.hitCd>0)s.hitCd--;
  const dist=Math.hypot(s.x-ball.x,s.y-ball.y);
  if(s.state==='stunned'){
    // The authored pause: dizzy sparks (emote) while the sweeper recovers
    // from eating a shelf edge or whiffing twice. Render covers the stillness.
    s.stateT--;s.speed=Math.max(0,s.speed-.05);s.y+=s.speed;s.roll+=.02;
    if(s.stateT<=0){s.state='roam';s.misses=0;}
    return;}
  if(s.state==='roam'){
    const tx=80+Math.sin(showFrame*.021+s.id*2.3)*46;
    advanceBall(s,{steer:clamp((tx-s.x)*.05,-1,1),throttle:.5,brake:false,tuck:false,dash:false,targetX:tx,tactic:'PATROL'});
    if(dist<230&&ball.y<s.y+40)s.state='chase';
    return;}
  if(s.state==='chase'){
    const tx=clamp(ball.x,X_LO,X_HI),ty=ball.y+26;
    advanceBall(s,{steer:clamp((tx-s.x)*.09,-1,1),throttle:clamp(1+(ty-s.y)*.015,.6,1.2),brake:false,tuck:false,dash:false,targetX:tx,tactic:'HUNT'});
    s.stateT++;
    if(dist<92){s.state='windup';s.stateT=18;}
    else if(s.stateT>420||s.y<ball.y-60)s.state='roam';
    return;}
  if(s.state==='windup'){
    // The tell: hold station, brushes flaring, then commit to the ball's
    // CURRENT position — the dodge window the viewer can read.
    s.stateT--;
    advanceBall(s,{steer:clamp((ball.x-s.x)*.05,-1,1)*.3,throttle:.22,brake:false,tuck:false,dash:false,targetX:s.x,tactic:'SPIN-UP'});
    if(s.stateT<=0){s.state='lunge';s.stateT=16;
      s.lungeX=clamp(ball.x+ball.vx*12,X_LO,X_HI);s.lungeY=ball.y+ball.speed*10;}
    return;}
  if(s.state==='lunge'){
    s.stateT--;
    advanceBall(s,{steer:clamp((s.lungeX-s.x)*.2,-1,1),throttle:1.65,brake:false,tuck:false,dash:false,targetX:s.lungeX,tactic:'LUNGE'});
    if(s.stateT<=0){s.misses++;
      if(s.misses>=2){s.state='stunned';s.stateT=80;}
      else{s.state='recover';s.stateT=42;}
    }
    return;}
  if(s.state==='recover'){
    s.stateT--;
    advanceBall(s,{steer:Math.sin(showFrame*.1+s.id)*.3,throttle:.4,brake:false,tuck:false,dash:false,targetX:s.x,tactic:'RECOVER'});
    if(s.stateT<=0)s.state='roam';
    return;}
}
function stepSweepers(){
  spawnSweeper();
  for(const s of sweepers)stepSweeper(s);
  // Shelf clank: a lunging sweeper that hits the ledge stuns itself — the
  // dodge-behind-the-shelf play the viewer can learn.
  for(const s of sweepers){
    if(s.state!=='lunge')continue;
    for(let b=currentBlock();b<=currentBlock()+1;b++){
      const f=blockFeature(b);if(!f.shelf)continue;
      if(Math.abs(s.y-f.shelf.y)<3&&Math.abs(s.x-f.shelf.gapX)>f.shelf.gapW/2){
        s.state='stunned';s.stateT=80;s.misses=0;markEvent(8);
        fxAt(s.x,s.y,8,STEEL,1.6);say('CLANK!',STEEL,s.y+20,44);}
    }
  }
  sweepers=sweepers.filter(s=>s.y>ball.y-320);
}

// ---- cars: lane traffic (ashen-rage commute pattern), eaten when outgrown -------
function stepCars(){
  for(const t of cars){
    for(const o of cars){
      if(o===t||o.y<=t.y)continue;
      const dx=o.x-t.x,dy=o.y-t.y;
      if(Math.abs(dx)<10&&dy>0&&dy<26){
        if(t.speed>o.speed)t.speed+=(o.speed-t.speed)*.08;
        const dir=Math.sign(t.x-o.x)||(t.x<80?-1:1);t.x=clamp(t.x+dir*.05,X_LO,X_HI);}
      if(Math.abs(dx)<8&&dy>0&&dy<10){
        const dir=Math.sign(t.x-o.x)||(t.x<80?-1:1),push=(8-Math.abs(dx))*.5;
        t.x=clamp(t.x+dir*push,X_LO,X_HI);o.x=clamp(o.x-dir*push,X_LO,X_HI);
        t.speed=Math.min(t.speed,o.speed+.05);}
    }
    t.y+=t.speed;
    if(t.wob>0){t.wob--;t.x+=Math.sin(showFrame*.4+t.id)*.5;}
    if(t.hitCd>0)t.hitCd--;
  }
}

// ---- collisions: ball vs items / cars / sweepers ---------------------------------
function stepPickup(){
  const r=drawR(ball.d),ws=worldScale();
  for(const i of items){
    if(i.state!=='loose')continue;
    const px=clamp(i.size*ws,2,110);
    if(Math.abs(i.x-ball.x)>(r+px)*1.2+8||Math.abs(i.y-ball.y)>(r+px)*1.2+8)continue;
    const dx=i.x-ball.x,dy=(i.y-ball.y)*1.1,reach=(r*.82+px*.5)*.92;
    if(dx*dx+dy*dy>reach*reach)continue;
    if(i.size<ball.d)collect(i);
    else if(i.hitCd<=0){i.hitCd=160;if(bump(i,i.x,i.y,true,i.mover==='pet'?'hazard-hit':'bump')==='crash')stats.hazardHits++;}
  }
  for(const t of cars){
    const px=clamp(t.size*ws,8,110);
    const dx=t.x-ball.x,dy=(t.y-ball.y)*1.15,reach=(r+px*.42)*.95;
    if(dx*dx+dy*dy>reach*reach)continue;
    if(t.size<ball.d)collect(t);
    else if(t.hitCd<=0&&ball.invulnT<=0){t.hitCd=140;t.wob=60;
      if(bump(t,t.x,t.y,true,'hazard-hit')==='crash')stats.hazardHits++;}
  }
  cars=cars.filter(t=>t.state!=='gone');
}
function stepSweeperContact(){

      ball.bulk+=s.d*s.d*growthK(s.d);ball.d=Math.sqrt(START_D*START_D+ball.bulk);stats.bulk=round(ball.d,3);
      stuck.push({a:hash(s.id,runFrame)*TAU,rr:.8,kind:'sweeper',size:s.d,cls:4});

      fxAt(s.x,s.y,30,GOLD,2.8,.008);fxAt(s.x,s.y,14,CYAN,2.2);ringAt(s.x,s.y,GOLD,2.6,30);shake(6);
      say('ATE THE SWEEPER!',GOLD,ball.y+60,100);kingSay('sweeperEaten');ball.gloryT=Math.max(ball.gloryT,80);
    }else if(s.hitCd<=0&&ball.invulnT<=0){

      marks.push({kind:'scatter',x:ball.x,y:ball.y,f:runFrame});if(marks.length>40)marks.shift();

}
// Continuous separation: nobody sits inside anybody; events ride cooldowns.
function resolveContacts(){
  const bodies=[ball,...sweepers];
  for(const i of items){
    if(i.state!=='loose'||i.mover!=='pet')continue;
    for(const b of bodies){
      if(b===ball&&(i.size<ball.d||ball.invulnT>0))continue;
      const dx=b.x-i.x,dy=(b.y-i.y)*1.1,d=Math.hypot(dx,dy),min=(b===ball?drawR(ball.d)*.7:9)+4;
      if(d>0.01&&d<min){const push=(min-d)*.5,ux=dx/d;
        b.x=clamp(b.x+ux*push,X_LO,X_HI);i.x=clamp(i.x-ux*push*.6,X_LO,X_HI);
        if(b===ball){b.contactT=10;stats.contacts++;}}
    }
  }
  for(const s of sweepers){
    // Continuous separation ALWAYS applies — nobody sits inside the ball; the
    // hit event rides its own cooldown on top.
    const dx=ball.x-s.x,dy=(ball.y-s.y)*1.1,d=Math.hypot(dx,dy),min=drawR(ball.d)*.7+8;
    if(d>0.01&&d<min){const push=(min-d)*.5,ux=dx/d;
      ball.x=clamp(ball.x+ux*push*.6,X_LO,X_HI);s.x=clamp(s.x-ux*push*.4,X_LO,X_HI);
      ball.vx+=ux*.1;ball.contactT=10;}
  }
  for(const t of cars){
    if(t.size<ball.d)continue;
    const dx=ball.x-t.x,dy=(ball.y-t.y)*1.15,d=Math.hypot(dx,dy),min=drawR(ball.d)*.66+9;
    if(d>0.01&&d<min){const push=(min-d)*.5,ux=dx/d;
      ball.x=clamp(ball.x+ux*push*.7,X_LO,X_HI);t.x=clamp(t.x-ux*push*.3,X_LO,X_HI);
      ball.vx+=ux*.12;ball.contactT=10;t.speed=Math.max(.3,t.speed*.995);}
  }
}

// ---- shelves, zones, flawless, the star ------------------------------------------
function stepFeatures(){
  for(let b=currentBlock()-1;b<=currentBlock()+1;b++){
    const f=blockFeature(b);if(!f.shelf||shelfDone.has(f.shelf.id))continue;
    const s=f.shelf;
    if(ball.lastY<s.y&&ball.y>=s.y){
      shelfDone.add(s.id);stats.shelves++;markEvent(6);
      const clear=shelfClearance(s,ball.x,ball.d);
      if(clear<0){if(bump(null,s.gapX,s.y,true,'shelf-hit')){stats.shelfHits++;markEvent(10);
        say('LEDGED!',CORAL,ball.y+40,48);}}
      else if(clear<10){stats.threads++;offer('thread',1,ball.x,ball.y,s.id);cue('good','thread',ball.x,ball.y,.35);
        marks.push({kind:'dash',x:ball.x,y:ball.y,f:runFrame});if(marks.length>40)marks.shift();
        fxAt(ball.x,ball.y,8,MINT,1.5);say('THREADED!',MINT,ball.y+42,48);markEvent(10);}
    }
  }
  const b=currentBlock();
  if(b!==lastBlock){lastBlock=b;markEvent(2);markProgress(1);

// ---- route planner: copied-state rollouts on the shared integrator ----------------
function planSnapshot(){
  const out=[];
  for(const i of items){
    if(i.state==='gone')continue;
    const y=i.state==='rain'?i.landY:i.y;
    if(y<ball.y-16||y>ball.y+280)continue;
    // Movers keep their agency in the forecast: critters flee or stalk, cars
    // commute — a plan that assumes a frozen world drives into mice.
    out.push({x:i.x,y,size:i.size,mover:i.mover,rain:!!i.rain});
  }
  for(const t of cars)out.push({x:t.x,y:t.y,size:t.size,mover:'car',speed:t.speed});
  return out;
}
function shelfAhead(){
  for(let b=currentBlock();b<=currentBlock()+1;b++){
    const f=blockFeature(b);
    if(f.shelf&&!shelfDone.has(f.shelf.id)&&f.shelf.y>ball.y-8&&f.shelf.y<ball.y+250)return f.shelf;
  }
  return null;
}
function simulateLane(targetX,snap,shelf){
  // The rollout starts from the ball's TRUE control state (wobble included):
  // planning past a fresh wobble with ideal steering is how bump chains were
  // born. Cars keep moving in the forecast — they commute while you decide.
  const b={x:ball.x,y:ball.y,vx:ball.vx,speed:ball.speed,d:ball.d,bulk:ball.bulk,wobbleT:ball.wobbleT,dashT:0};
  let gain=0,risk=0,minClear=999;
  const seen=new Set();
  for(let f=0;f<120;f++){
    if(b.wobbleT>0)b.wobbleT--;
    advanceBall(b,{steer:clamp((targetX-b.x)*.11,-1,1),throttle:1,brake:false,tuck:false,dash:false,targetX,tactic:'PLAN'});
    const r=drawR(b.d),ws=r*2/b.d;
    for(let k=0;k<snap.length;k++){
      if(seen.has(k))continue;
      const it=snap[k],iy=it.y+(it.speed||0)*f,py=clamp(it.size*ws,2,110);
      let ix=it.x;
      if(it.mover==='pet'){
        // Critters react in the forecast: small ones scatter from the rolling
        // path, big ones drift toward it. Same grammar as the real FSM.
        const scaredF=b.d>it.size*.6;
        if(scaredF)ix=clamp(it.x+(it.x<b.x?-1:1)*Math.min(30,f*.7),X_LO,X_HI);
        else if(it.size>=b.d*2.2)ix=clamp(it.x+Math.sign(b.x-it.x)*Math.min(26,f*.3),X_LO,X_HI);
      }
      if(Math.abs(ix-b.x)>(r+py)*1.2+8||Math.abs(iy-b.y)>(r+py)*1.2+8)continue;
      const dx=ix-b.x,dy=(iy-b.y)*1.1,reach=(r*.82+py*.5)*.92;
      const d2=dx*dx+dy*dy;
      if(d2>reach*reach){minClear=Math.min(minClear,Math.sqrt(d2)-reach);continue;}
      seen.add(k);
      if(it.size<b.d){gain+=it.size*it.size;b.bulk+=it.size*it.size*growthK(it.size);b.d=Math.sqrt(START_D*START_D+b.bulk);}
      else risk+=8+(it.size-b.d)*2;
    }
    if(shelf&&b.y>=shelf.y&&b.y<shelf.y+8){
      const clear=shelfClearance(shelf,b.x,b.d);
      if(clear<0)risk+=70;else gain+=clear<10?50:30;
      shelf=null;
    }
    for(const s of sweepers){
      if(s.state==='gone')continue;
      const sy2=s.y+(s.speed-ball.speed)*f*.4,sd=Math.hypot(s.x-b.x,sy2-b.y);
      if(sd<r+22)risk+=(r+22-sd)*1.6;
    }
  }
  // Milestone pressure: plans that cross a class threshold are worth extra —
  // breakthroughs are the run's reliable apexes.
  let bonus=0;
  for(const at of CLASS_AT)if(ball.d<at&&b.d>=at)bonus+=at>=80?220:90;
  if(act.phase==='warn'&&act.type==='magnet')for(const it of snap)if(it.rain&&Math.abs(it.x-targetX)<24)bonus+=26;
  const recovering=runFrame-lastBumpFrame<150;
  // Hunger: a katamari that hasn't eaten recently must accept grazing risk to
  // feed — total risk-aversion is how the ball starves against the wall.
  const hunger=clamp((runFrame-lastPickupFrame)/240,0,1);
  const riskW=(1.6-persona.risk*.6)*(1-hunger*.75);

    ?gain*.3-risk*3+Math.min(40,Math.max(0,minClear))*2+bonus // escape first, feed second
    :gain*persona.gain-risk*riskW+Math.min(30,Math.max(0,minClear))*.6+bonus;

}
function buildRoutePlan(){
  if(typeof globalThis.__NO_ROUTE_PLAN!=='undefined')return reactiveRoute();
  const snap=planSnapshot(),shelf=shelfAhead();
  const candidates=[18,40,62,80,98,120,142];
  // dense-lane candidates: the two heaviest pickable clusters ahead
  const pickable=snap.filter(it=>it.size<ball.d);
  const scored={};
  for(const it of pickable){const lane=clamp(Math.round(it.x/20)*20,18,142);scored[lane]=(scored[lane]||0)+it.size*it.size;}
  const top=Object.entries(scored).sort((a,b)=>b[1]-a[1]).slice(0,2).map(e=>+e[0]);
  for(const x of top)if(!candidates.includes(x))candidates.push(x);
  if(shelf)candidates.push(clamp(shelf.gapX,X_LO+4,X_HI-4));
  const out=candidates.map(x=>simulateLane(x,snap,shelf));
  out.sort((a,b)=>b.score-a.score||a.targetX-b.targetX);
  return out[0];
}
function reactiveRoute(){
  // Honest baseline: reacts to what is already rolling over it — nearest
  // reachable bite, panic-swerve from the closest oversized thing, no shelf
  // knowledge, no cluster math, no growth forecast, no act awareness.
  let best=null,bestD=1e9;
  for(const i of items){
    if(i.state!=='loose'||i.size>=ball.d)continue;
    const dy=i.y-ball.y;if(dy<-8||dy>140)continue;
    const d=Math.hypot(i.x-ball.x,dy);if(d<bestD){bestD=d;best=i;}
  }
  let targetX=best?best.x:80+Math.sin(showFrame*.02)*30,panic=null,panicD=1e9;
  for(const i of items){
    if(i.state!=='loose'||i.size<ball.d)continue;
    const dy=i.y-ball.y;if(dy<-6||dy>44)continue;
    const d=Math.abs(i.x-ball.x);if(d<panicD){panicD=d;panic=i;}
  }
  if(panic&&panicD<24)targetX=clamp(ball.x+(ball.x<panic.x?-30:30),X_LO,X_HI);
  for(const s of sweepers){
    const d=Math.hypot(s.x-ball.x,s.y-ball.y);
    if(d<40)targetX=clamp(ball.x+(ball.x<s.x?-30:30),X_LO,X_HI);
  }
  // Bump-shy: right after a hit, prefer the nearby lane with the fewest
  // oversized things in it — local counting only, still no forecast.
  if(runFrame-lastBumpFrame<70){
    let bestLane=targetX,bestHeat=1e9;
    for(const lane of[24,52,80,108,136]){
      let heat=0;
      for(const i of items){
        if(i.state!=='loose'||i.size<ball.d)continue;
        const dy=i.y-ball.y;if(dy>-4&&dy<70)heat+=Math.max(0,70-Math.abs(i.x-lane));
      }
      if(heat<bestHeat){bestHeat=heat;bestLane=lane;}
    }
    targetX=bestLane;
  }

}
function routeTactic(target){
  if(act.phase==='warn')return act.type==='magnet'?'READ THE RAIN':'ROYAL INSPECTION';
  if(act.phase==='live'&&act.type==='king')return'BASK IN ROYALTY';
  if(act.phase==='live'&&act.type==='magnet')return'RIDE THE RAIN';
  const shelf=shelfAhead();
  if(shelf&&Math.abs(shelf.y-ball.y)<120)return shelfClearance(shelf,ball.x,ball.d)>2?'THREAD THE SHELF':'BRACE FOR THE LEDGE';
  if(target&&target.gain>1500)return'HERD THE BUFFET';
  if(target&&target.gain>200)return'FEAST THE LANE';

  return'ROLL OUT';
}
function rawBotIntent(){

    return{steer:0,throttle:.5,brake:false,tuck:false,dash:false,targetX:ball.x,tactic:'SAVOR THE STAR'};}

      const away=clamp(ball.x+(ball.x<s.x?-22:22),X_LO,X_HI);

    }

      rect(0,y,W,1,mix(p.line,INK,.15));}

}
function drawZoneSide(b,p){
  const top=sy((b+1)*BLOCK)+8,bottom=sy(b*BLOCK)-8,h=bottom-top;
  if(h<12||top>H||bottom<30)return;
  const y=top,hh=Math.min(h,240);
  for(const side of[-1,1]){
    const x=side<0?0:X_HI+2,w=W-x-(side<0?X_LO-0:0)+(side<0?X_LO:2);
    const x0=side<0?0:X_HI+2,w0=side<0?X_LO:W-X_HI-2;
    if(p.kind==='kitchen'){
      // Counter fronts with door seams, a stool leg or plate stack silhouette.
      rect(x0,y,w0,hh,mix(p.side,INK,.12));
      rect(side<0?x0+w0-2:x0,y,2,hh,mix(p.side2,CREAM,.12));
      for(let yy=y+8;yy<y+hh-6;yy+=22)rect(x0+2,yy,w0-4,1,mix(p.side,INK,.4));
      for(let yy=y+18;yy<y+hh-16;yy+=56){
        rect(x0+2,yy,w0-5,10,mix(p.side2,INK,.1));rect(x0+2,yy,w0-5,2,mix(CREAM,p.side2,.25));
        if(hash(b,side)>.5){rect(x0+3,yy-5,w0-8,4,CREAM);rect(x0+4,yy-4,w0-10,1,mix(CREAM,INK,.2));}}
    }else if(p.kind==='garden'){
      // Soil beds with flower rows; fence posts right, hedge left.
      rect(x0,y,w0,hh,mix(p.side,INK,.08));
      for(let yy=y+4;yy<y+hh-4;yy+=6)rect(x0,yy,w0,2,mix(p.side,INK,.22));
      for(let yy=y+6;yy<y+hh-6;yy+=14)for(let xx=x0+2;xx<x0+w0-2;xx+=7)
        if(hash(b*3+xx,yy)>.4){rect(xx,yy,2,2,hash(xx,yy+b)>.5?p.accent:GOLD);rect(xx,yy+2,1,2,'#3c6832');}
      if(side>0){for(let yy=y+4;yy<y+hh-4;yy+=18){rect(x0+w0-3,yy,2,8,'#6a5230');rect(x0+w0-4,yy,4,2,mix('#6a5230',CREAM,.3));}}
      else for(let yy=y+2;yy<y+hh-6;yy+=10){rect(x0,yy,3,5,'#3c5a34');rect(x0+1,yy-1,2,2,'#4a6a3e');}
    }else if(p.kind==='street'){
      // Curb + sidewalk joints, parked silhouettes, hydrant/mailbox props.
      rect(x0,y,w0,hh,mix(p.side2,INK,.1));
      rect(side<0?x0+w0-2:x0,y,2,hh,mix(p.line,CREAM,.2));
      for(let yy=y+6;yy<y+hh-6;yy+=16)rect(x0+1,yy,w0-2,1,mix(p.side2,CREAM,.15));
      for(let yy=y+16;yy<y+hh-24;yy+=72){
        const cc=['#c96a5a','#6aa8b8','#c9a24e'][mod(b+(side<0?1:0),3)];
        rect(x0+1,yy,w0-3,16,mix(cc,INK,.25));rect(x0+2,yy+2,w0-5,5,'#232e3c');
        rect(x0+1,yy+14,2,2,'#0a0b10');rect(x0+w0-4,yy+14,2,2,'#0a0b10');}
      if(hash(b,side)>.6){const yy=y+30+mod(b*7,40);rect(x0+2,yy,3,6,CORAL);rect(x0+1,yy+2,5,2,CORAL);}
    }else if(p.kind==='harbor'){
      if(side<0){
        // Open water: swells scroll with the world, a moored hull per stretch.
        rect(x0,y,w0,hh,p.side);
        for(let yy=y+6;yy<y+hh-4;yy+=12){ctx.globalAlpha=.5;rect(x0+1+mod(yy,5),yy,w0-3,1,p.light);ctx.globalAlpha=1;}
        if(hash(b,worldSeed)>.4){const by=y+20+mod(b*7,60);
          poly([[x0+1,by],[x0+w0-2,by],[x0+w0-4,by+6],[x0+3,by+6]],'#6a4a34');
          rect(x0+w0/2-1,by-8,1,8,'#d8cba8');poly([[x0+w0/2,by-8],[x0+w0/2+5,by-1],[x0+w0/2,by-1]],'#e8e2d2');}
        rect(x0+w0-2,y,2,hh,'#6a4a34');
      }else{
        // Dock wall: bollards and one crate stack per stretch.
        rect(x0,y,w0,hh,mix(p.side2,INK,.1));
        rect(x0,y,2,hh,mix(p.line,CREAM,.15));
        for(let yy=y+8;yy<y+hh-10;yy+=40){rect(x0+3,yy,w0-6,8,'#4a5a64');rect(x0+3,yy,w0-6,1,p.light);}
        for(let yy=y+6;yy<y+hh-6;yy+=30){rect(x0+2,yy,3,4,'#2c3438');
          ctx.fillStyle=p.accent;ctx.beginPath();ctx.arc(x0+3,yy-1,2,0,TAU);ctx.fill();}
      }
    }else{
      // Orbit rims: planet arcs and panel fragments drifting by.
      rect(x0,y,w0,hh,mix(p.side2,INK,.15));
      const arc=hash(b,side+worldSeed);
      if(arc>.45){const cy=y+20+mod(b*13,90),r=16+hash(b,side)*10;
        ctx.fillStyle=mix(side<0?p.accent:CYAN,INK,.55);
        ctx.beginPath();ctx.arc(side<0?x0-6:x0+w0+6,cy,r,0,TAU);ctx.fill();
        ctx.strokeStyle=mix(p.light,INK,.3);ctx.beginPath();ctx.arc(side<0?x0-6:x0+w0+6,cy,r*.6,0,TAU);ctx.stroke();}
      for(let yy=y+10;yy<y+hh-8;yy+=48){rect(x0+2,yy,w0-4,3,mix('#3a5a9a',INK,.2));rect(x0+2,yy+1,w0-4,1,mix(p.light,INK,.3));}
    }
  }
}
function drawShelf(s,p){
  const y=sy(s.y);if(y<30||y>H+16)return;
  const gw=s.gapW/2;
  for(const side of[-1,1]){
    const x0=side<0?X_LO:s.gapX+gw,x1=side<0?s.gapX-gw:X_HI,w=x1-x0;
    if(w<=0)continue;
    rect(x0,y-5,w,10,mix(p.side,INK,.05));rect(x0,y-5,w,2,mix(p.side2,CREAM,.2));
    rect(x0,y+3,w,2,mix(p.side,INK,.45));
    for(let x=x0+2;x<x1-2;x+=9)rect(x,y-1,3,3,mix(p.side,INK,.3));
    // Ledge-end trim: physical worn hazard paint on the furniture itself.
    const ex=side<0?x1-4:x0;
    rect(ex,y-5,4,2,GOLD);rect(ex,y-3,4,2,INK);rect(ex,y-1,4,2,GOLD);rect(ex,y+1,4,2,INK);
  }
}
