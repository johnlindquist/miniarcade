<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MOONSHINE VALLEY</title>
<style>
  html,body{margin:0;height:100%;background:#071018}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;
    image-rendering:pixelated;background:#101a26}
  canvas:focus-visible{outline:2px solid #f4d06f;outline-offset:-3px}
</style>
<canvas id="cv" width="320" height="720" tabindex="0"
  aria-label="Moonshine Valley. A tiny farmer plants a changing moonlit farm by day and defends the harvest from valley creatures at night."></canvas>
<script src="engine.js"></script>
<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,random,RI,R,hash,clamp,rect,preDraw,postDraw,stepParts,drawParts,
  start,keys,manual,initSession,sessionStep,drawSession,playing,addScore,createShow,
  fxBurst,fxDust,shake}=E;
const{controllerMux,skillProfile,createRng}=AI;

// MOONSHINE VALLEY — Stardew Valley x survival automation. The full farm stays
// visible: the farmer is tiny, jobs are legible, crops visibly mature, dusk is
// a real warning, and every dawn reveals what the night took or spared.
const TAU=Math.PI*2,DAY_FRAMES=3600,DUSK_AT=2100,NIGHT_AT=2340,DAWN_AT=3360,SPAWN_EVERY=120;
const WORLD_TOP=42,WORLD_BOTTOM=334,SPAWN_Y=55,CONTACT_Y=198,GOAL_Y=309;
const PLOT_X=[58,79,100,121],PLOT_Y=[218,239,260,281];
const HOME={x:24,y:291},BIN={x:143,y:292},WORKSHOP={x:20,y:253};
const WARD_SITES=[{x:48,y:190},{x:83,y:184},{x:118,y:190}];
const INK='#071018',CREAM='#fff3d1',GOLD='#f4d06f',MINT='#79d68c',CYAN='#79d8df',
  CORAL='#ef6f61',VIOLET='#9b7bd1',SOIL='#6c4932';
const SEASONS=[
  {name:'WILLOW SPRING',sky0:'#6eb7c7',sky1:'#d9e7bc',far:'#688f78',mid:'#3f7058',
    grass:'#638f4a',grass2:'#4f783d',soil:'#75513a',path:'#b89b68',accent:'#f7d87c',crop:'#79d68c',kind:'willow'},
  {name:'EMBER SUMMER',sky0:'#87658f',sky1:'#f0a66e',far:'#a65d4e',mid:'#745043',
    grass:'#8a8741',grass2:'#686c34',soil:'#77452f',path:'#c6965e',accent:'#ffbf65',crop:'#e8c84e',kind:'ember'},
  {name:'CIDER AUTUMN',sky0:'#577c8d',sky1:'#d9b06d',far:'#8e6848',mid:'#614b38',
    grass:'#826f3f',grass2:'#665734',soil:'#684535',path:'#b48a57',accent:'#f08b57',crop:'#e79d4f',kind:'cider'},
  {name:'FROST MOON',sky0:'#273d67',sky1:'#9dc6d5',far:'#536d83',mid:'#3c5668',
    grass:'#76939a',grass2:'#5b777e',soil:'#5e4b49',path:'#b7c5bf',accent:'#c8f5ef',crop:'#9fe7dc',kind:'frost'}
];
const PERSONAS=[
  {name:'STEWARD',color:MINT,risk:.35,range:82},
  {name:'TINKER',color:CYAN,risk:.52,range:88},
  {name:'MOONRUNNER',color:GOLD,risk:.76,range:94}
];
const CROP_NAMES=['MOONBEAN','SUNROOT','CIDERBERRY','FROSTBLOOM'];
const ENEMY={
  mireling:{hp:3,speed:.255,w:13,h:14,color:'#665a82'},
  moth:{hp:2,speed:.34,w:16,h:11,color:'#9a78bd'},
  boar:{hp:6,speed:.205,w:18,h:14,color:'#765242'}
};

let showFrame=0,runFrame=0,cycleFrame=0,day=1,seasonIndex=0,worldSeed=1,skillSeed=1;
let actPhase='day',nightSerial=0,spawnSerial=0,actNotes=[],farmer=null,plots=[],enemies=[],shots=[],wards=[];
let objective=null,skill=null,persona=PERSONAS[0],lastLapsed=false,visualFixture='';
let banner={text:'',color:CREAM,t:0},pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
let eventSerial=0,progressSerial=0,lastEventFrame=0,lastProgressFrame=0;
const stats={days:1,objectives:0,missedObjectives:0,planted:0,watered:0,harvests:0,
  shipped:0,shipments:0,coins:8,wardsBuilt:0,fenceLevel:0,kills:0,hits:0,shots:0,
  cropHits:0,cropLosses:0,breaches:0,nightsHeld:0,perfectNights:0,lastSecondSaves:0,lapses:0,events:0,progress:0,
  maxEventLull:0,maxProgressLull:0,heldFrames:0,slowedFrames:0,admireFrames:0,
  appliedIntents:0,maxFarmerStep:0,acts:0,dawns:0};
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},2:{frames:44,minGap:90},
  3:{frames:84,minGap:600,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});

const round=(v,n)=>{const p=Math.pow(10,n||4);return Math.round(v*p)/p;};
const mix=(a,b,t)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16),
  m=s=>Math.round((pa>>s&255)+((pb>>s&255)-(pa>>s&255))*t);
  return'#'+((1<<24)+(m(16)<<16)+(m(8)<<8)+m(0)).toString(16).slice(1);};
const poly=(pts,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.fill();};
const line=(pts,c,w)=>{ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke();ctx.lineWidth=1;};
const distance=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const season=()=>SEASONS[seasonIndex];
const plotId=i=>'plot:'+i;
const enemyId=e=>'enemy:'+e.id;
const wardId=w=>'ward:'+w.id;
const cropId=i=>'crop:'+i;
const wantsActor=id=>{const only=globalThis.__MV_VISUAL_ONLY_ACTOR;return only===undefined||only===null||only===''||only===id;};
function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);lastEventFrame=showFrame;if(score&&playing())addScore(score);}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);lastProgressFrame=showFrame;if(score&&playing())addScore(score);}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+30});}
function say(text,color,t){banner={text,color:color||CREAM,t:t||90};}
function payoffBurst(x,y,n,color,speed,gravity){if(typeof globalThis.__NO_PAYOFF_FX==='undefined')fxBurst(x,y,n,color,speed,gravity);}
function payoffDust(x,y,n,color){if(typeof globalThis.__NO_PAYOFF_FX==='undefined')fxDust(x,y,n,color);}

function makePlot(x,y,index){return{id:index,x,y,growth:0,watered:false,hp:3,seeded:false,variant:index%4,flash:0};}
function objectiveCounter(kind){
  if(kind==='plant')return stats.planted;if(kind==='ship')return stats.shipped;
  if(kind==='ward')return stats.wardsBuilt;if(kind==='harvest')return stats.harvests;
  return stats.fenceLevel;
}
function startObjective(){
  const order=['plant','ship','ward','harvest','fence'],kind=order[(day-1)%order.length],start=objectiveCounter(kind);
  const data=kind==='plant'?['SOW 6 '+CROP_NAMES[seasonIndex],6]:kind==='ship'?['SHIP 5 HARVESTS',5]:
    kind==='ward'?['RAISE A MOONLAMP',1]:kind==='harvest'?['HARVEST 6 CROPS',6]:['FORTIFY 2 FENCE POSTS',2];
  objective={kind,label:data[0],start,target:data[1],done:false};say('DAY '+day+' · '+objective.label,season().accent,150);
}
function objectiveValue(){return objective?objectiveCounter(objective.kind)-objective.start:0;}
function completeObjective(){
  if(!objective||objective.done||objectiveValue()<objective.target)return;
  objective.done=true;stats.objectives++;stats.coins+=7;markProgress(100);markEvent(50);
  offer('objective',2,farmer.x,farmer.y,objective.label);payoffBurst(farmer.x,farmer.y-5,18,season().accent,2.2,.03);
  say('OBJECTIVE COMPLETE · +7',GOLD,110);
}

function resetGame(){
  worldSeed=RI(1,999999);skillSeed=RI(1,0x7fffffff);runFrame=0;cycleFrame=0;day=1;seasonIndex=0;actPhase='day';nightSerial=0;spawnSerial=0;actNotes=[];
  farmer={x:HOME.x,y:HOME.y,vx:0,vy:0,face:1,pose:'walk',carry:0,seeds:14,actionCd:0,hitT:0,
    intent:null,targetId:'',tactic:'OPEN THE FARM',walk:0,watering:0,swing:0,admireT:0,lastX:HOME.x,lastY:HOME.y};
  plots=[];for(let y=0;y<PLOT_Y.length;y++)for(let x=0;x<PLOT_X.length;x++)plots.push(makePlot(PLOT_X[x],PLOT_Y[y],plots.length));
  // A lived-in opening: six beds show four growth stages immediately.
  for(let i=0;i<6;i++){plots[i].seeded=true;plots[i].watered=true;plots[i].growth=[180,360,590,820,940,1040][i];plots[i].variant=i%4;}
  enemies=[];shots=[];wards=[];objective=null;lastLapsed=false;visualFixture='';eventSerial=0;progressSerial=0;lastEventFrame=showFrame;lastProgressFrame=showFrame;
  beginDawn.lastLosses=0;beginDawn.lastHits=0;
  for(const key in stats)stats[key]=0;Object.assign(stats,{days:1,coins:8});
  persona=PERSONAS[RI(0,PERSONAS.length-1)];
  skill=skillProfile({rng:createRng(skillSeed),skill:.82,precision:.86,risk:persona.risk,recovery:.9,
    reactionFrames:[3,7],lapseChance:.0005,lapseFrames:[18,36]});
  startObjective();SHOW.reset(showFrame);
}

function nearestPlot(test,origin){let best=null,bestD=Infinity;for(const p of plots){if(!test(p))continue;const d=distance(origin||farmer,p);if(d<bestD){bestD=d;best=p;}}return best;}
function targetPoint(id){
  if(id==='home')return HOME;if(id==='bin')return BIN;if(id==='workshop')return WORKSHOP;
  if(id&&id.startsWith('plot:'))return plots[+id.slice(5)]||null;
  if(id&&id.startsWith('enemy:'))return enemies.find(e=>e.id===+id.slice(6))||null;
  return null;
}
function moveIntentTo(target,id,tactic,act,aim){
  if(!target)return{dx:0,dy:0,act:false,aimX:farmer.x,aimY:farmer.y,targetId:'none',tactic:'CHECK THE LEDGER'};
  const dx=target.x-farmer.x,dy=target.y-farmer.y,d=Math.hypot(dx,dy)||1;
  return{dx:dx/d,dy:dy/d,act:!!act,aimX:aim?aim.x:target.x,aimY:aim?aim.y:target.y,targetId:id,tactic};
}
function dayIntent(){
  if(farmer.carry>=4){const d=distance(farmer,BIN);return moveIntentTo(BIN,'bin','SHIP THE HARVEST',d<8);}
  if(objective&&objective.kind==='ward'&&!objective.done){const d=distance(farmer,WORKSHOP);return moveIntentTo(WORKSHOP,'workshop','RAISE A MOONLAMP',d<8);}
  if(objective&&objective.kind==='fence'&&!objective.done){const d=distance(farmer,WORKSHOP);return moveIntentTo(WORKSHOP,'workshop','FORTIFY THE FENCE',d<8);}
  const ripe=nearestPlot(p=>p.seeded&&p.growth>=900,farmer);
  if(ripe){const d=distance(farmer,ripe);return moveIntentTo(ripe,plotId(ripe.id),'HARVEST '+CROP_NAMES[ripe.variant],d<7);}
  const dry=nearestPlot(p=>p.seeded&&!p.watered,farmer);
  if(dry){const d=distance(farmer,dry);return moveIntentTo(dry,plotId(dry.id),'WATER THE ROW',d<7);}
  const empty=farmer.seeds>0&&nearestPlot(p=>!p.seeded,farmer);
  if(empty){const d=distance(farmer,empty);return moveIntentTo(empty,plotId(empty.id),'SOW '+CROP_NAMES[seasonIndex],d<7);}
  if(farmer.carry>0){const d=distance(farmer,BIN);return moveIntentTo(BIN,'bin','SHIP THE HARVEST',d<8);}
  return moveIntentTo({x:42+hash(day,worldSeed)*82,y:203},'home','TEND THE VALLEY',false);
}
function baselineNightIntent(){
  // Shipping baseline: it only reacts after a creature has crossed most of the
  // yard, and fires at current position. It works, but squanders approach room.
  let threat=null,best=Infinity;for(const e of enemies)if(!e.dead&&e.y>192){const d=distance(farmer,e);if(d<best){best=d;threat=e;}}
  if(threat){const close=best<62;return moveIntentTo(close?farmer:{x:threat.x,y:clamp(threat.y+34,204,288)},enemyId(threat),
    close?'SLING AT THE SHADOW':'CLOSE THE DISTANCE',close,{x:threat.x,y:threat.y});}
  return moveIntentTo({x:80,y:286},'home','GUARD THE HARVEST',false);
}
function forecastThreat(e){
  // Pure copied-state read: no engine RNG and no mutation. Rank by time to a
  // live row, crop value, and current damage; then lead the exact linear
  // velocity the creature is already applying while the pebble is in flight.
  const target=plots[e.target]||{x:80,y:GOAL_Y,growth:0,hp:3},spec=ENEMY[e.kind];
  const remaining=distance(e,target)/Math.max(.01,spec.speed),shotFrames=distance(farmer,e)/2.35;
  // A hash-stable hand wobble keeps the forecast readable without turning it
  // into an aimbot. __NO_LAPSE removes the wobble for the competence anchor.
  const fuzz=typeof globalThis.__NO_LAPSE!=='undefined'?0:
    (hash(e.id*37+worldSeed,(runFrame/24)|0)-.5)*(24+persona.risk*18);
  const aim={x:clamp(e.x+e.vx*shotFrames+fuzz,6,154),y:clamp(e.y+e.vy*shotFrames+fuzz*.18,WORLD_TOP+2,WORLD_BOTTOM-2)};
  const intercept={x:clamp(aim.x,18,142),y:clamp(aim.y+68,150,286)};
  const urgency=remaining-target.growth*.012-target.hp*11+(e.kind==='boar'?-55:0);
  return{id:e.id,remaining,shotFrames,urgency,aim,intercept,target:target.id,y:e.y,drama:e.drama};
}
function smartNightIntent(){
  let plans=enemies.filter(e=>!e.dead&&!e.flee).map(forecastThreat).sort((a,b)=>a.urgency-b.urgency||a.id-b.id);
  // Roughly one creature per night is deliberately read late. The viewer gets
  // a forecastable last-light save instead of a flawless firing solution.
  if(typeof globalThis.__NO_LAPSE==='undefined')plans=plans.filter(p=>!p.drama||p.y>=195);
  if(!plans.length)return moveIntentTo({x:80,y:286},'home','LISTEN AT THE FENCE',false);
  const plan=plans[0],threat=enemies.find(e=>e.id===plan.id),d=distance(farmer,threat),close=d<persona.range;
  return moveIntentTo(close?farmer:plan.intercept,enemyId(threat),close?'LEAD THE '+threat.kind.toUpperCase():'CUT OFF THE '+threat.kind.toUpperCase(),close,plan.aim);
}
function rawBotIntent(){
  if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined'&&actPhase==='dawn')
    return{dx:0,dy:0,act:false,aimX:farmer.x,aimY:farmer.y,targetId:'home',tactic:'WATCH THE SUNRISE'};
  if(actPhase==='warn'){
    if(farmer.carry>0){const d=distance(farmer,BIN);return moveIntentTo(BIN,'bin','BEAT DUSK · SHIP NOW',d<8);}
    return moveIntentTo(HOME,'home','BATTEN THE FARM',false);
  }
  if(actPhase==='night')return typeof globalThis.__NO_NIGHT_PLAN!=='undefined'?baselineNightIntent():smartNightIntent();
  return dayIntent();
}
function lapseIntent(context,last){const base=last||rawBotIntent();return Object.assign({},base,{dx:(base.dx||0)*.08,dy:(base.dy||0)*.08,act:false,tactic:'WATCHING FIREFLIES'});}
function botIntent(){
  if(typeof globalThis.__NO_LAPSE!=='undefined'){lastLapsed=false;return rawBotIntent();}
  const before=skill.isLapsed(runFrame),intent=skill.decide(runFrame,null,rawBotIntent,lapseIntent),after=skill.isLapsed(runFrame);
  if(after&&!before&&!lastLapsed){stats.lapses++;markEvent();say('... FIREFLIES',VIOLET,42);}
  lastLapsed=after;return intent||rawBotIntent();
}
function humanIntent(){
  const dx=(keys.right?1:0)-(keys.left?1:0),dy=(keys.down?1:0)-(keys.up?1:0);
  let target=enemies.filter(e=>!e.dead).sort((a,b)=>distance(farmer,a)-distance(farmer,b))[0],targetId=target?enemyId(target):'manual';
  return{dx,dy,act:!!(keys.a||keys.b||keys.c),aimX:target?target.x:farmer.x+farmer.face*30,
    aimY:target?target.y:farmer.y,targetId,tactic:'MANUAL FARMHAND'};
}
const controller=controllerMux({human:humanIntent,ai:botIntent,manual:()=>playing()||manual()});

function plantPlot(p){if(p.seeded||farmer.seeds<=0)return;p.seeded=true;p.growth=0;p.watered=false;p.hp=3;p.variant=seasonIndex;farmer.seeds--;farmer.actionCd=24;farmer.pose='plant';stats.planted++;markEvent(7);markProgress();offer('plant',1,p.x,p.y,p.id);payoffDust(p.x,p.y,6,season().soil);}
function waterPlot(p){if(!p.seeded||p.watered)return;p.watered=true;farmer.actionCd=20;farmer.watering=20;farmer.pose='water';stats.watered++;markEvent(4);offer('water',1,p.x,p.y,p.id);}
function harvestPlot(p){if(!p.seeded||p.growth<900||farmer.carry>=4)return;p.seeded=false;p.growth=0;p.watered=false;p.hp=3;farmer.carry++;farmer.seeds=Math.min(20,farmer.seeds+1);farmer.actionCd=20;farmer.pose='harvest';stats.harvests++;markEvent(12);markProgress();offer('harvest',1,p.x,p.y,p.variant);payoffBurst(p.x,p.y-5,10,season().accent,1.5,.04);}
function shipHarvest(){if(!farmer.carry)return;const n=farmer.carry;farmer.carry=0;stats.shipped+=n;stats.shipments++;stats.coins+=n*4;farmer.actionCd=26;farmer.pose='carry';markEvent(15);markProgress(n);offer('shipment',2,BIN.x,BIN.y,n);payoffBurst(BIN.x,BIN.y-8,14,GOLD,2,.04);say('SHIPPED '+n+' · +'+n*4,GOLD,58);}
function buildAtWorkshop(){
  if(objective&&objective.kind==='ward'&&!objective.done&&wards.length<WARD_SITES.length&&stats.coins>=10){
    const site=WARD_SITES[wards.length];stats.coins-=10;wards.push({id:wards.length,x:site.x,y:site.y,hp:5,cool:20,flash:0});stats.wardsBuilt++;
    farmer.actionCd=42;farmer.pose='hammer';markEvent(20);markProgress(2);offer('ward',2,site.x,site.y,wards.length);payoffBurst(site.x,site.y-8,16,CYAN,2,.03);say('MOONLAMP ONLINE',CYAN,72);
  }else if(objective&&objective.kind==='fence'&&!objective.done&&stats.coins>=6){
    stats.coins-=6;stats.fenceLevel++;farmer.actionCd=36;farmer.pose='hammer';markEvent(14);markProgress();offer('fence',1,WORKSHOP.x,WORKSHOP.y,stats.fenceLevel);payoffDust(WORKSHOP.x,WORKSHOP.y,8,GOLD);
  }
}
function shootAt(intent){
  if(farmer.actionCd>0)return;const dx=intent.aimX-farmer.x,dy=intent.aimY-farmer.y,d=Math.hypot(dx,dy)||1;
  shots.push({id:stats.shots,x:farmer.x+dx/d*6,y:farmer.y-3+dy/d*6,vx:dx/d*2.35,vy:dy/d*2.35,life:72,damage:1,source:'farmer'});
  farmer.actionCd=24;farmer.swing=10;farmer.pose='sling';farmer.face=dx<0?-1:1;stats.shots++;markEvent(2);
}
function contextAction(intent){
  let target=targetPoint(intent.targetId);
  if(target&&intent.targetId.startsWith('enemy:')){shootAt(intent);return;}
  if(target&&intent.targetId.startsWith('plot:')){if(!target.seeded)plantPlot(target);else if(!target.watered)waterPlot(target);else harvestPlot(target);return;}
  if(intent.targetId==='bin'){shipHarvest();return;}if(intent.targetId==='workshop'){buildAtWorkshop();return;}
  // Manual context: nearby crop, bin, workshop, otherwise sling at nearest threat.
  const p=nearestPlot(q=>distance(farmer,q)<8,farmer);if(p){if(!p.seeded)plantPlot(p);else if(!p.watered)waterPlot(p);else harvestPlot(p);return;}
  if(distance(farmer,BIN)<9){shipHarvest();return;}if(distance(farmer,WORKSHOP)<9){buildAtWorkshop();return;}
  if(enemies.length)shootAt(intent);
}
function applyIntent(intent){
  intent=intent||{dx:0,dy:0,act:false,aimX:farmer.x,aimY:farmer.y,targetId:'none',tactic:'WAIT'};
  stats.appliedIntents++;farmer.intent=intent;farmer.targetId=intent.targetId;farmer.tactic=intent.tactic;
  farmer.lastX=farmer.x;farmer.lastY=farmer.y;let dx=clamp(intent.dx||0,-1,1),dy=clamp(intent.dy||0,-1,1),d=Math.hypot(dx,dy);
  if(d>1){dx/=d;dy/=d;}const speed=farmer.hitT>0?.34:.68;farmer.vx+=(dx*speed-farmer.vx)*.32;farmer.vy+=(dy*speed-farmer.vy)*.32;
  if(!dx&&!dy){farmer.vx*=.6;farmer.vy*=.6;}farmer.x=clamp(farmer.x+farmer.vx,8,152);farmer.y=clamp(farmer.y+farmer.vy,104,318);
  const moved=Math.hypot(farmer.x-farmer.lastX,farmer.y-farmer.lastY);stats.maxFarmerStep=Math.max(stats.maxFarmerStep,moved);farmer.walk+=moved;
  if(Math.abs(farmer.vx)>.05)farmer.face=farmer.vx<0?-1:1;
  if(farmer.actionCd>0)farmer.actionCd--;if(farmer.hitT>0)farmer.hitT--;if(farmer.watering>0)farmer.watering--;if(farmer.swing>0)farmer.swing--;
  if(intent.act)contextAction(intent);
  if(farmer.actionCd<=0)farmer.pose=moved>.08?'walk':'idle';
}

function spawnEnemy(forceType){
  const kind=forceType||(day>=4&&spawnSerial%6===5?'boar':spawnSerial%3===1?'moth':'mireling'),spec=ENEMY[kind];
  const target=plots[RI(0,plots.length-1)],x=clamp(38+(spawnSerial%4)*29+R(-5,5),18,142);
  const id=spawnSerial++,drama=hash(id*29+worldSeed,day*17)<.12;
  enemies.push({id,kind,x,y:SPAWN_Y,vx:0,vy:spec.speed,hp:spec.hp,maxHp:spec.hp,target:target.id,drama,
    hitT:0,attackCd:30,dead:false,flee:false,phase:hash(spawnSerial,worldSeed)*TAU});stats.acts++;markEvent();
}
function killEnemy(e){if(e.dead)return;e.dead=true;stats.kills++;markEvent(15);markProgress();
  if(e.drama&&e.y>=CONTACT_Y-12){stats.lastSecondSaves++;offer('last-light-save',2,e.x,e.y,e.kind);say('LAST-LIGHT SAVE!',GOLD,48);}
  else offer('creature-down',1,e.x,e.y,e.kind);payoffBurst(e.x,e.y,12,ENEMY[e.kind].color,1.8,.035);}
function hitEnemy(e,damage){if(e.dead)return;e.hp-=damage;e.hitT=8;stats.hits++;markEvent(2);if(e.hp<=0)killEnemy(e);}
function stepShots(){
  for(const s of shots){s.x+=s.vx;s.y+=s.vy;s.life--;
    for(const e of enemies){if(e.dead||e.flee)continue;const spec=ENEMY[e.kind];if(Math.abs(s.x-e.x)<spec.w/2+2&&Math.abs(s.y-e.y)<spec.h/2+2){hitEnemy(e,s.damage);s.life=0;break;}}
  }shots=shots.filter(s=>s.life>0&&s.x>-8&&s.x<W+8&&s.y>WORLD_TOP&&s.y<WORLD_BOTTOM+8);
}
function retargetEnemy(e){const live=plots.filter(p=>p.seeded);const target=(live.length?live:plots).slice().sort((a,b)=>distance(e,a)-distance(e,b))[0];e.target=target.id;}
function stepEnemies(){
  for(const e of enemies){if(e.dead)continue;const spec=ENEMY[e.kind];if(e.hitT>0)e.hitT--;
    if(e.flee){e.vy+=(-.62-e.vy)*.08;e.y+=e.vy;e.x+=Math.sin(runFrame*.08+e.phase)*.18;continue;}
    let target=plots[e.target];if(!target||!target.seeded)retargetEnemy(e);target=plots[e.target]||{x:80,y:GOAL_Y};
    const dx=target.x-e.x,dy=target.y-e.y,d=Math.hypot(dx,dy)||1;
    const weave=e.kind==='moth'?Math.sin(runFrame*.075+e.phase)*.24:0;
    e.vx+=(dx/d*spec.speed+weave-e.vx)*.12;e.vy+=(dy/d*spec.speed-e.vy)*.12;e.x=clamp(e.x+e.vx,7,153);e.y+=e.vy;
    if(d<8){e.attackCd--;if(e.attackCd<=0){e.attackCd=e.kind==='boar'?24:36;target.hp--;stats.cropHits++;markEvent();offer('crop-hit',1,target.x,target.y,e.id);
      if(target.hp<=0){target.seeded=false;target.growth=0;target.watered=false;target.hp=3;stats.cropLosses++;markProgress();say('A ROW WAS TRAMPLED',CORAL,58);retargetEnemy(e);}}}
    if(e.y>GOAL_Y+8){e.dead=true;stats.breaches++;markEvent();}
  }
  enemies=enemies.filter(e=>!e.dead&&e.y>WORLD_TOP-20);
}
function stepWards(){
  for(const w of wards){if(w.flash>0)w.flash--;if(--w.cool>0)continue;w.cool=66;
    let target=null,best=58;for(const e of enemies)if(!e.dead&&!e.flee){const d=distance(w,e);if(d<best){best=d;target=e;}}
    if(target){const dx=target.x-w.x,dy=target.y-w.y,d=Math.hypot(dx,dy)||1;shots.push({id:100000+stats.shots++,x:w.x,y:w.y-10,vx:dx/d*2.05,vy:dy/d*2.05,life:45,damage:1,source:'ward'});w.flash=10;markEvent();}
  }
}

  actPhase='dawn';stats.dawns++;const lost=stats.cropLosses-(beginDawn.lastLosses||0),hits=stats.cropHits-(beginDawn.lastHits||0);beginDawn.lastLosses=stats.cropLosses;beginDawn.lastHits=stats.cropHits;
  if(lost<=1)stats.nightsHeld++;if(hits===0)stats.perfectNights++;for(const e of enemies)if(!e.dead)e.flee=true;
  farmer.seeds=Math.min(18,farmer.seeds+6);stats.coins+=lost===0?5:2;markEvent(70);markProgress(3);

}
