<script>
'use strict';
const{ctx,W,H,random,RI,hash,clamp,rect,stepParts,drawParts,shake,preDraw,postDraw,start,keys,manual,
  initSession,sessionStep,drawSession,playing,addScore,createShow,fxBurst,fxDust}=E;
const{controllerMux,skillProfile,createRng}=AI;

const TAU=Math.PI*2,INK='#070b12',CREAM='#fff1cf',GOLD='#ffd15c',MINT='#66e0ba',CYAN='#5bd9e8',
  CORAL='#ff625f',STEEL='#91a7b2',LEFT=18,RIGHT=142,COLS=6;
const X=[18,43,68,92,117,142],Y=[306,258,210,162,114,66],WORLD={x:0,y:40,width:160,height:282};
const ZONES=[
  {name:'FREIGHT DOCK',code:'D1',sky0:'#171b26',sky1:'#413128',far:'#1c2530',mid:'#263441',beam:'#4b5960',hi:'#91a4a4',deck:'#29333a',accent:'#ffc44d',glow:'#e56a38'},
  {name:'BOILER WORKS',code:'B4',sky0:'#251216',sky1:'#6b3226',far:'#261b22',mid:'#49302c',beam:'#6b4336',hi:'#d38a56',deck:'#3b2927',accent:'#ff9d4d',glow:'#ff5b3d'},
  {name:'DYNAMO SPIRE',code:'T7',sky0:'#091c26',sky1:'#164d59',far:'#112b38',mid:'#1d4854',beam:'#315d66',hi:'#75c6c8',deck:'#18343b',accent:'#64f0dc',glow:'#63cfff'},
  {name:'CRANE CROWN',code:'R9',sky0:'#111632',sky1:'#64455c',far:'#1c2645',mid:'#343a58',beam:'#7b5539',hi:'#e4a85e',deck:'#29303e',accent:'#ffd166',glow:'#ff6f68'}
];
const WORKER_STYLES=[
  {name:'WELDER',body:'#315e83',helmet:'#e9b949'},
  {name:'MECHANIC',body:'#386856',helmet:'#f2e5bc'},
  {name:'FOREMAN',body:'#7b4139',helmet:'#f2a33c'},
  {name:'SPARK',body:'#554a83',helmet:'#66d9e8'}
];
const PERSONAS=[
  {name:'LINE CHIEF',risk:.78,precision:.88,c:'#ffd15c'},
  {name:'SMOKE READER',risk:.64,precision:.92,c:'#66e0ba'},
  {name:'HOT SHOT',risk:.88,precision:.81,c:'#ff765f'}
];
const LADDER_PATTERNS=[
  [[0,3],[1,4],[0,3],[2,5],[1,4]],
  [[1,5],[0,3],[2,4],[1,5],[0,4]],
  [[0,4],[2,5],[1,4],[0,3],[2,5]],
  [[1,4],[0,5],[2,4],[1,5],[0,3]]
];
const GAP_PATTERNS=[
  [[1,2],[3,3]],[[2,1],[4,2]],[[1,3],[3,1]],[[2,3],[4,1]]
];
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},2:{frames:46,minGap:90},3:{frames:92,minGap:600,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});

let showFrame=0,runFrame=0,worldSeed=1,stage=0,state='climb',extractT=0,zone=ZONES[0],layout=null;
let hero=null,workers=[],barrels=[],fires=[],machines=[],route=[],planSerial=0;
let history=[],persona=PERSONAS[0],profile=null,pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
let act={phase:'calm',warnAt:1500,landAt:1740,endAt:2280,index:0,purgeCol:3,notes:[]};
let texts=[],eventSerial=0,progressSerial=0,lastEventFrame=0,lastProgressFrame=0,lastDecisionFrame=0,barrelSerial=0;
let visualFixture='',visualExtraction=false;
const stats={rescues:0,extractions:0,hits:0,downs:0,deflections:0,nearMisses:0,convoyScares:0,
  reroutes:0,smartPlans:0,baselinePlans:0,lapses:0,acts:0,barrels:0,floors:0,events:0,progress:0,
  maxEventLull:0,maxProgressLull:0,invisibleResets:0,plannerCalls:0,objectiveTransitions:0,
  objectiveCompletions:0,enemyActions:0,playerResponses:0,puzzleDecisions:0,threatDecisions:0,
  responseDecisions:0,payoffDecisions:0,maxDecisionDeadAir:0};

const mod=(n,d)=>((n%d)+d)%d;
const node=(f,c)=>f*COLS+c;
const floorOf=n=>(n/COLS)|0;
const colOf=n=>n%COLS;
const nodePos=n=>({x:X[colOf(n)],y:Y[floorOf(n)]});
const round=(v,d)=>{const p=Math.pow(10,d||3);return Math.round(v*p)/p};
const line=(pts,color,width)=>{ctx.strokeStyle=color;ctx.lineWidth=width||1;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke();ctx.lineWidth=1};
const poly=(pts,color)=>{ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.fill()};
const mix=(a,b,t)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16),m=i=>Math.round(((pa>>i)&255)*(1-t)+((pb>>i)&255)*t);return'#'+((1<<24)+(m(16)<<16)+(m(8)<<8)+m(0)).toString(16).slice(1)};
const alpha=(a,fn)=>{const old=ctx.globalAlpha;ctx.globalAlpha=a;fn();ctx.globalAlpha=old};

function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);lastEventFrame=showFrame;if(score&&playing())addScore(score)}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);lastProgressFrame=showFrame;if(score&&playing())addScore(score)}
function markDecision(kind){const key=kind+'Decisions';if(!(key in stats))throw new Error('unknown decision kind '+kind);stats.maxDecisionDeadAir=Math.max(stats.maxDecisionDeadAir,showFrame-lastDecisionFrame);lastDecisionFrame=showFrame;stats[key]++}
function say(s,c,x,y,t){texts.push({s,c:c||CREAM,x:x===undefined?hero.x:x,y:y===undefined?hero.y-15:y,t:t||70});if(texts.length>8)texts.shift()}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+40})}

function edgeKey(f,c){return f+':'+c}
function hasGap(f,c){return layout.gaps.has(edgeKey(f,c))}
function hasLadder(f,c){return f>=0&&f<5&&layout.ladders[f].includes(c)}
function neighbors(n){
  const f=floorOf(n),c=colOf(n),out=[];
  if(c>0&&!hasGap(f,c-1))out.push(node(f,c-1));
  if(c<COLS-1&&!hasGap(f,c))out.push(node(f,c+1));
  if(f>0&&hasLadder(f-1,c))out.push(node(f-1,c));
  if(f<5&&hasLadder(f,c))out.push(node(f+1,c));
  return out;
}
function adjacent(a,b){return neighbors(a).includes(b)}
function edgeFrames(a,b){return floorOf(a)===floorOf(b)?30:72}

function buildLayout(){
  const zi=mod(stage+worldSeed,4),pattern=LADDER_PATTERNS[zi],gaps=GAP_PATTERNS[zi];
  zone=ZONES[zi];
  layout={ladders:pattern.map((v,i)=>v.map(c=>mod(c+((worldSeed>>(i%8))&1),COLS)).filter((c,j,a)=>a.indexOf(c)===j)),gaps:new Set(),broken:[]};
  for(const pair of gaps){const f=pair[0],c=pair[1];layout.gaps.add(edgeKey(f,c));}
  for(let f=0;f<5;f++){
    if(layout.ladders[f].length<2)layout.ladders[f].push(mod(layout.ladders[f][0]+3,COLS));
    let broken=mod(layout.ladders[f][0]+2+f,COLS);while(layout.ladders[f].includes(broken))broken=mod(broken+1,COLS);
    layout.broken.push(broken);
  }
  const seen=new Set([node(0,0)]),q=[node(0,0)];for(let h=0;h<q.length;h++)for(const n of neighbors(q[h]))if(!seen.has(n)){seen.add(n);q.push(n)}
  if(seen.size<COLS*6)layout.gaps.clear();
}
function makeHero(){const start=node(0,stage%2?5:0),p=nodePos(start);return{node:start,from:start,to:start,moveT:0,moveDur:0,x:p.x,y:p.y,face:stage%2?-1:1,pose:'idle',intent:null,stun:0,hitFlash:0,health:3,maxFloor:0,braceT:0,lastX:p.x,lastY:p.y,extractFromX:p.x,extractFromY:p.y}}
function buildWorkers(){workers=[];for(let i=0;i<4;i++){const f=i+1,c=mod((worldSeed>>(i*3))+stage*2+i*2,COLS),p=nodePos(node(f,c));workers.push({id:'worker-'+i,type:i,node:node(f,c),rescued:false,done:false,join:-1,x:p.x,y:p.y,face:i%2?1:-1,panicT:0,visualX:null,visualY:null})}}
function buildHazards(){
  barrels=[];fires=[];machines=[];barrelSerial=0;
  for(let i=0;i<5;i++)fires.push({id:'fire-'+i,floor:i,col:mod(i*2+stage+worldSeed,6),phase:mod(i*83+stage*41,420),force:false});
  for(let i=0;i<3;i++)machines.push({id:'machine-'+i,floor:1+i*2,col:mod(1+i*2+stage,6),phase:i*71,force:false});
  spawnBarrel(stage%2?1:-1,170+stage*13);
}
function resetAct(){Object.assign(act,{phase:'calm',warnAt:showFrame+1500,landAt:showFrame+1740,endAt:showFrame+2280,index:0,purgeCol:3,notes:[]})}
function resetRun(full){
  worldSeed=RI(1,0x7fffff);stage=0;state='climb';extractT=0;showFrame=Math.max(0,showFrame);runFrame=0;
  for(const k in stats)stats[k]=0;eventSerial=progressSerial=0;lastEventFrame=lastProgressFrame=lastDecisionFrame=showFrame;texts=[];history=[];route=[];planSerial=0;
  persona=PERSONAS[worldSeed%PERSONAS.length];profile=skillProfile({rng:createRng(worldSeed^0x54a77e),skill:.82,precision:persona.precision,risk:persona.risk,recovery:.9,reactionFrames:[2,5],lapseChance:.0018,lapseFrames:[10,22]});
  buildLayout();hero=makeHero();buildWorkers();buildHazards();resetAct();if(full)SHOW.reset(showFrame);planRoute(true);history.push({x:hero.x,y:hero.y});
}
function nextTower(){
  stage++;state='climb';extractT=0;route=[];history=[];buildLayout();hero=makeHero();buildWorkers();buildHazards();planRoute(true);history.push({x:hero.x,y:hero.y});markProgress(250);say(zone.name,zone.accent,80,178,120);
}

const BARREL_SPEED=.72,ROLL_FRAMES=Math.round((RIGHT-LEFT)/BARREL_SPEED),DROP_FRAMES=48,BARREL_SEG=ROLL_FRAMES+DROP_FRAMES;
function barrelAt(b,extra){
  const age=b.age+(extra||0),seg=Math.floor(age/BARREL_SEG),floor=5-seg;if(floor<0)return null;
  const phase=age-seg*BARREL_SEG,dir=b.startDir*(seg%2?-1:1),from=dir>0?LEFT:RIGHT,to=dir>0?RIGHT:LEFT;
  if(phase<=ROLL_FRAMES)return{x:from+(to-from)*(phase/ROLL_FRAMES),y:Y[floor]-5,floor,falling:false,dir};
  const u=(phase-ROLL_FRAMES)/DROP_FRAMES;return{x:to,y:Y[floor]+(Y[Math.max(0,floor-1)]-Y[floor])*u-5,floor,falling:true,dir};
}
function spawnBarrel(dir,age){const b={id:'barrel-'+barrelSerial++,startDir:dir||1,age:age||0,x:0,y:0,floor:5,falling:false,dir:dir||1,hitAt:-9999,nearAt:-9999};const q=barrelAt(b,0);if(q)Object.assign(b,q);barrels.push(b);stats.barrels++;stats.enemyActions++;markDecision('threat');markEvent();return b}
function fireActive(f,extra){if(f.suppressedUntil!==undefined&&runFrame+(extra||0)<f.suppressedUntil)return false;if(f.force)return true;return mod(runFrame+(extra||0)+f.phase,420)<112}
function machineReach(m,extra){if(m.force)return 1;const t=mod(runFrame+(extra||0)+m.phase,300)/300;return t<.18?Math.sin(t/.18*Math.PI):0}
function nodeRisk(n,eta){
  const f=floorOf(n),x=X[colOf(n)];let risk=0;
  for(const b of barrels){const q=barrelAt(b,eta);if(!q)continue;if(!q.falling&&q.floor===f){const d=Math.abs(q.x-x);if(d<24)risk+=(24-d)*5;}else if(q.falling&&Math.abs(q.x-x)<11&&Math.abs(q.y-Y[f])<32)risk+=130;}
  for(const fire of fires)if(fire.floor===f&&Math.abs(X[fire.col]-x)<14&&fireActive(fire,eta))risk+=120;
  for(const m of machines)if(m.floor===f&&Math.abs(X[m.col]-x)<15&&machineReach(m,eta)>.45)risk+=90;
  if(act.phase!=='calm'&&Math.abs(colOf(n)-act.purgeCol)<=0&&(act.phase==='warn'||act.phase==='live'))risk+=520;
  return risk;
}
function goalNodes(){
  const pending=workers.filter(w=>!w.rescued&&!w.done);if(pending.length)return pending.map(w=>w.node);
  return[node(5,stage%2?1:4)];
}
function findPath(start,goals,smart){
  const N=COLS*6,dist=Array(N).fill(Infinity),prev=Array(N).fill(-1),open=[start];dist[start]=0;const goalSet=new Set(goals);let found=-1;
  while(open.length){open.sort((a,b)=>dist[a]-dist[b]||a-b);const cur=open.shift();if(goalSet.has(cur)){found=cur;break}
    for(const n of neighbors(cur)){const travel=edgeFrames(cur,n),eta=dist[cur]+travel,cost=eta+(smart?nodeRisk(n,eta):0);if(cost<dist[n]){dist[n]=cost;prev[n]=cur;if(!open.includes(n))open.push(n)}}
  }
  if(found<0)return[];const out=[];for(let n=found;n!==start;n=prev[n])out.push(n);return out.reverse();
}
function routeIdentity(r){return r.slice(0,8).join('-')}
function planRoute(force){
  const smart=typeof globalThis.__NO_CASCADE_LOOKAHEAD==='undefined',old=route.slice(),next=findPath(hero.node,goalNodes(),smart);
  stats.plannerCalls++;if(smart)stats.smartPlans++;else stats.baselinePlans++;
  if(old.length&&next.length&&routeIdentity(old)!==routeIdentity(next)&&showFrame-planSerial>80){stats.reroutes++;markEvent();if(stats.reroutes%3===1)offer('reroute',2,hero.x,hero.y,'PURGE DODGE')}
  route=next;planSerial=showFrame;return route;
}
function routeSafe(){if(!route.length)return false;let cur=hero.node;for(const n of route){if(!adjacent(cur,n))return false;cur=n}return true}
function immediateDanger(frames){
  for(const b of barrels){const q=barrelAt(b,frames||0);if(q&&!q.falling&&q.floor===floorOf(hero.node)&&Math.abs(q.x-hero.x)<10)return true}
  return fires.some(f=>f.floor===floorOf(hero.node)&&Math.abs(X[f.col]-hero.x)<8&&fireActive(f,frames||0));
}
function idleIntent(tactic){return{dx:0,dy:0,brace:false,assist:false,next:-1,tactic:tactic||'READ THE TOWER'}}
function rawBotIntent(){
  if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined')return idleIntent('COUNT EVERY HELMET');
  if(state!=='climb')return idleIntent('ROOFTOP EXTRACTION');
  const smart=typeof globalThis.__NO_CASCADE_LOOKAHEAD==='undefined';
  if(hero.stun>0)return idleIntent('SHAKE IT OFF');
  if(hero.moveT>0)return{dx:Math.sign(hero.x-nodePos(hero.from).x),dy:Math.sign(hero.y-nodePos(hero.from).y),brace:false,assist:smart,next:hero.to,tactic:hero.pose==='climb'?'CLIMB UNDER COVER':'MOVE THE CONVOY'};
  if(!routeSafe()||showFrame-planSerial>=72)planRoute();
  if(smart&&immediateDanger(0))return{dx:0,dy:0,brace:true,assist:false,next:-1,tactic:'BRACE BEHIND RAIL'};
  const n=route[0];if(n===undefined)return idleIntent('SCAN FOR SURVIVORS');const p=nodePos(n),dx=Math.sign(p.x-hero.x),dy=Math.sign(p.y-hero.y);
  let tactic=dy<0?'CLIMB TO '+zone.code:dx?'CROSS THE GANTRY':'GUARD THE CONVOY';
  if(act.phase==='warn'&&smart)tactic='REROUTE BEFORE PURGE';
  return{dx,dy,brace:false,assist:smart,next:n,tactic};
}
function botIntent(){
  if(typeof globalThis.__NO_LAPSE!=='undefined')return rawBotIntent();
  const before=profile.isLapsed(runFrame),intent=profile.decide(runFrame,null,rawBotIntent,()=>idleIntent('SECOND-GUESS')),after=profile.isLapsed(runFrame);
  if(!before&&after){stats.lapses++;markEvent();say('?',persona.c,hero.x,hero.y-14,30)}return intent||idleIntent();
}
function humanIntent(){
  const dx=(keys.right?1:0)-(keys.left?1:0),dy=(keys.down?1:0)-(keys.up?1:0);
  return{dx,dy,brace:!!(keys.a||keys.b),assist:!!keys.c,next:-1,tactic:'MANUAL RESCUE'};
}
const controller=controllerMux({human:humanIntent,ai:botIntent,manual:()=>playing()||manual()});
function resolveNext(intent){
  if(intent.next>=0&&adjacent(hero.node,intent.next))return intent.next;
  const opts=neighbors(hero.node),f=floorOf(hero.node),c=colOf(hero.node);
  if(intent.dy<0)return opts.find(n=>floorOf(n)>f);
  if(intent.dy>0)return opts.find(n=>floorOf(n)<f);
  if(intent.dx<0)return opts.find(n=>floorOf(n)===f&&colOf(n)<c);
  if(intent.dx>0)return opts.find(n=>floorOf(n)===f&&colOf(n)>c);
  return undefined;
}
function startMove(n){
  if(n===undefined||!adjacent(hero.node,n))return false;hero.from=hero.node;hero.to=n;hero.moveT=1;hero.moveDur=edgeFrames(hero.node,n);hero.face=colOf(n)<colOf(hero.node)?-1:colOf(n)>colOf(hero.node)?1:hero.face;hero.pose=floorOf(n)!==floorOf(hero.node)?'climb':'run';markEvent();return true;
}
function applyIntent(intent){
  hero.intent=intent;if(hero.stun>0){hero.stun--;hero.pose='hurt';return}
  if(hero.moveT>0){
    hero.moveT++;const a=nodePos(hero.from),b=nodePos(hero.to),u=clamp(hero.moveT/hero.moveDur,0,1),ease=u*u*(3-2*u);hero.lastX=hero.x;hero.lastY=hero.y;hero.x=a.x+(b.x-a.x)*ease;hero.y=a.y+(b.y-a.y)*ease;
    if(u>=1){hero.node=hero.to;hero.from=hero.to;hero.moveT=0;hero.moveDur=0;hero.x=b.x;hero.y=b.y;hero.pose='idle';if(route[0]===hero.node)route.shift();arriveNode()}
    return;
  }
  hero.braceT=intent.brace?Math.min(20,hero.braceT+1):Math.max(0,hero.braceT-1);hero.pose=intent.brace?'brace':'idle';if(intent.brace)return;startMove(resolveNext(intent));
}
function arriveNode(){
  markProgress();const f=floorOf(hero.node);if(f>hero.maxFloor){hero.maxFloor=f;stats.floors++;if(playing())addScore(10)}
  for(const w of workers)if(!w.rescued&&!w.done&&w.node===hero.node)rescueWorker(w);
  if(workers.every(w=>w.rescued||w.done)&&hero.node===node(5,stage%2?1:4))beginExtraction();else planRoute(true);
}
function rescueWorker(w){
  w.rescued=true;w.join=workers.filter(v=>v.rescued).length-1;w.x=hero.x;w.y=hero.y;stats.rescues++;stats.objectiveTransitions++;markDecision('puzzle');markProgress(35);offer('rescue',1,hero.x,hero.y,w.type);fxBurst(hero.x,hero.y-4,9,WORKER_STYLES[w.type].helmet,1.2,.025);say(WORKER_STYLES[w.type].name+' JOINS',MINT,hero.x,hero.y-15,62);
  if(workers.filter(v=>v.rescued).length===3){offer('convoy',2,hero.x,hero.y,'THREE HELMETS');markEvent()}
}
function extractionFx(){for(let i=0;i<6;i++){const x=40+i*16,y=66+(i%2)*9;fxBurst(x,y,16,i%3===0?GOLD:i%3===1?MINT:CREAM,2.4,.025)}}
function beginExtraction(){
  if(state!=='climb')return;state='extract';extractT=180;visualExtraction=true;hero.extractFromX=hero.x;hero.extractFromY=hero.y;stats.extractions++;stats.objectiveCompletions++;markDecision('payoff');markProgress(180);offer('extraction',3,80,58,'ALL HANDS CLEAR');extractionFx();shake(7);say('ALL HANDS CLEAR',GOLD,80,96,120);
}
function cageY(){if(state!=='extract')return 59;const t=180-extractT;if(t<=60){const u=clamp(t/60,0,1);return 54+15*u*u*(3-2*u)}const u=clamp((t-60)/120,0,1);return 69-38*u*u*(3-2*u)}
function stepExtraction(){
  extractT--;const t=180-extractT;if(t<=60){const u=clamp(t/60,0,1),ease=u*u*(3-2*u);hero.x=hero.extractFromX+(80-hero.extractFromX)*ease;hero.y=hero.extractFromY+(69-hero.extractFromY)*ease;hero.face=80<hero.extractFromX?-1:1;hero.pose='run'}
  else{hero.x=80;hero.y=cageY();hero.pose='climb'}updateHistory();stepHazards();if(extractT<=0)nextTower()
}
function updateHistory(){
  history.unshift({x:hero.x,y:hero.y,face:hero.face,pose:hero.pose});if(history.length>280)history.length=280;
  const joined=workers.filter(w=>w.rescued&&!w.done).sort((a,b)=>a.join-b.join);for(let i=0;i<joined.length;i++){
    const w=joined[i];if(w.visualX!==null){w.x=w.visualX;w.y=w.visualY;continue}const q=history[Math.min(history.length-1,18+(i*18))]||history.at(-1);if(q){w.face=q.x>w.x?1:q.x<w.x?-1:w.face;w.x=q.x;w.y=q.y}if(w.panicT>0)w.panicT--;
  }
}

function hitHero(kind,x,y){

  const allowed=['opening','objective','climb','cascade','purge-response','rescue','convoy','later','danger','warning-calm','warning','land','apex','scale-contract'];if(!allowed.includes(name))return false;visualFixture=name;const desiredZone=name==='later'||name==='land'?2:name==='apex'?3:0;setStageVisual(name==='later'||name==='land'?2:name==='apex'?3:0);zone=ZONES[desiredZone];

  else if(name==='cascade'){setHeroNode(node(2,4));for(let i=0;i<3;i++){workers[i].rescued=true;workers[i].join=i;workers[i].visualX=hero.x-12-i*11;workers[i].visualY=hero.y}barrels=[];for(const age of[0,120,330,520])spawnBarrel(1,age);fires[2].force=true;route= findPath(hero.node,goalNodes(),true)}
