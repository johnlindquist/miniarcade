<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOTEL HAUNT</title>
<style>
  html,body{margin:0;height:100%;background:#070810}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;image-rendering:pixelated;background:#080812}
  canvas:focus-visible{outline:2px solid #f4c86a;outline-offset:-3px}
</style>
<canvas id="cv" width="320" height="720" tabindex="0" aria-label="Hotel Haunt. A tiny ghost hunter plans room sweeps, seals vents, reveals possessed furniture, and relights a haunted hotel floor by floor."></canvas>
<script src="engine.js"></script>
<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,RI,hash,clamp,rect,preDraw,postDraw,stepParts,drawParts,start,keys,manual,
  initSession,sessionStep,drawSession,playing,addScore,createShow,fxBurst,fxDust}=E;
const{controllerMux,skillProfile,createRng}=AI;

// HOTEL HAUNT — Luigi's Mansion pursuit grammar inside a living hotel cutaway.
// The viewer can read the whole containment sentence on screen:
//   seal a vent -> sweep the marked furniture -> reveal -> cut off -> contain.
// Ghosts make the sentence interesting by breaking it and possessing a new prop.
const TOP=42,BOTTOM=326,FLOOR_H=46,CURRENT_TOP=228,LEFT_VENT=7,RIGHT_VENT=153;
const INK='#080812',CREAM='#fff1d3',GOLD='#f4c86a',MINT='#83f3d2',ECTO='#86f7ff',
  LILAC='#caa7ff',CORAL='#ff6b7e',NIGHT='#101329',SHADOW='#05060c';
const THEMES=[
  {name:'GILDED LOBBY',code:'L',wall:'#3b1728',wall2:'#5b2638',trim:'#ca8c57',floor:'#281522',rug:'#7a2439',lit:'#f5bd68',
    props:['sofa','clock','urn','desk','cart','chair']},
  {name:'MOONLIGHT SUITES',code:'S',wall:'#16263b',wall2:'#24415a',trim:'#7fa9b8',floor:'#111c2b',rug:'#28546a',lit:'#f0c986',
    props:['bed','lamp','wardrobe','vanity','trunk','plant']},
  {name:'THERMAL SPA',code:'B',wall:'#123535',wall2:'#245554',trim:'#73bcb0',floor:'#102728',rug:'#286a62',lit:'#b9f0cc',
    props:['tub','boiler','hamper','cabinet','fountain','bench']},
  {name:'STARLIGHT BALLROOM',code:'P',wall:'#241a42',wall2:'#463063',trim:'#b78ad2',floor:'#171229',rug:'#5b2f73',lit:'#e8c3ff',
    props:['piano','harp','table','portrait','globe','chaise']}
];
const PROP_SIZE={sofa:[22,13],clock:[10,22],urn:[10,14],desk:[22,14],cart:[20,16],chair:[12,15],
  bed:[24,13],lamp:[9,19],wardrobe:[17,23],vanity:[18,18],trunk:[16,11],plant:[12,20],
  tub:[22,13],boiler:[16,22],hamper:[13,14],cabinet:[17,22],fountain:[15,20],bench:[21,11],piano:[24,18],
  harp:[14,23],table:[22,15],portrait:[14,19],globe:[13,20],chaise:[23,13]};
const FURN_X=[18,39,59,101,123,145];
const PERSONAS=[
  {name:'METHODICAL',risk:0.35,linger:1.05},{name:'BOLD',risk:0.7,linger:0.86},{name:'SHOWMAN',risk:0.55,linger:0.94}
];

let floors=[],hunter={},currentFloor=0,viewFloor=0,runSeed=1,skillSeed=1,skill=null,persona=PERSONAS[0];
let showFrame=0,runFrame=0,eventSerial=0,progressSerial=0,lastEvent=0,lastProgress=0;
let planIds=[],planVersion=0,planReason='READ THE FLOOR',visualFixture='',artEvents=[],ghostSerial=0;
let phase='active',phaseT=0,fromFloor=0;
let act={phase:'calm',warnAt:1800,landAt:2040,endAt:2520,count:0,t:0,floor:0,side:0,braced:false};
let actNotes=[],pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
const stats={floors:0,rooms:0,captures:0,reveals:0,sweeps:0,emptySweeps:0,escapes:0,repossessions:0,
  wards:0,blocks:0,planBreaks:0,spooks:0,acts:0,lapses:0,events:0,progress:0,distance:0,
  heldFrames:0,slowedFrames:0,admireFrames:0,maxEventLull:0,maxProgressLull:0};
const SHOW=createShow({queueLimit:3,recoveryGap:70,tiers:{
  1:{frames:12},
  2:{frames:42,minGap:90},
  3:{frames:86,minGap:540,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});

function markEvent(){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEvent);lastEvent=showFrame}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgress);lastProgress=showFrame;if(score&&playing())addScore(score)}
function art(kind,x,floor,value){artEvents.push({kind,x,floor,value:value||0,at:showFrame});if(artEvents.length>24)artEvents.shift()}
function floorTop(index){return CURRENT_TOP+(viewFloor-index)*FLOOR_H}
function floorBase(index){return floorTop(index)+38}
function activeFloor(){return floors.find(f=>f.index===currentFloor)}
function ventFor(f,side){return f.vents[side<0?0:1]}
function propById(f,id){return f.furniture.find(p=>p.id===id)}
function liveGhosts(f){return f.ghosts.filter(g=>g.state!=='captured')}
function exposedGhosts(f){return f.ghosts.filter(g=>g.state==='flee'||g.state==='stunned'||g.state==='arrival')}
function floorGhostForFurniture(f,p){return f.ghosts.find(g=>g.state==='possessed'&&g.furnitureId===p.id)}
function finiteNumbers(values){return values.every(Number.isFinite)}

function makeFloor(index){
  const theme=THEMES[index%THEMES.length],furniture=FURN_X.map((x,i)=>({
    id:index*100+i,x,room:x<80?0:1,type:theme.props[i],searched:false,ghostId:null,shake:0
  }));
  const count=index%4===3?2:2,ghosts=[],used=[];
  for(let i=0;i<count;i++){
    let slot;
    do slot=RI(0,furniture.length-1);while(used.includes(slot));used.push(slot);
    const p=furniture[slot],boss=index%4===3&&i===1;
    const g={id:ghostSerial++,kind:boss?'concierge':i%2?'rascal':'wisp',state:'possessed',furnitureId:p.id,
      x:p.x,spawnX:p.x,targetVent:p.x<80?1:-1,hp:boss?190:132,maxHp:boss?190:132,escapeN:0,ventT:0,
      destId:null,stunT:0,face:p.x<80?1:-1,bob:i*17,spookCd:0};
    p.ghostId=g.id;ghosts.push(g);
  }
  return{index,theme:index%THEMES.length,name:theme.name,lit:false,relight:0,roomLit:[false,false],roomEver:[false,false],
    furniture,ghosts,vents:[{id:'W',x:LEFT_VENT,sealed:false,charge:0},{id:'E',x:RIGHT_VENT,sealed:false,charge:0}],
    clearedAt:0,planBreak:0};
}
function ensureFloors(to){for(let i=0;i<=to;i++)if(!floors.some(f=>f.index===i))floors.push(makeFloor(i));floors.sort((a,b)=>a.index-b.index)}

function resetGame(){
  runSeed=RI(1,0x7fffffff);skillSeed=RI(1,0x7fffffff);floors=[];ghostSerial=0;currentFloor=0;viewFloor=0;
  runFrame=0;eventSerial=0;progressSerial=0;lastEvent=showFrame;lastProgress=showFrame;planIds=[];planVersion=0;
  planReason='READ THE FLOOR';visualFixture='';artEvents=[];phase='active';phaseT=0;fromFloor=0;actNotes=[];
  Object.keys(stats).forEach(k=>stats[k]=0);
  persona=PERSONAS[runSeed%PERSONAS.length];
  skill=skillProfile({rng:createRng(skillSeed),skill:.78,precision:.78,risk:persona.risk,
    reactionFrames:[3,7],lapseChance:.00058,lapseFrames:[16,34]});
  Object.assign(hunter,{x:80,vx:0,face:1,walk:0,stun:0,action:false,beam:false,beamX:80,
    targetX:80,tactic:'READ THE FLOOR',focus:null,wardSide:0,sweepT:0,lastX:80,floor:0,pose:'idle'});
  ensureFloors(7);
  const lead=1500+Math.floor(hash(runSeed,17)*600);
  act={phase:'calm',warnAt:lead,landAt:lead+240,endAt:lead+720,count:0,t:0,floor:0,side:runSeed&1,braced:false};
  SHOW.reset(showFrame);
  recomputePlan();
}

// Pure containment planner. The ablated policy is still competent: it sweeps
// the closest unchecked prop and directly chases a reveal. The full policy
// groups a sweep by predicted escape vent and seals that vent first.
function computeSweepPlan(f,hx,smart){
  const pending=f.furniture.filter(p=>!p.searched);
  return pending.slice().sort((a,b)=>{
    if(!smart)return Math.abs(a.x-hx)-Math.abs(b.x-hx)||a.id-b.id;
    const av=ventFor(f,a.x<80?1:-1),bv=ventFor(f,b.x<80?1:-1);
    // A possessed prop visibly twitches and blinks. Reading that tell is fair,
    // viewer-legible intelligence, not hidden-state omniscience.
    const ac=(a.ghostId!==null?-86:0)+(av.sealed?-32:0)+Math.abs(a.x-hx)*.35;
    const bc=(b.ghostId!==null?-86:0)+(bv.sealed?-32:0)+Math.abs(b.x-hx)*.35;
    return ac-bc||a.room-b.room||a.id-b.id;
  }).map(p=>p.id);
}
function recomputePlan(){
  const f=activeFloor();if(!f)return;
  const smart=typeof globalThis.__NO_CONTAIN_PLAN==='undefined';
  planIds=computeSweepPlan(f,hunter.x,smart);planVersion++;
}

function fullIntent(move,action,targetX,tactic,focus,wardSide){return{
  move:clamp(move||0,-1,1),action:!!action,targetX:Number.isFinite(targetX)?targetX:hunter.x,
  tactic:tactic||'HOLD',focus:focus===undefined?null:focus,wardSide:wardSide||0
}}
function humanIntent(){
  const move=(keys.right?1:0)-(keys.left?1:0),action=!!(keys.a||keys.b);
  return fullIntent(move,action,hunter.x+move*18,action?'VACUUM / SWEEP':'MANUAL',null,0);
}
function nearestPending(f){return f.furniture.filter(p=>!p.searched).sort((a,b)=>Math.abs(a.x-hunter.x)-Math.abs(b.x-hunter.x)||a.id-b.id)[0]||null}
function rawBotIntent(){
  const f=activeFloor();if(!f||phase!=='active')return fullIntent(Math.sign(80-hunter.x),false,80,'RIDE THE LIFT',null,0);
  if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined'&&!exposedGhosts(f).length)
    return fullIntent(0,false,hunter.x,'ADMIRE THE RELIGHT',null,0);
  // The act changes the body before it lands: cross the floor and brace the
  // destination wing while the spectral service door is still telegraphing.
  if(act.phase==='warn'&&act.floor===f.index){
    const x=act.side===0?132:28;
    return fullIntent(Math.sign(x-hunter.x),Math.abs(x-hunter.x)<5,x,'BRACE MIDNIGHT CHECK-IN',null,act.side===0?1:-1);
  }
  const ghosts=exposedGhosts(f);
  if(ghosts.length){
    const g=ghosts.slice().sort((a,b)=>Math.abs(a.x-hunter.x)-Math.abs(b.x-hunter.x))[0];
    if(g.state==='arrival')return fullIntent(Math.sign(g.x-hunter.x),Math.abs(g.x-hunter.x)<34,g.x,'INTERCEPT THE BELLHOP',g.id,0);
    const smart=typeof globalThis.__NO_CONTAIN_PLAN==='undefined',v=ventFor(f,g.targetVent);
    let tx=g.x,tactic='CHASE THE REVEAL';
    if(smart&&g.state==='flee'&&!v.sealed){tx=v.x-g.targetVent*16;tactic='CUT OFF '+(g.targetVent>0?'EAST':'WEST')+' VENT'}
    return fullIntent(Math.sign(tx-hunter.x),Math.abs(g.x-hunter.x)<38,tx,tactic,g.id,0);
  }
  if(!planIds.length||!propById(f,planIds[0])||propById(f,planIds[0]).searched)recomputePlan();
  const smart=typeof globalThis.__NO_CONTAIN_PLAN==='undefined';
  const p=smart?(propById(f,planIds[0])||nearestPending(f)):nearestPending(f);
  if(!p)return fullIntent(0,false,hunter.x,'LISTEN FOR MOVEMENT',null,0);
  if(smart){
    const side=p.x<80?1:-1,v=ventFor(f,side);
    // Bold/showman profiles occasionally trust the vacuum instead of the ward.
    // It is deterministic per floor, visibly labeled, and keeps the shipping
    // policy from becoming a sterile zero-escape machine.
    const rawSweep=p.ghostId!==null&&((persona.name==='SHOWMAN'&&f.index%5===2)||(persona.name==='BOLD'&&f.index%7===3));
    if(p.ghostId!==null&&!v.sealed&&!rawSweep){const castX=v.x-side*52,near=Math.abs(hunter.x-castX)<5;
      return fullIntent(Math.sign(castX-hunter.x),near,castX,'CAST '+(side>0?'EAST':'WEST')+' WARD',p.id,side)}
    if(rawSweep)return fullIntent(Math.sign(p.x-hunter.x),Math.abs(p.x-hunter.x)<6,p.x,'RISK A RAW SWEEP',p.id,0);
  }
  return fullIntent(Math.sign(p.x-hunter.x),Math.abs(p.x-hunter.x)<6,p.x,'SWEEP '+(p.room?'EAST':'WEST')+' ROOM',p.id,0);
}
function lapseIntent(){
  const f=activeFloor(),p=f&&nearestPending(f),tx=p?p.x:hunter.x;
  return fullIntent(Math.abs(tx-hunter.x)>18?-Math.sign(tx-hunter.x):0,false,tx,'HEARD SOMETHING...',p&&p.id,0);
}
function botIntent(){
  if(typeof globalThis.__NO_LAPSE!=='undefined')return rawBotIntent();
  const before=skill.isLapsed(runFrame);
  const out=skill.decide(runFrame,null,()=>rawBotIntent(),()=>lapseIntent())||fullIntent(0,false,hunter.x,'LISTEN',null,0);
  const after=skill.isLapsed(runFrame);
  if(!before&&after){stats.lapses++;markEvent();art('lapse',hunter.x,currentFloor,0)}
  return{...out};
}
const controller=controllerMux({human:humanIntent,ai:botIntent,manual:()=>playing()||manual()});

function roomGhostCount(f,room){return liveGhosts(f).filter(g=>{
  if(g.state==='possessed'){const p=propById(f,g.furnitureId);return p&&p.room===room}
  return(g.x<80?0:1)===room;
}).length}
function updateRoomLights(f){
  for(let room=0;room<2;room++){
    const lit=roomGhostCount(f,room)===0&&f.furniture.filter(p=>p.room===room).every(p=>p.searched);
    if(lit&&!f.roomLit[room]){f.roomLit[room]=true;if(!f.roomEver[room]){f.roomEver[room]=true;stats.rooms++;markProgress(35)}art('room-relight',room?122:38,f.index,room);SHOW.offer({id:'room',tier:2,at:showFrame,tag:'ROOM CONTAINED'});fxDust(room?122:38,floorBase(f.index)-8,12,GOLD)}
    else if(!lit)f.roomLit[room]=false;
  }
}
function choosePossession(f,g){
  const room=g.targetVent>0?1:0;
  let options=f.furniture.filter(p=>p.room===room&&p.ghostId===null);
  if(!options.length)options=f.furniture.filter(p=>p.ghostId===null);
  options.sort((a,b)=>Math.abs(a.x-(g.targetVent>0?RIGHT_VENT:LEFT_VENT))-Math.abs(b.x-(g.targetVent>0?RIGHT_VENT:LEFT_VENT))||a.id-b.id);
  return options[0]||null;
}
function startReveal(f,p,g){
  p.searched=true;p.ghostId=null;g.state='flee';g.furnitureId=null;g.x=p.x;g.spawnX=p.x;g.targetVent=p.x<80?1:-1;g.face=g.targetVent;
  g.hp=Math.min(g.maxHp,g.hp+8);stats.reveals++;markEvent();art('reveal',p.x,f.index,g.kind==='concierge'?2:1);
  SHOW.offer({id:'reveal',tier:1,at:showFrame,tag:g.kind==='concierge'?'THE CONCIERGE!':'POSSESSION REVEALED'});fxBurst(p.x,floorBase(f.index)-14,14,ECTO,1.5,.01);
  recomputePlan();
}
function finishSweep(f,p){
  stats.sweeps++;markEvent();p.searched=true;const g=floorGhostForFurniture(f,p);
  if(g)startReveal(f,p,g);else{stats.emptySweeps++;art('empty',p.x,f.index,0);SHOW.offer({id:'sweep',tier:1,at:showFrame,tag:'CLEAR'});recomputePlan()}
  updateRoomLights(f);
}
function sealVent(f,v){
  if(v.sealed)return;v.sealed=true;v.charge=0;stats.wards++;markEvent();art('seal',v.x,f.index,v.id==='E'?1:-1);
  SHOW.offer({id:'seal',tier:1,at:showFrame,tag:v.id+' VENT SEALED'});fxDust(v.x,floorBase(f.index)-28,8,MINT);
}
function captureGhost(f,g){
  if(g.state==='captured')return;g.state='captured';g.hp=0;stats.captures++;markEvent();markProgress(g.kind==='concierge'?180:90);
  art('capture',g.x,f.index,g.kind==='concierge'?2:1);SHOW.offer({id:'capture',tier:2,at:showFrame,tag:g.kind==='concierge'?'CONCIERGE CONTAINED':'GHOST CONTAINED'});
  fxBurst(g.x,floorBase(f.index)-15,g.kind==='concierge'?26:18,g.kind==='concierge'?LILAC:ECTO,2.1,.015);
  recomputePlan();updateRoomLights(f);checkFloorClear(f);
}
function repairPossessions(f){
  const claimed=new Set();
  for(const g of f.ghosts)if(g.state==='possessed'){
    let p=propById(f,g.furnitureId);
    if(!p||claimed.has(p.id))p=f.furniture.find(q=>q.ghostId===null&&!claimed.has(q.id))||null;
    if(!p){g.state='stunned';g.stunT=150;g.x=80;g.furnitureId=null;continue}
    g.furnitureId=p.id;g.x=p.x;p.ghostId=g.id;p.searched=false;claimed.add(p.id);
  }
  for(const p of f.furniture)if(p.ghostId!==null&&!f.ghosts.some(g=>g.id===p.ghostId&&g.state==='possessed'))p.ghostId=null;
}
function checkFloorClear(f){
  if(phase!=='active'||liveGhosts(f).length)return;
  // A warning owns this floor for its exact 240f sentence. Without this gate,
  // a last-ghost capture on the warning edge could start the lift, pause the
  // act clock, hide the telegraph, and land the bellhop late on another floor.
  if(act.phase==='warn'&&act.floor===f.index)return;
  if(act.phase==='live'&&act.floor===f.index){
    act.count++;act.phase='calm';act.t=0;act.braced=false;
    act.warnAt=runFrame+3300+Math.floor(hash(runSeed+act.count*19,7)*900);
    act.landAt=act.warnAt+240;act.endAt=act.landAt+480;
  }
  for(const p of f.furniture)p.searched=true;
  f.roomLit=[true,true];for(let room=0;room<2;room++)if(!f.roomEver[room]){f.roomEver[room]=true;stats.rooms++}f.lit=true;f.relight=showFrame;f.clearedAt=runFrame;stats.floors++;
  markProgress(240);art('floor-relight',80,f.index,f.index+1);
  const apex=(f.index+1)%4===0;
  SHOW.offer({id:apex?'wing':'floor',tier:apex?3:2,at:showFrame,tag:apex?'WING RELIT':'FLOOR '+(f.index+1)+' RELIT',expiresAt:showFrame+90});
  fxBurst(80,floorBase(f.index)-18,apex?38:24,apex?LILAC:GOLD,2.5,.02);
  phase='relight';phaseT=apex?150:110;planReason=apex?'ADMIRE THE WING':'RETURN TO THE LIFT';
}

function applyIntent(intent){
  const f=activeFloor();if(!f)return;hunter.intent={...intent};hunter.tactic=intent.tactic;hunter.targetX=intent.targetX;
  hunter.action=false;hunter.beam=false;hunter.focus=intent.focus;hunter.wardSide=intent.wardSide;
  if(hunter.stun>0){hunter.stun--;hunter.vx*=.78;hunter.x=clamp(hunter.x+hunter.vx,6,154);hunter.pose='spooked';return}
  const accel=.18,max=.82,desired=intent.move*max;hunter.vx+=(desired-hunter.vx)*accel;
  if(Math.abs(intent.move)<.1)hunter.vx*=.72;
  hunter.lastX=hunter.x;hunter.x=clamp(hunter.x+hunter.vx,6,154);stats.distance+=Math.abs(hunter.x-hunter.lastX);
  if(Math.abs(hunter.vx)>.08){hunter.face=hunter.vx>0?1:-1;hunter.walk+=Math.abs(hunter.vx);hunter.pose='walk'}else hunter.pose='idle';
  if(!intent.action){hunter.sweepT=Math.max(0,hunter.sweepT-2);return}
  hunter.action=true;
  if(act.phase==='warn'&&act.floor===f.index&&Math.abs(hunter.x-(act.side===0?132:28))<6){
    act.braced=true;hunter.pose='brace';return;
  }
  if(intent.wardSide){
    const v=ventFor(f,intent.wardSide),castX=v.x-intent.wardSide*52;if(Math.abs(hunter.x-castX)<6&&!v.sealed){v.charge++;hunter.pose='seal';hunter.beam=true;hunter.beamX=v.x;if(v.charge>=28)sealVent(f,v)}return;
  }
  const ghosts=exposedGhosts(f).sort((a,b)=>Math.abs(a.x-hunter.x)-Math.abs(b.x-hunter.x));
  const g=ghosts[0];
  if(g&&Math.abs(g.x-hunter.x)<40){
    hunter.beam=true;hunter.beamX=g.x;hunter.pose='vacuum';const pull=(hunter.x-g.x)*.018;
    if(g.state!=='arrival'){g.x+=pull;g.hp-=g.state==='stunned'?2.05:1.18;g.face=hunter.x>g.x?1:-1}
    if(g.hp<=0)captureGhost(f,g);return;
  }
  const p=f.furniture.filter(q=>!q.searched&&Math.abs(q.x-hunter.x)<7).sort((a,b)=>Math.abs(a.x-hunter.x)-Math.abs(b.x-hunter.x))[0];
  if(p){hunter.pose='sweep';hunter.sweepT++;p.shake=showFrame;if(hunter.sweepT>=Math.round(34*persona.linger)){hunter.sweepT=0;finishSweep(f,p)}}
}

function repossess(f,g){
  const p=propById(f,g.destId);if(!p){captureGhost(f,g);return}
  g.state='possessed';g.furnitureId=p.id;g.x=p.x;g.targetVent=p.x<80?1:-1;g.ventT=0;p.ghostId=g.id;p.searched=false;p.shake=showFrame;
  stats.repossessions++;stats.planBreaks++;f.planBreak++;markEvent();art('possess',p.x,f.index,g.escapeN);
  SHOW.offer({id:'possess',tier:1,at:showFrame,tag:'PLAN BROKEN'});fxDust(p.x,floorBase(f.index)-14,12,LILAC);
  recomputePlan();updateRoomLights(f);
}
function stepGhosts(f){
  for(const g of f.ghosts){
    if(g.spookCd>0)g.spookCd--;
    if(g.state==='possessed'||g.state==='captured')continue;
