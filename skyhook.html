<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SKYHOOK YARD</title>
<style>
  html,body{margin:0;height:100%;background:#08131f}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;
    image-rendering:pixelated;background:#10293b}
  canvas:focus-visible{outline:2px solid #ffd166;outline-offset:-3px}
</style>
<canvas id="cv" width="320" height="720" tabindex="0"
  aria-label="Skyhook Yard. An autonomous crane swings airship modules into a growing hull."></canvas>
<script src="engine.js"></script>
<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,random,R,RI,hash,clamp,rect,stepParts,drawParts,ring,stepRings,drawRings,
  shake,preDraw,postDraw,start,keys,tap,manual,initSession,sessionStep,drawSession,playing,
  addScore,gameOver,createShow,fxBurst,fxDust}=E;
const{controllerMux,skillProfile}=AI;

// SKYHOOK YARD is a logistics game whose only controlled body is a constrained
// pendulum. The angle representation keeps the cable length exact; planner and
// runtime both call integratePendulum() and stepFreeCargo() on plain numeric state.
const RAIL_Y=31,RAIL_L=18,RAIL_R=142,FLOOR_Y=329;
const PICK_X=32,PICK_Y=301,SCREEN_X=80,SCREEN_TOP=203;
const GRAVITY=.115,MIN_ROPE=62,MAX_ROPE=272,SWING_ROPE=126;
const MODULE_CATCHES=3,REQUIRED_MODULES=26;
const LEGACY_LAUNCH_FRAMES=320,LONG_LAUNCH_FRAMES=960;
const INK='#0a1724',SKY='#173a4d',SKY2='#245264',FOG='#8fb7bd',CREAM='#f4e7c5';
const GOLD='#ffd166',CORAL='#ef6b67',TEAL='#43d6b2',BLUE='#54a8d8',VIOLET='#aa7ee8';
const TYPES=[
  {name:'FRAME',mass:1.0,size:7,tol:15,color:GOLD,fragile:false},
  {name:'CELL',mass:.72,size:8,tol:13,color:'#9ee7ef',fragile:true},
  {name:'ENGINE',mass:2.35,size:10,tol:16,color:CORAL,fragile:false},
  {name:'FIN',mass:.82,size:8,tol:14,color:VIOLET,fragile:true},
  {name:'TANK',mass:1.65,size:9,tol:15,color:TEAL,fragile:false}
];
const PERSONAS=[
  {name:'RIGGER',rope:112,margin:.82,bias:0,color:TEAL},
  {name:'SLINGER',rope:139,margin:.98,bias:-1,color:GOLD},
  {name:'CLOSER',rope:124,margin:.72,bias:2,color:VIOLET}
];

let frame=0,showFrame=0,runFrame=0,craftNo=1,state='supply',stateT=0;
let jobNo=0,moduleFill=0,hullModules=[],placedPieces=[],pendingLaunch=false;
let cargo=null,debris=[],texts=[],plannedArc=[],releasePlan=null,planAt=-1e9;
let tactic='SEEK CARGO',persona=PERSONAS[0],windAx=0,launchY=0,launchT=0;
let lastEventFrame=0,lastProgressFrame=0,lastReleaseFrame=0,progressSerial=0,eventSerial=0,lapseWas=false;
let salvagePhase='none',lastRelease=null,releaseHistory=[];
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
const T={x:49,vx:0,ax:0,theta:0,omega:0,L:88,dL:0};
const target={baseX:122,futureX:122,x:122,y:257,w:23,phase:0};
const stats={catches:0,perfects:0,crashes:0,salvages:0,releases:0,latches:0,modules:0,
  launches:0,aborts:0,lapses:0,events:0,progress:0,maxEventLull:0,maxProgressLull:0,
  maxSwing:0,maxRopeError:0,maxRecoveryStep:0,forecasts:0,maxForecastError:0,
  deadlineMisses:0,lostModules:0,finalEngines:0};

// Viewer-story rendering is deliberately sim-inert. The switches stay global so
// the eval can replay the exact same seed with the old presentation forever.
// __NO_LONG_LAUNCH is separate because it intentionally extends only the
// post-completion ceremony; every pre-launch body and outcome remains identical.
const viewerStoryOn=()=>typeof __NO_VIEWER_STORY==='undefined';
const partialHullOn=()=>typeof __NO_PARTIAL_HULL==='undefined';
const longLaunchOn=()=>typeof __NO_LONG_LAUNCH==='undefined';
const launchFrameLimit=()=>longLaunchOn()?LONG_LAUNCH_FRAMES:LEGACY_LAUNCH_FRAMES;
let viewerDraw={frame:-1,enabled:false,hud:'',verb:'',trajectory:'',targetLabel:'',
  phase:'',visiblePartialCount:0,ghost:false,silhouetteStage:0};

function viewerPhaseFor(count){
  if(count>=REQUIRED_MODULES||state==='launch')return{index:4,label:'AIRSHIP COMPLETE',short:'LAUNCH'};
  if(count>=20)return{index:3,label:'FIT FINAL ENGINE',short:'ENGINE'};
  if(count>=13)return{index:2,label:'ADD LIFT WINGS',short:'LIFT'};
  if(count>=6)return{index:1,label:'POWER THE HULL',short:'POWER'};
  return{index:0,label:'BUILD THE FRAME',short:'FRAME'};
}
function viewerVerb(){
  if(state==='launch'){
    if(launchT<90)return'UNFOLD AIRSHIP';
    if(launchT<360)return'AIRSHIP COMPLETE';
    if(launchT<720)return'LAUNCHING AIRSHIP';
    return'BON VOYAGE';
  }
  if(state==='supply'||state==='pickup')return'PICK UP CARGO';
  if(state==='swing')return'SWING TO GREEN BAY';
  if(state==='flight')return'DROP IN GREEN BAY';
  if(state==='caught')return moduleFill?'BUILD PART '+moduleFill+'/3':'MODULE LOCKED';
  if(state==='crash')return'MISSED - RECOVER';
  if(state==='salvage')return'SALVAGE THE PART';
  if(state==='lost')return'REPLACE THE PART';
  return'BUILD THE AIRSHIP';
}
function trajectoryStory(){
  const flight=releasePlan&&releasePlan.flight,cross=flight&&flight.cross;
  if(!cargo||!releasePlan)return{label:'',delta:null,tolerance:cargo&&cargo.tol||null,color:FOG};
  if(releasePlan.collision||flight&&flight.collision)
    return{label:'BLOCKED',delta:null,tolerance:cargo.tol,color:CORAL};
  if(!cross)return{label:'NO LINE',delta:null,tolerance:cargo.tol,color:CORAL};
  const delta=cross.x-cross.targetX,tol=cargo.tol;
  if(Math.abs(delta)<=tol)return{label:'ON TARGET',delta,tolerance:tol,color:TEAL};
  return{label:delta<0?'SHORT':'LONG',delta,tolerance:tol,color:CORAL};
}

const SHOW=createShow({tiers:{
  1:{frames:12},
  2:{frames:42,minGap:84},
  3:{frames:96,minGap:360,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});

const craneSkill=skillProfile({skill:.93,precision:.94,risk:.72,recovery:.96,reactionFrames:[2,4],
  lapseChance:.00042,lapseFrames:[7,18],
  rng:{chance:p=>random()<p,int:RI,range:R}});

// Two deterministic dock acts. Scheduling and latched parameters draw no RNG.
// Their warning phases deliberately affect bot intent before any force/target move lands.
const gust={phase:'calm',warnAt:1500,landAt:1740,endAt:2640,dir:1,count:0};
const moor={phase:'calm',warnAt:9000,landAt:9180,endAt:9540,count:0};
const actNotes=[];
function noteAct(e){actNotes.push({kind:e.kind,id:e.id,at:e.at,tag:e.tag,landsAt:e.landsAt});SHOW.note(e);}
function resetActs(){
  Object.assign(gust,{phase:'calm',warnAt:1500,landAt:1740,endAt:2640,dir:craftNo%2?1:-1});
  Object.assign(moor,{phase:'calm',warnAt:9000,landAt:9180,endAt:9540});
  target.futureX=target.baseX;windAx=0;
}
function stepActs(){
  if(typeof __NO_ACTS!=='undefined'){
    gust.phase='calm';moor.phase='calm';target.futureX=target.baseX;windAx=0;return;
  }
  if(gust.phase==='calm'&&runFrame===gust.warnAt){
    gust.phase='warn';gust.dir=((craftNo+gust.count)&1)?1:-1;
    noteAct({kind:'act-warning',id:'gust',at:showFrame,tag:runFrame,landsAt:showFrame+240});
    markEvent();say('GUST FRONT',GOLD,80,71,92);
  }else if(gust.phase==='warn'&&runFrame>=gust.landAt){
    gust.phase='live';windAx=.021*gust.dir;
    noteAct({kind:'act-land',id:'gust',at:showFrame,tag:runFrame});markEvent();shake(3);
    say(gust.dir>0?'WIND >>':'<< WIND',CORAL,80,71,78);
  }else if(gust.phase==='live'&&runFrame>=gust.endAt){
    noteAct({kind:'act-end',id:'gust',at:showFrame,tag:runFrame});
    gust.count++;gust.phase='calm';windAx=0;
    gust.warnAt+=6600;gust.landAt=gust.warnAt+240;gust.endAt=gust.landAt+900;
  }
  if(moor.phase==='calm'&&runFrame===moor.warnAt){
    moor.phase='warn';target.futureX=target.baseX<122?136:target.baseX>126?113:(moor.count%2?113:136);
    noteAct({kind:'act-warning',id:'mooring',at:showFrame,tag:runFrame,landsAt:showFrame+180});
    markEvent();say('MOORING SHIFT',VIOLET,80,86,92);
  }else if(moor.phase==='warn'&&runFrame>=moor.landAt){
    moor.phase='live';target.baseX=target.futureX;
    noteAct({kind:'act-land',id:'mooring',at:showFrame,tag:runFrame});markEvent();shake(2);
    say('NEW BAY',TEAL,target.baseX,105,64);
  }else if(moor.phase==='live'&&runFrame>=moor.endAt){
    noteAct({kind:'act-end',id:'mooring',at:showFrame,tag:runFrame});
    moor.count++;moor.phase='calm';target.futureX=target.baseX;
    moor.warnAt+=7200;moor.landAt=moor.warnAt+180;moor.endAt=moor.landAt+360;
  }
}
function forecastWind(offset){
  if(typeof __NO_ACTS!=='undefined')return 0;
  const at=runFrame+offset;
  if(gust.phase==='warn'&&at>=gust.landAt&&at<gust.endAt)return .021*gust.dir;
  if(gust.phase==='live'&&at<gust.endAt)return .021*gust.dir;
  return 0;
}
function targetBaseAt(offset){
  if(typeof __NO_ACTS!=='undefined')return target.baseX;
  return moor.phase==='warn'&&runFrame+offset>=moor.landAt?target.futureX:target.baseX;
}
function catcherMoving(){return hullModules.length>=4;}
function screenActive(){return hullModules.length>=6;}
function catcherXAt(offset){
  const amp=catcherMoving()?Math.min(6,2.6+(hullModules.length-4)*.25):0;
  return targetBaseAt(offset)+Math.sin((runFrame+offset+target.phase)/78)*amp;
}

function say(s,c,x,y,t){texts.push({s,c:c||CREAM,x:x===undefined?80:x,y:y===undefined?146:y,t:t||50});}
function markEvent(){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);lastEventFrame=showFrame;}
function markProgress(){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);lastProgressFrame=showFrame;}
function score(n){if(playing())addScore(Math.round(n));}
function finiteObject(o){return Object.values(o).filter(v=>typeof v==='number').every(Number.isFinite);}
function allFinite(){return [T,target,stats,cargo||{},...debris,...hullModules,...placedPieces].every(finiteObject);}

function cloneSwing(s){return{x:s.x,vx:s.vx,ax:s.ax,theta:s.theta,omega:s.omega,L:s.L,dL:s.dL};}
function pointFrom(s){
  const sn=Math.sin(s.theta),cs=Math.cos(s.theta);
  return{x:s.x+sn*s.L,y:RAIL_Y+cs*s.L,
    vx:s.vx+cs*s.L*s.omega+sn*s.dL,vy:-sn*s.L*s.omega+cs*s.dL};
}
function integratePendulum(s,intent,wind,mass,track){
  mass=Math.max(.2,mass||.2);const oldL=s.L,oldV=s.vx;
  const winch=clamp(intent.winch||0,-1,1);
  s.L=clamp(s.L+winch*(winch<0?1.18:1.04),MIN_ROPE,MAX_ROPE);s.dL=s.L-oldL;
  const motor=.082/(1+mass*.16),desired=(intent.trolley||0)*motor;
  s.vx+=desired;
  s.vx*=intent.brake?.74:.948;s.vx=clamp(s.vx,-2.35,2.35);
  s.x+=s.vx;
  if(s.x<RAIL_L){s.x=RAIL_L;s.vx=Math.abs(s.vx)*.25;}
  if(s.x>RAIL_R){s.x=RAIL_R;s.vx=-Math.abs(s.vx)*.25;}
  s.ax=s.vx-oldV;
  const tangential=-GRAVITY/s.L*Math.sin(s.theta)-s.ax/s.L*Math.cos(s.theta)+
    wind/Math.max(.55,mass)/s.L*Math.cos(s.theta);
  s.omega=(s.omega+tangential)*(.9972-mass*.00008);
  if(intent.brake)s.omega=(s.omega-s.theta*.012)*.84;
  s.omega=clamp(s.omega,-.067,.067);s.theta+=s.omega;
  // The trolley beam is a real stop, not an invisible rescue. The bot stays
  // below this envelope; a wild manual swing rebounds visibly at the gantry.
  if(s.theta>1.24){s.theta=1.24;s.omega=-Math.abs(s.omega)*.38;}
  if(s.theta< -1.24){s.theta=-1.24;s.omega=Math.abs(s.omega)*.38;}
  const p=pointFrom(s),err=Math.abs(Math.hypot(p.x-s.x,p.y-RAIL_Y)-s.L);
  if(track!==false)stats.maxRopeError=Math.max(stats.maxRopeError,err);return p;
}
function stepFreeCargo(c,wind){
  c.px=c.x;c.py=c.y;c.vx+=wind/Math.max(.55,c.mass);c.vy+=GRAVITY;c.x+=c.vx;c.y+=c.vy;c.t++;
  return c;
}
function hitsScreen(c){return screenActive()&&c.y+c.size>SCREEN_TOP&&c.x+c.size>SCREEN_X-4&&c.x-c.size<SCREEN_X+4;}
function predictedTargetY(){return target.y;}
function simulateFree(start,maxFrames,offset0){
  offset0=offset0||0;
  const c={...start,px:start.x,py:start.y,t:0},points=[];let collision=false,cross=null;
  for(let i=0;i<(maxFrames||150);i++){
    stepFreeCargo(c,forecastWind(offset0+i));
    if(i%5===0)points.push({x:c.x,y:c.y});
    if(hitsScreen(c)){collision=true;break;}
    if(c.py+c.size<predictedTargetY()&&c.y+c.size>=predictedTargetY()){
      cross={x:c.x,y:c.y,vx:c.vx,vy:c.vy,targetX:catcherXAt(offset0+i),at:i};break;
    }
    if(c.y>FLOOR_Y+20||c.x<-25||c.x>W+25)break;
  }
  return{cargo:c,points,collision,cross,miss:cross?Math.abs(cross.x-cross.targetX):999};
}
function pumpControl(s,c,ropePattern){
  const p=pointFrom(s),amp=Math.abs(s.theta),desiredRope=ropePattern||persona.rope;
  let trolley=s.omega>=0?-1:1;
  if(s.x<29)trolley=Math.max(0,trolley);if(s.x>132)trolley=Math.min(0,trolley);
  if(amp>.92)trolley=-Math.sign(s.theta);
  const winch=s.L>desiredRope+2?-1:s.L<desiredRope-2?1:0;
  const brake=amp>.99||Math.abs(s.vx)>2.12;
  return{trolley,winch,brake,magnet:false,release:false,targetId:c.id,tactic:'BUILD SWING'};
}
function simulateCandidate(delay,ropePattern){
  const s=cloneSwing(T),c={...cargo};let p=pointFrom(s);
  for(let i=0;i<delay;i++){const intent=pumpControl(s,c,ropePattern);p=integratePendulum(s,intent,forecastWind(i),c.mass,false);}
  const start={...c,x:p.x,y:p.y,vx:p.vx,vy:p.vy,size:c.size,mass:c.mass,t:0};
  const flight=simulateFree(start,150,delay+1),speed=flight.cross?Math.hypot(flight.cross.vx,flight.cross.vy):20;
  return{delay,rope:ropePattern||persona.rope,flight,miss:flight.miss,collision:flight.collision,speed,
    score:flight.miss+(flight.collision?900:0)+Math.max(0,speed-4.8)*1.2+(delay>90?(delay-90)*.08:0)};
}
function simulateReleaseAfterIntent(intent){
  const s=cloneSwing(T),c={...cargo};
  const p=integratePendulum(s,intent,windAx,c.mass,false);
  const start={...c,x:p.x,y:p.y,vx:p.vx,vy:p.vy,size:c.size,mass:c.mass,t:0};
  const flight=simulateFree(start,150,1);
  return{flight,miss:flight.miss,collision:flight.collision};
}
function makeReleasePlan(){
  let best=null;
  const ropes=[persona.rope,clamp(persona.rope-18,88,152),clamp(persona.rope+18,88,152)];
  for(const rope of new Set(ropes))for(let delay=0;delay<=96;delay+=6){const cand=simulateCandidate(delay,rope);if(!best||cand.score<best.score)best=cand;}
  return best;
}

function chooseType(){
  if(hullModules.length===REQUIRED_MODULES-1&&moduleFill===MODULE_CATCHES-1)return TYPES[2];
  const level=Math.min(5,Math.floor(hullModules.length/3));
  let ix=(jobNo+craftNo*2)%Math.min(TYPES.length,2+level);
  if(jobNo%9===7)ix=2;else if(jobNo%7===5&&level>=2)ix=3;
  return TYPES[ix];
}
function deadlineFor(type,level){
  level=level===undefined?hullModules.length:level;
  return type.name==='ENGINE'?Math.max(450,690-level*10):Math.max(650,930-level*8);
}
function spawnCargo(){
  jobNo++;const type=chooseType();target.phase=(jobNo*47+craftNo*31)%157;
  target.y=246+(jobNo%3)*18;
  const deadline=deadlineFor(type),finalEngine=type.name==='ENGINE'&&
    hullModules.length===REQUIRED_MODULES-1&&moduleFill===MODULE_CATCHES-1;
  cargo={id:jobNo,type:type.name,mass:type.mass,size:type.size,tol:type.tol,color:type.color,
    fragile:type.fragile,x:-14,y:PICK_Y,vx:.62,vy:0,px:-14,py:PICK_Y,t:0,ready:false,
    attached:false,releaseBias:RI(-2,2),swingT:0,pickupT:0,deadline,deadlineLeft:deadline,deadlineWarned:false,
    finalEngine,crossed:false};
  state='supply';stateT=0;tactic='SEEK CARGO';releasePlan=null;plannedArc=[];planAt=-1e9;
}
function resetCrane(){Object.assign(T,{x:49,vx:0,ax:0,theta:0,omega:0,L:88,dL:0});}
function resetCraft(full){
  runFrame=0;stateT=0;moduleFill=0;hullModules=[];placedPieces=[];pendingLaunch=false;
  debris=[];texts=[];launchY=0;launchT=0;salvagePhase='none';target.baseX=122;target.futureX=122;
  resetCrane();resetActs();craneSkill.reset();lapseWas=false;
  persona=PERSONAS[(craftNo+RI(0,PERSONAS.length-1))%PERSONAS.length];
  lastEventFrame=showFrame;lastProgressFrame=showFrame;lastReleaseFrame=showFrame;
  if(full){jobNo=0;releaseHistory=[];lastRelease=null;}
  spawnCargo();SHOW.reset(showFrame);
}

function latchCargo(){
  if(!cargo||cargo.attached||!cargo.ready)return false;
  const p=pointFrom(T),d=Math.hypot(p.x-cargo.x,p.y-cargo.y);
  if(d>10||Math.abs(T.x-PICK_X)>22)return false;
  cargo.attached=true;state='swing';cargo.swingT=0;
  T.L=clamp(Math.hypot(cargo.x-T.x,cargo.y-RAIL_Y),MIN_ROPE,MAX_ROPE);
  T.theta=Math.atan2(cargo.x-T.x,cargo.y-RAIL_Y);T.omega=0;T.dL=0;
  const q=pointFrom(T);Object.assign(cargo,{x:q.x,y:q.y,vx:q.vx,vy:q.vy});
  stats.latches++;markEvent();SHOW.offer({id:'latch',tier:1,at:showFrame,x:cargo.x,y:cargo.y});
  ring(cargo.x,cargo.y,GOLD,1.2,18);say('MAGNET LOCK',GOLD,cargo.x,cargo.y-15,48);return true;
}
function recordReleaseCross(miss){
  if(!lastRelease||lastRelease.done||!cargo||lastRelease.cargoId!==cargo.id)return;
  lastRelease.actualMiss=miss;lastRelease.error=Math.abs(lastRelease.predictedMiss-miss);
  lastRelease.outcome=miss<=cargo.tol?'catch':'miss';lastRelease.done=true;
  stats.forecasts++;stats.maxForecastError=Math.max(stats.maxForecastError,lastRelease.error);
}
function recordReleaseCollision(){
  if(!lastRelease||lastRelease.done||!cargo||lastRelease.cargoId!==cargo.id)return;
  lastRelease.outcome='collision';lastRelease.collisionMatched=!!lastRelease.predictedCollision;lastRelease.done=true;
}
function releaseCargo(reason){
  if(state!=='swing'||!cargo||!cargo.attached)return false;
  const p=pointFrom(T);Object.assign(cargo,{attached:false,x:p.x,y:p.y,vx:p.vx,vy:p.vy,px:p.x,py:p.y,t:0});
  // Recompute from the actual release state. This is the arc the viewer sees
  // in flight and the miss number the runtime outcome must later corroborate.
  const flight=simulateFree({...cargo},150,1);
  releasePlan={delay:0,flight,miss:flight.miss,collision:flight.collision,actual:true,at:showFrame};
  plannedArc=flight.points.map(o=>({...o}));
  lastRelease={cargoId:cargo.id,at:showFrame,predictedMiss:flight.miss,
    predictedCollision:flight.collision,actualMiss:null,error:null,outcome:'flight',done:false};
  releaseHistory.push(lastRelease);if(releaseHistory.length>240)releaseHistory.shift();
  cargo.crossed=false;state='flight';stats.releases++;lastReleaseFrame=showFrame;markEvent();tactic=reason||'RELEASE';
  SHOW.offer({id:'release',tier:1,at:showFrame,x:cargo.x,y:cargo.y});
  say('RELEASE',CREAM,cargo.x,cargo.y-12,42);return true;
}
function hullSlot(index){
  const col=index%3,row=Math.floor(index/3);return{x:108+col*14,y:303-row*12};
}
function completeCatch(perfect){
  state='caught';stateT=54;cargo.attached=false;cargo.vx=0;cargo.vy=0;
  stats.catches++;if(perfect)stats.perfects++;markEvent();markProgress();score(perfect?420:250);
  SHOW.offer({id:'catch',tier:1,at:showFrame,x:cargo.x,y:cargo.y});
  if(perfect){SHOW.offer({id:'perfect',tier:2,at:showFrame,x:cargo.x,y:cargo.y});
    fxBurst(cargo.x,cargo.y,12,GOLD,1.8,.025);say('PERFECT CATCH',GOLD,target.x,target.y-22,64);}
  else{fxDust(cargo.x,cargo.y,7,TEAL);say('LOCKED',TEAL,target.x,target.y-18,46);}
  if(cargo.finalEngine){stats.finalEngines++;say('FINAL ENGINE LOCK',CORAL,92,192,92);}
  moduleFill++;placedPieces.push({kind:cargo.type,color:cargo.color,slot:hullSlot(hullModules.length),t:0});
  if(moduleFill>=MODULE_CATCHES){
    moduleFill=0;const slot=hullSlot(hullModules.length);
    hullModules.push({x:slot.x,y:slot.y,color:cargo.color,kind:cargo.type});
    placedPieces=[];stats.modules++;markProgress();score(700);

    const base=pumpControl(T,cargo,typeof __NO_RELEASE_PLAN==='undefined'&&releasePlan?releasePlan.rope:undefined);let release=false;
    if(typeof __NO_RELEASE_PLAN==='undefined'){
