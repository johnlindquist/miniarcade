<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRYSTAL MESA</title><style>html,body{margin:0;height:100%;background:#08090d}
body{display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;image-rendering:pixelated;background:#0a0b10}
canvas:focus-visible{outline:2px solid #ffd166;outline-offset:-3px}</style>
<canvas id="cv" width="320" height="720" tabindex="0" aria-label="Crystal Mesa: a custodian hurls lab junk with a gravity claw while climbing out of a failing facility"></canvas>
<script src="engine.js"></script><script src="autoplay.js"></script>
<script>
'use strict';
/* CRYSTAL MESA — the gravity claw IS the show.
 * A lone custodian climbs out of a resonance-cracked research mesa. He has no
 * gun worth the name: he yanks the world's junk to his claw, charges, and
 * hurls it through whatever crawls at him. Catch a plasma bolt, return it.
 * Throw the flux cell INTO the door socket. Momentum is honest: props carry
 * mass, hurls recoil, misses ricochet, and heavy cargo slows the carrier. */
const{ctx,W,H,rect,clamp,R,RI,random,dist,hash,burst,dust,fxBurst,fxDust,ring,
  stepParts,drawParts,stepRings,drawRings,shake,preDraw,postDraw,keys,tap,manual,
  initSession,sessionStep,playing,gameOver,addScore,drawSession,createShow,start}=E;

const LX=10,RX=150,ZONE_H=880,TAU=Math.PI*2;
const BIOMES=[
 {name:'ANOMALY LABS',wall:'#141f2b',wall2:'#182635',floor:'#0f1720',panel:'#20364a',trim:'#2f4d63',glow:'#63e0f5',deco:'lab'},
 {name:'BIO WING',wall:'#132217',wall2:'#182b1e',floor:'#0e1810',panel:'#1f3c2b',trim:'#2f5c40',glow:'#7ee08a',deco:'bio'},
 {name:'MAINTENANCE',wall:'#221d15',wall2:'#2a241b',floor:'#16120d',panel:'#3e3325',trim:'#5c4a36',glow:'#ffb24d',deco:'maint'},
 {name:'TRANSIT LINE',wall:'#181a24',wall2:'#1f222e',floor:'#10121a',panel:'#2b3044',trim:'#414a66',glow:'#9aa7ff',deco:'transit'},
 {name:'CORE SHAFT',wall:'#241219',wall2:'#2e1820',floor:'#170c10',panel:'#46202e',trim:'#632f42',glow:'#ff6b81',deco:'core'},
 {name:'ANTENNA CLIMB',wall:'#1e2228',wall2:'#262b32',floor:'#14171c',panel:'#363e49',trim:'#4d5866',glow:'#ffd166',deco:'antenna'}];
const PROP_DEF={crate:{mass:1,r:4,hp:2,dmg:1,c:'#5d708a',c2:'#7d93b0'},
 can:{mass:2,r:4,hp:1,dmg:2,c:'#e05548',c2:'#ffd166'},
 disc:{mass:1.4,r:3,hp:3,dmg:2,c:'#b8c4d4',c2:'#77808f'},
 cell:{mass:2,r:4,hp:99,dmg:2,c:'#ffd166',c2:'#fff2c4'},
 bolt:{mass:1.5,r:2,hp:1,dmg:2,c:'#63e0f5',c2:'#dff8ff'},
 mite:{mass:1,r:3,hp:1,dmg:1,c:'#a4d465',c2:'#54763a'}};
const PERSONAS={
 JUGGLER:{name:'JUGGLER',range:56,holdMin:10,catchR:34,heavyBias:0.7,poach:0.25,skill:{skill:0.85,reactionFrames:[2,5],lapseFrames:[8,16]}},
 HAULER:{name:'HAULER',range:34,holdMin:17,catchR:16,heavyBias:2.6,poach:0.05,skill:{skill:0.74,reactionFrames:[4,8],lapseFrames:[8,18]}},
 POACHER:{name:'POACHER',range:46,holdMin:11,catchR:24,heavyBias:1.0,poach:1.0,skill:{skill:0.80,reactionFrames:[3,6],lapseFrames:[8,16]}}};
const BALANCED={name:'BALANCED',range:46,holdMin:11,catchR:24,heavyBias:1.0,poach:0.2,skill:{skill:0.80,reactionFrames:[3,6],lapseFrames:[8,16]}};
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
 1:{frames:10},2:{frames:32,minGap:72},3:{frames:78,minGap:420,hold:6,slowEvery:3,slowFrames:12,admire:48}}});
// apex pause budget: 6 hold + 12 slow-mo = 18sf — the motion contract's 30f still limit
// must survive hold+slow+boundaries even for the slowest roamer (see AI-AUDIT entry)

let showFrame=0,pres={cue:null,holdWorld:false,physicsEvery:1,admire:false};
let wf=0,camY=0,hero=null,zones=[],props=[],foes=[],bolts=[],beams=[],nid=1;
let act=null,persona=BALANCED,skill=null,needPersona=true,banners=[];
// stats are cumulative per boot — resetGame must never replace this object.
const stats={kills:0,propKills:0,zapKills:0,poachKills:0,throws:0,heavyThrows:0,
 foeThrows:0,grabs:0,catches:0,catchKills:0,bankKills:0,multiKills:0,tripleKills:0,
 shieldBreaks:0,slots:0,slotThrows:0,deaths:0,bossKills:0,surges:0,metersMax:0,
 lapseFrames:0,emoteFrames:0,hurt:{}};

function flag(n){return typeof globalThis[n]!=='undefined';}
function mkHero(x,y){return{x,y,vx:0,vy:0,face:-Math.PI/2,hp:4,ihit:0,dead:0,
 charge:0,held:null,zapCd:0,grabCd:0,gunFlash:0,walk:0,recoil:0,
 dodgeUntil:0,dodgeX:0,dodgeY:0,scavId:0,cellId:0,engaged:false,escapeUntil:0,escapeX:0,escapeY:0,
 emoteKind:'',emoteUntil:0,anchorX:x,anchorY:y,anchorF:0,spotted:false};}
function emote(kind,frames){
 if((kind==='?'||kind==='!')&&wf<hero.emoteUntil+240)return; // bubbles are seasoning, not a state
 if(hero.emoteKind!==kind||wf>=hero.emoteUntil){hero.emoteKind=kind;hero.emoteUntil=wf+frames;}}
function heroEmote(){return hero.emoteKind!==''&&wf<hero.emoteUntil;}
function kOf(y){return Math.max(0,Math.floor(-y/ZONE_H));}
function biomeOf(k){return BIOMES[k%6];}
function meters(){return Math.max(0,Math.floor(-hero.y/8));}

function genZone(k){
 const top=-(k+1)*ZONE_H,bottom=-k*ZONE_H,b=biomeOf(k);
 const z={k,top,bottom,biome:b,door:{y:top+22,open:k===0?false:false,openT:0},
  socket:{x:RI(0,1)?LX+13:RX-13,y:top+44},deco:[],crystals:[],vents:[],
  nextReinforce:0,boss:(k%3===2)};
 // authored deco: banded placement so every screenful is furnished
 for(let by=top+70;by<bottom-50;by+=90){
  for(let i=0,c=RI(2,3);i<c;i++)
   z.deco.push({kind:RI(0,2),x:RI(LX+10,RX-10),y:by+RI(0,74),s:RI(0,3)});}
 for(let i=0,c=RI(8,12);i<c;i++)z.crystals.push({x:RI(0,1)?RI(LX+4,LX+22):RI(RX-22,RX-4),y:RI(top+60,bottom-30),s:RI(2,5)});
 z.vents.push({x:LX+18,y:top+120,t:RI(300,700)},{x:RX-18,y:bottom-160,t:RI(300,700)});
 // props: the ammo economy, banded like the deco
 for(let by=top+90;by<bottom-60;by+=200)
  for(let i=0,c=RI(1,2);i<c;i++)
   spawnProp(RI(0,9)<6?'crate':(RI(0,1)?'can':'disc'),RI(LX+12,RX-12),by+RI(0,160));
 spawnProp('cell',RI(LX+16,RX-16),top+RI(300,480));
 spawnProp('cell',RI(LX+16,RX-16),top+RI(560,760));
 // foes: one nest / one patrol per band, so threats share every screen
 for(let by=top+130,i=0;by<bottom-110;by+=270,i++){
  const nx=RI(LX+20,RX-20),ny=by+RI(0,120);
  for(let m=0,c=RI(3,4);m<c;m++)spawnFoe('mite',nx+RI(-10,10),ny+RI(-10,10),{hx:nx,hy:ny});}
 for(let by=top+110,i=0;by<bottom-120;by+=280,i++){
  const wy=by+RI(0,100);
  spawnFoe('warden',RI(LX+18,RX-18),wy,{wy0:wy-RI(24,50),wy1:wy+RI(24,50)});}
 if(z.boss)spawnFoe('tripod',(z.socket.x<W/2?RX-44:LX+44),top+70,{hx:W/2,hy:top+86});
 z.nextReinforce=RI(800,1200);
 zones[k]=z;return z;
}
function ensureZones(){const need=kOf(hero.y)+2;for(let k=0;k<=need;k++)if(!zones[k])genZone(k);}
function spawnProp(kind,x,y){const d=PROP_DEF[kind];
 props.push({id:nid++,kind,x,y,vx:0,vy:0,hp:d.hp,mass:d.mass,r:d.r,held:false,
  yank:false,thrown:0,bounces:0,killed:0,rest:0,drop:0});return props[props.length-1];}
function spawnFoe(kind,x,y,ex){const f=Object.assign({id:nid++,kind,x,y,vx:0,vy:0,
  hp:kind==='tripod'?6:(kind==='warden'?2:1),shield:kind==='warden'?1:0,
  state:'roam',t:RI(0,60),stun:0,fireCd:RI(60,140),wpx:x,wpy:y,face:1,gib:0,held:false,
  ancX:x,ancY:y,ancF:0},ex||{});
 foes.push(f);return f;}

function resetGame(){
 wf=0;props=[];foes=[];bolts=[];beams=[];zones=[];banners=[];act={phase:'calm',landAt:0,nextM:80};
 hero=mkHero(80,-40);camY=hero.y-240;needPersona=true;SHOW.reset(showFrame);
 ensureZones();
}
function assignPersona(){
 if(flag('__NO_PERSONAS')){persona=BALANCED;}
 else{const names=Object.keys(PERSONAS);
  persona=PERSONAS[globalThis.__CM_FORCE_PERSONA||names[RI(0,names.length-1)]];}
 const salt=flag('__NO_PERSONAS')?7:RI(1,0x7fffffff);
 skill=AI.createSkillProfile(Object.assign({},persona.skill,{
  lapseChance:flag('__NO_LAPSE')?0:0.0011,
  rng:AI.createRng(AI.hashSeed('cm-skill-'+persona.name+'-'+salt))}));
}

/* ---------- payoffs ---------- */
function offer(id,tier,tag,x,y){SHOW.offer({id,tier,tag,x,y,at:showFrame});}
function banner(txt,c){banners.push({txt,c,at:showFrame});if(banners.length>3)banners.shift();}
function killFoe(f,cause,byProp){
 f.hp=0;f.gib=1;stats.kills++;
 if(cause==='zap')stats.zapKills++;else stats.propKills++;
 if(cause==='poach')stats.poachKills++;
 burst(f.x,f.y,f.kind==='tripod'?26:10,f.kind==='mite'?'#a4d465':'#c8ccd4',f.kind==='tripod'?2.6:1.6);
 fxBurst(f.x,f.y,8,'#ffd166',1.4);
 if(f.kind==='tripod'){stats.bossKills++;shake(8);offer('tripod-down',3,'TRIPOD DOWN',f.x,f.y);banner('TRIPOD DOWN','#ffd166');
  spawnProp('can',f.x-8,f.y+6);spawnProp('can',f.x+8,f.y+6);
  if(playing())addScore(100);return;}
 if(playing())addScore(5);
 if(byProp){byProp.killed++;
  if(byProp.kind==='bolt'){stats.catchKills++;offer('return',2,'RETURN TO SENDER',f.x,f.y);}
  else if(byProp.bounces>0){stats.bankKills++;offer('bank',2,'BANK SHOT',f.x,f.y);}
  else if(byProp.killed===2){stats.multiKills++;offer('double',2,'DOUBLE HIT',f.x,f.y);}
  else if(byProp.killed>=3){stats.tripleKills++;offer('triple',3,'TRIPLE HURL',f.x,f.y);banner('TRIPLE HURL','#ffd166');}
  else offer('kill-'+(f.kind==='mite'?'m':'w'),1,'',f.x,f.y);}
 else offer('kill-z',1,'',f.x,f.y);
}
function hurtFoe(f,dmg,cause,byProp){
 if(f.hp<=0)return;
 if(f.kind==='tripod'&&cause==='zap')return;             // physics only
 if(f.kind==='warden'&&f.shield>0){
  if(cause==='zap')return;                               // shield eats beams
  f.shield=0;f.stun=30;stats.shieldBreaks++;burst(f.x,f.y,8,'#63e0f5',1.8);
  offer('shield',2,'SHIELD DOWN',f.x,f.y);return;}
 f.hp-=dmg;f.stun=Math.max(f.stun,f.kind==='tripod'?5:10);
 if(byProp){f.vx+=byProp.vx*0.35;f.vy+=byProp.vy*0.35;}  // honest knockback
 if(f.kind==='tripod'&&f.hp===3){f.stun=60;offer('stagger',2,'TRIPOD STAGGERED',f.x,f.y);}
 if(f.hp<=0)killFoe(f,cause,byProp);
}
function hurtHero(dmg,cause){
 if(hero.ihit>0||hero.dead>0)return;
 stats.hurt[cause]=(stats.hurt[cause]||0)+1;
 hero.hp-=dmg;hero.ihit=110;shake(5);burst(hero.x,hero.y,10,'#ff6b81',1.8);
 if(hero.held){hero.held.held=false;hero.held.yank=false;hero.held=null;hero.charge=0;} // dropped!
 if(hero.hp<=0){hero.dead=110;stats.deaths++;burst(hero.x,hero.y,22,'#63e0f5',2.4);
  hero.vx=(W/2-hero.x)*0.06;hero.vy=2.3; // the blast tumbles the body — the pause starts with motion
  if(playing())gameOver('FLATLINED · '+meters()+'M');}
}

/* ---------- acts: RESONANCE SURGE ---------- */
function stepAct(){
 if(flag('__NO_ACTS'))return;
 const m=meters();
 if(act.phase==='calm'&&m>=act.nextM){
  act.phase='warn';act.landAt=showFrame+240;
  SHOW.note({kind:'act-warning',id:'surge',at:showFrame,landsAt:act.landAt,tag:wf});
  emote('!!',30);
 }else if(act.phase==='warn'&&showFrame>=act.landAt){
  act.phase='calm';act.nextM=m+120;stats.surges++;
  SHOW.note({kind:'act-land',id:'surge',at:showFrame,tag:wf});
  shake(9);offer('surge',2,'RESONANCE SURGE',hero.x,hero.y-30);
  for(const p of props)if(!p.held&&p.hp>0){p.vx+=R(-2.2,2.2);p.vy+=R(-2.4,1.0);p.thrown=0;}
  for(const f of foes)if(f.hp>0){if(f.kind==='mite')f.stun=90;else if(f.kind==='warden')f.stun=30;}
  hero.vx+=hero.x<W/2?1.4:-1.4;
 }
}

/* ---------- bot ---------- */
function reachable(o){const z=zones[kOf(hero.y)];
 return !z||z.door.open||o.y>=z.door.y+8;} // never chase through a sealed door
function grabbables(){const out=[];
 for(const p of props)if(!p.held&&p.hp>0&&p.rest>=0&&reachable(p))out.push(p);
 for(const f of foes)if(f.kind==='mite'&&f.hp>0&&!f.held&&f.stun<=0&&reachable(f))out.push(f);
 return out;}
function nearestFoe(){let best=null,bd=1e9;
 for(const f of foes){if(f.hp<=0||f.held||!reachable(f))continue;const d=dist(f,hero);
  if(d<bd&&Math.abs(f.y-camY-180)<260){bd=d;best=f;}}return best;}
function incomingBolt(){for(const b of bolts){const d=dist(b,hero);
  if(d<persona.catchR&&(b.x-hero.x)*b.vx+(b.y-hero.y)*b.vy<0)return b;}return null;}
function zoneOf(k){return zones[k]||genZone(k);}
function decideBot(){
 const k=kOf(hero.y),z=zoneOf(k),foe=nearestFoe(),held=hero.held;
 const it={mx:0,my:0,aimX:hero.x,aimY:hero.y-30,grab:false,fire:false,zap:false,tactic:'advance'};
 const go=(tx,ty,sp)=>{const v=AI.seek(hero,{x:tx,y:ty},{maxSpeed:1,slowRadius:sp||0});it.mx=v.x;it.my=v.y;};
 if(pres.admire&&!flag('__NO_ADMIRE')){it.tactic='admire';emote('*',60);return it;}
 // act telegraph changes the plan BEFORE it lands: hug a wall, keep a prop loaded
 if(act.phase==='warn'&&!flag('__NO_ACTS')){
  it.tactic='brace';
  const wx=hero.x<W/2?LX+9:RX-9;
  if(!held){const g=AI.nearest(grabbables(),hero);
   if(g&&dist(g,hero)<34){it.grab=true;it.aimX=g.x;it.aimY=g.y;}
   if(g&&dist(g,hero)<70){go(g.x,g.y);return it;}}
  go(wx,hero.y-14);return it;}
 // no claw? the zap is all he has — the A/B baseline still fights
 if(flag('__NO_GRAVGUN')){
  if(foe){it.tactic='zapper';const d=dist(foe,hero);
   if(foe.kind==='mite'&&d<20)go(hero.x+(hero.x<foe.x?-30:30),hero.y+20);
   else go(foe.x,foe.y,18);
   if(d<26){it.zap=true;it.aimX=foe.x;it.aimY=foe.y;}
   return it;}
  it.tactic='advance';go(clamp(W/2+Math.sin(wf*0.035)*26,LX+10,RX-10),hero.y-60);return it;}
 // catch an incoming bolt — the juggler's favorite
 const ib=!held&&!flag('__NO_CATCH')?incomingBolt():null;
 if(ib){it.tactic='catch';it.grab=true;it.aimX=ib.x;it.aimY=ib.y;emote('+',12);go(hero.x,hero.y+6);return it;}
 // read the attack and sidestep — direction LATCHED for the whole dodge, no chatter
 if(wf<hero.dodgeUntil){it.mx=hero.dodgeX;it.my=hero.dodgeY;it.tactic='dodge';return it;}
 for(const b of bolts){const d=dist(b,hero);
  if(d<44&&(b.x-hero.x)*b.vx+(b.y-hero.y)*b.vy<0){
   const cr=(hero.x-b.x)*b.vy-(hero.y-b.y)*b.vx,sg=cr>=0?1:-1,sp=Math.hypot(b.vx,b.vy)||1;
   hero.dodgeX=-b.vy/sp*sg;hero.dodgeY=b.vx/sp*sg;hero.dodgeUntil=wf+18;
   it.mx=hero.dodgeX;it.my=hero.dodgeY;it.tactic='dodge';
   return it;}}
 for(const f of foes){if(f.hp<=0||f.held||f.kind!=='mite')continue;
  if((f.state==='windup'||f.state==='lunge')&&dist(f,hero)<26){
   const a=Math.atan2(hero.y-f.y,hero.x-f.x);
   it.mx=Math.cos(a+0.9);it.my=Math.sin(a+0.9);it.tactic='dodge';
   if(!held&&hero.zapCd<=0){it.zap=true;it.aimX=f.x;it.aimY=f.y;}
   return it;}}
 // slot the flux cell
 if(held&&held.kind==='cell'){it.tactic='slot';const s=z.door.open?null:z.socket;
  if(!s){go(hero.x,hero.y-40);return it;}
  const d=dist(s,hero);
  if(d<46&&hero.charge>=10){it.aimX=s.x+skill.noise(2);it.aimY=s.y+skill.noise(2);it.fire=true;go(hero.x,s.y+26);return it;}
  go(s.x+Math.cos(wf*0.055)*13,s.y+26+Math.sin(wf*0.055)*7);return it;} // circle while the claw charges
 // on his last heart, unarmed and pressed: fall back TOWARD a weapon
 if(hero.hp<=1&&!held&&foe&&dist(foe,hero)<50){
  it.tactic='retreat';
  if(lastIntent&&lastIntent.tactic!=='retreat')emote('!!',30);
  const g=AI.nearest(grabbables(),hero);
  if(g&&dist(g,hero)<110){if(dist(g,hero)<30){it.grab=true;it.aimX=g.x;it.aimY=g.y;}go(g.x,g.y);}
  else go(hero.x+(hero.x<foe.x?-46:46),hero.y+70);
  return it;}
 const efd=foe?dist(foe,hero):1e9;
 const hot=!!foe&&(foe.aggro||efd<60); // a dozing nest 100px off is scenery, not a fight
 hero.engaged=hero.engaged?(hot&&efd<140):(hot&&efd<110); // hysteresis: no boundary dither
 if(foe&&hero.engaged){
  if(!hero.spotted){hero.spotted=true;emote('!',20);}
  const d=dist(foe,hero);
  if(!held){
   it.tactic='scavenge';
   const pool=grabbables();
   let g=pool.find(p=>p.id===hero.scavId&&dist(p,hero)<180)||null; // committed, but not across the map
   if(!g){g=AI.bestBy(pool,p=>{
    const heavy=(p.mass||1)>=2?persona.heavyBias:1;
    const poach=p.kind==='mite'?(persona.poach*2-0.9):0;
    return -(dist(p,hero))*(1/heavy)+poach*30;});hero.scavId=g?g.id:0;}
   if(g){if(dist(g,hero)<30)it.grab=true;go(g.x,g.y);
    if(d<26){it.zap=true;it.aimX=foe.x;it.aimY=foe.y;}   // desperate swat
    return it;}
   it.tactic='kite';go(hero.x+(hero.x<foe.x?-40:40),hero.y+34);
   if(d<26){it.zap=true;}
   return it;}
  // armed: close to persona range, strafe, lead the shot
  it.tactic='hunt';
  const want=foe.kind==='tripod'?Math.max(persona.range,46):persona.range,dd=d-want;
  const ang=Math.atan2(foe.y-hero.y,foe.x-hero.x);
  const strafe=Math.sin(wf*0.11+persona.name.length)*1.1;
  it.mx=Math.cos(ang)*clamp(dd*0.04,-1,1)-Math.sin(ang)*strafe;
  it.my=Math.sin(ang)*clamp(dd*0.04,-1,1)+Math.cos(ang)*strafe;
  const t=d/3.4;
  it.aimX=foe.x+foe.vx*t+skill.noise(4);it.aimY=foe.y+foe.vy*t+skill.noise(4);
  if(hero.charge>=persona.holdMin&&d<want+26)it.fire=true;
  return it;}
 // no foe: errands, then ascend
 hero.spotted=false;
 if(!z.door.open){
  if(held&&held.kind==='cell'){it.tactic='slot';
   if(dist(z.socket,hero)<46&&hero.charge>=10){it.aimX=z.socket.x;it.aimY=z.socket.y;it.fire=true;}
   go(z.socket.x+Math.cos(wf*0.055)*13,z.socket.y+26+Math.sin(wf*0.055)*7);
   return it;}
  if(held){it.tactic='clear'; // junk toss up-field, then go get the cell
   if(hero.charge>=10){it.aimX=W/2;it.aimY=hero.y-90;it.fire=true;}
   go(clamp(W/2+Math.sin(wf*0.05)*20,LX+10,RX-10),hero.y-50);
   return it;}
  let cell=props.find(p=>p.id===hero.cellId&&p.kind==='cell'&&!p.held&&p.hp>0&&kOf(p.y)===k)||null;
  if(!cell){ // fetch THIS zone's cell; a stale latch across the boundary walked him in circles
   cell=AI.bestBy(props,p=>p.kind==='cell'&&!p.held&&p.rest>=0&&reachable(p)?
    (kOf(p.y)===k?0:-2000)-dist(p,hero):NaN);

  ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(f.x-10,s+13,20,1);
  for(let i=0;i<3;i++){const lx=f.x+(i-1)*9,lift=(i===ph&&f.stun<=0)?-3:0;
   ctx.fillStyle='#454c5c';ctx.fillRect(lx-1,s-8,2,14+lift);
   ctx.fillStyle='#6b7484';ctx.fillRect(lx-2,s+5+lift,4,3);}
  const tilt=f.stun>30?2:0;
  rect(f.x-9,s-16+tilt,18,9,'#6b7484');rect(f.x-9,s-16+tilt,18,2,'#8b95a6');
  rect(f.x-6,s-12+tilt,12,3,'#454c5c');
  const gl=f.tele>0&&f.tele%4<2;
  ctx.fillStyle=gl?'#fff':'#ff5252';ctx.fillRect(f.x+(f.face>0?2:-4),s-13+tilt,3,2);
  if(f.stun>30){ctx.fillStyle='#ffd166';ctx.fillText('@',f.x-2,s-19);}
  // hp pips
  for(let i=0;i<6;i++){ctx.fillStyle=i<f.hp?'#ff6b81':'#2a2e36';ctx.fillRect(f.x-6+i*2,s-19,1,2);}}
}
function drawHero(){
 if(hero.dead>0){
  if(hero.dead<=30&&hero.rx!==undefined){const t=1-hero.dead/30;
   ctx.globalAlpha=0.5*t;ctx.strokeStyle='#63e0f5';
   ctx.beginPath();ctx.arc(hero.rx,sy(hero.ry),8*(1-t)+2,0,TAU);ctx.stroke();ctx.globalAlpha=1;}
  return;}
 const s=sy(hero.y),step2=Math.floor(hero.walk/4)%2,fx=Math.cos(hero.face),fy=Math.sin(hero.face);
 if(hero.ihit>0&&hero.ihit%6<3)ctx.globalAlpha=0.45;
 ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(hero.x-3,s+5,7,1);
 // boots
 ctx.fillStyle='#26303a';ctx.fillRect(hero.x-3+(step2?1:0),s+3,2,2);ctx.fillRect(hero.x+1-(step2?1:0),s+3,2,2);
 // suit + tank
 rect(hero.x-3,s-2,7,6,'#3a86a8');rect(hero.x-3,s-2,7,1,'#4fa3c4');
 rect(hero.x-4,s-1,1,4,'#2b6480');                       // backpack tank
 rect(hero.x-3,s+1,7,1,'#ff9f43');                       // trim
 // head + visor
 rect(hero.x-2,s-6,5,4,'#e8b08a');rect(hero.x-2,s-6,5,2,'#dff3ff');
 rect(hero.x-2,s-6,5,1,'#3a86a8');
 // grav claw: two prongs toward facing; glows when loaded, flashes on hurl
 const gx=hero.x+fx*6,gy=s+fy*6,px=-fy,py=fx;
 const lit=hero.held||hero.gunFlash>0;
 ctx.fillStyle=lit?'#9adcf0':'#77808f';
 ctx.fillRect(gx+px*2-1,gy+py*2-1,2,2);ctx.fillRect(gx-px*2-1,gy-py*2-1,2,2);
 if(hero.recoil>0){ctx.fillStyle='#dff8ff';ctx.fillRect(gx-1,gy-1,2,2);}
 if(hero.charge>=10&&hero.held&&showFrame%5<2){ctx.fillStyle='#ffd166';ctx.fillRect(gx+px*3,gy+py*3,1,1);}
 ctx.globalAlpha=1;
 // hearts drawn in HUD; emote bubble here
 if(heroEmote()){const k=hero.emoteKind,bw=k.length*5+3;
  ctx.fillStyle='#10141a';ctx.fillRect(hero.x-bw/2,s-15,bw,7);
  ctx.fillStyle=k==='!'||k==='!!'?'#ff6b81':(k==='*'?'#ffd166':'#dff3ff');
  ctx.font='6px monospace';ctx.fillText(k==='*'?'★':k,hero.x-bw/2+2,s-9);}
}
function drawHUD(){
 ctx.fillStyle='rgba(8,10,14,0.85)';ctx.fillRect(0,0,W,15);
 ctx.font='bold 6px monospace';
 ctx.fillStyle='#dff3ff';ctx.fillText(meters()+'M',4,6);
 ctx.fillStyle='#8b95a6';ctx.fillText(biomeOf(kOf(hero.y)).name,4,13);
 for(let i=0;i<4;i++){ctx.fillStyle=i<hero.hp?'#ff6b81':'#2a2e36';ctx.fillRect(W-34+i*7,3,5,4);}
 // persona chip + goal line
 ctx.fillStyle='#ffd166';ctx.fillText(persona.name,W-34,13);
 const k=kOf(hero.y),z=zones[k];
 let goal='ASCEND';
 if(z){const boss=foes.some(f=>f.kind==='tripod'&&f.hp>0&&kOf(f.y)===k);
  if(boss)goal='DOWN THE TRIPOD';
  else if(!z.door.open)goal=hero.held&&hero.held.kind==='cell'?'SLOT THE CELL':'FETCH FLUX CELL';}
 ctx.fillStyle='#7ee08a';ctx.fillText(goal,W/2-goal.length*1.8,22);
 if(act&&act.phase==='warn'&&showFrame%20<12){ctx.fillStyle='#ffd166';
  const t='RESONANCE SURGE';ctx.fillText(t,W/2-t.length*1.8,30);}
 // charge pips
 if(hero.held){const c=Math.min(hero.charge,30)/30;
  ctx.fillStyle='#20242a';ctx.fillRect(W/2-12,H-8,24,3);
  ctx.fillStyle=c>=0.33?'#ffd166':'#9adcf0';ctx.fillRect(W/2-12,H-8,Math.round(24*c),3);}
 for(let i=0;i<banners.length;i++){const b=banners[i],ag=showFrame-b.at;
  if(ag>130)continue;ctx.globalAlpha=ag<12?ag/12:(ag>100?(130-ag)/30:1);
  ctx.fillStyle=b.c;ctx.fillText(b.txt,W/2-b.txt.length*1.8,40+i*8);ctx.globalAlpha=1;}
 // tier-2/3 cue labels
 if(pres.cue&&pres.cue.tier>=2&&pres.cue.tag){const c=pres.cue;
  ctx.fillStyle=c.tier===3?'#ffd166':'#dff3ff';
  const y=clamp(sy(c.y)-12,20,H-20);
  ctx.fillText(c.tag,clamp(c.x-c.tag.length*1.8,4,W-c.tag.length*4),y);
  if(c.tier===3){ctx.globalAlpha=0.16;ctx.fillStyle='#ffd166';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}}
}
function render(){
 const only=typeof globalThis.__CM_VISUAL_ONLY_SUBJECT!=='undefined'?globalThis.__CM_VISUAL_ONLY_SUBJECT:null;
 preDraw();
 ctx.fillStyle='#0a0b10';ctx.fillRect(0,0,W,H);
 if(only!==null){
  // isolated renders for the visual eval's pixel diffs
  if(only==='env'){ // environment only: world craft without any actor
   const k0e=Math.max(0,kOf(camY+H)),k1e=kOf(camY)+1;
   for(let k=k0e;k<=k1e;k++)if(zones[k])drawZone(zones[k]);
   postDraw();return;}
  if(only==='hero'&&hero.dead<=0)drawHero();
  else if(only.startsWith('foe-')){const f=foes.find(f=>'foe-'+f.id===only);if(f)drawFoe(f);}
  else if(only.startsWith('prop-')){const p=props.find(p=>'prop-'+p.id===only);if(p)drawProp(p);}
  postDraw();return;}
 const k0=Math.max(0,kOf(camY+H)),k1=kOf(camY)+1;
 for(let k=k0;k<=k1;k++)if(zones[k])drawZone(zones[k]);
 for(const p of props)drawProp(p);
 for(const f of foes)drawFoe(f);
 for(const b of bolts){const s=sy(b.y);ctx.fillStyle='#dff8ff';ctx.fillRect(b.x-1,s-1,2,2);
  ctx.fillStyle='#63e0f5';ctx.fillRect(b.x-b.vx*2-1,s-b.vy*2-1,2,2);}
 for(const b of beams){ctx.globalAlpha=b.t/4;ctx.strokeStyle='#9adcf0';
  ctx.beginPath();ctx.moveTo(b.x0,sy(b.y0));ctx.lineTo(b.x1,sy(b.y1));ctx.stroke();ctx.globalAlpha=1;}
 drawHero();
 drawParts(camY);drawRings(camY);
 postDraw();
 drawHUD();
 drawSession();
}

/* ---------- probes & fixtures ---------- */
function finite(){
 let ok=Number.isFinite(hero.x+hero.y+hero.vx+hero.vy+camY);
 for(const f of foes)ok=ok&&Number.isFinite(f.x+f.y);
 for(const p of props)ok=ok&&Number.isFinite(p.x+p.y+p.vx+p.vy);
 return ok;}
globalThis.__soakProbe=()=>({
 sig:Math.round(hero.x*7+hero.y*13)+wf+props.length*3+foes.length*5,
 events:stats.kills+stats.throws+stats.grabs+stats.slots+stats.catches+stats.deaths+stats.surges,
 progress:stats.metersMax+stats.slots*40+stats.bossKills*120,
 finite:finite()});
globalThis.__motionProbe=()=>{
 // apex hitstop/slow-mo is the show kernel's authored pause — report it as one
 const showPause=pres.holdWorld||pres.physicsEvery>1;
 return{actors:[
  // the hero is ALWAYS reported: the death/respawn beat is authored (blast, telegraph
  // ring, materialize), so the corpse pause is an emote — never an absence gap
  {id:'custodian',x:hero.x,y:hero.y,
   emote:hero.dead>0||heroEmote()||showPause||(pres.admire&&!flag('__NO_ADMIRE'))},
  ...foes.filter(f=>f.hp>0&&!f.held).map(f=>({
   id:'foe-'+f.id,x:f.x,y:f.y,emote:false}))],
 finite:finite()};};
globalThis.__cmProbe=()=>({wf,showFrame,meters:meters(),persona:persona.name,
 hero:{x:hero.x,y:hero.y,hp:hero.hp,dead:hero.dead,held:hero.held?hero.held.kind:null,charge:hero.charge},
 zone:kOf(hero.y),doorOpen:zones[kOf(hero.y)]?zones[kOf(hero.y)].door.open:false,
 foes:foes.filter(f=>f.hp>0).length,props:props.filter(p=>p.hp>0).length,
 stats:Object.assign({},stats),act:{phase:act.phase,nextM:act.nextM,landAt:act.landAt},
 show:SHOW.probe(),tactic:lastIntent?lastIntent.tactic:'',finite:finite()});
globalThis.__cmSignature=()=>{
 const r=v=>Math.round(v*100)/100;
 return JSON.stringify({wf,h:[r(hero.x),r(hero.y),r(hero.vx),r(hero.vy),hero.hp,hero.dead,hero.charge],
  f:foes.map(f=>[f.kind[0],r(f.x),r(f.y),f.hp,f.shield,f.stun]),
  p:props.map(p=>[p.kind[0],r(p.x),r(p.y),r(p.vx),r(p.vy),p.hp,p.held?1:0]),
  b:bolts.map(b=>[r(b.x),r(b.y)]),
  s:[stats.kills,stats.throws,stats.slots,stats.deaths,stats.surges]});};
globalThis.__cmPhysicalSignature=()=>{
 const r=v=>Math.round(v*10)/10;
 return JSON.stringify([r(hero.x),r(hero.y),foes.map(f=>[r(f.x),r(f.y)])]);};
globalThis.__cmLastIntent=()=>lastIntent?Object.keys(lastIntent).sort().join(','):'';
globalThis.__cmHumanIntentKeys=()=>Object.keys(humanIntent()).sort().join(',');
globalThis.__cmReset=()=>resetGame();
globalThis.__cmThrowFixture=()=>{ // hero + crate + mite line, everything else cleared
 foes=[];bolts=[];props=[];hero=mkHero(80,-200);camY=hero.y-240;
 const p=spawnProp('crate',80,-214);
 spawnFoe('mite',80,-260,{hx:80,hy:-260});spawnFoe('mite',80,-274,{hx:80,hy:-274});
 return{prop:p.id};};
globalThis.__cmCatchFixture=()=>{
 foes=[];bolts=[];props=[];hero=mkHero(80,-200);camY=hero.y-240;
 bolts.push({x:80,y:-260,vx:0,vy:1.55,t:220,dead:false});
 spawnFoe('warden',80,-268,{wy0:-290,wy1:-250});
 return true;};
globalThis.__cmShieldFixture=()=>{
 foes=[];bolts=[];props=[];hero=mkHero(80,-200);camY=hero.y-240;
 spawnProp('can',80,-212);
 spawnFoe('warden',80,-258,{wy0:-280,wy1:-240});
 return true;};
globalThis.__cmActFixture=()=>{ // put the hero just under the next surge threshold
 act.phase='calm';act.nextM=meters()+2;return act.nextM;};
globalThis.__cmSlotFixture=()=>{
 const k=kOf(hero.y),z=zoneOf(k);foes=[];bolts=[];
 hero=mkHero(z.socket.x,z.socket.y+34);camY=hero.y-240;
 const p=spawnProp('cell',hero.x,hero.y-8);p.held=true;hero.held=p;hero.charge=12;
 return{socket:{x:z.socket.x,y:z.socket.y}};};
globalThis.__cmBossFixture=()=>{
 foes=[];bolts=[];props=[];hero=mkHero(80,-200);camY=hero.y-240;
 spawnFoe('tripod',80,-262,{hx:80,hy:-262});
 spawnProp('can',76,-212);spawnProp('can',86,-214);spawnProp('crate',70,-210);spawnProp('crate',92,-212);
 return true;};
/* visual beats: deterministic tableaux for the visual eval */
globalThis.__cmVisualBeats=['opening','hurl','catch','shield','slot','boss','surge-warning','surge-calm','zone1','zone2','later','apex','apex-before','actor-scale','actor-motion','approach'];
globalThis.__cmSetVisualBeat=(name)=>{
 if(name==='opening'){resetGame();return true;}
 if(name==='hurl'){globalThis.__cmThrowFixture();hero.held=null;
  const p=props[0];p.held=true;hero.held=p;hero.charge=24;hero.face=-Math.PI/2;return true;}
 if(name==='catch'){globalThis.__cmCatchFixture();bolts[0].y=-214;return true;}
 if(name==='shield'){globalThis.__cmShieldFixture();return true;}
 if(name==='slot'){globalThis.__cmSlotFixture();return true;}
 if(name==='boss'){globalThis.__cmBossFixture();return true;}
 if(name==='surge-warning'){act.phase='warn';act.landAt=showFrame+240;return true;}
 if(name==='later'){resetGame();hero.y=-ZONE_H*3-400;camY=hero.y-240;ensureZones();return true;}
 if(name==='zone1'){resetGame();hero.y=-ZONE_H-400;camY=hero.y-240;ensureZones();return true;}
 if(name==='zone2'){resetGame();hero.y=-ZONE_H*2-400;camY=hero.y-240;ensureZones();return true;}
 if(name==='surge-calm'){act.phase='calm';act.nextM=99999;return true;}
 if(name==='apex-before'){globalThis.__cmBossFixture();const f=foes[0];f.hp=1;return true;}
 if(name==='actor-motion'){
  foes=[];bolts=[];props=[];hero=mkHero(50,-180);camY=hero.y-160;hero.vx=1.2;
  const m=spawnFoe('mite',80,-200,{hx:80,hy:-200});m.state='windup';m.t=40;
  spawnFoe('warden',110,-190,{wy0:-230,wy1:-160});
  spawnFoe('tripod',80,-300,{hx:80,hy:-300});
  return true;}
 if(name==='approach'){
  foes=[];bolts=[];props=[];hero=mkHero(80,-180);camY=hero.y-240;
  spawnFoe('warden',80,-380,{wy0:-400,wy1:-360}); // staged 200px up-corridor: full travel on screen
  return true;}
 if(name==='apex'){globalThis.__cmBossFixture();const f=foes[0];f.hp=1;
  const p=props[0];p.held=false;p.thrown=1;p.x=80;p.y=-240;p.vx=0;p.vy=-3.4;return true;}
 if(name==='actor-scale'){
  foes=[];bolts=[];props=[];hero=mkHero(40,-180);camY=hero.y-160;
  spawnFoe('mite',70,-180,{hx:70,hy:-180});
  spawnFoe('warden',100,-182,{wy0:-200,wy1:-160});
  spawnFoe('tripod',80,-260,{hx:80,hy:-260});
  spawnProp('crate',55,-180);spawnProp('cell',120,-180);return true;}
 return false;};
globalThis.__cmVisualProbe=()=>({
 finite:finite(),
 layout:{playfield:{x:LX,y:0,width:RX-LX,height:H},
  approach:(()=>{const f=foes.find(f=>f.hp>0&&f.kind==='warden');
   if(!f)return null;
   const spawn=sy(f.y),contact=sy(hero.y);
   return{visibleSpawn:spawn,contact,travel:Math.abs(contact-spawn),
    visible:Math.abs(contact-Math.max(0,spawn))};})()},
 actors:[
  ...(hero.dead<=0?[{id:'hero',kind:'standard',type:'custodian',box:{x:hero.x-9,y:sy(hero.y)-16,width:19,height:24}}]:[]),
  ...foes.filter(f=>f.hp>0&&!f.held&&sy(f.y)>24&&sy(f.y)<H-24).map(f=>({id:'foe-'+f.id,kind:f.kind==='tripod'?'boss':'standard',type:f.kind,
   box:f.kind==='tripod'?{x:f.x-14,y:sy(f.y)-20,width:28,height:34}
    :(f.kind==='warden'?{x:f.x-8,y:sy(f.y)-8,width:17,height:16}
    :{x:f.x-5,y:sy(f.y)-8,width:11,height:13})})),
  ...props.filter(p=>p.hp>0&&!p.held&&!p.yank&&sy(p.y)>24&&sy(p.y)<H-24).map(p=>({id:'prop-'+p.id,kind:'prop',type:p.kind,
   box:{x:p.x-8,y:sy(p.y)-9,width:17,height:18}}))]});

initSession('crystal-mesa',[['ARROWS','MOVE'],['X','GRAB / HURL'],['Z','ZAP']]);
resetGame();
start(step,render);
</script>
