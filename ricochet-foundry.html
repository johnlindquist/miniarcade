<canvas id="cv" width="320" height="720" tabindex="0"

<script>
'use strict';
const{ctx,W,H,random,RI,hash,clamp,rect,stepParts,drawParts,shake,preDraw,postDraw,start,keys,tap,manual,
  initSession,sessionStep,drawSession,playing,addScore,createShow,createEvidence,fxBurst,fxDust}=E;
const{controllerMux}=AI;

const TAU=Math.PI*2,Q=1024,SUBSTEPS=3,EPS=1/Q;
const RAW=0,HEATED=1,SHAPED=2,TEMPERED=3,WARPED=4;
const STAGE_NAMES=['RAW','HEATED','SHAPED','TEMPERED','SCRAP'];
const PAL={ink:'#080b10',soot:'#151a20',iron0:'#303842',iron1:'#66717c',ironHi:'#a7b0b8',
  copper:'#a85f39',heat:'#ff7a2f',gold:'#ffd166',cream:'#fff3bf',quench:'#63dfe5',
  mint:'#9ff5df',danger:'#ff4f5e',badDark:'#681e2b'};
const WORLD={x:0,y:34,width:160,height:284};
const MACHINE_POS={furnace:{x:22.5,y:68},stamp:{x:80,y:73},quench:{x:137,y:68},die:{x:80,y:157},valve:{x:16.5,y:214},director:{x:80,y:218}};
const PORT_X=[30,80,130];
const LAUNCH=Object.freeze([
  Object.freeze({port:0,director:-1,vx:1.10,vy:-2.18}),Object.freeze({port:0,director:1,vx:.72,vy:-2.36}),
  Object.freeze({port:1,director:-1,vx:-.62,vy:-2.42}),Object.freeze({port:1,director:1,vx:.62,vy:-2.42}),
  Object.freeze({port:2,director:-1,vx:-.72,vy:-2.36}),Object.freeze({port:2,director:1,vx:-1.10,vy:-2.18})
]);
const ACTIONS=Object.freeze(LAUNCH.map(q=>Object.freeze({port:q.port,director:q.director})));
const TACTICS=Object.freeze({ADVANCE_RECIPE:'ADVANCE THE RECIPE',CLEAR_BRACE:'CLEAR THE BRACE',
  COUNTER_DROP:'COUNTER THE DROP',VENT_PRESSURE:'VENT PRESSURE',RISK_DIE:'RISK THE DIE',RECOVER_RETURN:'RECOVER THE CHARGE'});
const TASKS={furnace:'PRIME_FURNACE',stamp:'SET_PRESS',quench:'OPEN_QUENCH',die:'WATCH_DIE',
  valve:'BRACE_SHUTTER',dependency:'RESET_CUP'};
const TASK_X={PRIME_FURNACE:28,SET_PRESS:66,OPEN_QUENCH:121,WATCH_DIE:92,BRACE_SHUTTER:14,RESET_CUP:145};
const ORDERS=Object.freeze([
  Object.freeze({id:'drive-gear',label:'DRIVE GEAR',part:'gear',recipe:['HEAT','STAMP','QUENCH','DIE'],requiredStamps:1,deps:0,accent:PAL.gold}),
  Object.freeze({id:'pressure-valve',label:'PRESSURE VALVE',part:'valve',recipe:['OPEN 2 PINS','HEAT','STAMP','QUENCH','DIE'],requiredStamps:1,deps:2,accent:'#e8a26d'}),
  Object.freeze({id:'turbine-blade',label:'TURBINE BLADE',part:'turbine',recipe:['CLEAR ARCH','HEAT','STAMP','QUENCH','DIE'],requiredStamps:1,deps:1,accent:PAL.quench}),
  Object.freeze({id:'foundry-heart',label:'FOUNDRY HEART',part:'heart',recipe:['HEAT','STAMP','STAMP','QUENCH','DIE'],requiredStamps:2,deps:0,accent:PAL.danger})
]);
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{1:{frames:14},2:{frames:42,minGap:90},3:{frames:96,minGap:600}}});
const EVIDENCE=createEvidence({limit:1600,sources:[
  {id:'order-issued',kind:'setup'},{id:'choice-ready',kind:'setup'},
  {id:'pressure-warning',kind:'threat'},{id:'slag-warning',kind:'threat'},

]});

let showFrame=0,runFrame=0,worldSeed=1,shift=0,sim=null,pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};

let visualFixture='',visualLocked=false,visualTick=0,plannerCandidates=[],manualPort=1,manualDirector=1;

const quantize=v=>Math.round(v*Q)/Q;
const round=(v,d)=>{const p=Math.pow(10,d===undefined?3:d);return Math.round(v*p)/p};
const mod=(n,d)=>((n%d)+d)%d;
const alpha=(a,fn)=>{const old=ctx.globalAlpha;ctx.globalAlpha=a;fn();ctx.globalAlpha=old};
const line=(pts,c,w)=>{ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke();ctx.lineWidth=1};
const poly=(pts,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.fill()};
const mix=(a,b,t)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16),m=i=>Math.round(((pa>>i)&255)*(1-t)+((pb>>i)&255)*t);return'#'+((1<<24)+(m(16)<<16)+(m(8)<<8)+m(0)).toString(16).slice(1)};
const deepClone=o=>JSON.parse(JSON.stringify(o));
const currentOrder=w=>ORDERS[w.orderIndex];
const dieOpen=w=>w.dependenciesOpen>=currentOrder(w).deps&&!w.machines.find(m=>m.id==='machine:die').jammed;

function makeCharge(){return{id:'charge',x:80,y:306,vx:0,vy:0,radius:3,stage:RAW,heat:0,stampCount:0,

function makeMachines(){return[

  {id:'machine:die',kind:'die',phase:'idle',phaseT:0,enabled:true,jammed:false}

function blueprintItems(index,seed){
  const variant=(seed+index)%3,out=[];
  const add=(id,x,y,w,h,type,hp,active)=>out.push({id,x,y,w,h,type:type||'clinker',hp:hp||1,active:active!==false});
  add('slag:brace:a',34,118,9,8,'brace',1);add('slag:brace:b',117,126,11,7,'brace',1);
  add('slag:ingots',13,176,17,9,'ingots',2);add('slag:pipe-knot',131,185,15,11,'pipe',2);
  add('slag:plate:l',36,244,18,6,'plate',2);add('slag:plate:r',107,250,19,6,'plate',2);
  if(variant===0){add('slag:arch:l',54,173,9,18,'arch',2);add('slag:arch:r',97,173,9,18,'arch',2)}
  else if(variant===1){add('slag:rack:l',43,198,19,6,'rack',2);add('slag:rack:r',100,201,17,6,'rack',2)}
  else{add('slag:column:l',47,151,7,19,'column',2);add('slag:column:r',108,154,7,19,'column',2)}
  if(index===1){add('dependency:pin:0',63,143,5,11,'pin',1);add('dependency:pin:1',96,143,5,11,'pin',1)}
  if(index===2)add('dependency:arch',118,108,12,8,'clinker-arch',1);
  return out;
}
function makeWorld(){
  worldSeed=RI(1,0x7fffffff);shift=0;
  return{runFrame:0,shift:0,orderIndex:0,orderPhase:'read',phaseT:54,pressure:24,charge:makeCharge(),operator:{id:'operator',x:80,targetX:80,face:1,task:'RESET_CUP',taskT:0,port:1,director:1,pose:'read',step:0,intent:null},
    machines:makeMachines(),slag:blueprintItems(0,worldSeed),hazard:{id:'',kind:'pressure',phase:'calm',warnAt:760,landAt:1000,endAt:1360,lane:1,countered:false,t:0,serial:0,box:{x:74,y:112,width:13,height:17}},
    installed:[],component:null,dependenciesOpen:0,blueprint:{id:'forge-'+(worldSeed%3)},selectedIntent:null,planTimer:54,
    installationT:0,apexT:0,actNotes:[],stats:baseStats(),actsEnabled:typeof globalThis.__NO_ACTS==='undefined'};
}

function evidenceFact(source,data){if(typeof globalThis.__NO_EVIDENCE_LEDGER!=='undefined')return null;return EVIDENCE.record(source,Object.assign({frame:showFrame,showFrame,runFrame},data));}
function recordOrderSetup(order){const e=evidenceFact('order-issued',{id:`shift:${shift}:order:${sim.orderIndex}`,orderId:order.id,dieId:`shift:${shift}:order:${sim.orderIndex}:die`,pressure:sim.pressure,requiredStages:order.recipe.slice(),x:80,y:18});currentOrderSetupSerial=e?e.serial:0;}
function recordChoiceReady(options){const e=evidenceFact('choice-ready',{id:`shift:${shift}:order:${sim.orderIndex}:choice:${sim.charge.shotSerial+1}`,orderId:currentOrder(sim).id,chargeId:'charge',stage:sim.charge.stage,heat:sim.charge.heat,pressure:sim.pressure,choices:options.length,x:sim.charge.x,y:sim.charge.y});currentChoiceSetupSerial=e?e.serial:0;}
function recordThreat(source,h){const e=evidenceFact(source,{id:h.id,actorId:h.id,orderId:currentOrder(sim).id,phase:'warn',landsAt:showFrame+240,lane:h.lane,x:h.box.x+h.box.width/2,y:h.box.y+h.box.height/2});currentThreatSerial=e?e.serial:0;}
function recordCounter(intent,h){if(!currentThreatSerial)return null;return evidenceFact('operator-counter',{id:`${h.id}:response:${sim.charge.shotSerial+1}`,actorId:'operator',causeSerial:currentThreatSerial,setupSerial:currentChoiceSetupSerial,hazardId:h.id,port:intent.port,director:intent.director,tactic:intent.tactic,x:MACHINE_POS.valve.x,y:MACHINE_POS.valve.y});}
function recordCommit(intent){const e=evidenceFact('shot-commit',{id:`shift:${shift}:order:${sim.orderIndex}:shot:${sim.charge.shotSerial}`,actorId:'operator',setupSerial:currentChoiceSetupSerial,orderSetupSerial:currentOrderSetupSerial,chargeId:'charge',port:intent.port,director:intent.director,tactic:intent.tactic,x:PORT_X[intent.port],y:306});currentCommitSerial=e?e.serial:0;}
function recordCast(component){if(!currentOrderSetupSerial||!currentCommitSerial)return null;return evidenceFact('cast-complete',{id:`shift:${shift}:order:${sim.orderIndex}:cast`,orderId:currentOrder(sim).id,componentId:component.id,setupSerial:currentOrderSetupSerial,commitSerial:currentCommitSerial,x:component.x,y:component.y});}
function recordMachine(kind,data){return evidenceFact('machine-transition',Object.assign({id:`shift:${shift}:order:${sim.orderIndex}:${kind}:${sim.charge.shotSerial}`,actorId:'charge',orderId:currentOrder(sim).id,x:sim.charge.x,y:sim.charge.y},data));}
function recordFoundry(kind,data){return evidenceFact('foundry-state',Object.assign({id:`shift:${shift}:order:${sim.orderIndex}:${kind}:${showFrame}`,state:kind,x:80,y:180},data));}

function markTacticalBeat(kind){if(!TACTICAL_BEATS.has(kind))throw new Error('unapproved tactical beat: '+kind);sim.stats.events++;sim.stats.maxTacticalLull=Math.max(sim.stats.maxTacticalLull,showFrame-lastTacticalBeat);lastTacticalBeat=showFrame;}
function markProgress(kind){if(!PROGRESS_BEATS.has(kind))throw new Error('unapproved progress beat: '+kind);sim.stats.progress++;sim.stats.maxProgressLull=Math.max(sim.stats.maxProgressLull,showFrame-lastProgressBeat);lastProgressBeat=showFrame;}
function say(s,c,x,y,t){texts.push({s,c:c||PAL.cream,x:x===undefined?80:x,y:y===undefined?108:y,t:t||58});if(texts.length>8)texts.shift();}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+42});}
function feedbackCue(kind,id,sx,sy,pulse){feedback.push({serial:feedbackSerial++,frame:runFrame,show:showFrame,kind,id,sx:Math.round(clamp(sx,0,W-1)),sy:Math.round(clamp(sy,34,H-1))});if(feedback.length>420)feedback.splice(0,feedback.length-420);if(typeof globalThis.__NO_PAYOFF_FX!=='undefined')return;if(kind==='good')goodPulse=Math.max(goodPulse,pulse===undefined?.5:pulse);else badPulse=Math.max(badPulse,pulse===undefined?.5:pulse);}
function payoffBurst(x,y,n,c,sp,g){if(typeof globalThis.__NO_PAYOFF_FX!=='undefined')return;fxBurst(x,y,n,c,sp,g);}
function payoffDust(x,y,n,c){if(typeof globalThis.__NO_PAYOFF_FX!=='undefined')return;fxDust(x,y,n,c);}
function payoffShake(n){if(typeof globalThis.__NO_PAYOFF_FX==='undefined')shake(n);}

function nextRecipe(w){const c=w.charge,o=currentOrder(w);if(w.dependenciesOpen<o.deps)return o.id==='pressure-valve'?'OPEN COPPER PINS':'CLEAR QUENCH ARCH';if(c.stage===RAW)return'HEAT';if(c.stage===HEATED)return'STAMP';if(c.stage===SHAPED&&c.stampCount<o.requiredStamps)return'STAMP AGAIN';if(c.stage===SHAPED)return'QUENCH';if(c.stage===TEMPERED)return'DIE';return'RECAST';}
function normalizeChargeVelocity(ball,w){const target=chargeSpeed(w),length=Math.hypot(ball.vx,ball.vy)||1;ball.vx=quantize(ball.vx/length*target);ball.vy=quantize(ball.vy/length*target);}
function aimAt(ball,x,y,w){const dx=x-ball.x,dy=y-ball.y,l=Math.hypot(dx,dy)||1,s=chargeSpeed(w);ball.vx=quantize(dx/l*s);ball.vy=quantize(dy/l*s);}
function targetForAction(action,w){
  const k=actionKey(action);if(k==='0:-1')return'machine:furnace';if(k==='0:1')return'dependency';
  if(k==='1:-1')return'machine:stamp';if(k==='1:1')return'machine:die';
  if(k==='2:-1')return'machine:quench';return'machine:valve';
}
function targetPoint(id,w){
  if(id==='machine:furnace')return{x:MACHINE_POS.furnace.x,y:MACHINE_POS.furnace.y};
  if(id==='machine:stamp')return{x:MACHINE_POS.stamp.x,y:MACHINE_POS.stamp.y};
  if(id==='machine:quench')return{x:MACHINE_POS.quench.x,y:MACHINE_POS.quench.y};
  if(id==='machine:die')return{x:MACHINE_POS.die.x,y:MACHINE_POS.die.y};
  if(id==='machine:valve')return{x:MACHINE_POS.valve.x,y:MACHINE_POS.valve.y};
  const dep=w.slag.filter(q=>q.active&&q.id.startsWith('dependency:')).sort((a,b)=>a.id.localeCompare(b.id))[0];
  return dep?{x:dep.x+dep.w/2,y:dep.y+dep.h/2}:{x:80,y:157};
}
function buildColliders(w){
  const out=[
    {id:'boundary:left',kind:'wall',x:-4,y:34,w:4,h:278,active:true},
    {id:'boundary:right',kind:'wall',x:160,y:34,w:4,h:278,active:true},
    {id:'boundary:ceiling',kind:'wall',x:0,y:32,w:160,h:4,active:true},
    {id:'cup:return',kind:'cup',x:4,y:310,w:152,h:10,active:true},
    {id:'guide:0',kind:'guide',port:0,x:23,y:288,w:14,h:7,active:true},
    {id:'guide:1',kind:'guide',port:1,x:73,y:288,w:14,h:7,active:true},
    {id:'guide:2',kind:'guide',port:2,x:123,y:288,w:14,h:7,active:true},
    {id:'director',kind:'director',active:true,x1:w.operator.director<0?71:71,y1:w.operator.director<0?209:227,x2:89,y2:w.operator.director<0?227:209},
    {id:'machine:furnace',kind:'machine',machine:'furnace',x:14,y:58,w:17,h:20,active:true},
    {id:'machine:stamp',kind:'machine',machine:'stamp',x:69,y:65,w:22,h:17,active:true},
    {id:'machine:quench',kind:'machine',machine:'quench',x:128,y:57,w:18,h:22,active:true},
    {id:'machine:die',kind:'machine',machine:'die',x:68,y:145,w:24,h:23,active:true},
    {id:'machine:valve',kind:'valve',x:10,y:207,w:13,h:14,active:true}
  ];
  for(const q of w.slag)if(q.active)out.push({id:q.id,kind:q.id.startsWith('dependency:')?'dependency':'slag',x:q.x,y:q.y,w:q.w,h:q.h,active:true});
  return out;
}
function sweepCircleAabb(ball,c,maxT){
  const minX=c.x-ball.radius,maxX=c.x+c.w+ball.radius,minY=c.y-ball.radius,maxY=c.y+c.h+ball.radius;
  let enter=-Infinity,exit=Infinity,nx=0,ny=0;
  const axis=(p,v,min,max,axisName)=>{
    if(Math.abs(v)<EPS)return p>=min&&p<=max;
    let t1=(min-p)/v,t2=(max-p)/v,near=t1,far=t2,sign=-1;if(t1>t2){near=t2;far=t1;sign=1;}
    if(near>enter){enter=near;if(axisName==='x'){nx=sign;ny=0}else{nx=0;ny=sign}}
    exit=Math.min(exit,far);return enter<=exit+EPS;
  };
  if(!axis(ball.x,ball.vx,minX,maxX,'x')||!axis(ball.y,ball.vy,minY,maxY,'y'))return null;
  if(exit<-EPS||enter>maxT+EPS)return null;
  if(enter<0){if(Math.abs(ball.vx)>=Math.abs(ball.vy)){nx=ball.vx>0?-1:1;ny=0}else{nx=0;ny=ball.vy>0?-1:1}enter=0;}
  return{t:Math.max(0,enter),nx,ny};
}
function sweepCircleSegment(ball,c,maxT){
  const sx=c.x2-c.x1,sy=c.y2-c.y1,len=Math.hypot(sx,sy)||1,tx=sx/len,ty=sy/len;
  let nx=-ty,ny=tx,dist=(ball.x-c.x1)*nx+(ball.y-c.y1)*ny,vd=ball.vx*nx+ball.vy*ny;
  if(Math.abs(vd)<EPS)return null;let side=dist>=0?1:-1,t=(side*ball.radius-dist)/vd;
  if(t<-EPS||t>maxT+EPS){side=-side;t=(side*ball.radius-dist)/vd;if(t<-EPS||t>maxT+EPS)return null;}
  const px=ball.x+ball.vx*t,py=ball.y+ball.vy*t,u=(px-c.x1)*tx+(py-c.y1)*ty;if(u<-ball.radius||u>len+ball.radius)return null;
  nx*=side;ny*=side;return{t:Math.max(0,t),nx:quantize(nx),ny:quantize(ny)};
}
function firstCollision(ball,colliders,maxT){let winner=null;for(const c of colliders){if(!c.active||c.id===ball.lastColliderId)continue;if(ball.routeLocked){if(c.kind==='machine'&&c.id!==ball.routeTarget)continue;if(c.kind==='valve'&&ball.routeTarget!=='machine:valve')continue;if(c.kind==='dependency'&&ball.routeTarget!=='dependency')continue;if(c.kind==='slag')continue;if(c.kind==='director'&&!ball.afterDirector)continue;if(c.kind==='guide'&&(ball.routeTarget==='cup:return'||c.port!==ball.port))continue;}const hit=c.kind==='director'?sweepCircleSegment(ball,c,maxT):sweepCircleAabb(ball,c,maxT);if(!hit)continue;if(!winner||hit.t<winner.t-EPS||(Math.abs(hit.t-winner.t)<=EPS&&c.id<winner.collider.id))winner=Object.assign(hit,{collider:c});}return winner;}
function noteCollision(ball,id){ball.collisionHistory.push(id);if(ball.collisionHistory.length>12)ball.collisionHistory.shift();const a=ball.collisionHistory.slice(-4).join('|'),b=ball.collisionHistory.slice(-8,-4).join('|');if(a&&a===b)ball.repeatCycle++;else ball.repeatCycle=0;}
function emit(sink,type,data){if(sink)sink(type,data||{});}
function setScrap(w,reason,sink){const b=w.charge;if(b.mode==='scrap'||b.mode==='cast')return;b.stage=WARPED;b.mode='scrap';b.routeLocked=false;b.scrapReason=reason;b.holdT=38;b.vx=b.vy=0;w.stats.scraps++;if(reason==='overheat')w.stats.overheats++;else w.stats.wrongOrders++;w.pressure=clamp(w.pressure+(reason==='overheat'?12:10),0,100);emit(sink,reason==='overheat'?'overheat':'scrap',{reason,x:b.x,y:b.y});}
function processMachine(w,kind,sink){
  const b=w.charge,o=currentOrder(w),before=b.stage;let good=false;
  if(kind==='furnace'&&b.stage===RAW){b.stage=HEATED;b.heat=o.requiredStamps===2?960:600;good=true;}
  else if(kind==='stamp'&&b.stage===HEATED){b.stage=SHAPED;b.stampCount=1;b.lastStampShot=b.shotSerial;good=true;}
  else if(kind==='stamp'&&b.stage===SHAPED&&b.stampCount<o.requiredStamps&&b.lastStampShot!==b.shotSerial){b.stampCount++;b.lastStampShot=b.shotSerial;good=true;}
  else if(kind==='quench'&&b.stage===SHAPED&&b.stampCount>=o.requiredStamps){b.stage=TEMPERED;b.heat=0;good=true;}
  else if(kind==='die'&&b.stage===TEMPERED&&dieOpen(w)){completeCastState(w,sink);return;}
  if(!good){setScrap(w,'wrong-order',sink);return;}
  w.pressure=Math.max(0,w.pressure-2);w.stats.recipeTransitions++;emit(sink,'recipe-transition',{machine:kind,before,after:b.stage,x:b.x,y:b.y});
}

function immediateUtility(result){let value=0;value+=result.recipeDelta*120;value+=result.dependencyOpened?55:0;value+=result.hazardCountered?70:0;value+=result.dieRepaired?140:0;value+=result.castCompleted?260:0;value-=result.warped?130:0;value-=result.overheated?120:0;value-=result.jamLanded?85:0;value-=Math.max(0,result.pressureDelta)*3;value-=result.noMeaningfulContact?40:0;value-=result.repeatedCycle?30:0;return value;}
