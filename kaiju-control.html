<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KAIJU CONTROL</title>
<style>
  html,body{margin:0;height:100%;background:#070b12}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;
    image-rendering:pixelated;background:#08101a}
  canvas:focus-visible{outline:2px solid #ffbe55;outline-offset:-3px}
</style>
<canvas id="cv" width="320" height="720" tabindex="0"
  aria-label="Kaiju Control. An autonomous emergency crew evacuates neighborhoods, repairs the grid, and diverts a giant monster with decoy beacons."></canvas>
<script src="engine.js"></script>
<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,RI,hash,clamp,rect,stepParts,drawParts,shake,preDraw,postDraw,start,keys,
  manual,initSession,sessionStep,drawSession,playing,addScore,createShow,fxBurst,fxDust}=E;
const{controllerMux,skillProfile,createRng}=AI;

// KAIJU CONTROL — Rampage from the city's side. Every important intention has
// a route the viewer can read: mint for CIVIC-1, coral for the kaiju. The city
// is the scorecard; occupied windows go dark, rubble stays, and repaired blocks
// relight. The singular kaiju is the only actor allowed the 34px set-piece cap.
const INK='#070b12',CREAM='#fff1cf',GOLD='#ffbe55',MINT='#62e0b4',CYAN='#54d8eb',
  CORAL='#ff6b5f',RED='#d8424f',VIOLET='#9d82dd',SMOKE='#7d8992';
const WORLD={x:0,y:42,width:160,height:280},COLS=4,ROWS=7,X=[18,58,102,142],Y=[66,102,138,174,210,246,290];
const DISTRICTS=[
  {name:'TIDEWARD HARBOR',code:'HBR',sky:'#132a37',ground:'#263b3e',road:'#18252c',walk:'#53706b',line:'#a9c6b8',
    wall:'#66483c',wall2:'#93634c',glass:'#7dd9df',accent:'#4fdac2',shadow:'#0a151b',kind:'harbor',hRows:[0,2,4,6]},
  {name:'LANTERN ROW',code:'OLD',sky:'#251929',ground:'#3e3030',road:'#201c25',walk:'#74544a',line:'#d2b277',
    wall:'#7a3d38',wall2:'#b0634c',glass:'#ffd07a',accent:'#ff9d5d',shadow:'#120b12',kind:'old',hRows:[1,3,5]},
  {name:'CROWN GRID',code:'CORE',sky:'#11152c',ground:'#252946',road:'#151929',walk:'#4c5273',line:'#b5bde3',
    wall:'#394371',wall2:'#6273aa',glass:'#74e4ff',accent:'#bd8cff',shadow:'#080a18',kind:'core',hRows:[0,1,3,5,6]}
];
const BUILD_LAYOUTS=[
  [{id:'clinic',kind:'clinic',label:'HARBOR CLINIC',node:4},{id:'grid',kind:'grid',label:'TIDE SUBSTATION',node:15},
    {id:'school',kind:'school',label:'DOCK SCHOOL',node:20},{id:'shelter',kind:'shelter',label:'FERRY SHELTER',node:26},
    {id:'water',kind:'water',label:'PUMP HOUSE',node:7}],
  [{id:'clinic',kind:'clinic',label:'ROW CLINIC',node:2},{id:'grid',kind:'grid',label:'TRAM SUBSTATION',node:16},
    {id:'school',kind:'school',label:'LANTERN SCHOOL',node:23},{id:'shelter',kind:'shelter',label:'CLOCK SHELTER',node:25},
    {id:'water',kind:'water',label:'CISTERN',node:11}],
  [{id:'clinic',kind:'clinic',label:'SKY CLINIC',node:7},{id:'grid',kind:'grid',label:'CROWN SUBSTATION',node:20},
    {id:'school',kind:'school',label:'METRO SCHOOL',node:12},{id:'shelter',kind:'shelter',label:'CIVIC BUNKER',node:26},
    {id:'water',kind:'water',label:'COOLANT WORKS',node:9}]
];
const PERSONAS=[
  {name:'GUARDIAN',evac:1.35,repair:.82,decoy:1.05,precision:.88,risk:.36,color:MINT},
  {name:'ENGINEER',evac:1.0,repair:1.42,decoy:.88,precision:.91,risk:.30,color:CYAN},
  {name:'TRICKSTER',evac:.94,repair:.84,decoy:1.48,precision:.82,risk:.62,color:GOLD}
];
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},2:{frames:42,minGap:90},3:{frames:84,minGap:720,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});

let showFrame=0,runFrame=0,worldSeed=1,skillSeed=1,district=0,districtClock=0,state='run',transitionT=0;
let palette=DISTRICTS[0],edges=new Set(),buildings=[],groups=[],hero=null,kaiju=null,decoy=null,decoyCooldown=0;
let route=[],kaijuRoute=[],task=null,taskSerial=0,planAt=-1e9,profile=null,persona=PERSONAS[0],lastLapsed=false;
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false},texts=[],eventSerial=0,progressSerial=0;
let lastEventFrame=0,lastProgressFrame=0,visualFixture='',visualTick=0;
let act={phase:'calm',type:'blackout',warnAt:0,landAt:0,endAt:0,index:0,strikeNode:0},actNotes=[];
const stats={districts:0,districtsSaved:0,evacuated:0,pickups:0,neighborhoods:0,repairs:0,decoys:0,
  decoyHits:0,attacks:0,buildingsLost:0,casualties:0,acts:0,actSaves:0,lapses:0,events:0,progress:0,
  appliedIntents:0,maxEventLull:0,maxProgressLull:0,maxStep:0,invisibleRescues:0};

const node=(r,c)=>r*COLS+c,row=n=>(n/COLS)|0,col=n=>n%COLS,pos=n=>({x:X[col(n)],y:Y[row(n)]});
const edgeKey=(a,b)=>a<b?a+':'+b:b+':'+a;
const round=(v,d)=>{const p=Math.pow(10,d||3);return Math.round(v*p)/p};
const mod=(n,d)=>((n%d)+d)%d;
const mix=(a,b,t)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16),m=s=>Math.round(((pa>>s)&255)*(1-t)+((pb>>s)&255)*t);return'#'+((1<<24)+(m(16)<<16)+(m(8)<<8)+m(0)).toString(16).slice(1)};
const alpha=(a,fn)=>{const old=ctx.globalAlpha;ctx.globalAlpha=a;fn();ctx.globalAlpha=old};
const poly=(pts,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.fill()};
const line=(pts,c,w,dash)=>{ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.setLineDash(dash||[]);ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke();ctx.setLineDash([]);ctx.lineWidth=1};
function say(s,c,x,y,t){texts.push({s,c:c||CREAM,x:x===undefined?80:x,y:y===undefined?55:y,t:t||80});if(texts.length>8)texts.shift()}
function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);lastEventFrame=showFrame;if(score&&playing())addScore(score)}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);lastProgressFrame=showFrame;if(score&&playing())addScore(score)}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+40})}

function buildGraph(){edges=new Set();for(let c=0;c<COLS;c++)for(let r=0;r<ROWS-1;r++)edges.add(edgeKey(node(r,c),node(r+1,c)));
  for(const r of palette.hRows)for(let c=0;c<COLS-1;c++)edges.add(edgeKey(node(r,c),node(r,c+1)));
  if(district===0){edges.add(edgeKey(node(1,0),node(1,1)));edges.add(edgeKey(node(5,2),node(5,3)))}
  if(district===1){edges.add(edgeKey(node(0,1),node(0,2)));edges.add(edgeKey(node(6,1),node(6,2)))}
  if(district===2){edges.add(edgeKey(node(2,0),node(2,1)));edges.add(edgeKey(node(4,2),node(4,3)))}
}
function neighbors(n){const out=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const q=node(r,c);if(q!==n&&edges.has(edgeKey(n,q)))out.push(q)}return out}
function findPath(start,goal,avoid){if(start===goal)return[];const open=[start],cost=new Map([[start,0]]),came=new Map();while(open.length){open.sort((a,b)=>cost.get(a)-cost.get(b)||a-b);const n=open.shift();if(n===goal)break;for(const q of neighbors(n)){let extra=1;if(avoid&&kaiju){const danger=[kaiju.node,kaiju.to,...kaijuRoute].indexOf(q);if(danger>=0)extra+=4-danger*.22}const next=cost.get(n)+Math.max(.5,extra);if(next>=(cost.get(q)??Infinity))continue;cost.set(q,next);came.set(q,n);open.push(q)}}if(!came.has(goal))return[];const out=[];for(let n=goal;n!==start;n=came.get(n))out.push(n);return out.reverse()}
const graphDistance=(a,b)=>findPath(a,b,false).length;
function buildingCenter(spec){const p=pos(spec.node),side=col(spec.node)%2===0?1:-1;return{x:p.x+side*13,y:p.y-1}}
function shelter(){return buildings.find(b=>b.kind==='shelter')}
function gridBuilding(){return buildings.find(b=>b.kind==='grid')}
function buildingById(id){return buildings.find(b=>b.id===id)}
function groupById(id){return groups.find(g=>g.id===id)}

function makeDistrict(resetShow){palette=DISTRICTS[district];buildGraph();buildings=BUILD_LAYOUTS[district].map((spec,i)=>{
    const p=buildingCenter(spec);return{...spec,x:p.x,y:p.y,hp:3,maxHp:3,power:true,flash:0,lost:false,serial:i}});
  groups=buildings.filter(b=>b.kind==='clinic'||b.kind==='school'||b.kind==='water').map((b,i)=>({id:'ward-'+i,node:b.node,buildingId:b.id,
    total:4,remaining:4,picked:false,evacuated:false,panic:0}));
  const home=shelter(),hp=pos(home.node);hero={node:home.node,from:home.node,to:home.node,x:hp.x,y:hp.y,moveT:0,moveDur:0,face:-1,
    cargo:0,cargoIds:[],actionT:0,brace:false,stun:0,intent:null,lastX:hp.x,lastY:hp.y,pose:'idle'};
  const first=groups[0],spawn=district%2?node(6,3):node(0,3),kp=pos(spawn);kaiju={node:spawn,from:spawn,to:spawn,x:kp.x,y:kp.y,
    moveT:0,moveDur:0,face:-1,stun:0,attackT:0,roarT:0,targetKind:'building',targetId:first.buildingId,step:0};
  decoy=null;decoyCooldown=0;route=[];kaijuRoute=[];task=null;planAt=-1e9;districtClock=0;state='run';transitionT=0;visualTick=0;
  persona=PERSONAS[mod(worldSeed+district,PERSONAS.length)];setKaijuTarget(buildingById(first.buildingId));resetAct();
  if(resetShow)SHOW.reset(showFrame);
}
function resetAct(){const types=['surge','aftershock','blackout'];Object.assign(act,{phase:'calm',type:types[district],warnAt:showFrame+1800,
    landAt:showFrame+2040,endAt:showFrame+2760,index:district,strikeNode:gridBuilding().node})}
function resetRun(full){worldSeed=RI(1,999999);skillSeed=RI(1,0x7fffffff);runFrame=0;district=0;eventSerial=0;progressSerial=0;lastEventFrame=showFrame;lastProgressFrame=showFrame;actNotes=[];
  texts=[];visualFixture='';lastLapsed=false;for(const k in stats)stats[k]=0;profile=skillProfile({rng:createRng(skillSeed),skill:.82,precision:.88,
    risk:.48,recovery:.9,reactionFrames:[3,7],lapseChance:.00072,lapseFrames:[14,30]});makeDistrict(full)}

function validTarget(t){if(!t)return false;if(t.kind==='evac'){const g=groupById(t.targetId);return g&&g.remaining>0&&!g.picked}
  if(t.kind==='drop')return hero.cargo>0;if(t.kind==='repair'){const b=buildingById(t.targetId);return b&&!b.lost&&(b.hp<3||!b.power)}
  if(t.kind==='decoy')return!decoy&&decoyCooldown<=0;if(t.kind==='brace')return act.phase==='warn';return t.kind==='patrol'}
function decoyNode(){let best=hero.node,bestScore=-Infinity;for(let n=0;n<ROWS*COLS;n++){const near=Math.min(...buildings.map(b=>graphDistance(n,b.node))),
    score=graphDistance(kaiju.node,n)*9+near*17-graphDistance(hero.node,n)*5;if(near>=2&&score>bestScore){bestScore=score;best=n}}return best}
function kaijuEta(n){return(kaiju.moveT||0)+graphDistance(kaiju.to,n)*132}
function actPlanNode(){return mod(worldSeed+district*3,4)===0?node(3,(district+1)%COLS):act.strikeNode}
function taskObject(kind,targetId,n,tactic,score){return{kind,targetId,node:n,tactic,score:score||0,serial:taskSerial+1}}
function reactiveTask(){if(hero.cargo)return taskObject('drop',shelter().id,shelter().node,'RUN TO THE SHELTER');
  const repair=buildings.filter(b=>!b.lost&&(b.hp<3||!b.power)&&graphDistance(hero.node,b.node)<=2).sort((a,b)=>graphDistance(hero.node,a.node)-graphDistance(hero.node,b.node))[0];
  if(repair)return taskObject('repair',repair.id,repair.node,'PATCH THE NEAREST BLOCK');
  const evac=groups.filter(g=>g.remaining>0&&!g.picked).sort((a,b)=>graphDistance(hero.node,a.node)-graphDistance(hero.node,b.node)||a.id.localeCompare(b.id))[0];
  if(evac)return taskObject('evac',evac.id,evac.node,'PICK UP THE CLOSEST WARD');
  if(!decoy&&decoyCooldown<=0&&kaijuRoute.length<=2)return taskObject('decoy','reactive',decoyNode(),'DROP A PANIC BEACON');
  const broken=buildings.filter(b=>!b.lost&&(b.hp<3||!b.power)).sort((a,b)=>graphDistance(hero.node,a.node)-graphDistance(hero.node,b.node))[0];
  return broken?taskObject('repair',broken.id,broken.node,'RESTORE THE BLOCK'):taskObject('patrol','shelter',shelter().node,'HOLD THE SAFE CORRIDOR')}
function smartTask(){if(hero.cargo)return taskObject('drop',shelter().id,shelter().node,'CLEAR THE EVAC CORRIDOR',9999);
  if(act.phase==='warn'){const n=actPlanNode(),miss=n!==act.strikeNode;return taskObject('brace',gridBuilding().id,n,miss?'CLEAR THE EVAC UNDERPASS':act.type==='surge'?'SEAL THE FLOOD GRID':act.type==='aftershock'?'BRACE THE SUBSTATION':'KEEP THE LIGHTS ON',9200)}
  const live=groups.filter(g=>g.remaining>0&&!g.picked),threatened=live.map(g=>{const b=buildingById(g.buildingId),eta=kaijuEta(b.node),response=graphDistance(hero.node,g.node)*24+52+graphDistance(g.node,shelter().node)*24+50;
    return{g,b,eta,response,urgency:(2400/(eta+120)+g.remaining*1.8)*persona.evac}}).sort((a,b)=>b.urgency-a.urgency||a.g.id.localeCompare(b.g.id))[0];
  if(threatened&&!decoy&&decoyCooldown<=0&&threatened.eta<threatened.response+520)return taskObject('decoy','forecast',decoyNode(),'TURN THE KAIJU AWAY',8000*persona.decoy);
  if(threatened&&threatened.eta>threatened.response-80)return taskObject('evac',threatened.g.id,threatened.g.node,'EVACUATE '+threatened.b.label,7000+threatened.urgency);
  const repairs=buildings.filter(b=>!b.lost&&(b.hp<3||!b.power)).map(b=>({b,score:(b.kind==='grid'?260:100)*persona.repair+kaijuEta(b.node)*-.04-graphDistance(hero.node,b.node)*8})).sort((a,b)=>b.score-a.score);
  if(repairs.length)return taskObject('repair',repairs[0].b.id,repairs[0].b.node,repairs[0].b.power?'REBUILD '+repairs[0].b.label:'RELIGHT '+repairs[0].b.label,repairs[0].score);
  if(threatened)return taskObject('evac',threatened.g.id,threatened.g.node,'MOVE BEFORE IMPACT',6000+threatened.urgency);
  if(!decoy&&decoyCooldown<=0&&kaijuRoute.length<=4)return taskObject('decoy','forecast',decoyNode(),'DRAW IT TO OPEN GROUND',4000*persona.decoy);
  return taskObject('patrol','shelter',shelter().node,'WATCH THE TELEGRAPH',0)}
function chooseTask(){return typeof globalThis.__NO_TRIAGE_PLAN==='undefined'?smartTask():reactiveTask()}
function setTask(next){task=next;taskSerial++;if(task)task.serial=taskSerial;route=task?findPath(hero.node,task.node,typeof globalThis.__NO_TRIAGE_PLAN==='undefined'):[];planAt=runFrame;hero.actionT=0;hero.brace=false}
function rawBotIntent(){if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined'&&kaiju.attackT<=0)return{next:-1,action:false,brace:false,targetId:'city',targetKind:'admire',tactic:'WATCH THE WINDOWS RELIGHT'};
  if(!validTarget(task)||(task.kind!=='brace'&&runFrame-planAt>=75))setTask(chooseTask());if(!task)return{next:-1,action:false,brace:false,targetId:'none',targetKind:'patrol',tactic:'SCAN THE CITY'};
  if(hero.node===task.node)return{next:-1,action:true,brace:task.kind==='brace',targetId:task.targetId,targetKind:task.kind,tactic:task.tactic};
  if(!route.length||route[0]===hero.node)route=findPath(hero.node,task.node,typeof globalThis.__NO_TRIAGE_PLAN==='undefined');
  return{next:route[0]??-1,action:false,brace:false,targetId:task.targetId,targetKind:task.kind,tactic:task.tactic}}
function lapseIntent(context,last){const base=last||rawBotIntent();return{next:-1,action:false,brace:false,targetId:base.targetId,targetKind:base.targetKind,tactic:'SECOND-GUESS THE MAP'}}
function botIntent(){if(typeof globalThis.__NO_LAPSE!=='undefined'){lastLapsed=false;return rawBotIntent()}const before=profile.isLapsed(runFrame),intent=profile.decide(runFrame,null,rawBotIntent,lapseIntent),after=profile.isLapsed(runFrame);
  if(after&&!before&&!lastLapsed){stats.lapses++;markEvent();say('... RECHECKING ROUTE',GOLD,80,58,55)}lastLapsed=after;return intent||rawBotIntent()}
function humanIntent(){const ns=neighbors(hero.node),dx=(keys.right?1:0)-(keys.left?1:0),dy=(keys.down?1:0)-(keys.up?1:0);let next=-1,best=-Infinity;
  for(const n of ns){const a=pos(n),score=(a.x-pos(hero.node).x)*dx+(a.y-pos(hero.node).y)*dy;if(score>best&&score>0){best=score;next=n}}
  return{next,action:!!(keys.a||keys.b||keys.c),brace:!!keys.c,targetId:task?task.targetId:'manual',targetKind:task?task.kind:'manual',tactic:'MANUAL DISPATCH'}}
const controller=controllerMux({human:humanIntent,ai:botIntent,manual:()=>playing()||manual()});

function startHeroMove(n){if(!neighbors(hero.node).includes(n))return;hero.from=hero.node;hero.to=n;hero.moveDur=24;hero.moveT=24;hero.face=pos(n).x>=hero.x?1:-1;hero.pose='drive';hero.actionT=0}
function applyIntent(intent){hero.intent=intent;stats.appliedIntents++;if(hero.stun>0||hero.moveT>0)return intent;if(intent.next>=0)startHeroMove(intent.next);else if(intent.action)performAction(intent);else{hero.actionT=0;hero.pose='idle'}return intent}
function performAction(intent){if(!task||hero.node!==task.node){hero.actionT=0;return}hero.actionT++;hero.pose=task.kind==='repair'||task.kind==='brace'?'repair':task.kind==='evac'||task.kind==='drop'?'load':'deploy';
  if(task.kind==='evac'&&hero.actionT>=48){const g=groupById(task.targetId);if(g&&g.remaining){hero.cargo+=g.remaining;hero.cargoIds.push(g.id);g.picked=true;g.remaining=0;stats.pickups++;markEvent(15);markProgress(1);offer('pickup',1,hero.x,hero.y,'CIVILIANS ABOARD');fxDust(hero.x,hero.y,8,MINT);say('WARD ABOARD',MINT,hero.x,hero.y-18,55)}setTask(chooseTask())}
  else if(task.kind==='drop'&&hero.actionT>=52){const n=hero.cargo;for(const id of hero.cargoIds){const g=groupById(id);if(g&&!g.evacuated){g.evacuated=true;stats.neighborhoods++}}hero.cargo=0;hero.cargoIds=[];stats.evacuated+=n;markEvent(50);markProgress(n);offer('ward-safe',2,hero.x,hero.y,'NEIGHBORHOOD SAFE');fxBurst(hero.x,hero.y,20,MINT,2.1,.02);say(n+' CIVILIANS SAFE',GOLD,80,64,95);setTask(chooseTask())}
  else if(task.kind==='repair'&&hero.actionT>=78){const b=buildingById(task.targetId);if(b&&!b.lost){const wasDark=!b.power||b.hp<2;b.hp=3;b.power=true;b.flash=50;stats.repairs++;markEvent(20);markProgress(1);offer('repair',wasDark&&b.kind==='grid'?2:1,b.x,b.y,wasDark?'BLOCK RELIT':'REPAIR COMPLETE');fxBurst(b.x,b.y,14,CYAN,1.7);say('POWER RESTORED',CYAN,b.x,b.y-18,70)}setTask(chooseTask())}
  else if(task.kind==='decoy'&&hero.actionT>=42){const p=pos(task.node);decoy={id:'beacon-'+(++stats.decoys),node:task.node,x:p.x,y:p.y,t:1900};markEvent(12);markProgress(1);offer('decoy',1,p.x,p.y,'DECOY ONLINE');fxBurst(p.x,p.y,12,GOLD,1.6);setKaijuTarget(decoy);setTask(chooseTask())}
  else if(task.kind==='brace'&&hero.actionT>=34&&!hero.brace){hero.brace=true;markEvent();offer('brace',1,hero.x,hero.y,'GRID BRACED');say('GRID CREW READY',CYAN,hero.x,hero.y-18,80)}}
function stepHero(){hero.lastX=hero.x;hero.lastY=hero.y;if(hero.stun>0){hero.stun--;hero.pose='hurt';return}if(hero.moveT>0){hero.moveT--;const a=pos(hero.from),b=pos(hero.to),t=1-hero.moveT/hero.moveDur,e=t*t*(3-2*t);hero.x=a.x+(b.x-a.x)*e;hero.y=a.y+(b.y-a.y)*e;
    if(hero.moveT===0){hero.node=hero.to;hero.x=b.x;hero.y=b.y;if(route[0]===hero.node)route.shift()}const d=Math.hypot(hero.x-hero.lastX,hero.y-hero.lastY);stats.maxStep=Math.max(stats.maxStep,d);return}applyIntent(controller())}

function setKaijuTarget(target){if(!target)return;kaiju.targetKind=target===decoy?'decoy':'building';kaiju.targetId=target.id;kaijuRoute=findPath(kaiju.node,target.node,false);if(!kaijuRoute.length&&kaiju.node!==target.node)kaijuRoute=[target.node]}
function chooseKaijuTarget(){if(decoy)return decoy;let pool=buildings.filter(b=>b.kind!=='shelter'&&!b.lost&&graphDistance(kaiju.node,b.node)>=3);if(!pool.length)pool=buildings.filter(b=>b.kind!=='shelter'&&!b.lost);pool.sort((a,b)=>{
    const ga=groups.find(g=>g.buildingId===a.id),gb=groups.find(g=>g.buildingId===b.id),sa=(ga?ga.remaining*90:0)+a.hp*12+graphDistance(kaiju.node,a.node)*4,
      sb=(gb?gb.remaining*90:0)+b.hp*12+graphDistance(kaiju.node,b.node)*4;return sb-sa||a.id.localeCompare(b.id)});return pool[0]||shelter()}

  ...buildings.flatMap(b=>[b.x,b.y,b.hp,b.flash]),...groups.flatMap(g=>[g.remaining,g.panic]),decoy?decoy.t:0].every(Number.isFinite)}

  hero:[hero.node,hero.from,hero.to,round(hero.x),round(hero.y),hero.moveT,hero.moveDur,hero.face,hero.cargo,hero.cargoIds,hero.actionT,hero.brace,hero.stun,hero.pose,hero.intent],

  hero:{node:hero.node,x:hero.x,y:hero.y,cargo:hero.cargo,pose:hero.pose,intent:hero.intent&&{...hero.intent}},kaiju:{node:kaiju.node,x:kaiju.x,y:kaiju.y,targetKind:kaiju.targetKind,targetId:kaiju.targetId,stun:kaiju.stun},

function actorProbe(){const out=[{id:'civic-1',kind:'responder',type:hero.pose,box:{x:hero.x-11,y:hero.y-11,width:22,height:22}},
  {id:'kaiju',kind:'boss',type:kaiju.attackT?'attack':kaiju.stun?'stunned':'walk',box:{x:kaiju.x-17,y:kaiju.y-20,width:34,height:34}}];
