  body{display:flex;align-items:center;justify-content:center;overflow:hidden}

    image-rendering:pixelated;background:#070916}

</style>
<canvas id="cv" width="320" height="720" tabindex="0"
  aria-label="Neon Getaway. A tiny wheelman swaps cars, takes alleys, jumps roadblocks, and outruns an escalating citywide pursuit."></canvas>
<script src="engine.js"></script>
<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,random,RI,hash,clamp,rect,spawn,stepParts,drawParts,ring,stepRings,drawRings,
  shake,preDraw,postDraw,start,keys,manual,initSession,sessionStep,drawSession,playing,
  addScore,gameOver,createShow,fxBurst,fxDust}=E;
const{controllerMux,skillProfile,createRng}=AI;

// NEON GETAWAY — GTA x Spy Hunter for the 4:9 strip. The viewer reads a route,
// watches the police answer it, then gets the release of a ramp, alley, paint
// booth, or honest vehicle swap. World motion is continuous: nothing teleports
// the driver out of trouble, and the copied-state route planner uses the exact
// same vehicle integrator as runtime play without touching the engine RNG.
const TAU=Math.PI*2,BLOCK=210,DISTRICT_BLOCKS=14,FINAL_FRAME=54000,CAR_Y=266;
const ROAD_L=37,ROAD_R=123,ALLEY_L=26,ALLEY_R=134,LANES=[51,80,109];
const INK='#050711',CREAM='#fff1d2',CYAN='#55e7ff',PINK='#ff4fa7',GOLD='#ffd166',
  CORAL='#ff695e',MINT='#62e6b4',BLUE='#6f8dff',ASPHALT='#14182a';
const DISTRICTS=[
  {name:'NEON CORE',sky:'#11152d',road:'#15192b',walk:'#343052',curb:'#695285',
    roof:'#241f42',roof2:'#382657',accent:'#ff4fa7',light:'#55e7ff',kind:'neon'},
  {name:'OLD MARKET',sky:'#211527',road:'#211c2a',walk:'#5b3d3f',curb:'#b36a50',
    roof:'#4b2d35',roof2:'#743f3f',accent:'#ffae57',light:'#ffe08a',kind:'market'},
  {name:'CANAL WARD',sky:'#092331',road:'#13232d',walk:'#28505b',curb:'#4b98a7',
    roof:'#183d49',roof2:'#286170',accent:'#52d8c7',light:'#a5f4e8',kind:'canal'},
  {name:'IRON PORT',sky:'#171923',road:'#1d2028',walk:'#4a4a49',curb:'#8f7457',
    roof:'#35373a',roof2:'#66513f',accent:'#ff8a4b',light:'#f5c36a',kind:'port'},
  {name:'CIVIC CROWN',sky:'#17152d',road:'#171a30',walk:'#4b4669',curb:'#9388c3',
    roof:'#29264c',roof2:'#4a4072',accent:'#b686ff',light:'#f3d7ff',kind:'civic'}
];
const VEHICLES={
  coupe:{name:'VANTA COUPE',max:2.18,acc:.030,turn:.085,width:6,color:'#39d9e6',trim:'#d9ffff'},
  bike:{name:'NIGHT BIKE',max:2.48,acc:.036,turn:.135,width:3.5,color:'#ffd166',trim:'#fff2bd'},
  taxi:{name:'GHOST CAB',max:1.98,acc:.028,turn:.095,width:6.5,color:'#f4c84c',trim:'#fff3a6'},
  muscle:{name:'COMET V8',max:2.30,acc:.034,turn:.074,width:7.5,color:'#ff695e',trim:'#ffd0b9'},
  van:{name:'SERVICE VAN',max:1.82,acc:.026,turn:.064,width:8,color:'#77b9a8',trim:'#d5fff1'}
};
const PERSONAS=[
  {name:'GHOST',alley:34,swap:76,ramp:12,risk:.35,color:MINT},
  {name:'WHEELMAN',alley:20,swap:58,ramp:28,risk:.55,color:CYAN},
  {name:'DAREDEVIL',alley:10,swap:40,ramp:72,risk:.82,color:GOLD}
];
const COP={
  cruiser:{max:2.34,turn:.068,w:7,c:'#d7e2ef'},
  interceptor:{max:2.65,turn:.086,w:6,c:'#6f8dff'},
  bike:{max:2.78,turn:.12,w:3.5,c:'#f4f7ff'},
  van:{max:2.12,turn:.052,w:8.5,c:'#9aa7b8'}
};

let showFrame=0,runFrame=0,state='run',resultT=0,outcome='',worldSeed=1,skillSeed=1;
let player=null,traffic=[],police=[],decoys=[],texts=[],plan=null,planAt=-1e9,skill=null,swapBay=null,visualIntent=null;
let persona=PERSONAS[0],personaIndex=0,heat=.85,wanted=1,lastWanted=1,maxWanted=1;
let lastBlock=0,lastDistrict=0,generatedTo=-1,trafficSerial=0,copSerial=0,decoySerial=0;
let lastPoliceCrash=-1e9;
let usedFeatures=new Set(),hitBlocks=new Set(),nearPairs=new Set(),fixtureFeatures=[];
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
let eventSerial=0,progressSerial=0,lastEventFrame=0,lastProgressFrame=0,lastLapsed=false;
let heli={active:false,x:80,y:0,vx:0,spot:0};
const stats={distance:0,intersections:0,districts:1,maxWanted:2,escapes:0,swaps:0,disguises:0,
  alleyUses:0,alleyEscapes:0,rampLaunches:0,rampClears:0,roadblocksAvoided:0,roadblockHits:0,
  transitRampClears:0,
  policeCrashes:0,trafficHits:0,nearMisses:0,busts:0,wantedUps:0,lapses:0,acts:0,
  events:0,progress:0,maxEventLull:0,maxProgressLull:0,appliedIntents:0,admireIntents:0,
  maxStep:0,invisibleRescues:0,boosts:0,paintEscapes:0,swapEscapes:0};
const wantedFrames=[0,0,0,0,0,0];
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},2:{frames:44,minGap:100},
  3:{frames:84,minGap:600,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});
const act={phase:'calm',type:'dragnet',warnAt:3300,landAt:3540,endAt:4440,index:0,
  targetBlock:0,safeX:ALLEY_L,notes:[]};

const mod=(n,d)=>((n%d)+d)%d;
const round=(v,n)=>{const p=Math.pow(10,n||4);return Math.round(v*p)/p;};
const mix=(a,b,t)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16),
  m=s=>Math.round((pa>>s&255)+((pb>>s&255)-(pa>>s&255))*t);
  return'#'+((1<<24)+(m(16)<<16)+(m(8)<<8)+m(0)).toString(16).slice(1);};
const poly=(points,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.closePath();ctx.fill();};
const line=(points,c,w)=>{ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.stroke();ctx.lineWidth=1;};
const sy=wy=>CAR_Y-(wy-player.y);
// Engine particles use a conventional world-y-minus-camera transform, while
// this northbound city renders increasing world y upward. Store presentation
// particles in inverted world space so their actual payoff lands on the car.
const fxAt=(x,y,n,c,sp,grav)=>fxBurst(x,-y,n,c,sp,grav);
const dustAt=(x,y,n,c)=>fxDust(x,-y,n,c);
const ringAt=(x,y,c,dr,t)=>ring(x,-y,c,dr,t);
const fxCam=()=>-player.y-CAR_Y;
const districtForBlock=b=>mod(Math.floor(b/DISTRICT_BLOCKS),DISTRICTS.length);
const currentBlock=()=>Math.floor(player.y/BLOCK);
const currentDistrict=()=>districtForBlock(currentBlock());
const inAlleyX=x=>x<ROAD_L-1||x>ROAD_R+1;
const featureKey=(b,k)=>b+':'+k;
const say=(s,c,wy,t,x)=>texts.push({s,c:c||CREAM,y:wy===undefined?player.y+40:wy,x:x===undefined?player.x:x,t:t||70});
function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);
  lastEventFrame=showFrame;if(score&&playing())addScore(score);}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);
  lastProgressFrame=showFrame;if(score&&playing())addScore(score);}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+30});}
function allFinite(){return[player.x,player.y,player.vx,player.speed,player.z,player.vz,heat,runFrame]
  .every(Number.isFinite)&&traffic.every(finiteBody)&&police.every(finiteBody);}
function finiteBody(v){return[v.x,v.y,v.vx,v.speed].every(Number.isFinite);}

function blockInfo(b){
  const district=districtForBlock(b),h=hash(b*31+worldSeed*7,district*19+5),side=h<.5?-1:1;
  const garage=mod(b+worldSeed,9)===4?{kind:'garage',x:side<0?ALLEY_L:ALLEY_R,y:b*BLOCK+116,
    vehicle:['bike','taxi','muscle','van','coupe'][mod(b+district,5)]}:null;
  const paint=mod(b+worldSeed*3,11)===7?{kind:'paint',x:side<0?ALLEY_R:ALLEY_L,y:b*BLOCK+162}:null;
  const ramp=mod(b+worldSeed,6)===2?{kind:'ramp',x:LANES[mod(b+worldSeed,3)],y:b*BLOCK+132}:null;
  const normalBlock=mod(b+worldSeed,8)===6?{kind:'roadblock',y:b*BLOCK+178,
    gapX:LANES[mod(b*3+worldSeed,3)],id:'normal-'+b}:null;
  return{b,district,side,garage,paint,ramp,normalBlock,crossY:b*BLOCK};
}

function makePlayer(x,y,kind){return{x,y,vx:0,speed:1.15,z:0,vz:0,angle:0,kind:kind||'coupe',damage:0,
  spinT:0,impactCd:0,boostT:0,swapT:0,swapFrom:null,swapTo:null,paintT:0,airFrames:0,
  inAlley:false,alleyT:0,alleyBlock:-1,intent:null,lastX:x,lastY:y,lastZ:0,routeX:80};}
function makeTraffic(b,j){
  const axis=hash(b*11+j,worldSeed*5)>0.78?'cross':'north',lane=LANES[mod(Math.floor(hash(b,j+worldSeed)*9),3)],
    fromLeft=hash(b*17+j,worldSeed*23)<.5;
  return{id:trafficSerial++,axis,x:axis==='cross'?(fromLeft?-12:172):lane,
    y:b*BLOCK+34+j*57+(hash(b+j,worldSeed)-.5)*18,vx:axis==='cross'?(fromLeft?.62:-.62):0,
    speed:.48+hash(b*7+j,worldSeed*13)*.48,kind:['sedan','delivery','compact'][mod(b+j,3)],
    color:['#d96a91','#6bb6ad','#d9a658','#728bc1'][mod(b*3+j+worldSeed,4)],spinT:0,hit:false};
}
function ensureTraffic(){
  const target=currentBlock()+4;
  while(generatedTo<target){generatedTo++;const n=2+(hash(generatedTo,worldSeed)>.62?1:0);
    for(let j=0;j<n;j++)traffic.push(makeTraffic(generatedTo,j));}
  traffic=traffic.filter(t=>t.y>player.y-360&&t.y<player.y+1050&&t.x>-40&&t.x<200);
}
function copTypeFor(level,id){if(level>=5&&id%5===0)return'van';if(level>=4&&id%3===1)return'interceptor';
  if(level>=3&&id%4===2)return'bike';return'cruiser';}
function makeCop(type,x,y){return{id:copSerial++,type,x,y,vx:0,speed:1.2+hash(copSerial,worldSeed)*.25,
  disabled:0,hitCd:0,trafficCd:0,near:false,decoy:0,face:0};}
function spawnCop(){const type=copTypeFor(wanted,copSerial),lane=LANES[mod(copSerial+worldSeed,3)];
  police.push(makeCop(type,lane,player.y-255-(copSerial%3)*22));markEvent();}

// One shared physics path for the human, bot, and every planner rollout.
function advanceCar(body,intent,env){
  intent=intent||{steer:0,throttle:0,brake:false,handbrake:false,action:false,targetX:80,tactic:'COAST'};
  env=env||{alley:inAlleyX(body.x),wet:false};const spec=VEHICLES[body.kind]||VEHICLES.coupe;
  const turn=spec.turn*(env.alley?.82:1)*(body.z>0?.48:1),steer=clamp(intent.steer||0,-1,1);
  const oldX=body.x;body.vx+=steer*turn;body.vx*=intent.handbrake?.9:.79;body.x+=body.vx;
  const top=spec.max*(env.alley?.76:1)*(env.wet?.91:1)+(body.boostT>0?.38:0),target=(intent.throttle||0)*top;
  if(intent.brake)body.speed=Math.max(.35,body.speed-.055);else if(body.speed<target)body.speed=Math.min(target,body.speed+spec.acc);
  else body.speed=Math.max(target,body.speed-.017);
  if(intent.handbrake&&Math.abs(steer)>.4)body.speed*=.986;
  body.y+=body.speed;
  // Alleys connect at intersections. Between them, the building/curb wall is
  // physical: a route must visibly commit at the cross street, never phase
  // sideways through a facade.
  const q=mod(body.y,BLOCK),open=q<28||q>BLOCK-28;
  if(!open){
    if(oldX>=ROAD_L&&body.x<ROAD_L){body.x=ROAD_L+.1;body.vx=0;}
    else if(oldX<ROAD_L&&body.x>=ROAD_L){body.x=ROAD_L-.1;body.vx=0;}
    if(oldX<=ROAD_R&&body.x>ROAD_R){body.x=ROAD_R-.1;body.vx=0;}
    else if(oldX>ROAD_R&&body.x<=ROAD_R){body.x=ROAD_R+.1;body.vx=0;}
  }
  if(body.z>0||body.vz>0){body.z+=body.vz;body.vz-=.075;
    if(body.z<=0){body.z=0;body.vz=0;}}
  const lo=14+spec.width,hi=146-spec.width;if(body.x<lo){body.x=lo;body.vx=Math.abs(body.vx)*.35;}
  if(body.x>hi){body.x=hi;body.vx=-Math.abs(body.vx)*.35;}
  body.angle=clamp(-body.vx*.11-steer*.055,-.25,.25);
  return body;
}

function nearestThreat(x,y,horizon){let best=999;
  for(const t of traffic){const ty=t.y+(t.axis==='north'?t.speed*horizon:0),tx=t.x+(t.axis==='cross'?t.vx*horizon:0);
    if(ty>=y-18&&ty<=y+260)best=Math.min(best,Math.hypot(tx-x,(ty-y)*.42));}
  for(const c of police)if(!c.disabled)best=Math.min(best,Math.hypot(c.x-x,(c.y+c.speed*horizon-y)*.5));
  return best;
}
function upcomingFeatures(){const b=currentBlock(),out=[];for(let i=b;i<=b+2;i++){const q=blockInfo(i);
  for(const f of[q.garage,q.paint,q.ramp])if(f&&!usedFeatures.has(featureKey(i,f.kind)))out.push(Object.assign({block:i},f));}
  const af=actRamp();if(af&&!usedFeatures.has(featureKey(af.block,'act-ramp-'+act.index)))out.push(af);
  return out.concat(fixtureFeatures);}
function actRamp(){return act.phase!=='calm'&&act.type==='transit'?{kind:'ramp',x:act.safeX,
  y:act.targetBlock*BLOCK+132,block:act.targetBlock,actRamp:true}:null;}
function roadblockForBlock(b){const q=blockInfo(b);let rb=null;
  if(maxWanted>=3&&q.normalBlock&&!hitBlocks.has(q.normalBlock.id))rb=q.normalBlock;
  if(act.phase==='live'&&act.targetBlock===b)rb={kind:'roadblock',y:b*BLOCK+178,
    gapX:act.type==='transit'?-999:act.safeX,id:'act-'+act.index};
  return rb;
}
function simulateRoute(targetX){
  const b=Object.assign({},player),features=upcomingFeatures();let min=999,score=0,hitRisk=0;
  for(let f=0;f<150;f++){
    const intent={steer:clamp((targetX-b.x)*.11,-1,1),throttle:1,brake:false,handbrake:false,action:false,targetX,tactic:'PLAN'};
    advanceCar(b,intent,{alley:inAlleyX(b.x),wet:act.phase==='live'&&act.type==='transit'});
    const d=nearestThreat(b.x,b.y,f);min=Math.min(min,d);if(d<10)hitRisk+=10-d;
  }
  score+=b.y-player.y-hitRisk*(2.9-persona.risk*.45)+Math.min(32,min)*1.35;
  if(inAlleyX(targetX))score+=persona.alley+heat*7-player.damage*.04;
  for(const f of features){if(Math.abs(f.x-targetX)>13||f.y<player.y-10||f.y>b.y+35)continue;
    if(f.kind==='garage')score+=heat>=3.85||player.damage>52?persona.swap+heat*20+player.damage*.35:-26;
    else if(f.kind==='paint')score+=heat>=4.05?55+heat*27:-34;
    else if(f.kind==='ramp')score+=persona.ramp+(wanted>=3?42:0);
  }
  for(let bb=currentBlock();bb<=Math.floor(b.y/BLOCK)+1;bb++){const rb=roadblockForBlock(bb),
    jump=features.some(f=>f.kind==='ramp'&&f.block===bb&&Math.abs(f.x-targetX)<12);
    if(rb&&Math.abs(targetX-rb.gapX)>15&&!jump)score-=155;else if(rb)score+=jump?82:42;}
  if(act.phase==='warn')score+=Math.max(0,130-Math.abs(targetX-act.safeX)*5);
  return{targetX,score,min,projectedY:b.y,route:inAlleyX(targetX)?'alley':'street'};
}
function buildRoutePlan(){
  if(typeof globalThis.__NO_ROUTE_PLAN!=='undefined')return reactiveRoute();
  if(act.phase!=='calm'&&player.y<act.targetBlock*BLOCK+205){return{targetX:act.safeX,score:1200,min:99,
    projectedY:act.targetBlock*BLOCK+190,route:inAlleyX(act.safeX)?'alley':'street',act:true};}
  if(player.inAlley&&wanted>=4&&player.alleyT<112){const x=player.x<80?ALLEY_L:ALLEY_R;
    return{targetX:x,score:999,min:99,projectedY:player.y+180,route:'alley',committed:true};}
  const candidates=[ALLEY_L,...LANES,ALLEY_R].map(simulateRoute);
  candidates.sort((a,b)=>b.score-a.score||a.targetX-b.targetX);return candidates[0];
}
function reactiveRoute(){
  // Honest baseline: every corridor and visible service is available, but it
  // only reacts to what is already on screen. It has no copied-state forecast,
  // police-intercept model, multi-block roadblock knowledge, or act warning.
  const visible=upcomingFeatures().filter(f=>f.y>=player.y-8&&f.y<=player.y+92),rb=[currentBlock(),currentBlock()+1]
    .map(roadblockForBlock).find(q=>q&&q.y<=player.y+105),candidates=[ALLEY_L,...LANES,ALLEY_R].map(x=>{
      let score=nearestThreat(x,player.y,18)-(inAlleyX(x)?8:0)+(wanted>=4&&inAlleyX(x)?14:0);
      for(const f of visible)if(Math.abs(f.x-x)<13){
        if(f.kind==='garage'&&(heat>=3.8||player.damage>52))score+=48;
        if(f.kind==='paint'&&heat>=4)score+=55;
        if(f.kind==='ramp')score+=wanted>=3?32:10;
      }
      if(rb){const jump=visible.some(f=>f.kind==='ramp'&&Math.abs(f.x-x)<12);
        score+=Math.abs(x-rb.gapX)<=15||jump?24:-54;}
      return{targetX:x,clear:score};
    });
  candidates.sort((a,b)=>b.clear-a.clear||a.targetX-b.targetX);return{targetX:candidates[0].targetX,
    score:candidates[0].clear,min:candidates[0].clear,projectedY:player.y+92,
    route:inAlleyX(candidates[0].targetX)?'alley':'street',reactive:true};
}
function routeTactic(p){
  if(act.phase==='warn')return act.type==='dragnet'?'BEAT THE DRAGNET':'TAKE THE SERVICE RAMP';
  const f=upcomingFeatures().filter(q=>Math.abs(q.x-p.targetX)<14&&q.y>player.y-8&&q.y<player.y+300)
    .sort((a,b)=>a.y-b.y)[0];
  if(f){if(f.kind==='garage')return'DITCH THE CAR';if(f.kind==='paint')return'CHANGE THE PLATES';if(f.kind==='ramp')return'HIT THE RAMP';}
  return inAlleyX(p.targetX)?'CUT THROUGH THE ALLEY':wanted>=4?'BREAK THE SPOTLIGHT':'THREAD THE TRAFFIC';
}
function rawBotIntent(){
  if(visualIntent)return Object.assign({},visualIntent);
  const close=police.some(c=>!c.disabled&&Math.hypot(c.x-player.x,c.y-player.y)<20);
  if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined'&&!close){stats.admireIntents++;
    return{steer:0,throttle:.42,brake:false,handbrake:false,action:false,targetX:player.x,tactic:'WATCH THEM OVERSHOOT'};}
  if(!plan||runFrame-planAt>=45||Math.abs(plan.targetX-player.routeX)>45){plan=buildRoutePlan();planAt=runFrame;player.routeX=plan.targetX;}
  const targetX=plan.targetX,steer=clamp((targetX-player.x)*.105,-1,1),sharp=Math.abs(targetX-player.x)>26;
  return{steer,throttle:sharp?.86:1,brake:false,handbrake:sharp&&player.speed>1.8,action:false,targetX,
    tactic:routeTactic(plan)};
}
function lapseIntent(context,last){const base=last||rawBotIntent();return Object.assign({},base,{steer:(base.steer||0)*.18,
  throttle:.58,brake:false,handbrake:false,action:false,tactic:'MISSED THE TURN'});}
function botIntent(){
  if(typeof globalThis.__NO_LAPSE!=='undefined'){lastLapsed=false;return rawBotIntent();}
  const before=skill.isLapsed(runFrame),intent=skill.decide(runFrame,null,rawBotIntent,lapseIntent),after=skill.isLapsed(runFrame);
  if(after&&!before&&!lastLapsed){stats.lapses++;markEvent();say('WRONG TURN!',CORAL,player.y+54,42);}
  lastLapsed=after;return intent||rawBotIntent();
}
function humanIntent(){const steer=(keys.right?1:0)-(keys.left?1:0),targetX=clamp(player.x+steer*30,14,146);
  return{steer,throttle:keys.up?1:.72,brake:!!keys.down,handbrake:!!(keys.a||keys.b),action:!!keys.c,
    targetX,tactic:'MANUAL GETAWAY'};}
const controller=controllerMux({human:humanIntent,ai:botIntent,manual:()=>playing()||manual()});

function setWanted(next){next=clamp(next,1,5);if(next===wanted)return;
  const before=wanted;wanted=next;maxWanted=Math.max(maxWanted,wanted);stats.maxWanted=maxWanted;
  if(wanted>before){stats.wantedUps++;markProgress(20);offer('wanted-up',2,player.x,player.y,wanted);
    say(wanted===5?'CITYWIDE DRAGNET':wanted+' STAR HEAT',wanted===5?CORAL:GOLD,player.y+68,90);}
}
function updateHeat(){
  const alley=inAlleyX(player.x);heat+=.00020*player.speed+(maxWanted<5?.000025:0);
  if(alley)heat-=.00035;if(player.paintT>0)heat-=.0007;heat=clamp(heat,.25,5);
  setWanted(Math.ceil(heat));wantedFrames[wanted]++;
}
function completeEscape(kind,fromWanted){
