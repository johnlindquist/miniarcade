  body{display:flex;align-items:center;justify-content:center;overflow:hidden}

  aria-label="Frog Convoy. An autonomous lead frog gathers a growing family and guides every passenger across traffic, collapsing logs, and seasonal floods."></canvas>

<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,R,RI,hash,clamp,rect,stepParts,drawParts,ring,stepRings,drawRings,
  shake,preDraw,postDraw,start,keys,manual,initSession,sessionStep,drawSession,playing,addScore,gameOver,
  createShow,fxBurst,fxDust}=E;
const{controllerMux,skillProfile,createRng}=AI;

// FROG CONVOY — Frogger x escort mission. The lead frog owns one discrete
// hop integrator. Human input, the reactive baseline, the family lookahead,
// and every delayed passenger route through the same function. The planner
// copies numeric state and projects existing hazards with pure math; it never
// consumes engine RNG or mutates the live convoy.
const TAU=Math.PI*2,HOP_FRAMES=18,FOLLOW_DELAY=16,SHIFT_FRAMES=15*60*60;
const ROW_Y=[43,69,97,124,151,178,205,232,255,278,301,326];
const SAFE_ROWS=new Set([0,1,2,7,11]),ROAD_ROWS=new Set([8,9,10]),RIVER_ROWS=new Set([3,4,5,6]);
const GRID=20,MIN_X=20,MAX_X=140,FAMILY_GOAL=5;
const INK='#071410',CREAM='#f5f0cf',PALE='#d8e9d2',LIME='#bce866',LEAD='#70c95b',LEAD_DARK='#225c43',
  GOLD='#ffd166',CORAL='#ff765f',CYAN='#7de3dd',BLUE='#4ca6c9',VIOLET='#9b83d5',MUD='#6c5138';
const SEASONS=[
  {name:'SPRING RUN',sky:'#82c9c2',sky2:'#dbe8b5',far:'#557f65',bank:'#628e4d',grass:'#83b85a',water:'#287f8b',water2:'#46a6a5',road:'#313940',accent:'#f6a9c2'},
  {name:'MIDSUMMER',sky:'#e9ae69',sky2:'#f7dd94',far:'#756f45',bank:'#7b9143',grass:'#a8b84d',water:'#257a83',water2:'#5aa99a',road:'#39383b',accent:'#ffd166'},
  {name:'AUTUMN MARCH',sky:'#c86f56',sky2:'#f0b270',far:'#704b43',bank:'#8b6039',grass:'#b77b3f',water:'#315f70',water2:'#628a8b',road:'#37343a',accent:'#ef8354'},
  {name:'FLOOD SEASON',sky:'#53697c',sky2:'#8da2aa',far:'#384d5b',bank:'#55705b',grass:'#6f8d65',water:'#285d74',water2:'#4b8394',road:'#30373e',accent:'#9bd8ed'}
];
const FROG_STYLES=[
  {name:'PIP',body:'#7fd27a',belly:'#d7ec8a',mark:'#2e7251',accessory:'bow'},
  {name:'MOSS',body:'#80c977',belly:'#e2e99a',mark:'#37664a',accessory:'cap'},
  {name:'DOT',body:'#9ad66e',belly:'#e8f0a4',mark:'#66528a',accessory:'spots'},
  {name:'REED',body:'#5fc49a',belly:'#c9efd0',mark:'#236c62',accessory:'leaf'},
  {name:'BUB',body:'#72bfc5',belly:'#cfe9d9',mark:'#315c78',accessory:'tail'}
];

let showFrame=0,runFrame=0,actFrame=0,journeyNo=0,state='run',stateT=0,outcome='';
let leader=null,passengers=[],pickups=[],route=[],vehicles=[],logs=[],lostGhosts=[],ripples=[],texts=[];
let nextId=1,collected=1,bestRow=11,seasonIndex=0,arrival=null,visualBeat='';
let persona=null,personaHistory=[],profile=null,profileSeed=1,lastLapsed=false,planCache={at:-1e9,intent:null,score:0};
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
let act=null,actNotes=[],banner={s:'',c:PALE,t:0},eventSerial=0,progressSerial=0;
let lastEventFrame=0,lastProgressFrame=0,lastNearFrame=-1e9,lastIntent={tactic:'GATHER THE FAMILY'};
const stats={hops:0,pickups:0,maxChain:1,passengerLosses:0,sacrifices:0,leadFalls:0,
  arrivals:0,wholeArrivals:0,partialArrivals:0,delivered:0,roadClears:0,riverClears:0,
  closeCalls:0,logsCollapsed:0,lapses:0,actsWarned:0,actsLanded:0,apexes:0,
  events:0,progress:0,maxEventLull:0,maxProgressLull:0,plannerCalls:0,plannerSteps:0,
  appliedIntents:0,admireIntents:0,expeditions:0,endings:0,wins:0};

const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:14,minGap:10},
  2:{frames:48,minGap:96},
  3:{frames:96,minGap:780,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});

const rowY=row=>ROW_Y[clamp(row,0,ROW_Y.length-1)];
const snapX=x=>clamp(Math.round(x/GRID)*GRID,MIN_X,MAX_X);
const wrap=(x,min,max)=>{const d=max-min;while(x<min)x+=d;while(x>=max)x-=d;return x;};
const wrapDelta=(a,b,span=200)=>{let d=a-b;while(d>span/2)d-=span;while(d<-span/2)d+=span;return d;};
const finiteBody=b=>b&&['x','y','groundY'].every(k=>Number.isFinite(b[k]));
const allFinite=()=>finiteBody(leader)&&passengers.every(finiteBody)&&vehicles.every(v=>Number.isFinite(v.x)&&Number.isFinite(v.vx))&&logs.every(l=>Number.isFinite(l.x)&&Number.isFinite(l.sink));
const wholeFamily=()=>collected===FAMILY_GOAL&&passengers.length===FAMILY_GOAL;
function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);lastEventFrame=showFrame;if(score&&playing())addScore(score);}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);lastProgressFrame=showFrame;if(score&&playing())addScore(score);}
function say(s,c,t,x,y){banner={s,c:c||PALE,t:t||65};texts.push({s,c:c||PALE,x:x===undefined?leader.x:x,y:y===undefined?leader.y-13:y,t:t||65});}
function offer(id,tier,x,y,tag){SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+36});}
function noteAct(e){actNotes.push({kind:e.kind,id:e.id,at:e.at,tag:e.tag,landsAt:e.landsAt,tactic:e.tactic});SHOW.note(e);}

function makeFrog(x,row,style,index){
  return{id:nextId++,x,y:rowY(row),groundY:rowY(row),row,fromX:x,fromY:rowY(row),toX:x,toY:rowY(row),toRow:row,
    hopT:0,cooldown:0,faceX:0,faceY:-1,inv:0,waterT:0,onLog:0,panicT:0,lookT:0,routeIndex:route.length,
    style:style||FROG_STYLES[index%FROG_STYLES.length],index:index||0,intent:{tactic:'WAIT'}};
}

// Exact frog integrator used by runtime, passengers, and copied planning.
// It only mutates the body passed to it and returns hop edge telemetry.
function advanceFrog(b,intent){
  intent=intent||{hop:false,dx:0,dy:0};let started=false,landed=false;
  if(b.inv>0)b.inv--;if(b.panicT>0)b.panicT--;if(b.lookT>0)b.lookT--;
  if(b.hopT>0){
    b.hopT--;const q=1-b.hopT/HOP_FRAMES,e=q*q*(3-2*q);
    b.x=b.fromX+(b.toX-b.fromX)*e;b.groundY=b.fromY+(b.toY-b.fromY)*e;
    b.y=b.groundY-Math.sin(q*Math.PI)*(5.5+Math.abs(b.toRow-b.row)*1.5);
    if(b.hopT===0){b.row=b.toRow;b.x=b.toX;b.groundY=b.toY;b.y=b.toY;b.cooldown=3;landed=true;}
  }else{
    b.y=b.groundY=rowY(b.row);if(b.cooldown>0)b.cooldown--;
    if(intent.hop&&b.cooldown<=0){
      const hasTargetRow=Number.isFinite(intent.targetRow)&&intent.targetRow>=0,
        hasTargetX=Number.isFinite(intent.targetX)&&intent.targetX>0,
        targetRow=hasTargetRow?clamp(intent.targetRow,0,ROW_Y.length-1):clamp(b.row+(intent.dy||0),0,ROW_Y.length-1),
        targetX=hasTargetX?clamp(intent.targetX,MIN_X,MAX_X):clamp(snapX(b.x)+(intent.dx||0)*GRID,MIN_X,MAX_X);
      if(targetRow!==b.row||Math.abs(targetX-b.x)>.5){
        b.fromX=b.x;b.fromY=rowY(b.row);b.toX=targetX;b.toY=rowY(targetRow);b.toRow=targetRow;b.hopT=HOP_FRAMES;
        b.faceX=Math.sign(targetX-b.x);b.faceY=Math.sign(targetRow-b.row);started=true;
      }
    }
  }
  return{started,landed,row:b.row,x:b.x,targetRow:b.toRow,targetX:b.toX};
}

function vehicleFactor(){return act&&act.phase==='live'&&act.kind==='rush'?1.62:1;}
function logFactor(){return act&&act.phase==='live'&&act.kind==='flood'?1.42:1;}
function makeHazards(){
  vehicles=[];logs=[];
  const roadTypes=['car','truck','bus'];
  for(let lane=0;lane<3;lane++){
    const row=8+lane,dir=lane%2?1:-1,speed=(.48+lane*.07)*dir,type=roadTypes[lane],count=type==='bus'?2:3;
    for(let i=0;i<count;i++)vehicles.push({id:nextId++,row,x:wrap(R(-15,15)+i*(200/count)+lane*31,-30,170),vx:speed,
      len:type==='car'?19:type==='truck'?27:34,w:type==='bus'?12:11,type,color:['#e65f54','#e9b64d','#5a9bc7'][lane],flash:0});
  }
  for(let lane=0;lane<4;lane++){
    const row=3+lane,dir=lane%2?-1:1,speed=(.24+lane*.035)*dir,count=3;
    for(let i=0;i<count;i++)logs.push({id:nextId++,row,x:wrap(i*(200/count)+lane*21+R(-7,7),-38,178),vx:speed,
      len:44+RI(0,8),kind:(i+lane)%3,fragile:(i+lane)%4===0,sink:0,downT:0,load:0,crack:0});
  }
}

function makePickups(){
  pickups=[];const used=[];
  for(const row of[7,7,2,2]){
    let col=RI(1,5);while(used.some(p=>p.row===row&&Math.abs(p.col-col)<2))col=1+(col+2)%5;
    used.push({row,col});const style=FROG_STYLES[pickups.length+1];
    pickups.push({id:nextId++,x:20+col*20,row,y:rowY(row),style,wave:(pickups.length*7)%19,collected:false});
  }
}

function resetAct(){act={kind:'rush',phase:'calm',warnAt:2700,landAt:0,endAt:0,count:0,dir:1,refugeX:40,crocX:80,crocV:.52,responded:false,responseAt:0,responseTactic:''};actNotes=[];}
function scheduleNextAct(){
  act.count++;act.kind=act.count%2?'flood':'rush';act.phase='calm';act.warnAt=actFrame+2700;
  act.landAt=0;act.endAt=0;act.responded=false;act.responseAt=0;act.responseTactic='';
}
function stepActs(){
  if(typeof globalThis.__NO_ACTS!=='undefined'){act.phase='calm';return;}
  const relevant=state==='run'&&(act.kind==='rush'?leader.row>=7:leader.row>=3);
  if(act.phase==='calm'&&actFrame>=act.warnAt&&relevant){
    act.phase='warn';act.dir=hash(journeyNo*31+act.count,17)>.5?1:-1;act.refugeX=act.dir>0?120:40;
    act.crocX=act.dir>0?18:142;act.crocV=act.dir*.52;planCache.at=-1e9;stats.actsWarned++;
    const warning=act.kind==='rush'?240:210;
    act.landAt=actFrame+warning;act.endAt=act.landAt+840;act.responded=false;act.responseAt=0;act.responseTactic='';
    noteAct({kind:'act-warning',id:act.kind,at:showFrame,tag:actFrame,landsAt:showFrame+warning});
    say(act.kind==='rush'?'RUSH HOUR INBOUND':'FLASH FLOOD INBOUND',act.kind==='rush'?GOLD:CYAN,100,80,78);
  }else if(act.phase==='warn'&&actFrame>=act.landAt){
    act.phase='live';stats.actsLanded++;noteAct({kind:'act-land',id:act.kind,at:showFrame,tag:actFrame});markEvent();
    say(act.kind==='rush'?'THE COMMUTE BREAKS LOOSE':'THE RIVER TAKES THE BANKS',CREAM,82,80,78);shake(4);
  }else if(act.phase==='live'){
    if(actFrame>=act.endAt){offer('act-clear-'+act.count,2,leader.x,leader.y,act.kind);say(act.kind==='rush'?'LAST BUS CLEARS':'THE CREST PASSES',LIME,65);markEvent();scheduleNextAct();}
  }
}

function stepHazards(){
  if(act&&act.phase==='live'&&act.kind==='flood')act.crocX=wrap(act.crocX+act.crocV,-24,184);
  const vf=vehicleFactor();for(const v of vehicles){v.x=wrap(v.x+v.vx*vf,-35,175);if(v.flash>0)v.flash--;}
  const lf=logFactor();for(const l of logs){
    l.x=wrap(l.x+l.vx*lf,-42,182);l.load=0;
    if(l.downT>0){l.downT--;l.sink=Math.min(1.25,l.sink+.04);if(l.downT===0)l.sink=.72;continue;}
    const floodStrain=act&&act.phase==='live'&&act.kind==='flood'&&l.fragile;
    if(floodStrain)l.sink+=.00165;else l.sink=Math.max(0,l.sink-.008);
    if(l.sink>.98){collapseLog(l);continue;}
  }
}
function collapseLog(l){
  if(l.downT>0)return;l.downT=180;l.crack=1;stats.logsCollapsed++;markEvent();offer('log-collapse-'+l.id+'-'+runFrame,2,l.x,rowY(l.row),'LOG GIVES WAY');
  say('THE LOG GIVES WAY!',CORAL,70,l.x,rowY(l.row)-10);shake(3);fxDust(l.x,rowY(l.row),12,'#b9dfdd');
}
function logAt(row,x,t){
  const lf=logFactor();let best=null,bestGap=Infinity;
  for(const l of logs){if(l.row!==row||l.downT>Math.max(0,-t)||l.sink>.88)continue;const px=wrap(l.x+l.vx*lf*t,-42,182),d=Math.abs(wrapDelta(x,px,224)),gap=d-l.len/2;
    if(gap<bestGap){bestGap=gap;best=l;}}
  return best&&bestGap<=-3?best:null;
}
function vehicleGap(row,x,t){
  const vf=vehicleFactor();let gap=999,hit=null;
  for(const v of vehicles){if(v.row!==row)continue;const px=wrap(v.x+v.vx*vf*t,-35,175),d=Math.abs(wrapDelta(x,px,210))-v.len/2-4;
    if(d<gap){gap=d;hit=v;}}
  return{gap,vehicle:hit};
}
function crocGap(row,x,t){
  if(!act||act.kind!=='flood'||act.phase!=='live'||row!==5)return 999;
  return Math.abs(wrapDelta(x,wrap(act.crocX+act.crocV*t,-24,184),208))-13;
}

function losePassenger(f,reason,sacrifice){
  const index=passengers.indexOf(f);if(index<0)return;
  passengers.splice(index,1);stats.passengerLosses++;if(sacrifice)stats.sacrifices++;markEvent();leader.lookT=55;
  for(const mate of passengers)mate.panicT=Math.max(mate.panicT,32);
  lostGhosts.push({x:f.x,y:f.y,fromX:f.x,fromY:f.y,toX:sacrifice?leader.x:f.x,toY:sacrifice?leader.y:f.y+10,t:42,t0:42,
    style:f.style,sacrifice:!!sacrifice,reason});
  offer(sacrifice?'sacrifice-'+f.id:'lost-'+f.id,2,f.x,f.y,reason);fxBurst(f.x,f.y,14,sacrifice?GOLD:CYAN,1.8,.03);ring(f.x,f.y,sacrifice?GOLD:CYAN,1.4,22);shake(3);
  say(sacrifice?'ONE LEAPS FOR THE FAMILY':reason,sacrifice?GOLD:CORAL,86,f.x,f.y-12);
}
function leadHazard(reason){
  if(leader.inv>0||state!=='run')return;
  const guard=leader.intent&&leader.intent.guard;
  if(guard&&passengers.length){const victim=passengers.at(-1);losePassenger(victim,reason,true);leader.inv=75;leader.panicT=38;return;}
  state='wipe';stateT=132;stats.leadFalls++;markEvent();offer('convoy-scattered-'+journeyNo,2,leader.x,leader.y,reason);leader.panicT=90;
  for(const f of[...passengers])losePassenger(f,'CONVOY SCATTERED',false);
  say(reason+' · REGROUP!',CORAL,120);shake(6);fxBurst(leader.x,leader.y,22,CORAL,2.4,.04);
}

function checkBodyHazard(f,isLeader){
  if(f.hopT>0||f.inv>0)return false;
  if(ROAD_ROWS.has(f.row)){
    const g=vehicleGap(f.row,f.x,0);
    if(g.gap<0){if(g.vehicle)g.vehicle.flash=6;if(isLeader)leadHazard('TRAFFIC HIT');else losePassenger(f,'PASSENGER HIT',false);return true;}
    if(g.gap<6&&showFrame-lastNearFrame>70){lastNearFrame=showFrame;stats.closeCalls++;markEvent();offer('near-'+showFrame,1,f.x,f.y,'CLOSE CALL');say('BUMPER-WIDTH!',GOLD,34,f.x,f.y-11);}
  }
  if(RIVER_ROWS.has(f.row)){
    const l=logAt(f.row,f.x,0);f.onLog=l?l.id:0;
    if(l){f.waterT=0;l.load++;if(l.downT<=0){
      f.x+=l.vx*logFactor();f.fromX=f.toX=f.x;
      const strain=(l.fragile?1.45:1)*(l.load+(act.phase==='live'&&act.kind==='flood'?1.2:0));l.sink+=strain*.0018;
      if(l.sink>.98)collapseLog(l);
    }}else{
      f.waterT++;if(f.waterT>8){if(isLeader)leadHazard('SWEPT AWAY');else losePassenger(f,'LOST TO THE CURRENT',false);return true;}
    }
    if(crocGap(f.row,f.x,0)<0){if(isLeader)leadHazard('CROC AMBUSH');else losePassenger(f,'CROC TAKES THE TAIL',false);return true;}
  }else{f.onLog=0;f.waterT=0;}
  if(f.x<5||f.x>155){if(isLeader)leadHazard('OFF THE BANK');else losePassenger(f,'SWEPT OFFSCREEN',false);return true;}
  return false;
}

function collectPickups(){
  if(leader.hopT>0)return;
  for(const p of pickups){if(p.collected||p.row!==leader.row||Math.abs(p.x-leader.x)>9)continue;
    p.collected=true;collected++;stats.pickups++;const f=makeFrog(leader.x,leader.row,p.style,passengers.length+1);f.routeIndex=route.length;f.inv=50;passengers.push(f);
    stats.maxChain=Math.max(stats.maxChain,passengers.length);markEvent(12);markProgress();offer('pickup-'+p.id,1,p.x,p.y,p.style.name);fxBurst(p.x,p.y,10,LIME,1.6,.02);ring(p.x,p.y,LIME,1.1,18);
    say(p.style.name+' JOINS THE CONVOY',LIME,70,p.x,p.y-12);
  }
}
function familyTogether(){return passengers.every(f=>f.hopT===0&&f.row===leader.row&&Math.abs(f.x-leader.x)<=GRID*1.2);}
function pickupsOnRow(row){return pickups.filter(p=>!p.collected&&p.row===row);}
function followerIntent(f,index){
  const node=route[f.routeIndex];if(!node||runFrame<node.at+(index+1)*FOLLOW_DELAY)return{hop:false,dx:0,dy:0,guard:false,tactic:'FOLLOW THE LEAD'};
  return{hop:true,dx:0,dy:0,targetX:node.x,targetRow:node.row,guard:false,tactic:'FOLLOW THE LEAD'};
}

function riskAt(row,x,time,fullCount){
  let risk=0;
  const count=Math.max(1,fullCount||1);
  for(let i=0;i<count;i++){
    const at=time+i*FOLLOW_DELAY;
    if(ROAD_ROWS.has(row))for(const extra of[0,Math.min(12,FOLLOW_DELAY-2)]){
      const gap=vehicleGap(row,x,at+extra).gap;if(gap<0)risk+=12+Math.abs(gap);else if(gap<7)risk+=(7-gap)*.5;
    }
    if(RIVER_ROWS.has(row)){
      const supported=logAt(row,x,at)&&logAt(row,x,at+Math.min(12,FOLLOW_DELAY-2));if(!supported)risk+=13;
      const cg=crocGap(row,x,at);if(cg<5)risk+=(5-cg)*1.4;
    }
  }
  return risk;
}
function simulateFamilyHop(intent,full){
  const b={...leader},before={x:b.x,row:b.row,hopT:b.hopT},steps=HOP_FRAMES+1;let edge=null;
  for(let i=0;i<steps;i++){const e=advanceFrog(b,i===0?intent:{hop:false,dx:0,dy:0});if(e.started)edge=e;}
  const count=full?passengers.length+1:1,risk=riskAt(b.row,b.x,HOP_FRAMES,count),nextRisk=b.row>0?riskAt(b.row-1,b.x,HOP_FRAMES+8,count):0;
  return{body:b,edge,risk,nextRisk,steps,moved:before.x!==b.x||before.row!==b.row,finite:finiteBody(b)};
}
function intentFor(dx,dy,tactic,guard){return{hop:!!(dx||dy),dx,dy,guard:!!guard,tactic,targetX:0,targetRow:-1};}
function reactiveIntent(){
  const up=leader.row>0?simulateFamilyHop(intentFor(0,-1,'LEAD THE WAY',passengers.length>0),false):null;
  if(up&&up.risk<7)return intentFor(0,-1,'TAKE THE OPENING',passengers.length>0);
  let best=null;for(const dx of[-1,1]){if(leader.x<=MIN_X&&dx<0||leader.x>=MAX_X&&dx>0)continue;
    const intent=intentFor(dx,0,'FIND A GAP',passengers.length>0),sim=simulateFamilyHop(intent,false),score=-sim.risk-sim.nextRisk*.38-Math.abs(sim.body.x-80)*.012;
    if(!best||score>best.score)best={intent,score};}
  if(best&&best.score>-8)return best.intent;
  return intentFor(0,0,'WAIT FOR ONE CAR',passengers.length>0);
}
function familyPlan(){
  stats.plannerCalls++;const candidates=[];
  if(leader.row>0)candidates.push(intentFor(0,-1,'THREAD THE FAMILY GAP',passengers.length>0));
  if(leader.x>MIN_X)candidates.push(intentFor(-1,0,'SHIFT THE CONVOY',passengers.length>0));
  if(leader.x<MAX_X)candidates.push(intentFor(1,0,'SHIFT THE CONVOY',passengers.length>0));
  candidates.push(intentFor(0,0,'COUNT THE TAIL',passengers.length>0));
  let best=null;
  for(const intent of candidates){

function logVisualBox(l){const y=rowY(l.row)+l.sink*7;return{x:l.x-l.len/2-5,y:y-7,width:l.len+10,height:15};}
function visualActors(){
  const actors=[{id:'leader',kind:'frog',type:'leader',box:frogVisualBox(leader,15,15)}];
  for(const f of passengers)actors.push({id:'frog-'+f.id,kind:'frog',type:'passenger',box:frogVisualBox(f,13,13)});
  for(const p of pickups)if(!p.collected)actors.push({id:'pickup-'+p.id,kind:'frog',type:'pickup',box:{x:p.x-7,y:p.y-9,width:14,height:16}});
  for(const v of vehicles)actors.push({id:'vehicle-'+v.id,kind:'vehicle',type:seasonIndex===3&&v.row===8?'skiff':v.type,box:vehicleVisualBox(v)});
  for(const l of logs)actors.push({id:'log-'+l.id,kind:'platform',type:'log',box:logVisualBox(l)});
  if(act&&act.kind==='flood'&&act.phase==='live')actors.push({id:'croc',kind:'boss',type:'croc',box:{x:act.crocX-17,y:rowY(5)-9,width:34,height:18}});
  return actors;}
globalThis.__frogConvoyVisualProbe=()=>({beat:visualBeat,seasonIndex,season:SEASONS[seasonIndex].name,state,act:act&&act.phase,passengers:passengers.length,collected,
  whole:arrival&&arrival.whole,sacrifice:lostGhosts.some(g=>g.sacrifice),leaderBox:{x:leader.x-8,y:leader.y-10,width:16,height:18},
  chainBoxes:passengers.map(f=>({x:f.x-7,y:f.y-9,width:14,height:16})),tactic:lastIntent&&lastIntent.tactic,
  actors:visualActors(),layout:{playfield:{x:0,y:28,width:160,height:308},approach:{axis:'x',travel:210,visible:160}},finite:allFinite()});

initSession('frog-convoy',[['ARROWS','HOP'],['SPACE','GUARD THE FAMILY']],{viewer:true});
resetGame();start(()=>step(),()=>render());
</script>
