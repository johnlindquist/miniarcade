const active=c=>c&&c.dead<=0&&c.lives>0;

}

    if(x<ARENA.x0+pad||x>ARENA.x1-pad||y<ARENA.y0+pad||y>ARENA.y1-pad||pointInWall(x,y,pad))return false;}

}

  {id:'p'+i+'n',x:p.x,y:p.y-p.r-13},{id:'p'+i+'e',x:p.x+p.r+13,y:p.y},
  {id:'p'+i+'s',x:p.x,y:p.y+p.r+13},{id:'p'+i+'w',x:p.x-p.r-13,y:p.y}

  for(const p of PUDDLES){const d=Math.hypot(x-p.x,y-p.y);if(d<p.r+13)risk+=(p.r+13-d)*1.4;}
  if(!allowCore&&(coreDanger()||coreForecast()<(typeof __NO_ACT_TELEGRAPH!=='undefined'?120:40))){const range=roundPhase==='REDLINE'?84:70,d=Math.hypot(x-CORE.x,y-CORE.y);

}

  for(let i=1;i<=steps;i++){const t=i/steps;peak=Math.max(peak,dangerAt(a.x+(b.x-a.x)*t,a.y+(b.y-a.y)*t,c,allowCore));}

    c.navGoalX=goal.x;c.navGoalY=goal.y;c.navT=30;

function targetUtility(c,other){

  if(other.inv>18)score-=120;if(other.id===c.grudge&&c.grudgeT>0)score+=28;
  if(clearLane(c,other,1))score+=10;else score-=10;

  if(c.role==='BRAWLER'&&d<55)score+=18;

function targetFor(c){
  let best=null,bestScore=-Infinity;

  const current=cars[c.target],currentScore=targetUtility(c,current);
  if(active(current)&&current.inv<=18&&c.retarget>0&&best!==current){
    const cd=Math.hypot(current.x-c.x,current.y-c.y),bd=best?Math.hypot(best.x-c.x,best.y-c.y):Infinity;
    if(bestScore<currentScore+18&&!(cd>145&&bd<70)&&!(best&&best.hp<2.2&&current.hp>=2.2)){
      c.targetScore=currentScore;c.targetReason=targetReasonFor(c,current);return current;}
  }
  if(best){if(best!==current){c.target=best.id;c.retarget=48+RI(0,28);}c.targetScore=bestScore;c.targetReason=targetReasonFor(c,best);}
  return best;

function targetReasonFor(c,target){

}
function repairFor(c){return nearest(pickups,c,p=>p.t<=0&&p.type==='repair');}

function coreDanger(){return CORE.state==='warn'||CORE.state==='active';}
function incomingThreat(c){

    future=Math.hypot(mine.x-px,mine.y-py),score=75-Math.min(now,future)*1.7;

    const rvx=other.vx-c.vx,rvy=other.vy-c.vy,v2=rvx*rvx+rvy*rvy||.01,rx=other.x-c.x,ry=other.y-c.y,

function dodgePoint(c,threat){

    ctx.font='bold 5px monospace';ctx.fillStyle='#9ca6b6';ctx.fillText('NIGHT SALVAGE CONTRACT',47,170);
    ctx.font='bold 4px monospace';ctx.fillStyle='#e7edf4';ctx.fillText('VOLT · FORK · BULWARK · WISP',43,177);
    const n=Math.max(1,Math.ceil(stateT/40));ctx.font='bold 22px monospace';ctx.lineWidth=3;ctx.strokeStyle='#080a0f';ctx.strokeText(n,73,190);ctx.fillStyle='#ffd166';ctx.fillText(n,73,190);ctx.lineWidth=1;
  }
  if(matchState==='over'&&winner){ctx.globalAlpha=.32+.18*Math.sin(frame*.1);ctx.strokeStyle=winner.c;ctx.strokeRect(3.5,2.5,W-7,H-30);ctx.globalAlpha=1;}
}
function draw(){preDraw();drawWorld();postDraw();drawHUD();drawSession(false);}
function step(){
  frame++;sessionStep({reset:resetGame});
  pres=SHOW.step(frame);
  if(matchState==='countdown'){
    stateT--;if(stateT<=0){matchState='play';banner='ARM · RAM · OUTLAST';bannerC='#e7edf4';bannerT=75;}
  }else if(matchState==='play'){
    clock=Math.max(0,clock-1);updatePhase();
    if(!pres.holdWorld&&frame%pres.physicsEvery===0)physicsStep();
  }else if(matchState==='over'){
    stateT--;if(frame%3===0&&winner)spawn({x:winner.x+R(-8,8),y:winner.y+R(-8,8),vx:R(-.3,.3),vy:R(-.8,-.1),t:RI(20,45),c:winner.c});
    if(stateT<=0&&!playing())resetGame();
  }
  if(bannerT>0)bannerT--;for(const item of feed)item.t--;feed=feed.filter(item=>item.t>0);
  stepParts();stepRings();
}

initSession('scrapshift',[
  ['UP / DOWN','GAS · REVERSE'],['LEFT / RIGHT','STEER'],['SPACE','RIVET CANNON'],['X','USE SPECIAL'],['Z / SHIFT','NITRO']
]);
resetGame();start(step,draw);
</script>
