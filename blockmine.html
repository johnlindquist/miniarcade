'use strict';
const{ctx,W,H,random,R,RI,hash,clamp,rect,spawn,burst,dust,stepParts,drawParts,shake,preDraw,postDraw,
  start,keys,tap,manual,initSession,sessionStep,drawSession,playing,addScore,gameOver}=E;

// BLOCK MINE — a tiny, endless, self-playing mining story for the 4:9 strip.
// The controls are deliberately grid-like: every move is readable at video size,
// while easing and particles keep the world from feeling turn based.
const TS=8,COLS=20,SURFACE=12;
const AIR=0,GRASS=1,DIRT=2,STONE=3,COAL=4,IRON=5,GOLD=6,DIAMOND=7,
  WOOD=8,LEAVES=9,LAVA=10,BEDROCK=11,BRIDGE=12,FORT=13,BEACON=14,WATER=15,OBSIDIAN=16,PORTAL=17,
  LADDER=18,ROPE=19,SAPLING=20;
const BC={
  [GRASS]:['#6f9f38','#8fc94a','#4f7b2c'],[DIRT]:['#80552f','#9a693d','#654226'],
  [STONE]:['#777b80','#94989b','#5e6267'],[COAL]:['#777b80','#26282c','#a1a4a7'],
  [IRON]:['#777b80','#c98762','#e5b48f'],[GOLD]:['#777b80','#f4ca42','#fff09a'],
  [DIAMOND]:['#777b80','#43d9d4','#b8fff8'],[WOOD]:['#76502d','#9a6b3c','#51351e'],
  [LEAVES]:['#397a35','#58a84a','#28632c'],[LAVA]:['#e94f20','#ff9f1c','#ffe066'],
  [BEDROCK]:['#32343a','#555861','#1e2025'],[BRIDGE]:['#9a693d','#c98a4c','#654226'],
  [FORT]:['#4e5967','#738091','#303844'],[BEACON]:['#1a777b','#56f0e7','#d5fffb'],
  [WATER]:['#2369b5','#52a9e8','#b8e8ff'],[OBSIDIAN]:['#1b1030','#3d2a66','#7a55cc'],
  [PORTAL]:['#2c1450','#9a5cf0','#e0c3ff'],[LADDER]:['#6b4a26','#a97e46','#3f2c12'],
  [ROPE]:['#8a7a5e','#d8ccb0','#5e523c'],[SAPLING]:['#4f7b2c','#8fc94a','#6b4a26']
};
const NAMES=['HAND','WOOD PICK','STONE PICK','IRON PICK','DIAMOND PICK'];
const TOOLCOL=['#d5a06f','#a66d3d','#9aa0a6','#d8c9b5','#52e5df'];
// Every pick wears out: each mined block chips it, melee swings chip it more.
// Spans are sized for roughly one anvil visit per long expedition.
const DURMAX=[0,120,260,520,1000];
const VAL={[COAL]:12,[IRON]:35,[GOLD]:70,[DIAMOND]:180,[OBSIDIAN]:130,[WOOD]:5,[STONE]:2,[DIRT]:1,[GRASS]:1,[LEAVES]:1};
const HARD={[GRASS]:20,[DIRT]:18,[STONE]:48,[COAL]:55,[IRON]:66,[GOLD]:74,[DIAMOND]:88,
  [WOOD]:40,[LEAVES]:16,[FORT]:100,[BEACON]:120,[OBSIDIAN]:150,[PORTAL]:1e9,[BEDROCK]:1e9,
  [LADDER]:10,[ROPE]:8,[BRIDGE]:14,[SAPLING]:6};

// Hot queues and route frontiers stay allocation-light. Fluids used to shift
// an Array on every cell update, while A* linearly scanned and spliced its
// frontier; both costs grow with the amount of cave the miner has exposed.
class RingQueue{
  constructor(cap=64){this.a=new Array(cap);this.h=0;this.t=0;this.n=0;}
  get length(){return this.n;}
  push(v){
    if(this.n===this.a.length){const b=new Array(this.a.length*2);
      for(let i=0;i<this.n;i++)b[i]=this.a[(this.h+i)%this.a.length];
      this.a=b;this.h=0;this.t=this.n;
    }
    this.a[this.t]=v;this.t=(this.t+1)%this.a.length;this.n++;
  }
  shift(){if(!this.n)return undefined;const v=this.a[this.h];this.a[this.h]=undefined;
    this.h=(this.h+1)%this.a.length;this.n--;return v;}
}
let seed=1,frame=0,camY=0,blocks=new Map(),baseTiles=new Map(),torches=[],mobs=[],texts=[],drops=[];
let traps=[],structures=[],projectiles=[],enemyShots=[];
let discovered=new Set(),fluidCells=new Map(),fluidQueue=new RingQueue(),fluidQueued=new Set(),fluidCursor=0;
let lastDiscoverKey=-1,discoveryDirty=true,discoveryPasses=0;
let deepest=0,kills=0,nextMob=540,day=0,buildScore=0,trapKills=0,trapBuilds=0,deaths=0,repaths=0;
let golemKills=0,surge=0,nextGolemDepth=100,lastDeepFrame=0,recentDeaths=[];
let caravans=0,forgeT=0,nextTripF=0;
// Waygates: each deep portal is twinned with one home portal at the camp, so
// established runs commute instead of re-digging (or re-climbing) the shaft.
let homePortal=null,deepPortals=[],lastPortalDepth=0;
// The Tower of Babel and the grove that feeds it. Heaven sits at 60 meters:
// the summit is a real ending, not an asymptote.
const TOWER_MAX=60;
let towerH=0,towerTarget=10,saplings=[],treesPlanted=0;
let mobRepathBudget=0,mobSerial=0;
const P={cx:10,cy:11,x:84,y:92,toX:10,toY:11,moveT:0,mine:null,face:1,hp:5,invT:0,
  wood:0,cobble:0,coal:0,iron:0,gold:0,diamond:0,obsidian:0,tool:0,torch:4,swing:0,
  target:null,targetT:0,route:[],dead:0,attackT:0,lastTorch:12,aiMode:'SCOUT',
  bow:false,ammo:0,food:2,powder:0,armor:0,trapCd:0,buildCd:0,lastBuildDepth:0,fallD:0,air:0,
  ladder:2,rope:0,silk:0,sapling:0,dur:0,durMax:0,homing:false,tripEnd:0,stairDir:0,
  portalT:0,portalCd:0,portalTo:null,
  beaconBuilt:false,portalBuilt:false,progressFrame:0,stuckRecoveries:0,visits:new Map()};
let goalState={stage:0,depthTarget:50,outpostTarget:1,trapTarget:1,legendTarget:500,caravanTarget:1,completed:0,lastFlash:0};

// Twenty columns fit in five bits. Keeping grid identities numeric removes
// the string creation/splitting that dominated maps, fog checks, and A*.
const KEY_STRIDE=32,key=(x,y)=>y*KEY_STRIDE+x,keyX=k=>k&31,keyY=k=>(k-keyX(k))/KEY_STRIDE;
function generateBaseTile(x,y){
  if(x<0||x>=COLS)return BEDROCK;
  // Two chunky trees make the opening craft legible before the camera heads underground.
  if((x===4||x===15)&&y>=7&&y<=11)return WOOD;
  if((Math.abs(x-4)<=2&&y>=4&&y<=8)||(Math.abs(x-15)<=2&&y>=4&&y<=8)){
    if(!((x===4||x===15)&&y>=7))return LEAVES;
  }
  if(y<SURFACE)return AIR;
  if(y===SURFACE)return GRASS;
  if(y<=16)return DIRT;
  const d=y-SURFACE;
  // Pit shafts: every 30m band hides one 3-wide, ~26-deep drop. The center
  // column offers nothing to grab, so blundering in means real fall damage.
  if(d>6){
    const band=Math.floor(d/30),bd=d-band*30,px=2+Math.floor(hash(band*17+seed*3,seed*7)*15);
    if(Math.abs(x-px)<=1&&bd>2&&bd<29)return AIR;
  }
  // Broad, deterministic cave pockets. Solid rock remains common enough that mining reads.
  const wave=Math.sin(x*0.83+y*0.31+seed)*0.62+Math.sin(x*0.27-y*0.57+seed*1.7)*0.5;
  const cave=d>7&&(wave>0.72||hash(x+seed*3,y-seed*5)>0.935);
  if(cave){
    const f=hash(x+seed*11,y+19);
    if(d>58&&f<0.025)return LAVA;
    if(d>14&&d<110&&f>0.965)return WATER;
    return AIR;
  }
  const r=hash(x*7+seed*13,y*11-seed*3);
  // Sight stops at the first solid face now, so the bands run richer still:
  // roughly half the ore a miner walks past is ever actually seen.
  if(d>58&&r<0.028)return DIAMOND;
  if(d>68&&r>=0.028&&r<0.05)return OBSIDIAN;
  if(d>38&&r<0.06)return GOLD;
  if(d>20&&r<0.12)return IRON;
  if(d>7&&r<0.21)return COAL;
  return STONE;
}
function baseTile(x,y){
  if(x<0||x>=COLS)return BEDROCK;
  const k=key(x,y),cached=baseTiles.get(k);if(cached!==undefined)return cached;
  const t=generateBaseTile(x,y);baseTiles.set(k,t);return t;
}
function tile(x,y){const k=key(x,y),changed=blocks.get(k);return changed===undefined?baseTile(x,y):changed;}
function setTile(x,y,t){
  const before=tile(x,y),k=key(x,y);blocks.set(k,t);
  if(t===LAVA||t===WATER)fluidCells.set(k,{x,y,t});else fluidCells.delete(k);
  if(t===AIR)activateFluidNeighbors(x,y);
  // Opening a nearby face is the only stationary topology change that can
  // reveal new fog. Movement is detected separately by refreshDiscovery().
  if(t===AIR&&before!==AIR&&Math.abs(x-P.cx)<=13&&Math.abs(y-P.cy)<=13)discoveryDirty=true;
}
const solid=t=>t!==AIR&&t!==LAVA&&t!==WATER&&t!==BRIDGE&&t!==LADDER&&t!==ROPE&&t!==SAPLING;
// Crafted fittings come apart under the pick — fast — and refund their material.
const removable=t=>t===LADDER||t===ROPE||t===BRIDGE||t===SAPLING;
const climbable=t=>t===LADDER||t===ROPE||t===WATER;
const centerX=x=>x*TS+TS/2,centerY=y=>y*TS+TS/2;
function say(s,c){
  // Stack-avoidance: bump each new line up until it clears every live message.
  let y=P.y-12,guard=0;
  while(guard++<12&&texts.some(t=>Math.abs(t.x-P.x)<42&&Math.abs(t.y-y)<7))y-=8;
  texts.push({s,c:c||'#fff',x:P.x,y,t:100});
}

function queueFluid(x,y){const k=key(x,y);if(!fluidCells.has(k)||fluidQueued.has(k))return;
  fluidQueued.add(k);fluidQueue.push(k);}
function setFluidCell(x,y,t){const k=key(x,y);blocks.set(k,t);fluidCells.set(k,{x,y,t});queueFluid(x,y);}
function activateFluidNeighbors(x,y){for(const d of[[0,-1],[0,1],[-1,0],[1,0]])queueFluid(x+d[0],y+d[1]);}
// Strict line-of-sight discovery: sight spreads only through open space, so
// every solid block shows just its exposed face — what waits behind it stays
// unknown until the block is mined and the flood pushes one cell further.
function discoverAround(cx,cy,r){
  discoveryPasses++;lastDiscoverKey=key(cx,cy);discoveryDirty=false;
  const reveal=(x,y)=>{
    const k=key(x,y),fresh=!discovered.has(k);discovered.add(k);
    const t=tile(x,y);
    if((t===LAVA||t===WATER)&&!fluidCells.has(k)){blocks.set(k,t);fluidCells.set(k,{x,y,t});queueFluid(x,y);}
    if(fresh&&t===AIR)activateFluidNeighbors(x,y);
  };
  const seen=new Set([key(cx,cy)]),q=new RingQueue(256);q.push([cx,cy,0]);
  reveal(cx,cy);
  while(q.length){
    const[x,y,d]=q.shift();
    if(d>=r)continue;
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
      if(!dx&&!dy)continue;
      const nx=x+dx,ny=y+dy;if(nx<0||nx>=COLS)continue;
      const nk=key(nx,ny);if(seen.has(nk))continue;seen.add(nk);
      reveal(nx,ny);
      if(!solid(tile(nx,ny)))q.push([nx,ny,d+1]);
    }
  }
}
function refreshDiscovery(){
  const k=key(P.cx,P.cy);if(discoveryDirty||k!==lastDiscoverKey)discoverAround(P.cx,P.cy,12);
}
function fluidStep(){
  if(frame%4!==0||!fluidQueue.length)return;let budget=24;
  while(budget-->0&&fluidQueue.length){
    const k=fluidQueue.shift();fluidQueued.delete(k);const f=fluidCells.get(k);if(!f||tile(f.x,f.y)!==f.t)continue;
    const opposite=f.t===WATER?LAVA:WATER,tryFlow=(x,y)=>{
      const nk=key(x,y);if(!discovered.has(nk))return false;const nt=tile(x,y);
      if(nt===opposite){setTile(x,y,STONE);if(Math.abs(y-P.cy)<24){burst(centerX(x),centerY(y),6,'#d8edf0',0.8);}
        return true;}
      if(nt!==AIR)return false;setFluidCell(x,y,f.t);return true;
    };
    if(tryFlow(f.x,f.y+1)){queueFluid(f.x,f.y);continue;}
    const flip=(fluidCursor++)&1,side=flip?[-1,1]:[1,-1];let spread=false;
    for(const dx of side)if(tryFlow(f.x+dx,f.y))spread=true;
    if(spread)queueFluid(f.x,f.y);
  }
}

const GOAL_LABELS=['CHOP WOOD','STONE PICK','IRON KIT','DIAMOND KIT','CAVE OUTPOST','DIAMOND BEACON',
  'GOLEM SLAIN','OBSIDIAN HAUL','WAYGATE','GROVE PLANTED'];
const outpostCount=()=>structures.reduce((n,s)=>n+(s.kind==='outpost'?1:0),0);
function primaryGoal(){
  const s=goalState.stage;
  if(s===0)return{label:'CHOP WOOD',value:P.wood,target:3};
  if(s===1)return{label:'CRAFT STONE PICK',value:P.cobble,target:8};
  if(s===2)return{label:'CRAFT IRON KIT',value:Math.min(3,P.iron)+Math.min(1,P.coal),target:4};
  if(s===3)return{label:'CRAFT DIAMOND KIT',value:P.diamond,target:2};
  if(s===4)return{label:'BUILD CAVE OUTPOST',value:outpostCount(),target:1};
  if(s===5)return{label:'RAISE DIAMOND BEACON',value:P.diamond,target:3};
  if(s===6)return{label:'SLAY STONE GOLEM',value:golemKills,target:1};
  if(s===7)return{label:'MINE OBSIDIAN',value:P.obsidian,target:4};
  if(s===8)return{label:'OPEN A WAYGATE',value:P.obsidian,target:6};
  if(s===9)return{label:'PLANT THE GROVE',value:treesPlanted,target:2};
  // The endgame: everything below ground exists to push this number up.
  if(towerH<TOWER_MAX)return{label:'TOWER TO HEAVEN',value:towerH,target:Math.min(towerTarget,TOWER_MAX)};
  return{label:'BECOME MASTER BUILDER',value:buildScore,target:goalState.legendTarget};
}
function activeGoals(){
  return[
    primaryGoal(),
    {label:'EXPLORE DEEPER',value:deepest,target:goalState.depthTarget},
    {label:'DAWN CARAVAN',value:caravans,target:goalState.caravanTarget},
    {label:'TOWER OF BABEL',value:towerH,target:Math.min(towerTarget,TOWER_MAX)},
    {label:'OUTSMART MOBS',value:trapKills,target:goalState.trapTarget}
  ];
}
function goalDone(stage){return stage===0?P.tool>=1:stage===1?P.tool>=2:stage===2?P.tool>=3:
  stage===3?P.tool>=4:stage===4?outpostCount()>=1:stage===5?P.beaconBuilt:
  stage===6?golemKills>=1:stage===7?P.obsidian>=4:stage===8?P.portalBuilt:
  stage===9?treesPlanted>=2:false;}
function completeGoal(label){goalState.completed++;goalState.lastFlash=frame;say('GOAL! '+label,'#9af7ff');
  if(playing())addScore(100);burst(P.x,P.y,16,'#9af7ff',1.7);}
function updateGoals(){
  while(goalState.stage<10&&goalDone(goalState.stage)){completeGoal(GOAL_LABELS[goalState.stage]);goalState.stage++;}
  while(deepest>=goalState.depthTarget){completeGoal(goalState.depthTarget+'M DEEP');goalState.depthTarget+=50;}
  while(outpostCount()>=goalState.outpostTarget){completeGoal('OUTPOST '+goalState.outpostTarget);goalState.outpostTarget++;}
  while(trapKills>=goalState.trapTarget){completeGoal('TRAP MASTERY');goalState.trapTarget+=2;}
  while(caravans>=goalState.caravanTarget){completeGoal('DAWN CARAVAN');goalState.caravanTarget++;}
  while(towerH>=towerTarget&&towerTarget<=TOWER_MAX){
    completeGoal(towerTarget>=TOWER_MAX?'BABEL TOUCHES HEAVEN':'TOWER '+towerTarget+'M');towerTarget+=10;}
  if(goalState.stage>=10&&buildScore>=goalState.legendTarget){completeGoal(goalState.legendTarget+' BLD');goalState.legendTarget+=500;}
}
function goalTileBonus(t){
  const s=goalState.stage;
  if(t===STONE&&P.cobble<6)return 20;
  if(t===COAL&&P.bow&&P.ammo<4)return 14; // dry quiver: coal doubles as arrow stock
  if(t===WOOD&&P.wood<2&&P.ladder+P.rope<3)return 16; // ladder stock runs on wood
  if(t===GOLD&&goalState.stage>=2)return 8; // the caravan pays for every nugget
  if(s===0)return t===WOOD?18:0;
  if(s===1)return t===STONE?8:t===COAL?3:0;
  if(s===2)return t===IRON?18:t===COAL?8:0;
  if(s===3)return t===DIAMOND?24:t===IRON?4:0;
  if(s===4)return t===STONE?10:0;
  if(s===5)return t===DIAMOND?20:t===STONE?5:0;
  if(s===7||s===8)return t===OBSIDIAN?30:0;
  if(s===9)return t===WOOD?15:t===LEAVES?6:0; // the grove wants saplings
  if(s>=10)return t===STONE?8:t===WOOD?6:0; // the tower eats cobble and rungs
  return t===OBSIDIAN?6:0;
}

function resetGame(){
  seed=RI(1,9999);frame=0;camY=-55;blocks=new Map();baseTiles=new Map();torches=[];mobs=[];texts=[];drops=[];
  traps=[];structures=[];projectiles=[];enemyShots=[];
  discovered=new Set();fluidCells=new Map();fluidQueue=new RingQueue();fluidQueued=new Set();fluidCursor=0;
  lastDiscoverKey=-1;discoveryDirty=true;discoveryPasses=0;
  deepest=0;kills=0;nextMob=540;day=0.3;buildScore=0;trapKills=0;trapBuilds=0;deaths=0;repaths=0;
  golemKills=0;surge=0;nextGolemDepth=100;lastDeepFrame=0;recentDeaths=[];
  caravans=0;forgeT=0;nextTripF=0;
  homePortal=null;deepPortals=[];lastPortalDepth=0;
  towerH=0;towerTarget=10;saplings=[];treesPlanted=0;
  mobRepathBudget=0;mobSerial=0;
  goalState={stage:0,depthTarget:50,outpostTarget:1,trapTarget:1,legendTarget:500,caravanTarget:1,completed:0,lastFlash:0};
  Object.assign(P,{cx:10,cy:11,x:centerX(10),y:centerY(11),toX:10,toY:11,moveT:0,
    mine:null,face:1,hp:5,invT:0,wood:0,cobble:0,coal:0,iron:0,gold:0,diamond:0,obsidian:0,
    tool:0,torch:4,swing:0,target:null,targetT:0,route:[],dead:0,attackT:0,lastTorch:12,
    aiMode:'SCOUT',bow:false,ammo:0,food:2,powder:0,armor:0,trapCd:0,buildCd:0,fallD:0,air:0,
    ladder:2,rope:0,silk:0,sapling:0,dur:0,durMax:0,homing:false,tripEnd:0,stairDir:0,
    portalT:0,portalCd:0,portalTo:null,
    lastBuildDepth:0,beaconBuilt:false,portalBuilt:false,progressFrame:0,stuckRecoveries:0,visits:new Map()});
}

function mineFrames(t){
  const mult=[1.7,0.75,0.5,0.32,0.2][P.tool];
  const gate=(t===IRON&&P.tool<1)||(t===GOLD&&P.tool<2)||(t===DIAMOND&&P.tool<3)||(t===OBSIDIAN&&P.tool<4);
  return Math.ceil((HARD[t]||30)*mult*(gate?2.2:1));
}
function startMine(x,y){
  const t=tile(x,y);if((!solid(t)&&!removable(t))||t===BEDROCK||t===PORTAL)return false;
  const n=mineFrames(t);P.mine={x,y,t,n,left:n};P.face=x<P.cx?-1:x>P.cx?1:P.face;return true;
}
function collect(t,x,y){
  if(t===WOOD){P.wood++;if(random()<0.35)P.sapling++;}
  else if(t===LEAVES&&random()<0.15)P.sapling++;
  else if(t===STONE)P.cobble++;else if(t===COAL){P.coal++;P.torch+=4;P.ammo+=2;}
  else if(t===IRON)P.iron++;else if(t===GOLD)P.gold++;else if(t===DIAMOND)P.diamond++;
  else if(t===OBSIDIAN)P.obsidian++;
  else if(t===LADDER)P.ladder++;else if(t===ROPE)P.rope++;else if(t===BRIDGE)P.cobble++;
  else if(t===SAPLING)P.sapling++;
  if(playing())addScore(VAL[t]||1);
  const col=(BC[t]||['#aaa','#fff'])[1];
  for(let i=0;i<7;i++)spawn({x:centerX(x)+R(-3,3),y:centerY(y)+R(-3,3),
    vx:R(-0.8,0.8),vy:R(-1.1,0.2),grav:0.06,t:RI(16,28),c:col});
  drops.push({x:centerX(x),y:centerY(y),t:20,c:col});
  P.progressFrame=frame;
  checkCraft();
}
const isOre=t=>t===COAL||t===IRON||t===GOLD||t===DIAMOND||t===OBSIDIAN;
function finishMine(){
  const m=P.mine,t=tile(m.x,m.y);P.mine=null;
  if(t===AIR||t===LAVA||t===BEDROCK)return;
  setTile(m.x,m.y,AIR);collect(t,m.x,m.y);shake(t===DIAMOND?3:1);wearTool(1);
  // Vein sense: after cracking an ore, immediately chase adjacent blocks of the
  // same ore so the bot strips whole veins instead of wandering off mid-lode.
  if(isOre(t)&&!playing()&&!manual()){
    for(const d of DIRS)if(tile(m.x+d[0],m.y+d[1])===t){
      P.route=[{x:m.x,y:m.y},{x:m.x+d[0],y:m.y+d[1]}];P.target={x:m.x+d[0],y:m.y+d[1]};
      P.targetT=Math.max(P.targetT,180);P.aiMode='VEIN STRIP';return;
    }
  }
}
function grantTool(n){P.tool=n;P.dur=P.durMax=DURMAX[n];}
function checkCraft(){
  if(P.tool<1&&P.wood>=3){P.wood-=3;grantTool(1);say('CRAFTED WOOD PICK','#f6c177');burst(P.x,P.y,14,TOOLCOL[1],1.4);}
  else if(P.tool<2&&P.cobble>=8){P.cobble-=8;grantTool(2);P.bow=true;P.ammo+=10;

function placeClimbAt(x,y){

function climbUp(){
  const here=tile(P.cx,P.cy),above=tile(P.cx,P.cy-1);
  // Water is "climbable" for the route planner, but leaving it upward is the
  // classic pogo trap: swim up, no support in the air cell, splash back down.
  // Exit the pool only into more water, onto a rung, or by hanging a rung in
  // the air cell first; otherwise fail so the planner re-routes.
  if(here===WATER){
    if(above===WATER||above===LADDER||above===ROPE)return startMove(P.cx,P.cy-1);
    if(above===AIR&&placeClimbAt(P.cx,P.cy-1))return startMove(P.cx,P.cy-1);
    return false;
  }
  if(climbable(here)){

    // nothing. Chain the next rung into the air cell first, or stay put —
    // climbing off the end of a rope is another way to pogo in place.
    if(here===ROPE&&above===AIR&&!placeClimbAt(P.cx,P.cy-1))return false;
    return startMove(P.cx,P.cy-1);
  }
  if(here===AIR&&placeClimb())return startMove(P.cx,P.cy-1);

  // is a solid anchor for one directly above — without this, a miner on his
  // own walkway can never start climbing off it.

// Would the miner have anything at all at (cx,cy-1)? Climbable in the cell,

const DIRS=[[1,0],[-1,0],[0,1],[0,-1]];
function gridLOS(ax,ay,bx,by){

  for(let i=1;i<n;i++){const u=i/n,x=Math.floor((ax+(bx-ax)*u)/TS),y=Math.floor((ay+(by-ay)*u)/TS);
    if(solid(tile(x,y)))return false;}
  return true;

function findRoute(sx,sy,gx,gy,opt){

}

// --- Waygates ----------------------------------------------------------------
// An obsidian archway with a burning two-cell core the miner walks INTO from
// either side. The first one tears a twin open at the camp; every gate links
// to the surface, and the surface gate leads back to the newest gate below —
// a two-way commute between daylight and the deep.
function erectFrame(cx,cy){ // cy = the row the miner stands on; core fills cy-1..cy
  setTile(cx,cy,PORTAL);setTile(cx,cy-1,PORTAL);
  if(tile(cx,cy-2)!==BEDROCK)setTile(cx,cy-2,OBSIDIAN);
  if(tile(cx,cy+1)!==BEDROCK)setTile(cx,cy+1,OBSIDIAN);
  for(const s of[-1,1]){
    // Corner stones for the arch, and carved approaches at walking height.
    if(tile(cx+s,cy-2)!==BEDROCK)setTile(cx+s,cy-2,OBSIDIAN);
    if(tile(cx+s,cy+1)!==BEDROCK)setTile(cx+s,cy+1,OBSIDIAN);
    if(tile(cx+s,cy)!==BEDROCK)setTile(cx+s,cy,AIR);

      say('ANVIL: '+NAMES[P.tool]+' REFORGED','#d8c9b5');burst(P.x,P.y,12,'#d8c9b5',1.4);}

    }
    if(solid(side)){startMine(P.cx+dir,P.cy);return true;}
    if(solid(step)){startMine(P.cx+dir,P.cy+1);return true;}
    // Step is open: its floor was revealed the moment the step was. Only
    // descend onto footing he has actually seen.
    const floor=tile(P.cx+dir,P.cy+2);
    if(floor===LAVA&&P.cobble>=2){buildBridge(P.cx+dir,P.cy+2);return true;}
    if(solid(floor)||floor===BRIDGE||floor===LADDER){startMove(P.cx+dir,P.cy+1);return true;}
    P.stairDir=-dir; // revealed drop or lava: turn the staircase around

function shaftDown(){
  P.route=[];P.target=null;
  if(stairStep()){P.aiMode='STAIR DIG';return;}
  P.aiMode='SHAFT DOWN';
  const bt=tile(P.cx,P.cy+1);
  if(bt===LAVA&&P.cobble>=2){buildBridge(P.cx,P.cy+1);return;}
  if(solid(bt)&&bt!==BEDROCK&&bt!==PORTAL){startMine(P.cx,P.cy+1);return;}
  if(!solid(bt)&&bt!==LAVA){startMove(P.cx,P.cy+1);return;}
  for(const d of DIRS){const t=tile(P.cx+d[0],P.cy+d[1]);
    if(solid(t)&&t!==BEDROCK&&t!==PORTAL){startMine(P.cx+d[0],P.cy+d[1]);return;}}
  // Nothing to mine at all (open cavern over lava): step anywhere safe and
  // let gravity produce the progress.
  for(const d of DIRS){const t=tile(P.cx+d[0],P.cy+d[1]);
    if(!solid(t)&&t!==LAVA&&d[1]>=0){startMove(P.cx+d[0],P.cy+d[1]);return;}}
  // Marooned on a bridge island in a lava lake with no cobble: swimming for
  // shore burns, but it beats standing still until the run dies of old age.
  for(const d of[[0,1],[P.face,0],[-P.face,0]]){
    if(tile(P.cx+d[0],P.cy+d[1])===LAVA){startMove(P.cx+d[0],P.cy+d[1]);P.aiMode='SWIM LAVA';return;}
  }
}
function manualAct(){
  let dx=(keys.left?-1:0)+(keys.right?1:0),dy=(keys.up?-1:0)+(keys.down?1:0);
  if(dx&&dy)dy=0;
  if(tap('a'))placeTorch();
  if(tap('c'))placeTrapToward({x:P.x+P.face*TS*3,y:P.y},true);
  if(dx||dy){const x=P.cx+dx,y=P.cy+dy,t=tile(x,y);
    if(solid(t)){if(keys.b)startMine(x,y);}
    else if(dy<0)climbUp(); // manual climbs auto-place ladders and ropes too

  }else if(keys.b&&P.attackT<=0){
    let foe=null,fd=18;for(const m of mobs){const d=Math.hypot(m.x-P.x,m.y-P.y);if(d<fd){fd=d;foe=m;}}

function playerStep(){

  }
  if(P.invT>0)P.invT--;if(P.attackT>0)P.attackT--;if(P.swing>0)P.swing--;

  const combatDig=P.aiMode==='BREACH'||P.aiMode.indexOf('HUNT')===0||P.aiMode==='SEAL TUNNEL';
  if(!playing()&&!manual()&&P.mine&&!combatDig){const th=nearestThreat(80);

  }

}

function carvePocket(x,y){for(let yy=y-1;yy<=y+1;yy++)for(let xx=x-1;xx<=x+1;xx++)if(xx>0&&xx<COLS-1)setTile(xx,yy,AIR);}

function spawnSurfaceMob(){

function spawnMob(kindOverride){

  const cap=goalState.stage<2?2:goalState.stage<3?4:Math.min(7,3+depthTier());
  if(P.cy<24||mobs.length>=cap)return;

    const j=RI(i,spots.length-1),tmp=spots[i];spots[i]=spots[j];spots[j]=tmp;
    const s=spots[i],r=findRoute(s.x,s.y,P.cx,P.cy,{airOnly:true,mob:true});if(r&&r.length){c={x:s.x,y:s.y,r};break;}

  }

    kind==='spider'?3+hpBonus:4+hpBonus;
  mobs.push({kind,x:centerX(c.x),y:centerY(c.y),hp,maxHp:hp,hit:0,charge:0,vx:0,vy:0,dead:0,
    route:c.r,pathPhase,repathAt:frame+30+pathPhase*4,shotCd:RI(45,100),trapCd:0,smash:null,lunge:0,stun:0,born:frame});

function killMob(m,how){

function explode(m){

function explodeTrap(t){

function triggerTraps(m){

function navigateMob(m){
  const mx=clamp(Math.floor(m.x/TS),1,COLS-2),my=Math.max(0,Math.floor(m.y/TS));
  if(frame>=m.repathAt||!m.route||!m.route.length||(m.route[0]&&solid(tile(m.route[0].x,m.route[0].y)))){
    const phase=m.pathPhase||0;
    if(mobRepathBudget>0){mobRepathBudget--;m.route=findRoute(mx,my,P.cx,P.cy,{airOnly:true,mob:true});
      m.repathAt=frame+48+phase*3;
    }else m.repathAt=frame+1+(phase&3);
  }
  // The golem does not respect walls: with no open path it smashes toward the player.
  if((!m.route||!m.route.length)&&m.kind==='golem'){golemSmash(m,mx,my);return;}
  if(!m.route||!m.route.length)return;while(m.route.length&&m.route[0].x===mx&&m.route[0].y===my)m.route.shift();
  if(!m.route.length)return;const n=m.route[0],tx=centerX(n.x),ty=centerY(n.y),dx=tx-m.x,dy=ty-m.y,d=Math.hypot(dx,dy)||1;

  if(Math.hypot(tx-m.x,ty-m.y)<0.55){m.x=tx;m.y=ty;m.route.shift();}
}
function golemSmash(m,mx,my){

function projectileStep(){

function mobStep(){
  const tier=depthTier();mobRepathBudget=2;
  if(frame>=nextMob){spawnMob();
    const slow=goalState.stage<2?2:goalState.stage<3?1.5:1;
    nextMob=frame+RI(Math.max(240,480-tier*60)*slow,Math.max(420,780-tier*80)*slow);}
  // Mob surges arrive once the miner is established (iron kit and real depth):
  // the eruption tests traps and outposts, not the fragile early climb.
  if(deepest>60&&goalState.stage>=3&&surge<=0&&P.hp>=3&&frame%2700===2699){surge=3;say('MOB SURGE!','#ff8f5a');shake(4);}
  if(surge>0&&frame%50===0){spawnMob();surge--;}
  // Once the beacon is lit the deep answers: a wall-breaking siege golem rises
  // at each depth milestone until the miner puts one down for good.
  if(frame%90===0&&goalState.stage>=6&&deepest>=nextGolemDepth&&
    !mobs.some(m=>m.kind==='golem'&&m.dead<=0)){
    const before=mobs.length;spawnMob('golem');
    if(mobs.length>before)nextGolemDepth=Math.max(nextGolemDepth,deepest)+80;
  }
  for(const m of mobs){
    if(m.dead>0){m.dead--;continue;}if(m.hit>0)m.hit--;
    if(m.stun>0){m.stun--;m.x+=m.vx;m.y+=m.vy;m.vx*=0.8;m.vy*=0.8;triggerTraps(m);continue;}
    const dx=P.x-m.x,dy=P.y-m.y,d=Math.hypot(dx,dy)||1;
    // An unbeaten golem eventually crumbles rather than pinning a run forever;
    // it grants no loot or goal credit, and the next one rises 80m deeper.
    if(m.kind==='golem'&&frame-m.born>3600){m.hp=0;m.dead=20;
      burst(m.x,m.y,20,'#9aa3ad',2);say('GOLEM CRUMBLES','#9aa3ad');continue;}
    if(tile(Math.floor(m.x/TS),Math.floor(m.y/TS))===LAVA&&frame%30===0){m.hp--;m.hit=6;if(m.hp<=0){killMob(m,'lava');continue;}}
    if(m.kind==='harpy'){
      // Harpies fly: no routes, no walls to respect above ground. They spiral
      // near the miner and dive in swoops; they lose interest in cave mouths.
      const aloft=P.cy<=SURFACE+1;
      if(m.lunge<=0&&aloft&&d<80&&d>16){m.lunge=90;m.vx=dx/d*2.2;m.vy=dy/d*2.2;}
      const hx=aloft?P.x+Math.sin(frame*0.03+m.pathPhase)*30:m.x,
        hy=aloft?P.y-26+Math.cos(frame*0.04+m.pathPhase)*8:Math.min(m.y,(SURFACE-4)*TS);
      const hd=Math.hypot(hx-m.x,hy-m.y)||1;
      m.x+=(hx-m.x)/hd*0.55+m.vx;m.y+=(hy-m.y)/hd*0.55+m.vy;m.vx*=0.9;m.vy*=0.9;
      // Never chase underground: the sky is their element.
      if(m.y>(SURFACE-0.2)*TS){m.y=(SURFACE-0.2)*TS;m.vy=-Math.abs(m.vy);}
      if(d<8&&frame%50===0)hurt(1,'HARPY');
      if(m.lunge>0)m.lunge--;

    }
    if(m.kind==='wolf'&&P.cy>SURFACE+2){m.charge=0;continue;} // wolves won't spelunk
    if(m.kind==='creeper'&&d<20&&gridLOS(m.x,m.y,P.x,P.y)){m.charge++;if(m.charge>58)explode(m);}
    else if(m.kind==='skeleton'&&d>18&&d<78&&gridLOS(m.x,m.y,P.x,P.y)){
      m.charge=0;if(--m.shotCd<=0){m.shotCd=RI(Math.max(55,90-tier*8),140);enemyShots.push({x:m.x,y:m.y-2,vx:dx/d*1.8,vy:dy/d*1.8,t:100});}}
    else if(m.kind==='spider'&&m.lunge<=0&&d>14&&d<44&&gridLOS(m.x,m.y,P.x,P.y)){
      // Spiders pounce: a sharp velocity spike that punishes standing in the open.
      m.lunge=110;m.vx=dx/d*2.6;m.vy=dy/d*2.6;m.hit=3;
    }
    else if(m.kind==='wolf'&&m.lunge<=0&&d>12&&d<40&&gridLOS(m.x,m.y,P.x,P.y)){

    }

    if(m.lunge>0)m.lunge--;

      m.shotCd=RI(110,170);enemyShots.push({x:m.x,y:m.y-3,vx:dx/d*1.4,vy:dy/d*1.4,t:120,rock:true});
    }
    if(d<7&&m.kind==='zombie'&&frame%70===0)hurt(1,'ZOMBIE');
    if(d<7&&m.kind==='spider'&&frame%55===0)hurt(1,'SPIDER');
    if(d<7&&m.kind==='wolf'&&frame%55===0)hurt(1,'WOLF');
    if(d<9&&m.kind==='golem'&&frame%60===0)hurt(2,'GOLEM');

// Gate travel is owned by the world step so manual players ride gates too:
// stand in a burning core and it takes hold, channels, and delivers you to
// the twin. A short cooldown stops an instant bounce straight back.
function gateStep(){
  if(P.portalCd>0)P.portalCd--;
  if(P.dead>0){P.portalT=0;P.portalTo=null;return;}
  if(P.portalT>0){
    if(frame%6===0)burst(P.x,P.y,3,'#b57aff',1.1);
    if(--P.portalT===0&&P.portalTo){
      const t=P.portalTo;P.portalTo=null;P.portalCd=300;
      P.cx=t.x;P.cy=t.y;P.toX=t.x;P.toY=t.y;P.x=centerX(t.x);P.y=centerY(t.y);
      P.moveT=0;P.fallD=0;P.mine=null;P.route=[];P.target=null;
      camY=P.y-178;discoveryDirty=true;
      burst(P.x,P.y,24,'#b57aff',2.4);shake(3);say('THROUGH THE GATE','#b57aff');
      P.progressFrame=frame;if(P.cy>SURFACE)lastDeepFrame=frame;
    }
    return;
  }
  if(P.moveT<=0){const g=gateHere();if(g)enterGate(g);}
}
function step(){
  frame++;day=(day+0.00045)%1;sessionStep({reset:resetGame});
  refreshDiscovery();gateStep();playerStep();campServices();mobStep();projectileStep();fluidStep();stepParts();updateGoals();
  if(tile(P.cx,P.cy)===LAVA){
    if(!playing()&&!manual()&&P.cobble>=2){buildBridge(P.cx,P.cy);P.aiMode='SEAL LAVA';}
    else{hurt(1,'LAVA FLOW');if(!playing()&&!manual()&&P.moveT<=0){const safe=DIRS.map(d=>({x:P.cx+d[0],y:P.cy+d[1]}))
      .find(c=>tile(c.x,c.y)!==LAVA&&!solid(tile(c.x,c.y)));
      if(safe){startMove(safe.x,safe.y);P.aiMode='ESCAPE LAVA';}
      else if(!P.mine){ // fully walled in: claw upward through rock rather than boil
        let acted=false;
        for(const c of[[P.cx,P.cy-1],[P.cx-1,P.cy],[P.cx+1,P.cy]]){
          const t=tile(c[0],c[1]);
          if(solid(t)&&t!==BEDROCK&&t!==PORTAL&&startMine(c[0],c[1])){P.aiMode='DIG OUT';acted=true;break;}
        }
        // Adrift in an open lava lake: swim for it (downward first — lakes
        // have stone floors to dig through) rather than tread fire forever.
        if(!acted&&P.moveT<=0)for(const c of[[0,1],[P.face,0],[-P.face,0],[0,-1]]){
          if(tile(P.cx+c[0],P.cy+c[1])===LAVA){startMove(P.cx+c[0],P.cy+c[1]);P.aiMode='SWIM LAVA';break;}
        }
      }}}
  }
  // Lava about to pour onto the miner's head reads as a threat, not scenery.
  if(!playing()&&!manual()&&P.dead<=0&&P.moveT<=0&&tile(P.cx,P.cy)!==LAVA&&tile(P.cx,P.cy-1)===LAVA){
    const safe=DIRS.map(d=>({x:P.cx+d[0],y:P.cy+d[1]}))
      .find(c=>c.y>=P.cy&&tile(c.x,c.y)!==LAVA&&!solid(tile(c.x,c.y))&&tile(c.x,c.y-1)!==LAVA);
    if(safe){P.mine=null;startMove(safe.x,safe.y);P.aiMode='DODGE LAVA';}
  }
  if(!playing()&&!manual()&&P.dead<=0&&frame-P.progressFrame>540){
    // Whatever wedged the planner, digging straight down always unwedges it.
    P.mine=null;P.moveT=0;P.target=null;P.route=[];
    shaftDown();
    P.progressFrame=frame;P.stuckRecoveries++;repaths++;say('SMART REPATH','#ffcf5a');
  }
  // The grove: saplings quietly become timber. Growth waits politely if the
  // miner is standing where the trunk would go.
  if(frame%60===0&&saplings.length){
    const grown=[];
    for(const s of saplings){
      if(frame-s.at<2400)continue;
      if(Math.abs(P.cx-s.x)<=1&&P.cy>=s.y-4&&P.cy<=s.y)continue;
      if(tile(s.x,s.y)!==SAPLING){grown.push(s);continue;} // trampled or mined
      for(let i=0;i<3;i++)setTile(s.x,s.y-i,WOOD);
      for(const dx of[-1,0,1])setTile(s.x+dx,s.y-3,LEAVES);
      setTile(s.x,s.y-4,LEAVES);
      grown.push(s);say('THE GROVE GROWS','#8fc94a');burst(centerX(s.x),centerY(s.y-2),10,'#8fc94a',1.4);
    }
    if(grown.length)saplings=saplings.filter(s=>!grown.includes(s));
  }
  for(const t of texts){t.t--;t.y-=0.18;}texts=texts.filter(t=>t.t>0);
  for(const d of drops){d.t--;d.y-=0.12;}drops=drops.filter(d=>d.t>0);
  camY+=((P.y-178)-camY)*0.07;
}

    rect(x+2,y+2,9,9,'#777b80');rect(x+2,y+2,4,4,'#94989b');rect(x+7,y+7,4,4,'#5e6267');rect(x+7,y+3,3,3,'#8b8f93');
  }else if(kind==='arrow'){
    rect(x+7,y+2,3,3,'#d7dce2');rect(x+6,y+4,2,2,'#b98a52');rect(x+4,y+6,2,2,'#b98a52');rect(x+2,y+8,2,2,'#e8e2d0');
  }else if(kind==='tnt'){
    rect(x+2,y+4,9,7,'#e35b46');rect(x+2,y+6,9,2,'#f3ede1');rect(x+5,y+6,1,2,'#1c1c1c');rect(x+7,y+6,1,2,'#1c1c1c');
    rect(x+6,y+2,1,2,'#8a5a30');rect(x+6,y+1,1,1,'#ffd166');
  }else if(kind==='ladder'){
    rect(x+3,y+1,2,10,'#a97e46');rect(x+8,y+1,2,10,'#a97e46');
    rect(x+3,y+3,7,1,'#c99a5b');rect(x+3,y+6,7,1,'#c99a5b');rect(x+3,y+9,7,1,'#c99a5b');
  }else if(kind==='food'){
    rect(x+3,y+2,6,5,'#c26d3f');rect(x+4,y+2,3,2,'#dd8a55');rect(x+7,y+6,2,3,'#f3ede1');rect(x+8,y+8,3,2,'#f3ede1');
  }else if(kind==='gold'){
    rect(x+3,y+6,8,4,'#f2c94c');rect(x+4,y+5,6,1,'#ffe08a');rect(x+4,y+7,2,1,'#fff3c4');rect(x+3,y+9,8,1,'#c9993a');
  }
}
function drawDayDial(x,y){
  const night=isNight();
  rect(x-1,y-1,10,10,night?'#101a2e':'#2b4a66');
  if(night){rect(x+2,y+1,5,6,'#e8ebcf');rect(x+1,y+2,2,4,'#101a2e');rect(x+7,y+1,1,1,'#fff');rect(x+1,y+6,1,1,'#fff');}
  else{rect(x+2,y+2,4,4,'#ffd166');rect(x+3,y,2,1,'#ffd166');rect(x+3,y+7,2,1,'#ffd166');rect(x,y+3,1,2,'#ffd166');rect(x+7,y+3,1,2,'#ffd166');}
}
function drawHUD(){
  ctx.globalAlpha=0.72;rect(0,0,W,31,'#0a0d12');ctx.globalAlpha=1;
  for(let i=0;i<5;i++){const full=i<P.hp;rect(4+i*10,5,7,6,full?'#e84d55':'#432b31');
    if(full){rect(3+i*10,5,2,4,'#e84d55');rect(10+i*10,5,2,4,'#e84d55');}}
  ctx.font='bold 7px monospace';ctx.fillStyle='#dfe8ef';const ds=deepest+'M';ctx.fillText(ds,W-4-ds.length*4.3,10);
  drawDayDial(W-34,2);
  // Tool line with a live durability bar: green fades to red as the pick wears.
  ctx.fillStyle=TOOLCOL[P.tool];ctx.fillText(NAMES[P.tool],4,19);
  if(P.durMax>0){const dr=clamp(P.dur/P.durMax,0,1);
    rect(4,21,52,2,'#26303a');rect(4,21,52*dr,2,dr>0.5?'#7ed957':dr>0.2?'#ffd166':'#e84d55');}
  // Ore pouch: each ore gets its own block chip in its true colors.
  {let ox=W-4;ctx.font='bold 6px monospace';
    for(const[t,n]of[[OBSIDIAN,P.obsidian],[DIAMOND,P.diamond],[GOLD,P.gold],[IRON,P.iron],[COAL,P.coal]]){
      const s=''+n,tw=s.length*3.6;ox-=tw;ctx.fillStyle=n>0?'#e6edf3':'#5a6672';ctx.fillText(s,ox,20);
      ox-=7;const c=BC[t];rect(ox,14,6,6,c[0]);rect(ox+1,15,3,3,c[1]);rect(ox+4,17,2,2,c[2]);ox-=4;
    }}
  ctx.font='bold 6px monospace';ctx.fillStyle='#7ef0ff';ctx.fillText(P.aiMode,4,29);
  const bs='BLD '+buildScore;ctx.fillStyle='#ffd166';ctx.fillText(bs,W-4-bs.length*3.7,29);
  // Hotbar: distinct pixel icons, dimmed when the pouch is empty.
  const items=['pick','torch','cobble','arrow','tnt','ladder','food','gold'];
  const nums=[null,P.torch,P.cobble,P.ammo,P.powder,P.ladder+P.rope,P.food,P.gold],x0=4;
  ctx.globalAlpha=0.74;rect(x0-2,332,156,24,'#11151c');ctx.globalAlpha=1;
  items.forEach((kind,i)=>{const x=x0+i*19,empty=nums[i]!==null&&nums[i]<=0;
    ctx.strokeStyle=i===0?'#f5f7fa':'#636a74';ctx.strokeRect(x+.5,334.5,17,18);
    ctx.globalAlpha=empty?0.28:1;drawIcon(kind,x+2,336);ctx.globalAlpha=1;
    if(i===0&&P.durMax>0){const dr=clamp(P.dur/P.durMax,0,1);
      rect(x+2,350,13,1,'#26303a');rect(x+2,350,13*dr,1,dr>0.5?'#7ed957':dr>0.2?'#ffd166':'#e84d55');}
    ctx.fillStyle=empty?'#5a6672':'#fff';ctx.font='bold 6px monospace';
    const s=nums[i]===null?'':''+nums[i];if(s)ctx.fillText(s,x+16-s.length*3.5,351);});
  for(const d of drops){ctx.globalAlpha=d.t/20;rect(d.x-2,d.y-camY-2,4,4,d.c);}ctx.globalAlpha=1;
  for(const t of texts){ctx.globalAlpha=Math.min(1,t.t/20);ctx.font='bold 7px monospace';ctx.fillStyle=t.c;
    const w=t.s.length*4.2;ctx.fillText(t.s,clamp(t.x-w/2,3,W-w-3),t.y-camY);}ctx.globalAlpha=1;
  drawGoals();
  drawSession(false);
}
// The surface camp: tent, anvil, and a campfire that burns brighter at night.
function drawCamp(){
  const gy=SURFACE*TS-camY;if(gy<-24||gy>H+24)return;
  const tx=(CAMP_X-3)*TS;
  rect(tx,gy-10,14,10,'#8a3f30');rect(tx+2,gy-13,10,4,'#b8563f');rect(tx+5,gy-15,4,3,'#b8563f');
  rect(tx+5,gy-6,4,6,'#3a2620');
  const ax=(CAMP_X+1)*TS+1;
  rect(ax+1,gy-2,6,2,'#3d434a');rect(ax+2,gy-4,4,2,'#52585f');rect(ax,gy-6,8,2,'#6a727b');
  const fx=(CAMP_X+2)*TS+9,fl=isNight()?3:2;
  rect(fx,gy-2,8,2,'#6b4a2a');
  const h=fl+((frame>>3)%2);
  rect(fx+2,gy-2-h*2,4,h*2,'#ff9f43');rect(fx+3,gy-2-h*3,2,h,'#ffd166');
  if(isNight()){ctx.globalAlpha=0.12;rect(fx-8,gy-16,24,16,'#ffb35c');ctx.globalAlpha=1;}
}
function render(){
  preDraw();drawWorld();drawCamp();
  for(const m of mobs)if(!fogged(Math.floor(m.x/TS),Math.floor(m.y/TS)))drawMob(m);
  drawProjectiles();drawPlayer();drawCracks();drawParts(camY);postDraw();drawHUD();
}

initSession('blockmine',[['ARROWS','MOVE / CLIMB'],['X + ARROW','MINE / FIGHT'],['SPACE','PLACE TORCH'],['Z / SHIFT','BUILD TRAP'],['ESC','AUTOPILOT']]);
resetGame();start(()=>step(),()=>render());
</script>
