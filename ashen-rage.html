<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ASHEN RAGE</title>
<style>
  html,body{margin:0;height:100%;background:#07080d}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;
    image-rendering:pixelated;background:#0a0c12}
  canvas:focus-visible{outline:2px solid #ffb02e;outline-offset:-3px}
</style>
<canvas id="cv" width="320" height="720" tabindex="0"
  aria-label="Ashen Rage. A tiny outlaw moto league brawls across five districts: swing on rivals, dodge their bats, thread traffic, and take the county crown."></canvas>
<script src="engine.js"></script>
<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,random,RI,hash,clamp,rect,spawn,stepParts,drawParts,ring,stepRings,drawRings,
  shake,preDraw,postDraw,start,keys,manual,initSession,sessionStep,drawSession,playing,
  addScore,gameOver,createShow,fxBurst,fxDust}=E;
const{controllerMux,skillProfile,createRng}=AI;

// ASHEN RAGE — a Road Rage (2017) spinoff for the 4:9 strip. The outlaw moto
// league of the city of Ashen runs one long highway to the county line: the
// gold rider closes on a rival, the rival's bat rises in a readable windup,
// and the next second is a dodge, a counter-swing, a wobble, or a knockout
// tumble into the weeds. Nothing pre-draws intent (motion contract): no route
// lines, no target highlights, no predicted arcs — tells live on the riders
// themselves (raised weapon, body lean, exhaust note, helmet glance). World
// motion is continuous: nothing teleports anyone out of trouble, and the
// copied-state route planner rolls the exact same bike integrator as runtime
// play without touching the engine RNG.
const TAU=Math.PI*2,BLOCK=210,DISTRICT_BLOCKS=12,RACE_FRAMES=54000,RIDER_Y=292;
const ROAD_L=30,ROAD_R=130,LANES=[46,80,114],PACK_SIZE=7;
const INK='#07080d',CREAM='#fff3da',GOLD='#ffb02e',AMBER='#ff8a3d',CORAL='#ff5d4f',
  MINT='#67e8a2',CYAN='#59d8f5',STEEL='#9aa7b8',BLOOD='#c92c3c',ASPHALT='#171a22';
const DISTRICTS=[
  {name:'DOWNTOWN CORE',sky:'#0c0e1c',road:'#3a4260',walk:'#2c2648',curb:'#8a7abc',
    roof:'#1e1a3a',roof2:'#2c2450',accent:'#ff4fa7',light:'#59d8f5',kind:'downtown'},
  {name:'SUBURB ROW',sky:'#18222e',road:'#262b34',walk:'#4c5a48',curb:'#9aa886',
    roof:'#54443a',roof2:'#745e4a',accent:'#ffd166',light:'#ffe9a8',kind:'suburb'},
  {name:'FARMLAND',sky:'#222414',road:'#322e22',walk:'#5c5c38',curb:'#a89452',
    roof:'#5c3a2c',roof2:'#845244',accent:'#e8c85a',light:'#f5e6a0',kind:'farm'},
  {name:'IRONWORKS',sky:'#1e1e26',road:'#282c34',walk:'#54544c',curb:'#a8845e',
    roof:'#443f38',roof2:'#74594a',accent:'#ff8a3d',light:'#f5c36a',kind:'iron'},
  {name:'HARBOR LIGHTS',sky:'#10222e',road:'#202c38',walk:'#3a5c68',curb:'#62a8b8',
    roof:'#284a58',roof2:'#3c7482',accent:'#59d8f5',light:'#b8f0ff',kind:'harbor'}
];
// Player weapon ladder: bat -> chain -> pipe. Range is the lateral arc reach;
// dmg is grit removed per connected swing.
const WEAPONS=[
  {name:'BAT',range:15,dmg:1,knock:.9},
  {name:'CHAIN',range:18,dmg:1,knock:1.35},
  {name:'PIPE',range:21,dmg:2,knock:1.5}
];
// Rival riding personas: readable silhouettes AND distinct fight grammar.
const RIVAL_KINDS={
  bruiser:{label:'TANK',color:'#e0483c',trim:'#ffd0b9',grit:3,dmg:14,windup:19,swings:2,
    cruise:1.86,range:14,dodge:0,engage:.55},
  weasel:{label:'SLIP',color:'#67e8a2',trim:'#eafff2',grit:2,dmg:7,windup:9,swings:3,
    cruise:2.06,range:13,dodge:.30,engage:.42},
  veteran:{label:'ACE',color:'#6f8dff',trim:'#dbe6ff',grit:2,dmg:10,windup:13,swings:2,
    cruise:1.98,range:15,dodge:.55,engage:.5},
  maniac:{label:'PSYCHO',color:'#ff4fa7',trim:'#ffd6ec',grit:2,dmg:9,windup:11,swings:4,
    cruise:2.0,range:14,dodge:.18,engage:.8}
};
const PERSONAS=[
  {name:'BRAWLER',engage:78,counter:20,boost:34,risk:.8,color:GOLD},
  {name:'TACTICIAN',engage:46,counter:82,boost:26,risk:.45,color:CYAN},
  {name:'OUTLAW',engage:38,counter:40,boost:78,risk:.62,color:MINT}
];

let showFrame=0,runFrame=0,state='run',resultT=0,outcome='',worldSeed=1,skillSeed=1;
let player=null,rivals=[],traffic=[],texts=[],plan=null,planAt=-1e9,skill=null,visualIntent=null;
let engageTarget=null,engageSide=1,engageSince=0;
let persona=PERSONAS[0],personaIndex=0,rivalSerial=0,trafficSerial=0;
let lastBlock=0,lastDistrict=0,generatedTo=-1,koStreak=0,lastKoFrame=-1e9,lastTrafficHit=-1e9;
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
let eventSerial=0,progressSerial=0,lastEventFrame=0,lastProgressFrame=0,lastLapsed=false;
// ---- good/bad feedback presentation (all sim-inert) --------------------------
// swings/hits/KO debris are engine particles on the sim-inert fx stream; the
// edge pulse tags each beat gold (good) or coral (bad) at a glance; feedback
// is the append-only ledger evals/feedback.js crops against a same-seed
// __NO_PAYOFF_FX twin. Nothing here is read by physics or either RNG stream.
let goodPulse=0,badPulse=0,feedback=[],feedbackSerial=0,scars=[],usedPickups=new Set(),marks=[];
function cue(kind,id,x,y,pulse){
  const wy=y===undefined?player.y:y;
  feedback.push({serial:feedbackSerial++,frame:runFrame,show:showFrame,kind,id,
    sx:Math.round(clamp(x===undefined?player.x:x,0,W)),sy:Math.round(clamp(RIDER_Y-(wy-player.y),34,H-6))});
  if(feedback.length>420)feedback.splice(0,feedback.length-420);
  if(kind==='good')goodPulse=Math.max(goodPulse,pulse===undefined?.45:pulse);
  else badPulse=Math.max(badPulse,pulse===undefined?.55:pulse);
}
const stats={markers:0,districts:1,kos:0,hits:0,hitsTaken:0,overtakes:0,drops:0,boosts:0,
  nitros:0,wrenches:0,weapons:0,nearMisses:0,trafficHits:0,oils:0,barrierThreads:0,barrierHits:0,
  wrecks:0,lapses:0,acts:0,grudgeKos:0,actClears:0,podiums:0,dodges:0,whiffs:0,counters:0,
  contacts:0,packTrafficHits:0,
  events:0,progress:0,maxEventLull:0,maxProgressLull:0,maxStep:0,appliedIntents:0,admireIntents:0};
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},2:{frames:44,minGap:100},
  3:{frames:84,minGap:600,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});
const act={phase:'calm',type:'grudge',warnAt:3300,landAt:3540,endAt:4440,index:0,
  marked:-1,hitsAtLand:0,notes:[]};

const mod=(n,d)=>((n%d)+d)%d;
const round=(v,n)=>{const p=Math.pow(10,n||4);return Math.round(v*p)/p;};
const mix=(a,b,t)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16),
  m=s=>Math.round((pa>>s&255)+((pb>>s&255)-(pa>>s&255))*t);
  return'#'+((1<<24)+(m(16)<<16)+(m(8)<<8)+m(0)).toString(16).slice(1);};
const poly=(points,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.closePath();ctx.fill();};
const line=(points,c,w)=>{ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.stroke();ctx.lineWidth=1;};
const sy=wy=>RIDER_Y-(wy-player.y);
// Engine particles use a conventional world-y-minus-camera transform, while
// this northbound highway renders increasing world y upward. Store payoff
// particles in inverted world space so they land on the riders.
const fxAt=(x,y,n,c,sp,grav)=>fxBurst(x,-y,n,c,sp,grav);
const dustAt=(x,y,n,c)=>fxDust(x,-y,n,c);
const ringAt=(x,y,c,dr,t)=>ring(x,-y,c,dr,t);
const fxCam=()=>-player.y-RIDER_Y;
const districtForBlock=b=>mod(Math.floor(b/DISTRICT_BLOCKS),DISTRICTS.length);
const currentBlock=()=>Math.floor(player.y/BLOCK);
const currentDistrict=()=>districtForBlock(currentBlock());
const offroadX=x=>x<ROAD_L-2||x>ROAD_R+2;
const say=(s,c,wy,t,x)=>texts.push({s,c:c||CREAM,y:wy===undefined?player.y+40:wy,x:x===undefined?player.x:x,t:t||70});
function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);
  lastEventFrame=showFrame;if(score&&playing())addScore(score);}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);
  lastProgressFrame=showFrame;if(score&&playing())addScore(score);}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+30});}
function allFinite(){return[player.x,player.y,player.vx,player.speed,player.damage,player.boost,runFrame]
  .every(Number.isFinite)&&rivals.every(finiteBody)&&traffic.every(finiteBody);}
function finiteBody(v){return[v.x,v.y,v.vx,v.speed].every(Number.isFinite);}

// ---- world generation ---------------------------------------------------------
function blockInfo(b){
  const district=districtForBlock(b),h=hash(b*31+worldSeed*7,district*19+5);
  const barrier=mod(b+worldSeed,5)===3?{kind:'barrier',y:b*BLOCK+166,
    gapX:LANES[mod(b*3+worldSeed,3)],id:'barrier-'+b}:null;
  const oil=mod(b*3+worldSeed*5,7)===2?{kind:'oil',x:LANES[mod(b+worldSeed,3)]+(h-.5)*16,y:b*BLOCK+92,id:'oil-'+b}:null;
  let pickup=null;
  const pk=mod(b*7+worldSeed,6);
  if(pk===1)pickup={kind:'nitro',x:LANES[mod(b,3)],y:b*BLOCK+128,id:'pk-'+b};
  else if(pk===4)pickup={kind:'wrench',x:LANES[mod(b+2,3)],y:b*BLOCK+128,id:'pk-'+b};
  else if(pk===5&&mod(b,4)===1)pickup={kind:'weapon',x:LANES[mod(b+1,3)],y:b*BLOCK+128,id:'pk-'+b};
  return{b,district,barrier,oil,pickup};
}
function makePlayer(x,y){return{x,y,vx:0,speed:1.4,yaw:0,angle:0,va:0,damage:0,boost:20,boostT:0,isPlayer:true,
  weapon:0,swingPhase:'ready',swingT:0,swingSide:1,swingHit:false,cooldown:0,
  wobbleT:0,wreckT:0,settleT:0,hitFlashT:0,gloryT:0,invulnT:0,contactT:0,
  intent:null,lastX:x,lastY:y,rank:PACK_SIZE};}
function makeRival(kind,x,y){const spec=RIVAL_KINDS[kind];return{id:rivalSerial++,kind,x,y,vx:0,
  speed:spec.cruise,angle:0,yaw:0,va:0,grit:spec.grit,gritMax:spec.grit,state:'pace',stateT:0,side:1,
  dodgeT:0,carCd:0,windupPose:0,swingsLeft:0,engageT:0,respawnT:0,downY:0,spin:0,
  ahead:y>player.y,glanceT:0,hitFlashT:0,face:0};}
// Traffic anticipation for the pack: rivals read the commute up to 70px out
// and bend their line around it, the same honest lookahead the player gets.
function rivalTrafficBias(r){
  let bias=0;
  for(const t of traffic){
    const dy=t.y-r.y;
    if(dy>4&&dy<70&&Math.abs(t.x-r.x)<11){bias=(r.x<t.x?-1:1)*(1-dy/70)*10;if(Math.abs(t.x-r.x)<6)bias*=1.4;}
  }
  return bias;
}
function spawnRivals(){
  rivals=[];const kinds=Object.keys(RIVAL_KINDS),offset=Math.floor(hash(worldSeed,1)*4);
  for(let i=0;i<PACK_SIZE;i++){
    // Stride coverage guarantees every persona rides in every pack.
    const kind=kinds[mod(i+offset,kinds.length)];
    const ahead=i<5,r=makeRival(kind,LANES[mod(i*2+worldSeed,3)]+(hash(i*7,worldSeed)-.5)*14,
      player.y+(ahead?120+i*150:-140-(i-5)*170));
    rivals.push(r);
  }
}
function makeTraffic(b,j){
  const lane=LANES[mod(Math.floor(hash(b,j+worldSeed)*9),3)];
  return{id:trafficSerial++,x:lane+(hash(b*17+j,worldSeed*23)-.5)*10,
    y:b*BLOCK+40+j*94+(hash(b+j,worldSeed)-.5)*20,vx:0,
    speed:.52+hash(b*7+j,worldSeed*13)*.5,kind:['sedan','pickup','box'][mod(b+j,3)],
    color:['#c96a5a','#6aa8b8','#c9a24e','#7a8cc9','#8a9a6a'][mod(b*3+j+worldSeed,5)],hit:false,hitCd:0,wob:0};
}
function ensureTraffic(){
  const target=currentBlock()+4;
  while(generatedTo<target){generatedTo++;const n=2+(hash(generatedTo,worldSeed)>.66?1:0);
    for(let j=0;j<n;j++)traffic.push(makeTraffic(generatedTo,j));}
  traffic=traffic.filter(t=>t.y>player.y-380&&t.y<player.y+1100);
}

// ---- one shared physics path for human, bot, rivals, and planner rollouts ------
function advanceBike(body,intent,env){
  intent=intent||{steer:0,throttle:0,brake:false,boost:false,swing:0,targetX:80,tactic:'COAST'};
  env=env||{offroad:offroadX(body.x),wet:false};
  const mushy=body.wobbleT>0?.35:1,steer=clamp(intent.steer||0,-1,1)*mushy;
  const turn=.118*(env.offroad?.8:1);
  body.vx+=steer*turn;body.vx*=env.wet?.93:.8;body.x+=body.vx;
  const specMax=body.isPlayer?2.24+(player.weapon===2?.02:0):RIVAL_KINDS[body.kind].cruise+.18;
  const top=specMax*(env.offroad?.74:1)*(body.wobbleT>0?.72:1)+(body.boostT>0?.5:0);
  const target=(intent.throttle===undefined?1:intent.throttle)*top;
  if(intent.brake)body.speed=Math.max(.4,body.speed-.052);
  else if(body.speed<target)body.speed=Math.min(target,body.speed+.026);
  else body.speed=Math.max(target,body.speed-.02);
  body.y+=body.speed;
  const lo=15,hi=145;if(body.x<lo){body.x=lo;body.vx=Math.abs(body.vx)*.3;}
  if(body.x>hi){body.x=hi;body.vx=-Math.abs(body.vx)*.3;}
  // Honest heading (pocket-league doctrine): the bike and rider lean INTO the
  // actual lateral travel — atan2(vx, speed) with yaw inertia — never a
  // cosmetic intent lean. angle/yaw/va are pose state only: physics never
  // reads them and they never enter the replay signature... except vx/speed,
  // which are physical. Swing roll is layered at render time, not here.
  const va=Math.atan2(body.vx,Math.max(.5,body.speed));
  body.yaw=(body.yaw||0)+(clamp(va,-.5,.5)-(body.yaw||0))*.24;
  body.angle=body.yaw;body.va=va;
  return body;
}

// ---- combat ---------------------------------------------------------------------
function weaponRange(){return WEAPONS[player.weapon].range;}
function startSwing(side){
  if(player.swingPhase!=='ready'||player.cooldown>0||player.wreckT>0)return false;
  player.swingPhase='windup';player.swingT=player.weapon===1?10:12;player.swingSide=side;player.swingHit=false;player.swingFresh=true;
  return true;
}
function rivalStartSwing(r){
  const spec=RIVAL_KINDS[r.kind];r.state='windup';r.stateT=spec.windup;r.windupPose=0;
  r.side=player.x>=r.x?1:-1; // commit to the flank the player is on NOW
}
function stepPlayerSwing(){
  if(player.cooldown>0)player.cooldown--;
  if(player.swingPhase==='ready')return;
  player.swingT--;
  if(player.swingPhase==='windup'&&player.swingT<=0){player.swingPhase='swing';player.swingT=8;}
  else if(player.swingPhase==='swing'){
    const range=weaponRange(),dx=player.swingSide*range;
    for(const r of rivals){
      if(r.state==='down'||r.respawnT>0||r.dodgeT>0||player.swingHit)continue;
      const rx=r.x-player.x,ry=r.y-player.y;
      if(Math.sign(rx)===player.swingSide&&Math.abs(rx)>2&&Math.abs(rx)<range+6&&Math.abs(ry)<11){
        player.swingHit=true;hitRival(r,dx,ry);
      }
    }
    // A whiffed swing is a readable, costly beat: the rider is extended and
    // slow to reset, and smart rivals punish the recovery window.
    if(player.swingT<=0&&!player.swingHit){stats.whiffs++;markEvent(2);player.swingPhase='recover';player.swingT=17;
      for(const r of rivals)if(r.state==='recover'&&Math.abs(r.x-player.x)<26&&Math.abs(r.y-player.y)<14)r.stateT=Math.min(r.stateT,6);}
    else if(player.swingT<=0){player.swingPhase='recover';player.swingT=13;}
  }
  else if(player.swingPhase==='recover'&&player.swingT<=0){player.swingPhase='ready';player.cooldown=6;}
}
function hitRival(r,dx,ry){
  const w=WEAPONS[player.weapon],punish=r.state==='recover';
  const dmg=w.dmg+(punish?1:0);
  r.grit-=dmg;r.hitFlashT=10;r.vx+=Math.sign(dx)*w.knock*(punish?1.35:1);
  stats.hits++;stats.counters+=punish?1:0;markEvent(punish?14:10);
  player.boost=clamp(player.boost+6,0,100);
  cue('good','hit',r.x,r.y,.35);fxAt(r.x,r.y,10,GOLD,1.8);fxAt(r.x,r.y,5,'#ffffff',1.3);
  ringAt(r.x,r.y,GOLD,1.8,20);shake(2);
  say(punish?'COUNTER!':'CONNECTED!',punish?CYAN:GOLD,r.y+16,42,r.x);
  if(r.grit<=0)knockout(r);
  else{r.state='wobble';r.stateT=38+RI(0,14);r.spin=Math.sign(dx);}
  if(punish)offer('counter',1,r.x,r.y,r.id);
}
function knockout(r){
  r.state='down';r.stateT=78;r.spin=Math.sign(r.x-player.x)||1;r.downY=0;
  stats.kos++;markEvent(30);markProgress(6);
  player.boost=clamp(player.boost+30,0,100);
  koStreak=showFrame-lastKoFrame<600?koStreak+1:1;lastKoFrame=showFrame;
  const grudge=act.phase==='live'&&act.type==='grudge'&&r.id===act.marked;
  if(grudge)stats.grudgeKos++;
  const rampage=koStreak>=3,nitro=player.boostT>0,apex=grudge||rampage||nitro;
  offer(grudge?'grudge-ko':rampage?'rampage':nitro?'nitro-ko':'ko',apex?3:2,r.x,r.y,r.id);
  cue('good','ko',r.x,r.y,apex?1:.7);
  fxAt(r.x,r.y,26,RIVAL_KINDS[r.kind].color,2.6,.01);fxAt(r.x,r.y,12,GOLD,2,.008);
  fxAt(r.x,r.y-4,8,'#ffffff',1.6);ringAt(r.x,r.y,CORAL,2.4,30);shake(apex?6:4);
  say(grudge?'GRUDGE SETTLED!':rampage?'RAMPAGE x'+koStreak:nitro?'NITRO KO!':RIVAL_KINDS[r.kind].label+' IS DOWN!',
    apex?GOLD:CORAL,r.y+20,grudge?110:70,r.x);
  if(grudge)endAct(true);
}
function hitPlayer(r){
  const spec=RIVAL_KINDS[r.kind];
  if(player.invulnT>0||player.wreckT>0)return;
  player.damage+=spec.dmg;player.wobbleT=26;player.hitFlashT=12;player.invulnT=18;
  player.vx+=(player.x-r.x)*.05;player.speed*=.9;
  stats.hitsTaken++;markEvent(8);
  cue('bad','hit-taken',player.x,player.y,.6);
  fxAt(player.x,player.y,12,spec.color,1.9);fxAt(player.x,player.y,6,CORAL,1.6);shake(3);
  say(spec.label+' TAGGED YOU',CORAL,player.y+22,48);
  if(player.damage>=100)wreck('BEATEN DOWN');
}
function wreck(reason){
  if(player.wreckT>0)return;
  player.wreckT=92;player.damage=Math.max(player.damage,100);player.speed*=.3;
  player.swingPhase='ready';player.cooldown=0;
  stats.wrecks++;markEvent(50);koStreak=0;
  cue('bad','wreck',player.x,player.y,1);
  offer('wrecked',2,player.x,player.y,reason);
  fxAt(player.x,player.y,30,CORAL,3,.012);fxAt(player.x,player.y,14,'#ffffff',2.2);
  ringAt(player.x,player.y,CORAL,2.6,38);shake(8);
  say('WRECKED · '+reason,CORAL,player.y+30,110);
}
function endAct(settled){
  if(act.phase==='calm')return;
  const untouched=!settled&&act.type==='pack'&&stats.hitsTaken===act.hitsAtLand;
  act.phase='calm';act.index++;act.warnAt=runFrame+5400;act.marked=-1;plan=null;planAt=-1e9;
  if(!settled){stats.actClears++;markProgress(30);
    offer(untouched?'untouchable':'act-clear',untouched?3:2,player.x,player.y,act.type);
    say(untouched?'UNTOUCHABLE':'THE PACK EASES OFF',untouched?GOLD:MINT,player.y+52,untouched?80:64);}
}

// ---- route planner: copied-state rollouts on the shared integrator ---------------
function nearestThreat(x,y,horizon){
  let best=999;
  for(const t of traffic){const ty=t.y+t.speed*horizon;
    if(ty>=y-16&&ty<=y+250)best=Math.min(best,Math.hypot(t.x-x,(ty-y)*.45));}
  for(const r of rivals){
    if(r.state==='down'||r.respawnT>0)continue;
    const ry=r.y+(r.speed-1.4)*horizon;
    best=Math.min(best,Math.hypot(r.x-x,(ry-y)*.5)-(r.state==='windup'||r.state==='swing'?0:4));
  }
  for(let bb=currentBlock();bb<=currentBlock()+1;bb++){const q=blockInfo(bb);
    if(q.barrier&&!scars.some(s=>s.id===q.barrier.id)&&Math.abs(x-q.barrier.gapX)>14){
      const dy=q.barrier.y-y;if(dy>-10&&dy<230)best=Math.min(best,dy*.5);}
    if(q.oil){const d=Math.hypot(q.oil.x-x,(q.oil.y-y)*.5);if(q.oil.y>y-8&&q.oil.y<y+200)best=Math.min(best,d+2);}
  }

}
function upcomingPickups(){const b=currentBlock(),out=[];
  for(let i=b;i<=b+2;i++){const q=blockInfo(i);if(q.pickup&&!usedPickups.has(q.pickup.id))out.push(Object.assign({block:i},q.pickup));}
  return out;}
function simulateRoute(targetX,engage){
  const b=Object.assign({},player,{wobbleT:0});let min=999,hitRisk=0;
  for(let f=0;f<110;f++){
    advanceBike(b,{steer:clamp((targetX-b.x)*.11,-1,1),throttle:1,brake:false,boost:false,swing:0,targetX,tactic:'PLAN'},
      {offroad:offroadX(b.x),wet:false});
    const d=nearestThreat(b.x,b.y,f);min=Math.min(min,d);if(d<9)hitRisk+=9-d;
  }
  let score=(b.y-player.y)*.6-hitRisk*(2.8-persona.risk*.5)+Math.min(30,min)*1.3;
  for(const p of upcomingPickups()){
    if(Math.abs(p.x-targetX)>12||p.y<player.y-8||p.y>b.y+40)continue;
    if(p.kind==='nitro')score+=player.boost<55?persona.boost*.6+16:4;
    else if(p.kind==='wrench')score+=player.damage>45?52+player.damage*.4:player.damage>20?12:-8;
    else if(p.kind==='weapon')score+=player.weapon<2?44:2;
  }
  if(engage&&engage.state!=='down'&&engage.respawnT<=0){
    const ex=engage.x+(engage.x<targetX?-13:13);
    score+=persona.engage*.4-Math.abs(targetX-ex)*1.1;
    if(engage.state==='recover'||engage.state==='wobble')score+=persona.counter*.5;
  }
  if(offroadX(targetX))score-=14;
  if(act.phase==='warn'&&act.type==='pack')score+=Math.max(0,60-Math.abs(targetX-80)*1.2);
  return{targetX,score,min,projectedY:b.y,route:offroadX(targetX)?'shoulder':'road'};
}
function pickTarget(){
  let best=null,bestScore=-1e9;
  for(const r of rivals){
    if(r.state==='down'||r.respawnT>0||r.state==='wobble')continue;
    const dy=r.y-player.y;if(dy<-60||dy>240)continue;
    let s=80-Math.abs(dy)*.5-Math.abs(r.x-player.x)*.3;
    if(act.phase!=='calm'&&act.type==='grudge'&&r.id===act.marked)s+=160;
    s+=(r.gritMax-r.grit)*26;
    if(r.state==='recover')s+=persona.counter*.6;
    if(s>bestScore){bestScore=s;best=r;}
  }
  return best;
}
function buildRoutePlan(engage){
  if(typeof globalThis.__NO_ROUTE_PLAN!=='undefined')return reactiveRoute(engage);
  const candidates=[];
  if(engage){
    for(const side of[-1,1])candidates.push(simulateRoute(clamp(engage.x+side*13,15,145),engage));
  }
  for(const x of[18,...LANES,142])candidates.push(simulateRoute(x,engage));
  candidates.sort((a,b)=>b.score-a.score||a.targetX-b.targetX);return candidates[0];
}
function reactiveRoute(engage){
  // Honest baseline: every lane and visible pickup is available, but it only
  // reacts to what is already on screen — no copied-state forecast, no
  // multi-block barrier knowledge, no act warning, no punish valuation.
  const visible=upcomingPickups().filter(p=>p.y>=player.y-8&&p.y<=player.y+96);
  const candidates=[18,...LANES,142].map(x=>{
    let score=nearestThreat(x,player.y,16)-(offroadX(x)?9:0);
    for(const p of visible)if(Math.abs(p.x-x)<12){
      if(p.kind==='nitro')score+=player.boost<55?20:3;
      if(p.kind==='wrench'&&player.damage>45)score+=42;
      if(p.kind==='weapon'&&player.weapon<2)score+=30;
    }
    if(engage)score-=Math.abs(x-engage.x)*1.4;
    return{targetX:x,clear:score};
  });
  candidates.sort((a,b)=>b.clear-a.clear||a.targetX-b.targetX);
  return{targetX:candidates[0].targetX,score:candidates[0].clear,min:candidates[0].clear,
    projectedY:player.y+90,route:offroadX(candidates[0].targetX)?'shoulder':'road',reactive:true};
}
function routeTactic(target,engage){
  if(player.damage>=72)return'FIND A WRENCH';
  if(act.phase==='warn')return act.type==='grudge'?'GRUDGE INCOMING':'THE PACK TURNS';
  if(engage&&target&&Math.abs(target.targetX-(engage.x+(engage.x<target.targetX?-13:13)))<20)
    return engage.state==='recover'?'PUNISH THE WHIFF':'LINE UP '+RIVAL_KINDS[engage.kind].label;
  const p=upcomingPickups().filter(q=>Math.abs(q.x-target.targetX)<13&&q.y>player.y-8&&q.y<player.y+240)
    .sort((a,b)=>a.y-b.y)[0];
  if(p)return p.kind==='nitro'?'GRAB THE NITRO':p.kind==='wrench'?'GRAB THE WRENCH':'GRAB THE PIPE';
  if(player.boostT>0)return'NITRO BURN';
  return player.rank>1?'RUN DOWN P'+(player.rank-1):'HOLD THE LEAD';
}
function rawBotIntent(){
  if(visualIntent)return Object.assign({},visualIntent);
  if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined'){stats.admireIntents++;
    return{steer:0,throttle:.5,brake:false,boost:false,swing:0,targetX:player.x,tactic:'SAVOR THE CROWN'};}
  // Dodge first: a committed rival swing aimed at our flank beats every plan.
  // r.side is the flank of the RIVAL the player was on when the windup began,
  // so the bat is coming from that side; the dodge breaks for open road.
  for(const r of rivals){
    if((r.state==='windup'&&r.stateT<7||r.state==='swing')&&Math.abs(r.y-player.y)<14&&
      Math.abs(r.x-player.x)<RIVAL_KINDS[r.kind].range+8&&Math.sign(player.x-r.x||r.side)===r.side){
      const away=clamp(player.x+(player.x<r.x?-17:17),15,145);
      stats.dodges++;markEvent(4);
      return{steer:clamp((away-player.x)*.3,-1,1),throttle:.95,brake:false,boost:false,swing:0,targetX:away,tactic:'DODGE THE BAT'};
    }
  }
  // Committed engagement: once a target is picked, the bot closes the flank,
  // matches speed, and swings — a readable duel, not a drive-by scoring
  // artifact. The commitment lapses when the target is down, escaped, or stale.
  if(engageTarget&&(engageTarget.state==='down'||engageTarget.respawnT>0||
    Math.abs(engageTarget.y-player.y)>92||runFrame-engageSince>320||player.damage>=92)){engageTarget=null;plan=null;}
  if(!engageTarget&&player.damage<92){
    const t=pickTarget();
    if(t&&Math.abs(t.y-player.y)<72){engageTarget=t;engageSince=runFrame;engageSide=t.x>=80?-1:1;plan=null;}
  }
  if(engageTarget&&player.damage<92){
    const t=engageTarget,dx=t.x-player.x,dy=t.y-player.y;
    let swing=0;
    if(Math.abs(dy)<11&&Math.abs(dx)>3&&Math.abs(dx)<weaponRange()+5&&
      player.swingPhase==='ready'&&player.cooldown<=0&&t.dodgeT<=0)swing=Math.sign(dx)||-engageSide;
    const throttle=Math.abs(dy)>26?(dy>0?1:.68):Math.abs(dy)>10?.86:.94;
    return{steer:clamp((clamp(t.x+engageSide*13,15,145)-player.x)*.14,-1,1),throttle,brake:false,boost:false,swing,
      targetX:clamp(t.x+engageSide*13,15,145),
      tactic:t.state==='recover'?'PUNISH THE WHIFF':'LINE UP '+RIVAL_KINDS[t.kind].label};
  }
  const engage=pickTarget();
  if(!plan||runFrame-planAt>=40){plan=buildRoutePlan(engage);planAt=runFrame;}
  const targetX=plan.targetX,steer=clamp((targetX-player.x)*.105,-1,1);
  let boost=false;
  if(player.boost>=55&&player.boostT<=0&&nearestThreat(player.x,player.y,34)>30&&
    Math.abs(steer)<.3)boost=true;
  return{steer,throttle:1,brake:false,boost,swing:0,targetX,tactic:routeTactic(plan,engage)};
}

// ---- rival FSM: pace -> engage -> windup -> swing -> recover; wobble/down ----
function stepRival(r){
  const spec=RIVAL_KINDS[r.kind];
  if(r.hitFlashT>0)r.hitFlashT--;
  if(r.carCd>0)r.carCd--;
  if(r.respawnT>0){r.respawnT--;
    if(r.respawnT<=0){
      r.x=LANES[mod(r.id+worldSeed,3)]+(hash(r.id,runFrame)-.5)*12;r.y=player.y-460-hash(r.id*3,worldSeed)*160;
      r.vx=0;r.speed=spec.cruise+.3;r.grit=r.gritMax;r.state='pace';r.stateT=0;r.spin=0;r.downY=0;r.carCd=0;
    }
    return;}
  if(r.state==='down'){
    // The knockout tumble is physical: the bike and rider cartwheel backward
    // off the shoulder, damping to rest in the weeds with the dizzy sparks
    // (the authored emote that covers the stillness) before the respawn.
    r.stateT--;r.spin*=.92;r.downY+=1.1;r.x+=r.spin*1.7;r.speed=Math.max(0,r.speed-.045);r.y+=r.speed;
    if(r.stateT<=0){r.respawnT=280+mod(r.id*37+worldSeed,240);}
    return;}
  if(r.state==='wobble'){
    r.stateT--;r.vx+=Math.sin(showFrame*.3+r.id)*.06*r.spin;r.vx*=.9;
    const intent={steer:clamp(Math.sin(showFrame*.22+r.id)*.8,-1,1),throttle:.55,brake:false,boost:false,swing:0,targetX:r.x,tactic:'WOBBLE'};
    advanceBike(r,intent,{offroad:offroadX(r.x),wet:false});
    if(r.stateT<=0){r.state='pace';r.stateT=0;}
    return;}
  if(r.dodgeT>0){r.dodgeT--;
    advanceBike(r,{steer:clamp((r.x<80?1:-1)*.9,-1,1),throttle:1,brake:false,boost:false,swing:0,targetX:r.x,tactic:'DODGE'},
      {offroad:offroadX(r.x),wet:false});return;}
  // Grudge warning is a PHYSICAL telegraph: the marked rival pulls up beside
  // the player and holds station, helmet-glancing — no attacks until land.
  if(act.phase==='warn'&&act.type==='grudge'&&r.id===act.marked&&(r.state==='pace'||r.state==='engage')){
    const tx=clamp(player.x+(r.x<player.x?-19:19),15,145),ty=player.y+4;
    advanceBike(r,{steer:clamp((tx-r.x)*.07,-1,1),throttle:clamp(1+(ty-r.y)*.02,.6,1.15),brake:false,boost:false,swing:0,targetX:tx,tactic:'STAKE'},
      {offroad:offroadX(r.x),wet:false});
    if(Math.abs(r.x-tx)<7&&Math.abs(r.y-ty)<8&&mod(showFrame,90)<45)r.glanceT=6;else if(r.glanceT>0)r.glanceT--;
    return;}
  // Pack warning is also physical: the two nearest rivals take staggered
  // escort slots off the player's quarters — the viewer watches the net
  // close for 240 frames before anyone is allowed to swing.
  if(act.phase==='warn'&&act.type==='pack'&&(r.state==='pace'||r.state==='engage')){
    const escorts=rivals.filter(q=>q.respawnT<=0&&q.state!=='down'&&Math.abs(q.y-player.y)<420)
      .sort((a,b)=>Math.abs(a.y-player.y)-Math.abs(b.y-player.y)).slice(0,2);
    const slot=escorts.indexOf(r);
    if(slot>=0){
      const side=slot%2===0?-1:1,tx=clamp(player.x+side*22,15,145),ty=player.y+34+slot*26;
      advanceBike(r,{steer:clamp((tx-r.x)*.07,-1,1),throttle:clamp(1+(ty-r.y)*.02,.6,1.15),brake:false,boost:false,swing:0,targetX:tx,tactic:'ESCORT'},
        {offroad:offroadX(r.x),wet:false});
      return;}
  }
  const dy=player.y-r.y;
  const grudge=act.phase!=='calm'&&act.type==='grudge'&&r.id===act.marked;
  const packCall=act.phase==='live'&&act.type==='pack';
  if(r.state==='pace'){
    // Cruise the highway through the SHARED integrator (it owns speed, lean,
    // and pose for every rider); rubber-band keeps the fiction honest —
    // leaders ease off, stragglers push.
    const want=dy>420?spec.cruise+.34:dy<-380?spec.cruise-.3:spec.cruise;
    const wantX=LANES[mod(r.id*2+worldSeed,3)]+((r.id%3)-1)*10+Math.sin(showFrame*.011+r.id*2.1)*7+rivalTrafficBias(r);
    advanceBike(r,{steer:clamp((wantX-r.x)*.03,-1,1)*.6,throttle:clamp(want/(spec.cruise+.18),.6,1.15),
      brake:false,boost:false,swing:0,targetX:wantX,tactic:'PACE'},{offroad:offroadX(r.x),wet:false});
    r.face=clamp(-r.vx*.4,-.3,.3);
    const engageRange=grudge?460:packCall?380:230*spec.engage*(dy>-40&&dy<200?1:0);
    if(player.wreckT<=0&&Math.abs(dy)<engageRange&&(grudge||packCall||hash(r.id,Math.floor(runFrame/300))<spec.engage)){
      r.state='engage';r.stateT=0;r.engageT=0;r.swingsLeft=spec.swings+(grudge?2:0);
      r.side=player.x>=r.x?1:-1; // commit the player's flank for the whole hunt
    }
    return;}
  if(r.state==='engage'){
    // Hunt the flank: pull alongside the player's rear quarter on the side
    // committed at engage entry, matching speed before the windup. The side
    // never re-picks mid-hunt — no indecision jitter under the player.
    const tx=clamp(player.x-r.side*13+rivalTrafficBias(r),15,145),ty=player.y-2;
    const steer=clamp((tx-r.x)*.12,-1,1);
    const throttle=clamp(1+(ty-r.y)*.02,.5,1.2);
    advanceBike(r,{steer,throttle,brake:false,boost:false,swing:0,targetX:tx,tactic:'ENGAGE'},
      {offroad:offroadX(r.x),wet:false});
    r.engageT++;
    if(Math.abs(r.x-tx)<6.5&&Math.abs(r.y-ty)<10&&player.wreckT<=0&&player.invulnT<=0)rivalStartSwing(r);
    else if(r.engageT>280||r.swingsLeft<0||Math.abs(dy)>260){r.state='pace';r.stateT=0;}
    return;}
  if(r.state==='windup'){
    // The tell: hold station beside the player while the bat rises. The bot
    // gets its dodge window here; the viewer gets the prediction.
    r.stateT--;r.windupPose=1-r.stateT/spec.windup;
    const ty=player.y-2,throttle=clamp(1+(ty-r.y)*.03,.6,1.1);
    advanceBike(r,{steer:clamp(((player.x-r.side*13)-r.x)*.06,-1,1)*.4,throttle,brake:false,boost:false,swing:0,targetX:r.x,tactic:'WINDUP'},
      {offroad:offroadX(r.x),wet:false});
    if(r.stateT<=0){r.state='swing';r.stateT=8;}
    return;}
  if(r.state==='swing'){
    r.stateT--;
    const rx=player.x-r.x,ry=player.y-r.y;
    if(Math.abs(ry)<12&&Math.abs(rx)>2&&Math.abs(rx)<spec.range+6&&Math.sign(rx||r.side)===r.side)hitPlayer(r);
    if(r.stateT<=0){r.state='recover';r.stateT=spec.windup+4;r.swingsLeft--;}
    advanceBike(r,{steer:0,throttle:.95,brake:false,boost:false,swing:0,targetX:r.x,tactic:'SWING'},
      {offroad:offroadX(r.x),wet:false});
    return;}
  if(r.state==='recover'){
    // Extended and vulnerable: the punish window the TACTICIAN farms.
    r.stateT--;
    advanceBike(r,{steer:0,throttle:.8,brake:false,boost:false,swing:0,targetX:r.x,tactic:'RECOVER'},
      {offroad:offroadX(r.x),wet:false});
    if(r.stateT<=0){r.state=r.swingsLeft>0&&Math.abs(dy)<120?'engage':'pace';r.stateT=0;}
    return;}
}
// VETERAN/WEASEL dodge: when the player's bat starts rising in range, a

function maybeDodge(r){
  if(r.dodgeT>0||r.state==='down'||r.state==='wobble'||r.respawnT>0)return;
  const spec=RIVAL_KINDS[r.kind];

      hash(r.id,runFrame)<spec.dodge){r.dodgeT=18;markEvent(3);say(RIVAL_KINDS[r.kind].label+' SLIPS IT',STEEL,r.y+14,40,r.x);}
  }
}

// ---- contact resolution: nobody rides through anybody --------------------------
// Rubbing is racing: bikes that touch trade paint and momentum, cars shove
// back. Contacts resolve AFTER all movement so every actor moved honestly
// first; the nudge is small and physical, never a teleport.
function separateBikes(a,b){
  const dx=b.x-a.x,dy=b.y-a.y;
  if(Math.abs(dx)>=7||Math.abs(dy)>=12)return false;
  const dir=dx===0?(a.y<b.y?-1:1):Math.sign(dx);
  const push=(7-Math.abs(dx))*.5+0.05;
  a.x=clamp(a.x-dir*push,15,145);b.x=clamp(b.x+dir*push,15,145);
  const mixv=(a.vx+b.vx)*.5;a.vx=a.vx*.4+mixv*.6;b.vx=b.vx*.4+mixv*.6;
  if(Math.abs(dy)<7){const s=(a.speed+b.speed)*.5;a.speed+=(s-a.speed)*.07;b.speed+=(s-b.speed)*.07;}
  // Contact frames pose by their own rules (like wobbles): the pose-honesty
  // telemetry gives the lean a few frames to re-converge after a bump.
  if(a.isPlayer)a.contactT=10;else if(b.isPlayer)b.contactT=10;
  if(push>=1.2)stats.contacts++; // firmer bumps count; constant grazing rubs do not
  return true;
}
function resolveContacts(){
  // player vs pack
  if(player.wreckT<=0)for(const r of rivals){
    if(r.respawnT>0||r.state==='down')continue;
    if(separateBikes(player,r)&&player.invulnT<=0&&r.state!=='wobble'){/* rub is silent */}
  }
  // pack vs pack
  for(let i=0;i<rivals.length;i++)for(let j=i+1;j<rivals.length;j++){
    const a=rivals[i],b=rivals[j];
    if(a.respawnT>0||b.respawnT>0||a.state==='down'||b.state==='down')continue;
    separateBikes(a,b);
  }
  // pack vs traffic: continuous separation ALWAYS applies (nobody sits inside
  // a car); the wobble event layers on top with a per-rival cooldown. The
  // separation radius stays INSIDE the hit radius so impacts still happen.
  for(const t of traffic){
    for(const r of rivals){
      if(r.respawnT>0||r.state==='down')continue;
      const dx=r.x-t.x,dy=r.y-t.y;
      if(Math.abs(dx)<7.5&&Math.abs(dy)<12){
        const dir=Math.sign(dx)||(r.y<t.y?-1:1),push=(7.5-Math.abs(dx))*.5+0.05;
        r.x=clamp(r.x+dir*push*.7,15,145);t.x=clamp(t.x-dir*push*.3,12,148);
        r.vx+=dir*.12;t.vx=(t.vx||0)-dir*.05;
        if(r.state!=='wobble'&&r.carCd<=0){
          r.state='wobble';r.stateT=24+mod(r.id*7,10);r.spin=dir;r.carCd=170;
          t.wob=Math.max(t.wob,50);t.hit=true;
          stats.packTrafficHits++;markEvent(5);fxAt(r.x,r.y,7,t.color,1.4);
        }
      }
    }
    // the player physically separates from cars every frame too; the damage
    // event lives in stepTraffic on the hit cooldown.
    if(player.wreckT<=0){
      const dx=player.x-t.x,dy=player.y-t.y;
      if(Math.abs(dx)<7.5&&Math.abs(dy)<12){
        const dir=Math.sign(dx)||(player.y<t.y?-1:1),push=(7.5-Math.abs(dx))*.5+0.05;
        player.x=clamp(player.x+dir*push*.7,15,145);t.x=clamp(t.x-dir*push*.3,12,148);
        player.vx+=dir*.12;player.contactT=10;
      }
    }
  }
}
