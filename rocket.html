'use strict';
const{ctx,W,H,random,R,RI,rect,spawn,burst,stepParts,drawParts,ring,stepRings,drawRings,shake,preDraw,postDraw,start,keys,manual,axis2,

const FL={x0:10,x1:150,y0:28,y1:332,gx0:59,gx1:101}; // field + goal mouth
const TEAM=[{c:'#3b7bff',c2:'#7fa8ff',name:'BLU'},{c:'#ff8a2a',c2:'#ffc37f',name:'ORG'}];
const angDiff=d=>((d+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI)-Math.PI;

const ball={x:80,y:180,vx:0,vy:0,r:5,trail:[],ox:0,oy:0};
const pads=[
  {x:22,y:75,big:0},{x:138,y:75,big:0},{x:22,y:285,big:0},{x:138,y:285,big:0},
  {x:80,y:62,big:0},{x:80,y:298,big:0},
  {x:16,y:180,big:1},{x:144,y:180,big:1},
].map(p=>({...p,t:0}));
function mkCar(team,i){return{team,i,x:0,y:0,a:0,vx:0,vy:0,boost:34,dead:0,sup:false,boosting:false,launch:0,spinV:0,
  drift:0,drifting:false,driftHeld:false,wasDrifting:false,slip:0, // rear-grip break + tail-out posture
  av:0,avLast:0, // slide yaw rate: the body carries rotational inertia mid-drift
  recover:0,crunchSpin:0, // crumpled off a hard wall hit: staggering, low authority
  driftAge:0,skid:[], // presentation: swing telemetry + rubber laid by the rear wheels
  demoImmune:0,respawn:null,
  profile:null,skill:null,
  ai:{tactic:'',lastTactic:'',driftUntil:0,driftMinUntil:0,driftCooldown:0,boostOutUntil:0,boostOutCounted:true,
    kickoffDrift:false,demoTarget:-1,demoUntil:0,demoCooldown:0,demoConsiderAt:0,
    driftKind:'',lineupCredit:0,
    anchorX:0,anchorY:0,anchorF:0,escapeUntil:0,escapeRev:true},
  stats:{driftStarts:0,driftFrames:0,driftBoostOuts:0,boostFrames:0,
    driftManeuvers:0, // bot state-machine starts: readable maneuvers, not edges
    lineupDrifts:0,lineupTouches:0,wallSaves:0,wallCrashes:0,
    hardTurns:0,hardTurnDrifts:0,slideFlips:0,crunches:0,
    // impossible-motion invariants (owner audit 2026-07-11) — all hard zeroes
    maxHeldSlip:0,catchSnapFrames:0,reverseDriftFrames:0,microReentries:0,
    uncaughtBoostFrames:0,positiveTireWorkFrames:0,
    challengeStarts:0,challengeDistanceSum:0,demoAttempts:0,demos:0,lapses:0}};}
const cars=[mkCar(0,0),mkCar(0,1),mkCar(1,2),mkCar(1,3)];
let score=[0,0],clock=180*60,state='countdown',stateT=100,frame=0,overtime=false,winner=0;
let matchNo=0,kickoffAge=0,profileSalt=0; // salt exposed for eval determinism fixtures
// ---------- personalities ----------
// Four aggression levels, all present every match. Aggression is a tactical
// dial (challenge distance, boost appetite, demo hunger, drift eagerness),
// not a skill ranking: the maniac reacts fast but aims sloppy and recovers
// late, the rotator is careful without being incompetent.
const BOT_PROFILES=Object.freeze({
  ROTATOR:Object.freeze({id:'ROTATOR',tag:'ROT',aggression:0.18,
    challengeDist:54,shadowInset:12,
    boostReserve:42,boostAngle:0.22,boostDistance:58,
    demoSeek:0,demoRange:0,demoLead:0,
    driftEnter:1.05,driftExit:0.20,driftMinSpeed:1.55,kickoffDrift:0.05,
    skill:{skill:0.76,precision:0.86,risk:0.20,recovery:0.88,
      reactionFrames:[4,7],lapseChance:0.00028,lapseFrames:[10,18]}}),
  BALANCED:Object.freeze({id:'BALANCED',tag:'BAL',aggression:0.48,
    challengeDist:76,shadowInset:12,
    boostReserve:24,boostAngle:0.30,boostDistance:44,
    demoSeek:0.12,demoRange:52,demoLead:8,
    driftEnter:0.90,driftExit:0.22,driftMinSpeed:1.35,kickoffDrift:0.30,
    skill:{skill:0.82,precision:0.79,risk:0.48,recovery:0.79,
      reactionFrames:[2,5],lapseChance:0.00034,lapseFrames:[8,16]}}),
  PRESSER:Object.freeze({id:'PRESSER',tag:'PRS',aggression:0.72,
    challengeDist:100,shadowInset:20,
    boostReserve:12,boostAngle:0.36,boostDistance:34,
    demoSeek:0.45,demoRange:78,demoLead:12,
    driftEnter:0.72,driftExit:0.24,driftMinSpeed:1.20,kickoffDrift:0.60,
    skill:{skill:0.84,precision:0.74,risk:0.72,recovery:0.72,
      reactionFrames:[1,4],lapseChance:0.00034,lapseFrames:[7,14]}}),
  MANIAC:Object.freeze({id:'MANIAC',tag:'MAN',aggression:0.95,
    challengeDist:128,shadowInset:28,
    boostReserve:6,boostAngle:0.44,boostDistance:24,
    demoSeek:0.88,demoRange:112,demoLead:18,
    driftEnter:0.58,driftExit:0.27,driftMinSpeed:1.05,kickoffDrift:0.90,
    skill:{skill:0.80,precision:0.64,risk:0.96,recovery:0.58,
      reactionFrames:[1,3],lapseChance:0.00055,lapseFrames:[6,12]}})
});
const LEGACY_STYLE=Object.freeze({id:'LEGACY',tag:'LEG',aggression:0.5,
  demoSeek:0,demoRange:0,demoLead:0,
  driftEnter:0.88,driftExit:0.22,driftMinSpeed:1.35,kickoffDrift:0.35,boostReserve:6});
function assignProfiles(){ // once per match, deterministic from the sim seed
  if(typeof globalThis.__NO_PROFILES!=='undefined'){
    for(const c of cars){c.profile=LEGACY_STYLE;c.skill=null;} // zero RNG reads
    return;
  }
  // Extreme pair + middle pair keeps team aggression totals close, so random
  // assignment never produces one all-out team against one passive team.
  let pairs=[[BOT_PROFILES.ROTATOR,BOT_PROFILES.MANIAC],
             [BOT_PROFILES.BALANCED,BOT_PROFILES.PRESSER]];
  // Exactly three assignment draws + one private-RNG salt draw per match.
  if(RI(0,1))pairs=[pairs[1],pairs[0]];
  const p0=RI(0,1)?[pairs[0][1],pairs[0][0]]:pairs[0];
  const p1=RI(0,1)?[pairs[1][1],pairs[1][0]]:pairs[1];
  const skillSalt=profileSalt=RI(1,0x7fffffff);
  const assigned=[...p0,...p1];
  cars.forEach((c,i)=>{
    const p=assigned[i];
    c.profile=p;
    // Ongoing reaction/lapse/aim noise draws from a private stream so the
    // planner never consumes engine RNG mid-match (replays stay identical).
    c.skill=AI.skillProfile({...p.skill,
      rng:AI.createRng(AI.hashSeed(`rocket:${skillSalt}:${matchNo}:${c.i}:${p.id}`))});
  });
}
const readDrive=axis2({stickyFrames:2});
// Payoff ladder: ball touches are muted tier-1 telemetry, demos tier 2, goals
// tier 3 (the existing every-3rd-frame goal replay, now kernel-arbitrated).
// tier 3 slowFrames matches the 85-frame goal state exactly so the formalized
// slow-mo reproduces the old frame%3 cadence.
const SHOW=createShow({tiers:{
  1:{frames:12},
  2:{frames:40,minGap:90},
  3:{frames:85,slowEvery:3,slowFrames:85}
}});
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
// The crosswind act was removed by owner directive (2026-07-11): the drama
// engine here is the cars themselves — drifting, demos, and momentum. The
// rounds/matches ARE this game's acts.
const driveController=AI.controllerMux({
  human:playerDrive,ai:decide,manual:c=>c.i===0&&(playing()||manual())
});

function kickoffPos(){
  ball.x=80;ball.y=180;ball.vx=0;ball.vy=0;ball.trail=[];
  const KO=[[80,300,-Math.PI/2],[52,326,-Math.PI/2],[80,60,Math.PI/2],[108,34,Math.PI/2]];
  kickoffAge=0;
  cars.forEach((c,i)=>{const k=KO[i];
    const px=c.x,py=c.y; // pre-teleport spot: the re-seat must displace it
    c.x=k[0];c.y=k[1];c.a=k[2];c.vx=0;c.vy=0;c.dead=0;c.launch=0;c.boost=Math.max(c.boost,34);
    // race-grid staging: seat everyone 4px behind the mark so the rolling
    // start rolls them onto it — and the teleport always visibly re-seats a
    // goalie that was already hovering on its own slot (no frozen carry-over).
    // If the car's pre-teleport spot is still within 3px of the staged seat
    // (a replay-tumble that happened to die on the grid), seat it 4px deeper:
    // the re-seat must ALWAYS read as a re-seat, never a frozen carry-over.
    // frame>0: the boot kickoff stays legacy-exact (switches land after boot)
    if(frame>0&&typeof globalThis.__NO_CELEBRATION==='undefined'){
      c.x-=Math.cos(k[2])*4;c.y-=Math.sin(k[2])*4;
      if(Math.hypot(c.x-px,c.y-py)<3){
        c.x-=Math.cos(k[2])*4;c.y-=Math.sin(k[2])*4;
      }
    }
    // hard-clear demo + drift transients so a demolition on a scoring frame
    // can never leak a dead car or stale respawn across the goal replay
    c.demoImmune=0;c.respawn=null;c.drift=0;c.drifting=false;c.driftHeld=false;c.slip=0;c.sup=false;
    c.av=0;c.avLast=0;c.recover=0;c.crunchSpin=0;
    c.driftAge=0;c.skid.length=0;
    const ai=c.ai;ai.driftUntil=0;ai.driftMinUntil=0;ai.driftCooldown=0;ai.boostOutUntil=0;ai.boostOutCounted=true;
    ai.demoTarget=-1;ai.demoUntil=0;ai.demoConsiderAt=0;
    ai.driftKind='';ai.lineupCredit=0;
    ai.anchorX=c.x;ai.anchorY=c.y;ai.anchorF=frame;ai.escapeUntil=0;
    if(c.skill)c.skill.reset();
    latchKickoffDrift(c);
  });
}
// diagonal cars may open with a showy drift approach; latch once per kickoff
// from the PRIVATE stream (same draws whether drift is ablated, so __NO_DRIFT
// A/B divergence is caused by drift alone)
function latchKickoffDrift(c){
  c.ai.kickoffDrift=c.i%2===1&&
    (c.skill?c.skill.takeRisk(c.profile.kickoffDrift):!!c.profile&&c.profile.kickoffDrift>=0.5);
}
function resetGame(){ // fresh match for a new run (player or attract)
  score=[0,0];clock=180*60;overtime=false;winner=0;
  matchNo++;assignProfiles(); // personalities persist for the whole match
  for(const c of cars)c.ai.demoCooldown=0; // stats stay cumulative per boot
  kickoffPos();state='countdown';stateT=100;
  SHOW.reset(frame);pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
}

// ---------- ai ----------
function predictBall(frames){
  // Forward-roll the ball alone with ballStep's exact drag and rail bounces.
  // Pure math on locals: reads no RNG, so replays stay stream-identical.
  let x=ball.x,y=ball.y,vx=ball.vx,vy=ball.vy;
  for(let i=0;i<frames;i++){
    x+=vx;y+=vy;vx*=0.985;vy*=0.985;
    if(x<FL.x0+ball.r){x=FL.x0+ball.r;vx=Math.abs(vx)*0.8;}
    if(x>FL.x1-ball.r){x=FL.x1-ball.r;vx=-Math.abs(vx)*0.8;}
    if(!(x>FL.gx0&&x<FL.gx1)){
      if(y<FL.y0+ball.r){y=FL.y0+ball.r;vy=Math.abs(vy)*0.8;}
      if(y>FL.y1-ball.r){y=FL.y1-ball.r;vy=-Math.abs(vy)*0.8;}
    }
    const sp=Math.hypot(vx,vy);
    if(sp>2.4){vx*=2.4/sp;vy*=2.4/sp;}
  }
  return{x,y};
}
function decide(c){ // dispatcher: legacy baseline vs profiled personality
  if(typeof globalThis.__NO_PROFILES!=='undefined')
    return applyBotDrift(c,decideLegacy(c),LEGACY_STYLE);
  // scrum breaker OUTSIDE the skill layer: a lapse must never freeze the
  // unstick reflex, or a car jammed mid-lapse grinds the corner for 18 frames
  const ai=c.ai;
  if(Math.hypot(c.x-ai.anchorX,c.y-ai.anchorY)>2.5){ai.anchorX=c.x;ai.anchorY=c.y;ai.anchorF=frame;}
  if(frame<ai.escapeUntil){ai.lastTactic='escape';return escapeIntent(c);}
  if(frame-ai.anchorF>6&&kickoffAge>20){
    ai.escapeUntil=frame+26;ai.anchorF=frame;
    // latch the escape direction for the whole window — re-deciding each
    // frame chatters on the wall test and the car vibrates in place. Pick
    // whichever end of the car has more open road: thrust only works along
    // the body axis, so nose-into-corner MUST back out, tail-into-corner
    // must drive out, and cars shadow whichever end they sit on.
    const fxv=Math.cos(c.a),fyv=Math.sin(c.a);
    const clear=(dx,dy)=>{
      let t=40;
      if(dx>1e-6)t=Math.min(t,(FL.x1-c.x)/dx);else if(dx<-1e-6)t=Math.min(t,(FL.x0-c.x)/dx);
      if(dy>1e-6)t=Math.min(t,(FL.y1-2-c.y)/dy);else if(dy<-1e-6)t=Math.min(t,(FL.y0+2-c.y)/dy);
      return t;
    };
    let fwdC=clear(fxv,fyv),revC=clear(-fxv,-fyv);
    for(const o of cars)if(o!==c&&o.dead<=0){
      const d2=Math.hypot(o.x-c.x,o.y-c.y);
      if(d2<16){ // cars shade an end but are PUSHABLE — never let one make an
        // end look worse than a nearby wall, or the escape grinds the wall
        if(fxv*(o.x-c.x)+fyv*(o.y-c.y)>0)fwdC=Math.min(fwdC,Math.max(8,d2-9));
        else revC=Math.min(revC,Math.max(8,d2-9));
      }}
    ai.escapeRev=revC>fwdC+2;
    ai.lastTactic='escape';return escapeIntent(c);
  }
  return c.skill.decide(frame,c,
    car=>applyBotDrift(car,decideProfiled(car),car.profile),
    (car,last)=>{ // lapse: coast, never freeze (motion contract)
      car.stats.lapses++;
      return last?{...last,steer:last.steer*0.45,boosting:false,drifting:false,tactic:'hesitate'}
        :{steer:0,throttle:0.45,boosting:false,drifting:false,tactic:'hesitate'};
    });
}
function decideLegacy(c){ // pre-personality bot, byte-for-byte: the A/B floor
  const atkUp=c.team===0; // blue attacks the top goal
  const oppY=atkUp?20:340,ownY=atkUp?340:20;
  // drive at where the ball will be when the car can plausibly arrive there
  const eta=Math.min(40,Math.hypot(ball.x-c.x,ball.y-c.y)/2.2)|0;
  const bp=globalThis.__NO_PREDICT?{x:ball.x,y:ball.y}:predictBall(eta);
  const behind=atkUp?c.y>bp.y+4:c.y<bp.y-4;
  const ballNearOwn=Math.abs(ball.y-ownY)<110;
  // role split: best-positioned teammate attacks, the other holds the net
  const mate=cars.find(o=>o!==c&&o.team===c.team&&o.dead<=0);
  const posScore=o=>((atkUp?o.y>ball.y+4:o.y<ball.y-4)?90:0)-Math.hypot(ball.x-o.x,ball.y-o.y);
  const attacker=!mate||posScore(c)+(c.i<mate.i?0.01:0)>=posScore(mate);
  let tx,ty;
  if(attacker){
    // long reads are fuzzy: aim error grows with how far ahead the car is
    // predicting, so strikes stay human — sometimes a whiff, then a re-approach
    if(!globalThis.__NO_PREDICT){const fuzz=2+eta*0.5;bp.x+=R(-fuzz,fuzz);bp.y+=R(-fuzz,fuzz);}
    if(behind){ // line up the shot from goal-side, at the intercept point
      const gx=80-bp.x,gy=oppY-bp.y,gl=Math.hypot(gx,gy)||1;
      tx=bp.x-gx/gl*9;ty=bp.y-gy/gl*9;
    }else{ // loop around to get goal-side of where the ball is heading
      tx=bp.x+(c.x<bp.x?-24:24);
      ty=bp.y+(atkUp?28:-28);
    }
    if(c.boost<24&&!ballNearOwn){ // top up when dry and safe
      let bp=null,bd=70;
      for(const p of pads){if(p.t>0)continue;
        const d=Math.hypot(p.x-c.x,p.y-c.y);if(d<bd){bd=d;bp=p;}}
      if(bp){tx=bp.x;ty=bp.y;}
    }
  }else{
    if(behind&&ballNearOwn){ // danger at the doorstep: clear the intercept
      const gx=80-bp.x,gy=oppY-bp.y,gl=Math.hypot(gx,gy)||1;
      tx=bp.x-gx/gl*9;ty=bp.y-gy/gl*9;
    }else{ // hold the mouth, shadowing where the ball is heading
      tx=Math.max(FL.gx0+8,Math.min(FL.gx1-8,bp.x));
      ty=atkUp?Math.min(326,ownY-12):Math.max(34,ownY+12);
      if(c.boost<40){ // sip a pad on the way home
        let bp=null,bd=44;
        for(const p of pads){if(p.t>0)continue;
          const d=Math.hypot(p.x-c.x,p.y-c.y);if(d<bd){bd=d;bp=p;}}
        if(bp){tx=bp.x;ty=bp.y;}
      }
    }
  }
  const da=angDiff(Math.atan2(ty-c.y,tx-c.x)-c.a);
  const dist=Math.hypot(tx-c.x,ty-c.y);
  return{steer:Math.max(-1,Math.min(1,da*2.6+R(-0.15,0.15))),
    throttle:Math.abs(da)>2.3?0.35:R(0.85,1),
    boosting:c.boost>6&&Math.abs(da)<0.3&&(dist>40||(attacker&&behind&&ballNearOwn)),
    drifting:false,turnError:da,targetDist:dist,tactic:'legacy'};
}
function chooseDemoTarget(c,mate,ballNearOwn){
  // Hysteretic demo hunt: commit to one opponent for up to 1.5s so the chase
  // reads as intent, with cooldowns so the maniac never spawn-camps.
  const p=c.profile,ai=c.ai;
  if(typeof globalThis.__NO_DEMOS!=='undefined')return null;
  if(p.demoSeek<=0||ballNearOwn)return null;
  if(!mate||mate.dead>0)return null; // never abandon an uncovered ball
  if(c.boost<=p.boostReserve)return null;
  if(frame<ai.demoCooldown)return null;
  const myBall=Math.hypot(ball.x-c.x,ball.y-c.y);
  const mateBall=Math.hypot(ball.x-mate.x,ball.y-mate.y);
  if(mateBall>myBall-8)return null; // hunt only while the mate covers the ball
  if(ai.demoTarget>=0&&frame<ai.demoUntil){
    const held=cars[ai.demoTarget];
    if(held&&held.dead<=0&&held.team!==c.team)return held;
    ai.demoTarget=-1;
  }
  if(frame<ai.demoConsiderAt)return null;
  ai.demoConsiderAt=frame+90;
  let best=null,bestScore=-Infinity;
  for(const o of cars){
    if(o.team===c.team||o.dead>0||o.demoImmune>0)continue;
    const d=Math.hypot(o.x-c.x,o.y-c.y);
    if(d>p.demoRange)continue;
    const defendingTop=o.team===1;
    const blockingLane=Math.abs(o.x-ball.x)<28&&(defendingTop?o.y<ball.y:o.y>ball.y);
    const nearBall=Math.hypot(o.x-ball.x,o.y-ball.y)<34;
    const s2=p.demoSeek*80-d+(blockingLane?28:0)+(nearBall?16:0);
    if(s2>bestScore){bestScore=s2;best=o;}
  }
  if(!best||bestScore<10)return null;
  if(c.skill&&!c.skill.takeRisk(p.demoSeek))return null;
  ai.demoTarget=best.i;ai.demoUntil=frame+90;
  c.stats.demoAttempts++;
  return best;
}
function decideProfiled(c){ // personality-parameterized planner (private RNG only)
  const p=c.profile,ai=c.ai;
  const atkUp=c.team===0;
  const oppY=atkUp?20:340,ownY=atkUp?340:20;
  const eta=Math.min(40,Math.hypot(ball.x-c.x,ball.y-c.y)/2.2)|0;
  const bp=globalThis.__NO_PREDICT?{x:ball.x,y:ball.y}:predictBall(eta);
  const behind=atkUp?c.y>bp.y+4:c.y<bp.y-4;
  const ballNearOwn=Math.abs(ball.y-ownY)<110;
  const mate=cars.find(o=>o!==c&&o.team===c.team&&o.dead<=0);
  // aggression tilts who claims the attacker role
  const posScore=o=>{const op=o.profile||LEGACY_STYLE;
    return((atkUp?o.y>ball.y+4:o.y<ball.y-4)?90:0)-Math.hypot(ball.x-o.x,ball.y-o.y)+op.aggression*18;};
  const attacker=!mate||posScore(c)+(c.i<mate.i?0.01:0)>=posScore(mate);
  let tx,ty,tactic;
  const demoTarget=chooseDemoTarget(c,mate,ballNearOwn);
  if(demoTarget){ // committed hunt: lead the victim's travel
    const d=Math.hypot(demoTarget.x-c.x,demoTarget.y-c.y);
    const lead=Math.min(p.demoLead,Math.max(4,d/2.8));
    tx=demoTarget.x+demoTarget.vx*lead;ty=demoTarget.y+demoTarget.vy*lead;
    tactic='demo';
  }else if(attacker){
    // aim fuzz scaled so precision 0.75 matches the legacy ±fuzz spread
    if(!globalThis.__NO_PREDICT){const fuzz=2+eta*0.5;
      bp.x+=c.skill.noise(fuzz*4);bp.y+=c.skill.noise(fuzz*4);}
    if(behind){
      const gx=80-bp.x,gy=oppY-bp.y,gl=Math.hypot(gx,gy)||1;
      tx=bp.x-gx/gl*9;ty=bp.y-gy/gl*9;tactic='attack';
    }else{
      tx=bp.x+(c.x<bp.x?-24:24);
      ty=bp.y+(atkUp?28:-28);tactic='reposition';
    }
    if(c.boost<24&&!ballNearOwn){
      let bpad=null,bd=70;
      for(const pd of pads){if(pd.t>0)continue;
        const d=Math.hypot(pd.x-c.x,pd.y-c.y);if(d<bd){bd=d;bpad=pd;}}
      if(bpad){tx=bpad.x;ty=bpad.y;tactic='refuel';}
    }
  }else{
    const toBall=Math.hypot(bp.x-c.x,bp.y-c.y);
    // challenge appetite is the loudest personality signal: the rotator holds
    // the mouth, the maniac dives from across the field

    if(c.x<FL.x0){c.x=FL.x0;c.vx=Math.abs(c.vx)*0.6;}
    if(c.x>FL.x1){c.x=FL.x1;c.vx=-Math.abs(c.vx)*0.6;}
    if(c.y<FL.y0+2){c.y=FL.y0+2;c.vy=Math.abs(c.vy)*0.6;}
    if(c.y>FL.y1-2){c.y=FL.y1-2;c.vy=-Math.abs(c.vy)*0.6;}
    // per-car flair while flying (dense: slow-mo eats particles fast)
    if(c.i===0){for(let k=0;k<2;k++)spawn({x:c.x+R(-2,2),y:c.y+R(-2,2),vx:R(-0.5,0.5),vy:R(-0.5,0.5),t:16,c:k?'#ffffff':'#cfe0ff'});}
    else if(c.i===1){const a=c.launch*0.55;
      spawn({x:c.x+Math.cos(a)*7,y:c.y+Math.sin(a)*7,t:20,c:'#7fa8ff'});
      spawn({x:c.x-Math.cos(a)*7,y:c.y-Math.sin(a)*7,t:20,c:'#cfe0ff'});}
    else if(c.i===2){if(c.launch%5===0)burst(c.x,c.y,10,['#ffd166','#ff8a2a','#ff5a8a'][RI(0,2)],1.8);}
    else{for(let k=0;k<2;k++)spawn({x:c.x+R(-6,6),y:c.y+R(-6,6),t:11,c:'#7ef0ff'});}
    return;
  }
  if(c.dead>0){c.dead--;
    if(typeof globalThis.__NO_DEMOS!=='undefined'){ // legacy fixed respawn
      if(c.dead===0){c.x=c.i%2?130:30;c.y=c.team?50:310;c.a=c.team?Math.PI/2:-Math.PI/2;c.vx=0;c.vy=0;}
      return;}
    if(c.dead===DEMO_TELEGRAPH)c.respawn=chooseRespawn(c); // latch the telegraph
    // never pop back in mid-replay: a respawn that lands during the goal
    // slow-mo would stand frozen at its slot until kickoff (dead air, and a
    // motion-contract stall) — hold the timer and return at the next live frame
    if(c.dead===0){if(state==='play')respawnCar(c);else c.dead=1;}
    return;}
  if(c.demoImmune>0)c.demoImmune--;
  const d=driveController(c);
  advanceCar(c,d);
  // boost pads
  for(const p of pads){
    if(p.t>0)continue;
    if(Math.hypot(p.x-c.x,p.y-c.y)<8){c.boost=Math.min(100,c.boost+(p.big?100:12));p.t=p.big?600:300;}
  }
}
function ballStep(){
  ball.x+=ball.vx;ball.y+=ball.vy;
  ball.vx*=0.985;ball.vy*=0.985;
  const inMouth=ball.x>FL.gx0&&ball.x<FL.gx1;
  if(ball.x<FL.x0+ball.r){ball.x=FL.x0+ball.r;ball.vx=Math.abs(ball.vx)*0.8;}
  if(ball.x>FL.x1-ball.r){ball.x=FL.x1-ball.r;ball.vx=-Math.abs(ball.vx)*0.8;}
  if(!inMouth){
    if(ball.y<FL.y0+ball.r){ball.y=FL.y0+ball.r;ball.vy=Math.abs(ball.vy)*0.8;}
    if(ball.y>FL.y1-ball.r){ball.y=FL.y1-ball.r;ball.vy=-Math.abs(ball.vy)*0.8;}
  }
  const sp=Math.hypot(ball.vx,ball.vy);
  if(sp>2.4){ball.vx*=2.4/sp;ball.vy*=2.4/sp;}
  ball.trail.push({x:ball.x,y:ball.y});if(ball.trail.length>7)ball.trail.shift();
  ball.ox+=ball.vx*0.55;ball.oy+=ball.vy*0.55; // texture roll
  // goals (only count during live play, not slow-mo replay)
  if(state==='play'){
    if(ball.y<FL.y0-9)goal(0);       // into top goal -> blue scores
    else if(ball.y>FL.y1+9)goal(1);  // into bottom goal -> orange scores
  }
}
function collisions(){
  // rotate processing order so no car's impulse always wins ties
  const n=cars.length,s=frame%n;
  for(let k=0;k<n;k++){
    const c=cars[(s+k)%n];
    if(c.dead>0)continue;
    const dx=ball.x-c.x,dy=ball.y-c.y,d=Math.hypot(dx,dy);
    if(d<ball.r+6.5){
      const nx=dx/(d||1),ny=dy/(d||1);
      const cs=Math.hypot(c.vx,c.vy);
      ball.vx=ball.vx*0.25+nx*(0.6+cs*0.45)+c.vx*0.25;
      ball.vy=ball.vy*0.25+ny*(0.6+cs*0.45)+c.vy*0.25;
      ball.x=c.x+nx*(ball.r+7);ball.y=c.y+ny*(ball.r+7);
      burst(ball.x,ball.y,4,'#e8ecf2',0.9);
      SHOW.offer({id:'touch',tier:1,at:frame,x:ball.x,y:ball.y}); // muted telemetry
      if(frame<c.ai.lineupCredit){c.ai.lineupCredit=0;c.stats.lineupTouches++;}
    }
  }
  for(let i=0;i<n;i++)for(let j=i+1;j<n;j++){
    const a=cars[i],b=cars[j];
    if(a.dead>0||b.dead>0)continue;
    const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy);
    if(d<11){
      const nx=dx/(d||1),ny=dy/(d||1);
      if(typeof globalThis.__NO_DEMOS!=='undefined'){ // legacy demolition rules
        if(a.team!==b.team&&a.sup&&!b.sup)demo(b,a);
        else if(a.team!==b.team&&b.sup&&!a.sup)demo(a,b);
        else bounceCars(a,b,nx,ny,d);
        continue;
      }
      if(state==='play'&&a.team!==b.team){ // demo v2: real impact geometry
        const ap=demoPower(a,b,nx,ny),bp=demoPower(b,a,-nx,-ny);
        if(ap>-Infinity||bp>-Infinity){
          // head-on ties resolve deterministically — no RNG in collisions
          if(ap>bp+1e-9||(Math.abs(ap-bp)<=1e-9&&((frame+i+j)&1)===0))demo(b,a);
          else demo(a,b);
          continue;
        }
      }
      // demo-v2 bump: elastic impulse along the contact normal instead of the
      // legacy full-velocity swap — the swap lets a nose-to-nose scrum trade
      // the same momentum forever (a motion-contract deadlock); a real bounce
      // repels every approach and preserves slide-past motion.
      a.x-=nx*(11-d)/2;a.y-=ny*(11-d)/2;b.x+=nx*(11-d)/2;b.y+=ny*(11-d)/2;
      const rel=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
      if(rel<0){const imp=0.875*-rel;
        a.vx-=nx*imp;a.vy-=ny*imp;b.vx+=nx*imp;b.vy+=ny*imp;}
      a.vx-=nx*0.12;a.vy-=ny*0.12;b.vx+=nx*0.12;b.vy+=ny*0.12;
    }
  }
}
function bounceCars(a,b,nx,ny,d){
  a.x-=nx*(11-d)/2;a.y-=ny*(11-d)/2;b.x+=nx*(11-d)/2;b.y+=ny*(11-d)/2;
  const tvx=a.vx;a.vx=b.vx*0.7;b.vx=tvx*0.7;
  const tvy=a.vy;a.vy=b.vy*0.7;b.vy=tvy*0.7;
}
// demo v2: a hit only demolishes when the attacker is truly fast AND actually
// driving into the victim — no side-swipe demos, supersonic victims fair game
const DEMO_SPEED=2.55,DEMO_CLOSING=0.65,DEMO_FACING=0.48;
const DEMO_RESPAWN=130,DEMO_TELEGRAPH=30,DEMO_GRACE=75;
function demoPower(attacker,victim,nx,ny){
  if(victim.demoImmune>0)return-Infinity;
  const speed=Math.hypot(attacker.vx,attacker.vy);
  if(speed<DEMO_SPEED)return-Infinity;
  const closing=(attacker.vx-victim.vx)*nx+(attacker.vy-victim.vy)*ny;
  if(closing<DEMO_CLOSING)return-Infinity;
  const facing=(attacker.vx*nx+attacker.vy*ny)/(speed||1);
  if(facing<DEMO_FACING)return-Infinity;
  return speed+closing*0.35+facing*0.15;
}
const RESPAWNS=[
  [{x:30,y:310,a:-Math.PI/2},{x:130,y:310,a:-Math.PI/2},{x:80,y:310,a:-Math.PI/2}],
  [{x:130,y:50,a:Math.PI/2},{x:30,y:50,a:Math.PI/2},{x:80,y:50,a:Math.PI/2}]];
function chooseRespawn(c){ // pure math: safest home slot, no RNG
  const options=RESPAWNS[c.team];
  let best=options[0],bestScore=-Infinity;
  for(let i=0;i<options.length;i++){
    const r=options[(i+c.i)%options.length];
    let enemyClear=Infinity,mateClear=Infinity;
    for(const o of cars){
      if(o===c||o.dead>0)continue;
      const d=Math.hypot(r.x-(o.x+o.vx*DEMO_TELEGRAPH),r.y-(o.y+o.vy*DEMO_TELEGRAPH));
      if(o.team===c.team)mateClear=Math.min(mateClear,d);
      else enemyClear=Math.min(enemyClear,d);
    }
    const s2=enemyClear+Math.hypot(r.x-ball.x,r.y-ball.y)*0.20+mateClear*0.10;
    if(s2>bestScore){bestScore=s2;best=r;}
  }
  return{...best};
}
function respawnCar(c){
  const r=c.respawn||chooseRespawn(c);
  c.x=r.x;c.y=r.y;c.a=r.a;c.vx=0;c.vy=0;c.boost=34;c.dead=0;c.respawn=null;
  c.demoImmune=DEMO_GRACE;
  c.drift=0;c.drifting=false;c.slip=0;c.sup=false;c.driftAge=0;c.skid.length=0;
  c.av=0;c.avLast=0;c.recover=0;c.crunchSpin=0;
  c.ai.demoTarget=-1;c.ai.demoUntil=0;c.ai.driftUntil=0;c.ai.boostOutUntil=0;
  if(c.skill)c.skill.reset();
}
function demo(victim,by){
  if(typeof globalThis.__NO_DEMOS!=='undefined'){ // legacy branch, untouched
    victim.dead=130;shake(8);
    burst(victim.x,victim.y,24,TEAM[victim.team].c,2.4);
    burst(victim.x,victim.y,10,'#ffd166',1.6);
    SHOW.offer({id:'demo-'+victim.i,tier:2,at:frame,x:victim.x,y:victim.y,data:{by:by.i}});
    return;
  }
  const x=victim.x,y=victim.y;
  victim.dead=DEMO_RESPAWN;victim.respawn=null;victim.demoImmune=0;
  victim.vx=0;victim.vy=0;victim.boosting=false;victim.sup=false;
  victim.drift=0;victim.drifting=false;victim.slip=0;
  by.stats.demos++;

  fxBurst(x,y,6,'#ffd166',1.2);

    data:{victim:victim.i,by:by.i}});

function goal(team){
  score[team]++;shake(12);

  const gy=Math.max(FL.y0,Math.min(FL.y1,ball.y));
  burst(ball.x,gy,40,TEAM[team].c,3);
  burst(ball.x,gy,20,'#ffffff',2);
  ring(ball.x,gy,TEAM[team].c2,2.4,34);
  for(const c of cars)launchCar(c,ball.x,gy); // the blast clears the field
  SHOW.offer({id:'goal',tier:3,at:frame,x:ball.x,y:gy,data:{team}});
  fxBurst(ball.x,gy,22,TEAM[team].c2,2.8);

}
function launchCar(c,bx,by){
  if(c.dead>0)return;
  const dx=c.x-bx,dy=c.y-by,l=Math.hypot(dx,dy)||1;
  c.launch=80;c.spinV=R(-0.45,0.45);
  const p=1.6+140/Math.max(35,l);
  c.vx=dx/l*p+R(-0.6,0.6);c.vy=dy/l*p+R(-0.6,0.6);
  carBoom(c);
}
function carBoom(c){ // every car gets its own signature blast
  if(c.i===0){ // supernova
    burst(c.x,c.y,24,'#ffffff',2.6);ring(c.x,c.y,'#7fa8ff',2.4,30);ring(c.x,c.y,'#ffffff',1.5,22);
  }else if(c.i===1){ // vortex swirl
    for(let k=0;k<20;k++){const a=k/20*6.283;
      spawn({x:c.x+Math.cos(a)*4,y:c.y+Math.sin(a)*4,
        vx:Math.cos(a)*0.9-Math.sin(a)*1.7,vy:Math.sin(a)*0.9+Math.cos(a)*1.7,
        t:40,c:k%2?'#7fa8ff':'#cfe0ff'});}

  }else if(c.i===2){ // firework (keeps crackling while airborne)
    burst(c.x,c.y,18,'#ffd166',2.2);ring(c.x,c.y,'#ff8a2a',2,26);
  }else{ // electro: forked zaps
    for(let k=0;k<4;k++){const a=R(0,6.283);
      for(let s2=0;s2<5;s2++)spawn({x:c.x+Math.cos(a)*s2*2.5,y:c.y+Math.sin(a)*s2*2.5,
        vx:R(-0.3,0.3),vy:R(-0.3,0.3),t:18+s2*3,c:'#7ef0ff'});}
    ring(c.x,c.y,'#7ef0ff',2.8,20);
  }
}
function matchOver(w){
  winner=w;state='over';overtime=false;
  if(playing()){stateT=100000;gameOver((w===0?'WIN':'LOSS')+' '+score[0]+'-'+score[1]);}
  else stateT=260;
}
function physicsStep(){
  for(const c of cars)carStep(c);

  collisions();
  for(const p of pads)if(p.t>0)p.t--;

    kickoffAge++;

    if(clock<=0&&!overtime){
      if(score[0]!==score[1]){matchOver(score[0]>score[1]?0:1);}
      else overtime=true;
    }
  }
}

function makeStaticLayer(paint){
  let cv2=null;
  if(typeof OffscreenCanvas==='function')cv2=new OffscreenCanvas(W*2,H*2);
  else if(typeof document!=='undefined'&&typeof document.createElement==='function'){
    cv2=document.createElement('canvas');cv2.width=W*2;cv2.height=H*2;
  }
  if(!cv2||typeof cv2.getContext!=='function')return null;
  const c=cv2.getContext('2d',{alpha:false});if(!c)return null;
  c.scale(2,2);
  const box=(x,y,w,h,col)=>{c.fillStyle=col;c.fillRect(Math.round(x),Math.round(y),w,h);};
  paint(c,box);return cv2;
}
function line(c,x0,y0,x1,y1,col,a){c.globalAlpha=a;c.strokeStyle=col;c.beginPath();c.moveTo(x0,y0);c.lineTo(x1,y1);c.stroke();c.globalAlpha=1;}
function drawFieldStatic(c,box){
  box(0,0,W,H,'#0b0e2a');

  const NC='#2de2e6';

  c.globalAlpha=0.45;c.strokeStyle=NC;c.strokeRect(FL.x0,FL.y0,FL.x1-FL.x0,FL.y1-FL.y0);c.globalAlpha=1;
  // goal boxes
  c.globalAlpha=0.3;c.strokeStyle=NC;
  c.strokeRect(FL.gx0-8,FL.y0,FL.gx1-FL.gx0+16,26);
  c.strokeRect(FL.gx0-8,FL.y1-26,FL.gx1-FL.gx0+16,26);

}
const fieldLayer=makeStaticLayer(drawFieldStatic);

const PROFILE_ACCENT={ROTATOR:'#2de2e6',BALANCED:'#ffffff',PRESSER:'#ffd166',MANIAC:'#ff5a8a'};

function drawHUD(){
  rect(0,0,W,24,'#0a0d20');
  rect(6,4,30,16,'#16224d');rect(6,4,3,16,TEAM[0].c);
  rect(W-36,4,30,16,'#3d2410');rect(W-9,4,3,16,TEAM[1].c);
  ctx.font='bold 11px monospace';
  ctx.fillStyle='#fff';
  ctx.fillText(score[0],18,17);
  ctx.fillText(score[1],W-26,17);
  const s=Math.max(0,Math.ceil(clock/60)),mm=Math.floor(s/60),ss=(''+(s%60)).padStart(2,'0');
  ctx.font='bold 9px monospace';
  ctx.fillStyle=overtime?'#ffd166':(s<=30?'#ff6b5e':'#c8d2e0');
  const ts=overtime?'+OT':mm+':'+ss;
  ctx.fillText(ts,(W-ts.length*5.4)/2,16);
  // team boost bars (avg of both cars)
  rect(0,H-16,W,16,'#0a0d20');
  for(let i=0;i<2;i++){
    const t=cars.filter(c=>c.team===i),bx=i===0?8:W-48;
    const avg=(t[0].boost+t[1].boost)/2;
    rect(bx,H-10,40,4,'#1a2038');
    rect(bx,H-10,Math.max(0,avg*0.4),4,TEAM[i].c);
  }
  if(state==='over'){ // pulse the winner's score box
    ctx.globalAlpha=0.4+Math.sin(frame*0.15)*0.3;
    ctx.strokeStyle=TEAM[winner].c2;
    ctx.strokeRect(winner===0?5:W-37,3,32,18);ctx.globalAlpha=1;
  }
  if(state==='countdown'){
    const n=Math.ceil(stateT/34);
    if(n>0){ // dark stroke so the digit reads over the ball
      ctx.font='bold 22px monospace';
      ctx.lineWidth=3;ctx.lineJoin='round';ctx.strokeStyle='#0a0d20';
      ctx.strokeText(n,74,190);
      ctx.fillStyle='#ffd166';ctx.fillText(n,74,190);
      ctx.lineWidth=1;
    }
    // match intro: name tonight's temperaments (first kickoff only)
    if(clock===180*60&&cars[0].profile&&cars[0].profile.id!=='LEGACY'){
      ctx.font='bold 6px monospace';
      for(let t2=0;t2<2;t2++){
        const pair=cars.filter(c=>c.team===t2).map(c=>c.profile.tag).join('+');
        ctx.fillStyle=TEAM[t2].c2;
        ctx.fillText(pair,t2===0?8:W-8-pair.length*3.6,32);
      }
    }
  }
  // demo callout rides the tier-2 cue window
  if(pres.cue&&pres.cue.tier===2&&String(pres.cue.id).startsWith('demo')&&pres.t<0.5){
    const cx=Math.max(14,Math.min(W-34,pres.cue.x-10));
    const cy=Math.max(34,Math.min(H-24,pres.cue.y-8));
    ctx.font='bold 7px monospace';
    ctx.lineWidth=2;ctx.strokeStyle='#0a0d20';ctx.strokeText('DEMO!',cx,cy);
    ctx.fillStyle='#ffd166';ctx.fillText('DEMO!',cx,cy);
    ctx.lineWidth=1;
  }
}
function draw(){
  preDraw();
  drawField();
  drawSkids();
  drawParts();
  drawRings();
  drawBall();
  for(const c of cars)drawCar(c);
  postDraw();
  drawHUD();
  drawSession(false); // match score is already the scoreboard
}
// ---------- main ----------
function step(){
  frame++;
  if(needProfiles){ // first match: assign on frame 1, not at boot, so eval
    needProfiles=false; // ablation switches set right after boot are honored
    matchNo++;assignProfiles();
    for(const c of cars)latchKickoffDrift(c);
  }
  sessionStep({reset:resetGame});
  pres=SHOW.step(frame);
  if(state==='countdown'){stateT--;
    // rolling start: engines bite on "GO" wind-up and the pack creeps at the
    // ball — race-start anticipation, and the kickoff pause never freezes
    // past its emote budget (no RNG; gated with the other presentation beats)
    if(typeof globalThis.__NO_CELEBRATION==='undefined'&&stateT<=8)
      for(const c of cars)if(c.dead<=0)
        advanceCar(c,{steer:0,throttle:0.25,boosting:false,drifting:false});
    if(stateT<=-15)state='play';}
  else if(state==='goal'){stateT--;
    if(frame%pres.physicsEvery===0)physicsStep();
    if(stateT<=0){
      if(score[0]>=7||score[1]>=7)matchOver(score[0]>score[1]?0:1);
      else{kickoffPos();state='countdown';stateT=100;}
    }
  }else if(state==='over'){stateT--;
    if(frame%3===0)spawn({x:R(FL.gx0-8,FL.gx1+8),y:winner===0?FL.y0+2:FL.y1-2, // victory confetti
      vx:R(-0.5,0.5),vy:winner===0?R(0.4,1.4):R(-1.4,-0.4),t:R(30,70),drag:1,
      c:random()<0.7?TEAM[winner].c:'#ffffff'});
    // match-end beat is ALIVE, not frozen (motion contract): winners rip
    // victory donuts on the new drift physics, losers sulk-crawl home.
    // No engine RNG (boost off) and kickoffPos re-seats everyone, so the
    // celebration cannot leak into the next match.
    if(typeof globalThis.__NO_CELEBRATION==='undefined')
      for(const c of cars)if(c.dead<=0)advanceCar(c,celebrationIntent(c));
    if(stateT<=0)resetGame(); // same path as session resets: wind + show state too
  }else physicsStep();
  stepParts();stepRings();
}
initSession('rocket',[['UP / DOWN','GAS · REVERSE'],['LEFT / RIGHT','STEER'],['SPACE','BOOST'],['X / Z','POWER DRIFT']]);
kickoffPos();
let needProfiles=true; // deferred first-match personality assignment
start(()=>{step();},()=>{draw();});
</script>
