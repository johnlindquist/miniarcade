<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRESTCRASH</title>
<style>
  html,body{margin:0;height:100%;background:#090d24}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{width:min(100vw,44.444vh);height:auto;max-height:100vh;aspect-ratio:4/9;
    image-rendering:pixelated;background:#11183b}
  canvas:focus-visible{outline:2px solid #ffcf72;outline-offset:-3px}
</style>
<canvas id="cv" width="320" height="720" tabindex="0"
  aria-label="Crestcrash. An autonomous ridge capsule dives, launches, and topples relay towers."></canvas>
<script src="engine.js"></script>
<script src="autoplay.js"></script>
<script>
'use strict';
const{ctx,W,H,RI,hash,clamp,rect,stepParts,drawParts,ring,stepRings,drawRings,
  shake,preDraw,postDraw,start,keys,manual,initSession,sessionStep,drawSession,playing,
  addScore,gameOver,createShow,fxBurst,fxDust}=E;
const{controllerMux}=AI;

// One body, one physics story: terrain stores the launch energy, the capsule
// becomes the projectile, and the same flight ends in a tower hit or a real landing.
const TAU=Math.PI*2,PERIOD=260,RADIUS=6,GRAV=.092;
const INK='#090d24',SKY='#11183b',SKY2='#20295a',CREAM='#fff0c9',OCHRE='#ca8848';
const GOLD='#ffcf72',CORAL='#ff6f6b',MINT='#68e0c1',VIOLET='#b89cff',BLUE='#68b6ff';
const PERSONAS=[
  {name:'RAZOR',release:-2,trim:0,color:CORAL},
  {name:'GLIDER',release:-8,trim:1,color:MINT},
  {name:'TRICKSTER',release:3,trim:-1,color:VIOLET}
];

let showFrame=0,runFrame=0,runNo=0,state='run',resultT=0,camX=0;
let body=null,targets=[],debris=[],texts=[],plan=null,planAt=-1e9,targetSerial=0;
let persona=PERSONAS[0],personaIndex=0,lastLapse=false,chapter=1,upgrade=0;
let terrainAmp=30,terrainRipple=3.5,worldVariant=1;
let runBase={},lastOutcome='',missStreak=0,crownTargetId=0;
let lastBreakFrame=0;
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
let eventSerial=0,progressSerial=0,lastEventFrame=0,lastProgressFrame=0;
const stats={launches:0,landings:0,impacts:0,jointBreaks:0,coreBreaks:0,crownBreaks:0,collapses:0,
  misses:0,tumbles:0,repairs:0,recoveries:0,coilRecoveries:0,lapses:0,upgrades:0,endings:0,
  events:0,progress:0,maxEventLull:0,maxProgressLull:0,firstEnding:-1,
  appliedIntents:0,admireIntents:0,invisibleResets:0};

const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},
  2:{frames:42,minGap:90},
  3:{frames:78,minGap:600,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});

const headwind={phase:'calm',warnAt:3000,landAt:3240,endAt:3840,dir:1,count:0};
const plating={phase:'calm',warnAt:6600,landAt:6810,endAt:7230,targetId:0,count:0};
const actNotes=[];

function terrainY(x){
  const cycle=Math.floor(x/PERIOD),u=x/PERIOD-cycle,p=u*TAU,smooth=u*u*(3-2*u);
  const a=(hash(cycle,worldVariant)-.5)*6,b=(hash(cycle+1,worldVariant)-.5)*6,
    shape=(hash(cycle,worldVariant+37)-.5)*7;
  return 285+terrainAmp*Math.sin(p)+terrainRipple*Math.sin(p*2+.65)+a+(b-a)*smooth+shape*Math.sin(p)*Math.sin(p);
}
function terrainSlope(x){
  const cycle=Math.floor(x/PERIOD),u=x/PERIOD-cycle,p=u*TAU,k=TAU/PERIOD;
  const a=(hash(cycle,worldVariant)-.5)*6,b=(hash(cycle+1,worldVariant)-.5)*6,
    shape=(hash(cycle,worldVariant+37)-.5)*7;
  return terrainAmp*k*Math.cos(p)+terrainRipple*2*k*Math.cos(p*2+.65)+
    (b-a)*(6*u-6*u*u)/PERIOD+shape*2*Math.sin(p)*Math.cos(p)*k;
}
function tangentAt(x){const s=terrainSlope(x),q=1/Math.hypot(1,s);return{x:q,y:s*q};}
function crestAfter(x){
  const cycle=Math.floor(x/PERIOD),a=(cycle+.73)*PERIOD,b=(cycle+1.73)*PERIOD;
  return a>x+8?a:b;
}
function finiteObject(o){return Object.values(o).filter(v=>typeof v==='number').every(Number.isFinite);}
function allFinite(){return finiteObject(body)&&targets.every(t=>finiteObject(t)&&t.blocks.every(finiteObject))&&debris.every(finiteObject);}
function say(s,c,x,y,t){texts.push({s,c:c||CREAM,x:x===undefined?80:x,y:y===undefined?82:y,t:t||54});}
function markEvent(n){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);lastEventFrame=showFrame;if(n&&playing())addScore(n);}
function markProgress(n){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);lastProgressFrame=showFrame;if(n&&playing())addScore(n);}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+24});}
function noteAct(e){actNotes.push({kind:e.kind,id:e.id,at:e.at,tag:e.tag,landsAt:e.landsAt});SHOW.note(e);}

function makeBody(x){
  return{x,y:terrainY(x)-RADIUS,vx:2.05,vy:0,rot:0,grounded:true,compression:.22,
    integrity:100,repairT:0,coilT:0,needsCoil:false,tumbleT:0,hitT:0,intent:null,lastX:x,lastY:terrainY(x)-RADIUS};
}
function makeTarget(index){
  const x=index*PERIOD-10,base=terrainY(x),tier=1+Math.floor(index/5),
    jointY=base-49-clamp(tier,1,4)+(hash(index,worldVariant)*4-2);
  const blocks=[];
  for(let col=-1;col<=1;col+=2)for(let row=0;row<3;row++)blocks.push({
    x:x+col*7,y:base-7-row*10,w:9,h:9,vx:0,vy:0,rot:0,falling:false,settled:false,unsupported:false,fallDelay:0,
    supports:row===0?['anchor']:[blocks.length-1],material:tier<3?'ceramic':'alloy',mass:1+row*.12
  });
  blocks.push({x,y:base-39,w:20,h:7,vx:0,vy:0,rot:0,falling:false,settled:false,unsupported:false,fallDelay:0,supports:[2,5],material:'beam',mass:1.6});
  if(tier>=3)blocks.push({x:x+18,y:base-27,w:8,h:20,vx:0,vy:0,rot:0,falling:false,settled:false,unsupported:false,fallDelay:0,supports:[4],material:'alloy',mass:1.8});
  if(tier>=6)blocks.push({x:x-18,y:base-29,w:8,h:24,vx:0,vy:0,rot:0,falling:false,settled:false,unsupported:false,fallDelay:0,supports:[1],material:'alloy',mass:2});
  return{id:index,x,base,jointX:x-10,jointY,tier,broken:false,resolved:false,missed:false,
    core:index%8===0,crown:false,exposed:false,exposeT:0,exposeDrop:0,collapseT:0,shifted:false,anchorAlive:true,jointHP:1.05+Math.min(4,tier)*.05,material:tier<3?'ceramic':'alloy',blocks};
}
function ensureTargets(){
  while(!targets.length||targets.at(-1).x<body.x+430){targetSerial++;targets.push(makeTarget(targetSerial));}
  targets=targets.filter(t=>t.x>body.x-260||!t.resolved);
}
function activeTarget(){return targets.find(t=>!t.resolved&&t.x>body.x-14)||null;}
function targetJoint(t,future){
  let y=t.jointY+(future&&t.exposeT>0?18:t.exposeDrop);
  if(future&&plating.phase==='warn'&&plating.targetId===t.id)y+=8;
  return{x:t.jointX,y};
}

function resetActs(){
  Object.assign(headwind,{phase:'calm',warnAt:3000,landAt:3240,endAt:3840,dir:runNo%2?1:-1});
  Object.assign(plating,{phase:'calm',warnAt:6600,landAt:6810,endAt:7230,targetId:0});
}
function stepActs(){
  if(typeof globalThis.__NO_ACTS!=='undefined'){
    headwind.phase='calm';plating.phase='calm';return;
  }
  if(headwind.phase==='calm'&&runFrame===headwind.warnAt){
    headwind.phase='warn';headwind.dir=((runNo+headwind.count)&1)?1:-1;
    plan=null;
    noteAct({kind:'act-warning',id:'headwind',at:showFrame,tag:runFrame,landsAt:showFrame+240});
    say('HEADWIND FRONT',GOLD,80,58,90);
  }else if(headwind.phase==='warn'&&runFrame>=headwind.landAt){
    headwind.phase='live';noteAct({kind:'act-land',id:'headwind',at:showFrame,tag:runFrame});
    say(headwind.dir>0?'WIND >>':'<< WIND',CORAL,80,58,70);shake(3);
  }else if(headwind.phase==='live'&&runFrame>=headwind.endAt){
    headwind.count++;headwind.phase='calm';headwind.warnAt+=8400;
    headwind.landAt=headwind.warnAt+240;headwind.endAt=headwind.landAt+600;
  }
  if(plating.phase==='calm'&&runFrame===plating.warnAt){
    plating.phase='warn';while(targets.at(-1).x<body.x+1300){targetSerial++;targets.push(makeTarget(targetSerial));}
    const t=targets.find(v=>!v.resolved&&!v.broken&&v.x>=body.x+1000);plating.targetId=t?t.id:0;
    plan=null;
    noteAct({kind:'act-warning',id:'plating',at:showFrame,tag:runFrame,landsAt:showFrame+210});
    say('PLATING DROP',VIOLET,80,70,90);
  }else if(plating.phase==='warn'&&runFrame>=plating.landAt){
    plating.phase='live';const t=targets.find(v=>v.id===plating.targetId);
    if(t&&!t.resolved){
      t.jointY+=8;t.shifted=true;
      t.blocks.push({x:t.x-17,y:t.base-27,w:8,h:22,vx:0,vy:0,rot:0,falling:false,settled:false,
        unsupported:false,fallDelay:0,supports:['anchor'],material:'alloy',mass:2.2});
    }
    noteAct({kind:'act-land',id:'plating',at:showFrame,tag:runFrame});say('PLATES LOCK',VIOLET,80,70,72);shake(5);
  }else if(plating.phase==='live'&&runFrame>=plating.endAt){
    plating.count++;plating.phase='calm';plating.warnAt+=9000;
    plating.landAt=plating.warnAt+210;plating.endAt=plating.landAt+420;plating.targetId=0;
  }
}
function windNow(){return headwind.phase==='live'?.012*headwind.dir:0;}
function forecastWind(offset){
  if(typeof globalThis.__NO_ACTS!=='undefined')return 0;
  if(headwind.phase==='warn'&&runFrame+offset>=headwind.landAt)return .012*headwind.dir;
  return headwind.phase==='live'?.012*headwind.dir:0;
}

// Deterministic swept terrain contact. At ordinary speed this is one or two
// samples; extreme arcs are subdivided to a bounded two-pixel chord so a crest
// cannot disappear between 60 Hz endpoints. Binary refinement returns the
// first honest contact without consuming RNG or changing the fixed outer step.
function sweepTerrain(ax,ay,bx,by){
  const steps=clamp(Math.ceil(Math.hypot(bx-ax,by-ay)/2),1,24);let loT=0;
  for(let i=1;i<=steps;i++){
    const hiT=i/steps,x=ax+(bx-ax)*hiT,y=ay+(by-ay)*hiT;
    if(y+RADIUS>=terrainY(x)){
      let lo=loT,hi=hiT;
      for(let j=0;j<8;j++){const m=(lo+hi)/2,mx=ax+(bx-ax)*m,my=ay+(by-ay)*m;
        if(my+RADIUS>=terrainY(mx))hi=m;else lo=m;}
      const t=hi,hx=ax+(bx-ax)*t;return{t,x:hx,y:terrainY(hx)-RADIUS,steps};
    }
    loT=hiT;
  }
  return null;
}

function advanceBody(b,intent,wind,terrainCollision){
  const out={launched:false,landed:false,hard:0};
  if(b.grounded){
    const tan=tangentAt(b.x),s=terrainSlope(b.x);
    let speed=Math.max(.45,b.vx*tan.x+b.vy*tan.y);
    speed+=GRAV*tan.y+.004;speed*=intent.dive?.9995:.9975;
    if(intent.dive)b.compression=clamp(b.compression+Math.max(0,tan.y)*.045+.004,0,2.9);
    else b.compression=Math.max(0,b.compression-.018);
    b.vx=speed*tan.x;b.vy=speed*tan.y;b.x+=b.vx;b.y=terrainY(b.x)-RADIUS;b.rot+=speed/RADIUS;
    if(!intent.dive&&b.compression>.18&&s<-.08&&speed>.3){
      const launchSpeed=speed+.48+b.compression*(.92+(upgrade>=1?.09:0));
      b.grounded=false;b.vx=launchSpeed*tan.x+.1+(upgrade>=1?.05:0);
      b.vy=launchSpeed*tan.y-.34-b.compression*(.28+(upgrade>=1?.04:0));b.compression*=.25;out.launched=true;
    }
  }else{
    const trimPower=upgrade>=3?1.35:1;
    b.vx+=wind+intent.trim*.0045*trimPower;b.vy+=GRAV+(intent.dive?.018:0)-intent.trim*.0015*trimPower;
    b.vx*=.999;b.vy*=.999;
    const ax=b.x,ay=b.y,bx=ax+b.vx,by=ay+b.vy,hit=terrainCollision===false?null:sweepTerrain(ax,ay,bx,by);
    b.x=hit?hit.x:bx;b.y=hit?hit.y:by;b.rot+=b.vx/RADIUS*.7*(hit?hit.t:1);
    if(hit){
      const tan=tangentAt(b.x),normalSpeed=Math.abs(-tan.y*b.vx+tan.x*b.vy);b.grounded=true;
      const along=Math.max(.45,b.vx*tan.x+b.vy*tan.y);
      b.vx=along*tan.x;b.vy=along*tan.y;b.compression=Math.min(.55,normalSpeed*.08);
      out.landed=true;out.hard=normalSpeed;
    }
  }
  return out;
}

function simulatePlan(t,releaseX,trim){
  const b=Object.assign({},body),joint=targetJoint(t,true),points=[];let min=1e9,impactSpeed=0,launched=false,landed=false,hard=0,airtime=0,bestAt=360;
  for(let f=0;f<360;f++){
    const intent={dive:b.grounded&&b.x<releaseX,trim:b.grounded?0:trim,brace:false};
    const ev=advanceBody(b,intent,forecastWind(f),true);if(ev.launched)launched=true;if(launched)airtime++;
    if(launched&&ev.landed){landed=true;hard=Math.max(hard,ev.hard);}
    const d=Math.hypot(b.x-joint.x,b.y-joint.y);if(d<min){min=d;impactSpeed=Math.hypot(b.vx,b.vy);bestAt=f;}
    if(launched&&f%28===0&&points.length<4)points.push({x:b.x,y:b.y});
    if(b.x>t.x+30)break;
  }
  const safe=landed&&hard<11;return{releaseX,trim,min,impactSpeed,points,landed,hard,airtime,bestAt,
    score:(launched?0:-100)-min*2+impactSpeed*.1-bestAt*.025+(safe?1.5:0)-Math.max(0,hard-8)*.25+(t.core?.35:0)};
}
function reactivePlan(t){
  const crest=crestAfter(body.x);return{releaseX:crest-(missStreak>=2?38:41),trim:0,min:99,impactSpeed:0,points:[]};
}
function buildPlan(t){
  if(!t)return null;
  if(typeof globalThis.__NO_ARC_PLAN!=='undefined')return reactivePlan(t);
  const crest=crestAfter(body.x),candidates=[];
  for(const off of[-44,-38,-32,-26,-20,-14,-8,-2])for(const trim of[-1,0,1])candidates.push(simulatePlan(t,Math.min(crest-1,crest+off+persona.release),trim));
  candidates.push(simulatePlan(t,crest-18,0));
  candidates.sort((a,b)=>b.score-a.score||a.releaseX-b.releaseX||a.trim-b.trim);
  return candidates[0];
}
function lapseActive(){
  const slot=runFrame%5400,on=320+personaIndex*170,active=slot>=on&&slot<on+16;
  if(active&&!lastLapse){stats.lapses++;markEvent();}lastLapse=active;return active;
}
function botController(){
  const t=activeTarget();
  if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined'){
    stats.admireIntents++;return{dive:false,trim:0,brace:false,targetId:t&&t.id,tactic:'ADMIRE'};
  }
  if(!t)return{dive:true,trim:0,brace:false,targetId:0,tactic:'SEEK RELAY'};
  if(!plan||plan.targetId!==t.id||body.grounded&&runFrame-planAt>=60&&body.x<plan.releaseX-24){
    plan=Object.assign({targetId:t.id},buildPlan(t));planAt=runFrame;
  }
  const lapse=lapseActive(),joint=targetJoint(t,true),dx=joint.x-body.x;
  let dive=body.grounded&&body.x<(plan.releaseX+(lapse?7:0)),trim=body.grounded?0:plan.trim+(lapse?persona.trim:0);
  const planned=typeof globalThis.__NO_ARC_PLAN==='undefined',exposedRecovery=t.exposed&&typeof globalThis.__NO_EXPOSED_RECOVERY==='undefined',
    honestMiss=(t.id+personaIndex*2)%7===0&&!(planned&&t.core)&&!exposedRecovery;
  let brace=!honestMiss&&!body.grounded&&dx>-8&&dx<23&&Math.abs(joint.y-body.y)<22;
  let tactic=body.grounded?(dive?'DIVE NOW':'CREST'):(brace?'BRACE':'MARK JOINT');
  if(t.exposed&&!body.grounded)tactic=brace?'BRACE':'CALLED SHOT';
  if(typeof globalThis.__NO_ARC_PLAN!=='undefined'&&missStreak>=2&&body.grounded)tactic='RECOVER LINE';
  if(headwind.phase==='warn'){
    dive=false;trim=-headwind.dir;tactic='CUT HEADWIND';
  }else if(plating.phase==='warn'){
    dive=false;trim=1;tactic='BEAT PLATING';
  }
  if(body.repairT>0)tactic='REPAIR';else if(body.coilT>90)tactic='COIL RECOVER';
  return{dive,trim:clamp(trim,-1,1),brace,targetId:t.id,tactic};
}
function humanIntent(){const t=activeTarget();return{
  dive:!!(keys.down||keys.a),trim:(keys.right?1:0)-(keys.left?1:0),brace:!!(keys.b||keys.c),
  targetId:t&&t.id,tactic:'MANUAL'
};}
const controller=controllerMux({human:humanIntent,ai:botController,manual:()=>playing()||manual()});
function applyIntent(intent){body.intent=intent;stats.appliedIntents++;return intent;}

function beginRepair(reason){
  if(body.repairT>0)return;body.repairT=180;body.vx*=.25;body.vy=Math.max(.2,body.vy);body.integrity=0;
  stats.repairs++;markEvent();offer('repair',2,body.x,body.y,reason);say('FIELD REPAIR',MINT,body.x,body.y-18,100);
}
function hardImpact(amount){
  stats.tumbles++;body.tumbleT=clamp(Math.round(amount*10),24,90);body.integrity-=amount*(3.2-(upgrade>=2?.75:0));
  if(stats.tumbles%4===0)body.needsCoil=true;
  body.vx*=body.grounded?.72:.85;body.vy*=body.grounded?.72:.85;
  markEvent();say('ROUGH LANDING',CORAL,body.x,body.y-15,48);if(body.integrity<=0)beginRepair('shell');
}
function breakTarget(t){
  if(t.broken)return;t.broken=true;t.anchorAlive=false;t.collapseT=1;stats.jointBreaks++;stats.collapses++;
  if(t.core)stats.coreBreaks++;
  if(t.crown)stats.crownBreaks++;
  missStreak=0;lastBreakFrame=showFrame;
  const stable=new Set();let changed=true;
  while(changed){changed=false;for(let i=0;i<t.blocks.length;i++)if(!stable.has(i)){
    const supported=t.blocks[i].supports.some(s=>s==='anchor'?t.anchorAlive:stable.has(s));
    if(supported){stable.add(i);changed=true;}
  }}
  for(let i=0;i<t.blocks.length;i++)if(!stable.has(i)){const b=t.blocks[i];b.unsupported=true;b.fallDelay=3+i*5;b.vx=(i%2?1:-1)*(.22+.025*i);b.vy=-.35-.04*(i%3);}
  markEvent(160);markProgress(1);shake(t.core?8:5);ring(t.jointX,t.jointY,t.core?GOLD:CREAM,2.2,28);
  fxBurst(t.jointX,t.jointY,t.core?34:18,t.core?GOLD:CORAL,t.core?2.8:2,.025);
  say(t.core?'CORE CASCADE':'JOINT BREAK',t.core?GOLD:CORAL,t.x,t.jointY-17,82);
  offer(t.core?'core-collapse':'joint-break',t.core?3:2,t.jointX,t.jointY,t.id);
  body.hitT=45;body.vx=Math.max(1.4,body.vx*.82);body.vy=-Math.abs(body.vy)*.42-1.05;body.integrity=Math.max(1,body.integrity-3);
}
function collideTargets(){
  if(body.grounded||body.repairT>0||body.hitT>0)return;
  for(const t of targets){
    if(t.resolved||t.x<Math.min(body.lastX,body.x)-30||t.x>Math.max(body.lastX,body.x)+30)continue;
    const joint=targetJoint(t,false),d=Math.min(Math.hypot(body.x-joint.x,body.y-joint.y),
      segmentPointDistance(body.lastX,body.lastY,body.x,body.y,joint.x,joint.y)),speed=Math.hypot(body.vx,body.vy);
    if(!t.broken&&d<RADIUS+7){
      stats.impacts++;markEvent();
      const energy=.5*speed*speed*(upgrade>=4?1.35:1);t.jointHP-=energy;
      if(t.jointHP<=0&&body.intent&&body.intent.brace)breakTarget(t);
      else{body.hitT=30;body.vx=Math.max(.9,Math.abs(body.vx)*.38);body.vy=-Math.abs(body.vy)*.55;hardImpact(Math.max(2,speed));}
      return;
    }
    for(const b of t.blocks){
      if(b.falling&&(b.settled||t.collapseT>=120))continue;
      if((Math.abs(body.x-b.x)<RADIUS+b.w/2&&Math.abs(body.y-b.y)<RADIUS+b.h/2)||
        segmentIntersectsAABB(body.lastX,body.lastY,body.x,body.y,b.x,b.y,RADIUS+b.w/2,RADIUS+b.h/2)){
        stats.impacts++;
        const energy=.5*speed*speed*(upgrade>=4?1.35:1);if(d<30)t.jointHP-=energy;
        if(!t.broken&&body.intent&&body.intent.brace&&t.jointHP<=0&&d<30){breakTarget(t);return;}
        const materialFactor=b.material==='alloy'?1.25:b.material==='beam'?1.1:1;
        body.hitT=30;body.vx=Math.max(.9,Math.abs(body.vx)*.4);body.vy=-Math.abs(body.vy)*.5;hardImpact(Math.max(2.5,speed*materialFactor));return;
      }
    }
  }
}
function resolvePassedTargets(){
  for(const t of targets)if(!t.resolved&&body.x>t.x+28){
    t.resolved=true;if(!t.broken){t.missed=true;stats.misses++;missStreak++;markEvent();
      if(t.crown){crownTargetId=0;say('CROWN RETARGET',GOLD,t.x,t.jointY-14,70);}else say('MISS · RECOVER',BLUE,t.x,t.jointY-14,54);}
    else markProgress();plan=null;
  }
}
function stepTargets(){
  for(const t of targets){
    if(t.exposeT>0&&t.exposeDrop<18){t.exposeT++;t.exposeDrop=Math.min(18,t.exposeDrop+.5);}
    if(t.broken)t.collapseT++;
    for(const b of t.blocks){
      if(b.unsupported&&!b.falling&&t.collapseT>=b.fallDelay)b.falling=true;
      if(b.falling&&!b.settled){
      b.vy+=.075;b.vx*=1-.002/b.mass;b.x+=b.vx;b.y+=b.vy;b.rot+=b.vx*.08/b.mass;
      const ground=terrainY(b.x)-b.h/2;if(b.y>=ground){b.y=ground;b.vx*=.72;b.vy*=-.18/Math.sqrt(b.mass);if(Math.abs(b.vy)<.08)b.settled=true;}
      }
    }
  }
}

function segmentPointDistance(ax,ay,bx,by,px,py){
  const dx=bx-ax,dy=by-ay,d2=dx*dx+dy*dy;if(!d2)return Math.hypot(px-ax,py-ay);
  const t=clamp(((px-ax)*dx+(py-ay)*dy)/d2,0,1),x=ax+dx*t,y=ay+dy*t;return Math.hypot(px-x,py-y);
}
function segmentIntersectsAABB(ax,ay,bx,by,cx,cy,hw,hh){
  const dx=bx-ax,dy=by-ay;let lo=0,hi=1;
  for(const [p,q] of [[-dx,ax-(cx-hw)],[dx,(cx+hw)-ax],[-dy,ay-(cy-hh)],[dy,(cy+hh)-ay]]){
    if(Math.abs(p)<1e-12){if(q<0)return false;continue;}const r=q/p;
    if(p<0){if(r>hi)return false;if(r>lo)lo=r;}else{if(r<lo)return false;if(r<hi)hi=r;}
  }
  return true;
}

function resetRun(full){
  runNo++;runFrame=0;state='run';resultT=0;chapter=1;upgrade=0;missStreak=0;crownTargetId=0;lastBreakFrame=showFrame;
  terrainAmp=RI(29,31);terrainRipple=RI(3,4);worldVariant=RI(1,9999);
  body=makeBody(8);targets=[];debris=[];texts=[];plan=null;planAt=-1e9;targetSerial=0;
  personaIndex=RI(0,PERSONAS.length-1);persona=PERSONAS[personaIndex];lastLapse=false;resetActs();ensureTargets();camX=0;
  runBase={jointBreaks:stats.jointBreaks,coreBreaks:stats.coreBreaks,crownBreaks:stats.crownBreaks,misses:stats.misses,launches:stats.launches};lastOutcome='';
  if(full)SHOW.reset(showFrame);
}
function runCount(key){return stats[key]-(runBase[key]||0);}
function finishRun(){
  if(state!=='run')return;state='ending';resultT=360;stats.endings++;if(stats.firstEnding<0)stats.firstEnding=showFrame;
  const won=runCount('jointBreaks')>=80&&runCount('coreBreaks')>=10&&runCount('crownBreaks')>=1;lastOutcome=won?'RANGE COMPLETE':'RANGE LOST';
  markEvent(won?1200:120);if(won){markProgress(4);offer('crown-array',3,body.x,body.y,'complete');fxBurst(body.x,body.y,46,GOLD,3.2,.02);}
  else offer('last-stand',2,body.x,body.y,'failed');
  say(lastOutcome,won?GOLD:CORAL,body.x,body.y-38,240);shake(won?9:4);
}
function stepWorld(){
  runFrame++;stepActs();ensureTargets();
  if(runFrame>=10800*(upgrade+1)&&upgrade<4){upgrade++;stats.upgrades++;markProgress(1);offer('upgrade',2,body.x,body.y,upgrade);say(['','COMPRESSION +','SHELL +','AIR TRIM +','OVERCHARGE'][upgrade],GOLD,body.x,body.y-25,90);}
  if(showFrame-lastBreakFrame>720){const t=activeTarget();if(t&&!t.exposed){t.exposed=true;t.jointHP=Math.min(t.jointHP,.55);
    if(typeof globalThis.__NO_EXPOSED_RECOVERY==='undefined'){t.exposeT=1;plan=null;planAt=-1e9;}
    offer('joint-exposed',1,t.jointX,t.jointY,t.id);say('JOINT EXPOSED',GOLD,t.x,t.jointY-18,72);}}
  if(runFrame>=49200&&!crownTargetId){const t=targets.find(v=>!v.resolved&&!v.broken&&v.x>body.x-14);if(t){crownTargetId=t.id;t.crown=true;t.core=true;t.jointHP=.9;markProgress();offer('crown-warning',2,t.x,t.jointY,t.id);say('CROWN ARRAY AHEAD',GOLD,t.x,t.jointY-24,150);}}
  chapter=clamp(1+Math.floor(runFrame/10800),1,5);
  if(body.repairT>0){
    if(!body.grounded){const ev=advanceBody(body,{dive:false,trim:0,brace:false},windNow(),true);if(ev.landed){body.vx=body.vy=0;}}
    body.repairT--;if(body.repairT===0){body.y=terrainY(body.x)-RADIUS;body.grounded=true;body.integrity=100;body.vx=1.5;body.vy=0;stats.recoveries++;markProgress();say('BACK ONLINE',MINT,body.x,body.y-18,64);}return;
  }
  const intent=applyIntent(controller());body.lastX=body.x;body.lastY=body.y;
  const ev=advanceBody(body,intent,windNow(),true);
  if(ev.launched){stats.launches++;markEvent(20);offer('crest',1,body.x,body.y,'launch');fxDust(body.x,body.y,7,OCHRE);}
  if(ev.landed){stats.landings++;markEvent();offer('landing',1,body.x,body.y,'land');if(ev.hard>7.5)hardImpact(ev.hard);}
  collideTargets();resolvePassedTargets();stepTargets();
  if(body.needsCoil&&body.grounded)body.coilT++;else if(!body.needsCoil)body.coilT=0;
  if(body.coilT>120){const tan=tangentAt(body.x);body.vx=2.1*tan.x;body.vy=2.1*tan.y;body.coilT=0;body.needsCoil=false;stats.recoveries++;stats.coilRecoveries++;markEvent();say('COIL KICK',MINT,body.x,body.y-16,52);}
  if(body.tumbleT>0)body.tumbleT--;
  if(body.hitT>0)body.hitT--;
  const t=activeTarget(),desired=body.x-42,lead=t&&t.x-body.x<155?t.x-138:desired,
    cameraGoal=Math.min(body.x-18,Math.max(desired,lead));camX+=(cameraGoal-camX)*.11;
  if(runFrame>=54000)finishRun();
}
function step(){
  showFrame++;sessionStep({reset:()=>resetRun(true)});pres=SHOW.step(showFrame);
  if(state==='run'){
    if(!pres.holdWorld&&showFrame%pres.physicsEvery===0)stepWorld();
  }else if(state==='ending'){
    resultT--;if(resultT<=0){if(playing())gameOver(lastOutcome);resetRun(true);}
  }
  stepParts();stepRings();for(const t of texts)t.t--;texts=texts.filter(t=>t.t>0);
}

function sx(x){return x-camX;}
function drawSky(){
  rect(0,0,W,H,SKY);rect(0,116,W,244,SKY2);
  for(let i=0;i<16;i++){const x=(hash(i,3)*W+showFrame*.015*(i%3+1))%W,y=22+hash(i,4)*95;rect(x,y,1,1,'#8792cf');}
  ctx.globalAlpha=.15;for(let i=0;i<4;i++)rect(0,150+i*36,W,1,CREAM);ctx.globalAlpha=1;
}
function drawTerrain(){
  ctx.beginPath();ctx.moveTo(0,H);for(let x=0;x<=W+3;x+=3)ctx.lineTo(x,terrainY(camX+x));ctx.lineTo(W,H);ctx.closePath();ctx.fillStyle='#5b3e3b';ctx.fill();
  ctx.beginPath();for(let x=0;x<=W+3;x+=3){const y=terrainY(camX+x);if(x)ctx.lineTo(x,y);else ctx.moveTo(x,y);}ctx.strokeStyle=OCHRE;ctx.lineWidth=3;ctx.stroke();ctx.lineWidth=1;
}
function drawTarget(t){
  if(t.x<camX-40||t.x>camX+200)return;
  for(const b of t.blocks){ctx.save();ctx.translate(sx(b.x),b.y);ctx.rotate(b.rot);rect(-b.w/2,-b.h/2,b.w,b.h,b.settled?'#5d5664':t.crown?GOLD:b.material==='alloy'?VIOLET:b.material==='beam'?GOLD:CORAL);ctx.restore();}
  if(!t.broken){const joint=targetJoint(t,false),pulse=3+(showFrame%40<20?1:0);
    if(t.exposeDrop>0){ctx.strokeStyle=GOLD;ctx.beginPath();ctx.moveTo(sx(t.jointX),t.jointY);ctx.lineTo(sx(t.jointX),joint.y);ctx.stroke();}
    ringDraw(sx(joint.x),joint.y,pulse,t.crown||t.exposed?GOLD:t.shifted?VIOLET:CREAM);}
}
function ringDraw(x,y,r,c){ctx.strokeStyle=c;ctx.strokeRect(Math.round(x-r)+.5,Math.round(y-r)+.5,r*2,r*2);}
function drawForecast(){
  if(!plan||body.grounded===false&&body.x>(activeTarget()?.x||1e9))return;
  ctx.globalAlpha=.75;for(const p of plan.points||[])if(sx(p.x)>3&&sx(p.x)<157)ringDraw(sx(p.x),p.y,1.5,CREAM);ctx.globalAlpha=1;
  const t=activeTarget();if(t&&!t.broken){const j=targetJoint(t,true);ctx.strokeStyle=GOLD;ctx.strokeRect(sx(j.x)-6.5,j.y-6.5,13,13);}
}
function drawBody(){
  const x=sx(body.x),y=body.y;ctx.save();ctx.translate(x,y);ctx.rotate(body.rot+(body.tumbleT?Math.sin(showFrame*.7)*.32:0));
  ctx.fillStyle=body.repairT?BLUE:MINT;ctx.beginPath();ctx.arc(0,0,RADIUS,0,TAU);ctx.fill();
  rect(-2,-3,6,3,INK);rect(2,-2,1,1,CREAM);ctx.restore();
  if(body.compression>.7){ctx.globalAlpha=.5;ringDraw(x,y,7+body.compression*2,GOLD);ctx.globalAlpha=1;}
  if(body.coilT>30){ctx.globalAlpha=.45+.25*Math.sin(showFrame*.25);ringDraw(x,y,8+body.coilT/35,MINT);ctx.globalAlpha=1;}
  if(body.repairT>0){ctx.strokeStyle=BLUE;ctx.beginPath();ctx.moveTo(x,y-28);ctx.lineTo(x,y-8);ctx.stroke();rect(x-5,y-32,10,5,CREAM);}
}
function drawActs(){
  if(headwind.phase==='warn'){ctx.fillStyle=GOLD;ctx.font='bold 6px monospace';ctx.fillText('HEADWIND '+(headwind.dir>0?'>>':'<<'),50,48);}
  if(headwind.phase==='live'){ctx.globalAlpha=.35;ctx.strokeStyle=CREAM;for(let y=58;y<180;y+=24){ctx.beginPath();ctx.moveTo(headwind.dir>0?8:152,y);ctx.lineTo(headwind.dir>0?40:120,y);ctx.stroke();}ctx.globalAlpha=1;}
  if(plating.phase==='warn'){
    ctx.fillStyle=VIOLET;ctx.font='bold 6px monospace';ctx.fillText('PLATING INBOUND',48,58);
    const t=targets.find(v=>v.id===plating.targetId);if(t){ctx.strokeStyle=VIOLET;ctx.strokeRect(sx(t.x)-22,t.base-72,9,22);}
  }
}
function drawHud(){
  rect(0,0,W,24,INK);ctx.font='bold 7px monospace';ctx.fillStyle=GOLD;ctx.fillText('CRESTCRASH',5,10);
  ctx.font='bold 6px monospace';ctx.fillStyle=persona.color;ctx.fillText((body.intent&&body.intent.tactic)||'MARK JOINT',5,19);
  ctx.fillStyle=CREAM;ctx.fillText('C'+chapter+'  '+runCount('jointBreaks')+' RELAYS',103,10);ctx.fillStyle=MINT;ctx.fillText('SHELL '+Math.max(0,Math.round(body.integrity)),103,19);
}
function draw(){
  drawSky();preDraw();drawTerrain();for(const t of targets)drawTarget(t);drawForecast();drawBody();drawRings();drawParts();
  for(const t of texts){ctx.globalAlpha=Math.min(1,t.t/15);ctx.fillStyle=t.c;ctx.font='bold 7px monospace';ctx.fillText(t.s,sx(t.x)-t.s.length*2.1,t.y);}ctx.globalAlpha=1;
  postDraw();drawActs();drawHud();
  if(pres.cue&&pres.cue.tier>=3){ctx.globalAlpha=.15;rect(0,24,W,H-24,GOLD);ctx.globalAlpha=1;}
  if(state==='ending'){ctx.globalAlpha=.82;rect(12,134,136,72,INK);ctx.globalAlpha=1;ctx.fillStyle=lastOutcome==='RANGE COMPLETE'?GOLD:CORAL;ctx.font='bold 12px monospace';ctx.fillText(lastOutcome,lastOutcome==='RANGE COMPLETE'?25:42,165);ctx.font='bold 7px monospace';ctx.fillStyle=CREAM;ctx.fillText(runCount('jointBreaks')+' RELAYS TOPPLED',42,184);}
  drawSession();

globalThis.__soakProbe=()=>({sig:Math.round(body.x*10)+'|'+Math.round(body.y*10)+'|'+state,events:eventSerial,progress:progressSerial,finite:allFinite()});
globalThis.__crestcrashMotion=()=>[Math.round(body.x*1e4),Math.round(body.y*1e4),Math.round(body.vx*1e4),Math.round(body.vy*1e4),body.grounded,body.intent&&body.intent.dive,body.intent&&body.intent.trim,body.intent&&body.intent.tactic,headwind.phase,plating.phase].join('|');
globalThis.__crestcrashActState=()=>({runFrame,headwind:headwind.phase,plating:plating.phase,tactic:body.intent&&body.intent.tactic});

  Object.assign(headwind,{phase:'calm',warnAt:30,landAt:270,endAt:870,dir:1,count:0});

globalThis.__crestcrashArcFixture=()=>{
  const a={x:20,y:180,vx:3.2,vy:-2.1,rot:0,grounded:false,compression:0},b=Object.assign({},a),intent={dive:false,trim:1,brace:false};
