<script>
'use strict';
const{ctx,W,H,RI,hash,clamp,rect,preDraw,postDraw,shake,stepParts,drawParts,start,
  keys,manual,initSession,sessionStep,drawSession,playing,addScore,createShow,fxBurst,fxDust}=E;
const{controllerMux,skillProfile,createRng}=AI;

// RAIDERS OF THE LOST CART — Indiana Jones through the honest cause-and-effect
// grammar of Boulder Dash. The tiny explorer publishes a plan, walks to each
// mechanism, and lets one shared cart/rock/water integrator decide whether the
// audacious chain works. A carved idol follows a long switchback runway through
// the whole chamber; failure is a visible crush, never a hidden rescue.
const TAU=Math.PI*2,WORLD_TOP=38,WORLD_BOTTOM=338,FLOOR_H=24;
const CREAM='#fff1c8',GOLD='#efb94f',GOLD2='#ffd978',INK='#0b0c09',BROWN='#5b3822',
  LEATHER='#7e4828',RED='#db5a42',CYAN='#67d6d1',BLUE='#3780a8',MOSS='#587a3c',
  ROCK='#6b665b',ROCK_HI='#948b78',SHADOW='#171712';
const ACTIONS=['DIG','PUSH','VALVE'];
const PERMS=[
  ['DIG','PUSH','VALVE'],['DIG','VALVE','PUSH'],['PUSH','DIG','VALVE'],
  ['PUSH','VALVE','DIG'],['VALVE','DIG','PUSH'],['VALVE','PUSH','DIG']
];
const PERSONAS=[
  {name:'PROFESSOR',risk:.72,color:GOLD,tag:'MEASURE TWICE'},
  {name:'FORTUNE',risk:.88,color:CYAN,tag:'TRUST THE CHAIN'},
  {name:'SHOWBOAT',risk:.96,color:RED,tag:'SURELY THIS WORKS'}
];
// Five different spatial compositions share one mechanics contract. Geometry,
// not a hidden success flag, makes each action order fast, slow, or disastrous.
const ROOMS=[
  {name:'MOSS ANTECHAMBER',short:'MOSS SHAFT',sky:'#24301f',far:'#34462a',wall:'#7b6848',
    wallHi:'#a28a5e',floor:'#5b4932',accent:'#80a752',water:'#58b5b4',floorY:292,
    cartX:44,rockX:44,valveX:105,waterX:72,waterDelay:92,sealX:138,threshold:.65,
    push:0.76,waterPush:.36,waterGate:false,safeX:116,
    idolPath:[[14,70],[145,92],[22,151],[142,210],[150,267],[20,274]]},
  {name:'RIVETED WORKSHOP',short:'CART WORKS',sky:'#20282d',far:'#303c42',wall:'#665c4e',
    wallHi:'#94836c',floor:'#443b34',accent:'#d08b45',water:'#69b2c7',floorY:282,
    cartX:49,rockX:112,valveX:28,waterX:55,waterDelay:68,sealX:137,threshold:1.20,
    push:0.67,waterPush:.48,waterGate:true,safeX:26,
    idolPath:[[145,68],[20,105],[139,150],[24,203],[142,248],[18,265]]},
  {name:'SUNKEN CISTERN',short:'CISTERN',sky:'#132c34',far:'#1c4650',wall:'#476b6c',
    wallHi:'#6f9790',floor:'#314f4b',accent:'#69d0be',water:'#67dcea',floorY:296,
    cartX:25,rockX:82,valveX:128,waterX:42,waterDelay:86,sealX:139,threshold:1.16,
    push:0.78,waterPush:1,waterGate:false,safeX:128,
    idolPath:[[18,62],[142,89],[30,141],[138,194],[28,238],[148,272],[18,280]]},
  {name:'CRYSTAL CATACOMB',short:'CRYSTAL DEEP',sky:'#17172a',far:'#292644',wall:'#4d4a63',
    wallHi:'#777394',floor:'#353247',accent:'#9c83e6',water:'#5ccfe2',floorY:286,
    cartX:58,rockX:58,valveX:94,waterX:50,waterDelay:75,sealX:137,threshold:1.28,
    push:0.69,waterPush:.34,waterGate:true,safeX:96,
    idolPath:[[143,64],[20,96],[137,144],[25,185],[140,230],[17,272]]},
  {name:'GOLDEN IDOL VAULT',short:'IDOL VAULT',sky:'#382116',far:'#55341d',wall:'#82613a',
    wallHi:'#b58a4d',floor:'#4e3424',accent:'#f2bd4b',water:'#e56d3c',floorY:290,
    cartX:27,rockX:90,valveX:65,waterX:85,waterDelay:70,sealX:139,threshold:.95,
    push:0.81,waterPush:.78,waterGate:true,safeX:122,
    idolPath:[[18,67],[143,95],[24,143],[139,186],[28,232],[148,266],[18,278]]}
];

let showFrame=0,runFrame=0,roomFrame=0,roomNo=0,roomSeed=1,state='brief',stateT=90,roomPanics=0;
let spec=ROOMS[0],player=null,mech=null,idol=null,scarabs=[],hazards=[],artifact=null;
let plan=null,planIndex=0,taskT=0,taskDone=false,persona=PERSONAS[0],skill=null,skillSeed=1;
let texts=[],debris=[],pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
let eventSerial=0,progressSerial=0,lastEventFrame=0,lastProgressFrame=0,lastLapsed=false;
let visualFixture='',visualT=0,visualIntent=null,visualScaleActors=null;
const stats={rooms:0,artifacts:0,seals:0,perfectChains:0,crushes:0,digs:0,pushes:0,
  valves:0,rockLoads:0,waterHits:0,cartImpacts:0,panics:0,stumbles:0,nearMisses:0,
  lapses:0,actWarnings:0,actLands:0,events:0,progress:0,appliedIntents:0,
  admireIntents:0,maxEventLull:0,maxProgressLull:0,distance:0};
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},2:{frames:44,minGap:80},
  3:{frames:82,minGap:540,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});
const act={phase:'calm',type:'flood',warnAt:2400,landAt:2640,endAt:3360,index:0,
  warnFrames:240,safeX:116,caveX:80};
const actNotes=[];

const finiteObject=o=>Object.values(o||{}).filter(v=>typeof v==='number').every(Number.isFinite);
const allFinite=()=>finiteObject(player)&&finiteObject(mech&&mech.cart)&&finiteObject(mech&&mech.rock)&&
  finiteObject(mech&&mech.water)&&finiteObject(idol)&&finiteObject(artifact)&&
  scarabs.every(finiteObject)&&hazards.every(finiteObject);
function say(s,c,y,t){texts.push({s,c:c||CREAM,y:y===undefined?72:y,t:t||66});}
function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);
  lastEventFrame=showFrame;if(score&&playing())addScore(score);}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);
  lastProgressFrame=showFrame;if(score&&playing())addScore(score);}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+36});}
function noteAct(note){actNotes.push({...note,roomNo});SHOW.note(note);}
function mix(a,b,t){const p=s=>parseInt(s.slice(1),16),aa=p(a),bb=p(b),q=i=>Math.round(((aa>>i)&255)*(1-t)+((bb>>i)&255)*t);
  return'#'+[16,8,0].map(i=>q(i).toString(16).padStart(2,'0')).join('');}

function makeMechanics(s){return{
  cart:{x:s.cartX,y:s.floorY-5,v:0,wheel:0,load:0,hitT:0},
  rock:{x:s.rockX,y:76,vy:0,r:7,released:false,onCart:false,rest:false,hitT:0},
  water:{open:false,progress:0,floor:false,frontX:s.waterX,hit:false},gateOpen:false,sealBroken:false,
  actionMask:0,actionLog:[],breakFrame:-1,bumps:0
};}
function cloneMechanics(m){return{
  cart:{...m.cart},rock:{...m.rock},water:{...m.water},gateOpen:m.gateOpen,
  sealBroken:m.sealBroken,actionMask:m.actionMask,actionLog:m.actionLog.slice(),
  breakFrame:m.breakFrame,bumps:m.bumps
};}
function actionBit(action){return action==='DIG'?1:action==='PUSH'?2:4;}
function triggerMechanicAction(m,action,s){
  if(m.actionMask&actionBit(action))return false;
  m.actionMask|=actionBit(action);m.actionLog.push(action);
  if(action==='DIG'){m.rock.released=true;m.rock.vy=.08;}
  else if(action==='PUSH'){m.cart.v+=s.push;}
  else if(action==='VALVE'){m.water.open=true;}
  return true;
}
// Pure mechanics kernel used unchanged by the live world and copied planner.
// It reads only the state and room geometry handed to it and draws no RNG.
function advanceMechanics(m,s,frame){
  const ev={rockLoaded:false,waterHit:false,cartImpact:false,sealBroke:false};
  if(m.water.open){
    m.water.progress++;
    if(!m.water.floor&&m.water.progress>=s.waterDelay){m.water.floor=true;m.water.frontX=s.waterX;}
    if(m.water.floor){
      m.water.frontX=Math.min(s.sealX,m.water.frontX+.72);
      if(!m.water.hit&&(Math.abs(m.water.frontX-m.cart.x)<=12||m.water.frontX>=m.cart.x-7)){
        m.water.hit=true;m.cart.v+=s.waterPush;ev.waterHit=true;
      }
      if(s.waterGate&&m.water.frontX>=s.sealX-18)m.gateOpen=true;
    }
  }
  const r=m.rock,c=m.cart;
  if(r.released&&!r.rest&&!r.onCart){r.vy+=.052;r.y+=r.vy;
    const cartTop=c.y-10;
    if(r.y+r.r>=cartTop&&r.y-r.r<=c.y+3&&Math.abs(r.x-c.x)<=12){
      r.onCart=true;r.y=cartTop-r.r+1;r.vy=0;c.load=1;c.v+=.36;ev.rockLoaded=true;
    }else if(r.y+r.r>=s.floorY){r.y=s.floorY-r.r;r.vy=0;r.rest=true;}}
  if(r.onCart){r.x=c.x;r.y=c.y-10-r.r+1;}
  c.x+=c.v;c.wheel+=c.v;c.v*=s.friction||.986;
  if(c.x<12){c.x=12;c.v=Math.abs(c.v)*.3;}
  const nose=s.sealX-10;
  if(!m.sealBroken&&c.x>=nose){
    const energy=Math.abs(c.v)*(1+c.load*.72)+(m.water.hit?.16:0),need=m.gateOpen?s.threshold*.56:s.threshold;
    ev.cartImpact=true;m.bumps++;
    if(energy>=need){m.sealBroken=true;m.breakFrame=frame;c.x=nose;c.v=Math.max(.18,c.v*.42);ev.sealBroke=true;}
    else{c.x=nose-1;c.v=-Math.abs(c.v)*.17;c.hitT=8;}
  }
  if(c.hitT>0)c.hitT--;if(r.hitT>0)r.hitT--;
  return ev;
}
function simulateOrder(order,base,s){
  const m=cloneMechanics(base);let brokenAt=-1,px=17,index=0,dwell=0;
  for(let f=0;f<1000;f++){
    if(index<order.length){
      const action=order[index],target=action==='DIG'?clamp(s.rockX-11,14,146):
        action==='PUSH'?clamp(m.cart.x-13,14,146):s.valveX,delta=target-px;
      if(Math.abs(delta)>=2.2){px+=Math.sign(delta)*Math.min(.82,Math.abs(delta));dwell=0;}
      else{dwell++;const need=action==='DIG'?42:action==='PUSH'?86:46;
        if(dwell>=need){triggerMechanicAction(m,action,s);index++;dwell=0;}}
    }
    const ev=advanceMechanics(m,s,f);if(ev.sealBroke&&brokenAt<0)brokenAt=f;
  }
  const score=(m.sealBroken?2400-brokenAt*2:Math.min(m.cart.x,130)*3)+m.cart.load*260+
    (m.water.hit?70:0)-m.bumps*35-(index<order.length?120:0);
  return{order:order.slice(),score,brokenAt,sealBroken:m.sealBroken,load:m.cart.load,
    bumps:m.bumps,cartX:m.cart.x,actions:index,signature:[m.sealBroken,brokenAt,m.cart.load,m.bumps,index,
      Math.round(m.cart.x*1e4),Math.round(m.cart.v*1e4)].join('|')};
}
function reactivePlan(){return{order:['PUSH','DIG','VALVE'],reactive:true,score:0};}
function buildPlan(){
  if(typeof globalThis.__NO_CHAIN_PLAN!=='undefined')return reactivePlan();
  const candidates=PERMS.map(order=>simulateOrder(order,makeMechanics(spec),spec));
  candidates.sort((a,b)=>b.score-a.score||a.order.join('').localeCompare(b.order.join('')));
  return candidates[0];
}

function pathMetrics(points){const lengths=[];let total=0;for(let i=1;i<points.length;i++){
  const a=points[i-1],b=points[i],d=Math.hypot(b[0]-a[0],b[1]-a[1]);lengths.push(d);total+=d;}
  return{lengths,total};}
function pathPoint(points,metrics,d){d=clamp(d,0,metrics.total);for(let i=0;i<metrics.lengths.length;i++){
  const len=metrics.lengths[i];if(d<=len){const a=points[i],b=points[i+1],t=len?d/len:0;
    return{x:a[0]+(b[0]-a[0])*t,y:a[1]+(b[1]-a[1])*t,angle:Math.atan2(b[1]-a[1],b[0]-a[0])};}d-=len;}
  const z=points.at(-1),p=points.at(-2);return{x:z[0],y:z[1],angle:Math.atan2(z[1]-p[1],z[0]-p[0])};}

function resetActs(){Object.assign(act,{phase:'calm',type:'flood',warnAt:2400,landAt:2640,endAt:3360,index:0,
  warnFrames:240,safeX:116,caveX:80});actNotes.length=0;}
function startRoom(first){
  roomNo++;spec=ROOMS[(roomNo-1)%ROOMS.length];roomSeed=RI(1,0x7fffffff);roomFrame=0;
  state='brief';stateT=first?100:82;taskT=0;taskDone=false;planIndex=0;roomPanics=0;texts=[];debris=[];hazards=[];
  mech=makeMechanics(spec);artifact={x:spec.sealX-1,y:spec.floorY-26,vx:0,vy:0,loose:false,taken:false,spin:0};
  player={x:17,y:spec.floorY,face:1,pose:'RUN',stride:0,actionT:0,inv:0,stumble:0,
    intent:null,lastX:17,lastY:spec.floorY,carrying:false,exitWait:false};
  const pm=pathMetrics(spec.idolPath),p=pathPoint(spec.idolPath,pm,0);
  idol={x:clamp(p.x,17,143),y:p.y,d:0,angle:p.angle,spin:0,speed:Math.min(.52,.26+roomNo*.006),metrics:pm,near:false};
  scarabs=[0,1].map(i=>({id:i,x:48+i*46+hash(roomSeed,i)*12,y:spec.floorY-2,
    vx:(i?-.22:.25)*(1+hash(i,roomSeed)*.25),leg:i,hitT:0}));
  plan=buildPlan();
  if(!first){say(spec.name,spec.accent,66,88);markProgress(80);}
}
function resetRun(){
  runFrame=0;roomNo=0;eventSerial=0;progressSerial=0;lastEventFrame=showFrame;lastProgressFrame=showFrame;
  Object.keys(stats).forEach(k=>stats[k]=0);persona=PERSONAS[RI(0,PERSONAS.length-1)];
  skillSeed=RI(1,0x7fffffff);skill=skillProfile({rng:createRng(skillSeed),skill:.82,precision:.85,
    risk:persona.risk,recovery:.9,reactionFrames:[3,7],lapseChance:.00062,lapseFrames:[16,34]});
  lastLapsed=false;resetActs();SHOW.reset(showFrame);startRoom(true);
}

function taskAction(){return plan&&plan.order[planIndex]||null;}
function actionX(action){
  if(action==='DIG')return clamp(spec.rockX-11,14,146);
  if(action==='PUSH')return clamp(mech.cart.x-13,14,146);
  if(action==='VALVE')return spec.valveX;
  if(action==='GRAB')return artifact.x;
  if(action==='EXIT')return 150;
  return player.x;
}
function idolRemaining(){return idol.metrics.total-idol.d;}
function currentGoal(){
  if(mech.sealBroken&&!artifact.taken)return'GRAB';
  if(artifact.taken)return'EXIT';
  if(roomFrame>650&&planIndex>=plan.order.length)return'PANIC';
  return taskAction()||'PANIC';
}
function rawBotIntent(){
  const danger=idolRemaining()<70;
  if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined'&&!danger){stats.admireIntents++;
    return{move:0,climb:false,action:'WAIT',targetX:player.x,tactic:'ADMIRE THE CHAIN'};}
  if(act.phase!=='calm'){
    const tx=act.type==='flood'?act.safeX:(act.caveX<80?132:28);
    const near=Math.abs(tx-player.x)<3;
    return{move:near?0:Math.sign(tx-player.x),climb:act.type==='flood'&&near,action:'WAIT',targetX:tx,
      tactic:act.type==='flood'?(act.phase==='warn'?'CLIMB ABOVE FLOOD':'HOLD THE HIGH LEDGE'):
        (act.phase==='warn'?'CLEAR THE FALL LINE':'DODGE THE DEBRIS')};
  }
  const goal=currentGoal();
  if(goal==='PANIC'){const tx=mech.cart.x-13,near=Math.abs(tx-player.x)<2.2;
    return{move:near?0:Math.sign(tx-player.x),climb:false,action:near?'PUSH':'WAIT',targetX:tx,tactic:'PANIC SHOVE'};}
  const tx=actionX(goal),near=Math.abs(tx-player.x)<2.2;
  return{move:near?0:Math.sign(tx-player.x),climb:false,action:near?goal:'WAIT',targetX:tx,
    tactic:goal==='DIG'?'DIG THE SUPPORT':goal==='PUSH'?'PUSH THE CART':goal==='VALVE'?'TURN THE SLUICE':
      goal==='GRAB'?'STEAL THE IDOL':goal==='EXIT'?'RUN FOR DAYLIGHT':'READ THE ROOM'};
}
function lapseIntent(_,previous){const base=previous||rawBotIntent();return{...base,move:0,climb:false,action:'WAIT',targetX:player.x,tactic:'SECOND-GUESSES IT'};}
function botIntent(){
  if(typeof globalThis.__NO_LAPSE!=='undefined'){lastLapsed=false;return rawBotIntent();}
  const before=skill.isLapsed(runFrame),intent=skill.decide(runFrame,null,rawBotIntent,lapseIntent),after=skill.isLapsed(runFrame);
  if(!before&&after){stats.lapses++;markEvent();}lastLapsed=after;return intent||rawBotIntent();
}
function humanIntent(){
  const move=(keys.right?1:0)-(keys.left?1:0);
  const action=keys.a?'DIG':keys.b?'PUSH':keys.c?'VALVE':'WAIT';
  return{move,climb:!!keys.up,action,targetX:player.x+move*20,tactic:'MANUAL '+(action==='WAIT'?'MOVE':action)};
}
const controller=controllerMux({human:humanIntent,ai:botIntent,manual:()=>playing()||manual()});
function applyIntent(intent){player.intent=intent;stats.appliedIntents++;return intent;}

function nearActionStation(action){
  if(Math.abs(player.y-spec.floorY)>4)return false;
  if(action==='DIG')return Math.abs(player.x-(spec.rockX-11))<4;
  if(action==='PUSH')return Math.abs(player.x-(mech.cart.x-13))<5;
  if(action==='VALVE')return Math.abs(player.x-spec.valveX)<4;
  return false;
}
function finishAction(action){
  const physicalAction=action==='PANIC'?'PUSH':action;
  if(!nearActionStation(physicalAction))return false;
  if(action==='PANIC'||(action==='PUSH'&&planIndex>=plan.order.length)){
    mech.cart.v+=spec.push*2.25;stats.panics++;roomPanics++;markEvent(2);say('PANIC SHOVE!',RED,238,40);return true;
  }
  if(!triggerMechanicAction(mech,action,spec))return false;
  if(action==='DIG'){stats.digs++;fxDust(spec.rockX,spec.floorY-78,8,spec.wallHi);}
  else if(action==='PUSH'){stats.pushes++;fxDust(mech.cart.x,spec.floorY,5,spec.floor);}
  else{stats.valves++;fxDust(spec.valveX,spec.floorY-12,7,spec.water);}
  markEvent(4);offer(action.toLowerCase(),1,player.x,player.y-10,action);
  if(planIndex<plan.order.length&&plan.order[planIndex]===action)planIndex++;
  taskT=0;taskDone=false;return true;
}
function stepPlayer(){
  if(player.inv>0)player.inv--;if(player.stumble>0){player.stumble--;player.pose='STUMBLE';return;}
  const intent=applyIntent(controller());player.lastX=player.x;player.lastY=player.y;
  let speed=intent.move*.82;if(act.phase==='live'&&act.type==='flood'&&player.y>spec.floorY-8)speed*=.72;
  player.x=clamp(player.x+speed,9,151);
  const canClimb=intent.climb&&Math.abs(player.x-spec.safeX)<4,targetY=canClimb?spec.floorY-16:spec.floorY,
    climbStep=clamp(targetY-player.y,-.65,.65);player.y+=climbStep;
  stats.distance+=Math.abs(player.x-player.lastX)+Math.abs(player.y-player.lastY);
  if(Math.abs(climbStep)>.05){player.pose='CLIMB';player.stride+=Math.abs(climbStep);taskT=0;}
  else if(speed){player.face=speed>0?1:-1;player.stride+=Math.abs(speed);player.pose='RUN';taskT=0;}
  else if(intent.action==='DIG'||intent.action==='PUSH'||intent.action==='VALVE'){
    const actual=intent.tactic==='PANIC SHOVE'?'PANIC':intent.action;
    player.pose=intent.action;taskT++;const need=intent.action==='DIG'?42:intent.action==='PUSH'?86:46;
    if(taskT>=need){finishAction(actual);taskT=0;}
  }else player.pose=intent.tactic==='ADMIRE THE CHAIN'?'ADMIRE':intent.tactic.includes('FLOOD')?'CLIMB':
    intent.tactic.includes('FALL LINE')?'GLANCE':'IDLE';
  if(mech.sealBroken&&!artifact.taken&&Math.abs(player.x-artifact.x)<5&&Math.abs(player.y-artifact.y)<25){
    artifact.taken=true;player.carrying=true;stats.artifacts++;markProgress(120);markEvent(25);
    offer('artifact',2,player.x,player.y-16,'LOST IDOL');fxBurst(player.x,player.y-16,18,GOLD,2.2,.03);
    say('ARTIFACT SECURED',GOLD2,72,72);
  }
  if(artifact.taken&&player.x>=148)completeRoom();
}
function handleMechanicEvents(ev){
  if(ev.rockLoaded){stats.rockLoads++;markEvent(15);offer('rock-load',1,mech.cart.x,mech.cart.y,'CLUNK');
    fxDust(mech.cart.x,mech.cart.y,10,ROCK_HI);say('ROCK RIDES THE CART',CREAM,222,52);}
  if(ev.waterHit){stats.waterHits++;markEvent(12);offer('water-hit',1,spec.waterX,spec.floorY-8,'WHOOSH');
    fxDust(spec.waterX,spec.floorY-8,12,spec.water);}
  if(ev.cartImpact){stats.cartImpacts++;markEvent(4);shake(2);}
  if(ev.sealBroke){stats.seals++;artifact.loose=true;artifact.vx=-.34;artifact.vy=-1.35;markProgress(70);markEvent(35);
