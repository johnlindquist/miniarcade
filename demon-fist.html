<canvas id="cv" width="320" height="720" tabindex="0"
  aria-label="Demon Fist. A tiny God Hand brawler for the 4:9 strip: one fighter and his cursed right fist walk five city blocks — sprinting the clear stretches, leaping in with the DEMON DROP, jabbing, launching, juggling and sweeping every thug and demon that steps up — until the Demon Gate itself sends its crowned keeper."></canvas>

<script>
'use strict';
const{ctx,W,H,random,RI,hash,clamp,rect,stepParts,drawParts,ring,stepRings,drawRings,
  shake,preDraw,postDraw,start,keys,manual,initSession,sessionStep,drawSession,playing,
  addScore,gameOver,createShow,fxBurst,fxDust}=E;
const{controllerMux,skillProfile,createRng}=AI;

// DEMON FIST — a God Hand spinoff for the 4:9 strip. One fighter with a cursed
// right fist walks five authored blocks — BACK ALLEY, MARKET ROOF, DOCK SIDE,
// OLD DOJO, DEMON GATE — and everything that steps up gets read, answered, and
// put down: jab chains, launchers, air slams, crowd sweeps, dodge-on-the-tell
// counters, the DEMON DROP leap with its landing quake, a full sprint on the
// clear stretches, and the GOD WHEEL roulette super when the meter burns full.
// Nothing pre-draws intent (motion contract): no route lines, no target
// highlights, no predicted arcs — tells live on the bodies (the pulled-back
// fist, the bruiser's overhead raise, the demon's ember gape, the keeper's
// crown). Every actor — fighter, thug, bruiser, sprinter, demon, elite, the
// human, the bot, and the copied-state fight planner — moves through ONE
// shared integrator every frame, and the body always faces its actual travel.
const TAU=Math.PI*2,GROUND_Y=308,CAM_HOME=52,BLOCK_W=1260,RUN_FRAMES=37800,GRAV=.17;
// TMNT pacing constants: the walk is brisk, a clear runway breaks into a RUN,
// and the DEMON DROP leap closes gaps with a landing quake. Sprint requires an
// empty street within SPRINT_RADIUS so a live brawl is never outrun mid-fight.
// SPRINT_RADIUS sits beyond the 150px wave spawn ring: a crew walking in from
// either edge — including a rear pincer — always suppresses the run, so the
// street can never be outrun mid-encounter.
const WALK_TOP=1.45,WALK_ACCEL=.14,SPRINT_TOP=2.35,SPRINT_RADIUS=200,JUMP_VY=2.6,JUMP_CD=46;
const INK='#07080d',CREAM='#fff3da',GOLD='#ffb02e',AMBER='#ff8a3d',CORAL='#ff5d4f',
  MINT='#67e8a2',CYAN='#59d8f5',STEEL='#9aa7b8',BLOOD='#c92c3c';
const BLOCKS=[
  {name:'BACK ALLEY',kind:'alley',sky:['#0a0c16','#12102a','#1a1436'],far:'#141228',
    mid:'#2c2648',trim:'#3c3462',accent:'#ff4fa7',light:'#59d8f5',street:'#1c1a2e',seam:'#342e52'},
  {name:'MARKET ROOF',kind:'market',sky:['#241430','#4a2438','#8a4a3a'],far:'#2c1a2e',
    mid:'#54304a',trim:'#7a4a54',accent:'#ffd166',light:'#ffe9a8',street:'#3a2c34',seam:'#5c4450'},
  {name:'DOCK SIDE',kind:'dock',sky:['#081420','#0e2432','#143444'],far:'#0e2230',
    mid:'#1e3a4a',trim:'#2e5a6a',accent:'#59d8f5',light:'#b8f0ff',street:'#24343a',seam:'#3c545c'},
  {name:'OLD DOJO',kind:'dojo',sky:['#1c1016','#3a1c22','#6a2e2a'],far:'#2c161c',
    mid:'#4a2a2c',trim:'#6a3c38',accent:'#ff8a5d',light:'#ffd8a8',street:'#33262a',seam:'#4f3a3c'},
  {name:'DEMON GATE',kind:'gate',sky:['#120a10','#2a0e14','#4a1216'],far:'#1e0c12',
    mid:'#34121a',trim:'#4e1a20',accent:'#ff5d4f',light:'#ffb08a',street:'#261418',seam:'#44222a'}
];
// Enemy grammar: four street demons plus the crowned elite. windup is the
// readable tell (frames), range/dmg the commitment, recover the punish window.
const ENEMY_KINDS={
  thug:{label:'THUG',hp:3,speed:1.15,windup:16,strike:6,recover:16,range:11,dmg:6,top:2.9,
    body:'#5a6a8a',trim:'#c9a24e',skin:'#d8a07b'},
  sprinter:{label:'SPRINTER',hp:2,speed:1.7,windup:8,strike:5,recover:12,range:10,dmg:4,top:3.4,
    body:'#3e8a68',trim:'#eafff2',skin:'#c9a07b'},
  bruiser:{label:'BRUISER',hp:5,speed:.85,windup:24,strike:7,recover:22,range:13,dmg:12,top:2.6,
    body:'#c98a6a',trim:'#e0483c',skin:'#c98a6a'},
  demon:{label:'DEMON',hp:6,speed:1.0,windup:26,strike:7,recover:18,range:13,dmg:15,top:3.0,
    body:'#4a2a5e',trim:'#d8cba8',skin:'#6a3a7e'},
  elite:{label:'GATEKEEPER',hp:8,speed:.95,windup:30,strike:8,recover:20,range:14,dmg:19,top:2.8,
    body:'#2a1a3e',trim:GOLD,skin:'#4a2a5e'}
};
// Fighter move grammar (frames): startup -> active -> recover. The jab chain
// buffers into jab2/jab3; the finisher knocks back. Launcher pops airborne and
// cracks bruiser armor; sweep hits both sides and knocks down; the slam spikes
// an airborne target into the dirt; GOD WHEEL spends a full meter on a
// three-pulse roulette that launches the whole street.
const MOVES={
  jab1:{startup:4,active:3,recover:8,range:14,dmg:1,meter:3,knock:.5,chain:'jab2'},
  jab2:{startup:3,active:3,recover:8,range:14,dmg:1,meter:3,knock:.5,chain:'jab3'},
  jab3:{startup:5,active:3,recover:12,range:15,dmg:2,meter:4,knock:2.4},
  launcher:{startup:8,active:4,recover:15,range:12,dmg:1,meter:8,knock:.6,launch:true},
  sweep:{startup:7,active:5,recover:15,range:15,dmg:1,meter:6,knock:1.2,knockdown:true,both:true}
};
const DODGE_WINDOW={thug:8,sprinter:6,bruiser:11,demon:12,elite:13};

let showFrame=0,runFrame=0,state='run',resultT=0,outcome='',worldSeed=1,skillSeed=1;
// True exactly while a human owns the controller (playing session or manual
// takeover). Bot-side helpers that act on the fighter OUTSIDE the intent mux
// (the anti-stall backstop, attack auto-facing) must check this: a human who
// pressed nothing must see the fighter do nothing. Headless/eval/render runs
// never press keys, so this stays false there and the bot sim is untouched.
let manualDrive=false;
let fighter=null,enemies=[],texts=[],plan=null,planAt=-1e9,skill=null,visualIntent=null;
let camX=0,waveTriggers=[],waveCursor=0,enemySerial=0,tokenCount=0,pendingWaves=new Set();
let lastSegment=0,lastBlock=0,finaleT=0;
let pres={cue:null,t:0,holdWorld:false,physicsEvery:1,admire:false};
let eventSerial=0,progressSerial=0,lastEventFrame=0,lastProgressFrame=0,lastLapsed=false;
// ---- good/bad feedback presentation (all sim-inert) -------------------------
// Sparks/debris are engine particles on the sim-inert fx stream; the edge pulse
// tags each beat gold (good) or coral (bad); STATIC world-anchored aftermath
// decals (marks[]) carry the palette-separated signature exactly where the beat
// happened. feedback is the append-only ledger evals/feedback.js crops against
// a same-seed __NO_PAYOFF_FX twin. Nothing here is read by physics or RNG.
let goodPulse=0,badPulse=0,feedback=[],feedbackSerial=0,marks=[];
function cue(kind,id,wx,wy,pulse){
  const worldX=wx===undefined?fighter.x:wx,height=wy===undefined?12:wy;
  feedback.push({serial:feedbackSerial++,frame:runFrame,show:showFrame,kind,id,
    sx:Math.round(clamp(worldX-camX,0,W)),
    sy:Math.round(clamp(GROUND_Y-height,34,H-6))});
  if(feedback.length>420)feedback.splice(0,feedback.length-420);
  if(kind==='good')goodPulse=Math.max(goodPulse,pulse===undefined?.45:pulse);
  else badPulse=Math.max(badPulse,pulse===undefined?.55:pulse);
}
const stats={segments:0,blocks:1,kos:0,hits:0,hitsTaken:0,launchers:0,slams:0,sweeps:0,sweepHits:0,
  dodges:0,counters:0,cracks:0,supers:0,comboMilestones:0,comboDrops:0,knockdowns:0,
  waves:0,waveClears:0,acts:0,eliteKos:0,mobClears:0,noHitMobs:0,actClears:0,lapses:0,
  whiffs:0,contacts:0,comboBest:0,jabs:0,finishers:0,thug:0,sprinter:0,bruiser:0,demon:0,elite:0,
  jumps:0,jumpHits:0,sprints:0,sprintArrivals:0,
  events:0,progress:0,maxEventLull:0,maxProgressLull:0,maxStep:0,appliedIntents:0,admireIntents:0};
const SHOW=createShow({queueLimit:3,recoveryGap:90,tiers:{
  1:{frames:12},2:{frames:44,minGap:100},
  3:{frames:84,minGap:600,hold:6,slowEvery:3,slowFrames:24,admire:48}
}});
const act={phase:'calm',type:'gate',warnAt:3300,landAt:3540,endAt:5940,index:0,
  eliteId:-1,mobIds:[],hitsAtLand:0,notes:[],warnMid:false};

const mod=(n,d)=>((n%d)+d)%d;
const round=(v,n)=>{const p=Math.pow(10,n||4);return Math.round(v*p)/p;};
const mix=(a,b,t)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16),
  m=s=>Math.round((pa>>s&255)+((pb>>s&255)-(pa>>s&255))*t);
  return'#'+((1<<24)+(m(16)<<16)+(m(8)<<8)+m(0)).toString(16).slice(1);};
const poly=(points,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.closePath();ctx.fill();};
const line=(points,c,w)=>{ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.stroke();ctx.lineWidth=1;};
const sx=wx=>wx-camX; // world x -> screen x
const blockIndex=()=>clamp(Math.floor(fighter.x/BLOCK_W),0,BLOCKS.length-1);
const currentBlock=()=>BLOCKS[blockIndex()];
const specOf=e=>ENEMY_KINDS[e.kind];
const aliveEnemies=()=>enemies.filter(e=>e.state!=='flee');
const say=(s,c,y,t,x)=>texts.push({s,c:c||CREAM,y:y===undefined?36:y,x:x===undefined?fighter.x:x,t:t||70});
function markEvent(score){eventSerial++;stats.events++;stats.maxEventLull=Math.max(stats.maxEventLull,showFrame-lastEventFrame);
  lastEventFrame=showFrame;if(score&&playing())addScore(score);}
function markProgress(score){progressSerial++;stats.progress++;stats.maxProgressLull=Math.max(stats.maxProgressLull,showFrame-lastProgressFrame);
  lastProgressFrame=showFrame;if(score&&playing())addScore(score);}
function offer(id,tier,x,y,tag){return SHOW.offer({id,tier,at:showFrame,x,y,tag,expiresAt:showFrame+30});}
function allFinite(){return[fighter.x,fighter.y,fighter.vx,fighter.vy,fighter.hp,fighter.meter,camX,runFrame]
  .every(Number.isFinite)&&enemies.every(finiteBody);}
function finiteBody(e){return[e.x,e.y,e.vx,e.vy].every(Number.isFinite);}

// ---- world generation: wave triggers per block -------------------------------
// Four waves per block, seeded offsets. Compositions escalate by block; the
// endless DEMON GATE stretch repeats block 4's roster. All hash-driven.
function buildWaves(){
  waveTriggers=[];
  for(let b=0;b<24;b++){
    const kind=Math.min(b,4);
    for(let i=0;i<4;i++){
      const x=b*BLOCK_W+240+i*250+Math.floor(hash(b*17+i*7,worldSeed*13)*44);
      waveTriggers.push({x,comp:waveComp(kind,i,b*4+i),id:'wave-'+b+'-'+i});
    }
  }
  waveTriggers.sort((a,b)=>a.x-b.x);
}
function waveComp(block,i,n){
  const R=hash(n*31+7,worldSeed*7);
  if(block===0)return[['thug','thug'],['thug','thug','sprinter'],['thug','thug','thug'],['bruiser','thug']][i];
  if(block===1)return[['thug','sprinter','thug'],['bruiser','thug'],['sprinter','sprinter','thug'],['bruiser','thug','thug']][i];
  if(block===2)return[['thug','demon'],['bruiser','sprinter','thug'],['demon','thug','thug'],['bruiser','demon']][i];
  if(block===3)return[['demon','sprinter'],['bruiser','sprinter','sprinter'],['demon','demon'],['demon','bruiser','thug']][i];
  return R<.25?['demon','demon','thug']:R<.5?['bruiser','demon','sprinter']:R<.75?['bruiser','bruiser','demon']:['demon','sprinter','sprinter','thug'];
}
function makeFighter(x){return{x,y:0,vx:0,vy:0,face:1,hp:60,meter:0,combo:0,comboT:0,
  state:'free',stateT:0,atkKind:null,atkT:0,atkPhase:'',atkDir:1,atkHits:null,chain:0,
  slamTarget:-1,focusId:-1,repositionT:0,repositionDir:1,dodgeCd:0,iframesT:0,invulnT:0,hitFlashT:0,knockT:0,gloryT:0,lockFace:false,
  jumpCd:0,jumpDir:1,jumpVx:0,sprintT:0, // acrobatics fields live in the factory: the boot frame renders before the first sim step
  walkPhase:0,lean:0,grounded:true,landed:false,intent:null,lastX:x,lastY:0,isFighter:true};}
function makeEnemy(kind,x,side){const spec=ENEMY_KINDS[kind];return{id:enemySerial++,kind,x,y:0,vx:0,vy:0,
  face:side||-1,hp:spec.hp,hpMax:spec.hp,armor:kind==='bruiser',state:'enter',stateT:0,attackCd:60,
  vulnerT:0,hitFlashT:0,teleCd:220+((enemySerial*37)%120),recentHits:0,sidePref:side||-1,
  elite:kind==='elite',crowned:kind==='elite',walkPhase:0,lean:0,grounded:true,landed:false,lockFace:false};}
function spawnEnemy(kind,x,side){
  const e=makeEnemy(kind,x,side);enemies.push(e);stats[kind]=(stats[kind]||0)+1;return e;
}

// ---- ONE shared physics integrator -------------------------------------------
// Fighter, every enemy, the human, the bot, and the copied-state fight planner
// all move through advanceBrawler EVERY frame. It owns horizontal accel toward
// the intent, friction, gravity and the ground clamp, and it ALWAYS writes the
// pose fields (face/walkPhase/lean) — a pose left unset is an invisible actor.
// face tracks ACTUAL travel while unlocked; attack windups lock an authored
// pose facing. Pose fields are presentation only: physics never reads them and
// they never enter the replay signature.
function advanceBrawler(b,move,opts){
  opts=opts||{};
  const top=opts.top===undefined?1:opts.top,accel=opts.accel===undefined?.085:opts.accel;
  // Every enemy carries a tiny unique sway on top of its intent (same trick as
  // the reference pack's lane drift): no body can ever sit in a 2px band.
  if(!b.isFighter)move=(move||0)+Math.sin(showFrame*.031+(b.id||0)*2.3)*.14;
  const want=clamp(move||0,-1,1)*top;
  const auth=b.grounded===false?accel*.35:accel; // air control is honest but weak
  b.vx+=clamp(want-b.vx,-auth,auth);
  if(!(move||0)&&b.y<=0)b.vx*=.82; // grounded friction: knocks/hitstuns slide out
  b.x+=b.vx;
  if(b.y>0||b.vy!==0){
    b.vy-=GRAV;b.y+=b.vy;
    if(b.y<=0){b.y=0;if(b.vy<-1.2)b.landed=true;b.vy=0;}
  }
  b.grounded=b.y<=0;
  if(!opts.lockFace){
    if(Math.abs(b.vx)>.12)b.face=Math.sign(b.vx);
    else if(opts.idleFace)b.face=opts.idleFace;
  }
  if(b.grounded)b.walkPhase=(b.walkPhase||0)+Math.abs(b.vx)*.62;
  const leanTarget=opts.lean===undefined?clamp(b.vx*.22,-.3,.3):opts.lean;
  b.lean=(b.lean||0)+(leanTarget-b.lean)*.22;
  return b;
}

// ---- combat ------------------------------------------------------------------
function nearestEnemy(x,filter){
  let best=null,bd=1e9;
  for(const e of aliveEnemies()){
    if(filter&&!filter(e))continue;
    if(e.state==='down'||e.state==='vanish'||e.state==='appear'||e.state==='launched')continue;
    const d=Math.abs(e.x-x);if(d<bd){bd=d;best=e;}
  }
  return best;
}
function startAttack(kind){
  const f=fighter;
  if(f.state!=='free'&&!(f.state==='attack'&&f.atkPhase==='recover'&&MOVES[f.atkKind].chain))return false;
  if(kind==='super'){
    // Full meter normally; the wheel spins at half when the back is on the wall.
    const cost=f.hp<50?50:100;
    if(f.meter<cost||f.state!=='free')return false;
    f.meter=0;f.state='super';f.stateT=56;f.atkHits={};f.lockFace=false;f.iframesT=56;
    stats.supers++;markEvent(20);markProgress(4);
    cue('good','super',f.x,14,1);offer('super',3,f.x,14,'GOD WHEEL');
    marks.push({kind:'super',x:f.x,y:0,f:runFrame});if(marks.length>40)marks.shift();
    fxBurst(sx(f.x),GROUND_Y-14,26,GOLD,2.6,.01);fxBurst(sx(f.x),GROUND_Y-14,12,'#ffffff',2);
    ring(sx(f.x),GROUND_Y-12,GOLD,2.6,30);shake(5);
    say('GOD WHEEL',GOLD,64,90);
    return true;
  }
  if(kind==='slam'){
    let t=null,bd=1e9;
    for(const e of aliveEnemies()){
      if(e.y<=4||e.state==='down'||e.state==='vanish'||e.state==='appear'||e.state==='flee')continue;
      const d=Math.abs(e.x-f.x);if(d<bd){bd=d;t=e;}
    }
    if(!t||bd>19)return false;
    f.state='slam';f.stateT=34;f.slamTarget=t.id;f.vy=3.2;f.lockFace=true;f.face=Math.sign(t.x-f.x)||1;
    return true;
  }
  if(kind==='jump'){
    // Air-to-air first: an airborne mark in reach turns the leap into the slam.
    let air=null,ad=1e9;
    for(const e of aliveEnemies()){
      if(e.y<=4||e.state==='down'||e.state==='vanish'||e.state==='appear')continue;
      const d=Math.abs(e.x-f.x);if(d<ad){ad=d;air=e;}
    }
    if(air&&ad<=19)return startAttack('slam');
    if(typeof globalThis.__NO_ACROBATICS!=='undefined')return false;
    if(f.state!=='free'||!f.grounded||f.jumpCd>0)return false;
    // DEMON DROP: crouch -> leap arc -> landing quake. The launch speed is
    // sized to land ON the mark, and a held arrow owns the direction.
    const held=f.intent&&Math.abs(f.intent.move||0)>.1?Math.sign(f.intent.move):0;
    f.jumpDir=held||f.face||1;
    // Intercept lead: the mark keeps walking during the ~35f arc, so the
    // launch speed aims at where it is GOING (its current velocity, nothing
    // predicted beyond honest extrapolation), not where it stands.
    const mark=nearestEnemy(f.x,e=>Math.sign(e.x-f.x||f.jumpDir)===f.jumpDir);
    const lead=mark?clamp(Math.abs(mark.x+mark.vx*30-f.x),12,58):46;
    f.jumpVx=mark?clamp(lead/31,.9,1.75):1.5;
    f.state='jump';f.stateT=5;f.atkPhase='crouch';f.atkKind=null;
    f.lockFace=true;f.face=f.jumpDir;f.jumpCd=JUMP_CD;
    stats.jumps++;markEvent(2);
    return true;
  }
  // The bot/human say 'jab'; the chain maps it to the next chain step.
  let use=kind;
  if(kind==='jab'){
    if(f.state==='attack'&&f.atkPhase==='recover'&&MOVES[f.atkKind].chain)use=MOVES[f.atkKind].chain;
    else if(f.state!=='free')return false;
    else use='jab1';
  }else if(f.state!=='free')return false;
  const spec=MOVES[use];if(!spec)return false;
  f.state='attack';f.atkKind=use;f.atkT=0;f.atkPhase='startup';f.atkHits={};
  f.chain=use==='jab1'?1:use==='jab2'?2:use==='jab3'?3:0;
  if(use==='sweep')stats.sweeps++;
  // Auto-target assist turns toward the nearest body — but never against a
  // human's held arrow: the player owns the attack direction (manual purity).
  const t=nearestEnemy(f.x);f.lockFace=true;
  const held=manualDrive&&f.intent&&Math.abs(f.intent.move||0)>.3?Math.sign(f.intent.move):0;
  if(held)f.face=held;
  else if(t&&Math.abs(t.x-f.x)<40)f.face=Math.sign(t.x-f.x)||f.face;
  f.atkDir=f.face;
  return true;
}
function startDodge(){
  const f=fighter;
  if(f.state!=='free'||f.dodgeCd>0)return false;
  f.state='dodge';f.stateT=12;f.iframesT=12;f.dodgeCd=34;f.lockFace=true;
  // Face the tell being answered; any enemy winding up in range is now BAITED:
  // when its committed strike completes into empty air, the punish window opens.
  // A human holding an arrow owns the travel: the backstep (move=-face) goes
  // toward the held direction instead of the bot's auto-evade line.
  let dir=f.face;
  const held=manualDrive&&f.intent&&Math.abs(f.intent.move||0)>.3?Math.sign(f.intent.move):0;
  for(const e of aliveEnemies()){
    if(e.state!=='windup')continue;
    if(Math.abs(e.x-f.x)<specOf(e).range+10){e.baited=true;if(!held)dir=Math.sign(e.x-f.x)||dir;}
  }
  if(held)dir=-held;
  f.face=dir;
  return true;
}
function addMeter(n){fighter.meter=clamp(fighter.meter+n*(fighter.hp<25?1.5:1),0,100);}
function addCombo(n){
  const f=fighter;f.combo+=n;f.comboT=100;stats.comboBest=Math.max(stats.comboBest,f.combo);
  if(f.combo===5){markEvent(1);markProgress(1);}
  if([10,15,20,25,30,40,50].includes(f.combo)){
    stats.comboMilestones++;markEvent(10);markProgress(2);
    cue('good','combo',f.x,26,.5);offer('combo',f.combo>=20?2:2,f.x,26,f.combo);
    marks.push({kind:'combo',x:f.x,y:0,f:runFrame});if(marks.length>40)marks.shift();
    fxBurst(sx(f.x),GROUND_Y-26,10,GOLD,1.7);

    else{e.state='down';e.stateT=30;e.vy=2.2;e.vx=f.atkDir*2.4;e.stomped=0;}

  else if((e.kind==='bruiser'||e.kind==='demon'||e.kind==='elite')&&e.state==='windup'){/* tell holds */}

// ---- fighter combat state machine ----------------------------------------------
function stepFighterCombat(){
  const f=fighter;
  if(f.comboT>0){f.comboT--;if(f.comboT<=0&&f.combo>0)dropCombo(false);}
  if(f.dodgeCd>0)f.dodgeCd--;
  if(f.jumpCd>0)f.jumpCd--;
  if(f.invulnT>0)f.invulnT--;
  if(f.iframesT>0)f.iframesT--;
  if(f.hitFlashT>0)f.hitFlashT--;
  if(f.gloryT>0)f.gloryT--;
  if(f.state==='super'){
    f.stateT--;const t=56-f.stateT;
    if(t===14||t===28||t===42){
      let hits=0;
      for(const e of aliveEnemies()){
        if(e.state==='down'||e.state==='vanish'||e.state==='appear')continue;
        if(Math.abs(e.x-f.x)>36||e.y>26)continue;
        if(e.elite&&act.phase==='warn'&&e.id===act.eliteId){e.hitFlashT=6;continue;}
        e.hp-=2;e.hitFlashT=10;e.recentHits++;hits++;
        if(e.elite&&e.hp>0){const stag=[Math.ceil(e.hpMax*.72),Math.ceil(e.hpMax*.45),2],idx=e.stag||0;
          if(idx<stag.length&&e.hp<=stag[idx]){e.stag=idx+1;markEvent(4);markProgress(2);
            say('THE KEEPER STAGGERS',GOLD,e.y+40,60,e.x);}}
        addCombo(1);stats.hits++;
        if(t===42){e.vy=3.8;e.state='launched';e.vx=Math.sign(e.x-f.x||1)*1.6;}
        else e.vx=Math.sign(e.x-f.x||1)*1.2;
        fxBurst(sx(e.x),GROUND_Y-e.y-12,10,GOLD,2);
        if(e.hp<=0)koEnemy(e,'super');
      }
      ring(sx(f.x),GROUND_Y-12,GOLD,3.2,22);shake(3);
      if(hits)markEvent(4);
    }
    if(f.stateT<=0){f.state='free';f.lockFace=false;}
    return;
  }
  if(f.state==='jump'){
    // DEMON DROP: anticipation crouch, honest ballistic arc through the shared
    // integrator, then the landing quake hits every grounded body in reach.
    if(f.atkPhase==='crouch'){
      f.stateT--;
      if(f.stateT<=0){f.atkPhase='air';f.vy=JUMP_VY;f.vx=f.jumpDir*f.jumpVx;
        fxDust(sx(f.x),GROUND_Y-2,5,'#8a7a5e');}
      return;
    }
    if(f.atkPhase==='air'){
      if(f.grounded&&f.vy===0){
        f.atkPhase='land';f.stateT=6;f.atkDir=f.jumpDir;
        fxDust(sx(f.x),GROUND_Y-2,8,'#8a7a5e');shake(2);
        let hits=0;
        for(const e of aliveEnemies()){
          if(e.state==='vanish'||e.state==='appear'||e.state==='down'||e.y>10)continue;
          if(Math.abs(e.x-f.x)>14)continue;
          if(hitEnemy(e,{dmg:2,meter:6,knock:1.1},'jump'))hits++;
        }
        if(hits){stats.jumpHits++;markEvent(4);
          cue('good','jump',f.x,12,.5);
          marks.push({kind:'jump',x:f.x,y:0,f:runFrame});if(marks.length>40)marks.shift();
          ring(sx(f.x),GROUND_Y-8,GOLD,2.2,20);say('DEMON DROP',GOLD,44,44);}
      }
      return;
    }
    f.stateT--;
    if(f.stateT<=0){f.state='free';f.atkPhase='';f.lockFace=false;}
    return;
  }
  if(f.state==='slam'){
    f.stateT--;
    const t=enemies.find(e=>e.id===f.slamTarget);
    if(f.stateT===20&&t&&t.y>2){
      // The spike: fist meets the airborne target and drives it into the dirt.
      t.vy=-7;t.vx=(t.x-f.x)*.08;t.slammed=true;
      f.vy=-5;
      stats.slams++;markEvent(8);markProgress(2);
      hitEnemy(t,{dmg:3,meter:12},'slam');
      cue('good','juggle',t.x,t.y+8,.55);offer('slam',1,t.x,t.y+8,t.id);
      marks.push({kind:'juggle',x:t.x,y:0,f:runFrame});if(marks.length>40)marks.shift();
      fxBurst(sx(t.x),GROUND_Y-t.y-8,14,GOLD,2.2);ring(sx(t.x),GROUND_Y-t.y-6,'#ffffff',2.4,20);
      shake(4);say('SLAM!',GOLD,t.y+40,50,t.x);
    }
    if(f.stateT<=0||(f.grounded&&f.stateT<18)){f.state='free';f.lockFace=false;f.slamTarget=-1;}
    return;
  }
  if(f.state==='attack'){
    const spec=MOVES[f.atkKind];
    f.atkT++;
    if(f.atkPhase==='startup'&&f.atkT>=spec.startup){f.atkPhase='active';f.atkT=0;}
    else if(f.atkPhase==='active'){
      for(const e of aliveEnemies()){
        if(f.atkHits[e.id]||e.state==='vanish'||e.state==='appear')continue;
        const dx=e.x-f.x;
        if(!spec.both&&Math.sign(dx||f.atkDir)!==f.atkDir)continue;
        if(Math.abs(dx)>spec.range+4||e.y>16)continue;
        if(hitEnemy(e,spec,f.atkKind))f.atkHits[e.id]=1;
      }
      if(f.atkT>=spec.active){f.atkPhase='recover';f.atkT=0;}
    }
    else if(f.atkPhase==='recover'&&f.atkT>=spec.recover){
      f.state='free';f.lockFace=false;f.atkKind=null;
      // Hit-step-hit: every finished attack hands the feet a circle step toward
      // the emptier side. Planted combo-mashing is dead air; this is the dance.
      let left=0,right=0;
      for(const e of aliveEnemies()){if(Math.abs(e.x-f.x)<30){if(e.x<f.x)left++;else right++;}}
      f.repositionT=13;f.repositionDir=left===right?-f.face:(left<right?-1:1);
    }
    return;
  }
  if(f.state==='dodge'){f.stateT--;if(f.stateT<=0){f.state='free';f.lockFace=false;}return;}
  if(f.state==='hit'){f.stateT--;if(f.stateT<=0){f.state='free';f.lockFace=false;}return;}
}

// ---- fight planner: copied-state rollouts on the shared integrator -------------
// Candidates are stance targets (world x) around the fighter. Each rollout runs
// advanceBrawler on a COPY of the fighter for 64 frames while the three nearest
// live enemies close in under the same movement rule; the score prices advance
// (progress), the jab-range edge, sweep clusters, and threat exposure. Pure:
// no RNG, no globals touched.
function rolloutStance(targetX){
  const b={x:fighter.x,y:0,vx:fighter.vx,vy:0,face:fighter.face,walkPhase:0,lean:0,grounded:true};
  const foes=aliveEnemies()
    .filter(e=>e.state!=='down'&&e.state!=='vanish'&&e.state!=='appear'&&e.state!=='launched')
    .sort((a,c)=>Math.abs(a.x-fighter.x)-Math.abs(c.x-fighter.x)).slice(0,3)
    .map(e=>({x:e.x,y:0,vx:0,vy:0,speed:specOf(e).speed,face:1,walkPhase:0,lean:0,grounded:true}));
  const foesNear=foes.some(q=>Math.abs(q.x-fighter.x)<90);
  let minThreat=999,edge=0,cluster=0;
  for(let f=0;f<64;f++){
    advanceBrawler(b,clamp((targetX-b.x)*.12,-1,1),{top:WALK_TOP,accel:WALK_ACCEL});
    for(const q of foes){
      // Foes close to striking range and hold there — they do not phase
      // through the fighter, so approaching a distant enemy is priced honestly.
      const dir=Math.sign(b.x-q.x)||1;
      if(Math.abs(b.x-q.x)>10)advanceBrawler(q,dir*q.speed,{top:q.speed,accel:.05});
      else advanceBrawler(q,0,{top:q.speed,accel:.05});
      const d=Math.abs(q.x-b.x);minThreat=Math.min(minThreat,d);
    }
  }
  const near=foes.reduce((m,q)=>Math.min(m,Math.abs(q.x-b.x)),999);
  const onEdge=near>=10&&near<=16?1:0;
  cluster=foes.filter(q=>Math.abs(q.x-b.x)<17).length;
  // Score the END of the rollout, not the transit: the fighter jabs through
  // whatever closes on the way. The danger is ending INSIDE an enemy, not
  // walking past one.
  let threatPenalty=0;
  if(near<7)threatPenalty=(7-near)*2.2*(fighter.hp<40?2.2:1);
  const advance=b.x-fighter.x;
  // The street only calls when it is clear: with a live enemy in reach the
  // fighter plants and works the duel — walking on is the coward's line.
  const engage=foes.length?Math.max(0,22-Math.abs(near-13))*.9:0;
  let score=advance*.55*(foesNear?.06:1)+onEdge*15+(cluster>=2?cluster*9:0)-threatPenalty
    +Math.min(30,minThreat)*.15+engage;
  const elite=enemies.find(e=>e.elite&&e.state!=='flee'&&e.state!=='down');
  if(act.phase==='warn'&&act.type==='gate'&&elite)score+=Math.max(0,34-Math.abs(targetX-(elite.x-20)))*.3;
  return{targetX:round(targetX,3),score:round(score,4),min:round(minThreat,3),
    stance:cluster>=2?'sweep':edge?'edge':advance>8?'advance':'hold'};
}
function buildFightPlan(){
  if(typeof globalThis.__NO_ROUTE_PLAN!=='undefined')return reactiveFight();
  const candidates=[];
  // Far runway candidates exist ONLY when no live body stands within the spawn
  // ring: a genuinely empty stretch gets a full sprint line (capping at +34
  // used to stutter the run every replan), but a street with anyone on it —
  // even walking in from the edges — keeps the close-quarters ladder so the
  // fighter can never sprint PAST a fight (the coward's line).
  const empty=!aliveEnemies().some(e=>Math.abs(e.x-fighter.x)<SPRINT_RADIUS);
  for(const off of(empty?[-34,-20,-10,0,10,20,34,64,96]:[-34,-20,-10,0,10,20,34]))
    candidates.push(rolloutStance(fighter.x+off));
  const near=nearestEnemy(fighter.x);
  if(near)candidates.push(rolloutStance(near.x-Math.sign(near.x-fighter.x||1)*13));
  candidates.sort((a,b)=>b.score-a.score||a.targetX-b.targetX);
  return candidates[0];
}
function reactiveFight(){
  // Honest baseline: it jabs, launches, sweeps and dodges exactly like the
  // planner build, but its feet only react to the nearest enemy RIGHT NOW —
  // always straight in, no edge pricing, no cluster setup, no gate sense.
  const near=nearestEnemy(fighter.x);
  let targetX=fighter.x+26; // default: keep walking into the block
  if(near){
    const dx=near.x-fighter.x;
    if(Math.abs(dx)>12)targetX=fighter.x+Math.sign(dx)*14;
    else targetX=fighter.x;
  }
  return{targetX,score:0,min:near?Math.abs(near.x-fighter.x):99,stance:'reactive',reactive:true};
}

// ---- bot -----------------------------------------------------------------------
function botIntentCore(){
  const f=fighter;
  if(visualIntent)return Object.assign({},visualIntent);
  if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined'){stats.admireIntents++;
    return{move:.25,attack:null,dodge:false,tactic:'SAVOR THE FIST'};}
  // Mid-leap the feet are committed; the hands steer the landing onto the mark.
  if(f.state==='jump'){const t=nearestEnemy(f.x);
    return{move:t?clamp((t.x-f.x)*.2,-1,1):(f.jumpDir||1)*.6,attack:null,dodge:false,tactic:'DEMON DROP'};}
  const alive=aliveEnemies().filter(e=>e.state!=='down');
  // Focus fire: the bot works ONE target until it falls (or escapes), then
  // picks the weakest body in reach. Spreading damage is how packs survive.
  let focus=enemies.find(e=>e.id===f.focusId&&e.hp>0&&e.state!=='flee'&&e.state!=='down'&&
    e.state!=='vanish'&&e.state!=='appear'&&e.state!=='launched'&&Math.abs(e.x-f.x)<70);
  if(!focus){
    focus=null;let bestHp=1e9,bestD=1e9;
    for(const e of aliveEnemies()){
      if(e.state==='down'||e.state==='vanish'||e.state==='appear'||e.state==='launched')continue;
      const d=Math.abs(e.x-f.x);if(d>46)continue;
      if(e.hp<bestHp||(e.hp===bestHp&&d<bestD)){bestHp=e.hp;bestD=d;focus=e;}
    }
    if(!focus)focus=nearestEnemy(f.x);
    f.focusId=focus?focus.id:-1;
  }
  const near=focus||nearestEnemy(f.x);
  // 1) Dodge ON the tell: a committed windup inside its range beats every plan.
  // Chain recoveries do not trap the feet — a tell cancels the chain honestly.
  const canDodge=f.dodgeCd<=0&&(f.state==='free'||(f.state==='attack'&&f.atkPhase==='recover'));
  if(canDodge)for(const e of alive){
    if(e.state!=='windup')continue;
    const spec=specOf(e),dx=e.x-f.x;
    if(e.stateT<=DODGE_WINDOW[e.kind]&&Math.abs(dx)<spec.range+9&&Math.abs(e.y-f.y)<14){
      if(f.state!=='free'){f.state='free';f.lockFace=false;}
      stats.dodges++;markEvent(3);
      return{move:0,attack:null,dodge:true,tactic:'DODGE THE '+spec.label};
    }
  }
  // 1b) Chain continuation: the attack intent must persist through the jab
  // recover window or the chain grammar never fires. A dodge can still break it.
  if(f.state==='attack'&&MOVES[f.atkKind]&&MOVES[f.atkKind].chain&&f.atkPhase==='recover'){
    const t=nearestEnemy(f.x);
    if(t&&Math.abs(t.x-f.x)<15)return{move:0,attack:'jab',dodge:false,tactic:'JAB CHAIN x'+(f.chain+1)};
  }
  if(f.state==='free'){
    // 1d) Never get boxed: bodies on both shoulders inside 9px — split the pack
    // and step out through the emptier side. A burst, not a retreat strategy.
    const nearL=aliveEnemies().some(e=>e.x<f.x&&f.x-e.x<9&&e.state!=='down'&&e.y<6);
    const nearR=aliveEnemies().some(e=>e.x>f.x&&e.x-f.x<9&&e.state!=='down'&&e.y<6);
    if(nearL&&nearR&&(f.splitCd||0)<=0){
      f.splitCd=40;
      const freeL=aliveEnemies().filter(e=>e.x<f.x-10).length,freeR=aliveEnemies().filter(e=>e.x>f.x+10).length;
      const out=freeL<=freeR?-1:1;
      // Boxed with legs under you: LEAP the pack — the arc clears the strikes
      // and the landing quake greets whoever followed. Grounded fallback: split.
      if(f.jumpCd<=0&&f.grounded&&typeof globalThis.__NO_ACROBATICS==='undefined')
        return{move:out,attack:'jump',dodge:false,tactic:'LEAP THE PACK'};
      return{move:out*.9,attack:null,dodge:false,tactic:'SPLIT THE PACK'};
    }
    if(f.splitCd>0)f.splitCd--;
    // 1c) Tagged recently? Give ground before the next exchange.
    if(f.hitFlashT>4&&near&&Math.abs(near.x-f.x)<13){
      return{move:-Math.sign(near.x-f.x||1)*.8,attack:null,dodge:false,tactic:'GIVE GROUND'};
    }
    // 2) Punish: a whiffed enemy is wide open — crack armor or start the chain.
    const weak=nearestEnemy(f.x,e=>e.vulnerT>0);
    if(weak&&Math.abs(weak.x-f.x)<16){
      return{move:clamp((weak.x-f.x)*.1,-1,1),attack:weak.armor?'launcher':'jab',dodge:false,tactic:'PUNISH THE WHIFF'};
    }
    // 3) GOD WHEEL: full meter, and the street is worth it.
    if(f.meter>=100&&near&&Math.abs(near.x-f.x)<30){
      const eliteUp=enemies.some(e=>e.elite&&e.state!=='flee'&&e.state!=='down');
      if(eliteUp||alive.length>=3||(alive.length>=2&&alive.some(e=>e.kind==='demon')))
        return{move:0,attack:'super',dodge:false,tactic:'GOD WHEEL'};
    }
    if(f.meter>=50&&f.hp<50&&near&&Math.abs(near.x-f.x)<24&&alive.length>=1)
      return{move:0,attack:'super',dodge:false,tactic:'COME BACK SWINGING'};
    // 4) Air follow: somebody is up — go get them. The pursuit runs wide and
    // the slam fires inside 18; the flight window is short, so chase hard.
    let air=null,airD=1e9;
    for(const e of aliveEnemies()){
      if(e.y<=4||e.state==='down'||e.state==='vanish'||e.state==='appear')continue;
      const d=Math.abs(e.x-f.x);if(d<airD){airD=d;air=e;}
    }
    if(air&&airD<19)return{move:clamp((air.x-f.x)*.12,-1,1),attack:'slam',dodge:false,tactic:'AIR SLAM'};
    if(air&&airD<44)return{move:clamp((air.x-f.x)*.12,-1,1),attack:null,dodge:false,tactic:'RUN UNDER IT'};
    // 4b) The circle step after each attack — the hit-step-hit rhythm owns the
    // feet before any new exchange (attacks above still preempt it).
    if(f.repositionT>0){f.repositionT--;
      return{move:f.repositionDir*.85,attack:null,dodge:false,tactic:'CIRCLE'};
    }
    // 6b) Stomp the fallen: a body on the ground closer than any standing
    // threat — finish it before it gets up.
    {
      let fallen=null,fd=1e9;
      for(const e of aliveEnemies()){
        if(e.state!=='down'||e.y>4)continue;
        const d=Math.abs(e.x-f.x);if(d<fd){fd=d;fallen=e;}
      }
      if(fallen&&fd<16&&(!near||Math.abs(near.x-f.x)>14))
        return{move:clamp((fallen.x-f.x)*.1,-1,1),attack:'jab',dodge:false,tactic:'STOMP'};
    }
    if(near){
      const dx=near.x-f.x,adx=Math.abs(dx);
      // 4c) TMNT gap closer: a distant grounded mark on a clear runway — leap
      // the gap and open with the landing quake instead of strolling in. The
      // decision is priced on the INTERCEPT gap (mark keeps walking during the
      // arc), so a fast closer gets jabbed, not overleapt. The keeper's warn
      // march stays a measuring beat, never a leap target.
      const pdx=near.x+near.vx*30-f.x,padx=Math.abs(pdx);
      if(padx>=24&&padx<=50&&Math.sign(pdx)===Math.sign(dx||1)&&near.y<6&&near.state!=='windup'&&
        f.jumpCd<=0&&f.grounded&&!(near.elite&&act.phase==='warn')&&
        typeof globalThis.__NO_ACROBATICS==='undefined')
        return{move:Math.sign(dx),attack:'jump',dodge:false,tactic:'DEMON DROP'};
      // 5) Sweep the cluster.
      const cluster=alive.filter(e=>Math.abs(e.x-f.x)<15&&e.y<8).length;
      if(cluster>=2&&adx<16)return{move:0,attack:'sweep',dodge:false,tactic:'SWEEP THE PACK'};
      // 6) Launcher: crack the bruiser, or pop the isolated duel open.
      if(adx<13&&(near.kind==='bruiser'&&near.armor))return{move:0,attack:'launcher',dodge:false,tactic:'CRACK THE BRUISER'};
      if(adx<12&&alive.length===1&&f.combo>=2&&!near.armor)return{move:0,attack:'launcher',dodge:false,tactic:'LAUNCH THE DUEL'};
      // 7) The jab chain at the edge of range.
      if(adx<14)return{move:clamp(dx*.06,-.4,.4),attack:'jab',dodge:false,
        tactic:f.chain?'JAB CHAIN x'+(f.chain+1):'JAB '+specOf(near).label};
    }
  }
  // 8) Feet: the planner (or the honest reactive baseline) picks the stance.
  if(act.phase==='warn'){
    // Measuring the incoming threat: a slow menace strafe, never a parked wait.
    const drift=Math.sin(showFrame*.07)*.5;
    const elite=enemies.find(e=>e.elite&&e.state!=='flee'&&e.state!=='down');
    const anchor=elite?elite.x-24:f.x+10;
    return{move:clamp((anchor-f.x)*.02+drift,-.7,.7),attack:null,dodge:false,
      tactic:act.type==='gate'?'THE GATE OPENS':'THE MOB FLANKS'};
  }
  if(!plan||runFrame-planAt>=36||Math.abs(plan.targetX-f.x)<3){plan=buildFightPlan();planAt=runFrame;}
  const dx=plan.targetX-f.x,move=Math.abs(dx)<1.5?0:clamp(dx*.12,-1,1);
  const elite=enemies.find(e=>e.elite&&e.state!=='flee'&&e.state!=='down');
  const tactic=elite?'FACE THE GATEKEEPER':
    plan.stance==='sweep'?'SET THE SWEEP':plan.stance==='edge'?'HOLD THE EDGE':
    plan.stance==='advance'?'ADVANCE':'HOLD THE LINE';
  return{move,attack:null,dodge:false,tactic};
}
function rawBotIntent(){
  const f=fighter,intent=botIntentCore();
  // Idle weave: with bodies in reach the feet never plant — every free-state
  // intent carries the brawler shuffle on top of its plan.
  if(f.state==='free'&&!intent.attack&&!intent.dodge&&
    aliveEnemies().some(e=>e.state!=='flee'))
    intent.move=clamp((intent.move||0)+Math.sin(showFrame*.09)*.6,-1,1);

}
function lapseIntent(context,last){const base=last||rawBotIntent();
  return Object.assign({},base,{move:(base.move||0)*.15,attack:null,dodge:false,tactic:'COLD READ'});}
function botIntent(){
  if(typeof globalThis.__NO_LAPSE!=='undefined'){lastLapsed=false;return rawBotIntent();}
  const before=skill.isLapsed(runFrame),intent=skill.decide(runFrame,null,rawBotIntent,lapseIntent),after=skill.isLapsed(runFrame);
  if(after&&!before&&!lastLapsed){stats.lapses++;markEvent();cue('bad','lapse',fighter.x,14,.3);
    fxBurst(sx(fighter.x),GROUND_Y-16,6,CORAL,1.2);say('COLD READ!',CORAL,52,42);}

function humanIntent(){
  const move=(keys.right?1:0)-(keys.left?1:0);
  let attack=null;
  // The chord threshold mirrors startAttack's cost exactly (hp<50 halves the
  // wheel): a chord the sim would honor must never die in the mapping layer.
  if(keys.b&&keys.c&&fighter.meter>=(fighter.hp<50?50:100))attack='super';
  else if(keys.b)attack='jab';
  else if(keys.c)attack='launcher';
  else if(keys.a)attack='sweep';
  else if(keys.up)attack='jump'; // leap; startAttack turns it into the slam over an airborne mark

}
const controller=controllerMux({human:humanIntent,ai:botIntent,manual:()=>playing()||manual()});

// ---- enemy FSM -------------------------------------------------------------------
// enter -> stalk (circle for a token) -> windup (the tell) -> strike (the lunge)
// -> recover (the punish window); launched/down/flee are the fighter's answers.
// Every state still runs the shared integrator every frame.
// Stationary backstop: a boxed body takes a wider shuffle step — the contract's
// guarantee, not a tuning hope. orbitDir flips; the step is physical.
function anchorKick(e,states){
  if(!states.includes(e.state)){e.anchorX=e.x;e.anchorT=runFrame;return;}
  // 4px hysteresis: only genuine travel re-arms the clock. Hovering inside the
  // analyzer's 2px radius accumulates and earns the flank step.
  if(e.anchorX===undefined||Math.abs(e.x-e.anchorX)>4){e.anchorX=e.x;e.anchorT=runFrame;return;}
  if(runFrame-e.anchorT>10){e.anchorT=runFrame;e.anchorX=e.x;
    // Boxed: circle to the OTHER flank at full speed — a visible 40px walk,
    // and hold the hunt off long enough for the walk to actually happen.
    e.sidePref=-(e.sidePref||1);e.orbitDir=-(e.orbitDir||(e.id%2?1:-1));
    e.attackCd=Math.max(e.attackCd,24);
    e.vx=e.orbitDir*Math.max(.8,specOf(e).speed);}
}
function stepEnemy(e){
  const f=fighter,spec=specOf(e);
  if(e.hitFlashT>0)e.hitFlashT--;
  if(e.attackCd>0)e.attackCd--;
  if(e.vulnerT>0)e.vulnerT--;
  if(e.teleCd>0)e.teleCd--;
  e.recentHits=Math.max(0,e.recentHits-.006);
  anchorKick(e,['enter','stalk','recover','hit']);
  const dx=f.x-e.x,adx=Math.abs(dx),dir=Math.sign(dx)||e.sidePref||1;
  if(e.state==='enter'){
    // Walk in from the edge to the staging ring — the physical approach.
    // Queue discipline (the proven traffic pattern): a faster body catching a
    // slower one ahead eases into line behind it instead of grinding a
    // lattice; the queue fans out at the staging ring.
    const hold=16+(e.id%4)*7,hustle=e.x<f.x-40?1.5:1;
    let qSpeed=spec.speed*hustle;
    for(const o of enemies){
      if(o===e||o.state!=='enter')continue;
      const ahead=(o.x-e.x)*dir;
      if(ahead>0&&ahead<9&&Math.abs(o.y-e.y)<2&&qSpeed>specOf(o).speed)
        qSpeed=Math.min(qSpeed,Math.max(.4,specOf(o).speed*hustle-.25));
    }
    if(adx>hold+6){advanceBrawler(e,dir*qSpeed,{top:qSpeed,accel:.12});}
    else{e.state='stalk';e.stateT=0;}
    return;
  }
  if(e.state==='stalk'){
    // Circle the fighter at reading distance; only token holders step in.
    // Beyond 30px the slot logic gives way to a straight chase — a retreating
    // fighter must never outrun the street.
    if(adx>42)e.sidePref=Math.sign(e.x-f.x)||1;
    const hold=e.elite?16:16+(e.id%4)*7;
    const target=adx>30?f.x+dir*(6+(e.id%4)*4):f.x+e.sidePref*hold;
    const maxTokens=(act.phase==='live'&&act.type==='mob')?3:2;
    const canToken=e.elite||tokenCount<maxTokens;
    // Hunt or prowl, sticky per cooldown cycle — never flap between the two.
    const hunting=canToken&&e.attackCd<=0;
    if(hunting&&adx<34&&f.knockT<=0){
      // Token holder steps INSIDE the hold ring before committing — the windup
      // gate must outrange the hold distance or the duel deadlocks.
      if(adx<20){e.state='windup';e.stateT=spec.windup;e.face=dir;e.lockFace=true;
        if(!e.elite)tokenCount++;
        markEvent(2);
        return;}
      advanceBrawler(e,dir*spec.speed,{top:spec.speed,accel:.15,idleFace:dir});
      return;
    }
    // Demons blink behind the fighter instead of walking the whole way — but a
    // cornered rat has nowhere to run: the last live body stands and fights.
    if((e.kind==='demon'||e.kind==='elite')&&e.teleCd<=0&&(adx>34||e.recentHits>=4)&&aliveEnemies().length>1){
      e.state='vanish';e.stateT=18;e.lockFace=false;
      fxBurst(sx(e.x),GROUND_Y-12,10,spec.body,1.8);
      return;
    }
    if(e.x<f.x-280){e.state='flee';e.lockFace=false;return;} // left behind: give up the block
    // Tokenless bodies ORBIT: a continuously moving target on the committed
    // flank — no band edge to bounce on, no parked shuffle. Displacement is
    // structural, not tuned.
    e.stuckT=Math.abs(e.vx)<.06?(e.stuckT||0)+1:0;
    if(e.stuckT>8){e.jogT=12;e.stuckT=0;}
    const orbitT=f.x+e.sidePref*(26+Math.sin(showFrame*.04+e.id*1.3)*14);
    let move=hunting?clamp((target-e.x)*.1,-1,1):clamp((orbitT-e.x)*.15,-1,1)*.9;
    if(e.jogT>0){e.jogT--;move=-Math.sign(f.x-e.x||1)*.8;}
    const hustle=e.x<f.x-40?1.5:1;
    advanceBrawler(e,move,{top:spec.speed*hustle,accel:.15,
      idleFace:adx<60?dir:e.face});
    return;
  }
  if(e.state==='windup'){
    // The tell: a slow creep while the arm rises. The bot's dodge window.
    e.stateT--;
    advanceBrawler(e,dir*.35,{top:.4,accel:.05,lockFace:true,lean:-dir*.24});
    if(e.stateT<=0){e.state='strike';e.stateT=spec.strike;e.face=dir;
      fxBurst(sx(e.x),GROUND_Y-e.y-16,3,CREAM,1);}
    return;
  }
  if(e.state==='strike'){
    e.stateT--;
    advanceBrawler(e,dir,{top:spec.top,accel:.5,lockFace:true,lean:dir*.3});
    if(e.stateT<=spec.strike-2&&e.stateT>=spec.strike-4&&adx<spec.range+2&&Math.abs(e.y-f.y)<13&&f.knockT<=0){
      if(f.iframesT>0){
        // Whiffed ON the dodge: the punish window opens.
        e.state='recover';e.stateT=spec.recover+18;e.vulnerT=45;e.baited=false;
        stats.whiffs++;markEvent(4);
        say(spec.label+' WHIFFS',STEEL,e.y+32,40,e.x);
        if(!e.elite)tokenCount=Math.max(0,tokenCount-1);
        e.attackCd=120+RI(0,60);
        return;
      }
      if(f.invulnT<=0){hitFighter(e);e.baited=false;}
      e.stateT=Math.min(e.stateT,1);
    }
    if(e.stateT<=0){
      // A committed strike that caught nothing but air: if the fighter baited
      // it with a dodge, the punish window opens (the counter grammar).
      if(e.baited){e.baited=false;e.vulnerT=45;stats.whiffs++;markEvent(4);
        offer('bait',1,e.x,e.y+10,e.id);
        say(spec.label+' WHIFFS',STEEL,e.y+32,40,e.x);}
      e.state='recover';e.stateT=spec.recover;e.attackCd=120+RI(0,60);
      if(!e.elite)tokenCount=Math.max(0,tokenCount-1);
    }
    return;
  }
  if(e.state==='recover'){
    e.stateT--;
    // Recovery is a real repositioning step: drift back out to the hold ring
    // and keep backing off the fighter the whole way down — never a hover.
    const hold=e.elite?16:16+(e.id%4)*7;
    const move=clamp((f.x+e.sidePref*hold-e.x)*.08,-1,1)-dir*.35;
    advanceBrawler(e,move,{top:.9,accel:.12,lockFace:true,lean:-dir*.12});
    if(e.stateT<=0){e.state='stalk';e.lockFace=false;}
    return;
  }
  if(e.state==='hit'){
    e.stateT--;
    advanceBrawler(e,0,{top:0});
    if(e.stateT<=0){e.state='stalk';e.lockFace=false;}
    return;
  }
  if(e.state==='launched'){
    advanceBrawler(e,0,{top:0});
    if(e.grounded&&e.vy===0&&e.y<=0){
      e.state='down';e.stateT=e.slammed?44:32;e.slammed=false;e.stomped=0;
      fxDust(sx(e.x),GROUND_Y-2,5,'#8a7a5e');
    }
    return;
  }
  if(e.state==='down'){
    e.stateT--;
    advanceBrawler(e,0,{top:0});
    if(e.stateT<=0){
      if(e.hp<=0){e.state='flee';e.lockFace=false;}
      else{e.state='stalk';e.lockFace=false;}
    }
    return;
  }
  if(e.state==='vanish'){
    e.stateT--;
    advanceBrawler(e,0,{top:0});
    if(e.stateT<=0){
      // Reappear on the fighter's blind side — the teleport is physical: a
      // vanish, a move while unseen, and a materialize tell before any swing.
      e.x=f.x-(f.face||1)*(24+hash(e.id,runFrame)*8);e.y=0;e.vx=0;e.vy=0;
      e.sidePref=Math.sign(e.x-f.x)||1;
      e.state='appear';e.stateT=14;e.teleCd=e.kind==='elite'?340:280;e.recentHits=0;
      fxBurst(sx(e.x),GROUND_Y-12,10,spec.trim,1.8);
    }
    return;
  }
  if(e.state==='appear'){
    e.stateT--;
    advanceBrawler(e,0,{top:0,lockFace:true});
    if(e.stateT<=0){e.state='stalk';e.lockFace=false;e.face=Math.sign(f.x-e.x)||1;}
    return;
  }
  if(e.state==='flee'){
    // Beaten enemies stagger off toward the nearest edge and leave the fiction.
    const out=e.x<f.x?-1:1;
    advanceBrawler(e,out*.9,{top:.9,accel:.06});
    if(sx(e.x)<-26||sx(e.x)>W+26)e.remove=true;
    return;
  }
}

// ---- waves ----------------------------------------------------------------------
let patrolSerial=0,lastWaveX=0,lastClearFrame=-300,prevAlive=0;
function spawnWave(trig){
  const side=hash(trig.x,worldSeed)<.3?-1:1;
  trig.comp.forEach((kind,i)=>{
    const e=spawnEnemy(kind,fighter.x+side*(150+i*16+hash(i,trig.x)*10),-side);
    e.wave=trig.id;
  });
  pendingWaves.add(trig.id);lastWaveX=fighter.x;
  stats.waves++;markEvent(2);markProgress(1);
}
function spawnPatrol(){
  // The street never sleeps: after a clear stretch with nobody standing, a
  // patrol walks in off the edge. This is the dead-air pressure valve.
  const n=patrolSerial++,kinds=waveComp(Math.min(blockIndex(),4),n%4,n*13+7)
    .slice(0,2+(hash(lastWaveX*3+n,worldSeed)>.5?1:0));
  const side=hash(lastWaveX+n*7,worldSeed)<.35?-1:1,id='patrol-'+n;
  kinds.forEach((kind,i)=>{const e=spawnEnemy(kind,fighter.x+side*(150+i*16),-side);e.wave=id;});
  pendingWaves.add(id);lastWaveX=fighter.x;
  stats.waves++;markEvent(2);markProgress(1);
}
function stepWaveClears(){
  for(const id of [...pendingWaves]){
    if(!enemies.some(e=>e.wave===id&&e.state!=='flee'&&e.hp>0)){
      pendingWaves.delete(id);stats.waveClears++;markEvent(4);markProgress(6);
    }
  }
}
function stepWaves(){
  // Waves keep flowing through the acts (the street never stops for a duel) —
  // with a tighter cap while an act is on stage so the keeper keeps the focus.
  const cap=act.phase==='calm'?4:3;
  while(waveCursor<waveTriggers.length&&fighter.x>=waveTriggers[waveCursor].x){
    const trig=waveTriggers[waveCursor];
    if(aliveEnemies().length>=cap){
      if(fighter.x-trig.x>600){waveCursor++;continue;} // the street moved on
      break; // hold the trigger until the street thins out
    }
    waveCursor++;spawnWave(trig);
  }
  // The street never sleeps: 140 empty frames and a patrol walks in off the
  // edge. Time-based, so slow advances cannot stretch the dead air.
  if(aliveEnemies().length===0){
    if(prevAlive>0)lastClearFrame=runFrame;
    if(runFrame-lastClearFrame>140)spawnPatrol();
  }
  prevAlive=aliveEnemies().length;
}

// ---- acts: DEMON GATE and THE MOB, exactly 240f physical warnings ---------------
function stepActs(){
  if(typeof globalThis.__NO_ACTS!=='undefined'){act.phase='calm';return;}
  if(act.phase==='calm'&&runFrame>=act.warnAt&&!(SHOW.probe().active&&SHOW.probe().active.tier>=3)){
    act.phase='warn';act.type=act.index%2?'mob':'gate';
    act.landAt=runFrame+240;act.endAt=act.landAt+(act.type==='gate'?1800:900);
    plan=null;planAt=-1e9;
    if(act.type==='gate'){
      const e=spawnEnemy('elite',fighter.x+175,-1);act.eliteId=e.id;act.mobIds=[];
      say('THE GATE OPENS · THE KEEPER COMES',CORAL,96,120,fighter.x+60);
    }else{
      act.eliteId=-1;act.mobIds=[];
      // The mob fills the street to six, never past it — a swarm the strip can
      // actually hold, so nobody clots into a lattice off-screen.
      const room=Math.max(0,5-aliveEnemies().length);
      const kinds=['thug','sprinter','thug','sprinter'].slice(0,room);
      kinds.forEach((kind,i)=>{
        const side=i>=2?-1:1,e=spawnEnemy(kind,fighter.x+side*(150+(i%2)*12),-side);
        e.wave=null;act.mobIds.push(e.id);
      });
      say('THE MOB FLANKS · HOLD THE LINE',GOLD,96,120,fighter.x+60);
    }
    const n={kind:'act-warning',id:act.type,at:showFrame,tag:runFrame,landsAt:showFrame+240};
    act.notes.push(n);SHOW.note(n);markEvent(4);
  }else if(act.phase==='warn'){
    // The mid-warning beat: the telegraph physically ARRIVES — the keeper
    // reaches striking distance, or the mob closes its ring. Splits the 240f
    // warn into legible chunks without shortening it.
    if(!act.warnMid){
      let arrived=false;
      if(act.type==='gate'){const e=enemies.find(q=>q.id===act.eliteId);
        arrived=e&&Math.abs(e.x-fighter.x)<46;}
      else arrived=act.mobIds.length>0&&act.mobIds.every(id=>{const e=enemies.find(q=>q.id===id);
        return e&&Math.abs(e.x-fighter.x)<52;});
      if(arrived){act.warnMid=true;markEvent(2);markProgress(1);
        say(act.type==='gate'?'THE KEEPER STANDS BEFORE YOU':'THE MOB CLOSES IN',act.type==='gate'?CORAL:GOLD,84,60,fighter.x+40);}
    }
    if(runFrame>=act.landAt){
      act.phase='live';stats.acts++;act.hitsAtLand=stats.hitsTaken;markProgress(2);

// ---- contact resolution: nobody walks through anybody -----------------------------
// Continuous separation on every grounded pair, resolved AFTER all movement so
// every actor moved honestly first. Small and physical, never a teleport;
// strike events live on their own cooldowns above.
function resolveSeparation(){
  const bodies=[fighter,...aliveEnemies().filter(e=>
    e.state!=='down'&&e.state!=='launched'&&e.state!=='vanish'&&e.state!=='appear'&&e.state!=='flee')];
  for(let i=0;i<bodies.length;i++)for(let j=i+1;j<bodies.length;j++){
    const a=bodies[i],b=bodies[j];
    if(a.y>6||b.y>6)continue;
    const dx=b.x-a.x;
    if(Math.abs(dx)>=7)continue;
    // A stalker slipping to its flank slot may pass the fighter's space — the
    // fighter is a wall to ATTACKERS, never a cage. But never a hard grind:
    // inside the hard-overlap line the separation still owns the pair.
    const e=a===fighter?b:b===fighter?a:null;
    if(e&&e.state==='stalk'&&Math.abs(dx)>=4.5&&Math.sign(e.x-fighter.x)!==(e.sidePref||Math.sign(e.x-fighter.x)||1))continue;
    const R=e?7:6; // enemy bodies pack tighter than the fighter's personal space
    if(Math.abs(dx)>=R)continue;
    const dir=dx===0?(a.x<camX+80?-1:1):Math.sign(dx);
    const push=(R-Math.abs(dx))*.7+.05;
    // The aggressor owns the space: an attacking fighter is never pushed off
    // its combo — the defender yields the full separation. This is what lets a
    // jab chain visibly WALK its target backward.
    const aAttacking=a===fighter&&a.state==='attack';
    const bAttacking=b===fighter&&b.state==='attack';
    if(aAttacking){b.x+=dir*push*2;}
    else if(bAttacking){a.x-=dir*push*2;}
    else if(a!==fighter&&b!==fighter&&Math.abs(a.vx)>.02&&Math.abs(b.vx)>.02&&Math.sign(a.vx)===Math.sign(b.vx)){
      // A crowd flowing one way sorts itself: the faster walker keeps the lane,
      // the slower gets shuffled aside — packs never clot into a lattice.
      if(Math.abs(a.vx)>=Math.abs(b.vx)){b.x+=dir*push*2.2;a.x-=dir*push*.2;}
      else{a.x-=dir*push*2.2;b.x+=dir*push*.2;}
    }
    else{a.x-=dir*push;b.x+=dir*push;}
    const mv=(a.vx+b.vx)*.5;a.vx=a.vx*.4+mv*.6;b.vx=b.vx*.4+mv*.6;
    if(push>=1.2)stats.contacts++;
  }
}

// ---- player ------------------------------------------------------------------------
function stepPlayer(){
  const f=fighter;
  f.lastX=f.x;f.lastY=f.y;
  if(f.knockT>0){
    // The knockdown is physical and costly: a tumble, a still beat covered by
    // the dizzy emote, then the get-up with brief invulnerability.
    f.knockT--;f.stateT=f.knockT;
    advanceBrawler(f,0,{top:0});
    if(f.knockT<=0){f.hp=45;f.invulnT=110;f.state='free';f.lockFace=false;
      // The rally: getting up loads the wheel — the spiral always has an answer.
      f.meter=Math.max(f.meter,60);
      markEvent(8);say('BACK ON YOUR FEET',GOLD,56,60);}
    return;
  }
  manualDrive=playing()||manual();
  const intent=controller();f.intent=intent;stats.appliedIntents++;
  if(intent.dodge&&f.state==='free'&&f.dodgeCd<=0)startDodge();
  else if(intent.attack)startAttack(intent.attack);
  let move=0,top=WALK_TOP;
  if(f.state==='free'){
    move=intent.move||0;
    // TMNT pacing: a clear runway breaks the walk into a RUN. The sprint needs
    // the street empty within SPRINT_RADIUS, so a live brawl is never outrun;
    // ending because a mark entered the radius counts as an ARRIVAL conversion.
    const clear=!aliveEnemies().some(e=>e.state!=='flee'&&e.hp>0&&e.y<20&&Math.abs(e.x-f.x)<SPRINT_RADIUS);
    if(typeof globalThis.__NO_ACROBATICS==='undefined'&&clear&&Math.abs(move)>.55)f.sprintT++;
    else{if(f.sprintT>10&&!clear)stats.sprintArrivals++;f.sprintT=0;}
    if(f.sprintT>10){
      top=SPRINT_TOP;
      if(f.sprintT===11){stats.sprints++;markEvent(1);fxDust(sx(f.x),GROUND_Y-2,4,'#8a7a5e');}
      else if(f.sprintT%9===0)fxDust(sx(f.x)-f.face*5,GROUND_Y-2,2,'#8a7a5e');
    }
  }
  else if(f.state==='dodge'){move=-f.face;top=2.4;f.sprintT=0;}
  else if(f.state==='jump'){move=f.atkPhase==='air'?(intent.move||0):0;top=1.9;f.sprintT=0;}
  else if(f.state==='slam'){const t=enemies.find(e=>e.id===f.slamTarget);
    move=t?clamp((t.x-f.x)*.08,-.6,.6):0;top=1.2;f.sprintT=0;}
  else{
    f.sprintT=0;
    if(f.state==='attack'&&f.atkPhase!=='recover'&&MOVES[f.atkKind]&&!MOVES[f.atkKind].both){
      // Jabs step in: the chain walks its punches, the launcher steps under.
      move=f.atkDir*.6;top=1.15;
    }
  }
  const near=nearestEnemy(f.x);
  // The same stationary backstop the enemies get: a free fighter boxed within
  // 2px for 25 frames takes a visible shuffle step toward the open side. It is
  // a WATCHED-bot motion-contract guarantee only — under human control it
  // stays re-armed, so a player who holds still IS still (manual purity).
  if(f.state!=='free'){f.anchorX=f.x;f.anchorT=runFrame;}
  else if(manualDrive||f.anchorX===undefined||Math.abs(f.x-f.anchorX)>4){f.anchorX=f.x;f.anchorT=runFrame;}
  else if(runFrame-f.anchorT>10){f.anchorT=runFrame;f.anchorX=f.x;f.repositionDir=-(f.repositionDir||1);f.vx+=f.repositionDir*2.0;}
  advanceBrawler(f,move,{top,accel:WALK_ACCEL,lockFace:f.lockFace,
    idleFace:near&&Math.abs(near.x-f.x)<70?Math.sign(near.x-f.x):undefined});
  stepFighterCombat();
  const stepLen=Math.hypot(f.x-f.lastX,f.y-f.lastY);stats.maxStep=Math.max(stats.maxStep,stepLen);
}

// ---- authored street renderer ------------------------------------------------------
// Five built blocks, four parallax layers plus a near foreground plane. All
// variation is hash(seg, worldSeed) — render never touches the sim RNG. The
// street is a QUIET stage: long seams, broad tone bands, and STATIC ambience.
// Owner directive 2026-07-17: backgrounds must feel stable and never distract
// from the action — window lights, neon, embers, lanterns and lava are seeded
// once per world and hold their luma; the only motion is parallax with travel
// plus a slow material drift on the dock water. No per-frame twinkle, strobe,
// or pulsing glow anywhere on the stage (the act warning telegraph is the one
// authored exception, and it lives on the frame edge, not the skyline).
function layerSegs(factor,seg){
  const off=camX*factor,start=Math.floor(off/seg)*seg-seg,out=[];
  for(let wx=start;wx<off+W+seg;wx+=seg)out.push({wx,x:Math.round(wx-off),seg:Math.floor(wx/seg)});
  return out;
}

    for(let y=302;y<340;y+=18)rect(0,y,W,1,mix(p.seam,CREAM,.12));
  }else if(p.kind==='dock'){
    for(let y=297;y<340;y+=8)rect(0,y,W,1,mix(p.seam,INK,.35));
    for(let y=300;y<332;y+=8)rect(0,y,W,1,mix(p.seam,CREAM,.1));

// ---- actors -------------------------------------------------------------------------
// The fighter: ~11x25, white gi, red headband, and the oversized cursed right
// fist. Every attack is an authored pose on the body; the flip is the honest
// travel facing. Drawn facing +x in local space, mirrored by face.
function drawFighter(){
  const f=fighter,x=Math.round(sx(f.x)),yb=Math.round(GROUND_Y-f.y);
  if(x<-24||x>W+24)return;

// Motion contract (evals/motion.js): the watched actors are the fighter and
// every live enemy. The fighter's authored pose states count as emote-covered
// pauses: attack chains/dodges/hits/slams are authored pose grammar (the fists
// move even when the feet plant), the super is the stationary roulette, and
// the knockdown get-up is the recovery beat — each bounded by the show and
// state timers. Enemy downs and vanish/appear theater are theirs.
// __NO_EMOTE strips art and flag together.
globalThis.__motionProbe=()=>{const on=typeof globalThis.__NO_EMOTE==='undefined';
  // Tier-3 hold/slow-mo is authored presentation gating (the show kernel owns
  // the world clock there); every actor reads as covered for exactly the
  // gated frames, never the free-running ones.
  const showPause=pres.cue&&pres.cue.tier>=3&&(pres.holdWorld||pres.physicsEvery>1);
  // The jump is deliberately NOT emote-flagged: its stationary beats (5f
  // crouch, 6f landing) sit far under the 30f bare-still limit and the arc
  // itself moves — flagging it would only inflate the emote budget.
  const fighterPose=fighter.state==='attack'||fighter.state==='dodge'||fighter.state==='hit'||
    fighter.state==='slam'||fighter.state==='super';
  return{finite:allFinite(),actors:[
    {id:'fighter',x:fighter.x,y:fighter.y,emote:on&&(fighterPose||fighter.knockT>0||showPause)},
