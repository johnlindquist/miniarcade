function blueprint(side){

  for(let row=0;row<7;row++){add('tower-'+row,27,269-row*7,7,6,row===0?'foot':'stone');if(row<5)add('buttress-'+row,20,269-row*7,6,6,row===0?'foot':'stone')}

function makeCrew(side,index){const stations=side===0?[34,46,27]:[126,114,133];return{id:'crew-'+side+'-'+index,side,index,x:stations[index],y:267,homeX:stations[index],targetX:stations[index],face:side===0?1:-1,pose:index===0?'point':'carry',step:0,react:0}}

function resetAct(){Object.assign(act,{phase:'calm',warnAt:showFrame+1200,landAt:showFrame+1440,endAt:showFrame+1920,index:0,wind:0,notes:[]})}

function beginBuild(first){
  phase='build';phaseT=first?120:84;projectile=null;impact=null;breachPending=false;plan=null;stats.builds++;markEvent();
  const m=machines[turn];m.build=0;m.recoil=0;m.loaded=true;for(const c of crews.filter(c=>c.side===turn)){c.pose=c.index===0?'measure':c.index===1?'hammer':'carry';c.targetX=c.homeX+(c.index-1)*2}
}

function aliveBlocks(side){return forts[side].filter(b=>b.alive&&!b.falling)}
function overlapX(a,b){return Math.min(a.x+a.w/2,b.x+b.w/2)-Math.max(a.x-a.w/2,b.x-b.w/2)}
function supportedSet(blocks,removedId){
  const stable=blocks.filter(b=>b.alive&&!b.falling&&b.id!==removedId),supported=new Set();let changed=true;

  while(changed){changed=false;for(const b of stable)if(!supported.has(b.id))for(const below of stable)if(supported.has(below.id)&&below.y>b.y&&below.y-b.y<9&&overlapX(b,below)>Math.min(b.w,below.w)*.25){supported.add(b.id);changed=true;break}}
  return supported;
}
function supportLoad(side,block){const blocks=aliveBlocks(side),supported=supportedSet(blocks,block.id);return blocks.filter(b=>b.id!==block.id&&!supported.has(b.id)).length+1}
function predictedWind(){if(act.phase==='warn')return act.wind;if(act.phase==='live')return act.wind;return 0}
function stepProjectileState(q,wind){q.vx+=wind*.0025;q.vy+=.064;q.x+=q.vx;q.y+=q.vy;q.a+=q.va;return q}
function firstCollision(q,blocks){for(const b of blocks)if(b.alive&&!b.falling&&Math.abs(q.x-b.x)<=b.w/2+2.5&&Math.abs(q.y-b.y)<=b.h/2+2.5)return b;return null}
function simulateTrajectory(side,angle,power,wind,blocks){
  const m=muzzle(side),d=dirFor(side),q={x:m.x,y:m.y,vx:Math.cos(angle)*power*d,vy:-Math.sin(angle)*power,a:0,va:.13*d},points=[];let hit=null,ground=null;
  for(let t=0;t<220;t++){stepProjectileState(q,wind);if(t%7===0)points.push({x:q.x,y:q.y});hit=firstCollision(q,blocks);if(hit)break;if(q.y>=GROUND-2){ground={x:q.x,y:q.y};break}if(q.x<-8||q.x>168||q.y>330)break}
  return{hitId:hit&&hit.id,x:q.x,y:q.y,ground:!!ground,points,frames:points.length*7};
}
function shotCandidates(side,target){
  const out=[],wind=predictedWind(),blocks=aliveBlocks(1-side);
  for(const deg of[37,43,49,55,61,67])for(const power of[2.55,2.75,2.95,3.15,3.35]){
    const sim=simulateTrajectory(side,deg*Math.PI/180,power,wind,blocks),hit=blocks.find(b=>b.id===sim.hitId),dist=Math.hypot(sim.x-target.x,sim.y-target.y);
    out.push({angle:deg*Math.PI/180,power,sim,hit,dist,score:-dist+(hit&&hit.id===target.id?80:hit?20:0)});
  }return out;
}
function baselineTarget(side){const blocks=aliveBlocks(1-side),x=side===0?148:12,y=248;return blocks.slice().sort((a,b)=>(Math.abs(a.x-x)+Math.abs(a.y-y)*.8)-(Math.abs(b.x-x)+Math.abs(b.y-y)*.8)||a.order-b.order)[0]||null}
function computePlan(side,smart){
  const blocks=aliveBlocks(1-side);if(!blocks.length)return null;let choice,target;
  if(!smart){target=baselineTarget(side);choice=shotCandidates(side,target).sort((a,b)=>b.score-a.score)[0]}
  else{
    const wind=predictedWind(),options=[];
    for(const deg of[35,39,43,47,51,55,59,63,67,71])for(const power of[2.45,2.6,2.75,2.9,3.05,3.2,3.35,3.5]){
      const sim=simulateTrajectory(side,deg*Math.PI/180,power,wind,blocks),hit=blocks.find(b=>b.id===sim.hitId),load=hit?supportLoad(1-side,hit):0;
      const materialBonus=hit&&hit.type==='keystone'?12:0,groundPenalty=hit&&hit.y>264?140:0,arcBonus=hit&&sim.y>238?8:0;
      const spectacle=Math.max(0,deg-55)*.1;
      options.push({angle:deg*Math.PI/180,power,sim,hit,load,score:load*40+materialBonus+arcBonus+spectacle-groundPenalty-Math.abs(deg-52)*.08});
    }
    choice=options.sort((a,b)=>b.score-a.score||a.angle-b.angle||a.power-b.power)[0];target=choice&&choice.hit||baselineTarget(side);
    if(!choice||!choice.hit){choice=shotCandidates(side,target).sort((a,b)=>b.score-a.score)[0]}
  }
  if(!choice||!target)return null;const ideal=choice.hit?supportLoad(1-side,choice.hit):0,forecast=hash(volley+worldSeed,chapter*37+side*11+(choice.hit?choice.hit.order:0)),expected=ideal?Math.max(1,ideal+(forecast<.18?3:forecast>.72?-3:0)):0,zone={x:choice.sim.x,y:Math.min(choice.sim.y,GROUND-8),w:clamp(9+expected*1.5,12,28),h:clamp(14+expected*3,18,58)};
  const call=smart?(target.type==='foot'?'TAKE THE FOUNDATION':target.type==='keystone'?'BREAK THE ARCH KEY':'CUT THE LOAD PATH'):(target.type==='core'?'CLIP THE CROWN':'CENTER THE WALL');
  return{side,targetId:target.id,targetType:target.type,angle:choice.angle,power:choice.power,points:choice.sim.points.map(p=>({...p})),expected,zone,predictedHitId:choice.sim.hitId,call,wind:predictedWind(),smart:!!smart};
}
function choosePlan(side){
  const smart=typeof globalThis.__NO_COLLAPSE_PLAN==='undefined',out=computePlan(side,smart);if(smart)stats.smartPlans++;else stats.baselinePlans++;return out;
}
function announceShot(replan){
  const next=choosePlan(turn);if(!next)return false;lastPlan=plan;plan=next;phase='announce';if(!replan)phaseT=150;stats.announcements++;markEvent();
  for(const c of crews.filter(c=>c.side===turn)){c.pose=c.index===0?'point':c.index===1?'crank':'brace';c.targetX=c.homeX+(c.index===0?dirFor(turn)*4:0)}
  if(!replan){say(next.call,KINGDOMS[turn].light,80,105,110);offer('call',1,machines[turn].x,244,'SHOT CALLED')}return true;
}
function aimJank(){const h=hash(volley+worldSeed*3,chapter*71+turn*17),p=hash(volley*11+worldSeed,chapter*29+5);return{angle:(h-.5)*.22*(1.38-persona.precision),power:(p-.5)*.62*(1.34-persona.precision)}}
function launchShot(){
  if(!plan||projectile)return;const j=aimJank(),calibration=plan.smart?.65:1,m=muzzle(turn),d=dirFor(turn);projectile={id:'projectile',side:turn,x:m.x,y:m.y,vx:Math.cos(plan.angle+j.angle*calibration)*(plan.power+j.power*calibration)*d,vy:-Math.sin(plan.angle+j.angle*calibration)*(plan.power+j.power*calibration),a:0,va:.13*d,life:0,type:chapter%4,plannedHitId:plan.predictedHitId};
  machines[turn].recoil=26;machines[turn].loaded=false;phase='flight';phaseT=240;stats.shots++;markEvent(4);offer('launch',1,m.x,m.y,'SHOT AWAY');payoffDust(m.x,m.y,7,biome.trim);
}
function rawBotIntent(){
  const out=baseIntent();if(pres.admire&&typeof globalThis.__NO_ADMIRE==='undefined')return Object.assign(out,{brace:true,tactic:'ADMIRE THE RUIN'});
  if(phase==='build')return Object.assign(out,{brace:false,tactic:'BUILD '+biome.machine});
  if(phase==='announce')return Object.assign(out,{fire:phaseT<=22,targetId:plan&&plan.targetId,brace:act.phase==='warn',tactic:act.phase==='warn'?'COUNTER THE GUST':plan?plan.call:'READ THE WALL'});
  if(phase==='windup')return Object.assign(out,{brace:true,targetId:plan&&plan.targetId,tactic:'LOOSE ON THE MARK'});
  if(phase==='flight')return Object.assign(out,{brace:true,targetId:plan&&plan.targetId,tactic:'WATCH THE ARC'});
  if(phase==='collapse')return Object.assign(out,{brace:true,tactic:'COUNT WHAT FALLS'});return out;
}
function botIntent(){
  if(typeof globalThis.__NO_LAPSE!=='undefined')return rawBotIntent();const before=profile.isLapsed(runFrame),out=profile.decide(runFrame,null,rawBotIntent,()=>Object.assign(baseIntent('CHECK THE KNOT'),{brace:true,targetId:plan&&plan.targetId})),after=profile.isLapsed(runFrame);
  if(!before&&after&&!lastLapsed){stats.lapses++;markEvent();say('...?',persona.c,machines[turn].x,244,34)}lastLapsed=after;return out||baseIntent();
}
function humanIntent(){return{aimDelta:(keys.up?1:0)-(keys.down?1:0),powerDelta:(keys.right?1:0)-(keys.left?1:0),fire:!!(keys.a||keys.b),brace:!!keys.c,targetId:plan&&plan.targetId,tactic:'MANUAL ENGINEER'} }
const controller=controllerMux({human:humanIntent,ai:botIntent,manual:()=>playing()||manual()});
function applyIntent(intent){
  const team=crews.filter(c=>c.side===turn);for(const c of team){const dx=c.targetX-c.x;c.x+=clamp(dx,-.18,.18);c.step+=Math.abs(dx)>.2?.24:0;c.face=dx<-.05?-1:dx>.05?1:c.face;if(intent.brace)c.pose='brace'}
  if(phase==='announce'&&plan){plan.angle=clamp(plan.angle+intent.aimDelta*.0025,.48,1.28);plan.power=clamp(plan.power+intent.powerDelta*.006,2.2,3.7);if(intent.aimDelta||intent.powerDelta){const sim=simulateTrajectory(turn,plan.angle,plan.power,predictedWind(),aliveBlocks(defender()));plan.points=sim.points;plan.predictedHitId=sim.hitId;plan.zone.x=sim.x;plan.zone.y=Math.min(sim.y,GROUND-8)}if(intent.fire&&phaseT<=45){phase='windup';phaseT=72;markEvent()}}
}

function makeBlockFall(b,force,index){if(!b.alive||b.falling)return false;b.falling=true;b.vx=force*.16+(hash(b.order,index)-.5)*.42;b.vy=-.45-hash(index,b.order)*.45;b.va=(hash(b.order+9,index)-.5)*.18;b.settled=false;return true}
function resolveSupport(side,force,index){const blocks=aliveBlocks(side),supported=supportedSet(blocks,null);let n=0;for(const b of blocks)if(!supported.has(b.id)&&makeBlockFall(b,force,index+n++)){}return n}
function beginBreach(side,x,y){if(breachPending)return;breachPending=true;stats.breaches++;markProgress(150);offer('breach',3,x,y,'CASTLE BREACH');payoffBurst(x,y,34,GOLD,2.8,.045);payoffBurst(x,y,20,KINGDOMS[side].light,2.2,.04);shake(8);kings[side].pose='stagger';kings[1-side].pose='cheer';say('CASTLE BREACH',GOLD,80,105,120)}
function impactShot(hit){
  if(!projectile)return;const side=defender(),x=projectile.x,y=projectile.y,d=dirFor(turn);let fallen=0,direct=false;
  if(hit){direct=true;stats.hits++;if(--hit.hp<=0&&makeBlockFall(hit,d,volley))fallen++;fallen+=resolveSupport(side,d,volley);stats.blocks+=fallen;markProgress(4+fallen*3);payoffBurst(x,y,12,biome.trim,1.7,.05);payoffDust(x,y,13,KINGDOMS[side].stone);shake(fallen>=5?6:3)}
  else{stats.misses++;markEvent();payoffDust(x,GROUND-2,9,biome.trim)}
  const expected=plan?plan.expected:0,delta=fallen-expected,travel=d*(x-muzzle(turn).x),targetTravel=plan?d*(plan.zone.x-muzzle(turn).x):84;
  let outcome='TRUE';if(!direct){if(travel<targetTravel-8){outcome='SHORT';stats.shorts++}else{outcome='LONG';stats.longs++}}else if(delta>=3){outcome='FORTUNE!';stats.fortuneShots++}else if(fallen<=Math.max(1,expected-3)){outcome='SHORT';stats.shorts++}else stats.trueShots++;
  if(fallen>=4){stats.cascades++;offer('cascade',2,x,y,fallen+' BLOCK CASCADE');if(fallen>=7){stats.bigCollapses++;markEvent()}}
  const core=forts[side].find(b=>b.type==='core'),alive=forts[side].filter(b=>b.alive&&!b.falling).length;if(core&&core.falling||alive<=8)beginBreach(side,x,y);
  impact={x,y,fallen,expected,outcome,direct,frame:showFrame};visualOutcome=outcome;say(outcome,outcome==='FORTUNE!'?GOLD:outcome==='TRUE'?MINT:CORAL,x,Math.max(88,y-18),80);offer('impact',1,x,y,outcome);projectile=null;phase='collapse';phaseT=breachPending?190:135;markEvent();
}
function stepProjectile(){if(!projectile)return;projectile.life++;stepProjectileState(projectile,act.phase==='live'?act.wind:0);const hit=firstCollision(projectile,aliveBlocks(defender()));if(hit||projectile.y>=GROUND-2||projectile.x<-9||projectile.x>169||projectile.life>240)impactShot(hit)}
function stepBlocks(){for(const side of[0,1])for(const b of forts[side])if(b.falling&&!b.settled){b.vy+=.075;b.x+=b.vx;b.y+=b.vy;b.a+=b.va;b.vx*=.994;if(b.y+b.h/2>=GROUND){b.y=GROUND-b.h/2;b.vy*=-.23;b.vx*=.72;b.va*=.7;if(Math.abs(b.vy)<.16){b.settled=true;b.alive=false;b.vy=0;b.vx=0;b.va=0}}}}
function advanceChapter(){chapter++;biome=BIOMES[chapter%BIOMES.length];forts=[blueprint(0),blueprint(1)];machines=[makeMachine(0),makeMachine(1)];kings=[makeKing(0),makeKing(1)];turn=1-turn;volley=0;stats.upgrades++;markProgress(100);say(biome.name,biome.trim,80,110,130);beginBuild(false)}

  return true;
}
